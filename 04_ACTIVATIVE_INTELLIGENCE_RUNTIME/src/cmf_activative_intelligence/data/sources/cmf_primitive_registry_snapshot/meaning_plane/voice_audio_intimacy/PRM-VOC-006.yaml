notes: >
  This primitive has the highest memorability bias in the VOC family
  (0.9). The bookend strategy is the most reliable structural move for
  CCP voice notes because it exploits the two attention windows the
  distracted listener reliably offers: arrival and departure. The
  Frank Reynolds "So simple. So sad." close should be studied as the
  gold standard — the close need not summarize; it must crystallize.
  Pair with PRM-VOC-008 (Lead-In and Tag Architecture) for the
  structural execution layer.
