book_reference:
  title: "Better Broadcast Writing, Better Broadcast News"
  author: "Greg Dobbs"
  chapters:
    - "Chapter 6: The Story of the Story"
    - "Chapter 8: Choosing Your Lead"
    - "Chapter 9: Choosing Your Close"
  key_pages: "80-86, 101-120, 121-142"
  book_path: "lab/Public Speeaking Coaching/08_Sound_Design/Better Broadcast Writing Better Broadcast News - Greg Dobbs.md"

summary: >
  Start Strong, End Strong is a structural composition primitive that
  concentrates maximum impact into the first and last lines of any spoken
  CCP output. Dobbs's broadcast law: "You want to grab your audience's
  attention right at the top of a piece, because if they don't tune in
  mentally at the top, they probably won't tune in at all. You also want
  to revive your audience's attention at the bottom, because then they'll
  remember the story." His strongest example: Frank Reynolds closing
  a nightclub fire story with four words — "So simple. So sad." — proving
  that the close can carry the entire emotional weight. In CCP, this
  governs the architecture of every voice note opening and closing.

core_move: >
  Maximize the first and last lines because they disproportionately
  shape emotion, memory, and continuation.

why_it_works: >
  Dobbs rejects the "build to a climax" school of broadcast writing.
  His argument: starting weak with establishing shots of buildings or
  people walking leads to mental tune-out before the story gains momentum.
  "Interesting is interesting, dull is dull." He demonstrates with
  specific lead pairs — the arson story that opens with "For the first
  time in two-and-a-half months, these children today can breathe a
  little easier" versus the conventional "Police have caught a 23-year-old
  local man" — showing that the former grabs emotional attention while
  the latter delivers facts that could be absorbed later. The mechanism
  is dual: primacy effect (the first item in a sequence disproportionately
  influences overall impression) and recency effect (the last item is
  most accessible in memory). Combined with the "beauty shot" closing
  principle — leave the audience with something they'll remember — the
  bookend strategy maximizes the two moments where the distracted listener
  is most likely to be paying attention: the moment of arrival and the
  moment of departure.

examples:
  - context: "BOOK: Better Broadcast Writing - Bookend Dominance"
    application: >
      Dobbs insists on grabbing attention at the top and reviving it at the bottom. His Frank Reynolds example ("So simple. So sad.") proves the close carries the emotional weight.
    effect: >
      Primacy and recency effects ensure the message is absorbed and remembered.

  - context: "CCP: CMF - Insight Voice Note"
    application: >
      Opens with a surprising data point: "Your last three posts got more saves than all of January." Closes with a behavioral instruction: "One post. Today."
    effect: >
      The bookends work harder than any mid-note content, driving immediate action.

  - context: "CCP: CCF - Discovery Hook"
    application: >
      Opens with: "The reason your team keeps quitting has nothing to do with salary." Closes with: "If that sentence made you uncomfortable, we should talk."
    effect: >
      The prospect is arrested by the claim and exits with a challenge.

  - context: "CCP: CBCS - Weekly Accountability"
    application: >
      Opens with: "You shipped every day this week." Closes with: "Don't let next week be the exception."
    effect: >
      Transforms a routine summary into a memorable motivational beat.

  - context: "CCP: Conscious Reactions - Draft Feedback"
    application: >
      The agent opens with the single biggest win in the draft, and closes with the single required fix before publishing.
    effect: >
      The coach remembers exactly what they did right and exactly what they need to change.

anti_examples:
  - description: >
      A Conscious Reaction voice note opens with: "Hey, so, I wanted
      to talk about a few things I noticed in your content this week,
      um, there were some things that were good and some things that
      could be improved, so let me just go through them."
    why_it_fails: >
      Dobbs's "Start Strong" principle is violated at every level:
      the opening is a meta-commentary about the note itself rather
      than a strong content lead. The hedging ("some things," "a few
      things") signals uncertainty. The filler ("so, um") wastes the
      primacy window. The listener's attention is not grabbed; it
      drifts before the substance arrives.

