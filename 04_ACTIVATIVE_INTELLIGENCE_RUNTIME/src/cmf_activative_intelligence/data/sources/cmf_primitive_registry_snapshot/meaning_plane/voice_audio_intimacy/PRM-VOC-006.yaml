trigger_conditions:
  - "Target payload requires explicit opening and closing hooks"
  - "Estimated audio duration > 30s where mid-point attention decay is probable"
  - "Delivery endpoint is high-noise (Telegram, Social Feed)"

suppression_conditions:
  - "Target is a continuous streaming format without defined segment breaks"
  - "Target is a conversational turn in a real-time live Q&A"
  - "Narrative intent explicitly requires a slow, tension-building reveal"

misuse_modes:
  - "Clickbait opening — strong start that overpromises and underdelivers"
  - "Neglecting the middle — assuming bookends alone carry the entire piece"
  - "Formulaic bookends — using the same template open/close pattern until it becomes predictable"

