trigger_conditions:
  - "AST analysis detects content that is dense, causing the audience to drop off before finishing"
  - "System is designing any visual asset (carousel, quote card, slide deck) for CMF or V2WS"
  - "Agent generates a Telegram message containing multiple ideas that needs to be instantly scannable"

suppression_conditions:
  - "Format is intentionally long-form prose (e.g., a book chapter) where extreme typographic hierarchy would interrupt reading flow"
  - "System is outputting raw diagnostic logs where flat formatting is required for machine readability"

misuse_modes:
  - "Too Many Levels — Creating 6 different levels of hierarchy that confuse rather than clarify"
  - "Arbitrary Emphasis — Bolding random words in a sentence just for 'pop', breaking the semantic meaning"
  - "Upside-Down Hierarchy — Making the least important information (like a copyright date) the largest element on the page"

