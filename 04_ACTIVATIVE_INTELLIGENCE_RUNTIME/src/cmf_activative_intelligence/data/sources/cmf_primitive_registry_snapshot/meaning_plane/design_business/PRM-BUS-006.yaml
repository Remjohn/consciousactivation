summary: >
  Hierarchy as Attention Routing asserts that design is not just visual decoration;
  it is a semantic routing system. By assigning distinct visual weights (size,
  weight, color, placement) to different levels of information (headline, subhead,
  body, CTA), the designer controls the order in which the brain processes meaning.
  It reduces the cognitive effort required to navigate complex content.

core_move: >
  Assign distinct, uncompetitive visual weights to different semantic roles in
  the content, ensuring the viewer's eye is routed exactly where it needs to go,
  in the exact order it needs to go there.

why_it_works: >
  Lupton teaches that humans do not read everything on a page or screen; they scan
  for entry points. When all text is the same size or weight, the brain has no map.
  It must exert high effort just to determine what the content is about. By
  installing a stark hierarchy, the designer acts as an editor of attention,
  answering the user's subconscious questions: 'What is this?', 'Why should I care?',
  and 'What do I do next?' in a fraction of a second.

examples:
  - context: "BOOK: Thinking with Type - Semantic Attention Routing"
    application: >
      Lupton asserts that design is a semantic routing system. By assigning distinct visual weights (size, weight, color, placement) to different levels of information, the designer controls the order in which the brain processes meaning.
    effect: >
      Reduces cognitive effort required to navigate complex content. Answers the user's subconscious questions: 'What is this?', 'Why should I care?', and 'What do I do next?' instantly.

  - context: "CCP: CMF - Webinar Slide Architecture"
    application: >
      Instead of five equal bullet points, the slide uses a massive, bold headline for the core claim. Supporting evidence is in a light, smaller sans-serif, and the single action step is boxed at the bottom.
    effect: >
      The audience instantly grasps the main point while the speaker talks through details, leading to higher retention.

  - context: "CCP: Telegram - Trigger-First Prompting"
    application: >
      Even in text-only interfaces, hierarchy is applied. The main question is bolded at the top, context is separated by two line breaks, and the required action is italicized at the very bottom.
    effect: >
      The client does not have to parse a dense paragraph. Visual structure routes attention directly to the required behavior.

  - context: "CCP: V2WS - The 'Offer' Stack"
    application: >
      When presenting the price and bonuses, the final price is given maximum visual weight, while the 'total value' is crossed out in a lighter weight above it, creating an immediate semantic relationship of a 'deal'.
    effect: >
      The brain instantly calculates the value proposition before reading any explanatory text.

  - context: "CCP: CCF - Metric Dashboards"
    application: >
      The coach's dashboard does not give all metrics equal size. The single most important 'lag measure' (e.g., Revenue) is massive, while 'lead measures' (e.g., DMs sent) are smaller, secondary numbers.
    effect: >
      Prevents metric blindness. The coach always knows exactly what their primary focus should be upon opening the app.

anti_examples:
  - description: >
      A promotional graphic for a mastermind where the date, the price, the name
      of the event, and the host's name are all written in 40pt bold text in three
      different bright colors.
    why_it_fails: >
      When everything is emphasized, nothing is. The visual elements are competing
      rather than cooperating. The viewer's eye bounces randomly around the image,
      causing cognitive fatigue and causing them to scroll past without processing
      the offer.

