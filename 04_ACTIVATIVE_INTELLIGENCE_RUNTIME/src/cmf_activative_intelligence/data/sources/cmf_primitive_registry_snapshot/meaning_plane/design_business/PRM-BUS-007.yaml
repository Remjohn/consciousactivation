trigger_conditions:
  - "System telemetry indicates the creator is burning out trying to 'feed the algorithm' with high-volume/low-value content"
  - "AST analysis shows content is getting high views but zero conversions or DM inquiries"
  - "Agent is designing the overall content calendar and distribution logic for CMF"

suppression_conditions:
  - "System is executing a highly targeted, time-bound ad campaign designed purely for cold lead capture"
  - "Asset is meant to be a static, SEO-optimized reference document (e.g., an FAQ page)"

misuse_modes:
  - "Over-Familiarity — Treating the audience like therapists and over-sharing irrelevant personal drama"
  - "The Friend Zone — Building great relationships but being too afraid to ever make a business offer"
  - "Fake Authenticity — Scripting 'vulnerable' moments purely to manipulate the relationship algorithm"

