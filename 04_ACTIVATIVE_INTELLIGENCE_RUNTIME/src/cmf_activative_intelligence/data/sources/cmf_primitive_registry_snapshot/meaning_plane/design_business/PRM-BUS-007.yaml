summary: >
  Social Media as Relationship shifts the focus of distribution from performative
  broadcasting (chasing vanity metrics) to operational trust-building. It views
  social platforms not as stages for the ego, but as infrastructure for deepening
  connections with a specific target audience over time, utilizing a structured
  ratio of content types (the 10/30/60 rule).

core_move: >
  Treat every piece of content not as an end in itself, but as a touchpoint
  designed to advance a relationship, build trust, or invite further connection.

why_it_works: >
  Port argues that people buy from service providers they know, like, and trust.
  The 'broadcast' model of social media (yelling into the void hoping to go viral)
  fails because it treats the audience as a monolith rather than individual humans.
  By shifting the paradigm to 'relationship infrastructure', content becomes a
  consistent, reliable, and useful presence in the ideal client's life. Trust
  compounds not through a single viral hit, but through repeated, valuable proof
  of expertise and empathy.

examples:
  - context: "BOOK: Book Yourself Solid - Relationship Infrastructure"
    application: >
      Port shifts distribution from performative broadcasting to operational trust-building. Social platforms are infrastructure for deepening connections with a specific target audience over time, recognizing that people buy from those they know, like, and trust.
    effect: >
      Trust compounds through repeated, valuable proof of expertise and empathy, treating the audience as individual humans rather than a monolith.

  - context: "CCP: CMF - Content Strategy Engine"
    application: >
      Instead of posting five times a day with generic quotes, the agent enforces a structured ratio: one vulnerable insight (know/like) and one tactical breakdown (trust) per week.
    effect: >
      Follower count grows slower, but DM and consultation requests skyrocket because the audience feels a genuine relationship is offered.

  - context: "CCP: Telegram - Community Management Protocol"
    application: >
      The agent prompts the coach to spend 30 minutes a day leaving thoughtful, customized voice notes replying to community comments, rather than posting new broad content.
    effect: >
      The algorithm is bypassed entirely in favor of direct human connection. Recipients become fiercely loyal advocates.

  - context: "CCP: V2WS - Pre-Webinar Nurture"
    application: >
      In the days leading up to the webinar, the automated sequence doesn't just send countdowns. It sends personalized, text-only emails asking the registrant what their biggest bottleneck is.
    effect: >
      The registrant arrives at the webinar feeling they already have a relationship with the host, massively lowering sales resistance.

  - context: "CCP: CCF - The 'First 100' Constraint"
    application: >
      When a new coach launches, the system explicitly forbids paid ads, forcing them to manually interact with their first 100 followers using highly personalized, high-friction engagement.
    effect: >
      Ensures the coach learns the actual pain points of their audience before attempting to scale, preventing out-of-touch broadcasting.

anti_examples:
  - description: >
      A creator who obsessively jumps on every trending audio on TikTok,
      pointing at floating text that has nothing to do with their core
      coaching philosophy.
    why_it_fails: >
      The creator may get views, but they are building an audience of spectators,
      not a relationship with future clients. The content is performative,
      not connective. When they finally make an offer, no one buys because
      no trust was ever established.

