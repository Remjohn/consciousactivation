trigger_conditions:
  - "System is generating any multi-page, multi-slide, or serial visual asset"
  - "Agent detects that content production is bottlenecked because every asset is being built from scratch without templates"
  - "AST visual analysis flags an output as feeling messy, unaligned, or unprofessional"

suppression_conditions:
  - "Specific creative goal is disorientation, chaos, or 'breaking the rules' for avant-garde artistic expression"
  - "Agent is outputting single-sentence text-only Telegram messages where a spatial grid does not apply"

misuse_modes:
  - "The Grid as Prison — Following the grid so rigidly that the design becomes sterile, boring, and devoid of rhythm"
  - "Ignoring the Content — Forcing a long piece of text into a tiny grid module where it doesn't fit, just to maintain the layout"
  - "Over-Complexity — Creating a 36-column grid for a simple graphic, rendering the system useless"

