summary: >
  The Grid as Cognitive Relief treats underlying structural alignment as a tool for
  reducing the audience's mental workload. It establishes predictable zones for
  information, transforming chaotic visual noise into an orderly, easily navigable
  system. It also provides a repeatable framework for scaling content production
  without degrading quality.

core_move: >
  Anchor all visual assets, UI elements, and text blocks to an invisible structural
  grid to create predictable rhythm, alignment, and cognitive ease for the user.

why_it_works: >
  Lupton teaches that grids are generative systems. The human brain seeks order.
  When margins jump around from slide to slide, or text blocks are arbitrarily
  aligned, the brain wastes processing power recalibrating its spatial map. A
  consistent grid eliminates this entropy. By establishing a reliable structure,
  the designer frees the audience's cognition to focus entirely on the meaning
  of the content, while simultaneously speeding up the production process.

examples:
  - context: "BOOK: Thinking with Type - Modular Consistency"
    application: >
      Lupton teaches that grids are generative systems. By anchoring all visual assets to an invisible structural grid, it establishes predictable zones for information, eliminating the entropy of recalibration.
    effect: >
      Frees the audience's cognition to focus entirely on the meaning of the content, while speeding up the production process.

  - context: "CCP: V2WS - Slide Master Architecture"
    application: >
      A strict baseline and column grid is enforced across the deck. The title always sits exactly 2 inches from the top, main body copy aligns left, and page numbers are anchored bottom right.
    effect: >
      The audience never has to 'search' for the main point when transitioning slides. The structural consistency creates a feeling of stability, allowing complex ideas to land smoothly.

  - context: "CCP: CMF - Instagram Carousel Templates"
    application: >
      The agent generates a modular grid for a carousel. Slide 2 uses a single wide column for a quote, Slide 3 uses a two-column layout for comparison. Because both follow the same underlying grid, they feel continuous.
    effect: >
      The carousel flows seamlessly. High-fidelity assets are produced rapidly because the grid's 'program' automates placement decisions.

  - context: "CCP: CCF - Document Parsing"
    application: >
      When generating PDFs or worksheets, the system enforces strict vertical rhythm and margin rules, rejecting text blocks that break the established bounding boxes.
    effect: >
      The document feels authoritative and high-end rather than looking like a chaotic Microsoft Word export.

  - context: "CCP: Telegram - Structured Spacing"
    application: >
      In a text-only environment, the 'grid' becomes line breaks. The agent enforces a strict rule: never more than three sentences per paragraph, with a double line break before the CTA.
    effect: >
      Transforms an intimidating block of text into a highly readable, rhythmically predictable flow that the eye can scan instantly.

anti_examples:
  - description: >
      A 10-page PDF guide where the margins change on every page, some text is
      centered, some is left-aligned, and images are scattered randomly without
      aligning to any shared axis.
    why_it_fails: >
      The document feels chaotic and cheap. The user experiences 'seasickness'
      trying to read it. Because there is no underlying program, the design
      creates constant cognitive friction, causing the user to abandon the text.

