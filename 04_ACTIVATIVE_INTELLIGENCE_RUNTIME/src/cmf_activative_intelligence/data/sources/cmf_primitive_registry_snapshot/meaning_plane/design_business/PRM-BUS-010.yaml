trigger_conditions:
  - "System is establishing or enforcing the visual brand identity for a specific coaching archetype"
  - "Agent is generating quote cards, reel covers, or carousel templates in CMF"
  - "AST analysis detects that the visual presentation of content feels emotionally flat despite strong copywriting"

suppression_conditions:
  - "System is rendering purely functional UX environments (like a settings menu) where standard system fonts are required for usability"
  - "Agent is outputting to an environment that strictly forbids typography modification (though markdown hacks may apply)"

misuse_modes:
  - "Font Soup — Using five different typefaces on one graphic, creating chaos"
  - "Trendy over Timeless — Picking a highly stylized display font that is illegible at small sizes just because it looks cool"
  - "Inauthentic Voice — A highly empathetic, soft-spoken coach using brutalist, aggressive typography that alienates their audience"

