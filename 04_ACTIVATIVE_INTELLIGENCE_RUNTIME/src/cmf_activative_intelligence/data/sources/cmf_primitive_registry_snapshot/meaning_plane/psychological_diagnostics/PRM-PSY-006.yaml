crosswalk_id: "XW-VULNERABILITY-PROMPT"
crosswalk_note: "On the experience side, this informs the design of journaling prompts or reflection moments within the app to ensure they request emotional data, not just operational data."

notes: "Deep questions should follow the heuristic: 'What question would I ask if this person were already a close friend?'"
