summary: >
  Deep Questions is a psychological diagnostic primitive that acts as a vulnerability engine, transitioning interactions from factual exchange to emotional disclosure. It operates by asking about values, beliefs, and experiences rather than mere data, prompting the listener to describe how they feel. In CCP, this primitive is the mechanism that transforms surface-level content into deep emotional connection, triggering the biological processes necessary for trust, neural alignment, and effective coaching.

core_move: >
  Ask questions that target values, beliefs, and emotional experiences rather than objective facts.

why_it_works: >
  Duhigg cites Arthur Aron's research to demonstrate that vulnerability triggers emotional contagion—the neurological mechanism by which one person's emotional state involuntarily spreads to another. Factual questions ("What did you do today?") produce only data, keeping the brain in a transactional state. Deep questions ("How did it feel when you did that?") produce vulnerability, which induces neural alignment and trust. This alignment is the biological precondition for a client to accept new ideas or confront uncomfortable truths.

examples:
  - context: "BOOK: Supercommunicators - The Vulnerability Engine"
    application: >
      Duhigg uses Arthur Aron's research to show that factual questions keep the brain transactional. Deep questions target values and emotions, prompting vulnerability.
    effect: >
      Vulnerability triggers emotional contagion and neural alignment, creating the biological trust necessary for effective coaching.

  - context: "CCP: CMF - The Anti-Binary Hook"
    application: >
      Instead of asking 'Do you struggle with perfectionism?', the script asks: 'If you could release one project today with a guarantee no one would judge it, what would it be?'
    effect: >
      The audience is forced out of passive consumption and into active, emotional reflection, priming them for the solution.

  - context: "CCP: CBCS - The Intake Pivot"
    application: >
      Instead of asking for a revenue target, the agent asks: 'When you picture the version of your business that makes you excited to wake up, what is the very first thing you see?'
    effect: >
      Extracts a deeply held value rather than a sterile metric, giving the coach the emotional leverage required to sustain the client through future difficulties.

  - context: "CCP: Conscious Reactions - The Reflection Prompt"
    application: >
      After a user completes a difficult task, the UI doesn't just ask 'Did you finish?'. It asks: 'What was the most uncomfortable moment of that recording?'
    effect: >
      Trains the user to engage in emotional self-auditing rather than just checking boxes, deepening their relationship with the platform.

  - context: "CCP: V2WS - The 'Silent' Slide"
    application: >
      During the webinar, the presenter asks a profound question about the cost of inaction, puts the question on screen, and remains silent for 15 seconds.
    effect: >
      The audience is forced to sit with their own vulnerability, elevating the presenter from a 'speaker' to a 'guide'.

