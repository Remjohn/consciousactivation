trigger_conditions:
  - "System initiates the discovery phase of a new coaching relationship or module"
  - "User exhibits intellectualization or cost-benefit analysis and needs to reconnect with core motives"
  - "Generating content hooks designed to pattern-break audiences exhausted by generic advice"

suppression_conditions:
  - "User is actively emotionally flooded or in crisis, requiring practical grounding rather than emotional excavation"
  - "Workflow is strictly transactional (e.g., billing, password reset) where deep inquiry violates social norms"

misuse_modes:
  - "Interrogation — firing multiple deep questions without reciprocating with one's own vulnerability, making the client feel studied rather than supported."
  - "Forced Intimacy — asking deeply personal questions before any baseline trust or psychological safety has been established."

