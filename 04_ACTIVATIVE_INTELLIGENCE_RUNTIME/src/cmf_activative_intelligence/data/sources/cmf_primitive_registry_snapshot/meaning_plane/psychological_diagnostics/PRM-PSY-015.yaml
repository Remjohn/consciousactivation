trigger_conditions:
  - "The coach's background does not perfectly match the target audience's demographic or industry"
  - "The target audience is entrenched in a specialized echo chamber with rigid blind spots"
  - "The coach is combining frameworks from two completely different domains (e.g., neuroscience and copywriting)"

suppression_conditions:
  - "The coaching engagement requires deep, technical subject-matter expertise (e.g., tax law consulting)"
  - "The audience is highly marginalized and requires a coach with lived experience to establish trust"

misuse_modes:
  - "The Tourist — Acting like an outsider who observes but offers no translation or value"
  - "Faked Insider — Refusing the outsider advantage out of insecurity and attempting to blend in poorly"
  - "Aloof Superiority — Using outsider status to judge the audience rather than serve them"

