trigger_conditions:
  - "AST analysis detects user in a state of high resistance, defensiveness, or shame (e.g., following a failure)"
  - "System prepares to deliver a hard truth, low benchmark score, or significant behavioral challenge"
  - "Initiating the first 3 minutes of a webinar or the hook of a high-leverage content piece"

suppression_conditions:
  - "User requires immediate, clinical, or crisis intervention where empathy might delay critical action"
  - "Audience is already fully aligned and explicitly requesting rapid execution instructions"

misuse_modes:
  - "False Equivalence — claiming shared experience without actual knowledge, destroying credibility"
  - "Over-Identification — staying in the shared pain too long without pivoting to the solution, causing stagnation"

