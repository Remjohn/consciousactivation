trigger_conditions:
  - "Target audience operates with a highly specific, insular jargon or cultural shorthand"
  - "Coach is communicating across a significant demographic or professional boundary"
  - "Audience exhibits high skepticism or resistance to traditional authority figures"
  - "Content requires the audience to feel safe enough to admit vulnerability"

suppression_conditions:
  - "The coach does not genuinely understand or respect the target audience's language, risking inauthenticity"
  - "The audience expects and demands a specific formal or professional register (e.g., a legal briefing)"
  - "The coach's attempt to code-switch would be perceived as mockery or cultural appropriation"

misuse_modes:
  - "Inauthentic Mimicry — Code-switching without deep comprehension of the audience's lived reality"
  - "Register Flattening — Using a generic 'everyman' voice instead of a specific, targeted identity"
  - "Expert Disconnect — Prioritizing the need to sound smart over the need to be understood"

