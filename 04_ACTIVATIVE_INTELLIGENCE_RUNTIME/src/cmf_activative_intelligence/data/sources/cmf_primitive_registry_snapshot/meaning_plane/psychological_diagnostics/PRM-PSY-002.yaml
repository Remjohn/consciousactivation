trigger_conditions:
  - "AST analysis detects high emotional volatility or explicitly combative language in user input"
  - "Agent prepares to deliver a significant behavioral pivot or structural correction"
  - "UI requires user confirmation before executing an irreversible diagnostic rendering"

suppression_conditions:
  - "Interaction is a rapid-fire logistical exchange where looping would introduce unnecessary friction"
  - "User is engaging in bad-faith abuse where boundary enforcement, not looping, is required"

misuse_modes:
  - "Parroting — repeating the client's exact words back to them without distilling the meaning, which sounds robotic and patronizing."
  - "Weaponized Looping — summarizing the client's point in a way that makes it sound absurd or flawed to set up a rebuttal."

