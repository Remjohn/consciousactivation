summary: >
  Looping for Understanding is a core connection primitive that provides explicit, behavioral proof of listening through a three-step cycle: asking a question, repeating back the distilled response in your own words, and confirming accuracy. It operates on the principle that passive listening is invisible to the speaker. In CCP, this primitive is the structural mechanism that transforms a monologue into a coaching conversation, regulating the client's nervous system and creating the psychological safety required for deep coaching work.

core_move: >
  Prove comprehension by summarizing the speaker's point in your own words and explicitly asking for confirmation before responding.

why_it_works: >
  Duhigg cites research proving that speakers do not notice passive listening signals (nodding, eye contact) because they are too focused on their own articulation. Without active proof of comprehension, the speaker assumes the listener is merely preparing a rebuttal, maintaining a defensive posture. Looping forces the listener to do cognitive work *after* the speaker finishes, creating "psychological safety." This behavioral proof regulates the speaker's nervous system, extinguishing their need to fight to be heard, and enabling true neural alignment.

examples:
  - context: "BOOK: Supercommunicators - Psychological Safety"
    application: >
      Duhigg proves that passive listening is invisible to the speaker. Looping requires asking a question, distilling the response, and confirming accuracy.
    effect: >
      Forces the listener to do cognitive work, extinguishing the speaker's defensive need to fight to be heard.

  - context: "CCP: CBCS - De-escalation Protocol"
    application: >
      When a client submits a frustrated voice note about lack of progress, the agent replies: "I'm hearing you feel like you've executed the plan perfectly but the lack of results makes you question the strategy. Did I capture that?"
    effect: >
      The client feels profoundly heard. Their subsequent message drops the defensive posture, allowing actual coaching to begin.

  - context: "CCP: V2WS - Live Q&A Validation"
    application: >
      During a webinar, when a prospect challenges the methodology, the host loops the challenge back to them for confirmation before ever addressing the substance of the critique.
    effect: >
      The prospect's adversarial energy neutralizes because they control the narrative, demonstrating the host's unshakeable security to the rest of the audience.

  - context: "CCP: Conscious Reactions - The Playback Step"
    application: >
      Before generating a final diagnostic report, the UI displays a synthesized summary of the user's stated goals and asks them to click 'Confirm' to ensure alignment.
    effect: >
      Builds immediate systemic trust; the user believes the subsequent AI output because the system proved it understood the input.

  - context: "CCP: CMF - The 'Mirror' Hook"
    application: >
      A short-form video begins by explicitly summarizing the viewer's exact internal monologue ('You're watching this because you know your script is good but your delivery is killing your conversion').
    effect: >
      Functions as an asymmetrical loop; the viewer feels 'read', instantly granting the speaker authority to prescribe a solution.

