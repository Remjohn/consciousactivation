trigger_conditions:
  - "The client or audience is facing a rigid, seemingly immovable institutional or systemic barrier"
  - "The audience feels high levels of victimization and low levels of agency"
  - "The coaching niche involves navigating complex systems (finance, corporate ladder, algorithms)"

suppression_conditions:
  - "The constraint is an internal psychological boundary that requires healing, not a systemic rule that requires bypassing"
  - "The 'subversion' would involve illegal or deeply unethical behavior rather than clever circumnavigation"

misuse_modes:
  - "Brute Force Motivation — Responding to a complex system with 'just work harder' rhetoric"
  - "Victim Validation — Agreeing with the client that the system is unfair without looking for the loophole"
  - "Reckless Defiance — Advising clients to break the rules without understanding the systemic consequences"

