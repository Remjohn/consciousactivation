trigger_conditions:
  - "The coach is outlining a new product, webinar, or primary piece of intellectual property"
  - "The client is rambling or struggling to articulate the value of what they do"
  - "The conversion rates on a current asset are low due to perceived 'vagueness' or 'overwhelm'"

suppression_conditions:
  - "The coach is delivering pure emotional support (e.g., trauma response) where demanding a 'rigid result' would be inappropriate"
  - "The content is meant to be a sprawling, philosophical 'campfire' discussion rather than a conversion event"

misuse_modes:
  - "The 6-Month Promise — Using the formula but promising a result that takes months, destroying believability (failing the 60-minute test)"
  - "The Generic Feeling — Using 'good' or 'happy' instead of precise emotional states like 'relieved,' 'invincible,' or 'safe'"
  - "The Broad Audience — Addressing 'everyone' instead of a specific cohort, which dilutes the resonance"

synergizes_with:
  - "PRM-PSY-020" # The Paradox of Value (The formula enforces the Singular Path)
  - "PRM-HUM-037" # Hyper-Specificity Anchoring

conflicts_with:
  - "PRM-PSY-022" # The Iterative Filter (if the coach tries to force the 'spew' to conform to the formula too early, causing writer's block)

crosswalk_id: "XW-OUTCOME-ARCHITECTURE"
crosswalk_note: "Meaning focuses on the linguistic formula; Experience focuses on surfacing this formula immediately in UI onboarding."

notes: >
  This is the ultimate 'scope creep' killer. By forcing the CCF-V2WS CLI to demand this formula
  before accepting any input, we programmatically eliminate 90% of the structural failures that
  plague amateur webinar creators.
