summary: >
  The Clearly Defined Outcome Formula is a rigid, non-negotiable architecture for the premise of
  any conversion event. It dictates that every piece of content must be built upon a single sentence
  defining exactly who the content is for, the specific emotional state they will experience, and the
  undeniable result they will achieve, all of which must pass the '60-minute test' for feasibility.
core_move: >
  Force all content creation to begin by explicitly defining the 'Audience + Feeling + Result'
  variables, and relentlessly shrink the scope of the promised result until it can realistically
  be mapped out in 45-60 minutes.
why_it_works: >
  As Fladlien argues, 'fuzzy targets do not get hit.' Most experts fail because their outcome is either
  purely intellectual ('I want to teach them marketing') or far too broad ('I want to help them
  build a 7-figure business'). The Audience + Feeling + Result formula forces the creator to define the
  emotional goal alongside the intellectual one. Furthermore, the '60-minute test' acts as a
  complexity constraint; if the promised result takes 6 months to explain, it triggers the Paradox of
  Value (overwhelm). Shrinking the scope creates the clarity required for conversion.

examples:
  - context: "BOOK: Defining the premise of a webinar"
    application: >
      Instead of the vague goal 'I want to teach people how to do webinars,' Fladlien uses the formula
      to create the premise: 'To show [Audience: anyone] how to add webinars to their business in a way
      that is [Feeling: easy and enjoyable] and has an [Result: immediate impact on their bottom line].'
    effect: >
      This sentence becomes the absolute filter for the 'whittle' phase. Every slide that doesn't serve
      the Audience, elevate the Feeling, or prove the Result is mercilessly deleted.

  - context: "CCP: V2WS `YoloIntake` JSON payload prompt"
    application: >
      When a coach initiates the V2WS CLI, the first prompt is not 'What do you want to talk about?'
      The prompt is: 'Complete this sentence: To show [Who exactly?] how to [Do what?] so they feel
      [What emotion?] and achieve [What 60-minute result?]'
    effect: >
      The LLM refuses to proceed to the slide generation phase until these three variables are
      solidified, structurally preventing the coach from creating a sprawling, unfocused 'Frankenstein' lecture.

  - context: "CCP: CCF Archetype drafting a lead magnet (PDF)"
    application: >
      A fitness coach wants to write an ebook on 'Getting Ripped.' They apply the 60-minute test and
      realize 'getting ripped' is too broad. They shrink the scope using the formula: 'To show [busy dads]
      how to optimize their morning protein intake so they feel [energized and in control] and experience
      [zero hunger crashes by noon].'
    effect: >
      The lead magnet's conversion rate skyrockets because the outcome is specific, emotionally resonant,
      and highly believable (it passes the feasibility test).

  - context: "CCP: Telegram Coaching Conversation (CBCS) setting session intent"
    application: >
      Before a live 1-on-1 coaching call, the coach sends a voice note: 'In the next 45 minutes,
      we are going to map out your Q3 launch calendar [Result] so you can log off today feeling
      complete relief from the anxiety you've been carrying [Feeling].'
    effect: >
      The client enters the call already biologically primed for the 'relief' state, drastically
      increasing their receptivity to the coach's instructions.

  - context: "CCP: CMF Media Factory - Video Hook Architecture"
    application: >
      A media agent restructures a video script hook from 'Here is how to do sales' to 'If you are an
      agency owner [Audience], here is how to close your next retainer [Result] without feeling like a
      sleazy used-car salesman [Feeling].'
    effect: >
      The hook instantly captures the target demographic by naming their specific emotional friction
      and offering the exact, contained result they want.

anti_examples:
  - description: >
      A coach defines their webinar outcome as: 'I am going to teach entrepreneurs everything they
      need to know about scaling operations, hiring teams, and optimizing taxes.'
    why_it_fails: >
      This violently fails the 60-minute test. The scope is massive, ensuring the presentation will
      trigger the Paradox of Value (overwhelm). Furthermore, it completely lacks the 'Feeling' variable,
      meaning the content will likely be delivered in a dry, academic state that fails to mobilize the audience.

