summary: >
  Audience Ecological Checks, adapted from Neuro-linguistic Programming (NLP), are a systematic review
  of content prior to delivery to ensure the proposed ideas or actions do not violate the audience's
  internal emotional or belief ecosystem. It treats a paradigm shift not as an intellectual argument,
  but as an invasive procedure that the audience's psychological immune system will reject if it
  threatens their identity or core values.
core_move: >
  Filter every instruction or pitch through a checklist of the audience's internal ecology (asking:
  Does this threaten their identity? Is the effort perceived as worth it? Does this invalidate their
  values?) and rewrite any point that triggers an ecological rejection.
why_it_works: >
  Humans do not evaluate information in a vacuum; they evaluate it against their existing internal
  ecology. As Fladlien outlines, an ecological check forces the creator to ask: "What are the
  downsides of acting? How does this relate to the beliefs and values they likely hold true? What
  is the price they'll pay in effort... and is it worth it?" If a coach's advice makes perfect
  logical sense but requires the client to adopt a behavior that feels 'slimy' or 'inauthentic' to
  them, their internal ecology rejects the logic. By passing the content through the ecological
  filter first, the coach aligns the new behavior with the client's existing identity, removing the friction.

examples:
  - context: "BOOK: Editing the 'spew' phase content"
    application: >
      During the 'whittle' phase of webinar creation, Fladlien reviews the drafted content explicitly
      asking the NLP ecological check questions: 'How does this make them feel about the future? Why
      is this better than doing nothing at all?' If a slide makes the audience feel intimidated by the
      future effort required, he removes or reframes it.
    effect: >
      The final presentation feels profoundly resonant because every potential internal objection
      (subconscious or conscious) was preemptively addressed and neutralized during the editing phase.

  - context: "CCP: DataPOV Semantic Gate in V2WS generation"
    application: >
      Before `Emilio` finalizes a webinar script on 'firing toxic clients,' the agent cross-references
      the Neo4j Change Talk Vault and finds that the target audience identifies as 'nurturing caregivers.'
      The agent flags the script as an ecological violation (it threatens their caregiver identity).
    effect: >
      The agent rewrites the script to frame firing the toxic client as an act of 'protecting the
      nurturing environment for the healthy clients.' The action remains the same, but it now aligns
      perfectly with the audience's internal ecology.

  - context: "CCP: Telegram Coaching Conversation (CBCS) behavioral intervention"
    application: >
      A client refuses to post on social media. The coach runs an ecological check and realizes the
      client's ecology equates 'self-promotion' with 'arrogance.' Instead of lecturing them on marketing,
      the coach asks them to post 'one helpful lesson you wish someone had taught you.'
    effect: >
      The client posts immediately. The coach bypassed the ecological defense mechanism by reframing
      the marketing action as an act of service, which fits the client's internal values perfectly.

  - context: "CCP: CCF Archetype drafting a sales page"
    application: >
      A coach writes a high-ticket sales page. They run an ecological check asking: 'What are the
      downsides of acting on this?' They realize the downside is the fear of looking stupid if it fails.
      They rewrite the guarantee section to explicitly remove the social/emotional risk of failure, not just the financial risk.
    effect: >
      Conversion rates spike because the coach solved the silent, ecological objection that a standard
      money-back guarantee doesn't touch.

  - context: "CCP: CMF Media Factory - Carousel headline testing"
    application: >
      A draft headline reads: 'Why Your Morning Routine is Pathetic.' The media agent flags this as
      an ecological violation—it attacks the viewer's ego before earning the right to do so, virtually
      guaranteeing they will swipe away. It is rewritten to: 'The Hidden Trap in Standard Morning Routines.'
    effect: >
      The new headline introduces curiosity and tension without triggering the audience's ego-defense mechanism.

anti_examples:
  - description: >
      A coach tells an audience of introverted software engineers that to succeed, they need to 'crush
      it on TikTok, be loud, and document every minute of their day.'
    why_it_fails: >
      This is a catastrophic ecological violation. The proposed behavior violently contradicts the
      audience's identity, values, and energy budget. Regardless of whether TikTok works for marketing,
      the audience's internal ecology will immediately reject the coach as 'not understanding us.'

