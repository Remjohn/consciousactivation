trigger_conditions:
  - "The coach is asking the audience to make a significant behavioral change or financial investment"
  - "The audience is known to have a strong, rigid identity or belief system (e.g., healthcare workers, artists)"
  - "Previous attempts to teach this concept have resulted in high resistance or low implementation"

suppression_conditions:
  - "The coach is explicitly executing a 'Contrastive Extreme Polarization' (PRM-HUM-004) move designed to intentionally violate ecologies and filter out the wrong audience"
  - "The content is pure factual reporting with no behavioral request"

misuse_modes:
  - "Pandering — Diluting the truth so much to avoid offending the audience's ecology that the coaching payload is lost"
  - "Projection — The coach doing an ecological check based on their own feelings rather than the audience's actual beliefs"
  - "Ignorance — Failing to do the research required to know what the audience's internal ecology actually is"

