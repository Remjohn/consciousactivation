summary: >
  Commercial Reframe Architecture replaces traditional product-pitching with a 
  structured sequence of insight that shifts the prospect's worldview. It introduces 
  an unconsidered problem or missed opportunity, dismantles the prospect's current 
  approach, builds emotional and rational weight around the new perspective, and 
  naturally positions CCP's methodology as the only logical solution.

core_move: >
  Change the prospect's understanding of their problem through commercial teaching 
  before introducing any specific product solution.

why_it_works: >
  Dixon's 'Challenger' model demonstrates that buyers are rarely persuaded by a better 
  explanation of a product's features. They are persuaded when a seller provides a 
  superior explanation of the buyer's own business. A successful reframe creates cognitive 
  dissonance regarding the prospect's current strategy (e.g., realizing that generic 
  content is actively eroding their authority). By leading *to* the solution rather 
  than leading *with* it, the reframe builds immense trust—the prospect views the 
  system not as a vendor, but as a strategic authority.

examples:
  - context: "BOOK: The Challenger Sale - Commercial Teaching"
    application: >
      Dixon proves buyers are persuaded by a superior explanation of their own business, not product features. The Reframe introduces an unconsidered problem, dismantling their current approach to naturally position the new solution.
    effect: >
      Creates cognitive dissonance that builds immense trust, causing the prospect to view the system as a strategic authority, not a vendor.

  - context: "CCP: CCF - Discovery-Mode Hook"
    application: >
      The system identifies a hidden cost: 'Every time you use an AI script generator, you train your audience to ignore you.' The solution is then framed around authentic voice extraction.
    effect: >
      The coach stops searching for 'faster editing' and starts prioritizing 'voice authenticity,' heavily favoring CCP's unique mechanism.

  - context: "CCP: CBCS - Benchmark Feedback Session"
    application: >
      Instead of listing areas for improvement, the partner reframes the data: 'Your high clarity score but low tension score means you are educating them into procrastination.'
    effect: >
      The guest feels the emotional weight of lost conversions, creating high-urgency desire to enter the 7-day challenge.

  - context: "CCP: CMF - Evergreen Ad Creative"
    application: >
      A short-form video starts by challenging a sacred cow: 'Hook templates are killing your retention because your audience recognizes the formula before you finish the sentence.'
    effect: >
      Instantly disqualifies the prospect's current tactic and opens their mind to the CCP alternative.

  - context: "CCP: V2WS - The 'Shift' Slide"
    application: >
      At the 15-minute mark of the webinar, the presenter explicitly contrasts the 'Old Way' (information dumping) with the 'New Way' (tension engineering).
    effect: >
      Forces a binary choice where sticking to the old way is no longer a logically defensible option.

