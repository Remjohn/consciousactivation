trigger_conditions:
  - "The CCP system is generating a 'Series' or a multi-part campaign that requires continuity"
  - "A coach wants to establish a premium, 'authored' feel to differentiate from amateur content"
  - "The narrative contains a recurring 'truth' or framework that needs to be anchored in the listener's memory"

suppression_conditions:
  - "The content is a rapid-fire, low-fidelity, spontaneous 'update' where highly structured sound design would feel inauthentic and over-produced"

misuse_modes:
  - "The Corporate Jingle — Creating a cheesy, 10-second 'intro song' that plays loudly at the start of every video, annoying regular viewers and causing them to skip"
  - "Motif Over-Saturation — Playing the motif constantly throughout a video rather than saving it for the moments of highest narrative impact"
  - "Generic Motifs — Using a stock 'whoosh' or a generic royalty-free drum loop as the 'signature,' which fails to act as memory glue because the audience hears it in a thousand other videos"

synergizes_with:
