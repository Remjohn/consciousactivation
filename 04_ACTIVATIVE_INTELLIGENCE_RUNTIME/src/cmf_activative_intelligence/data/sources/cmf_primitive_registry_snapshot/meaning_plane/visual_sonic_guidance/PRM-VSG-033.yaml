  - "PRM-PSY-001" # The Context Payload (Motifs act as the emotional context for the information)

conflicts_with:
  - "PRM-HUM-015" # The Novelty Penalty (If the motif is so repetitive and unchanging that it becomes annoying)

crosswalk_id: "XW-RECURRING-SIGNATURE"
crosswalk_note: "Meaning focuses on recurring audio motifs; Experience focuses on recurring micro-animations or consistent hover states in the UI."

notes: >
  To implement this in CMF, the Sonic Sommelier must maintain a `sonic_identity_profile` for each
  coach/archetype, containing metadata like `core_bpm_range`, `signature_instrumentation`, and
  `textural_bias`, which is injected into all generation prompts to ensure continuity.
