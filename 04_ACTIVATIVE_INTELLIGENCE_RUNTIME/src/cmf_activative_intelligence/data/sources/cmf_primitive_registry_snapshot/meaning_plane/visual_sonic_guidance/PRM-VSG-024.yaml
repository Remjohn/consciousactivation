trigger_conditions:
  - "The visual asset feels 'staged' or like the subject is just 'pasted' onto a background"
  - "The narrative involves themes of power dynamics, isolation, overwhelming odds, or liberation"
  - "The CVE system needs to differentiate between a 'Problem' state and a 'Solution' state visually"

suppression_conditions:
  - "The asset is a pure headshot where environmental context is completely unnecessary or distracting"
  - "The format is highly restrictive (e.g., a tiny mobile avatar) where spatial nuance will be lost entirely"

misuse_modes:
  - "The Empty Void — Placing the subject in so much negative space that the image feels unfinished or accidental, rather than intentionally 'vast'"
  - "Claustrophobia by Accident — Filming with a tight crop purely out of convenience, unintentionally making the audience feel anxious or trapped"
  - "Ignoring the Z-Axis — Only thinking about space horizontally (left/right) and ignoring depth (front/back), resulting in flat, theatrical imagery rather than cinematic immersion"

synergizes_with:
  - "PRM-VSG-023" # Lens Choice as Emotional Syntax (Lenses are the primary tool for manipulating space)
  - "PRM-PSY-011" # The Status Seesaw (Space dictates who holds the status in the frame)

conflicts_with:
  - "PRM-VSG-015" # Composition as Attention Routing (If the spatial metaphor is so complex that the eye doesn't know what to look at)

crosswalk_id: "XW-SPATIAL-DYNAMICS"
crosswalk_note: "Meaning focuses on the physical environment of the image; Experience focuses on the 'breathing room' or density of the UI layout."

notes: >
  CVE prompts must stop using phrases like 'in a nice office' and start using spatial directives
  like 'dwarfed by a massive, intimidating corporate architecture' or 'grounded in a warm, intimate,
  enveloping space.'
