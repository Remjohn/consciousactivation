summary: >
  Frame as Active Meaning Device recognizes that the borders of an image are not just limits, but active participants in the composition. The way a subject interacts with the edge of the frame generates psychological tension or balance. In CCP, this primitive is used to manipulate framing in video crops, thumbnails, and layout margins to subconsciously signal whether a message is stable and authoritative, or urgent and uncomfortable.

core_move: >
  Manipulate the subject's proximity to the edges of the frame to induce specific psychological responses (tension or stability).

why_it_works: >
  Freeman emphasizes that the frame itself is a dynamic force. When a subject is placed comfortably within the frame with adequate 'breathing room,' the composition feels stable and resolved (Gestalt harmony). However, when a subject is pushed aggressively against the edge of the frame, or cropped uncomfortably tight, it creates visual tension and a feeling of confinement or urgency. By actively using the frame, the creator manipulates the viewer's psychological state before a single word is read or spoken.

examples:
  - context: "BOOK: The Photographer's Eye - Frame as Active Meaning Device"
    application: >
      Freeman states the frame's edges are active participants in composition. A subject placed comfortably within the frame feels stable (Gestalt harmony); pushed against the edge or cropped tight, it creates tension and urgency.
    effect: >
      Manipulates the viewer's psychological state (stability vs. discomfort) before a single word is processed.

  - context: "CCP: CBCS - High Alert Intervention Thumbnail"
    application: >
      The image is cropped aggressively tight on the coach's face, cutting off the top of their head and placing their eyes extremely close to the top edge of the frame.
    effect: >
      The tight framing creates claustrophobia and visual tension. The viewer subconsciously registers urgency, perfectly primed for the 'High Alert' message.

  - context: "CCP: CMF - Evergreen Training Module Video"
    application: >
      The coach is framed in a stable medium-wide shot, perfectly centered, with generous negative space (margins) on the left, right, and top of the frame.
    effect: >
      The framing leverages boundaries to create absolute stability and authority. The viewer feels relaxed and prepared to absorb foundational information.

  - context: "CCP: Conscious Reactions - Mobile UI Layout"
    application: >
      When delivering a daily task, the text box is given massive padding (negative space) on all sides, isolating it completely from the edge of the screen.
    effect: >
      The framing removes all visual pressure, making the task feel manageable and singular.

  - context: "CCP: V2WS - Webinar Testimonial"
    application: >
      The testimonial video is presented in a slightly off-center, handheld frame to contrast with the perfectly centered, locked-off frame of the main speaker.
    effect: >
      The framing explicitly signals 'raw, unsolicited authenticity' versus 'produced authority'.

