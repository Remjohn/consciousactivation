summary: >
  Induce a genuine emotional state privately before the first word is spoken
  or written. The words must ride on the current of an already-existing
  emotion, rather than trying to generate the emotion as you go.

core_move: >
  Induce genuine emotional pre-state before initiating communication.

why_it_works: >
  Meisner states, "The river is the emotion. The words are the canoe that
  floats on it." If an actor (or coach) starts cold, the performance feels
  mechanical. By engaging in private preparation—using imagination or memory to
  stimulate a genuine emotional response *before* starting—the performer ensures
  that the first line is delivered with total authenticity. The audience feels
  the residue of the preparation immediately.

examples:
  - context: "BOOK: Sanford Meisner on Acting - Preparation"
    application: >
      Meisner teaches "The Harem of the Head"—inducing a genuine emotional state privately before the first word is spoken. The words must ride on the current of an already-existing emotion, rather than the actor trying to generate the emotion as they speak.
    effect: >
      The first line is delivered with total authenticity. The audience feels the residue of the preparation immediately, hooking them on an emotional level.

  - context: "CCP: CMF - Voice DNA Module"
    application: >
      Before a coach records a voice note on overcoming fear, the CMF agent enforces a 3-minute silence protocol. The coach vividly imagines a time they let fear ruin an opportunity, waiting for the physical sensation of regret before hitting record.
    effect: >
      The recording carries undeniable emotional turbulence. The listener is hooked from the first syllable because the coach is already deep in the emotion.

  - context: "CCP: CCF - Content Engine Hook Writing"
    application: >
      A writer is tasked with drafting a polarizing hook. The CCF system prompts them to spend 5 minutes listening to aggressive, high-BPM music while visualizing an industry enemy. They draft the hook from within that charged state.
    effect: >
      The hook slices through the noise because it carries the visceral energy of a real fight, avoiding the sterility of clever copywriting.

  - context: "CCP: V2WS - Webinar Walk-On"
    application: >
      Instead of chatting with staff right up until the "Go Live" button is pressed, the V2WS countdown screen forces the coach into a 60-second visual meditation focusing entirely on the audience's pain point.
    effect: >
      The coach's first visual impression is one of intense focus and empathy, rather than the "fake smile" transition from casual chatting.

  - context: "CCP: Conscious Reactions - Telegram"
    application: >
      When responding to a client's massive success, the coach doesn't just say "great job." They physically smile, stand up, and jump once to induce physical excitement before holding down the record button.
    effect: >
      The client feels the genuine physiological celebration through the audio, dramatically reinforcing the positive behavior.

