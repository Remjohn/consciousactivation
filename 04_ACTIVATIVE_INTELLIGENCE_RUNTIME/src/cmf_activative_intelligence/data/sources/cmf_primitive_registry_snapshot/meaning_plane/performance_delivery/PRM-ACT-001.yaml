summary: >
  Define the singular overarching desire driving the performance. Before
  writing or speaking, identify the one transformation you seek to achieve
  in the audience. Every story, gesture, and piece of data must serve this
  objective; anything that doesn't is cut.

core_move: >
  Define the singular overarching desire driving performance.

why_it_works: >
  As Port points out, an actor's "Superobjective" provides a gravitational
  centre for the entire performance. Borrowed directly from Stanislavski's
  methodology, this concept prevents the performer from losing sight of their
  true purpose in exchange for chasing audience approval. By having a clear
  objective, all decisions—content editing, pausing, and movement—are naturally
  aligned toward achieving a defined transformation rather than simply sharing
  information or showing off.

examples:
  - context: "BOOK: Steal the Show - Superobjective"
    application: >
      Port adapts Stanislavski's method: every performance must have one overarching desire. Before writing or speaking, identify the single transformation you seek in the audience. Cut any story, gesture, or data point that does not serve this objective.
    effect: >
      This prevents the performer from chasing generic audience approval, naturally aligning all editing, pausing, and movement toward a defined transformation.

  - context: "CCP: CCF - Voice DNA Onboarding"
    application: >
      Instead of asking a coach for their "topics," the CCF agent requires a Superobjective: "What is the single transformation you want your audience to undergo this quarter?"
    effect: >
      The coach shifts from giving generic advice ("I'll talk about stress") to driving transformations ("I want them to see stress as a tool"), instantly elevating content authority.

  - context: "CCP: CMF - Beat Cluster Engine"
    application: >
      During prompt generation, the CMF agent asks the coach to declare their Superobjective. If a proposed joke or anecdote doesn't serve it, the agent cuts it, regardless of how clever it is.
    effect: >
      The beat cluster maintains laser focus and high emotional stakes, avoiding the trap of meandering into multiple unanchored ideas.

  - context: "CCP: V2WS - Webinar Architecture"
    application: >
      A webinar is audited against its declared Superobjective. A 10-minute segment on the coach's dog is flagged and removed because it attempts to build "relatability" rather than serve the core transformation.
    effect: >
      The audience's cognitive load is respected, and they leave the webinar with a singular, profound shift in worldview.

  - context: "CCP: Conscious Reactions - Telegram"
    application: >
      Before responding to a client's crisis in Telegram, the Guardian agent forces the coach to select the Superobjective (e.g., "Shatter their victim mindset"). The coach then records the audio.
    effect: >
      The resulting voice note is disciplined and sharp, cutting through the client's emotional noise rather than just offering sympathetic small talk.

