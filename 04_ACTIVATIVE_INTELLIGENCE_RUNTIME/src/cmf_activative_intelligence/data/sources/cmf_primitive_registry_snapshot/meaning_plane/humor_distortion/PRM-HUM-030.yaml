summary: >
  The Setup-Premise-Payoff Architecture is Carter's expansion of the
  traditional setup-punchline structure into a four-part deterministic
  formula: Topic → Attitude → Premise → Payoff. Where Rosenfield's
  PRM-HUM-016 governs temporal compression and Roll sequencing, Carter's
  architecture introduces the critical middle layer — the PREMISE — which
  is the non-obvious logical reason for the attitude. The Premise is the
  engineering breakthrough: "Because..." connects the emotional stance
  to a specific, surprising rationale that the Payoff then exploits. In
  CCP, this maps directly to the JIT Compiler's Pydantic schema for content
  generation — every hook, script, or educational segment must be
  constrained to output strict Topic→Attitude→Premise→Payoff JSON objects.

core_move: >
  Define the Topic, inject a polarizing Attitude (Hard, Weird, Scary, or
  Stupid), establish a non-obvious Premise that logically justifies the
  attitude, then deliver a Payoff that exploits the Premise's hidden logic.

why_it_works: >
  Carter demonstrates that the Premise is what separates professional
  comedy from amateur observation. Without a Premise, a joke is just
  'Topic + Attitude' — "Dating is weird." With a Premise, it becomes
  deterministic: "Dating is weird BECAUSE we treat first dates like job
  interviews for a position nobody actually wants to fill." The Payoff
  then acts on the Premise's logic: "And somehow we're all surprised
  when nobody gets hired." The mechanism is expectation scaffolding:
  the Premise builds a specific logical framework that the Payoff then
  subverts or extends. The audit scores this at 50/50 for Agentic
  Transferability because the four-part structure is "a highly programmable
  logic gate for content generation."

examples:
  - context: "BOOK: The NEW Comedy Bible - Topic-Attitude-Premise-Payoff"
    application: >
      Carter expands the traditional setup-punchline into a four-part deterministic formula: Topic, Attitude, Premise, Payoff. The Premise is the critical "Because..." that provides the logical reason for the Attitude.
    effect: >
      Converts vague observations into engineered logical structures. The Payoff then subverts or extends the specific logical scaffolding established by the Premise.

  - context: "CCP: JIT Compiler - The Generative Logic Gate"
    application: >
      The LLM is constrained to output content strictly as a JSON object containing the 4 keys: Topic, Attitude, Premise, Payoff. It cannot proceed to Payoff without establishing the Premise.
    effect: >
      Eliminates generic "motivational speak" from AI generation, forcing every educational hook to carry a specific, surprising rationale.

  - context: "CCP: V2WS - The 'Because' Bridge"
    application: >
      When explaining why the audience's current strategy is failing (Topic) and why it's frustrating (Attitude), the script forces the coach to deliver a non-obvious Premise ('Because...') before the resolution.
    effect: >
      The audience experiences therapeutic insight because the coach articulated the hidden structural reason for their pain.

  - context: "CCP: CMF - The Hook Restructuring Agent"
    application: >
      When a coach writes a flat first draft ('Marketing is annoying'), the CMF agent prompts: 'WHY is it annoying? Complete this sentence: Marketing is annoying BECAUSE...'
    effect: >
      Transforms the coach's raw emotion into a programmable structural asset that can support a comedic payoff.

  - context: "CCP: CBCS - The Cognitive Distortion Mapping"
    application: >
      The agent maps a client's limiting belief into the architecture, isolating the flawed Premise ('Because I failed once, I will always fail') to target it for reframing.
    effect: >
      Therapeutic intervention targets the structural foundation of the belief rather than arguing with the surface emotion.

anti_examples:
  - description: >
      A CMF hook reads: 'Client acquisition is really difficult and
      honestly kind of exhausting sometimes.' Topic + weak Attitude,
      no Premise, no Payoff.
    why_it_fails: >
      This is the "generic motivational speak" Carter's entire system
      is designed to replace. Without a Premise ('Because...'), there
      is no logical scaffolding for a Payoff. The audience nods in
      vague agreement but experiences no surprise, no insight, and
      no humor. The content is indistinguishable from any other coaching
      post.

  - description: >
      The system generates: Topic: networking. Attitude: weird. Payoff:
      'That's why I just send LinkedIn messages at 3am.' The Payoff
      jumps directly from the Topic without establishing a Premise.
    why_it_fails: >
      Without the Premise bridge, the Payoff is non-sequitur rather
      than surprising. The audience cannot trace the logic from Topic
      through to Payoff because the middle step — the REASON the
      Attitude exists — was skipped. Carter's formula is sequential
      and cannot skip stages.

