trigger_conditions:
  - "JIT Compiler initiates any content generation sequence requiring engagement or humor; the 4-part Topic-Attitude-Premise-Payoff schema must be enforced"
  - "AST analysis detects a 'Topic + Attitude' construct lacking a logical bridge; system must prompt coach/agent to define the Premise"
  - "V2WS script drafting enters an educational segment; formula must be applied to ensure insight is delivered via structural logic"

suppression_conditions:
  - "Content is pure narrative storytelling (e.g., origin story) where rigid 4-part joke architecture would disrupt the emotional arc"
  - "Interaction context requires gentle, non-comedic emotional support where imposing a polarized Attitude would register as abrasive"

misuse_modes:
  - "Premise-free Payoffs — skipping the logical bridge and jumping directly from Topic+Attitude to a random punchline"
  - "Weak Attitudes — using tepid emotional stances ('kind of annoying') instead of Carter's strong categories (Hard, Weird, Scary, Stupid)"
  - "Over-structured monotony — every content piece following the identical four-beat rhythm without variation, creating predictability"

synergizes_with:
  - "PRM-HUM-031"  # The Mix — the Mix IS the Payoff mechanism; it requires the Setup-Premise to establish context
  - "PRM-HUM-016"  # Setup-Punchline Architecture — Rosenfield provides the temporal compression; Carter provides the logical scaffold
  - "PRM-HUM-002"  # Irreducible Truth — the Premise IS where the Subtext lives; it is the logical expression of the hidden truth

conflicts_with:
  - "PRM-HUM-020"  # Thought Moment Illusion — the rigid four-part structure can feel over-engineered if not softened by manufactured spontaneity

