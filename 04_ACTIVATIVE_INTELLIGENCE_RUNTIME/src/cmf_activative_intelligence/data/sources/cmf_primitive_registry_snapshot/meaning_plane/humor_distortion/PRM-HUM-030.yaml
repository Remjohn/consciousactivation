notes: >
  Second-highest MCDA in Batch 5 (185) and the highest Agentic
  Transferability (AT: 50/50) — this primitive is the most directly
  programmable joke-writing schema in the entire HUM registry. Float note:
  goal_bias.clarity is high (0.8) because the Premise explicitly articulates
  a logical reason, making the humor intellectually accessible. The key
  engineering distinction from PRM-HUM-016: Rosenfield governs WHEN the
  punchline lands (temporal geometry); Carter governs WHY it works
  (logical scaffold).
