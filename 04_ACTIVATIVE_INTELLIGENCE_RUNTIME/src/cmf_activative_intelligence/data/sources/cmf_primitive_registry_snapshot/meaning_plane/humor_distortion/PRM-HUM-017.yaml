trigger_conditions:
  - "System is compiling an output block; must enforce the injection of an explicit `attitude_state` metadata tag"
  - "Critic agent detects cosine similarity < 0.85 between the declared attitude tag and the generated text's semantic tone"
  - "AST or audio analysis flags a coach's input as emotionally neutral or lacking intense attitude binding"

suppression_conditions:
  - "Content is deliberately calm and meditative (e.g., guided reflection) where emotional intensity would be counterproductive"
  - "Coach's Voice DNA specifies a 'Quiet Authority' archetype where emotional maximalism would break character"

misuse_modes:
  - "Emotional whiplash — changing the attitude tag on every sentence within a single content block, producing a manic tonal landscape that exhausts the audience"
  - "Intensity ceiling — tagging every block with maximum intensity ('FURIOUS', 'DEVASTATED'), creating emotional fatigue and loss of contrast"
  - "Label-without-execution — tagging a block as 'brutally_frank' but generating text that reads as politely informational, creating a metadata-content mismatch the Critic must catch"

synergizes_with:
  - "PRM-HUM-014"  # Joyous Communication — provides the overarching emotional container; Attitude Binding provides the specific micro-emotions within it
  - "PRM-HUM-016"  # Setup-Punchline Architecture — the setup MUST declare an attitude for the punchline to release against
  - "PRM-HUM-010"  # High-Contrast Conflict — emotional contrast between characters or perspectives is a function of their differing attitude states

conflicts_with:
  - "PRM-HUM-020"  # Thought Moment Illusion — manufactured spontaneity may require brief moments of emotional ambiguity (the 'what was I saying?' pause) that technically violate full-time attitude binding

