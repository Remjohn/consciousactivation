summary: >
  Attitude-Emotion Binding mandates that every word a performer speaks —
  and every word the CCP generates — must be grounded in a clear, nameable,
  maximally intense emotion. Rosenfield insists that "hating something is
  funnier than being a little annoyed with it; adoring something is funnier
  than liking it." Low-emotion, flat delivery collapses audience attention
  regardless of how clever the writing is. Crucially, the performer delivers
  the FORM of the emotion, not the real emotion — the audience must always
  sense that the speaker is in control, preserving the psychological safety
  required for laughter and trust. In CCP, this primitive requires every
  compiled output block to carry an explicitly tagged `attitude_state`
  metadata field (e.g., `fed_up`, `delighted`, `brutally_frank`, `astonished`),
  which the Critic Sub-agent validates at ≥ 0.85 cosine similarity against
  the text's semantic tone.

core_move: >
  Assign an explicit, high-intensity emotional label to every content block,
  then validate that the generated text's semantic tone matches the declared
  emotion — rejecting any output that reads as emotionally ambiguous or neutral.

why_it_works: >
  Rosenfield demonstrates that audiences track a performer's emotional state
  moment-to-moment. When the emotion is undefined or tepid, the audience's
  mirror neurons have nothing to lock onto — attention drifts. When the
  emotion is named, intense, and consistent, the audience calibrates their
  own emotional response to the performer's, creating the neurological
  coupling that makes communication feel alive. The distinction between
  performed and real emotion is existentially important: real, uncontrolled
  emotion makes the audience feel unsafe ("is this person having a breakdown?"),
  while performed emotion radiates mastery and invites the audience to
  enjoy the ride.

examples:
  - context: "BOOK: Mastering Stand-Up - Emotional Fullness"
    application: >
      Rosenfield mandates every word must be grounded in a clear, nameable, intense emotion (the form of the emotion, not uncontrolled reality). Hating is funnier than being annoyed.
    effect: >
      Provides the audience's mirror neurons something to lock onto, creating neurological coupling.

  - context: "CCP: CMF - The Metadata Enforcement Layer"
    application: >
      Every compiled output block carries an explicitly tagged `attitude_state` (e.g., `fed_up`, `delighted`). The Critic Sub-agent validates the semantic tone against this tag.
    effect: >
      Prevents the generation of emotionally ambiguous or neutral AI text. Content consistently radiates a specific emotional posture.

  - context: "CCP: CVE Visual Engine - Escalating Arcs"
    application: >
      A 7-slide carousel is tagged with escalating attitude states (Slide 1: `annoyed` -> Slide 6: `astonished`). The PSSL renders typography and visual temperature to match.
    effect: >
      The audience feels the speaker's emotional intensity building, creating momentum that pulls them through to the CTA.

  - context: "CCP: CBCS - LIWC-22 Re-recording"
    application: >
      The agent analyzes a voice note and detects neutral-informational tone. It instructs the coach to pick ONE intense emotion and re-record it as if consumed by that emotion.
    effect: >
      Engagement metrics spike because listeners hear a person who actually feels something about what they are saying.

  - context: "CCP: V2WS - The 'Performed Mastery' Switch"
    application: >
      The script explicitly notes where the coach should deliver the *form* of anger rather than genuine rage, ensuring the audience feels safe while enjoying the intensity.
    effect: >
      The coach radiates mastery, inviting the audience to enjoy the ride rather than worrying about the coach's stability.

anti_examples:
  - description: >
      A CMF hook reads: 'It's interesting how many people struggle with
      consistency in their business, and I think we should talk about it.'
    why_it_fails: >
      The attitude is undefined. 'Interesting' is not an emotion — it is
      an intellectual observation with zero emotional charge. The audience
      cannot feel what the speaker feels because the speaker appears to
      feel nothing. Rosenfield would diagnose this as 'flat delivery' —
      the death sentence for any performance, regardless of content quality.

  - description: >
      A coach delivers genuine, uncontrolled anger in a video about a
      personal betrayal, screaming and clearly struggling to maintain
      composure.
    why_it_fails: >
      This violates the 'performed vs. real' distinction. The audience
      does not feel safe — they sense the speaker has lost control. The
      content may be powerful, but the delivery converts trust into
      discomfort. Rosenfield mandates that the performer delivers the
      FORM of anger (controlled, modulated, deliberately intensified)
      while remaining visibly in command of the performance.

