notes: >
  This primitive is the metadata enforcement layer for the Voice DNA's
  emotional architecture axis (Path). Its MCDA (176) is tied with
  Setup-Punchline Architecture, reflecting their co-dependency — structure
  without emotion is sterile; emotion without structure is chaos. Float note:
  surface_fit.voice is ceiling (0.9) because vocal delivery is the most
  emotionally transparent medium. phase_fit.generation and revision are
  both high (0.9) because the attitude must be assigned during generation
  AND validated during revision — it is a two-pass enforcement.
