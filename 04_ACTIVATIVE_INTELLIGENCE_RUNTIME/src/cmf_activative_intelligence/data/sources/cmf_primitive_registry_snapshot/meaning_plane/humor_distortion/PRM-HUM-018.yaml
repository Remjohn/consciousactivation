  - "PRM-HUM-015"  # Persona Sculpting Protocol — the audience's response data sculpts both the content strategy AND the coach's persona
  - "PRM-HUM-001"  # Dual-Processor Engine — the audience functions as the external Editor, replacing the writer's internal judgment

conflicts_with:
