  audit (50/50) because it is pure data-driven editing with no creative
  risk. Its MCDA (172) is balanced by lower Algorithmic Determinism —
  building the backward-trace pipeline requires engagement analytics
  infrastructure that must be specified per CCP deployment. Float note:
  phase_fit.revision is ceiling (0.9) because this IS revision — it is
  the process of letting empirical data revise assumptions.
  ccp_workflow_fit.research_signal_discovery is high (0.8) because
  backward-tracing engagement data IS signal discovery.
