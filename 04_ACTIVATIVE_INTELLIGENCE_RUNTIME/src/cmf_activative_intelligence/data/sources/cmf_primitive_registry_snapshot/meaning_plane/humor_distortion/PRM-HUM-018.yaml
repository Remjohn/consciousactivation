trigger_conditions:
  - "Telemetry indicates engagement variance >2x across a deployed content batch; Backward-Trace agent must isolate the structural cause"
  - "System detects a V2WS webinar has completed its first live delivery; audience response data must be processed for script sculpting"
  - "Agent is planning the next content production sprint; historical engagement data must dictate the generation constraints"

suppression_conditions:
  - "Coach has insufficient deployed content (fewer than 5 pieces); sample size is too small for reliable backward-tracing"
  - "Content pipeline is currently in the uninhibited Clown-phase generation; backward-tracing is strictly an Editor-phase operation"

misuse_modes:
  - "Over-fitting — optimizing so aggressively for one audience's response pattern that the content becomes hyper-niche and stops attracting new followers"
  - "Recency bias — weighting the most recent engagement spike disproportionately, ignoring the more stable long-term patterns"
  - "Variable conflation — attributing a spike to the wrong variable (e.g., crediting the topic when the spike was caused by the delivery format)"

synergizes_with:
