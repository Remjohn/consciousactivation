trigger_conditions:
  - "CBCS telemetry detects semantic markers of 'Catastrophizing' or 'Limiting Belief'; system must deploy escalation framework to neutralize cortisol"
  - "CPSC engine identifies a high-friction sales objection; Hyperbolic Scaling must be applied before logical rebuttal"
  - "Content generation targets a saturated pain point; exaggeration must exceed the 'physically possible' threshold to register"

suppression_conditions:
  - "Client input is classified as 'Genuine Trauma' or 'Real-World Crisis'; scaling must be hard-blocked to prevent psychological harm"
  - "Audience Social Penetration Depth is at Stage 1 (Orientation); premature hyperbolic escalation reads as dismissive or mocking"

misuse_modes:
  - "Trauma minimization — applying scaling to real events rather than cognitive distortions"
  - "Escalation ceiling failure — stopping the scaling too early, leaving the consequence still plausible rather than clearly impossible"
  - "Insensitivity to timing — deploying Hyperbolic Scaling when the client is in acute emotional distress rather than reflective processing mode"

synergizes_with:
