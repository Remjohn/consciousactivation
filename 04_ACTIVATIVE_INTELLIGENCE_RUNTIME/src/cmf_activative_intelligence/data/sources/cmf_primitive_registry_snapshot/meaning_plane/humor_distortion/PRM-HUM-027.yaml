  - "PRM-HUM-002"  # Irreducible Truth — the Subtext is 'your fear is disproportionate to reality'; the scaling reveals it
  - "PRM-PRS-012"  # Fear-to-Fascination Pivot — Hyperbolic Scaling is the specific humor mechanism for executing this persuasion primitive

conflicts_with:
  - "PRM-HUM-019"  # Struggle Principle — scaling a coach's OWN struggles to absurdity may undermine the authenticity of the vulnerability

