summary: >
  Hyperbolic Scaling is the targeted application of Dikkers' Hyperbole Filter
  specifically against the audience's limiting beliefs and catastrophic
  thinking patterns. Where PRM-HUM-004 (Contrastive Extreme Polarization)
  is the generic intensity multiplier, Hyperbolic Scaling is the therapeutic
  application — taking a client's or audience's fear and mathematically
  escalating it through absurd extremes until the original fear becomes
  visibly ridiculous. The audit maps this directly against the audience's
  'Enemies' and 'Hidden Beliefs' in the Neo4j Context Premise graph:
  by inflating 'If I fail this launch, I will be a fraud forever' until
  the consequence involves banishment to a remote asteroid, the system
  deflates the cortisol response attached to the belief.

core_move: >
  Take the audience's specific limiting belief or catastrophic fear and
  mathematically scale it through 3-5 escalation steps until the final
  consequence is so physically impossible that the original fear is
  revealed as absurd.

why_it_works: >
  Dikkers defines Hyperbole as exaggeration that "violates the laws of
  science or reason" (line 2164). The therapeutic mechanism is perspective-
  by-absurdity: when a fear is scaled to cosmic proportions, the brain
  cannot sustain the cortisol response because the consequence is no
  longer biologically real. Laughter at the absurdity IS the nervous
  system's release of the fear. The audit identifies this as a direct
  cognitive restructuring tool: "Laughter deflates the cortisol response
  attached to the belief, opening the door for cognitive restructuring."

examples:
  - context: "BOOK: The Elements of Humor - Mathematical Exaggeration"
    application: >
      Dikkers defines Hyperbole as exaggeration that mathematically violates the laws of science or reason. The scaling must push past 'unlikely' into 'impossible'.
    effect: >
      Laughter at the absurdity deflates the emotional charge attached to the original thought, making it accessible for restructuring.

  - context: "CCP: CBCS - The Catastrophic Deflator"
    application: >
      When a client catastrophizes ('If I raise prices, everyone will leave'), the agent mathematically escalates it ('And then they'll sue you, and then the UN will ban you from business').
    effect: >
      The client laughs, physically releasing the cortisol attached to the fear, opening the door for the genuine coaching reframe.

  - context: "CCP: CCF - The Absurd Consequence Carousel"
    application: >
      The carousel explores the logical extremes of a limiting belief, charting the timeline until the belief inevitably leads to geopolitical collapse or alien invasion.
    effect: >
      The audience recognizes their own fear but sees it stripped of its power through ridiculous scaling.

  - context: "CCP: V2WS - The 'Worst Case Scenario' Slide"
    application: >
      The webinar directly addresses the audience's primary objection by inflating the worst-case scenario until it becomes physically impossible.
    effect: >
      The tension surrounding the sales objection is neutralized through laughter before the logical rebuttal is even presented.

  - context: "CCP: CMF - The Exaggerated Pain Hook"
    application: >
      Instead of 'Writing copy is hard', the hook is 'Writing copy requires the sacrifice of 400 hours of sleep, three friendships, and my remaining sanity.'
    effect: >
      Arrests attention through sheer linguistic velocity, bypassing the audience's blindness to generic pain points.

anti_examples:
  - description: >
      The system uses Hyperbolic Scaling against a client describing
      genuine trauma: 'You're telling me your abusive relationship was
      bad? Imagine if they had also been a bear.'
    why_it_fails: >
      The audit flags this as the highest safety risk in Batch 4
      (SR: 25/50). Hyperbolic Scaling is a cognitive restructuring tool
      for LIMITING BELIEFS (cognitive distortions), not for ACTUAL TRAUMA
      (real events). Scaling genuine trauma reads as minimization and
      produces psychological harm. The Semantic Affinity Guard must
      differentiate between cognitive distortions (appropriate targets)
      and trauma memories (prohibited targets).

  - description: >
      A CMF hook uses mild Hyperbole: 'My coach is so expensive,
      I had to skip lunch once.' This is physically possible.
    why_it_fails: >
      Dikkers mandates that Hyperbole must violate the laws of science
      or reason (line 2164). 'Skipping lunch' is an inconvenience, not
      an impossibility. This is mere exaggeration, not Hyperbolic
      Scaling. It must be pushed further: 'My coach is so expensive,
      I had to sell a kidney AND a parking space in Manhattan.'

