notes: >
  Lowest MCDA in the Funny Characters batch (110) because the audit correctly
  identifies this as the "hardest to natively automate." The Intuiting Method
  requires genuine human observation — it cannot be fully automated by the
  agentic stack. However, the Data Analyst Agent CAN scrape real behavioral
  patterns from Telegram and social data, which is a partial automation of
  the observation step. Float note: phase_fit.pre_trigger is the ceiling (0.9)
  because Intuiting is fundamentally a research/input primitive, not a
  generation/output one. goal_bias.persuasion is the floor (0.1) because
  Intuiting produces raw material, not finished persuasive content.
