summary: >
  The Intuiting Method is the observational practice of sitting down to
  deliberately mine real human behavior — the eccentric traits, the strange
  verbal patterns, the characteristic reactions of actual people — and
  translating those observed live traits into comedic material. Dikkers
  positions it as the second of three character-creation methods, sitting
  between the unpredictable Lightning Method (spontaneous inspiration) and
  the structured Casting Method (story-driven character design). Intuiting
  is what prevents comedy characters from becoming cliché stereotypes: by
  starting from observed human strangeness rather than template archetypes,
  the resulting characters carry the texture of reality. In CCP, this
  primitive maps to the process of mining the coach's actual client
  interactions, Tribe Telegram conversations, and real-world behavioral
  observations for material that no AI could hallucinate.

core_move: >
  Observe real humans — their strange traits, verbal tics, behavioral
  patterns — and translate those live observations into comedic material
  that carries the texture of actual lived experience.

why_it_works: >
  Dikkers opens the entire book with the observation that real people are
  "vibrant, colorful, and hilarious — larger than life" but "a lot of the
  magic of characters in real life is lost in translation." The Intuiting
  Method addresses this translation gap by insisting on direct observation
  as the raw material — not imagination, not templates, not genre conventions.
  The mechanism is specificity of origin: material that started as real human
  behavior carries micro-textures (the specific word someone uses, the
  specific facial expression) that pure invention cannot match. The audience's
  pattern-recognition system detects authenticity even when it cannot
  articulate why — they sense the difference between observed and invented.

examples:
  - context: "BOOK: How to Write Funny Characters - Reality-to-Idea Pipeline"
    application: >
      Dikkers advises mining real human behavior—eccentric traits, verbal patterns, strange reactions—and translating those live observations into comedic material.
    effect: >
      Prevents characters from becoming cliché. The material carries micro-textures of reality that pure invention cannot match, triggering deep pattern recognition in the audience.

  - context: "CCP: CCF - The Data Analyst Agent"
    application: >
      The agent scrapes the coach's Tribe Telegram for specific phrases, excuses, and emoji combinations used by the actual audience. These become raw material for the CMF.
    effect: >
      The resulting content contains linguistic fingerprints from the audience. Recognition is immediate, bonding is accelerated.

  - context: "CCP: CBCS - Authenticated Capture Debrief"
    application: >
      During a voice note, the coach naturally mimics a client's specific pausing pattern. The agent flags this intuited characterization as high-value material to build content around.
    effect: >
      The coach's content shifts from generic advice to specific, character-driven storytelling grounded in real observation.

  - context: "CCP: V2WS - Objection Mirroring"
    application: >
      The webinar script doesn't use generic sales objections ('It's too expensive'). It uses verbatim, bizarrely specific objections intuited from the coach's sales call transcripts.
    effect: >
      The prospect feels uncomfortably seen. The hyper-specific reality of the objection disarms their defense mechanisms.

  - context: "CCP: CMF - The 'Overhead' Format"
    application: >
      The agent prompts the coach to share a completely unedited, bizarre quote they actually heard a client say this week, using it as the raw setup for a coaching insight.
    effect: >
      Positions the coach as an active observer of reality rather than an ivory-tower theorist.

anti_examples:
  - description: >
      The CMF agent invents a 'typical client' persona by combining
      demographic data (35-year-old female, corporate job, health anxiety)
      without any real behavioral observation from actual client interactions.
    why_it_fails: >
      Dikkers positions the Intuiting Method as the antidote to characters
      that "don't ring true" and "fall flat" (Ch 1, lines 153-154).
      Demographic composition produces plausible-sounding characters
      that lack behavioral specificity. The audience cannot distinguish
      this from any other coaching content because the character carries
      no observed texture — it's a statistical average, not a human.

