trigger_conditions:
  - "System initializes the Data Analyst Agent to scrape Tribe Telegram or social data for behavioral patterns"
  - "Agent detects a coach naturally mimicking or characterizing a client during an authenticated capture voice note"
  - "AST semantic analysis flags content characters as feeling generic or template-derived rather than observationally specific"

suppression_conditions:
  - "Content production timeline is too compressed for the research phase that Intuiting requires"
  - "Observed behavior involves identifiable individuals whose privacy or dignity would be compromised by comedic translation"

misuse_modes:
  - "Mockery leakage — translating observed traits with insufficient comedic distance, producing content that identifiable individuals experience as targeted ridicule"
  - "Observation-to-stereotype collapse — observing one person's trait and projecting it onto an entire group, reversing the specificity that makes Intuiting valuable"
  - "Rawness without refinement — presenting observed behavior directly without passing it through comedic filters (Archetype, Contrast, Reference), producing documentary rather than comedy"

synergizes_with:
  - "PRM-HUM-009"  # Reference Funny Filter — intuited observations become the highest-grade references (Grade A)
  - "PRM-HUM-037"  # Hyper-Specificity Anchoring — observed details provide the specific nouns and verbs that anchoring requires
  - "PRM-HUM-040"  # Radical Observational Truth — both start from reality, but Intuiting focuses on behavioral traits while Observational Truth focuses on situational truths

conflicts_with:
  - "PRM-HUM-011"  # Archetype Shorthand — archetypes are pre-built templates; Intuiting produces unique, non-template characters. Simultaneous use creates identity tension.

