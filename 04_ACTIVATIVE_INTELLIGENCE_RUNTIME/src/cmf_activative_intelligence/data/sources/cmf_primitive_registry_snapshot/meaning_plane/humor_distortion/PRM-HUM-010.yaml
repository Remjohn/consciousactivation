notes: >
  This primitive sits at the heart of CCP's differentiation strategy.
  The Casting Method from Dikkers maps directly to how the CCF positions
  coaches against their niche — you examine the niche landscape, then
  cast the coach as the maximum-contrast figure. Float note:
  goal_bias.clarity is deliberately low (0.2) because contrast creates
  productive ambiguity rather than immediate comprehension — the audience
  must resolve the clash themselves, which deepens engagement but
  temporarily reduces clarity.
