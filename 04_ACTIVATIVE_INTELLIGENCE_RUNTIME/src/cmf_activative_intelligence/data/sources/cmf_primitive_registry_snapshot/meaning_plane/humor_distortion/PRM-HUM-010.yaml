trigger_conditions:
  - "System detects the coach's current content output aligns too closely with generic niche aesthetic conventions"
  - "Agent is generating a top-of-funnel Discovery asset where pattern-break is the primary objective"
  - "AST analysis flags a draft as 'safe' or lacking structural tension against its environment"

suppression_conditions:
  - "Audience is in a fragile emotional state where tonal clash could read as mockery of their pain"
  - "Coach's authentic voice is not yet defined enough to sustain the contrast — undefined personality + extreme contrast = confusion"
  - "Content is a follow-up piece where the audience has already accepted the coach's frame — contrast would reset earned trust"

misuse_modes:
  - "Shock-without-substrate — using contrast purely for attention without a coaching truth underneath the clash"
  - "Alignment collapse — so much contrast that the audience cannot identify what the coach actually stands for"
  - "Contrast fatigue — repeating the same oppositional frame until it becomes the new expected pattern"

synergizes_with:
  - "PRM-HUM-009"  # Reference Funny Filter — recognition sweetens the contrast so it feels insider, not hostile
  - "PRM-HUM-002"  # Irreducible Truth — contrast works best when wrapping a real coaching truth
  - "PRM-HUM-022"  # Character Mask — persona borrowing enables contrast without risking the coach's core identity
  - "PRM-PRS-002"  # Tension-and-Release Narrative Engine — contrast creates the tension half

conflicts_with:
  - "PRM-HUM-005"  # Absolute Verisimilitude — extreme contrast can break the micro-coherence that verisimilitude requires
  - "PRM-HUM-020"  # Thought Moment Illusion — heavy contrast framing can feel constructed, undermining spontaneity

