summary: >
  High-Contrast Conflict is the primitive that generates instant comedic
  tension by placing a character, persona, or voice into a setting, opposition,
  or tonal frame where their core nature diametrically clashes. Dikkers calls
  this "The Casting Method" — you examine the environment, the other voices,
  the existing tone, and then deliberately cast a presence that contrasts with
  as many of those elements as possible. The friction between alignment and
  contrast is what sustains comedy beyond a single laugh. In CCP, this is the
  primary engine for manufacturing attention in hooks, shorts, and Telegram
  provocations where the coach must immediately feel distinct from generic
  industry noise.

core_move: >
  Cast the coach's voice or persona into stark opposition with the expected
  tone, audience assumptions, or industry norms to generate instant
  tension-based comedy.

why_it_works: >
  Dikkers demonstrates that "contrast creates Irony, and therefore laughs"
  — when a character sits in extreme opposition to their environment, the
  audience experiences sustained cognitive tension that demands resolution
  through laughter. The mechanism is structural, not verbal: a lazy astronaut,
  a pacifist soldier, a rat in a Parisian kitchen. The brain cannot reconcile
  the misfit without emotional discharge. Critically, Dikkers warns that
  contrast without alignment produces confusion ("the enemy of comedy"),
  so the primitive requires deliberate calibration — enough opposition to
  create Irony, enough alignment to keep the audience oriented.

examples:
  - context: "BOOK: How to Write Funny Characters - The Casting Method"
    application: >
      Dikkers demonstrates that contrast creates irony, and therefore laughs. The Casting Method involves examining the environment and casting a character whose nature diametrically clashes with it.
    effect: >
      The friction between alignment and contrast sustains comedy beyond a single laugh, demanding resolution through cognitive discharge.

  - context: "CCP: CMF - Saturated Niche Positioning"
    application: >
      The agent casts the coach's raw, profanity-laced processing voice against the glossy, platitude-heavy 'manifest your dream life' aesthetic dominating the niche.
    effect: >
      Scroll-stop rate increases because the contrast creates cognitive tension. The coach is positioned as an insider who names the real experience.

  - context: "CCP: V2WS - Format Clash"
    application: >
      The webinar places a deeply emotional, vulnerability-driven insight inside the visual format of a sterile corporate earnings call (formal language, boardroom aesthetics).
    effect: >
      Creates sustained comedic irony. The audience recognizes the visual code and the emotional truth, producing a dual-layer engagement.

  - context: "CCP: CBCS - The Absurdity Nudge"
    application: >
      When a coach submits a bland voice note, the agent responds by reimaging their point as if delivered by a wrestling announcer or a nature documentary narrator.
    effect: >
      The contrast highlights how far the coach is playing from their authentic edge, serving as both feedback and creative provocation.

  - context: "CCP: CCF - The Oppositional Identity Generator"
    application: >
      During onboarding, the system identifies the three most common visual tropes in the coach's industry and generates branding guidelines that explicitly prohibit them.
    effect: >
      Ensures the coach's visual baseline is always cast in high contrast to the environment they operate within.

anti_examples:
  - description: >
      A CMF agent generates a hook where a parenting coach delivers
      profanity-laced rants about children's behavior, contrasting the
      'gentle parenting' niche with shock-value aggression.
    why_it_fails: >
      Dikkers explicitly warns that contrast without alignment confuses
      audiences and destroys comedy. The coach's persona must align with
      the audience's deeper values (caring about children) even while
      clashing with surface-level niche conventions. Pure opposition
      with zero alignment reads as hostile, not funny. The audience
      cannot tell if this is satire or sincerity.

  - description: >
      Using the same contrast formula (corporate format + emotional truth)
      across 5 consecutive pieces of content for the same coach.
    why_it_fails: >
      Contrast is a function of expectations. Once the audience learns
      to expect the clash, the Irony disappears and the content feels
      formulaic. Dikkers notes that comedy requires the audience to NOT
      predict the specific contrast, only to recognize it after it lands.
      Repetition converts surprise into template.

