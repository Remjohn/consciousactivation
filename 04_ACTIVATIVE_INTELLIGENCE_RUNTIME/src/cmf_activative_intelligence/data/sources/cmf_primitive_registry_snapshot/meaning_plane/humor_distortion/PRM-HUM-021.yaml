notes: >
  Second-highest MCDA in Batch 4 (172). The audit flags LLM implementation
  risk: models "naturally struggle with subtle irony, often drifting into
  sarcasm or confusion" (IF: 38/50). The Anti-Draft Protocol (Level 2)
  must anchor ironic output to prevent tone drift. Float note:
  goal_bias.surprise is ceiling (0.9) because Irony's mechanism IS
  surprise — the audience encounters the opposite of what they expected.
  goal_bias.clarity is deliberately low (0.4) because Irony deliberately
  obscures the literal message to create discovery.
