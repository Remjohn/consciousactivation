summary: >
  The Irony Inversion is the dedicated implementation primitive for Dikkers'
  Funny Filter #1 within the CCP's Memetic Engine. Irony operates by
  expressing the polar OPPOSITE of the intended Subtext with absolute
  conviction. The writer never winks, never signals the joke — they play
  it completely straight. The audience is forced to hold two contradictory
  realities simultaneously, and the cognitive resolution of that contradiction
  produces the laugh. In CCP, Irony is the ultimate Trojan Horse for Escape
  Mode audiences: by enthusiastically endorsing the exact thing the coach
  opposes (toxic industry practices, guru culture, shallow hacks), the
  content bypasses the audience's defenses because the surface message
  appears to AGREE with their existing worldview.

core_move: >
  Express the polar opposite of the Subtext with total conviction, never
  breaking voice, and let the audience resolve the contradiction to
  discover the hidden truth.

why_it_works: >
  Dikkers defines Irony as "extreme opposites" where "the trick is
  heightening the contrast so that the two things you're contrasting are
  truly polar opposites" (lines 1760-1761). The mechanism is forced
  cognitive resolution: when the audience reads a statement that is clearly,
  absurdly wrong yet delivered with perfect sincerity, their brain must
  resolve the contradiction. That resolution — the moment they 'get it' —
  IS the laugh. The audit confirms this is the ultimate hook structure for
  CCF and CPSC: "When the internet mandates a predictable pattern, Irony
  forces a halt."

examples:
  - context: "BOOK: The Elements of Humor - Polar Opposite Delivery"
    application: >
      Dikkers defines Irony as expressing the polar opposite of the intended meaning with absolute conviction. The trick is heightening the contrast so the two things are truly polar opposites, without ever breaking character to signal the joke.
    effect: >
      Forces cognitive resolution. The audience must resolve the absurdity of the sincere endorsement with the reality of the situation, producing the laugh and the realization.

  - context: "CCP: CMF - The Trojan Horse Hook"
    application: >
      For an audience defensive against hustle-culture critiques, the hook enthusiastically endorses it: 'If you truly want to secure your future, I highly recommend staying at a job where your best reward is more of everyone else's work.'
    effect: >
      Bypasses reactance. The audience's scroll is arrested by the apparent agreement, and the cognitive dissonance forces them to internalize the hidden critique.

  - context: "CCP: V2WS - The Absurd Validation"
    application: >
      Addressing the fear of selling: 'You're absolutely right to avoid selling. The most ethical thing you can do is keep your life-changing expertise entirely to yourself so nobody feels uncomfortable.'
    effect: >
      The audience laughs at the absurdity, immediately recognizing that their own fear is structurally identical to the ironic statement. Reframing occurs without direct confrontation.

  - context: "CCP: CCF - The Enthusiastic Doom Carousel"
    application: >
      A 5-slide carousel provides a 'Step-by-Step Guide to Ensuring Your Launch Fails Completely,' delivered with upbeat, motivational aesthetics.
    effect: >
      The extreme tonal mismatch (motivational design + disastrous advice) creates high engagement and shareability while covertly teaching the correct launch principles.

  - context: "CCP: CBCS - The Extreme Agreement Reframe"
    application: >
      When a client stubbornly defends a self-sabotaging behavior, the CBCS instructs the coach to agree with them so completely and extremely that the client is forced to argue the opposite side.
    effect: >
      Breaks the defensive loop. The client abandons their rationalization because the coach has occupied the extreme version of it.

anti_examples:
  - description: >
      A CMF hook reads: 'Oh sure, definitely keep posting inspirational
      quotes with no strategy behind them, THAT'LL grow your business 🙄'
    why_it_fails: >
      This is Sarcasm, not Irony. Dikkers specifically differentiates
      Sarcasm as "Irony light" that "isn't trying very hard to fool
      anyone" (line 1800). The eye-roll emoji, the ALL-CAPS emphasis,
      and the sneering tone break the concealment. True Irony requires
      absolute conviction — the audience should momentarily wonder if
      the writer is serious.

