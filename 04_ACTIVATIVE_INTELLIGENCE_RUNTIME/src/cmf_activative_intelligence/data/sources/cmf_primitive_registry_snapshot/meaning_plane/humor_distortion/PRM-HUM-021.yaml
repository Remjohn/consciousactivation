trigger_conditions:
  - "CMF is generating hooks for an 'Escape Mode' audience demonstrating high reactance against direct coaching advice"
  - "CPSC identifies a persuasive transition requiring the immediate disarmament of audience defenses"
  - "Context Premise graph involves criticizing a widely accepted industry practice; Irony deployed to endorse it to absurdity"

suppression_conditions:
  - "Target audience has low media literacy or linguistic context where the ironic statement will be taken literally"
  - "Topic involves genuine harm (e.g., abuse, fraud) where appearing to endorse the behavior crosses ethical boundaries"

misuse_modes:
  - "Irony without conviction — breaking voice through tone markers (caps, emojis, 'just kidding') that expose the reversal prematurely"
  - "Irony without Subtext — reversing a statement that has no underlying value judgment, producing confusion rather than comedy"
  - "Sustained irony fatigue — maintaining the ironic position for too long without giving the audience a resolution point, causing frustration"

synergizes_with:
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — the contrast between the ironic statement and reality must be maximally heightened
  - "PRM-HUM-005"  # Absolute Verisimilitude — Irony requires playing it straight; verisimilitude enforces the commitment
  - "PRM-HUM-002"  # Irreducible Truth — the Subtext is the actual message; Irony is the specific concealment mechanism

conflicts_with:
  - "PRM-HUM-019"  # Struggle Principle — ironic detachment can conflict with genuine vulnerability; deploying both simultaneously requires extreme precision

