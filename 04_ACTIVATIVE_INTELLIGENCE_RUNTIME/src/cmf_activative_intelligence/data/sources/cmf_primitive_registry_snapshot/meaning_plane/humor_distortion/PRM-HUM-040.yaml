trigger_conditions:
  - "CMF is generating primary hooks; system must prioritize pulling 'Unspoken Friction' nodes from the Content Premise Graph"
  - "CBCS is delivering a behavioral diagnostic; agent must bypass clinical terminology and use Radical Observational Truth naming"
  - "V2WS script is in the opening 'You Are Here' phase; system must deploy precise articulations of the audience's hidden reality"

suppression_conditions:
  - "The observation is a widely repeated cliché within the niche; it no longer carries the shock value of an unspoken truth"
  - "The observation names a truth that is deeply personal, sensitive, or traumatic, crossing the line from shared reality to personal attack"

misuse_modes:
  - "Opinion-as-truth — presenting a subjective stance as a universal observation, breaking trust when the audience disagrees"
  - "Stale truths — recycling observations that were radical 6 months ago but are now clichés within the niche"
  - "Cruelty disguised as honesty — naming an uncomfortable truth about the AUDIENCE rather than a shared SITUATION, converting observation into attack"

synergizes_with:
  - "PRM-HUM-002"  # Irreducible Truth — the observation IS the Subtext; Holloway provides the surface articulation, Dikkers provides the hidden value judgment beneath it
  - "PRM-HUM-013"  # Intuiting Method — the raw material for Radical Observational Truth comes from the systematic observation process
  - "PRM-HUM-037"  # Hyper-Specificity Anchoring — the observation must be hyper-specific to produce recognition shock

conflicts_with:
  - "PRM-HUM-031"  # The Mix — The Mix operates through abstraction and domain collision; Radical Observational Truth operates through concrete, direct naming of reality

