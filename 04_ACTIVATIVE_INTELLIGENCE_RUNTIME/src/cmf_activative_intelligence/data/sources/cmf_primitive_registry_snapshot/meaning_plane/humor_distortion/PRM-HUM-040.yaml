notes: >
  The audit notes this "needs fine-tuning on user pain points to ensure
  the 'truth' is accurate" (MCDA 175). The risk is hallucinating a
  'radical truth' that the audience does not actually recognize. Float note:
  goal_bias.connection is ceiling (0.9) because naming what the audience
  implicitly knows is the fastest bonding mechanism. phase_fit.pre_trigger
  is high (0.8) because the best Radical Observational Truths are
  identified during research and observation, not during generation.
