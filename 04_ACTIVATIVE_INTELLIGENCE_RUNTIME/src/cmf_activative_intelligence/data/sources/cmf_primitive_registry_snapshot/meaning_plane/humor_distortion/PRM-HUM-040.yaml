summary: >
  Radical Observational Truth is Holloway's rule that the best material is
  not fabricated — it is a sharp, often uncomfortable articulation of an
  observation that everyone implicitly knows but hasn't explicitly stated.
  This is distinct from Dikkers' Irreducible Truth (PRM-HUM-002), which
  focuses on the hidden value judgment beneath the joke. Holloway's
  primitive focuses on the surface-level ACT of noticing what others have
  overlooked or been too polite to name. In CCP, this primitive drives the
  "Aha!" moment — content generation must prioritize identifying and
  articulating the hidden, unspoken frictions of the user's journey.

core_move: >
  Identify the specific, uncomfortable truth that everyone in the audience
  implicitly knows but no one has explicitly articulated — then state it
  with precision and without apology.

why_it_works: >
  Holloway demonstrates that the most powerful comedy comes not from
  invention but from observation. The mechanism is recognition-based
  surprise: the audience has FELT the friction but never HEARD it named.
  When the writer names it precisely, the audience experiences simultaneous
  relief (someone sees what I see) and shock (I can't believe they said
  that). This dual response produces the deepest form of comedy-bonding —
  the audience trusts the writer because the writer proved they inhabit
  the same reality.

examples:
  - context: "BOOK: The Serious Guide to Joke Writing - Sharp Implicit Articulation"
    application: >
      Holloway argues that the best material comes from naming the specific, uncomfortable truth that everyone implicitly knows but no one has explicitly articulated.
    effect: >
      Produces the 'Aha!' moment. The audience experiences simultaneous relief (being seen) and shock, building immense trust.

  - context: "CCP: CMF - The Unspoken Friction Hook"
    application: >
      Instead of generic tips, the CMF generates hooks that name the exact unspoken reality of the coach's niche (e.g., 'most coaches spend more time making content about coaching than coaching').
    effect: >
      Positions the coach as someone who inhabits the shared reality of the audience, instantly cutting through the noise of superficial experts.

  - context: "CCP: CBCS - The Non-Clinical Diagnostic"
    application: >
      The agent diagnoses client behavior by naming the precise, slightly embarrassing reality of what they are doing instead of using clinical labels.
    effect: >
      The client feels seen and understood rather than analyzed, allowing the diagnostic to land without triggering defensiveness.

  - context: "CCP: Guardian Agent - The Friction Miner"
    application: >
      The system continuously updates the Content Premise Graph by extracting these unspoken truths from audience interaction logs.
    effect: >
      Ensures the LLM's generation matrix is grounded in reality rather than hallucinated coaching tropes.

  - context: "CCP: V2WS - The 'You Are Here' Map"
    application: >
      The opening of the webinar articulates the audience's secret struggles so accurately that they believe the coach has been watching them.
    effect: >
      Establishes absolute authority; if the coach understands the problem this perfectly, they must have the solution.

anti_examples:
  - description: >
      A CMF hook presents a generic, widely-stated observation:
      'Being an entrepreneur is lonely sometimes.' This is not radical
      or unspoken — it has been stated millions of times.
    why_it_fails: >
      Radical Observational Truth requires that the observation is
      IMPLICITLY known but NOT explicitly stated. Once an observation
      has become a cliché ('entrepreneurship is lonely'), it no longer
      produces the recognition shock. The writer must find the NEXT
      layer — the specific, unnamed friction beneath the cliché.

  - description: >
      The system generates a "radical truth" that is actually an opinion
      presented as universal observation: 'The truth is that cold DMs
      never work and everyone who does them is wasting their time.'
    why_it_fails: >
      Radical Observational Truth must be genuinely OBSERVABLE — something
      the audience can verify against their own experience. Opinions
      disguised as observations break trust because the audience's
      internal fact-checker rejects the claim.

