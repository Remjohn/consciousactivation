trigger_conditions:
  - "CMF content generation pipeline reaches draft phase; system must trigger the Punch-Up Critic agent for structural evaluation"
  - "AST analysis detects diminishing returns in humor density across a V2WS module; Critic agent must execute a specific density pass"
  - "Generator agent output scores low on 'Attitude' or 'Premise' metrics; draft must be routed to the adversarial loop before delivery"

suppression_conditions:
  - "CBCS is in a rapid-response live chat scenario; multi-agent iteration latency would disrupt real-time engagement"
  - "Coach explicitly requests raw, unpolished dictation output for immediate deployment without comedic refinement"

misuse_modes:
  - "Infinite loop — the Critic never approves the draft, sending it back to the Generator indefinitely, consuming inference budget with diminishing returns"
  - "Vague feedback — the Critic provides subjective evaluations ('not funny enough') instead of structural directives ('missing Premise')"
  - "Critic-as-Generator — the Critic starts rewriting the draft instead of providing directives, collapsing the role separation"

synergizes_with:
  - "PRM-HUM-001"  # Dual-Processor Engine — the Comedy Buddy IS the Editor in Carter's framework; the Generator IS the Clown
  - "PRM-HUM-007"  # Production Over-Saturation — the Generator floods; the Comedy Buddy prunes and punches up the survivors
  - "PRM-HUM-030"  # Setup-Premise-Payoff — the Comedy Buddy's primary checklist item is structural completeness per Carter's schema

conflicts_with:
  - "PRM-HUM-020"  # Thought Moment Illusion — over-polished output from excessive Punch-Up passes may lose the manufactured spontaneity

