notes: >
  This primitive is architectural/procedural rather than creative — it
  governs HOW the pipeline operates, not WHAT it produces. Its MCDA (168)
  reflects the highest AT (50/50) but lowest VTP (30/50) because it has
  no direct visual output. Float note: goal_bias values are deliberately
  low across audience-facing dimensions because this primitive operates
  behind the scenes. phase_fit.revision is ceiling (0.9) because the
  Comedy Buddy IS the revision process. ccp_workflow_fit.content_generation
  is high (0.9) because it directly enhances every generation pipeline.
