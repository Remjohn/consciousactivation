summary: >
  The Comedy Buddy primitive codifies Carter's insistence that stand-up is
  never written in a vacuum. A Comedy Buddy is an external sounding board
  that forces relentless iteration — expanding premises, adding Mixes,
  refining setups through dialectical pressure. In CCP, this maps directly
  to the Multi-Agent Debate architecture: a Generator agent creates the
  base draft, then a dedicated Punch-Up Critic agent rigidly enforces
  MCDA metrics — checking for missing Premises, weak Attitudes, absent
  Mixes, and opportunities for Rule of Three deployment. This adversarial
  loop mathematically ensures high-grade output that no single-pass
  generation can match.

core_move: >
  Submit every generated content draft to an adversarial Critic agent
  whose sole purpose is to punch up the humor — adding Mixes, expanding
  Act-Outs, strengthening Premises, and enforcing structural compliance.

why_it_works: >
  Carter demonstrates that comedians who write alone plateau quickly
  because their own blind spots become invisible. The Comedy Buddy
  provides external cognitive friction — challenging weak Premises,
  suggesting alternative Mixes, identifying missed Act-Out opportunities.
  In CCP's multi-agent architecture, this maps to the Generator/Critic
  duality (PRM-HUM-001) but with a specific mandate: the Critic agent
  does not just prune — it actively ADDS humor to the draft. The audit
  scores this highest in Agentic Transferability (AT: 50/50) because
  "the multi-agent nature of our architecture" makes it a natural fit.

examples:
  - context: "BOOK: The NEW Comedy Bible - Dialectical Punch-Up Loop"
    application: >
      Carter insists that stand-up is never written in a vacuum. The Comedy Buddy is an external sounding board that forces relentless iteration — expanding premises, adding Mixes, and refining setups through dialectical pressure.
    effect: >
      Prevents the writer from plateauing in their own blind spots. The adversarial loop mathematically ensures high-grade output that no single-pass generation can match.

  - context: "CCP: CMF - The Multi-Agent Critic Engine"
    application: >
      The Generator agent creates the base draft, then a dedicated Punch-Up Critic agent rigidly enforces MCDA metrics — rejecting content with missing Premises, weak Attitudes, or absent Mixes.
    effect: >
      Elevates the output from generic coaching advice to a genuine comedic insight by enforcing structural completeness per Carter's schema.

  - context: "CCP: V2WS - The Script Density Pass"
    application: >
      The Critic agent scans the webinar script for humor density, flagging any segment with >4 minutes of straight narration for Act-Out injection or Rule of Three deployment.
    effect: >
      Ensures the webinar maintains rhythmic engagement. Every teaching moment has a comedic companion that aids retention.

  - context: "CCP: CCF - The Carousel Iteration Loop"
    application: >
      When generating listicle carousels, the Critic agent challenges the Generator to replace safe, center-of-web associations with lateral, unexpected Mixes.
    effect: >
      Forces the content past the LLM's statistical centroid into genuine novelty.

  - context: "CCP: Guardian Agent - The Tone Calibrator"
    application: >
      The Guardian Agent acts as the final Comedy Buddy, ensuring the punched-up draft hasn't drifted out of the coach's authentic Voice DNA bounds.
    effect: >
      Maintains persona integrity while maximizing comedic impact.

anti_examples:
  - description: >
      The Punch-Up agent is given a generic instruction: 'Make this
      funnier.' No specific structural criteria are provided.
    why_it_fails: >
      'Make it funnier' is exactly the vague instruction that produces
      statistical centroid output. The Comedy Buddy must enforce SPECIFIC
      structural checks: Is there a Premise? Is there a Mix? Is the
      Attitude strong enough? Is the Turn in position 3? Without
      deterministic criteria, the Critic produces equally vague feedback.

  - description: >
      The Generator and Critic are the same agent instance, evaluating
      its own output and attempting to improve it in a single pass.
    why_it_fails: >
      This collapses the Clown/Editor separation (PRM-HUM-001). A single
      agent cannot simultaneously generate freely AND evaluate critically.
      The Comedy Buddy MUST be a separate agent with a different system
      prompt — one that is incapable of generating content and is only
      capable of structural evaluation and specific improvement directives.

