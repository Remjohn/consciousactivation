summary: >
  Temporal Resolution Delay is the syntactic and geometric rule dictating
  that the punchline, the reveal, or the most disruptive word in any joke
  must be pushed to the absolute terminal node of the sentence or visual
  frame. Dikkers explicitly commands: "Put the Funny Part Last" (Tip #13).
  The mechanism is cognitive momentum management: if the surprising element
  arrives in the middle of a sentence, the remaining words bleed the tension
  out, dampening the laugh. In CCP, this serves as a rigid NLP constraint
  for final output generation — whether it is the last word of a Telegram
  text hook, the final syllable of a V2WS webinar script paragraph, or the
  bottom-right Z-pattern terminal node of a CVE carousel slide.

core_move: >
  Identify the core 'reveal' or anomalous word in a comedic sentence or
  visual frame, and restructure the grammar/layout to ensure it arrives
  at the absolute final millisecond of audience attention.

why_it_works: >
  Dikkers argues that "a joke usually works best when the reveal, or the
  funny word or the funny detail... comes last" (line 2768). He suggests
  restructuring sentences where the funny part lands early by "moving it
  as close to the end as possible" (line 2771). The mechanism is tension
  retention: humor relies on the sudden release of built-up cognitive
  tension. If the sentence continues after the reveal, the audience must
  simultaneously process the laugh and parse the remaining words,
  creating cognitive friction that stifles the physical release. The audit
  confirms this is "a critical geometric rule... delivering the punchline
  in the middle of a sentence allows momentum to bleed out."

examples:
  - context: "BOOK: How to Write Funny - Punchline Delay Syntax"
    application: >
      Dikkers dictates that the punchline, reveal, or most disruptive word in any joke must be pushed to the absolute terminal node of the sentence. Putting the funny part in the middle bleeds the tension out.
    effect: >
      Manages cognitive momentum. Retains tension until the absolute last millisecond, ensuring the laugh releases cleanly without the friction of trailing words.

  - context: "CCP: CMF - Hook Syntax Restructuring"
    application: >
      The LLM drafts: 'My dog ate my $4k workbook because she has terrible taste.' The JIT compiler identifies 'terrible taste' / 'she ate it' as the reveal and restructures: 'Only one creature got value out of that $4k workbook. My dog. She ate it.'
    effect: >
      Tension builds through the first sentence and releases at the precise moment the text ends. The laugh lands cleanly because there are no trailing words.

  - context: "CCP: V2WS - Z-Pattern Slide Engineering"
    application: >
      The payload-masking adapter enforces delay on a slide mocking cold DMs. The visual punchline (a screenshot of a terrible DM) is placed in the bottom-right terminal node. Speaker notes mandate clicking to reveal it only on the final spoken syllable.
    effect: >
      Visual scanning and auditory processing align perfectly on the reveal. Delaying cognitive release keeps the audience hooked to the transition.

  - context: "CCP: Telegram - The 'Read More' Concealment"
    application: >
      The agent formats a long-form text message so the setup takes up exactly the visible preview window. The punchline is hidden beneath the 'Read More' expansion, forcing a physical action to trigger the terminal node.
    effect: >
      The UI constraint itself is weaponized as a temporal delay mechanism, physically manufacturing comedic timing in a static text environment.

  - context: "CCP: CBCS - Voice Note Coaching"
    application: >
      When a coach's voice note consistently steps on its own punchlines by trailing off into filler words ('...so yeah, that's what happened'), the agent flags the audio and enforces a hard stop exercise.
    effect: >
      The coach learns to end on the disruptive word and sit in silence, allowing the comedic tension to actually release in the listener's brain.

anti_examples:
  - description: >
      The coach writes a post saying: 'I realized my entire funnel was
      broken when my mom opted in and asked me what a lead magnet was
      at Thanksgiving.'
    why_it_fails: >
      The funny part is the mom asking what a lead magnet is. The
      trailing phrase 'at Thanksgiving' bleeds the tension out. The
      reader's brain registers the joke but immediately has to parse
      the temporal setting, suppressing the laugh. It should be:
      'I was explaining my funnel at Thanksgiving. The only person
      who opted in was my mom. She wanted to know what a lead magnet was.'

  - description: >
      A CVE carousel slide puts the main comedic visual in the top-left
      corner, with explanatory text filling the rest of the frame.
    why_it_fails: >
      The audience sees the punchline before reading the setup. The
      geometric sequence is reversed. The tension never builds because
      the release happens at the entry point of the visual frame. The
      primitive demands that the reveal occupies the terminal node.

