trigger_conditions:
  - "System is executing the final NLP generation phase for any comedic content; it must enforce terminal node geometry"
  - "Agent is mapping a V2WS slide hierarchy and needs to temporally align visual and auditory reveals"
  - "AST analysis flags a draft as containing trailing filler words ('so yeah', 'anyway') immediately following a high-tension concept"

suppression_conditions:
  - "Sentence is purely expository and contains no intended comedic reveal or tension release"
  - "Content format is explicitly non-linear (e.g., an associative montage) where terminal geometry does not apply"

misuse_modes:
  - "Syntax mangling — twisting grammar so unnaturally to force the word to the end that the sentence becomes unreadable"
  - "Trailing ellipses — using punctuation to artificially delay the reveal without actually restructuring the thought"
  - "Visual clutter — placing the visual punchline at the end but surrounding it with competing elements that distract the eye from the terminal node"

