trigger_conditions:
  - "System selects Hyperbole or Irony as the Funny Filter; this primitive must be applied to validate extremity"
  - "Agent detects a joke or comparison in the draft that is 'too mild' or physically possible"
  - "AST visual analysis flags contrasting elements in a design as being too similar in scale or weight"

suppression_conditions:
  - "System is generating content intended to build delicate, vulnerable trust where extreme exaggeration would break intimacy"
  - "Topic is highly sensitive (e.g., severe trauma) where violating the bounds of reason would be perceived as mocking"

misuse_modes:
  - "Random absurdity — violating the laws of reason in a way that disconnects completely from the Subtext, producing Madcap nonsense rather than polarized meaning"
  - "Inconsistent polarization — pushing one element to the extreme while leaving the contrasting element grounded, unbalancing the joke"
  - "Shock for shock's sake — using grotesque or violent extremes (Funny Filter 3: Shock) when the Subtext doesn't require it, alienating the audience"

synergizes_with:
  - "PRM-HUM-003"  # Filter Constraints — specifically Hyperbole and Irony, which depend entirely on the degree of polarization
  - "PRM-HUM-010"  # High-Contrast Conflict — this primitive dictates HOW HIGH that contrast must go
  - "PRM-HUM-001"  # Dual-Processor Engine — the Editor uses 'is this extreme enough?' as a primary evaluation metric

conflicts_with:
  - "PRM-HUM-018"  # Subtle Subversion — a primitive that relies on almost imperceptible shifts, directly opposed to Extreme Polarization

