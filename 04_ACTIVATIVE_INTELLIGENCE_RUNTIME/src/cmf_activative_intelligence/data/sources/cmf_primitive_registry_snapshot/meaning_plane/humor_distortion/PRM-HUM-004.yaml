summary: >
  Contrastive Extreme Polarization is the humor primitive demanding that
  when comparing two elements, or when exaggerating a truth, the distortion
  must be pushed to its absolute polar extreme — to the point where it
  "violates the laws of science or reason" (line 2164). Dikkers warns that
  "a common flaw in unsuccessful humor is that the contrast inherent in the
  joke is not heightened enough" (Tip #10). Mild exaggeration produces mild
  amusement; extreme polarization forces cognitive dissonance and a laugh
  response. In CCP, this primitive acts as an algorithmic multiplier applied
  to the Funny Filters (especially Hyperbole and Irony). When the LLM
  generates a comparison or an exaggeration, the JIT Skill Compiler enforces
  a 'polarization check' — if the distortion is physically possible or
  logically sound, it must be pushed further until the boundary of reason
  is broken.

core_move: >
  Take the inherent contrast or exaggeration in a concept and multiply it
  until it shatters the bounds of physics, logic, or social acceptability,
  creating a chasm so wide the audience must laugh to bridge it.

why_it_works: >
  Dikkers states that "when using Hyperbole to generate laughs, the writer
  needs to exaggerate not just a little... the writer needs to exaggerate
  so greatly that the laws of science or reason are violated" (lines 2162-2164).
  The mechanism is cognitive shock: the brain attempts to process the statement
  as literal truth, fails due to the logical/scientific violation, and then
  suddenly re-interprets it as Subtext. The energy released by that sudden
  paradigm shift is the laugh. Dikkers gives the example of Rodney Dangerfield's
  bathtub toys: "a blender and a transistor radio" (line 2170). If the toys
  were just 'boring,' there's no joke. The toys must be lethal to violate
  reason and create the extreme polarization.

examples:
  - context: "BOOK: How to Write Funny - Contrastive Extreme Polarization"
    application: >
      Dikkers demands that when exaggerating or comparing, the distortion must be pushed to its absolute polar extreme—violating the laws of science or reason. Mild exaggeration produces only mild amusement.
    effect: >
      Forces cognitive dissonance. The brain attempts to process the impossible statement, fails, and reinterprets it as Subtext, releasing energy as a laugh.

  - context: "CCP: CMF - The Polarization Check"
    application: >
      If the LLM drafts: 'My client was so tired she couldn't lift 5lbs', the JIT compiler flags it as physically possible. It applies the polarization multiplier: 'She was so tired she legally died for four minutes and paramedics cleared the squat rack.'
    effect: >
      The audience instantly recognizes the absurdity. The Subtext (extreme effort) is delivered with maximum velocity, demanding attention.

  - context: "CCP: CBCS - The Irony Multiplier"
    application: >
      A coach writes: 'I love it when prospects ghost me.' The agent flags this as weak contrast and pushes the extreme: 'The highest honor a prospect can bestow is vanishing into the ether. I built a shrine to their silence.'
    effect: >
      Transitions content from annoyed snark to true satirical irony, clearly signaling the character to the audience.

  - context: "CCP: V2WS - The 'Villain' Amplification"
    application: >
      When describing the 'old way' of doing things in a webinar, the system doesn't just call it inefficient; it describes it as a medieval torture device designed by sadists to steal the audience's youth.
    effect: >
      The hyperbolic contrast between the old way and the coach's new methodology makes the solution appear exponentially more valuable.

  - context: "CCP: CCF - Visual Exaggeration"
    application: >
      When generating a meme or diagram, the system scales the visual elements dis-proportionately—making the 'problem' literally crush the stick-figure user under its massive weight.
    effect: >
      The visual polarization immediately communicates the emotional weight of the Subtext before the user reads any copy.

anti_examples:
  - description: >
      A CMF generation uses the Irony filter: 'I'm so glad the IRS decided
      to audit me this year, it's exactly what I needed right now.'
    why_it_fails: >
      This is not polarized enough. It reads as simple sarcasm because it
      is too close to reality. The contrast is not heightened. Dikkers
      warns that "the trick to Irony is heightening the contrast so that
      the two things you're contrasting are truly polar opposites" (line 1760).
      It should be: 'I have petitioned the federal government to increase
      my audit frequency to quarterly so I can spend more time with my
      favorite agent.'

  - description: >
      The coach attempts Hyperbole by saying 'I've told you a million times
      to optimize your bio.'
    why_it_fails: >
      This is a cliché (line 1083). It uses a standard figure of speech rather
      than pushing the exaggeration to a novel, reason-violating extreme.
      The audience's brain is habituated to 'a million times' and processes
      it as literal 'many times,' experiencing no cognitive shock and
      therefore no laugh.

