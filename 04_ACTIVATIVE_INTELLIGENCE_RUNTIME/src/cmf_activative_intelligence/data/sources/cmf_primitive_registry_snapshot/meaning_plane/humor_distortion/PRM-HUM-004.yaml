notes: >
  This primitive functions as an intensity dial for the other humor
  distortions. Its MCDA (150) reflects its importance as the differentiator
  between amateur sarcasm and professional comedy. Float note:
  goal_bias.surprise is near ceiling (0.9) because the sudden violation
  of logic/reason is the primary driver of the comedic shock. phase_fit.revision
  is highest (0.9) because heightening is typically an editorial pass — the
  Clown generates the initial contrast, the Editor pushes it to the extreme.
