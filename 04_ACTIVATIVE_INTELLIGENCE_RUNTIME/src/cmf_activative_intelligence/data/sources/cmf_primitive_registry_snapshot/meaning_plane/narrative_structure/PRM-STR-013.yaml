trigger_conditions:
  - "System detects the audience is being asked to make a costly transition, face a painful pivot, or adopt a difficult new behavior"
  - "System orchestrates a transition moment in a multi-day challenge, cohort, or course"
  - "User is struggling to get buy-in for a major change and relies too heavily on logical spreadsheets instead of emotional framing"

suppression_conditions:
  - "Communication is a routine operational update with no behavioral or emotional stakes"
  - "Audience is already fully committed, energetic, and simply needs technical execution steps"

misuse_modes:
  - "Stage Mismatch — Celebrating arrival when the audience is still fighting."
  - "Empty Ritual — Deploying ceremonies without a credible underlying strategy or shared sacrifice."
  - "Symbol Clutter — Using too many conflicting metaphors or symbols, diluting the collective focus."

