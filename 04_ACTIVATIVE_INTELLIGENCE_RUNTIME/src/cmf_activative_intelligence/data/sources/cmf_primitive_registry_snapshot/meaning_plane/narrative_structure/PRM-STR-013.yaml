summary: >
  Change Choreography is a structural primitive that sequences speeches, stories, ceremonies,
  and symbols to move groups through the predictable resistance of a transformation journey.
  It functions as the narrative pacemaker of change, temporarily suspending individual anxiety
  through choreographed moments of shared meaning that orient the audience to where they are
  in the transition.

core_move: >
  Use targeted speeches, stories, ceremonies, and symbols to resolve the tension of the current
  change stage and propel the audience into the next phase.

why_it_works: >
  In the "Venture Scape," travelers must pass through difficult stages like "Fight" and "Climb"
  where resistance and fatigue naturally peak. Duarte shows that logic cannot sustain momentum
  here; instead, leaders must trigger "collective effervescence" (sociologist Émile Durkheim's
  term) through shared ceremonies and symbols. This neurological suspension of individual identity
  into a collective purpose provides the emotional fuel required to survive the messy middle of change.

examples:
  - context: "BOOK: Illuminate - The Torchbearer's Toolkit"
    application: >
      Duarte maps the "Venture Scape" (Dream, Leap, Fight, Climb, Arrive) and proves that logic cannot sustain momentum through the messy middle. Leaders must trigger "collective effervescence" through shared ceremonies and symbols to sequence groups through predictable resistance.
    effect: >
      Neurologically suspends individual identity into a collective purpose, providing the emotional fuel required to survive change.

  - context: "CCP: CMF - The 'Leap' Ceremony"
    application: >
      Instead of just sending a daily instructional video during a 7-Day Challenge, the agent generates a specific "Leap" ceremony on Day 3: a visual symbol (a burned bridge) and a required verbal pledge.
    effect: >
      Completion rates increase because users feel they have crossed a threshold together, binding their identity to the group.

  - context: "CCP: Conscious Voice - The 'Fight' Stage Pivot"
    application: >
      When a coach prepares to announce a painful pivot, the agent forces them to craft a symbolic narrative of shared sacrifice, recommending an acoustic shift in voice tone to reflect solemnity followed by resolve.
    effect: >
      The coach delivers a message that validates fear but pivots energy toward the shared climb, preventing a mutiny.

  - context: "CCP: CCF - Archetypal Ceremonies"
    application: >
      A coaching brand is instructed to design a specific 'Arrive' ceremony for clients who complete a 90-day sprint, using a distinct physical artifact mailed to their home.
    effect: >
      Cements the transformational identity of the client, ensuring long-term retention and organic referral generation.

  - context: "CCP: V2WS - The Shared Enemy Ritual"
    application: >
      During the webinar, the host leads the audience through a brief, shared verbal commitment to abandon a toxic industry practice.
    effect: >
      Creates instant collective effervescence, transforming a passive audience into an active movement before the pitch even begins.

anti_examples:
  - description: >
      Deploying a triumphant "Arrive" ceremony (e.g., a massive celebration or congratulatory webinar)
      when the audience is actually in the "Fight" stage and feeling overwhelmed by the new workload.
    why_it_fails: >
      If the choreography misdiagnoses the stage of the Venture Scape, the ceremony feels profoundly
      manipulative and tone-deaf. Duarte warns that forced celebration during the messy middle destroys
      trust and invalidates the travelers' lived reality.

