crosswalk_id: "XW-CHANGE-CHOREO"
crosswalk_note: "Meaning focuses on scripting the stories and speeches; Experience focuses on the UI/product moments that act as ceremonies."

notes: >
  This primitive requires the system to hold state regarding where the user/audience is in the journey.
  It cannot be applied statelessly; it demands a temporal understanding of the Venture Scape.
