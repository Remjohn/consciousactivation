trigger_conditions:
  - "AST analysis detects content feeling like a meandering lecture, a chronological data dump, or unbroken exposition"
  - "User is struggling to compress a long timeline or complex journey into a short-form asset"
  - "System detects audience retention dropping during long blocks of text or audio"

suppression_conditions:
  - "Content is a rapid-fire tactical list (e.g., '3 ways to fix X') where narrative pacing is unnecessary"
  - "Emotional intensity of a single scene is so high that breaking away for reflection would ruin the tension"

misuse_modes:
  - "Stepping on Stones Too Quickly — Rushing through the scenes without allowing the listener to feel the environment."
  - "Over-Reflection — Pausing to interpret every single detail, destroying the forward motion of the story."
  - "Missing Stones — Jumping across huge gaps in time or logic without a summary bridge, confusing the audience."

