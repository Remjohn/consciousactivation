summary: >
  Narrative Stepping Stones is a structural pacing primitive that breaks a sprawling memory or
  complex argument into usable, sequenced units. Rather than getting bogged down in continuous
  exposition, it forces the narrative to hop across distinct beats, alternating rhythmically
  between lived scenes (action), summaries (time compression), and reflections (meaning extraction).

core_move: >
  Break the journey into distinct "stepping stones" that alternate between showing an event,
  compressing time, and interpreting its significance, preventing the story from stalling in exposition.

why_it_works: >
  The Moth storytelling method proves that audiences lose attention when trapped in unbroken
  summary ("and then this happened, and then that happened"). The human brain requires rhythm. By
  using Narrative Stepping Stones, the teller provides an immersive scene to create presence, a brief
  summary to bridge the timeline, and a reflection to consolidate the emotional payoff. This alternating
  cycle preserves narrative velocity while allowing the listener's brain to process meaning without fatigue.

examples:
  - context: "BOOK: How to Tell a Story - Scene-Summary-Reflection Cycle"
    application: >
      The Moth storytelling method proves audiences lose attention when trapped in unbroken summary. Narrative Stepping Stones alternate rhythmically between lived scenes (action), summaries (time compression), and reflections (meaning extraction).
    effect: >
      Preserves narrative velocity while allowing the listener's brain to process meaning without fatigue.

  - context: "CCP: V2WS - Module Architecture"
    application: >
      Instead of a continuous 12-minute lecture, the agent structures the module: (1) Scene: Failing at the concept. (2) Reflection: Why failure hurt. (3) Summary: Three years of research compressed. (4) Scene: The method working.
    effect: >
      Audience remains deeply engaged. Cognitive load is balanced between sensory engagement and intellectual processing.

  - context: "CCP: Telegram - The Compressed Journey"
    application: >
      An agent replies to a stuck user using a compressed Stepping Stone structure: a micro-scene (reflecting their current reality), a summary (normalizing the pattern), and a reflection (a question forcing a shift).
    effect: >
      The user feels guided across a river of their own experience, arriving at a new perspective one safe step at a time.

  - context: "CCP: CCF - The 3-Minute Reel Constraint"
    application: >
      When a coach attempts to compress a 10-year journey into a short reel, the system enforces a strict 1-scene, 1-summary, 1-reflection limit.
    effect: >
      Prevents chronological data dumps, resulting in a punchy, emotionally resonant video that actually converts.

  - context: "CCP: CMF - Visual Pacing"
    application: >
      A video essay alternates between high-intensity b-roll (Scene), fast-motion infographics (Summary), and a slow, static shot of the speaker (Reflection).
    effect: >
      The visual rhythm perfectly matches the narrative stepping stones, preventing visual fatigue and maximizing retention.

anti_examples:
  - description: >
      Writing a five-minute CCF script that consists entirely of continuous action without pausing to tell
      the audience what it means, or conversely, a script that is 100% philosophical reflection with no lived scenes.
    why_it_fails: >
      Without the interplay of scene and reflection, the content becomes either a chaotic diary entry (all scene)
      or a dry academic lecture (all reflection). The Stepping Stone rhythm is destroyed, and the audience tunes out.

