trigger_conditions:
  - "System detects content that feels flat, academic, ambient, or lacking in urgency"
  - "AST analysis reveals the coach is describing a solution but hasn't established why the problem is dangerous (missing stakes)"
  - "User is generating a core premise, hook, or sales pitch for a new product"

suppression_conditions:
  - "Content is intended to be purely meditative, ambient, or decompressive (where tension is actively avoided)"
  - "Interaction is a simple administrative confirmation or technical support answer"

misuse_modes:
  - "Artificial Stakes — Inventing apocalyptic consequences for minor problems, which destroys credibility."
  - "Strawman Opposition — Creating a weak, easily defeated opposing force, which makes the goal feel unearned."
  - "Hidden Goal — Spending too much time on the opposition without clarifying what the protagonist actually wants."

