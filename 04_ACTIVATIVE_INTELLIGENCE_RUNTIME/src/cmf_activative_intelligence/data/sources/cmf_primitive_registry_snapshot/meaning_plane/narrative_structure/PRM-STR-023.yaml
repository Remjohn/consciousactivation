summary: >
  The Goal-Opposition-Stakes Spine is the fundamental structural skeleton of all narrative movement.
  It forces content to organize around a clear desire, a meaningful obstruction, and a severe consequence
  of failure. Without this triad, content may contain insight or polished wording, but it will lack the
  engine of tension required to capture and hold human attention.

core_move: >
  Immediately articulate what is desired, what opposing force is preventing it, and the emotional or
  physical cost of failing to achieve it.

why_it_works: >
  The human brain is an evolutionary conflict-resolution machine. If it cannot detect what a character
  (or the speaker, or the audience avatar) wants, who is stopping them, and what happens if they fail,
  attention flatlines. Screenwriting architecture proves that passive information delivery is easily
  ignored, but active struggle commands neurological focus. The Spine converts topics into conflicts,
  forcing the audience to actively root for a resolution.

examples:
  - context: "BOOK: The Screenwriter's Bible / Save the Cat - The Triad of Tension"
    application: >
      Screenwriting architecture mandates that all narrative movement must organize around a clear desire, a meaningful obstruction, and a severe consequence of failure.
    effect: >
      Converts passive information delivery into active struggle, forcing the audience's conflict-resolution neurology to actively root for a resolution.

  - context: "CCP: CCF - Hook Validation"
    application: >
      A draft starts: "Today I'll talk about boundaries." The agent rewrites it: "You want to leave at 5 PM (Goal), but your boss equates late hours with loyalty (Opposition). If you don't break this, you will burn out and lose your family (Stakes)."
    effect: >
      The content ceases to be an abstract lesson and becomes a high-stakes survival guide, instantly hooking the viewer's brain.

  - context: "CCP: V2WS - Module Tension Design"
    application: >
      The webinar creator structures a 15-minute block by establishing the audience's goal, introducing the invisible opposing force (a toxic industry myth), and escalating the stakes before revealing the framework as the weapon.
    effect: >
      The audience stays until the end because they need the resolution to the conflict. The teaching is received as a necessary rescue.

  - context: "CCP: CBCS - The Motivation Check"
    application: >
      When a client loses momentum, the agent explicitly maps their current stall against the Spine: "You wanted X. Y is stopping you. If we don't fix this today, Z happens. Are we quitting or fighting?"
    effect: >
      Instantly re-establishes the severity of the situation, pulling the client out of apathy and back into the narrative of their own transformation.

  - context: "CCP: CMF - Asset Triage"
    application: >
      The system automatically flags and rejects any video script that lacks a clear 'Opposition' element within the first 15 seconds.
    effect: >
      Ensures zero budget or time is wasted producing ambient, low-tension content that fails to capture attention.

anti_examples:
  - description: >
      Creating a beautifully shot, highly poetic CMF video where a coach wanders through a forest talking
      vaguely about "finding inner peace" without ever defining what is threatening that peace or what
      happens if it isn't found.
    why_it_fails: >
      It lacks the Spine. There is a vague Goal ("peace"), but no Opposition and no Stakes. The result is
      boring, ambient content that the audience scrolls past within three seconds.

