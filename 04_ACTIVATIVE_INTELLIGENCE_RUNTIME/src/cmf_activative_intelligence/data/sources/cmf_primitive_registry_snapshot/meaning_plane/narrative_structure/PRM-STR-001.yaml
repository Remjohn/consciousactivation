summary: >
  Bird-by-Bird Framing is a pre-generation structural primitive that forces scale reduction.
  Instead of attempting to organize or express a massive, abstract theme, it restricts the focus
  to a single, hyper-concrete, survivable unit of memory or observation. It is a psychological
  intervention against the paralysis of overwhelm.
core_move: >
  Reduce scale drastically to a single, concrete moment or detail to approach truth without cognitive overwhelm.
why_it_works: >
  Overwhelm is a scale problem, not a talent problem. When the cognitive load of a topic is too large, 
  the brain floods with anxiety and execution freezes. Lamott's physical "one-inch picture frame" mechanism
  works by artificially constraining the field of vision, demanding only what can be seen in that tiny frame.
  This bypasses the inner critic's demand for comprehensive mastery and allows the nervous system to relax
  enough to access truthful, granular memory.

examples:
  - context: "BOOK: Bird by Bird - Scale Reduction"
    application: >
      Lamott addresses the paralysis of a massive writing assignment by forcing the writer to look through a "one-inch picture frame." Focus only on what fits in that tiny, concrete frame (e.g., one specific memory, one physical detail).
    effect: >
      Bypasses the inner critic's demand for comprehensive mastery, allowing the nervous system to relax enough to access truthful, granular memory.

  - context: "CCP: CCF - Sacred Audio Ideation"
    application: >
      Instead of prompting the coach to outline their "philosophy on resilience", the agent asks them to describe the exact physical sensations in the room during the lowest five minutes of their career.
    effect: >
      The coach easily bypasses writer's block. The resulting content is densely textured and emotionally authentic, providing rich raw material.

  - context: "CCP: CMF - Hook Generation"
    application: >
      The agent restricts the hook constraint to naming one specific object that symbolizes the client's struggle (e.g., an unopened stack of mail), refusing any abstract summaries.
    effect: >
      The hook immediately grounds the audience in a recognizable physical reality, capturing attention more effectively than a conceptual opening.

  - context: "CCP: V2WS - The Micro-Case Study"
    application: >
      During the webinar, instead of presenting a 10-year macro timeline of a client's success, the host zooms in on the single 15-minute conversation that changed the trajectory.
    effect: >
      The audience can vividly imagine themselves in the specific scenario, increasing believability and connection.

  - context: "CCP: CBCS - The Next Action Prompt"
    application: >
      When a client is overwhelmed by a 90-day launch plan, the agent applies the one-inch frame: "What is the single 5-minute action you can take right now to move the needle 1%?"
    effect: >
      Reduces cognitive load, preventing paralysis and re-establishing forward momentum.

