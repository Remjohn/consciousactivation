trigger_conditions:
  - "AST analysis detects user displaying signs of writer's block, hesitation, or cognitive overwhelm (e.g., 'I don't know where to start')"
  - "System detects content being produced is overly abstract, conceptual, or lacking in physical detail"
  - "Initiating the early stages of a Sacred Audio capture or CCF ideation flow"

suppression_conditions:
  - "System is assembling the macro-arc of a multi-module program where high-level structure is required"
  - "Audience explicitly requests a high-level, synthesized executive summary of the framework"

misuse_modes:
  - "Fragmenting the final output so much that the macro meaning is lost."
  - "Using the small frame to avoid addressing the core conflict of the piece."

