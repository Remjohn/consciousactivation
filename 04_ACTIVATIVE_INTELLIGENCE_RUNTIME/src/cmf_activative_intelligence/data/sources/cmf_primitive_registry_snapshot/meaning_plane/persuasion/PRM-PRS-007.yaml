trigger_conditions:
  - "When introducing a highly technical, abstract, or historically difficult framework to a new audience"
  - "When drafting the opening module of any CCP curriculum or training sequence"
  - "When a script relies heavily on specialized jargon that might alienate a lay audience"

suppression_conditions:
  - "When communicating with highly advanced peers where defining the 'clutch' feels patronizing or redundant"

misuse_modes:
  - "Over-Simplification — dumbing down the material so much that the 'clutch' metaphor is factually inaccurate and breaks down upon further study"
  - "Patronizing Tone — delivering the empathetic reframe with a condescending tone that assumes the audience is unintelligent rather than merely uninitiated"

