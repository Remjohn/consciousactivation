summary: >
  Eating-the-Microphone Failure Taxonomy is a diagnostic primitive that redefines the true cause
  of audience disengagement. It establishes that audiences do not tune out because of superficial
  performance mistakes like verbal stumbles or imperfect slides; they tune out when the speaker
  wanders outside the audience's zone of active concern. In CCP, this primitive acts as a
  pre-publication filter, shifting the focus of content review from "does this sound polished?"
  to "does this remain relentlessly relevant to the listener?"

core_move: >
  Diagnose and eliminate moments where the content serves the creator's need to perform rather than the audience's need for relevance.

why_it_works: >
  Berkun defines "eating the microphone" as the exact moment an audience collectively concludes
  that continuing to listen is a worse use of time than daydreaming. Speakers obsess over
  technical perfection, but the Dr. Fox Experiment proved that audiences are highly forgiving
  of human imperfection if the speaker is engaging and relevant. The mistakes that actually
  kill attention are pre-verbal: not having a clear point, or indulging in tangents that are
  interesting to the speaker but irrelevant to the audience's pain. Eliminating these tangents
  preserves the audience contract.

examples:
  - context: "BOOK: Confessions of a Public Speaker - The Dr. Fox Experiment"
    application: >
      Berkun uses the Dr. Fox experiment to prove that audiences forgive human imperfection (stumbles, bad slides) if the speaker remains engaging and relevant. "Eating the microphone" happens when a speaker abandons the audience's zone of concern to indulge in tangents or obsess over their own technical glitches.
    effect: >
      The speaker preserves the audience contract by prioritizing relentless relevance over sterile, technical perfection.

  - context: "CCP: CCF - Narrative Tangent Pruning"
    application: >
      During the revision phase of a script, the CCF agent flags a 3-minute section where the coach details the chronological history of a framework, marking it as a severe "eating the microphone" risk and suggesting a cut.
    effect: >
      The coach avoids losing the audience to academic indulgence, keeping the focus strictly on the actionable application and preserving retention.

  - context: "CCP: V2WS - Webinar Delivery Feedback"
    application: >
      After a Rep Mode session, the V2WS biometric scorer ignores the coach's slight vocal disfluencies (ums/ahs) and instead heavily penalizes a 4-minute segment where the coach apologized for a slide glitch and rambled about the software.
    effect: >
      The coach is relieved of the impossible burden of technical perfection and refocuses their energy on maintaining intellectual clarity and audience relevance.

  - context: "CCP: Conscious Reactions - Solo Reaction Editing"
    application: >
      A coach submits a 3-minute reaction. The first 45 seconds are spent clearing their throat and explaining why they are recording from their car. The extraction pipeline automatically trims this "microphone-eating" preamble, starting the CMF asset precisely at the thesis.
    effect: >
      The final asset immediately respects the listener's time, preventing a massive drop-off in the first 3 seconds of playback.

  - context: "CCP: Telegram - Sunday Postcard Drafting"
    application: >
      While writing a Sunday Postcard, the coach includes a long, self-indulgent paragraph about their own weekend scheduling difficulties. The system highlights it as irrelevant to the tribe's weekly mission and prompts a reframe.
    effect: >
      The message remains a high-value tribal artifact rather than devolving into a personal diary entry, maintaining the coach's authority.

anti_examples:
  - description: >
      A webinar where the speaker spends the first 10 minutes apologizing for their raspy voice
      and explaining the technical difficulties they had setting up the presentation software.
    why_it_fails: >
      The speaker is projecting their own anxiety about performance perfection onto the audience.
      The audience does not care about the software; they care about the promised transformation.
      By focusing on their own performance issues rather than the audience's needs, the speaker
      eats the microphone before the substantive content even begins.

