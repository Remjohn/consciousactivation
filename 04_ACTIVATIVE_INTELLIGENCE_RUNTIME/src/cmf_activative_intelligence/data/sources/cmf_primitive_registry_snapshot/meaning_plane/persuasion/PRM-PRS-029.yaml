summary: >
  The Throughline as Structural Anchor is the absolute master constraint for any presentation.
  It demands that the entire talk be unified by a single, specific idea that can be stated
  in 15 words or fewer, and that can be fully unpacked in the allotted time. In CCP, this
  primitive acts as the 'Throughline Gate' before production begins, eliminating the most
  common communication failure—the sprawling, multi-topic survey—by forcing ruthless
  narrowing and focus.

core_move: >
  Define a single, specific idea in 15 words or fewer before drafting any content, and ruthlessly eliminate any material that does not directly serve or connect to this exact throughline.

why_it_works: >
  Anderson, having curated thousands of TED talks, observes that the difference between a
  forgettable talk and a legendary one is almost always the presence of a clear throughline.
  When an expert tries to cram their entire life's work into a single presentation, the
  audience is overwhelmed and retains nothing. A throughline is not a topic (e.g., 'leadership')
  or a subject (e.g., 'technology'); it is a specific idea (e.g., 'Leaders who pause before
  responding build twice the trust of those who react instantly.'). By stripping away
  everything that does not serve this single idea, the speaker respects working memory limits
  and allows the audience to fully absorb, construct, and later retell the core message.

examples:
  - context: "BOOK: TED Talks Guide - The Throughline"
    application: >
      Chris Anderson notes that the difference between a forgettable talk and a legendary one is the presence of a clear "throughline." A speaker must define a single, specific idea in 15 words or fewer, and ruthlessly eliminate any material that does not connect to this structural spine.
    effect: >
      The audience is not overwhelmed by a sprawling data dump. They can fully absorb, construct, and later retell the core message because it respects working memory limits.

  - context: "CCP: CCF - Pre-Production Gate"
    application: >
      A coach submits a proposal on "Modern Sales Strategies." The CCF agent rejects this as a "topic" and forces the coach to define a throughline: "Selling is no longer about persuasion; it is about diagnosing hidden risk." (12 words).
    effect: >
      Every anecdote and framework is now disciplined. The script is laser-focused on proving this single idea, ensuring high memorability.

  - context: "CCP: V2WS - Webinar Audit"
    application: >
      A 60-minute webinar outline has 8 main sections. The V2WS agent flags it for "throughline diffusion." It requires the coach to pick one section and expand it into the entire session, going deep rather than wide.
    effect: >
      The audience stops feeling like they are drinking from a firehose. They leave with a profound understanding of one transformational concept.

  - context: "CCP: CMF - The Storyboard Anchor"
    application: >
      Before generating visual assets, the CMF engine prints the 15-word throughline at the top of the storyboard interface. If a proposed visual metaphor does not directly serve that exact sentence, the asset is deleted.
    effect: >
      The final video is visually cohesive and rhetorically impenetrable, preventing "cool but confusing" graphics from diluting the message.

  - context: "CCP: Telegram - Thread Constraint"
    application: >
      When a coach attempts to record a 5-part audio thread covering three different topics, the Guardian Agent intercepts it, forcing them to break it into three separate days of content, each with its own single throughline.
    effect: >
      The client can actually implement the advice because the cognitive load of processing the thread is reduced to a single, actionable idea per day.

anti_examples:
  - description: >
      A speaker uses their 18-minute slot to give a chronological history of their company,
      describe three different new products, and offer a generic motivational sign-off about
      'believing in yourself.'
    why_it_fails: >
      The talk has no spine. It is a collection of disparate topics united only by the fact
      that the same person is speaking. The audience leaves with no single, coherent idea to
      retell, resulting in zero lasting impact or viral word-of-mouth.

