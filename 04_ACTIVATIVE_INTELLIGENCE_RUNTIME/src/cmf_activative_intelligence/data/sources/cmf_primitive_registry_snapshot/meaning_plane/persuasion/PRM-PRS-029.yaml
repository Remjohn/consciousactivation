trigger_conditions:
  - "At the very start of the Design Brief process, before a single word of script is drafted"
  - "When a draft feels rambling, encyclopedic, or like a 'data dump'"
  - "When a coach insists they have 'too much to say' to fit within the time constraint"

suppression_conditions:
  - "During initial free-association brainstorming or 'clown-state' ideation where narrowing would prematurely kill creativity"

misuse_modes:
  - "The Vague Slogan — creating a 15-word statement that sounds good but says nothing specific (e.g., 'We must innovate the future together for a better tomorrow'), providing no structural guidance"
  - "The Crammed Sentence — using semicolons and em-dashes to artificially cram three separate ideas into a 15-word sentence, ignoring the spirit of the rule"

