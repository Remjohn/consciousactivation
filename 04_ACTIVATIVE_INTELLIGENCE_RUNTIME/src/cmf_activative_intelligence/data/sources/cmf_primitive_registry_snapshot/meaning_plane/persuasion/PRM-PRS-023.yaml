crosswalk_id: "XW-DOPAMINE-TAG"
crosswalk_note: "Experience design uses this for major milestone completions: an unexpected, highly visceral animation that tags the achievement in memory."

notes: >
  This primitive is the operationalization of Duarte's S.T.A.R. moment, grounding it in the
  hard science of dopamine tagging. It converts 'memorability' from an art into a biological
  science.
