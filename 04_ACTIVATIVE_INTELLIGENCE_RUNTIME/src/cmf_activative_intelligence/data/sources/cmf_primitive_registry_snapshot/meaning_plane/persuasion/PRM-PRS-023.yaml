trigger_conditions:
  - "When designing the definitive climax of a major presentation, pitch, or webinar"
  - "When auditing content that contains great information but lacks a central 'hook'"
  - "When brainstorming how to visually or physically represent a highly abstract concept"

suppression_conditions:
  - "In routine, high-frequency communications (e.g., daily check-ins) where engineering an ECS would be exhausting and disproportionate"

misuse_modes:
  - "The Disconnected Stunt — designing an ECS that is spectacular but unrelated to the Big Idea (e.g., a magic trick in a finance presentation), resulting in the audience remembering the trick but forgetting the point"
  - "ECS Saturation — trying to make every single slide or point an ECS, which destroys contrast, exhausts the amygdala, and causes the audience to tune out entirely"

