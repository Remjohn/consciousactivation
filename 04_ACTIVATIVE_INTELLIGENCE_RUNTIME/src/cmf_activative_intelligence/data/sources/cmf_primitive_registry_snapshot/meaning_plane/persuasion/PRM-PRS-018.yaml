trigger_conditions:
  - "When designing the climax of any high-stakes presentation or webinar"
  - "When auditing a CMF visual sequence that feels competent but forgettable"
  - "When a coach needs a 'hook' or soundbite for social media excerpting"

suppression_conditions:
  - "In short-form, rapid-fire operational updates where engineering an emotional climax would be drastically out of proportion to the content"

misuse_modes:
  - "The Distracting Gimmick — creating a memorable moment that does not carry the DNA of the Big Idea, causing the audience to remember the stunt but forget the message"
  - "S.T.A.R. Overload — attempting to make every single beat a S.T.A.R. moment, which destroys contrast and exhausts the audience, resulting in nothing being memorable"

