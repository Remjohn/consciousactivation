trigger_conditions:
  - "When scripting a coach's 'About Me' or foundational Voice DNA origin story"
  - "When a client is navigating a major professional or personal transition and feels disconnected from their past"
  - "When auditing a personal story that feels disjointed, reactionary, or victim-oriented"

suppression_conditions:
  - "When delivering pure, objective tactical instruction where personal identity framing would be a distracting indulgence"

misuse_modes:
  - "Forced Causality — inventing connections between unrelated past events and present skills that feel overtly manufactured or dishonest"
  - "Over-Polishing — removing all the messy, difficult realities of the transition in order to make the narrative arc seem 'perfect,' thereby destroying authenticity"

