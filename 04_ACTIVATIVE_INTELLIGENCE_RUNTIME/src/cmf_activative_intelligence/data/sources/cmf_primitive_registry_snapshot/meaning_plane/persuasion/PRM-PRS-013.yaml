summary: >
  Narrative Coherence Architecture is a structural primitive that engineers trust by ensuring
  a speaker's past, present, and future appear causally and continuously connected. It solves
  the paradox that moments of great personal transformation—the best material for a story—often
  undermine perceived coherence if not framed correctly. In CCP, this primitive governs the
  creation of all Voice DNA "Origin Stories," ensuring that coaches root their transitions in
  character (who they are) rather than circumstance (what happened to them).

core_move: >
  Structure identity transitions by explicitly linking past experiences to present capabilities, rooting the cause of change in enduring character traits rather than external events.

why_it_works: >
  Ibarra and Lineback establish that human beings are hardwired to evaluate credibility through
  narrative coherence. If a coach's transition from corporate executive to wellness coach appears
  abrupt or purely reactionary, the audience's trust circuitry flags them as unstable or
  inauthentic. By employing the continuity repair kit—citing multiple convergent reasons for the
  change, and framing the past as the necessary training ground for the present—the narrative
  becomes causally inevitable. When change is framed as a revelation of character rather than
  a victimhood of circumstance, the speaker generates massive Ethos.

examples:
  - context: "BOOK: HBR's 10 Must Reads - What's Your Story?"
    application: >
      Ibarra and Lineback demonstrate that audiences evaluate credibility through narrative coherence. When a speaker transitions careers, the shift must be explicitly linked to enduring character traits rather than external circumstances, or the audience's trust circuitry flags them as unstable.
    effect: >
      The transition becomes causally inevitable. When change is framed as a revelation of character rather than victimhood of circumstance, it generates massive Ethos.

  - context: "CCP: CCF - Voice DNA Onboarding"
    application: >
      A coach's draft backstory reads: "I was fired, so I became a coach." The CCF agent rewrites it using the Coherence Protocol: "In banking, I was the one managing psychological crises. When the restructure happened, I realized my actual skill was stabilizing human systems."
    effect: >
      The transition is no longer a random career pivot; it is the inevitable crystallization of a core character trait. The audience trusts the coach's solid identity.

  - context: "CCP: V2WS - The Witness Arc Methodology"
    application: >
      When a client struggles to articulate their reinvention, the V2WS framework prompts the coach to ask: "What were you doing *then* that was secretly building the exact capacity you need *now*?"
    effect: >
      The client experiences a profound shift in self-perception, realizing their entire past is the coherent foundation for their new identity.

  - context: "CCP: Conscious Reactions - Solo Debate Context"
    application: >
      Before a coach launches into a Debate Mode attack on an industry standard, the system requires a 10-second 'Coherence Anchor' explaining *why* their specific past background uniquely compels them to attack this specific standard.
    effect: >
      The audience does not view the coach as a random troll, but as a principled expert whose history demands they speak the truth.

  - context: "CCP: CMF - Origin Story Rendering"
    application: >
      When the CMF generates a visual origin story, it refuses to use hard jump-cuts between the coach's 'Old Life' and 'New Life'. Instead, it uses a visual motif (like a specific color or object) that persists across the transition to visually signal underlying character continuity.
    effect: >
      The viewer's unconscious mind perceives stability and safety in the coach's transformation, anchoring their credibility.

anti_examples:
  - description: >
      A webinar speaker spends 15 minutes detailing a dramatic, chaotic personal breakdown
      without ever explaining how the skills they used to survive it directly relate to the
      highly technical framework they are about to teach.
    why_it_fails: >
      The speaker confused "drama" with "coherence." While the story was emotionally intense,
      the lack of causal connection between the past trauma and the present expertise leaves
      the audience feeling voyeuristic rather than persuaded. The story damages credibility
      because the transition appears random rather than character-driven.

