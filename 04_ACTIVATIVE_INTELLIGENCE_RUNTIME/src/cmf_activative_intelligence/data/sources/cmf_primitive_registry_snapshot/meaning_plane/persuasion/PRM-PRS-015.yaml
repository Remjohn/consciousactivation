trigger_conditions:
  - "When outlining the macro-structure of any presentation, webinar, or beat cluster"
  - "When auditing content that feels 'boring' or 'too theoretical'"
  - "When attempting to persuade an audience to abandon a deeply entrenched behavior"

suppression_conditions:
  - "During emergency, crisis-response communications where immediate tactical safety (pure 'what is' and 'what to do') overrides the need for visionary contrast"

misuse_modes:
  - "Over-Hyping the Future — painting a 'what could be' that is so utopian and disconnected from reality that the audience rejects it as impossible"
  - "Walloping with 'What Is' — spending so much time on the audience's current pain that they become demoralized and tune out before the solution is offered"

