activation_conditions:
  - "User has just completed their first core action (recording, scoring, or challenge day)"
  - "AI Delivery Score has been calculated and is ready to display"
  - "The user's emotional state is positive or neutral (not frustrated from a technical failure)"
  - "No prior social expansion request has been made in this session"

suppression_conditions:
  - "User has not yet completed any core action in the current session"
  - "User is mid-recording or mid-flow — do not interrupt"
  - "User just received a low score and is in recovery/redemption state"

misuse_modes:
  - "Premature social ask — requesting shares before the first win lands"
  - "Win-state inflation — making every micro-action feel like a win, diluting the real reward"
  - "Score-gating too aggressively — setting the quality threshold so high that most users never reach the share prompt"

synergizes_with:
  - "EXP-FBK-001"  # RIM Feedback Discipline — the score IS the win-state
  - "EXP-SOC-001"  # Social Treasures — the share becomes a social treasure
  - "EXP-SAF-001"  # White Hat Recovery — emotional sequencing after the win
  - "EXP-PRG-001"  # Hook Cycle Velocity — the win must happen within the first cycle

conflicts_with:
  - "EXP-TRG-002"  # Aggressive urgency triggers that push action before reward
  - "EXP-SOC-003"  # Identity-Driven Social Proof if applied before user has identity stake

implementation_targets:
  frontend_components:
    - "ScoreRevealScreen — gate share CTA behind score display completion"
    - "SharePromptOverlay — only render after win-state confirmation"
    - "ChallengeProgressBar — trigger share prompt after milestone fill"
  backend_rules:
    - "share_gate: require score_revealed=true before enabling share endpoints"
    - "win_state_tracker: log first_win_achieved per user for analytics"
  telemetry_events:
    - "first_win_state_achieved"
    - "share_prompt_displayed_after_win"
    - "share_completed_after_win"
    - "share_prompt_dismissed"
  experiments:
    - "A/B test: share prompt at 2s vs 5s delay after score reveal"
    - "A/B test: share prompt copy — 'Invite jury' vs 'Challenge a friend'"

experience_metrics:
  entry_rate: 0.3
  react_rate: 0.5
  completion_rate: 0.6
  share_rate: 0.9
  comeback_rate: 0.7
  day7_retention: 0.6
  upgrade_signal: 0.7

crosswalk_id: "XW-WIN-BEFORE-SPREAD"
crosswalk_note: >
  Meaning side: governs how content quality gates determine whether
  output is ready for distribution (quality threshold before publishing).
  Experience side: governs the timing of social expansion requests
  relative to the user's emotional reward state.

notes: >
  This is the single most important timing primitive for Conscious
  Reactions. If the product violates this primitive even once during
  onboarding, the user's referral willingness is permanently damaged.
  Yu-kai Chou calls this the 'Discovery Phase contract' — the product
  must prove its value before asking for social labor. Implementation
  must be strict: no share prompts, no invite buttons, no jury requests
  until score_revealed=true for the current session.
