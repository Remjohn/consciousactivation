summary: >
  Social Capital and Self-Esteem Economy ensures that the primary motivation
  for sharing CCP artifacts is an increase in perceived status or peer
  recognition, rather than financial or systemic bribes. In CCP, we do not
  pay coaches to refer users. Instead, we generate highly premium, biometric-backed
  content (like User Cards and CMF Quote Memes) that coaches actively WANT
  to post on LinkedIn because it makes them look like authoritative, dominant
  speakers. The platform grows by providing the ammunition for their pride.

core_move: >
  Design shareable artifacts that act as verifiable signals of high status,
  competence, or authority, making the act of sharing an ego-driven reward.

why_it_works: >
  Yu-kai Chou (and Brian Burke) note that extrinsic rewards (like paying users
  $10 for a referral) eventually destroy intrinsic motivation. High-net-worth
  coaches will not spam their friends for a $10 discount. However, Core Drive 5
  (Social Influence) dictates that humans will go to immense lengths to protect
  or elevate their social status. By framing the shared artifact as a "Self-Esteem
  Token" (e.g., a card proving they rank in the top 5% of Conviction Density),
  the coach shares it to flex their authority. The referral link is just a silent
  passenger on their status signal.

examples:
  - context: "BOOK: Actionable Gamification - The Foursquare Mayorship"
    application: >
      Foursquare didn't pay users to check in. They offered the title of 'Mayor.'
      Users fought aggressively to check in and share their status on social media
      purely for the social capital and self-esteem boost of publicly owning a location.
    effect: >
      Massive organic growth fueled entirely by the desire to signal status to peers.

  - context: "CCP: The User Card Flex"
    application: >
      A coach earns the Platinum tier in Law28. The system generates a holographic
      User Card detailing their high 'Command' stats. They post it to a private
      coaching mastermind group to prove their speaking dominance.
    effect: >
      The peers see the card, respect the coach's authority, and click the attached
      Silent Referral link to test their own baseline.

  - context: "CCP: The Debate Winner Broadcast"
    application: >
      After winning a Conscious Reactions debate 80 to 20, the coach receives a
      CMF-generated highlight reel. The watermark isn't a cheap 'Try CCP.' It says:
      'Verified Victor: Agency vs In-House Debate.'
    effect: >
      The coach shares the video on LinkedIn to dunk on the opposition, pulling
      their entire audience into the CCP ecosystem to watch the full debate.

  - context: "CCP: The Sunday Postcard Private Validation"
    application: >
      The system tells the coach privately: 'You are pacing better than 85% of
      founders in your cohort.' The coach feels a massive self-esteem boost.
    effect: >
      The coach is now emotionally primed to accept a 'Challenge a peer' prompt,
      acting from a place of high social capital.

  - context: "CCP: CMF Quote Meme"
    application: >
      The Content Factory extracts the sharpest, most controversial sentence from
      the coach's reaction and overlays it on premium Skia graphics.
    effect: >
      The coach posts it because it makes them look brilliant, bypassing any
      hesitation they normally have about self-promotion.

anti_examples:
  - description: >
      A popup that says 'Give us a shoutout on Twitter and we will give you
      50 free AI credits!' attached to a generic, unbranded link.
    why_it_fails: >
      This is a purely extrinsic, left-brain bribe. It offers no social capital
      and actually damages the coach's self-esteem by making them look like a
      shill begging for credits.

