summary: >
  Social Treasures + Group Quests dictate that the most powerful rewards
  in a system cannot be earned by solo grinding; they must be gifted by, or
  earned in collaboration with, other users. In CCP, this means a coach cannot
  self-certify their debate victory or independently earn a "Jury Voted" badge.
  They must invite peers to vote (Social Treasure) or form a faction to
  argue a side (Group Quest). This turns "invite friends" from an annoying
  marketing ask into an intrinsic game mechanic required to unlock status.

core_move: >
  Design high-status rewards that strictly require the participation, votes,
  or gifts of other human users, explicitly blocking solo attainment.

why_it_works: >
  Jane McGonigal outlines that "Ambient Sociability" and "Social Fabric" are
  woven when players must rely on each other for progression. Similarly, Yu-kai
  Chou defines a "Social Treasure" as a reward that you can only get if someone
  else gives it to you. When a system asks a user to "Share this app," it triggers
  marketing fatigue. When a system says, "You need 3 peer votes to unlock the
  Platinum Debate Badge," the user naturally recruits their peers because the
  peers hold the Social Treasure. The referral happens silently as a byproduct
  of gameplay.

examples:
  - context: "BOOK: Reality Is Broken - Farmville's gifted items"
    application: >
      In early social games, the best items could not be bought; they could
      only be sent as gifts from friends. This forced players to invite their
      real-world friends into the game simply to access the necessary resources.
    effect: >
      Created massive viral loops because the referral was disguised as a
      necessary survival/progression mechanic.

  - context: "CCP: Conscious Reactions Debate Jury"
    application: >
      A coach records a take on a hot topic. The AI gives them a high delivery
      score, but the "Industry Consensus" badge remains locked. To unlock it,
      they must share their reaction to Telegram and get 5 unique peers to vote
      'For' their thesis.
    effect: >
      The coach willingly distributes the CCP link to their network to claim their
      Social Treasure (the votes).

  - context: "CCP: Law28 Accountability Pair"
    application: >
      A coach is struggling with the 'Command' tier. The system offers a Group Quest:
      'If you and your accountability partner both hit >90 Conviction Density today,
      you both unlock the Sovereign Vault content early.'
    effect: >
      Instead of solo failure, the coach pressures their peer to perform, creating
      social accountability and shared triumph.

  - context: "CCP: The Supervisor Endorsement"
    application: >
      A new user cannot access the $99/mo Coach OS features by simply paying.
      They must receive an endorsement (Social Treasure) from an existing
      verified operator within the ecosystem who vouches for their authority.
    effect: >
      Creates a highly exclusive, premium feel while forcing users to network
      and bring other high-value operators into the platform's orbit.

  - context: "CCP: Team Reaction Battles"
    application: >
      A prompt is dropped: 'Agency vs In-House.' Coaches record their takes
      and align with a faction. The winning faction's members all receive
      a temporary UI halo on their User Cards.
    effect: >
      Transforms solo recording into a tribal group quest, increasing retention.

anti_examples:
  - description: >
      Offering a coach a 'Gold Star' badge just for sharing a referral link
      to their Facebook wall, regardless of whether anyone clicks it.
    why_it_fails: >
      This is transactional marketing, not a Social Treasure. The coach feels
      like a spammer, their audience ignores the link, and the badge carries
      zero actual status because no human collaboration was required.

