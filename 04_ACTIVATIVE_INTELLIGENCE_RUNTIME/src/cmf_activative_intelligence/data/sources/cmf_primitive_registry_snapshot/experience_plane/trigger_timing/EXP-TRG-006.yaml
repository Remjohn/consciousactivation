summary: >
  Context-Aware System Triggers merge the digital platform with the user's
  physical or professional reality. Instead of pushing prompts on an isolated
  software clock, the system uses environmental signals—such as breaking industry
  news or market shifts—to trigger action. In CCP, this is operationalized by
  the Sovereign CRAL Research Engine (SCRE), which monitors the real world and
  drops Conscious Reactions topics precisely when they are culturally relevant,
  turning reality itself into the trigger.

core_move: >
  Anchor all system prompts to real-world context, external events, or the user's
  immediate environment, completely avoiding self-referential 'app-centric' notifications.

why_it_works: >
  Jane McGonigal argues that Alternate Reality Games (ARGs) are compelling because
  they blur the line between the game and the real world. When a digital system
  reacts to real-world events, it feels alive. If a coach receives a prompt to
  'Practice speaking,' it is a chore. If a coach receives a prompt saying 'Google
  just updated their algorithm 2 hours ago. Your clients are panicking. What is your
  take?', the prompt is anchored in reality. It demands immediate engagement because
  the context provides the urgency.

examples:
  - context: "BOOK: Reality Is Broken - Chore Wars / ARG Triggers"
    application: >
      In ARGs, players receive phone calls or emails based on real-world locations
      or real-world news events. The trigger feels like a spontaneous event in reality,
      not a scheduled alarm from a software app.
    effect: >
      Deep immersion and high urgency because the prompt is tied to uncontrollable reality.

  - context: "CCP: SCRE News-Jack Topic Drop"
    application: >
      The SCRE engine detects a major scandal in the fitness coaching industry. Within
      an hour, it synthesizes an audio brief and drops it to the Telegram Mini App of
      all fitness coaches: 'This just broke. Defend the industry or burn it down. You
      have 3 minutes.'
    effect: >
      The coach drops what they are doing to react because the real-world context dictates
      urgency.

  - context: "CCP: Post-Webinar Geolocation/Time Context"
    application: >
      The system knows a coach just finished a scheduled V2WS webinar. It triggers
      a prompt exactly 10 minutes later: 'Adrenaline is still high. Do an audio
      debrief right now. What question stumped you?'
    effect: >
      Captures the coach in the exact physical and emotional context of the event.

  - context: "CCP: Competitor Action Alert"
    application: >
      The system notes a major influencer in the coach's niche just posted a controversial
      take. The prompt: 'X just claimed cold calling is dead. Counter this thesis.'
    effect: >
      Uses real-world competitive dynamics to fuel the Reaction engine.

  - context: "CCP: Sunday Postcard - Environmental Sync"
    application: >
      The Sunday Postcard doesn't just list metrics; it contextualizes them in reality:
      'You had 3 sales calls this week. You decreased hedging by 14%. How did those
      calls feel different?'
    effect: >
      Connects the platform's data to the coach's real-world business outcomes.

anti_examples:
  - description: >
      Sending a push notification saying 'It has been 3 days since you logged in.
      Come back and record a random drill!'
    why_it_fails: >
      It is entirely app-centric and self-referential. It relies on the user caring
      about the app for the app's sake, rather than using a real-world hook to
      pull them in.

