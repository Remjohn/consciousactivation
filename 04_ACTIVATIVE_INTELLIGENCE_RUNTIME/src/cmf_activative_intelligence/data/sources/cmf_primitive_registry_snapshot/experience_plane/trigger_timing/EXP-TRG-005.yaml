summary: >
  First Major Win-State prevents the product from asking users to share,
  invite, or recruit before they have experienced 'Fiero'—the neurochemical
  rush of triumph over a genuinely difficult challenge. Jane McGonigal emphasizes
  that an 'Epic Win' is only felt if the challenge is hard but fair. In CCP,
  this means we do not ask a coach to share a User Card or invite a peer
  until they have actually conquered a Law28 constraint or won a Debate,
  ensuring the share is an act of pride rather than a marketing favor.

core_move: >
  Gate all social and expansion triggers behind a mathematically proven,
  hard-won success state, completely suppressing them during onboarding or failure.

why_it_works: >
  McGonigal defines 'Fiero' as the emotion of triumph over adversity, which
  is one of the most powerful neurochemical highs we can experience. If a product
  asks for a share before Fiero is achieved, the user feels manipulated. If it
  gives an unearned reward (a fake win), the user feels patronized. But if the
  system sets a strict biometric threshold (e.g., 'zero filler words'), and the
  user hits it after three tries, the resulting Fiero makes them WANT to show
  the world what they achieved.

examples:
  - context: "BOOK: Reality Is Broken - The Epic Win"
    application: >
      In World of Warcraft, players do not invite their friends to look at their
      level 1 character. They invite friends to witness an 'Epic Win'—defeating
      a boss after weeks of failure. The difficulty creates the desire to share.
    effect: >
      Sharing becomes a natural byproduct of pride, not an extractive UI pattern.

  - context: "CCP: Law28 Platinum Tier"
    application: >
      A coach struggles with the Pause Architecture drill for 4 days. On day 5,
      their waveform is clean, and the NIM stack awards them a 92/100, bumping
      them to the Platinum tier. ONLY at this moment does the Telegram bot offer
      the 'Share your User Card' button.
    effect: >
      The coach eagerly shares the card because it represents a real, hard-won
      victory, accelerating Silent Referral.

  - context: "CCP: Conscious Reactions Debate Victory"
    application: >
      A coach participates in a high-stakes debate against a peer. After 24 hours,
      the final vote tally comes in: 45 to 12. The system triggers a victory
      animation and immediately offers a one-tap 'Broadcast Victory to LinkedIn' asset.
    effect: >
      The coach shares the CMF asset to flex their victory, expanding the ecosystem.

  - context: "CCP: The Redemption Round Triumph"
    application: >
      A coach's first reaction is rejected by the Anti-Centroid gate. They use the
      Guardian Agent's advice, record a sharper take, and pass the gate. The system
      highlights the delta: 'You fixed your hedging.' The share prompt appears.
    effect: >
      The contrast between failure and success amplifies the Fiero, driving the share.

  - context: "CCP: Testimonial Builder Trigger"
    application: >
      The system does not ask for a testimonial via email after 30 days. It waits
      for the coach to cross a major conviction density milestone. At that exact
      moment of success, the Silent Testimonial Builder asks: 'Record a 30-second
      voice note on how that felt.'
    effect: >
      The testimonial is raw, authentic, and fueled by the immediate high of the win.

anti_examples:
  - description: >
      Pumping out a generic 'You recorded your first voice note! Share it!' pop-up
      after a low-effort, heavily hedged 15-second baseline recording.
    why_it_fails: >
      The user hasn't done anything difficult. There is no Fiero. The prompt feels
      cheap and manipulative, actively degrading the platform's premium authority.

