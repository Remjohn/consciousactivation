summary: >
  Kairos is the principle of delivering an intervention, prompt, or upsell
  at the exact opportune moment when the user's receptivity (Motivation)
  and capacity to act (Ability) are simultaneously peaking. In CCP, this
  means never relying on arbitrary cron-job schedules. We only prompt for
  referrals, challenge upgrades, or deeper vulnerability when the user has
  just experienced a win, demonstrated high engagement, or explicitly signaled
  a "search phase" for help.

core_move: >
  Monitor telemetry for spikes in user motivation or ability, and trigger
  requests or escalations exclusively within those narrow opportune windows.

why_it_works: >
  BJ Fogg's Behavior Model (B=MAP) dictates that a Prompt will fail if Motivation
  and Ability are not sufficiently high. The concept of "Kairos" (the opportune
  moment) recognizes that Motivation is highly volatile. A user might be highly
  motivated immediately after seeing their conviction score jump 15%, but zero
  percent motivated 4 hours later. By dynamically deploying prompts at the apex
  of these emotional spikes, the system achieves vastly higher conversion rates
  without feeling spammy.

examples:
  - context: "BOOK: Persuasive Technology - The error message opportunity"
    application: >
      Fogg describes how software often misses Kairos. When a user experiences
      an error, they are highly motivated to fix it. If the software offers a
      troubleshooting tutorial at that exact moment, the user takes it. If offered
      randomly the next day, they ignore it.
    effect: >
      Matches the intervention perfectly to the user's immediate state of need.

  - context: "CCP: Conscious Reactions Debate Win"
    application: >
      A coach checks their Telegram Mini App and sees they just won a Debate Mode
      by 40 votes. At this exact moment of high pride and motivation, the system
      triggers the Kairos prompt: 'Ready to refine that delivery even further?
      Start the Law28 Challenge.'
    effect: >
      The $29/mo Continuity upgrade is offered exactly when the value of communication
      mastery is most visceral.

  - context: "CCP: Law28 Hedge Threshold Exceeded"
    application: >
      During a Law28 drill, the AI detects the coach hedged 7 times in 60 seconds
      (high frustration/low ability moment). The system immediately offers a
      'Redemption Round with Coach Guidance' prompt.
    effect: >
      Provides the exact scaffolding needed precisely when the user realizes they
      are failing.

  - context: "CCP: Silent Referral Peer Validation"
    application: >
      A peer votes on a debate and sees their chosen side win. The system triggers:
      'You have good judgment. Want to try a solo reaction?'
    effect: >
      Capitalizes on the micro-win of voting to escalate them to speaking.

  - context: "CCP: Sunday Postcard Reflection"
    application: >
      After the user reads their highly personalized Sunday Postcard (a moment of
      deep reflection and high system trust), the system prompts them to generate
      a public Testimonial Proof artifact.
    effect: >
      The user is already reflecting on their growth, making the testimonial request
      feel natural rather than extractive.

anti_examples:
  - description: >
      Sending an automated marketing email at 9:00 AM on a Tuesday asking the
      coach to upgrade to the $29/mo tier, regardless of when they last used the app.
    why_it_fails: >
      A complete violation of Kairos. The user has no immediate motivation, no
      recent win-state, and is likely busy. The prompt fails because B=MAP is ignored.

