summary: >
  Digital Motivation Leverage dictates that the platform must trigger engagement
  by explicitly amplifying the user's pre-existing, intrinsic desire to improve
  (e.g., getting better at speaking to grow their business), rather than trying
  to manufacture motivation using transactional digital rewards (points, badges).
  In CCP, this means biometric scores and streaks are framed not as game mechanics
  for their own sake, but as high-fidelity mirrors reflecting the coach's actual
  professional growth.

core_move: >
  Frame every system trigger, score, and notification explicitly around the
  user's intrinsic goal of professional mastery, never around the extrinsic goal
  of collecting points within the app.

why_it_works: >
  Brian Burke emphasizes that gamification fails when it tries to use points
  or badges as the primary motivation (transactional engagement). True gamification
  succeeds when it aligns the player's goals with the organization's goals
  (emotional engagement). A coach doesn't want CCP points; they want to be a
  commanding speaker who can close high-ticket clients. By explicitly framing
  the AI delivery score as a measure of 'Authority' rather than a 'Game Score,'
  the system leverages their deep intrinsic motivation to improve.

examples:
  - context: "BOOK: Gamify - The Goal Alignment Principle"
    application: >
      A successful fitness app doesn't say 'Earn 50 points by walking.' It says
      'You are 500 steps closer to your goal of running a 5K.' The points are
      just telemetry for the intrinsic goal.
    effect: >
      The user is motivated by their own desire, not by the app's arbitrary economy.

  - context: "CCP: The Law28 Onboarding Promise"
    application: >
      During Law28 onboarding, the first trigger isn't 'Earn badges for recording!'
      It asks: 'What is your current biggest fear on camera?' and promises:
      'We will track your hedge frequency until that fear is gone.'
    effect: >
      The user commits because the system is a lever for their personal growth,
      not a game they are being asked to play.

  - context: "CCP: Biometric Score Framing"
    application: >
      When the NIM stack returns a 92/100, the UI doesn't just say 'High Score!'.
      It says: 'Your Conviction Density is 92/100. This is the biometric signature
      of a Sovereign Leader. Your audience felt that certainty.'
    effect: >
      The score is directly mapped to their real-world identity and professional goals.

  - context: "CCP: Redemption Round Trigger"
    application: >
      When a coach fails a drill, the trigger doesn't say 'You lost your streak.'
      It says: 'Your pacing collapsed under pressure. In a live webinar, that
      costs you sales. Let's fix it right now.'
    effect: >
      The trigger leverages the real-world consequence of the failure, creating high urgency.

  - context: "CCP: Silent Referral Motivation"
    application: >
      The system doesn't offer 'Invite 3 friends to get a free month.' It offers:
      'Debate this topic. If your delivery is stronger than the industry average,
      the jury will vote you to the top.'
    effect: >
      The referral mechanism is powered by the intrinsic desire for status and mastery.

anti_examples:
  - description: >
      Implementing a generic points system where users get '10 CCP Coins' for logging
      in, and offering a leaderboard of who has the most 'Coins.'
    why_it_fails: >
      This is exactly what Burke warns against. It is pure transactional motivation.
      High-net-worth coaches do not care about fake coins. It infantilizes the product
      and destroys the premium brand positioning.

