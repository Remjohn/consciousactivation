summary: >
  Friction-Zero Ability demands that the absolute core behavior of the platform
  (hitting 'Record') must have mathematically zero start-up cost. There can be
  no pre-requisite reading, no software setup, and no cognitive 'what do I say'
  burden. If the user has a phone in their hand, they must be able to record
  within 2 seconds of the thought occurring.

core_move: >
  Architect the software and the content delivery so that the user's phone is
  always primed to record, bypassing all traditional app-loading, login, and
  context-gathering friction.

why_it_works: >
  Fogg's model dictates that when Motivation is at its lowest (e.g., the user is
  exhausted after a 10-hour workday), the only way a behavior occurs is if Ability
  is off the charts. Krug echoes this by stating that users 'satisfice'—if recording
  takes effort, they will choose the easier option (not recording). By embedding
  the recorder directly into Telegram (an app already open on their phone) and
  auto-generating the topic, we reduce physical and mental friction to absolute zero.

examples:
  - context: "BOOK: Tiny Habits - The Push-up Trigger"
    application: >
      Instead of 'Go to the gym for 1 hour' (high friction), the habit is 'Do 2
      push-ups after you pee.' The physical startup cost is zero because you are
      already standing up in a private room.
    effect: >
      Guarantees execution even on the lowest motivation days.

  - context: "CCP: Seamless Telegram Authorization"
    application: >
      The user never creates a password. When they tap a debate link, the Mini App
      pulls their Telegram auth token automatically and logs them in silently in the
      background.
    effect: >
      Eliminates the #1 cause of digital churn: forgotten passwords and login screens.

  - context: "CCP: Auto-Primed Microphone"
    application: >
      When the Web App opens, the user does not need to navigate to a 'Recording Studio'
      tab. The primary view *is* the recording studio. The mic permission is cached,
      and the 'Record' button is active immediately.
    effect: >
      Reduces physical effort from multiple navigations to a single tap.

  - context: "CCP: The Guided Take (Zero Brain Cycles)"
    application: >
      If a user hesitates for 5 seconds on the record screen, the UI flashes a
      'Fill in the Blank' prompt: 'I disagree with the Jury because...'
    effect: >
      Removes the cognitive friction of inventing an opening sentence from scratch.

  - context: "CCP: Offline Mode Queueing"
    application: >
      If the user is on a subway with bad service, the 'Record' button still works.
      The app caches the audio locally and auto-uploads when service returns,
      rather than throwing a frustrating 'Network Error' wall.
    effect: >
      Prevents environmental friction from blocking the core behavior.

anti_examples:
  - description: >
      The moment the user has to record their first reaction but hasn't allowed mic
      permissions yet, the app throws an aggressive OS pop-up blocking the screen
      without explaining why.
    why_it_fails: >
      Massive friction spike. The user feels intruded upon, doesn't know what the
      app will do with their mic, and clicks 'Deny', permanently breaking the core loop.

