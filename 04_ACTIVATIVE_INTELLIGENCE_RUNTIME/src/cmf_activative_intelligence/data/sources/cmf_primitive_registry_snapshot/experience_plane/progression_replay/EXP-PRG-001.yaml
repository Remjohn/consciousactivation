summary: >
  Hook Cycle Velocity dictates that the speed at which a user passes through
  the four stages of the Hook model (Trigger, Action, Variable Reward, Investment)
  determines the strength of the habit. A slow cycle (e.g., waiting 3 days for
  a human coach to grade a drill) kills progression. In CCP, the AI Delivery
  Score and the instant Telegram interface guarantee hyper-velocity. A coach
  receives a trigger, records in 60 seconds, receives a variable score in 5
  seconds, and immediately 'invests' by launching a counter-take, completing
  the entire progression loop in under 3 minutes.

core_move: >
  Eliminate all latency between the Action and the Variable Reward, and ensure
  the Reward screen immediately prompts the next Investment to chain loops together
  at maximum velocity.

why_it_works: >
  Nir Eyal emphasizes that habits are formed by frequency and velocity. If a
  user acts and has to wait hours for the reward (the feedback), the neurological
  link between the effort and the dopamine hit is severed. By using the CMF
  to process audio instantaneously, we achieve 'Hook Cycle Velocity'. The user
  is still in a state of high emotional arousal when the score hits. If the
  score is variable (unpredictable), they immediately crave a replay to 'fix'
  the score, triggering the next loop instantly.

examples:
  - context: "BOOK: Hooked - Instagram's Photo Filter Velocity"
    application: >
      Instagram didn't invent photo sharing, but they eliminated the latency.
      Take photo -> instant filter -> instant post -> instant likes. The velocity
      of the reward loop created a daily compulsion.
    effect: >
      Unprecedented daily active usage driven by the speed of the progression loop.

  - context: "CCP: The 5-Second Score Reveal"
    application: >
      A coach finishes a 3-minute Law28 drill. The system does not say 'Check
      your email tomorrow for results.' It displays a 5-second 'Analyzing
      Resonance' animation, then instantly drops the score, capitalizing on
      the user's post-recording adrenaline.
    effect: >
      The immediate feedback acts as a massive variable reward, driving instant replay desire.

  - context: "CCP: The Instant Rebuttal Link"
    application: >
      The moment a coach loses a debate, the failure screen contains a pre-filled
      Telegram link to start a 'Counter-Take'.
    effect: >
      The 'Investment' phase of the hook is executed before the user can close the app.

  - context: "CCP: Audience Mirror Quiz Velocity"
    application: >
      An audience member swipes 'Agree' on a take. The UI instantly swaps to:
      'The Jury disagrees. Why are you right? Tap to record.'
    effect: >
      Zero latency between the passive action and the active progression prompt.

  - context: "CCP: Sunday Postcard Automation"
    application: >
      The Sunday Postcard isn't a static email. It's an interactive Telegram
      message. 'You ranked 4th this week. Tap to challenge the #3 coach.'
    effect: >
      The weekly review instantly launches the new weekly progression cycle.

anti_examples:
  - description: >
      A coach records a highly emotional debate take, hits submit, and sees:
      'Thank you! Your recording has been sent to our admins for review.
      Check back in 24-48 hours.'
    why_it_fails: >
      The velocity is dead. By the time the reward (the review) arrives, the
      coach has completely forgotten the emotional context of the recording.
      The progression loop is severed, and replay desire drops to zero.

