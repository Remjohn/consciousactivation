activation_conditions:
  - "User completes a core action (recording, voting) and expects feedback"
  - "System has the backend capacity to deliver the variable reward instantly"

suppression_conditions:
  - "User is in a reflective, long-form learning mode (e.g., reading a textbook module)"

misuse_modes:
  - "Frictionless Garbage — making the loop so fast that the user can literally spam recordings without thinking, turning it into a clicker game."
  - "Predictable Velocity — the loop is fast, but the reward is always the same (e.g., always 10 points), killing the variable curiosity."

synergizes_with:
