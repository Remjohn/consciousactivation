summary: >
  Discover -> On-board -> Immerse -> Master -> Replay dictates that the UI
  and the demands placed on the user must explicitly evolve as they age in the
  system. A Day 1 user should not see the same interface, metrics, or
  challenges as a Day 30 user. In CCP, we do not drop a new prospect into a
  complex 'Ranked Debate Jury'. We route them through Discovery (a viral link),
  On-boarding (a simple Voice DNA baseline), Immersion (the 7-Day challenge),
  Mastery (Supervisor status), and Replay (Live-ops debates). This prevents
  progression walls and early churn.

core_move: >
  Architect the platform as a state-changing progression system where the
  available features, required skill level, and visible metrics unlock
  sequentially based on the user's maturity phase.

why_it_works: >
  Andrzej Marczewski and Yu-kai Chou both warn that if you show a user the
  'Mastery' endgame (e.g., complex analytics dashboards, global leaderboards)
  during 'On-boarding', they experience cognitive overload and bounce. Conversely,
  if a veteran user only ever experiences the 'On-boarding' loop, they experience
  'Replay Fatigue' and churn out of boredom. By explicitly designing the 5-phase
  journey, the system continuously scales its complexity to match the user's
  growing skill, keeping them in the Flow Channel indefinitely.

examples:
  - context: "BOOK: The Gamification Design Handbook - The RPG Skill Tree"
    application: >
      In a role-playing game, you do not start with 50 spells. You start with
      one. You only unlock the menu for the other 49 after you have mastered the
      first one. The interface literally grows with you.
    effect: >
      Maintains perfect engagement by balancing challenge and skill at every moment.

  - context: "CCP: The Discovery to On-board Handoff"
    application: >
      A prospect clicks a Silent Referral link (Discovery). They are not asked to
      buy anything. They are asked to swipe 'Agree/Disagree' on a take, which
      soft-lands them into recording a simple baseline response (On-boarding).
    effect: >
      Converts cold traffic with near-zero friction.

  - context: "CCP: The Immersion Phase (7-Day Challenge)"
    application: >
      Once baselined, the user enters Immersion. The UI strips away extraneous
      features like the 'Jury Mode' or 'Coach OS' settings. The only focus is
      completing one daily 60-second drill for 7 days.
    effect: >
      Prevents feature bloat from destroying early habit formation.

  - context: "CCP: The Mastery Unlock (Law28)"
    application: >
      After Day 7, the UI evolves. The 'Analytics' tab appears, revealing granular
      pacing and conviction metrics. The user is invited into the 28-day mastery
      track, utilizing the skills built during Immersion.
    effect: >
      Provides a massive 'Level Up' moment that justifies the $29/mo upgrade.

  - context: "CCP: The Replay Phase (Coach OS)"
    application: >
      A veteran coach has completed Law28. To prevent churn, they transition to
      Replay. The UI unlocks 'Operator Mode,' allowing them to launch their own
      topics and judge their own communities.
    effect: >
      The user transitions from playing the game to owning a piece of the arena,
      securing long-term $99/mo retention.

anti_examples:
  - description: >
      Dropping a Day 1 user into a dashboard containing 15 different features,
      a complex analytics graph, and a list of 50 active debates.
    why_it_fails: >
      Complete cognitive overload. The user has no idea what the 'core action'
      is, feels intimidated by the complexity, and abandons the app immediately.
      Progression is destroyed by a lack of scaffolding.

