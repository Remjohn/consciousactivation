crosswalk_id: "XW-ALFRED-EFFECT"
crosswalk_note: >
  Meaning side: governs how the coach's tone is extracted and preserved in the Content Factory.
  Experience side: governs how the platform's agent speaks back to the coach, mirroring their style.

notes: >
  The Alfred Effect is the definitive retention mechanism for Coach OS. Without it, the
  system is just a utility that can be replaced by a cheaper competitor. With it, the
  system becomes an indispensable partner.
