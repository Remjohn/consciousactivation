activation_conditions:
  - "The user has completed enough interactions (e.g., >3 recorded reactions) to establish a behavioral baseline."
  - "The system detects a recurring pattern in the user's performance data or aesthetic choices."
  - "The user is returning for a new session and requires a contextual prompt."

suppression_conditions:
  - "The user is on their very first session (where the system lacks enough data to make authentic Alfred-style interventions)."
  - "The user explicitly opts out of telemetry or algorithmic assistance."

misuse_modes:
  - "The Creepy Valley — Providing tailoring that is *too* accurate based on implicit data the user didn't know they were sharing, making them feel surveilled."
  - "Static Personas — Asking the user to pick an archetype once, and never evolving the agent's tone as the user grows in mastery."
  - "High-Friction Customization — Demanding the user manually configure 50 settings instead of the system intelligently inferring them (violating the 'Alfred' dynamic)."

