summary: >
  Behavioral Forgiveness programmatically recognizes when a user has lapsed
  (e.g., missed 3 days of Law28, ignored a debate prompt) and provides a
  "welcome back" path that actively ignores or bridges the gap, completely
  avoiding shame or cognitive overload. In CCP, if a coach returns after a
  lapse, the system does not demand they "make up" the missed days or rub
  a broken streak in their face. It uses a System 1 gateway to pull them
  instantly back into the flow, removing the psychological friction of returning.

core_move: >
  When a user returns from a period of inactivity or failure, immediately offer
  a frictionless, zero-guilt action to reintegrate them, explicitly bypassing
  penalties or 'catch-up' mechanics.

why_it_works: >
  Stephen Wendel and BJ Fogg both identify that the primary reason users don't
  return to an app after a lapse is the anticipation of cognitive friction
  (System 2 overload) or shame. If they think, "I missed 4 days, now I have to
  do 5 drills to catch up," their brain rejects the effort. By building
  "Behavioral Forgiveness" into the architecture, the CCP acts like a good
  human coach: it doesn't yell at you for missing a workout; it just hands you
  the weights for today's workout. This eliminates the 'what the hell effect'
  where a minor lapse turns into permanent churn.

examples:
  - context: "BOOK: Designing for Behavior Change - The Guilt-Free Return"
    application: >
      A successful habit app doesn't send push notifications saying 'You failed
      your goal this week.' It sends a message saying, 'Today is a new day. Tap
      here to log one glass of water.'
    effect: >
      Bypasses the shame response and lowers the Ability hurdle so the user can
      restart the CREATE funnel immediately.

  - context: "CCP: Law28 Streak Amnesty"
    application: >
      A coach misses 2 days of their 28-day streak. Instead of resetting to Day 1
      and destroying their motivation, the system offers 'Amnesty': 'Record a
      double-length take right now, and the system will bridge your streak. Tap
      to accept.'
    effect: >
      The user jumps at the chance to save their investment, converting a lapse
      into a high-engagement session.

  - context: "CCP: The Ghosted Debate"
    application: >
      A coach starts a debate but ghosts it for 3 days. Instead of a 'You lost by
      forfeit' message, the Agent says: 'The jury has moved on to a new topic. I
      saved your spot in the new arena. Ready?'
    effect: >
      Seamlessly transitions them from a failed action into a fresh, unblemished opportunity.

  - context: "CCP: The Sunday Postcard Soft Landing"
    application: >
      If a user was completely inactive for the week, the Sunday Postcard doesn't
      show a bunch of zeros. It dynamically alters the template: 'A quiet week.
      Sometimes the best speaking is listening. Here is the top reaction from your
      lane to calibrate your ear.'
    effect: >
      Transforms a zero-engagement week into a passive-value week, maintaining the
      habit of opening the Sunday Postcard.

  - context: "CCP: The 'Just Swipe' Return"
    application: >
      After a 10-day lapse, the first prompt they receive is not 'Record a Voice
      Note' (high System 2 friction). It's 'Swipe left or right on this 10-second
      claim.'
    effect: >
      Uses a System 1 gateway to break the ice and get them back in the app.

anti_examples:
  - description: >
      Sending an automated, passive-aggressive email: 'We noticed you haven't
      logged in. Your streak is gone. Do you still care about your coaching business?'
    why_it_fails: >
      This induces massive shame and resentment. The coach will delete the email,
      cancel the subscription, and actively badmouth the brand.

