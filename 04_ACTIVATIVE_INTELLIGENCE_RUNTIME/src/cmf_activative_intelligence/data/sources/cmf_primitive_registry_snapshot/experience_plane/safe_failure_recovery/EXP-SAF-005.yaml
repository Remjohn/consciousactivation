activation_conditions:
  - "User has exceeded a predefined dormancy threshold (e.g., 48 hours without action)"
  - "User returns to the platform after breaking a consecutive streak"

suppression_conditions:
  - "User is highly active (do not offer amnesty to someone who hasn't lapsed)"
  - "User has abused the amnesty system multiple times consecutively"

misuse_modes:
  - "Infinite Amnesty — where missing 27 days of a 28-day challenge still results in 'winning' the challenge, destroying all platform integrity."
  - "Hidden Penalties — saying 'Welcome back!' but secretly downranking their algorithm visibility."

synergizes_with:
  - "EXP-TRG-006" # Context-Aware System Triggers (Use a real-world event as the excuse to bring them back)
  - "EXP-SOC-005" # Collaborative Role Architecture (Bring them back as a Juror, not a Speaker)

conflicts_with:
  - "EXP-TRG-002" # High velocity assumes daily engagement; forgiveness accommodates the break.

implementation_targets:
  frontend_components:
    - "WelcomeBackGateway — a simplified, low-friction UI state specifically for lapsed users"
    - "AmnestyToggle — a UI element allowing them to 'spend' a token to save a streak"
  backend_rules:
    - "forgiveness_engine: if (days_since_last_action > 3) { route_to_system_1_prompt(); suppress_streak_loss_notifications(); }"
  telemetry_events:
    - "dormancy_threshold_crossed"
    - "behavioral_forgiveness_prompt_sent"
    - "user_recovered_post_lapse"
  experiments:
    - "A/B test: Offering Streak Amnesty for free vs requiring a 'Double Effort' task to earn the amnesty"

