summary: >
  Reflective Scoring transforms raw platform metrics into mirrors
  of the user's professional identity. At the reflective level, users
  form attachments to products because of the stories those products
  tell about who the user is. For CCP, the AI Delivery Score must
  never look or sound like a generic report card. It must be framed
  as an elite performance benchmark used by top-tier professionals.
  By elevating the language and visual presentation, we turn critique
  into a premium coaching insight that validates their identity as a
  master, driving deep loyalty and $99 Coach OS upgrades.

core_move: >
  Frame performance data and system feedback using elite, professional
  language and high-end visual design that appeals directly to the user's
  highest self-image.

why_it_works: >
  The Reflective level of the brain governs self-image, pride, and
  long-term memory. When feedback is presented as a school grade
  (e.g., 'You spoke too fast: 60/100'), it triggers defensiveness or
  shame. When the exact same data is presented as an elite diagnostic
  (e.g., 'Your pacing breached the optimal authority threshold'), it
  triggers professional pride and a desire for mastery. The user
  trusts the system more because the system respects their status.

examples:
  - context: "AI Delivery Score Reveal after a Reaction (1 BOOK)"
    application: >
      Instead of a flat number and a red 'Needs Improvement' tag, the
      UI presents the score inside a dark, highly technical dashboard
      resembling a Wall Street terminal. The copy reads: 'Your baseline
      conviction is in the Top 20%. However, micro-inflections in the
      final 10 seconds signaled hesitation, reducing overall semantic
      resonance.'
    effect: >
      The user feels like an elite athlete receiving biomechanical
      feedback. The critique is absorbed without ego injury because
      the framing assumes they are operating at a master level. Trust
      in the AI's sophistication skyrockets.

  - context: "Up-selling the $99 Coach OS Tier (CCP)"
    application: >
      The upgrade CTA does not list utilitarian features ('Unlock 5
      more charts'). It sells identity: 'What are your micro-inflections
      signaling to high-ticket clients? Unlock Supervisor Pairing to
      access the elite acoustic analytics used by 7-figure earners.'
    effect: >
      The user evaluates the price not against the utility of software,
      but against the value of their professional identity. Purchasing
      becomes an investment in maintaining their self-image as a top-tier
      authority.

  - context: "Weekly Performance Recap in Telegram (CCP)"
    application: >
      The Agent sends a summary: 'Your authority retention improved by
      12% this week during high-stakes debate loops. You are establishing
      a dominant acoustic baseline.'
    effect: >
      The coach feels seen and validated. The system is functioning as a
      high-end executive coach, not a generic tracking bot. This builds
      massive retention.

  - context: "Jury Vote Results Display (CCP)"
    application: >
      Instead of 'You lost the vote 40 to 60', the UI displays:
      'The Jury acknowledged your technical accuracy, but the opposing
      take generated higher visceral alignment. Analyze the gap to reclaim
      the room.'
    effect: >
      The loss is framed as a strategic misalignment rather than a personal
      failure, protecting the user's ego and encouraging them to study the
      opponent's take rather than churning in frustration.

anti_examples:
  - description: >
      Displaying a giant red 'F' or 'Poor' when the coach stumbles
      during a recording.
    why_it_fails: >
      This is a direct assault on the coach's reflective identity as a
      professional speaker. It creates shame and resentment toward the
      system, almost guaranteeing immediate churn.

  - description: >
      Using overly playful, childish gamification language like 'Oops!
      Try again to get the shiny gold star!' for score corrections.
    why_it_fails: >
      It infantalizes the user. Elite coaches expect the platform to
      match their professional maturity. Childish language breaks the
      premium trust architecture.

