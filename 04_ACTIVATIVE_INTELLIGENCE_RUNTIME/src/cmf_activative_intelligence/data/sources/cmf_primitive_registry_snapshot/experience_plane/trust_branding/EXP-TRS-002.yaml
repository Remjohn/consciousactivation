crosswalk_id: "XW-REF-SCORE"
crosswalk_note: >
  Meaning side: governs the actual diagnostic (PSY/ACT primitives) that generates
  the feedback.
  Experience side: governs how that diagnostic is packaged, phrased, and visually
  delivered to protect ego and elevate status.

notes: >
  The AI's accuracy must be absolute to support the emotional weight of
  Reflective Scoring. If the system uses elite language but the actual
  NLP/acoustic benchmarking is obviously wrong, the user will feel deeply
  manipulated and insulted.
