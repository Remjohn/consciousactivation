schema_version: ca-phase04-gap-ledger/v1
gaps:
- gap_id: P4-GAP-001
  severity: HIGH
  status: OPEN
  affected_specs: TS-INT-001
  finding: Full fault-injection, migration, downstream acknowledgement, revocation
    and cancellation semantics are not complete.
  next_action: Implement targeted repository fault injection, legacy-shape migration
    fixtures, consumption acknowledgement and revocation tests.
- gap_id: P4-GAP-002
  severity: HIGH
  status: OPEN
  affected_specs: TS-INT-002
  finding: External ASR/diarization, rational timebase normalization, drift correction
    and selective transcript correction are not implemented.
  next_action: Add provider-neutral transcript adapters, integer tick conversion,
    drift receipts and local invalidation.
- gap_id: P4-GAP-003
  severity: HIGH
  status: OPEN
  affected_specs: TS-INT-003
  finding: Automated shot/transition detection, VFR presentation-order evidence, uncertainty
    profiles and geometry applicability remain outside the deterministic input-driven
    core.
  next_action: Add OmniShotCut-compatible adapter, presentation-frame index, uncertainty
    records and geometry profile support.
- gap_id: P4-GAP-004
  severity: HIGH
  status: OPEN
  affected_specs: TS-INT-004
  finding: Complete routeability/quality evaluation, boundary correction and AIR acknowledgement
    workflows are not implemented.
  next_action: Add evaluator contracts, boundary-expansion candidates, selective invalidation
    and AIR handoff acknowledgement.
- gap_id: P4-GAP-005
  severity: HIGH
  status: OPEN
  affected_specs: TS-INT-005
  finding: Full inventory-entry approval lifecycle, restriction inheritance, consumer
    acknowledgement, revocation and migration are not implemented.
  next_action: Add entry-level lifecycle, monotonic restrictions, consumer-scoped
    acknowledgement and migration tests.
- gap_id: P4-GAP-006
  severity: HIGH
  status: OPEN
  affected_specs: TS-INT-006
  finding: Real multimodal capture, full outcome corpus, source-tail correction, selective
    invalidation and historical migration are not implemented.
  next_action: Add live/imported capture adapters, evaluator corpus, correction/supersession
    and replay fixtures.
- gap_id: P4-GAP-007
  severity: CRITICAL
  status: OPEN
  affected_specs: TS-INT-007
  finding: The live-session engine is deterministic foundation only; real IAC resolution,
    AIR proposal verification, observation-driven state advancement, tenant security,
    redaction and durable/in-memory conformance are incomplete.
  next_action: Build the live Interview execution vertical with exact AIR/IAC adapters,
    observation commands, security and repository conformance.
- gap_id: P4-GAP-008
  severity: HIGH
  status: OPEN
  affected_specs: ALL
  finding: Per-spec direct acceptance evidence is incomplete even where core implementation
    exists.
  next_action: Complete criterion-specific tests and issue later per-spec acceptance
    receipts before claiming full Spec completion.
- gap_id: P4-GAP-009
  severity: EXTERNAL
  status: DEFERRED
  affected_specs: ALL
  finding: Real human interview evidence, external model/provider execution and production
    deployment are absent.
  next_action: Close only with separately authorized real-source, provider and production
    evidence.
- gap_id: P4-GAP-010
  severity: GOVERNANCE
  status: DEFERRED
  affected_specs: ALL
  finding: Candidate authority remains non-current and no production/certification
    authority is granted.
  next_action: Preserve claim ceiling until separate attributable authority receipts
    exist.
