schema_version: cmf-builder-allowed-file-scope/v1
story_id: ST-01.02
active_mode: SYNTHETIC_DEFINITION
default: DENY
existing_files_allowed_to_modify:
  - path: src/cmf_builder/domain/run.py
    exact_change: add_source_lock_reference_event_replay_and_state_hash_support
  - path: src/cmf_builder/application/authority.py
    exact_change: add_LOCK_EVIDENCE_WORKSPACE_action_only
  - path: src/cmf_builder/application/ports.py
    exact_change: add_typed_source_workspace_and_atomic_source_lock_repository_ports
  - path: src/cmf_builder/adapters/in_memory_run_repository.py
    exact_change: add_atomic_development_test_source_lock_commit_and_query_support
  - path: src/cmf_builder/adapters/__init__.py
    exact_change: add_SOURCE_DIAGNOSTIC_to_SOURCE_LOCKED_edge_and_source_lock_prerequisite_to_the_synthetic_profile_only
  - path: tests/stories/st_01_01/test_architecture_boundary.py
    exact_change: add_the_three_new_ST_01_02_source_modules_to_EXPECTED_SOURCE_FILES_only
  - path: tests/stories/st_01_01_synthetic_proof/test_failure_boundaries.py
    exact_change: add_the_three_new_ST_01_02_source_modules_to_the_exact_expected_source_set_only
new_source_files_allowed:
