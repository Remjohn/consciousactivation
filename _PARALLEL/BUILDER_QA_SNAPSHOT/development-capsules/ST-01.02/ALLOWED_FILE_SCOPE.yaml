  - tests/stories/st_01_02/test_acceptance.py
  - tests/stories/st_01_02/test_source_identity.py
  - tests/stories/st_01_02/test_archive_and_path_safety.py
  - tests/stories/st_01_02/test_authority_and_idempotency.py
  - tests/stories/st_01_02/test_observability_and_rollback.py
  - tests/stories/st_01_02/test_architecture_boundary.py
completion_outputs_allowed:
  - development-capsules/ST-01.02/completion/IMPLEMENTATION_REPORT.md
  - development-capsules/ST-01.02/completion/TEST_RESULTS.json
  - development-capsules/ST-01.02/completion/OBSERVABILITY_EVIDENCE.yaml
  - development-capsules/ST-01.02/completion/FILE_CHANGE_MANIFEST.yaml
  - development-capsules/ST-01.02/completion/ROLLBACK_EVIDENCE.md
  - development-capsules/ST-01.02/completion/STORY_COMPLETION_RECEIPT.yaml
read_only_required_inputs:
