  - development-capsules/ST-01.02/SYNTHETIC_SOURCE_PROFILE.json
explicitly_prohibited:
  - requirements_Epics_or_other_Story_definitions
  - PRDs_constitution_ADRs_or_technical_specifications
  - canonical_category_or_compilation_target_registries
  - contract_or_database_schemas
  - Format02_reference_artifacts
  - VAE_Delegation_or_Program_Control_files
  - external_dependencies_or_lockfiles
