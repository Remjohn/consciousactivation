metrics:
- id: SM-01
  name: Unsupported constitutional decision rate
  target: 0 critical unsupported decisions in any release-gate reference run; target <1% material decisions requiring
    post-implementation correction.
- id: SM-02
  name: Atomicity classification accuracy
  target: Meet the category-specific threshold on protected merge/split/variant/family cases; no critical boundary
    error in the primary reference harness.
- id: SM-03
  name: Visual-syntax accuracy
  target: Meet protected benchmark thresholds for salient component recall, relationship accuracy, composition-variable
    classification, and cross-specimen invariant precision.
- id: SM-04
  name: Implementation invention rate
  target: Fewer than 5% of implementation-blocking decisions are invented outside the authorized Development Capsule
    in the reference slice.
- id: SM-05
  name: First-pass implementation readiness
  target: At least 90% of Development Capsule acceptance checks pass before implementation begins; all blockers
    are explicit.
- id: SM-06
  name: Skill behavioral lift
  target: Every required production skill or adaptation demonstrates statistically meaningful lift over its no-guidance
    control on its target behavior.
- id: SM-07
  name: JIT context efficiency
  target: Required capsules meet their phase completeness criteria while reducing irrelevant or inactive context
    against the monolithic baseline.
- id: SM-08
  name: Downstream harness effectiveness
  target: Each certified profile meets its category-native baseline on accuracy, Activative fidelity, role and reaction
    integrity, Expression Moment provenance where applicable, wrong-reading rate, first-pass acceptance, latency,
    and cost per accepted output.
- id: SM-09
  name: Repair localization
  target: At least 90% of benchmarked failures are repaired without rerunning unaffected constitutional or evidence
    phases.
- id: SM-10
  name: Run observability completeness
  target: 100% of mandatory lifecycle, semantic-lineage, Reaction Receipt, Expression Moment, external handoff,
    repair, benchmark, waiver, and authorization transitions produce valid events and receipts.
- id: SM-11
  name: Builder release stability
  target: Required stochastic benchmark dimensions meet both mean and minimum thresholds with bounded variance across
    fresh-context repetitions.
- id: SM-12
  name: V2.1 migration safety
  target: No retained V2.1 capability regresses without an approved deprecation or replacement receipt; all existing
    supported artifacts are readable or migratable.
- id: SM-13
  name: Workflow autonomous completion rate
  target: Measure the percentage of reference and transfer runs that complete all non-human-gated nodes without
    unplanned operator intervention while preserving every hard gate.
- id: SM-14
  name: Workflow route accuracy
  target: The selected workflow profile must match expert-labeled request, risk, target, and incident classes on
    protected routing cases, with zero critical hotfix-versus-normal-flow errors.
- id: SM-15
  name: Workflow failure containment
  target: 100% of benchmarked node failures preserve locked evidence, ratified decisions, protected cases, and unaffected
    branch state.
- id: SM-16
  name: Cost and latency per authorized capsule
  target: Track p50/p95 end-to-end and per-node latency, deterministic compute, model tokens, retries, and total
    cost for each authorized Development Capsule and workflow profile.
counter_metrics:
- id: SM-C01
  name: Artifact count
  reason: More generated documents are not evidence of quality and must not be optimized.
- id: SM-C02
  name: Question count
  reason: A larger Genesis tree is not intrinsically better; ask only dependency-relevant decisions.
- id: SM-C03
  name: Canonical skill count
  reason: Skill proliferation is a failure mode, not a success metric.
- id: SM-C04
  name: Total context tokens
  reason: Consuming more context must not be mistaken for deeper understanding.
- id: SM-C05
  name: Composite score alone
  reason: A high average must never conceal a hard evidentiary, constitutional, atomicity, or contract failure.
- id: SM-C06
  name: Automation percentage
  reason: More autonomous decisions are not better when authority should remain human or deterministic.
- id: SM-C07
  name: Agent and sandbox count
  reason: More agents, candidates, worktrees, or sandboxes do not imply a better workflow and must not be optimized
    independently of accepted quality and cost.
- id: SM-C08
  name: Fastest candidate completion
  reason: The first finished candidate must not win unless it also satisfies the declared quality, evidence, contract,
    and authorization gates.
