    rule: the compiled Harness declares that no external skills are required
  - condition_id: ESK-005
    rule: undeclared skill use fails closed
  - condition_id: ESK-006
    rule: adding an external skill later requires a new immutable Harness version
  - condition_id: ESK-007
    rule: the policy applies only to the synthetic Builder Core proof and does not imply that production Harnesses never require skills
enforcement:
  allowed_registry_state:
    skills: []
    external_skills_required: false
    dynamic_skill_discovery_allowed: false
  required_capability_ownership: builder_code
  required_capability_determinism: deterministic
  undeclared_skill_behavior: FAIL_CLOSED
  later_skill_addition_behavior: NEW_IMMUTABLE_HARNESS_VERSION_REQUIRED
  certification_effect: none
  production_inference: PROHIBITED
