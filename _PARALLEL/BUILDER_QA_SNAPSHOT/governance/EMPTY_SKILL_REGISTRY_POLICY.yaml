policy_conditions:
  - condition_id: ESK-001
    rule: required behavior is completely provided by code-owned deterministic Builder capabilities
  - condition_id: ESK-002
    rule: no external or dynamically discovered skill is required
  - condition_id: ESK-003
    rule: the empty registry is explicit, versioned, and hash-pinned
