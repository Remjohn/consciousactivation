terms:
- term: Activative Atomic Harness
  definition: An independently versioned production system that owns one recognizable Activative content product,
    its semantic workcell, visual or temporal grammar, runtime, evaluations, and repairs.
- term: Atomic Content Harness
  definition: A compilation target that transforms governed evidence and meaning into one atomic content product.
- term: Visual Asset Editor
  definition: A separate compilation target that researches, resolves, edits, generates, versions, and returns visual
    assets without mutating source meaning, sequence role, or composition purpose.
- term: Delegation Contract
  definition: The versioned request, response, error, provenance, and compatibility ABI between a content harness
    and the Visual Asset Editor.
- term: Harness-development compiler
  definition: 'The Builder product boundary: a system that compiles evidence and decisions into an implementation-authorized
    Development Capsule without implementing the final harness.'
- term: Harness IR
  definition: The canonical typed intermediate representation from which all specifications, skills, graphs, contracts,
    tests, tickets, and receipts are generated.
- term: Draft Harness Model
  definition: A provisional, evidence-grounded, explicitly unratified model compiled before Genesis.
- term: Genesis
  definition: The dependency-driven human-governed process that challenges and ratifies constitutional decisions
    in the Draft Harness Model.
- term: Knowledge Status
  definition: 'The epistemic classification of a value: observed, measured, derived, hypothesized, human-decided,
    or generated.'
- term: Authority Status
  definition: The governance classification describing whether a value is provisional, ratified, waived, superseded,
    or invalidated.
- term: Visual Syntactic Parsing
  definition: The phase that inventories visible components, normalized geometry, relationships, hierarchy, composition
    variables, and temporal states before assigning semantic meaning.
- term: BBOX + WHY
  definition: A paired record of an element's normalized location and an evidence-backed hypothesis or decision
    about its compositional purpose.
- term: Composition Variable
  definition: A visual property classified as invariant, controlled variable, content slot, optional component,
    anomaly, or unknown.
- term: Visual Syntax
  definition: The cross-specimen grammar of components, relationships, variables, and invariants that makes a visual
    product recognizable.
- term: Temporal Syntax
  definition: The observed grammar of appearance, persistence, motion, transition, timing, sonic relation, and disappearance
    across time.
- term: Activative Sequencing Intelligence
  definition: Category- and format-adapted reasoning that arranges beats, scenes, states, transitions, assets, and
    sonic cues to create an intended viewer-state transformation.
- term: Canonical Format Category
  definition: 'One of five governed production substrates: Short-Form Edited Video, 2D Character Animation, Carousels,
    Supervisuals, or Conversational Activation / Human Expression.'
- term: Format Profile
  definition: A category-local profile such as one of the short-form editing formats, defining its parsing, sequence,
    runtime, skill, evaluation, and repair rules.
- term: Category Constitution
  definition: A versioned canonical contract governing a format category's ontology, registries, runtime constraints,
    benchmarks, and migration policy.
- term: Capability Ownership Map
  definition: The explicit assignment of every required capability to its primary executor and supporting modules,
    skills, references, evaluators, or human authority.
- term: Canonical Skill
  definition: A reusable, versioned, behaviorally evaluated procedural capability stored in the canonical Skill
    Capability Registry.
- term: Harness-local Skill Adaptation
  definition: An ecological mutation of a Canonical Skill for one atomic harness without creating a new canonical
    capability.
- term: Skill Composition Recipe
  definition: A reusable declaration of which skills, adaptations, reasoning modules, references, and runtime bindings
    must be combined for a phase or path.
- term: JIT Execution Capsule
  definition: An ephemeral, phase-local, reproducibly compiled instruction and context package for one exact invocation.
- term: Minimum Complete Context
  definition: The smallest context that still satisfies a phase's responsibility, contracts, active branches, authority,
    evidence, and completion criteria.
- term: Phase Graph
  definition: The typed dependency graph defining what phases run, in what order, with which executors and completion
    criteria.
- term: Context Graph
  definition: The typed graph defining what each phase may load, must exclude, unload, and pass downstream.
- term: Reference and Loading Graph
  definition: The versioned policy governing which doctrine, registries, examples, ontologies, or SPR resources
    may be loaded by each phase or skill.
- term: Repair and Invalidation Graph
  definition: The typed map from a failure class to its root-cause owner, permitted repair scope, frozen state,
    invalidated descendants, regression suite, and escalation policy.
- term: Development Capsule
  definition: The authorized implementation handoff containing the Harness IR, readable specifications, contracts,
    skill packages, graph manifests, justified scaffolding, tests, tickets, and receipts.
- term: Implementation Authorization Gate
  definition: The evidence-backed decision that determines whether a capsule is authorized for production implementation,
    prototype only, ratification, or blocked.
- term: Harness Control Tower
  definition: The event-sourced Pi UI that renders authoritative run state, evidence, decisions, phases, skills,
    contracts, evaluations, costs, repairs, and authorization.
- term: Downstream Harness Effectiveness
  definition: The measured quality, accuracy, predictability, cost, latency, repair efficiency, and Activative fidelity
    of a harness implemented from the Builder's output.
- term: Builder Workflow Runtime
  definition: The executable control plane that runs Builder work through typed nodes combining deterministic code,
    bounded agents, and governed human gates.
- term: Builder Workflow IR
  definition: The canonical machine-readable representation of one Builder workflow, including nodes, actors, contracts,
    conditions, routes, retries, budgets, isolation, events, and promotion state.
- term: Workflow Profile
  definition: A versioned specialization of the Builder Workflow Runtime for a class of work such as new harness
    compilation, source refresh, migration, benchmark regression, repair, or hotfix.
- term: Workflow Node
  definition: One independently owned and testable operation in a Builder workflow with explicit actor type, inputs,
    outputs, validators, failure routes, and completion criteria.
- term: Actor Assignment Matrix
  definition: The explicit allocation of each workflow responsibility to human expertise, bounded agent judgment,
    deterministic code, or an approved hybrid.
- term: Shadow Workflow
  definition: A manually observed end-to-end execution used to capture real steps, handoffs, failures, and evidence
    before automating the workflow.
- term: Workflow Router
  definition: The deterministic or bounded component that selects an approved workflow profile from the request,
    run state, risk, target, and incident class.
- term: Execution Sandbox
  definition: An isolated environment with bounded tools, mounted sources, credentials, compute, filesystem, network,
    and lifetime for a workflow node or implementation task.
- term: Workflow Promotion
  definition: The governed movement of a workflow definition from draft through tested and production states using
    versioned tests, benchmark evidence, migration policy, and rollback capability.
