[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ca-contracts"
version = "0.1.0.dev1"
description = "Development bindings for the Conscious Activations activative-production-spine contracts."
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["ca_contracts*"]

[tool.setuptools.package-data]
"ca_contracts.schemas" = ["*.json"]
"ca_contracts" = ["py.typed"]
