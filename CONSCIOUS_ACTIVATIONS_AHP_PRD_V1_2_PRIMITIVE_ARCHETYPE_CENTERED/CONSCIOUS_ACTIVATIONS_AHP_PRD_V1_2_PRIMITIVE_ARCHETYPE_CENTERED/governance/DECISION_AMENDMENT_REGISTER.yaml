schema_version: ca-ahp-prd-v1.2-decision-amendment-register/v1
prd_id: CA-AHP-PRD-V1.2
status: DRAFT_FOR_HUMAN_RATIFICATION
issued_on: '2026-07-22'
preserves_decisions: D001-D054 unless explicitly amended by D055-D068
decisions:
- id: D041
  title: Canonical Interview Source Package Root
  decision: Every interview-derived campaign begins from one immutable Canonical Interview
    Source Package that carries source media, transcript, speakers, time, tags, expression
    evidence, source authority, and provenance.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D042
  title: Dual Admission Parity
  decision: Activative Interview Brief-led sessions and imported interview plus transcript
    sessions are equal first-class production inputs after truthful validation; missing
    upstream planning is never fabricated.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D043
  title: Talking-Head A-Roll Spine
  decision: For source-led short videos, original talking-head footage and source
    audio remain the base timeline; supporting visuals may assist or interrupt only
    under declared functions.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D044
  title: Exact Derivative Source Lineage
  decision: Every short, Carousel, SuperVisual, and animation derivative preserves
    exact source-package, source-span, quote/evidence, keyframe, voice, and transformation
    lineage.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D045
  title: Tag Provenance Separation
  decision: Planned, observed, inferred, operator-confirmed, rejected, and superseded
    tags are distinct lifecycle states and cannot be collapsed.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D046
  title: Source-Backed Batch Orchestration
  decision: One accepted source package may compile a coordinated content batch of
    independently governed Atomic Harness jobs with shared analysis and selective
    invalidation.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D047
  title: Human Resolution as Programming Material
  decision: Every meaningful operator decision automatically emits an immutable HumanResolutionEpisode
    and retrieval/programming-material disposition; capture is automatic, promotion
    is not.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D048
  title: Studio Supervisory Operating Model
  decision: The Atomic Harness conducts production; one shared Studio shell provides
    category-native supervision, correction, evidence, and shipping rather than requiring
    the operator to be the primary editor.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D049
  title: Canonical Program and UI Projection Separation
  decision: Composition IR, VideoEditProgram, source packages, and workflow state
    are canonical; timelines, canvases, and chat copilots are projections and typed
    command surfaces.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D050
  title: GNM and Visual Provider Ownership
  decision: Google GNM, SAM3, Lucida, layered providers, ComfyUI, and related visual
    production methods belong to VAE capability routing; GNM supplies bounded geometry,
    not identity or emotional truth.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D051
  title: Format 02 Deferral
  decision: Format 02 remains deferred until the current Builder emits and independent
    validation accepts the complete current Format 02 AtomicHarnessDefinition; historical
    assets are evidence only.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D052
  title: Bounded Production Role Taxonomy
  decision: Hunters propose, Analysts verify, Composers compile, and Commanders authorize
    assigned transitions; roles are explicit Workflow Node responsibilities, not hidden
    personas or authority shortcuts.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D053
  title: Capability Extraction from External Projects
  decision: External open-source projects are mined for bounded capabilities, contracts,
    tests, and UI/runtime patterns under dependency adoption review; none becomes product or semantic
    authority.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D054
  title: Source-First Release 1 Proof
  decision: Release 1 proves one real interview source package, one source-led talking-head
    short, one source-grounded static derivative, evaluation/repair, one human resolution,
    replay, and truthful evidence; Format 02 is excluded.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D055
  title: Psychological Role Inside Tension
  decision: Content activates only when it gives the viewer a psychologically legible role inside a meaningful tension; every archetype route and Final Script shall declare that role and tension.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D056
  title: Mandatory Doctrine Stack
  decision: Interview-First, Expression-First, Primitive-First, Composition-Before-Editing, Visual Research Before Generation, Real-Life Reference Before Generation, Source Fidelity, Negative Space, and Edge Integrity / Anti-Centroid are binding product doctrines rather than optional guidance.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D057
  title: Archetype Coalition Final Script Before Composition
  decision: Every content derivative shall bind an approved archetype coalition and one versioned Final Script before any static, temporal, or animation composition begins.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D058
  title: Primitives Are the Recipe Builders
  decision: Primitive Families, Primitive Bindings, and Primitive Coalition Contracts construct the meaning, delivery, and format recipe; Steering Recipes may operationalize a coalition but may not replace it.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D059
  title: Primitive-Derived Evaluation
  decision: Evaluation shall derive from the active Primitive Coalition Contract, Primitive Misuse Risks, Activative Intelligence contracts, archetype contract, category grammar, Brand Context Version, Voice DNA, and Visual DNA.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D060
  title: Guest Voice DNA Text Composition
  decision: Carousel, SuperVisual, overlay, caption, animation, and other text-bearing derivatives shall be written or rewritten through the Guest Voice DNA by JIT Skill script writers and Composers; verbatim quotations remain explicitly marked.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D061
  title: Brand Genesis Context Foundation
  decision: Brand Genesis Session output, the active Brand Context Version, Voice DNA, and Visual DNA are required context for category-native composition whenever the project is brand-bound.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D062
  title: Composition Before Editing
  decision: Composition intent, archetype geometry, primitive coalition, attention path, source-role mapping, and negative-space plan shall be approved before edit operations or renderer bindings are compiled.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D063
  title: Visual Research Before Generation
  decision: A generation path shall first compile category-specific visual research, specimen evidence, and contradiction examples; provider generation cannot serve as visual research.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D064
  title: Real-Life Reference Before Generation
  decision: When a real-life reference can ground identity, material, gesture, environment, object behavior, or composition physics, the reference is collected and interpreted before synthetic generation.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D065
  title: Negative Space and Edge Integrity
  decision: Negative Space and Edge Integrity are measurable composition contracts; focal force, peripheral tension, asymmetry, and non-centroid placement shall survive scripting, composition, editing, rendering, and repair.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D066
  title: RSCS CCV CBAR Cognitive Ecology
  decision: RSCS supplies reality-grounded signal compression, CCV supplies controlled recombinatory variation, and CBAR adversarially resolves primitive and implementation tensions; no one engine may flatten the other two.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D067
  title: Mandatory 2D Animation Scene Package
  decision: Every approved archetype-coalition Final Script shall compile a source-grounded 2D Animation Scene Package for reusable B-roll, explainer, quote, concept, and Carousel use; full rendering occurs whenever the active archetype template or downstream composition requires it.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION
- id: D068
  title: Operator Source Authority
  decision: The operator supplies and owns source authorization and intended use. The production system records provenance and scope but shall not introduce externally imposed creative-filtering layers that dilute the approved creative direction.
  status: PROPOSED_LOCKED_PENDING_HUMAN_RATIFICATION

