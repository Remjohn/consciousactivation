product: CMF Atomic Harness Builder Next
version: 0.3.0-draft
status: locked_product_constitution_prd_draft
product_promise: A human-governed harness-development compiler that transforms an evidence-saturated atomic candidate into
  an implementation-authorized Development Capsule without implementing the final production harness.
