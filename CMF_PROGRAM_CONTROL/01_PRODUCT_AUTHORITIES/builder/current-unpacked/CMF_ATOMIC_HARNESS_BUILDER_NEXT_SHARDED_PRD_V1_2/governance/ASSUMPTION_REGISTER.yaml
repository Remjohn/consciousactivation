assumptions:
- id: A-001
  statement: V2.1 remains the operational baseline throughout the first migration increments.
- id: A-002
  statement: The four category names approved in the Grill-me session are canonical for this PRD version.
- id: A-003
  statement: Pi is the primary authoring and Control Tower environment, but core IR and compilation logic remain
    adapter-bounded.
- id: A-004
  statement: Exact performance and behavioral thresholds will be calibrated against baseline and reference-harness
    runs rather than invented in the PRD.
- id: A-005
  statement: OpenSpec remains a generated implementation-governance view, not the canonical source of truth.
- id: A-006
  statement: The first release may structurally support all target types and categories without claiming their production
    certification.
- id: A-007
  statement: The Builder Workflow Runtime is part of the Builder product, while generated harness Phase Graphs remain
    outputs compiled for downstream harness implementations.
- id: A-008
  statement: Release 1 automation is derived from a recorded manual shadow workflow for the selected reference harness
    rather than invented solely from diagrams.
open_questions:
- id: OQ-001
  question: 'Which atomic harness is the Release 1 primary reference: F04 Progressive Blind Ranking, CAR Visual
    Design Audit Tutorial, or another candidate?'
  disposition: 'Owner: Product lead; resolve before Architecture finalization.'
- id: OQ-002
  question: Which canonical category constitution is production-complete first?
  disposition: 'Owner: Product lead and category steward; expected to follow reference-harness selection.'
- id: OQ-003
  question: Which storage technologies implement the Harness IR, event ledger, artifact registry, and benchmark
    receipts?
  disposition: 'Owner: Architecture; PRD constrains behavior, not technology.'
- id: OQ-004
  question: Which multimodal model policy or ensemble provides the first Visual Syntactic Parsing implementation?
  disposition: 'Owner: Architecture and benchmark team.'
- id: OQ-005
  question: How are protected benchmark labels governed, access-controlled, and changed?
  disposition: 'Owner: Evaluation governance.'
- id: OQ-006
  question: What exact quantitative thresholds define production maturity for each score dimension?
  disposition: 'Owner: Benchmark calibration after baseline runs.'
- id: OQ-007
  question: What is the exact Pi custom-UI implementation surface and deployment model for the Control Tower?
  disposition: 'Owner: UX/Architecture.'
- id: OQ-008
  question: Which existing capabilities seed version 1 of the Canonical Skill Capability Registry, and which are
    only illustrated references?
  disposition: 'Owner: Skill architecture audit.'
- id: OQ-009
  question: How broadly should legacy Design Briefs such as Achievement Story be migrated into archetype constitutions,
    composition recipes, and binding schemas in Release 1?
  disposition: 'Owner: Product lead and migration steward.'
- id: OQ-010
  question: Does the first reference slice require a production Visual Asset Editor dependency, a stubbed delegation
    boundary, or no asset delegation?
  disposition: 'Owner: Product lead after reference-harness selection.'
- id: OQ-011
  question: Which workflow-runtime technology, queue, and state-machine implementation should execute the Builder
    Workflow IR?
  disposition: 'Owner: Architecture; compare Pi extensions, local process orchestration, durable workflow engines,
    and adapter boundaries.'
- id: OQ-012
  question: What isolation policy should use worktrees, containers, or stronger sandboxes for each node and implementation
    story class?
  disposition: 'Owner: Architecture and security; calibrate against source sensitivity, tool risk, cost, and reproducibility.'
- id: OQ-013
  question: Which initial workflow profiles are mandatory in Release 1 beyond new harness compilation and benchmark
    regression?
  disposition: 'Owner: Product lead and Builder maintainer; decide after the reference shadow workflow.'
