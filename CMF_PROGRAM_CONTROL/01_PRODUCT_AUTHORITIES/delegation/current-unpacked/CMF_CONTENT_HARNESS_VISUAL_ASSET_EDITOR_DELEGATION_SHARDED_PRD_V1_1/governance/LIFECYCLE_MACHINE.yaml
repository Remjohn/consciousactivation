version: 1.0.0-draft
initial_state: DRAFT
states:
  DRAFT:
    owner: content_harness
    terminal: false
    description: Demand exists under Content Harness authority but has not been submitted.
  SUBMITTED:
    owner: content_harness
    terminal: false
    description: A valid submission message is under boundary validation or has entered routing.
  REJECTED:
    owner: delegation_protocol
    terminal: true
    description: Submission failed contract, authority, integrity, compatibility, or admission validation.
  ACCEPTED:
    owner: visual_asset_editor
    terminal: false
    description: The VAE accepted the negotiated demand for execution.
  IN_PROGRESS:
    owner: visual_asset_editor
    terminal: false
    description: Production is active; internal details remain product-private.
  RESULT_READY:
    owner: visual_asset_editor
    terminal: false
    description: A production-accepted Asset Result awaits downstream acknowledgement.
  RESULT_REJECTED:
    owner: content_harness
    terminal: false
    description: The current result failed downstream compatibility acknowledgement for a stable protocol reason.
  COMPLETED:
    owner: delegation_protocol
    terminal: true
    description: A valid result was acknowledged and the delegation completed.
  AMENDMENT_REQUIRED:
    owner: visual_asset_editor
    terminal: false
    description: Execution cannot continue without a demand-owned or policy-owned change.
  SUPERSEDED:
    owner: content_harness
    terminal: true
    description: This demand version was replaced by a newer authoritative version.
  COST_APPROVAL_REQUIRED:
    owner: visual_asset_editor
    terminal: false
    description: Further work requires a new budget authorization.
  CAPABILITY_GAP:
    owner: visual_asset_editor
    terminal: false
    description: No certified production capability can satisfy the current demand.
  HUMAN_REVIEW_REQUIRED:
    owner: visual_asset_editor
    terminal: false
    description: Automation reached a governed exception boundary.
  CANCELLATION_REQUESTED:
    owner: content_harness
    terminal: false
    description: A validated cancellation request blocks new work pending safe stop.
  CANCELLED:
    owner: visual_asset_editor
    terminal: true
    description: Production stopped safely and a disposition receipt was emitted.
  PARTIAL_RESULT_READY:
    owner: visual_asset_editor
    terminal: false
    description: A typed subset is ready under the declared completion policy.
  INVALIDATED:
    owner: owning_product
    terminal: true
    description: The result requires revalidation for current use; history remains valid.
  REVOKED:
    owner: visual_asset_editor_or_integrity_authority
    terminal: true
    description: The result or asset is blocked for new and active consumption.
  REPLACED:
    owner: owning_product
    terminal: true
    description: A governed replacement was validated for future use.
transitions:
- from: DRAFT
  to: SUBMITTED
  trigger: visual_asset_submission
  authority: content_harness
- from: SUBMITTED
  to: REJECTED
  trigger: submission_receipt.rejected
  authority: delegation_protocol
- from: SUBMITTED
  to: ACCEPTED
  trigger: submission_receipt.accepted
  authority: visual_asset_editor
- from: ACCEPTED
  to: IN_PROGRESS
  trigger: visual_asset_event.execution_started
  authority: visual_asset_editor
- from: IN_PROGRESS
  to: RESULT_READY
  trigger: asset_result_contract
  authority: visual_asset_editor
- from: IN_PROGRESS
  to: PARTIAL_RESULT_READY
  trigger: asset_result_contract.partial
  authority: visual_asset_editor
- from: RESULT_READY
  to: COMPLETED
  trigger: result_acknowledgement.accepted
  authority: content_harness
- from: RESULT_READY
  to: RESULT_REJECTED
  trigger: result_acknowledgement.rejected
  authority: content_harness
- from: RESULT_REJECTED
  to: IN_PROGRESS
  trigger: visual_asset_event.revalidation_started
  authority: visual_asset_editor
- from: ACCEPTED
  to: AMENDMENT_REQUIRED
  trigger: amendment_proposal
  authority: visual_asset_editor
- from: IN_PROGRESS
  to: AMENDMENT_REQUIRED
  trigger: amendment_proposal
  authority: visual_asset_editor
- from: AMENDMENT_REQUIRED
  to: SUPERSEDED
  trigger: demand_supersession
  authority: content_harness
- from: ACCEPTED
  to: COST_APPROVAL_REQUIRED
  trigger: budget_escalation_request
  authority: visual_asset_editor
- from: IN_PROGRESS
  to: COST_APPROVAL_REQUIRED
  trigger: budget_escalation_request
  authority: visual_asset_editor
- from: COST_APPROVAL_REQUIRED
  to: IN_PROGRESS
  trigger: budget_escalation_response.approved
  authority: content_harness
- from: COST_APPROVAL_REQUIRED
  to: CAPABILITY_GAP
  trigger: budget_escalation_response.denied_capability_gap
  authority: content_harness
- from: ACCEPTED
  to: CAPABILITY_GAP
  trigger: delegation_failure.capability_gap
  authority: visual_asset_editor
- from: IN_PROGRESS
  to: CAPABILITY_GAP
  trigger: delegation_failure.capability_gap
  authority: visual_asset_editor
- from: ACCEPTED
  to: HUMAN_REVIEW_REQUIRED
  trigger: delegation_failure.human_exception
  authority: visual_asset_editor
- from: IN_PROGRESS
  to: HUMAN_REVIEW_REQUIRED
  trigger: delegation_failure.human_exception
  authority: visual_asset_editor
- from: SUBMITTED
  to: CANCELLATION_REQUESTED
  trigger: cancellation_request
  authority: content_harness
- from: ACCEPTED
  to: CANCELLATION_REQUESTED
  trigger: cancellation_request
  authority: content_harness
- from: IN_PROGRESS
  to: CANCELLATION_REQUESTED
  trigger: cancellation_request
  authority: content_harness
- from: CANCELLATION_REQUESTED
  to: CANCELLED
  trigger: cancellation_receipt
  authority: visual_asset_editor
- from: SUBMITTED
  to: SUPERSEDED
  trigger: demand_supersession
  authority: content_harness
- from: ACCEPTED
  to: SUPERSEDED
  trigger: demand_supersession
  authority: content_harness
- from: IN_PROGRESS
  to: SUPERSEDED
  trigger: demand_supersession
  authority: content_harness
- from: COMPLETED
  to: INVALIDATED
  trigger: invalidation_notice
  authority: owning_product
- from: COMPLETED
  to: REVOKED
  trigger: revocation_notice
  authority: visual_asset_editor_or_integrity_authority
- from: COMPLETED
  to: REPLACED
  trigger: replacement_notice_and_ack
  authority: owning_product
- from: INVALIDATED
  to: REPLACED
  trigger: replacement_notice_and_ack
  authority: owning_product
- from: REVOKED
  to: REPLACED
  trigger: replacement_notice_and_ack
  authority: owning_product
illegal_transition_policy:
  action: reject_and_receipt
  state_change: false
