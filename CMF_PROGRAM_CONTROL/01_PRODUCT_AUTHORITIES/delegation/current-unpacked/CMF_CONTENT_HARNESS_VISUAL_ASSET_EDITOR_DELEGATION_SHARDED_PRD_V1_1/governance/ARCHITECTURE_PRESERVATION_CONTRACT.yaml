contract_id: DELEGATION-ARCH-PRESERVATION-001
version: 1.0.0
status: binding
upstream_references:
- CMF_ATOMIC_HARNESS_BUILDER_NEXT_SHARDED_PRD_V1_1
- CMF_VISUAL_ASSET_EDITOR_SHARDED_PRD_V1
preserved_architecture:
- id: PRES-001
  name: Three compilation targets
  rule: Atomic Content Harness, Visual Asset Editor, and Content ↔ Asset Delegation remain independent products.
- id: PRES-002
  name: Canonical Harness IR
  rule: Harness IR remains the Builder source of truth; delegation contracts cannot replace it.
- id: PRES-003
  name: Capability Ownership Map
  rule: Human, agent, code, skill, evaluator, adapter and hybrid ownership stays explicit.
- id: PRES-004
  name: Phase and Context Graphs
  rule: Phase-local context and output-only downstream handoffs remain binding.
- id: PRES-005
  name: Typed Contract Graph
  rule: Cross-phase and cross-product handoffs remain typed, versioned and non-mutable downstream.
- id: PRES-006
  name: Canonical Skill Ecology
  rule: Canonical Skills, adaptations, recipes and JIT Execution Capsules remain separate.
- id: PRES-007
  name: Deterministic JIT compiler
  rule: Critical context and capsule assembly remains deterministic and receipted.
- id: PRES-008
  name: Reference and Loading Graph
  rule: References remain versioned, scoped and progressively disclosed.
- id: PRES-009
  name: Dependency and Precedence Resolver
  rule: Authority, conflicts, missing data and invalidation resolve before execution.
- id: PRES-010
  name: Behavioral evaluation and maturity
  rule: Generated systems earn production status through evidence.
- id: PRES-011
  name: Builder Workflow Runtime
  rule: Human, agent and deterministic-code actors remain explicit in typed event-sourced workflows.
- id: PRES-012
  name: Harness Control Tower
  rule: Delegation extends the shared Control Tower and creates no disconnected authority store.
- id: PRES-013
  name: Repair and Invalidation Graph
  rule: Smallest responsible repair and precise invalidation remain binding.
- id: PRES-014
  name: Implementation Authorization Gate
  rule: Readiness is evidence-backed authorization, not document completeness.
- id: PRES-015
  name: Development Capsule
  rule: Implementation receives a traceable authorized package.
- id: PRES-016
  name: Four category constitutions
  rule: Short-Form Edited Video, 2D Character Animation, Carousels and Supervisuals remain distinct.
- id: PRES-017
  name: Content Harness semantic authority
  rule: The requesting harness owns meaning, Activative purpose, sequence role and composition intent.
- id: PRES-018
  name: Activative Sequencing Intelligence
  rule: The Visual Editor supplies assets and geometry but does not replace sequencing authority.
- id: PRES-019
  name: Visual Production Plan IR
  rule: The VAE owns provider-neutral production planning; ComfyUI graphs are compiled artifacts.
- id: PRES-020
  name: Independent VLM evaluation
  rule: Production models cannot approve their own outputs and protocol services cannot duplicate visual evaluation.
- id: PRES-021
  name: Visual Asset Memory and syntax-aware recurrence
  rule: Visual memory remains VAE-owned and uses rendered syntax context rather than frequency-only fatigue.
- id: PRES-022
  name: Visual Compute Fabric
  rule: Compute routing, containers, models, LoRAs and workers remain VAE internal authority.
allowed_protocol_extensions:
- shared contract schemas
- authority validation
- compatibility negotiation
- external lifecycle projection
- idempotency and replay controls
- message routing
- supersession and cancellation exchange
- result acknowledgement
- post-completion notices
- audit receipts
- Control Tower delegation projections
- shared conformance suites
collision_policy:
  action: block_and_raise_upstream_amendment
  forbidden: silent reinterpretation or local override
