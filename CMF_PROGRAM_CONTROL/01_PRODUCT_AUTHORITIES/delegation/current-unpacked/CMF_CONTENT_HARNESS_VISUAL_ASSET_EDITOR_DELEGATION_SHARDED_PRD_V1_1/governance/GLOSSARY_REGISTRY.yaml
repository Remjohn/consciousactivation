version: 1.0.0-draft
terms:
- term: Delegation Protocol
  definition: The governed contract protocol and deterministic boundary services connecting a Content Harness and
    Visual Asset Editor without becoming a third creative authority.
- term: Delegation Envelope
  definition: The common versioned metadata wrapper carrying message identity, correlation, causation, principals,
    authority, integrity, idempotency, and payload reference.
- term: Visual Asset Demand
  definition: The immutable, versioned, Content Harness-owned contract expressing semantic intent, Activative purpose,
    visual role, composition intent, continuity, delivery, evaluation, and budget authority.
- term: Visual Asset Editor
  definition: The independently versioned production authority that derives and executes Visual Production Plans
    and certifies production acceptance.
- term: Content Harness
  definition: The atomic product authority that owns the Visual Asset Demand and acknowledges current downstream
    consumption compatibility.
- term: Delegation Correlation
  definition: The complete lifecycle of one delegated visual request, identified by a correlation ID.
- term: Causation ID
  definition: The message identifier that directly caused a later message.
- term: Submission Receipt
  definition: The protocol acknowledgement that a submitted delegation was validated and accepted or rejected at
    the boundary.
- term: Production Acceptance
  definition: The Visual Asset Editor's certification that an asset satisfies the authorized demand and production
    gates.
- term: Consumption Acknowledgement
  definition: The Content Harness or composition runtime's confirmation that a production-accepted result is current
    and compatible for downstream use.
- term: Delegation Set
  definition: A versioned coordination contract grouping independent Visual Asset Demands under shared continuity,
    dependency, and completion constraints.
- term: Supersession
  definition: The authority-scoped replacement of one immutable demand version by a newer linked version.
- term: Selective Invalidation
  definition: The explicit preservation of unaffected artifacts and invalidation of only those results or nodes
    impacted by an authoritative change.
- term: Amendment Proposal
  definition: A typed, non-binding VAE proposal describing exact demand changes, authority class, evidence, and
    predicted consequences.
- term: Budget Authorization
  definition: The immutable Content Harness-owned envelope defining approved Budget Program, ceilings, purpose,
    and escalation policy.
- term: Compatibility Manifest
  definition: A machine-readable declaration of accepted/emitted protocol versions, message versions, features,
    profiles, and limitations.
- term: Negotiated Delegation Profile
  definition: The pinned protocol, message, feature, category, adapter, and migration configuration accepted for
    one delegation.
- term: Lifecycle Projection
  definition: The stable shared state derived from accepted authoritative messages, distinct from either product's
    internal state machine.
- term: Failure Taxonomy
  definition: The protocol-owned stable classification of unsuccessful conditions, responsibility, retry, invalidation,
    and next-authority semantics.
- term: Invalidation Notice
  definition: A post-completion message requiring current-use revalidation without necessarily declaring an asset
    defective.
- term: Revocation Notice
  definition: A post-completion message immediately blocking new or active consumption for a critical defect, integrity,
    security, or regression reason.
- term: Replacement Notice
  definition: A typed link from an affected result or asset to a new candidate for future use, still requiring compatibility
    validation.
- term: Delegation Audit Receipt
  definition: An append-only chained record of identity, integrity, schema, authority, lifecycle, and persistence
    validation for a message.
- term: Protocol Principal
  definition: A registered product, runtime, service, operator, or policy identity permitted to perform defined
    delegation actions.
- term: Replay
  definition: A previously valid signed message reused outside its permitted idempotent or lifecycle context.
- term: Conformance Suite
  definition: The shared executable producer, consumer, authority, lifecycle, compatibility, integrity, and resilience
    tests for the protocol.
- term: Development Capsule
  definition: The implementation-ready governed package containing approved product, architecture, contracts, fixtures,
    tests, migration, observability, and authorization evidence.
