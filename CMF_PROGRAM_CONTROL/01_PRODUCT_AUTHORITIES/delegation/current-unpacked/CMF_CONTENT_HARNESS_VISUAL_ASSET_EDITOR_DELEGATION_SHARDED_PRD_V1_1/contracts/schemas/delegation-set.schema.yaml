$schema: https://json-schema.org/draft/2020-12/schema
title: Delegation Set
type: object
additionalProperties: false
required:
- set_id
- version
- owner
- context
- members
- shared_constraints
- completion_policy
properties:
  set_id:
    type: string
    minLength: 1
    pattern: ^DSET-
  version:
    type: integer
    minimum: 1
  owner:
    type: object
  context:
    type: object
  members:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - demand_ref
      - role
  shared_constraints:
    type: object
  dependencies:
    type: array
    items:
      type: object
  completion_policy:
    type: object
