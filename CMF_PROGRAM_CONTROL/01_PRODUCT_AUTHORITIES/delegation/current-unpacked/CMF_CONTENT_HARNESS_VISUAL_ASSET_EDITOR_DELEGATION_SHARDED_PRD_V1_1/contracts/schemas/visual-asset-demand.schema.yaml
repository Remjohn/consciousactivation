$schema: https://json-schema.org/draft/2020-12/schema
title: Visual Asset Demand
description: Authoritative provider-neutral request carrying constitution-complete Activative, visual-semantic, visual-narrative,
  feature, composition, evaluation, and execution context.
type: object
additionalProperties: false
required:
- request_id
- version
- content_harness_ref
- asset_classification
- activative_semantic_lineage
- activation_contract
- semantic_intent
- visual_semantic_pack
- visual_narrative_program
- feature_contracts
- somatic_route_request
- activative_function
- wrong_reading_locks
- composition_intent
- delivery
- evaluation_policy
properties:
  request_id:
    type: string
    pattern: ^VAD-
  version:
    type: integer
    minimum: 1
  supersedes:
    type:
    - string
    - 'null'
  content_harness_ref:
    type: string
    minLength: 1
  category_profile:
    type: string
  format_profile:
    type: string
  asset_classification:
    type: object
    additionalProperties: false
    required:
    - family
    - subtype
    - harness_role
    - visual_syntax_role
    properties:
      family:
        type: string
        minLength: 1
      subtype:
        type: string
        minLength: 1
      harness_role:
        type: string
        minLength: 1
      visual_syntax_role:
        type: string
        minLength: 1
  activative_semantic_lineage:
    type: object
    additionalProperties: false
    required:
    - activative_intelligence_pack_ref
    - identity_dna_ref
    - context_premise_ref
    - resonance_map_ref
    - matrix_edge_product_ref
    - source_evidence_refs
    properties:
      activative_intelligence_pack_ref:
        type: string
        minLength: 1
      identity_dna_ref:
        type: string
        minLength: 1
      context_premise_ref:
        type: string
        minLength: 1
      resonance_map_ref:
        type: string
        minLength: 1
      matrix_edge_product_ref:
        type: string
        minLength: 1
      source_evidence_refs:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      reaction_receipt_refs:
        type: array
        items:
          type: string
          minLength: 1
      expression_moment_refs:
        type: array
        items:
          type: string
          minLength: 1
  activation_contract:
    type: object
    additionalProperties: false
    required:
    - edge_pressure
    - activation_directions
    - viewer_roles
    - stance
    - identity_urges
    - intended_reaction
    - participation_design
    - micro_commitment
    properties:
      edge_pressure:
        type: string
        minLength: 1
      activation_directions:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      viewer_roles:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      stance:
        type: string
        minLength: 1
      identity_urges:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      intended_reaction:
        type: string
        minLength: 1
      participation_design:
        type: string
        minLength: 1
      micro_commitment:
        type: string
        minLength: 1
  semantic_intent:
    type: object
    additionalProperties: true
    required:
    - subject
    - recognition_target
    - evidence_refs
    properties:
      subject:
        type: string
      recognition_target:
        type: string
      viewer_state_before:
        type: string
      viewer_state_after:
        type: string
      evidence_refs:
        type: array
        minItems: 1
        items:
          type: string
  visual_semantic_pack:
    type: object
    additionalProperties: false
    required:
    - recognition_intent
    - recognition_carrier
    - audience_visual_world_refs
    - emotional_load_carrier
    - semiotic_mcda_receipt_ref
    properties:
      recognition_intent:
        type: string
        minLength: 1
      recognition_carrier:
        type: string
        minLength: 1
      audience_visual_world_refs:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      visual_dog_whistles:
        type: array
        items:
          type: string
      real_life_reference_classes:
        type: array
        items:
          type: string
      emotional_load_carrier:
        type: string
        minLength: 1
      semiotic_mcda_receipt_ref:
        type: string
        minLength: 1
  visual_narrative_program:
    type: object
    additionalProperties: false
    required:
    - pattern_match
    - pattern_interrupt
    - attention_state_sequence
    - viewer_role_progression
    - prediction_gap
    - payoff
    - affinity_field
    - anticipation_residue
    properties:
      pattern_match:
        type: string
        minLength: 1
      pattern_interrupt:
        type: string
        minLength: 1
      attention_state_sequence:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      viewer_role_progression:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      prediction_gap:
        type: string
        minLength: 1
      payoff:
        type: string
        minLength: 1
      affinity_field:
        type: string
        minLength: 1
      anticipation_residue:
        type: string
        minLength: 1
  feature_contracts:
    type: array
    items:
      type: object
      required:
      - feature
      - contract_ref
      properties:
        feature:
          type: string
        contract_ref:
          type: string
        required_for_meaning:
          type: boolean
      additionalProperties: true
  somatic_route_request:
    type: object
    required:
    - t_codes
    - v_codes
    - intended_body_effect
    properties:
      t_codes:
        type: array
        items:
          type: string
      v_codes:
        type: array
        items:
          type: string
      intended_body_effect:
        type: string
        minLength: 1
    additionalProperties: false
  activative_function:
    type: object
    required:
    - function
    - intended_viewer_effect
    properties:
      function:
        type: string
      intended_viewer_effect:
        type: string
      sequence_position: {}
    additionalProperties: true
  wrong_reading_locks:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  composition_intent:
    type: object
    required:
    - canvas
    - intended_region
    - role
    properties:
      canvas:
        type: object
      intended_region:
        type: object
      role:
        type: object
      directional_constraints:
        type: object
      reserved_regions:
        type: array
      crop_policy:
        type: object
      background_policy:
        type: object
    additionalProperties: true
  identity_continuity:
    type: object
  reference_evidence:
    type: array
    items:
      type: object
  delivery:
    type: object
    required:
    - width
    - height
    - format
    - candidate_count
    properties:
      width:
        type: integer
        minimum: 1
      height:
        type: integer
        minimum: 1
      format:
        type: string
      candidate_count:
        type: integer
        minimum: 1
    additionalProperties: true
  evaluation_policy:
    type: object
    required:
    - profile_ref
    - maximum_quality_repair_rounds
    - hard_gates
    properties:
      profile_ref:
        type: string
      maximum_quality_repair_rounds:
        type: integer
        minimum: 0
        maximum: 3
      hard_gates:
        type: array
        minItems: 1
        items:
          type: string
    additionalProperties: true
  execution_policy:
    type: object
  notes:
    type:
    - string
    - 'null'
