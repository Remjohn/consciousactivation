$schema: https://json-schema.org/draft/2020-12/schema
title: Selective Invalidation Receipt
type: object
additionalProperties: false
required:
- supersession_ref
- reusable_outputs
- invalidated_outputs
- resumed_from_node
properties:
  supersession_ref:
    type: string
    minLength: 1
  reusable_outputs:
    type: array
    items:
      type: string
      minLength: 1
  invalidated_outputs:
    type: array
    items:
      type: string
      minLength: 1
  resumed_from_node:
    type: string
    minLength: 1
  impact_confidence:
    type: number
    minimum: 0
    maximum: 1
