$schema: https://json-schema.org/draft/2020-12/schema
title: Delegation Envelope
type: object
additionalProperties: false
required:
- protocol_version
- message_type
- message_version
- message_id
- correlation_id
- sender
- recipient
- authority
- occurred_at
- payload_hash
- payload_ref
- integrity
properties:
  protocol_version:
    type: string
    minLength: 1
    pattern: ^\d+\.\d+$
  message_type:
    type: string
    minLength: 1
  message_version:
    type: string
    minLength: 1
    pattern: ^\d+\.\d+$
  message_id:
    type: string
    minLength: 1
    pattern: ^MSG-
  correlation_id:
    type: string
    minLength: 1
    pattern: ^DEL-
  causation_id:
    type:
    - string
    - 'null'
  sender:
    type: object
    additionalProperties: false
    required:
    - system_type
    - system_id
    - version
    properties:
      system_type:
        type: string
        minLength: 1
      system_id:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
  recipient:
    type: object
    additionalProperties: false
    required:
    - system_type
    - system_id
    properties:
      system_type:
        type: string
        minLength: 1
      system_id:
        type: string
        minLength: 1
      version_constraint:
        type:
        - string
        - 'null'
  authority:
    type: object
    additionalProperties: false
    required:
    - owner
    - authority_scope
    properties:
      owner:
        type: string
        minLength: 1
      authority_scope:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
  occurred_at:
    type: string
    minLength: 1
    format: date-time
  idempotency_key:
    type:
    - string
    - 'null'
  payload_hash:
    type: string
    minLength: 1
    pattern: '^sha256:'
  payload_ref:
    type: string
    minLength: 1
  integrity:
    type: object
    additionalProperties: false
    required:
    - signature_algorithm
    - signer_principal
    - signature
    - issued_at
    - nonce
    properties:
      signature_algorithm:
        type: string
        minLength: 1
      signer_principal:
        type: string
        minLength: 1
      signature:
        type: string
        minLength: 1
      issued_at:
        type: string
        minLength: 1
        format: date-time
      expires_at:
        type:
        - string
        - 'null'
        format: date-time
      nonce:
        type: string
        minLength: 1
