$schema: https://json-schema.org/draft/2020-12/schema
title: Compatibility Manifest
type: object
additionalProperties: false
required:
- product
- protocol_versions
- message_support
- supported_features
- certified_profiles
properties:
  product:
    type: object
    required:
    - type
    - product_version
  protocol_versions:
    type: object
    required:
    - accepted
    - emitted
  message_support:
    type: object
  supported_features:
    type: array
    items:
      type: string
      minLength: 1
  unsupported_features:
    type: array
    items:
      type: string
      minLength: 1
  certified_profiles:
    type: array
    items:
      type: object
