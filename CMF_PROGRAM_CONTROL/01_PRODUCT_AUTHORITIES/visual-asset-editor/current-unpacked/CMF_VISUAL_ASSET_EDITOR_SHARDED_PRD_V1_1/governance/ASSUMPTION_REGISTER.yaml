  question: Which exact Format 02 atomic production promise and specimen set will
    be the canonical Release 1 benchmark target?
  owner_revisit: 'Owner: Product/Format 02 Architecture; block: Architecture finalization.'
- id: OQ-02
  question: Which image-generation base model and VLM evaluator should be the initial
    benchmark controls?
  owner_revisit: 'Owner: Visual Runtime/Evaluation Architecture; block: compute proof.'
- id: OQ-03
  question: Which cloud GPU provider and object-storage implementation should Architecture
    select?
  owner_revisit: 'Owner: Infrastructure Architecture; block: implementation, not PRD.'
- id: OQ-04
  question: Which shared contract fields will be finalized by the Delegation PRD versus
    editor-internal schemas?
  owner_revisit: 'Owner: Delegation product planning; block: cross-product implementation.'
- id: OQ-05
  question: What protected labeled dataset size is sufficient for initial evaluator
    and recurrence certification?
  owner_revisit: 'Owner: Evaluation Architecture; block: limited-production gate.'
- id: OQ-06
  question: Which character identity or visual-language gap should be used for the
    Release 1 capability-development proof?
  owner_revisit: 'Owner: Format 02/Visual Runtime; block: capability-development story.'
