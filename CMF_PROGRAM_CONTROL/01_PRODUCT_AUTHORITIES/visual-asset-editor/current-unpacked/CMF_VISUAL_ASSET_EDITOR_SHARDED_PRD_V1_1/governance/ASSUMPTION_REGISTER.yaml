product: CMF Visual Asset Editor
version: 1.0.0
assumptions:
- id: A-01
  statement: The validated Atomic Harness Builder architecture remains the upstream
    authority.
  status: unverified
- id: A-02
  statement: Format 02 Visual Asset Demands and Visual Syntax fixtures can be curated
    before implementation authorization.
  status: unverified
- id: A-03
  statement: A VLM or evaluator ensemble can be benchmarked sufficiently for limited
    production; specific model choice remains an Architecture decision.
  status: unverified
- id: A-04
  statement: At least one local/self-hosted and one cloud GPU environment can run
    the required ComfyUI workflow and model stack.
  status: unverified
- id: A-05
  statement: The separate Delegation PRD will finalize cross-product schema ownership
    and compatibility policy.
  status: unverified
- id: A-06
  statement: CMF-OKF v1 will remain compatible with the minimal OKF 0.1 format while
    adding CMF-specific fields and typed edges.
  status: unverified
- id: A-07
  statement: Routine source-provenance classification can be deterministic without
    a dedicated rights workcell.
  status: unverified
- id: A-08
  statement: Remotion remains the downstream composition owner for the Format 02 reference
    path; the Visual Asset Editor returns assets and geometry, not final edited shorts.
  status: unverified
open_questions:
