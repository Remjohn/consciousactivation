registry_id: CMF-VAE-WORKCELL-AUTHORITIES
version: 1.0.0
status: binding_design
activation_rule: compile_smallest_sufficient_workcell
no_standalone_rights_analyst: true
source_policy_service: deterministic_source_classification_and_provenance
authorities:
- id: asset_commander
  name: Asset Commander
  primary_responsibility: workflow_state_routing_budget_promotion_exception
  owns:
  - workflow state
  - plan validation
  - budget
  - evaluation invocation
  - repair limits
  - asset promotion
  - exceptions
  must_not_own:
  - semantic reinterpretation
  - specialist visual analysis
  - manual asset creation
- id: asset_intelligence_hunter
  name: Asset Intelligence Hunter
  primary_responsibility: conditional_retrieval_and_reference_acquisition
  owns:
  - Asset Vault search
  - approved external/internal evidence retrieval
  - frame/document extraction candidates
  must_not_own:
  - production promotion
  - semantic amendment
  - final route selection
- id: activative_visual_analyst
  name: Activative Visual Analyst
  primary_responsibility: bounded_demand_to_visible_requirements_translation
  owns:
  - recognition target
  - visible action
  - visual punctum
  - failure indicators
  - preservation constraints
  must_not_own:
  - rewriting demand
  - changing viewer role
  - changing sequence role
- id: composition_feasibility_analyst
  name: Composition Feasibility Analyst
  primary_responsibility: geometry_and_composition_feasibility
  owns:
  - BBOX feasibility
  - safe zones
  - gaze/gesture direction
  - crop resilience
  - controls
  - conflicts
  must_not_own:
  - final composition authority
  - semantic relaxation
- id: resolution_strategy_composer
  name: Resolution Strategy Composer
  primary_responsibility: least_complex_viable_route_planning
  owns:
  - route comparison
  - Visual Production Plan
  - capability requirements
  - fallback
  - cost estimate
  must_not_own:
  - provider execution
  - asset acceptance
  - demand amendment approval
- id: editor_materializer
  name: Editor / Materializer
  primary_responsibility: approved_plan_execution
  owns:
  - ComfyUI execution
  - deterministic transforms
  - masks
  - compositing
  - rendering
  - variants
  must_not_own:
  - plan redesign
  - self-approval
  - semantic changes
- id: independent_visual_evaluator
  name: Independent Visual Evaluator
  primary_responsibility: profile_specific_asset_and_composition_judgment
  owns:
  - technical+VLM verdicts
  - failure evidence
  - repair contract
  - recurrence/continuity/temporal assessment
  must_not_own:
  - production execution
  - lowering hard gates
  - own output generation
