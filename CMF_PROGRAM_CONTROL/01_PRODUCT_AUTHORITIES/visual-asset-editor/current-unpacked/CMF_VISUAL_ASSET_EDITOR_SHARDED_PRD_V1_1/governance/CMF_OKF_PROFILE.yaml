profile_id: cmf-okf-visual-memory
version: 1.0.0-draft
base_format:
  name: Open Knowledge Format
  version: '0.1'
role: portable_human_agent_readable_knowledge_projection
not_authoritative_for:
- live workflow state
- immutable asset lifecycle
- budgets
- locks
- queues
- typed service contracts
- canonical registries
- raw event streams
- secrets
- large media binaries
required_frontmatter:
- okf_version
- cmf_profile
- type
- id
- version
- lifecycle_status
- authority_class
- title
- description
- source_record_refs
- content_hash
recommended_retrieval_facets:
- asset_families
- asset_subtypes
- activative_functions
- visual_syntax_roles
- composition_functions
- failure_codes
- workflow_profiles
- model_compatibility
- category_profiles
- format_profiles
- valid_from
typed_edges:
- derived_from
- validated_by
- compatible_with
- contradicts
- supersedes
- repairs
- failed_under
- applies_to
- observed_in
- consumed_by
- shares_syntax_with
retrieval_pipeline:
- resolve authority and task
- apply deterministic hard filters
- traverse typed relationships
- hybrid lexical and semantic retrieval
- compare image/composition/syntax fingerprints
- VLM rerank against demand and composition
- include contradictions, exceptions, superseding knowledge
- compile Minimum Complete Context
- emit retrieval receipt
