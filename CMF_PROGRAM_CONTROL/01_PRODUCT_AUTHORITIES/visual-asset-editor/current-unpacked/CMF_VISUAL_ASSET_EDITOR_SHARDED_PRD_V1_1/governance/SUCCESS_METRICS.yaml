product: CMF Visual Asset Editor
version: 1.0.0
metrics:
- id: SM-01
  name: End-to-end autonomous completion rate
  class: Primary
  definition_target: At least 90% of in-scope Format 02 production demands complete
    without human intervention after the limited-production learning period.
- id: SM-02
  name: Semantic hard-gate pass precision
  class: Primary
  definition_target: At least 98% of accepted assets satisfy expert-labeled semantic
    and Activative requirements; no known constitutional failure is accepted.
- id: SM-03
  name: Composition effectiveness
  class: Primary
  definition_target: At least 92% of accepted assets pass composition-context evaluation
    and downstream composition validation without asset regeneration.
- id: SM-04
  name: First-pass candidate acceptance
  class: Secondary
  definition_target: Measure and improve the percentage of demands with at least one
    passing candidate in the initial portfolio; do not optimize by lowering gates.
- id: SM-05
  name: Median quality-repair rounds
  class: Secondary
  definition_target: Median at or below one for mature in-scope workflows, with a
    constitutional maximum of three.
- id: SM-06
  name: Recovery success
  class: Primary
  definition_target: At least 99% of injected recoverable infrastructure failures
    resume or fail over without loss of committed state or quality-round corruption.
- id: SM-07
  name: Asset reproducibility
  class: Primary
  definition_target: 100% of accepted assets preserve sufficient pinned identity to
    reconstruct plan, workflow, compute, model, LoRA, controls, evaluator, and lineage.
- id: SM-08
  name: Budget conformance
  class: Secondary
  definition_target: At least 95% of completed runs remain within selected Budget
    Program cost and wall-clock ceilings, excluding explicit approvals.
- id: SM-09
  name: Evaluator hard-failure recall
  class: Primary
  definition_target: Production evaluator profiles meet release-specific hard-failure
    recall and false-rejection thresholds on protected labeled cases.
- id: SM-10
  name: Repair precision
  class: Primary
  definition_target: At least 90% of successful repairs modify the labeled responsible
    layer while preserving all expert-labeled frozen properties.
- id: SM-11
  name: Syntax-aware recurrence accuracy
  class: Primary
  definition_target: VLM recurrence verdicts meet the protected benchmark threshold
    across beneficial, productive, redundant, fatiguing, and contradictory cases.
- id: SM-12
  name: Memory retrieval usefulness
  class: Secondary
  definition_target: Retrieved knowledge improves or preserves quality and cost over
    no-memory control without increasing authority violations.
- id: SM-13
  name: Cost per accepted asset
  class: Secondary
  definition_target: Track by family, workflow, Budget Program, and repair round;
    optimize only after hard quality gates are maintained.
- id: SM-14
  name: Human exception rate
  class: Secondary
  definition_target: Routine production exception rate trends below 5% in certified
    scope without suppressing valid conflict or capability-gap reporting.
- id: SM-C1
  name: Raw candidate count
  class: Counter
  definition_target: Do not optimize for producing more candidates; candidate count
    is a budgeted means, not product value.
- id: SM-C2
  name: Number of models, LoRAs, workflows, or agents
  class: Counter
  definition_target: Do not treat registry size or compute fan-out as evidence of
    capability.
- id: SM-C3
  name: Standalone aesthetic score
  class: Counter
  definition_target: Do not optimize beauty independently of semantic, Activative,
    composition, continuity, and editability requirements.
- id: SM-C4
  name: Zero human intervention at any cost
  class: Counter
  definition_target: Do not hide legitimate authority, capability, conflict, or degraded-result
    exceptions to make automation statistics look better.
