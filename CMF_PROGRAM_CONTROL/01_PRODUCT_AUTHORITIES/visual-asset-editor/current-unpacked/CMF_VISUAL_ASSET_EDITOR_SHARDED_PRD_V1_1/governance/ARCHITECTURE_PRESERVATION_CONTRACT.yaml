contract_id: VAE-ARCH-PRESERVATION-001
version: 1.0.0
status: binding
upstream_product: CMF Atomic Harness Builder Next
upstream_reference: CMF_ATOMIC_HARNESS_BUILDER_NEXT_SHARDED_PRD_V1_1
preserved_architecture:
- id: PRES-001
  name: Three compilation targets
  rule: Atomic Content Harness, Visual Asset Editor, and Content ↔ Asset Delegation remain independent products.
- id: PRES-002
  name: Canonical Harness IR
  rule: Harness IR remains the Builder's machine-readable source of truth; the Visual Production Plan IR is editor-local and
    cannot replace it.
- id: PRES-003
  name: Capability Ownership Map
  rule: Capabilities retain explicit ownership among code, typed model programs, JIT Skills, references, humans, evaluators,
    adapters, and hybrid pipelines.
- id: PRES-004
  name: Phase and Context Graphs
  rule: Phase-local context, progressive disclosure, and output-only downstream handoffs remain binding.
- id: PRES-005
  name: Typed Contract Graph
  rule: Cross-phase and cross-product handoffs remain typed, versioned, validated, and non-mutable downstream.
- id: PRES-006
  name: Canonical Skill Ecology
  rule: Canonical Skills, harness adaptations, composition recipes, and JIT Execution Capsules remain separate layers.
- id: PRES-007
  name: Deterministic JIT compiler
  rule: Critical capsule and context assembly remains deterministic and receipted.
- id: PRES-008
  name: Reference and Loading Graph
  rule: Doctrine, registries, examples, and SPR resources remain versioned and phase-local.
- id: PRES-009
  name: Dependency and Precedence Resolver
  rule: Runtime bindings resolve authority, conflicts, missing data, invalidation, and degradation before execution.
- id: PRES-010
  name: Behavioral evaluation and maturity
  rule: Skills, adaptations, recipes, capsules, and generated systems earn production maturity through evidence.
- id: PRES-011
  name: Builder Workflow Runtime
  rule: Human, agent, and deterministic-code actors remain explicit in typed event-sourced workflows.
- id: PRES-012
  name: Harness Control Tower
  rule: The Visual Editor extends the event-sourced Control Tower and does not create a disconnected authority store.
- id: PRES-013
  name: Repair and Invalidation Graph
  rule: Smallest responsible repair, downstream invalidation, frozen valid state, regression, and receipts remain binding.
- id: PRES-014
  name: Implementation Authorization Gate
  rule: Readiness is evidence-backed authorization, not document completeness.
- id: PRES-015
  name: Development Capsule
  rule: Implementation receives a traceable, authorized package rather than speculative code or boilerplate.
- id: PRES-016
  name: Four category constitutions
  rule: Short-Form Edited Video, 2D Character Animation, Carousels, and Supervisuals remain distinct governed categories.
- id: PRES-017
  name: Content Harness semantic authority
  rule: The requesting harness owns meaning, Activative purpose, sequence role, and final composition intent.
- id: PRES-018
  name: Activative Sequencing Intelligence
  rule: The Visual Editor supplies assets and geometry to category/format sequencing; it does not replace sequencing authority.
- activative_intelligence_constitutional_precedence
- visual_semantics_before_production
- visual_narrative_before_composition
- expression_moment_source_lineage
allowed_editor_extensions:
- Visual Asset Demand intake and validation
- Visual Production Plan IR
- asset ontology and immutable asset lifecycle
- dynamic visual workcell
- ComfyUI/model/LoRA/control/runtime registries
- visual compute fabric
- asset and composition evaluation
- visual memory and steering knowledge
- production repair and candidate budgets
- asynchronous service interface
- Visual Editor Control Tower projections
collision_policy:
  action: block_and_raise_upstream_amendment
  forbidden: silent reinterpretation or local override
