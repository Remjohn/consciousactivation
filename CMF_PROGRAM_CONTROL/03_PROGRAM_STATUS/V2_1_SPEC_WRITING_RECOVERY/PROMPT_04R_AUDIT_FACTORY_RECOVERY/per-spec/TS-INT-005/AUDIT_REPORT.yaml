note_findings:
  - finding_id: NOTE-INT-005-001
    severity: NOTE
    lens: lens_3_contract_lifecycle_completeness
    location: "Section 3.2, Inventory and package distinction"
    finding: >
      The design correctly separates inventory (complete governed set) from package
      (consumer-targeted projection). Auditor notes that the permitted consumer overlap
      (one inventory supporting multiple package specs for different consumers) is correctly
      stated and will require careful implementation to avoid stale cross-consumer references.
      Build-phase concern.
    required_action: "Record as informational."
    architect_decision_required: false
    blocks_build: false

  - finding_id: NOTE-INT-005-002
    severity: NOTE
    lens: lens_1_fr_story_outcome_coverage
    location: "Section 4.4, TARGET_TRIAL_GUEST_PACK_COUNTS"
    finding: >
      The explicit decision not to canonicalize TARGET_TRIAL_GUEST_PACK_COUNTS is correct
      and necessary to avoid forcing a source gap into a fabricated material. Auditor notes
      this requires that future commercial product definitions do not re-introduce fixed counts
      through back-channel profile inheritance without explicit governance.
    required_action: "Record as informational for future commercial product governance."
    architect_decision_required: false
    blocks_build: false

  - finding_id: NOTE-INT-005-003
    severity: NOTE
    lens: lens_4_activative_primitive_archetype_source_fidelity
    location: "Section 1.5, SRC-AM-002 DEFERRED_REFERENCE"
    finding: >
      SRC-AM-002 deferred (named production-activation archive unavailable). Non-blocking.
      SOURCE_GAP_NOTICE.yaml referenced. No claim attributed to it. Correctly handled.
    required_action: "Record as informational."
    architect_decision_required: false
    blocks_build: false

