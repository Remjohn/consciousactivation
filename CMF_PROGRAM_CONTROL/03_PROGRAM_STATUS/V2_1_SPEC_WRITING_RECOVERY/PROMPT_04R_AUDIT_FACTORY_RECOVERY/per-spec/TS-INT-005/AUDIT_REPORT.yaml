      TS-INT-004 interface consumed consistently with Batch 7 audit findings.
      6 impact classes for dependency edges enable selective invalidation (not cascade all).

  lens_6_build_readiness_testability:
    result: PASS
    findings: []
    notes: >
      10 components with responsibility and forbidden-responsibility columns.
      Inventory and package state machines explicit.
      18 ACs, all falsifiable. Test paths in Section 10.
      Restriction inheritance: package/consumer may add stricter restrictions but never weaken.
      Evidence-bearing NOT_APPLICABLE with 6-field requirement.

blocking_findings: []
