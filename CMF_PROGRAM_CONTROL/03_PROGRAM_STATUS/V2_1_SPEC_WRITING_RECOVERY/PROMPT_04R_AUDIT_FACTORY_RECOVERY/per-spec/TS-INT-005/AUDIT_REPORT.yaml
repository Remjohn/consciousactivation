lens_results:

  lens_1_fr_story_outcome_coverage:
    result: PASS
    findings: []
    notes: >
      FR-132 and ST-02.04 fully covered by 18 ACs in Section 9.
      ST-02.04 requirements (exact source-backed ingredient, reconstruction of inputs,
      decisions, state transitions, handoff, selective recovery) all addressed.
      Fixed TARGET_TRIAL_GUEST_PACK_COUNTS correctly not canonicalized.
      SRC-AM-002 deferred as non-blocking with explicit gap notice.

  lens_2_authority_ownership_sovereignty:
    result: PASS
    findings: []
    notes: >
      authority_state CANDIDATE_NOT_CURRENT and build_authority false correctly declared.
      TS-INT-004 (e6147fc8) DRAFT_DEPENDENCY_NOT_ACCEPTED, passed Batch 7 audit.
      IE owns ExpressionIngredientInventoryVersion, AssetPackageSpecVersion, package
      review/approval decisions, completeness results, gaps, exclusions, handoff receipts,
      correction/supersession lifecycle.
      AIR exclusively owns semantic compilation — SemanticOpportunityRef is explicitly
      NON_AUTHORITATIVE_CANDIDATE with CONSUME_REFERENCE or REQUEST_AIR_COMPILATION action.
      Builder, Pipeline, VAE, Studio, Delegation ownership boundaries explicit per 3.1.
      Proposal/approval segregation: Hunters, extractors, routers, model compilers may propose
      but SHALL NOT self-approve. Approval = source accuracy + downstream eligibility;
      NOT = AIR/Builder/Pipeline/VAE/production acceptance.

  lens_3_contract_lifecycle_completeness:
    result: PASS
    findings: []
    notes: >
      Complete data models: EvidencePointer (12 evidence_kind variants, rational time,
      typed source bindings, portability-safe), ExpressionIngredientCandidate,
      ExpressionIngredientVersion (approved/rejected/superseded/revoked/invalidated lifecycle),
      12 IngredientKind values with per-kind mandatory evidence requirements (6.4),
      SemanticOpportunityRef (authority_state enum, owner, governed_object_ref, downstream_action),
      ExpressionEvidenceGraph (13 RelationKind values, cycle detection, conflict preservation),
      ExpressionIngredientInventoryVersion, AssetPackageRequest, PackageSlot, PackageGap
      (6 gap_kind values), PackageCompletenessResult (7 ApplicabilityDecision values),
      AssetPackageSpecVersion, AssetPackageManifest, 8 required receipts.
      Required commands (10+), events (10+), atomic unit of work, idempotency, concurrency,
      replay, cancellation.
      Inventory and package correctly modeled as distinct (3.2).

  lens_4_activative_primitive_archetype_source_fidelity:
    result: PASS
    findings: []
    notes: >
      SRC-INT-001 (c9014d28) and SRC-INT-002 (58e92fee) both REQUIRED_UNIQUE_EVIDENCE.
      SRC-INT-003 is byte-identical content with SRC-INT-002, correctly retained as provenance alias.
      Semantic opportunities are explicitly NON_AUTHORITATIVE_CANDIDATE — IE cannot create
      approved Primitive, archetype coalition, role-tension, Matrix, Edge Product, Final Script,
      Activation Transfer, Visual Semantic Pack, Visual Narrative Program, or Feature Contract.
      Package approval does not change SemanticOpportunityRef authority_state.
      Per-kind ingredient evidence requirements (6.4) are specific and correct:
      EXACT_QUOTE requires exact words, speaker, source time, transcript revision, Moment boundary;
      KEYFRAME requires shot/index version, frame/time, source artifact, crop/transform.
      NOT_APPLICABLE evidence rules in 3.7 are comprehensive.

  lens_5_brownfield_cross_spec_consistency:
    result: PASS
    findings: []
    notes: >
      10 brownfield sources with explicit dispositions. Studio predecessor concepts correctly
      ADAPT (ingredient/relation vocabulary, gap behavior, approval-before-handoff) vs REPLACE
