findings:
  - id: NOTE-EVAL-001-001
    lens: 6
    severity: NOTE
    title: "EvaluationProfileRef certification_state: SPECIFIED_NOT_CERTIFIED accurately captures status truth"
    description: >
      Section 3.2 and section 6.1 specify EvaluationProfileRef with certification_state=SPECIFIED_NOT_CERTIFIED.
      The spec explicitly states that capability presence and contract compatibility are distinct from
      certification. It provides a 5-level certification ladder (SPECIFIED_NOT_CERTIFIED -> TEST_FIXTURE_NOT_CERTIFIED
      -> BENCHMARKED -> LIMITED_PRODUCTION_CERTIFIED -> PRODUCTION_CERTIFIED). This design correctly prevents
      premature claims of production readiness during structural testing. Recorded as a note to guide implementation
      stage certification testing.
    action: None required at this stage.

