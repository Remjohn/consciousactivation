findings:
  - id: NOTE-ANI-001-001
    lens: 4
    severity: NOTE
    title: "Generated performance labeling — cue-level enforcement required at implementation"
    description: >
      Section 6.4 PerformanceTrackV1 specifies that a generated cue carries a generated-performance
      label and cannot claim actual participant reaction. Section 3.4 further requires
      GENERATED_PERFORMANCE labeling unless a cue is a direct, source-timed representation whose
      provenance permits a narrower claim. AC-ANI-008 tests this boundary.
      The spec does not specify the exact schema field name for the generated-performance label on
      PerformanceTrackV1 cues — the field is implied but not fully named as a required enum/boolean
      in the cue schema pseudocode. This does not constitute a blocking finding because the
      behavioral requirement is clearly stated; implementors must ensure the field is explicitly
      typed and that its absence fails validation.
    action: Implementation must add an explicit typed generated_performance field to the cue schema.
      This is a design-completion item for the implementation stage, not an audit blocker.

