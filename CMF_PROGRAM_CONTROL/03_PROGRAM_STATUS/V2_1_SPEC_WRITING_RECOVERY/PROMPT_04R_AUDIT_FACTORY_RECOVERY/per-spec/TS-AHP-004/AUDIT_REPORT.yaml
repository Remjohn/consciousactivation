findings:
  - id: NOTE-AHP4-001-001
    lens: 2
    severity: NOTE
    title: "AIR repair-plan ownership separation — Pipeline computes runtime graph, AIR owns semantic repair"
    description: >
      Section 3.5 and section 5.6 specify the boundary between AIR semantic repair and Pipeline runtime
      selective repair. AIR owns FailureAttribution and SemanticRepairProgram constraints (target, permitted/
      forbidden selectors, preserved assertions, locks). Pipeline computes its own RuntimeInvalidationPlan
      and RuntimeSelectiveRepairPlan from its frozen runtime graph, deciding checkpoint reuse and rerun scheduling
      without faking AIR authority. This is a clean architectural separation. Recorded as a note for the
      implementation team to maintain separate domain models for AIR repair programs and Pipeline repair plans.
    action: None required at this stage.

