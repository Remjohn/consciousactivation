findings:
  - id: NOTE-VID-001-001
    lens: 6
    severity: NOTE
    title: "Generated slot lifecycle interplay with execution_eligible"
    description: >
      Section 5.5 Workflow D step 3 states elements may reference a typed generated slot requirement,
      and step 6 confirms unmaterialized slots keep execution_eligible=false. The VideoEditProgram
      schema (section 6.6) also hard-codes execution_eligible=false at the aggregate level.
      The spec correctly notes a program with unmaterialized generated slots is a valid planning
      artifact but not execution eligible. No ambiguity exists at the schema level. This note
      records the design decision explicitly for downstream spec writers (TS-VID-002 onward) who
      must bind generated slots before execution eligibility can change.
    action: None required at this stage.

