    severity: NOTE
    lens: lens_2_authority_ownership_sovereignty
    location: "Section 3.3, Route Eligibility"
    finding: >
      Route eligibility requires 6 independent passes. If genuine alternatives exist, human selection
      is required. If none exist, NO_ELIGIBLE_ROUTE blocks the job without blocking unrelated jobs.
      This design prevents silent auto-routing into incorrect archetypes.
