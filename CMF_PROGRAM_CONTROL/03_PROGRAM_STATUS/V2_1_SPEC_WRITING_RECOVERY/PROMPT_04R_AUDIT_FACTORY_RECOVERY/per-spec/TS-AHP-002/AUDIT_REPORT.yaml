  - finding_id: NOTE-AHP-002-001
    severity: NOTE
    lens: lens_1_fr_story_outcome_coverage
    location: "Section 1, upstream draft dependencies"
    finding: >
      TS-AHP-001 and TS-AIR-001 were consumed as DRAFT_DEPENDENCY_NOT_ACCEPTED.
      Both passed Batch 1 audit (AUDIT_PASS). The revision-impact rule in this spec
      is now satisfied for Batch 2 — the draft hashes match what was audited.
      No revision impact detected.
    required_action: "Record as informational."
    architect_decision_required: false
    blocks_build: false

  - finding_id: NOTE-AHP-002-002
    severity: NOTE
    lens: lens_5_brownfield_cross_spec_consistency
    location: "Section 3, exact compiler-profile dispatch"
    finding: >
      The spec documents two current Builder compiler profiles sharing schema ID
      cmf-builder-atomic-harness-definition/v1@1.0.0 with different compiler IDs.
      The four-part discriminator requirement is correct and enforceable. However
      the spec does not enumerate or register these profile IDs in a governed registry
      document — a future compatibility registry spec should formalize them.
    required_action: "Track as a follow-on action; does not block TS-AHP-002 audit."
    architect_decision_required: false
    blocks_build: false

