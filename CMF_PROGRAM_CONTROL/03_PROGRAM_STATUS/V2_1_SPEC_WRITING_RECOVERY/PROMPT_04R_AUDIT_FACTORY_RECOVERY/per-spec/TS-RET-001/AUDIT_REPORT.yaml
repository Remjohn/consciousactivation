    severity: NOTE
    title: "Minimum Complete Context deletion proof requirement — solver must prove necessity of each item"
    description: >
      Section 3.1 Decision D4, section 5.2 step 13, and section 6.7 ContextSelection specify that
      the context solver must execute a deletion proof: removing any selected item from the capsule
      must violate at least one recorded coverage obligation (slot minimum, exact dependency, provenance,
      contradiction, lock, etc.). Items without a necessity proof are removed. This is a rigorous and
      unique design pattern for preventing prompt/context bloat. Recorded as a note for the implementation
      team to implement explicit necessity proof functions in the context solver.
    action: None required at this stage.

