story_cbar:
- story_id: AIR-ST-11.01
  protected_law: complete source-backed Expression Moment boundaries preserve premise cause and reaction tail
  tempting_shortcut: extract the shortest quotable phrase
  downstream_consumer: AIR-ST-11.02
  prohibited_failure: qualifying premise or emotional tail is removed and a false flattened moment becomes routeable
  defenses: [exact source bundle, boundary roles, contradiction evidence, typed denial, independent Analyst]
- story_id: AIR-ST-11.02
  protected_law: source-backed felt truth and lifecycle evidence outrank polish or score
  tempting_shortcut: promote a high-score or visually salient candidate and discard borderline evidence
  downstream_consumer: AIR-ST-11.03
  prohibited_failure: manufactured or context-stripped meaning enters the AIR handoff
  defenses: [profile-bound dimensions, source evidence, route constraints, negative-evidence retention, immutable decisions]
- story_id: AIR-ST-11.03
  protected_law: AIR compiles Observed Activative Intelligence from exact approved IE evidence without taking ownership of it
  tempting_shortcut: compile AIR semantics inside IE or hand a derivative producer reinterpretation authority
  downstream_consumer: AIR-ST-12.01
  prohibited_failure: source evidence ownership and guest meaning are lost in downstream compilation
  defenses: [typed handoff, one-owner flags, exact refs, separate acknowledgement, maximum claim]
- story_id: ST-02.01
  protected_law: Hunters propose but do not approve and tag provenance never collapses
  tempting_shortcut: treat planned or inferred tags as observed or confirmed for faster routing
  downstream_consumer: archetype_router_and_derivative_job_compiler
  prohibited_failure: unsupported context-stripped meaning propagates into every format
  defenses: [two-axis tag state, exact evidence, confirmation receipt, production query exclusion]
- story_id: ST-02.03
  protected_law: only truthful complete approved moments enter production and negative evidence remains traceable
  tempting_shortcut: self-approve a catchy partial quote or delete rejected candidates
  downstream_consumer: archetype_router_and_derivative_job_compiler
  prohibited_failure: false meaning becomes a production dependency and failures cannot be learned or replayed
  defenses: [role separation, complete boundary, independent evaluation, approval receipt, negative-evidence store]
