story_cbar:
- story_id: AIR-ST-10.01
  protected_law: Observation records concrete human evidence and epistemic state rather than a model diagnosis.
  tempting_shortcut: Infer reaction outcome directly from fluent transcript language or one strong visual signal.
  prohibited_failure: Missing capture is treated as activation null or inferred meaning is laundered as observation.
  defenses: [typed observation and interpretation split, modality coverage, evidence windows, typed insufficiency]
- story_id: AIR-ST-10.02
  protected_law: A live Reaction Receipt binds the call actually delivered and preserves immutable source evidence.
  tempting_shortcut: Bind an AIR proposal or overwrite corrected evidence in place.
  prohibited_failure: Receipt lineage cannot reproduce the historical trigger observation outcome and correction history.
  defenses: [delivered-call evidence, immutable successor versions, optimistic concurrency, atomic commit, replay]
- story_id: AIR-ST-10.03
  protected_law: Independent evaluation constrains the strongest supported claim and does not auto-approve an Expression Moment.
  tempting_shortcut: Let the call proposer or receipt compiler self-evaluate or equate affect intensity with intended activation.
  prohibited_failure: Downstream semantic compilation consumes a self-confirming or overclaimed receipt.
  defenses: [evaluator role separation, alternatives, maximum claim, eligibility gate, immutable evaluation receipt]
