schema_version: conscious-activations-semantic-object-ownership-matrix/v2.1-candidate
status: CANDIDATE_PENDING_HUMAN_RATIFICATION
ownership_rule: one_authoritative_value_owner_per_semantic_object_or_field
objects:
  - object: Coach_or_Guest_Identity_DNA
    authoritative_value_owner: authorized_human_source_authority
    lifecycle_system: Activative_Intelligence_Runtime
    downstream_consumers: [Interview_Expression, Atomic_Harness_Builder, Atomic_Harness_Pipeline]
    prohibition: model_candidates_may_not_silently_mutate_canonical_identity
  - object: Context_Premise
    authoritative_value_owner: Activative_Intelligence_Runtime
    epistemic_boundary: versioned_hypothesis_not_persona_fact
  - object: Resonance_and_Matrix_of_Edging
    authoritative_value_owner: Activative_Intelligence_Runtime
    downstream_rule: dependencies_may_be_declared_or_executed_but_not_reinterpreted
  - object: Planned_Activative_Intelligence_and_Interview_Asset_Contract
    authoritative_value_owner: Activative_Intelligence_Runtime
    consumer: Interview_Expression
  - object: Live_Activative_State
    authoritative_value_owner: Interview_Expression
    persistence_rule: ephemeral_receipt_bearing_state_not_historical_truth_until_resolved
  - object: Reaction_Observation_and_Reaction_Receipt
    authoritative_value_owner: Interview_Expression
    fabrication_prohibited: true
  - object: Expression_Moment
    authoritative_value_owner: Interview_Expression
    approval_requirement: operator_or_governed_approval
  - object: Canonical_Interview_Source_Package
    authoritative_value_owner: Interview_Expression
    imported_history_invention_prohibited: true
  - object: Observed_Activative_Intelligence
    authoritative_value_owner: Activative_Intelligence_Runtime
    source_evidence_owner: Interview_Expression
  - object: Primitive_Coalition_Coalition_Signature_and_Edge_Product
    authoritative_value_owner: Activative_Intelligence_Runtime
  - object: Archetype_Coalition_and_Final_Script
    authoritative_value_owner: Activative_Intelligence_Runtime
    approval_requirement: attributable_operator_approval
  - object: Activation_Transfer_and_Audience_or_Campaign_Program
    authoritative_value_owner: Activative_Intelligence_Runtime
  - object: Composition_Intent_and_category_native_production_program_meaning
    authoritative_value_owner: Activative_Intelligence_Runtime
    execution_owner: Atomic_Harness_Pipeline
    VAE_rule: realize_typed_visual_demands_without_mutating_upstream_intent
  - object: AtomicHarnessDefinition
    authoritative_value_owner: Atomic_Harness_Builder
    semantic_dependency_rule: references_exact_AIR_and_Interview_objects
  - object: Runtime_execution_state_and_selective_repair_plan
    authoritative_value_owner: Atomic_Harness_Pipeline
  - object: Visual_Asset_Demand
    authoritative_value_owner: Atomic_Harness_Pipeline_Harness
    immutable_versioning_required: true
  - object: Visual_Production_Plan_and_visual_realization
    authoritative_value_owner: Visual_Asset_Editor
  - object: Production_Acceptance_and_asset_delivery
    authoritative_value_owner: Visual_Asset_Editor
    downstream_consumption_authorization_inferred: false
  - object: Delegation_envelope_lifecycle_and_transport_receipts
    authoritative_value_owner: Delegation_Protocol
    semantic_interpretation_prohibited: true
  - object: HumanResolutionEpisode
    authoritative_value_owner: Conscious_Activations_Studio
    promotion_owner: Activative_Intelligence_Runtime_under_Program_Control_scope
    universal_automatic_promotion_prohibited: true
  - object: independent_evaluation_receipt
    authoritative_value_owner: Independent_Evaluation
    producer_self_approval_prohibited: true
identity_guard:
  Activative_Contract_Compiler:
    product_owner: Atomic_Harness_Builder
    nature: structural_dependency_and_contract_compilation
  Activative_Intelligence_Runtime:
    product_owner: Activative_Intelligence_Runtime
    nature: semantic_temporal_activation_runtime
  equality: false
source_authority_guard:
  operator_supplied_source_authority: preserved
  provenance: mandatory_where_applicable
  lineage: preserved
  approvals: attributable_and_scoped
  generic_creative_safety_or_content_rights_approver: not_created
