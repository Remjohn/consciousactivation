schema_version: conscious-activations-cross-product-authority-matrix/v2.1-candidate
status: CANDIDATE_PENDING_HUMAN_RATIFICATION
current_authority_unchanged: true
products:
  - product: Program Control
    owns:
      - constitutional_ratification
      - candidate_to_current_authority_transition
      - cross_product_ownership_and_compatibility_governance
      - canonical_program_status
      - release_and_claim_authority
    must_not_own:
      - live_interview_execution
      - semantic_runtime_execution
      - composition_or_visual_production
      - provider_operation

  - product: Activative Intelligence Runtime
    owns:
      - semantic_activation_lifecycle
      - activation_hypotheses_and_epistemic_state
      - Matrix_of_Edging_and_Edge_Product_interpretation
      - Primitive_and_archetype_semantic_programs
      - Final_Script_semantic_compilation
      - Activation_Transfer_and_campaign_program_meaning
      - scoped_learning_candidates
    must_not_own:
      - live_source_observation
      - AtomicHarnessDefinition_compilation
      - Pipeline_execution
      - visual_provider_or_renderer_execution
      - Studio_canonical_state

  - product: Interview Expression
    owns:
      - brief_led_and_imported_source_admission
      - live_source_activation_execution
      - Reaction_Observations_and_Reaction_Receipts
      - Expression_Moment_resolution
      - Canonical_Interview_Source_Package
    must_not_own:
      - audience_derivative_semantics
      - final_composition
      - Pipeline_or_VAE_execution

  - product: Atomic Harness Builder
    owns:
      - exact_semantic_dependency_declaration
      - capability_role_phase_contract_evaluation_and_repair_requirement_compilation
      - AtomicHarnessDefinition
    must_not_own:
      - Activative_semantic_truth
      - live_activation
      - Pipeline_execution
      - VAE_production_decisions
    identity_guard: Activative_Contract_Compiler_is_not_Activative_Intelligence_Runtime

  - product: Atomic Harness Pipeline
    owns:
      - execution_of_approved_Harnesses_and_derivative_programs
      - workflow_nodes_runtime_bindings_JIT_state_and_receipts
      - category_native_composition_and_editing_execution
      - evaluation_control_and_selective_repair_execution
      - authoritative_Visual_Asset_Demand_emission
    must_not_own:
      - semantic_reinterpretation_of_source_Edge_Product_Primitive_coalition_or_Final_Script
      - AIR_program_compilation
      - VAE_internal_production_strategy

  - product: Visual Asset Editor
    owns:
      - Visual_Production_Plan
      - production_route_workflow_model_LoRA_and_conditioning_selection
      - candidate_generation_production_evaluation_and_targeted_repair
      - production_acceptance_asset_lineage_and_delivery
    must_not_own:
      - source_activation
      - upstream_semantic_or_composition_authority_mutation
      - archetype_or_Final_Script_authority
    stage_5_authorized: false

  - product: Conscious Activations Studio
    owns:
      - lifecycle_projections
      - typed_operator_commands_and_review
      - direct_manipulation_and_publication_surfaces
      - HumanResolutionEpisode_capture
      - correction_projection
    must_not_own:
      - hidden_semantic_authority
      - canonical_workflow_state
      - automatic_global_learning_promotion

  - product: Delegation Protocol
    owns:
      - typed_cross_product_transport
      - compatibility_and_authority_enforcement
      - cancellation_amendment_supersession_and_result_delivery
      - immutable_routing_audit_receipts_and_shared_failure_semantics
    must_not_own:
      - semantic_interpretation
      - creative_authority
      - production_strategy

  - product: Independent Evaluation
    owns:
      - deterministic_and_calibrated_judgment_receipts_separate_from_producers
    must_not_own:
      - source_truth
      - composition
      - promotion_or_release_authority

human_and_source_authority:
  operator_supplied_source_authority_preserved: true
  provenance_lineage_route_scope_and_attributable_approvals_required: true
  product_sovereignty_preserved: true
  generic_creative_safety_approval_authority_created: false
  generic_content_rights_approval_authority_created: false
  technical_security_scope: operational_only
