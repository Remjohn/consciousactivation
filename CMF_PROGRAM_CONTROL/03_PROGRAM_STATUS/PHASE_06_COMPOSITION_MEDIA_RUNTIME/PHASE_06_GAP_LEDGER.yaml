schema_version: ca-phase06-gap-ledger/v1
gaps:
  - id: P6-GAP-001
    status: OPEN
    severity: HIGH
    finding: "Actual skia-python execution is optional; the validated fallback is a deterministic Skia-compatible reference rasterizer."
    affected_specs: [TS-STA-001,TS-SPV-001,TS-CAR-001]
    closure: "Bind and verify a pinned real Skia runtime without changing Composition IR."
  - id: P6-GAP-002
    status: OPEN
    severity: HIGH
    finding: "Remotion and HyperFrames are compiled as exact binding manifests but their external runtimes are not executed."
    affected_specs: [TS-VID-004,TS-VID-005]
    closure: "Pin runtime versions and execute clean-room adapter conformance in a later integration phase."
  - id: P6-GAP-003
    status: OPEN
    severity: HIGH
    finding: "Independent visual judgment is represented by typed evaluator separation; no certified VLM evaluator is called."
    affected_specs: [TS-VID-006,TS-EVAL-001,TS-EVAL-002]
    closure: "Bind a governed evaluator identity and calibration evidence."
  - id: P6-GAP-004
    status: OPEN
    severity: MEDIUM
    finding: "Word-boundary EDL supports bounded selected spans but not the complete portfolio/context/reaction policy surface."
    affected_specs: [TS-VID-002]
    closure: "Add full candidate portfolio and semantic-context validators."
  - id: P6-GAP-005
    status: OPEN
    severity: MEDIUM
    finding: "Variable-frame-rate ordinal/pixel-digest reconciliation is not fully implemented."
    affected_specs: [TS-VID-001]
    closure: "Add exact decoded-frame identity and VFR property fixtures."
  - id: P6-GAP-006
    status: OPEN
    severity: MEDIUM
    finding: "FFmpeg rendering does not yet burn styled captions or multi-layer Remotion/HyperFrames output into the master timeline."
    affected_specs: [TS-VID-003,TS-VID-005]
    closure: "Add caption/overlay composition after runtime adapters are pinned."
  - id: P6-GAP-007
    status: OPEN
    severity: MEDIUM
    finding: "Composition IR supports text and geometry reference elements; arbitrary image/mask/depth assets and VAE results remain later work."
    affected_specs: [TS-STA-001,TS-SPV-001,TS-CAR-001]
    closure: "Integrate exact VAE result consumption after Stage 8 boundary work."
  - id: P6-GAP-008
    status: OPEN
    severity: MEDIUM
    finding: "Carousel PDF and slide PNGs are reference outputs; JPEG, richer typography, annotations and template families remain incomplete."
    affected_specs: [TS-CAR-001]
    closure: "Expand category-native Carousel template and annotation support."
  - id: P6-GAP-009
    status: OPEN
    severity: HIGH
    finding: "Animation realization is a bounded generated-motion reference, not a rig/layer/voice/performance-library runtime."
    affected_specs: [TS-ANI-001]
    closure: "Integrate approved non-Format-02 rig and performance bindings."
  - id: P6-GAP-010
    status: OPEN
    severity: HIGH
    finding: "Repair service produces bounded plans and ownership escalation; it does not execute all repair actions automatically."
    affected_specs: [TS-EVAL-003]
    closure: "Implement action-specific successor mutations with per-action tests and attempt receipts."
  - id: P6-GAP-011
    status: OPEN
    severity: MEDIUM
    finding: "Rendered cut evidence is extracted, but mouth continuity, waveform discontinuity and semantic judgment remain pending."
    affected_specs: [TS-VID-006,TS-EVAL-002]
    closure: "Add deterministic waveform analysis and governed VLM/human judgment."
  - id: P6-GAP-012
    status: DEFERRED
    severity: HIGH
    finding: "VAE Stage 5, GNM, ComfyUI, SAM3 and Lucida are outside Phase 6."
    affected_specs: [TS-ANI-001,TS-EVAL-001]
    closure: "Remain deferred to Phase 8."
  - id: P6-GAP-013
    status: DEFERRED
    severity: HIGH
    finding: "Format 02 remains inactive."
    affected_specs: [TS-ANI-001]
    closure: "Requires separately authorized current Harness and independent proof."
