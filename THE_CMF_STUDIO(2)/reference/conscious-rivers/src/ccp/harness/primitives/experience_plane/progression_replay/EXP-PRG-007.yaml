activation_conditions:
  - "User logs in and views the primary topic feed or debate arena"
  - "The system detects a major industry event via the SCRE"
  - "User has completed the initial 28-day baseline and requires ongoing retention hooks"

suppression_conditions:
  - "User is in the middle of a highly structured, foundational curriculum (like Day 1-7); do not distract them with chaotic live events yet."

misuse_modes:
  - "Gimmick Overload — changing the rules so often and so drastically that the user can never establish a baseline or feel mastery."
  - "Fake Urgency — labeling a generic, boring topic as a 'Breaking Live Event', destroying trust in the Live-Ops system."

