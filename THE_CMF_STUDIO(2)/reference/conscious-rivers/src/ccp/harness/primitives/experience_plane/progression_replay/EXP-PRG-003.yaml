misuse_modes:
  - "Participation Trophies — calling a mundane daily task an 'Epic Win', which immediately destroys the credibility of the platform's praise."
  - "Impossible Wins — making the boss battle so mathematically difficult that no one ever achieves it, causing community-wide resentment."

