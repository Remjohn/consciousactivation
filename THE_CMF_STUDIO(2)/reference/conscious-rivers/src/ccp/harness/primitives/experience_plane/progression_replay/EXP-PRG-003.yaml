summary: >
  Go for an Epic Win dictates that long progressions must occasionally culminate
  in rare, high-stakes, highly visible challenges that require everything the
  user has learned. If a coach simply does a daily 60-second drill for 365 days,
  the progression feels flat. In CCP, we punctuate the daily grind with 'Epic
  Wins'. For example, successfully defending a thesis live on a V2WS automated
  webinar in front of 50 prospects, or winning a multi-round debate tournament.
  These moments provide massive emotional payoffs that validate the months of
  silent daily practice.

core_move: >
  Design rare, high-stakes culmination events that require the synthesis of
  all previously practiced skills, resulting in a disproportionately large
  status or visibility reward.

why_it_works: >
  Jane McGonigal points out that 'Epic Wins' are what give daily grinding its
  meaning. A gamer kills 10,000 low-level boars (the grind) purely for the chance
  to fight the dragon (the Epic Win). If the dragon doesn't exist, the grinding
  is just a chore. In the coaching world, doing Law28 daily drills is the grind.
  The Epic Win is utilizing that newfound authority to close a massive client or
  dominate a public debate. By bringing the Epic Win directly into the CCP
  ecosystem (via public jury events or V2WS), we give the daily progression its
  ultimate purpose.

examples:
  - context: "BOOK: Reality Is Broken - The World of Warcraft Raid"
    application: >
      A 40-person raid against a final boss requires immense coordination, weeks
      of preparation, and high stress. When the boss finally falls, the emotional
      elation is unforgettable and binds the players to the game for years.
    effect: >
      Creates peak emotional memories that justify long-term subscription retention.

  - context: "CCP: The V2WS Live Deployment"
    application: >
      A coach has been practicing their 'Pitch Close' in the sandbox for 3 weeks.
      The system finally clears them to deploy it into a live V2WS webinar. They
      deliver the pitch flawlessly, and the system registers 3 new client bookings.
    effect: >
      The ultimate Epic Win. The app transitions from 'practice tool' to 'revenue generator'.

  - context: "CCP: The Sunday Showdown"
    application: >
      Once a month, the top 4 debaters in a specific topic lane (e.g., Fitness Marketing)
      are invited to a live audio 'Showdown.' The winner receives a permanent 'Sovereign'
      badge displayed on all their future Takes.
    effect: >
      Provides a highly aspirational goal for all users currently grinding in the lower tiers.

  - context: "CCP: The Day 28 Capstone"
    application: >
      On the final day of the Law28 challenge, the drill is not a standard prompt.
      It is a 5-minute unedited synthesis requiring the coach to integrate Command,
      Clarity, and Nuance simultaneously. Passing it unlocks the Platinum Card.
    effect: >
      Turns the end of the streak into a massive, memorable graduation event.

  - context: "CCP: The 99% Conviction Club"
    application: >
      An extremely rare, hidden achievement that only triggers if the AI detects
      zero hedging and perfect pacing on a highly controversial topic.
    effect: >
      Creates legendary status within the community, driving elite users to obsess
      over perfecting their craft.

anti_examples:
  - description: >
      Reaching Day 100 of a streak and receiving a generic push notification:
      'Congratulations on 100 days. Here is Day 101: the exact same drill.'
    why_it_fails: >
      Total anti-climax. The user feels their long-term progression is unvalued
      and meaningless, leading to immediate replay fatigue and churn.

