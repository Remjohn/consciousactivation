summary: >
  RIM Feedback Discipline ensures that all feedback delivered to the user is Relevant
  (tied directly to their current goal), Immediate (delivered the moment the action
  is completed), and Meaningful (understandable within the context of their identity).
  It strictly bans delayed, disconnected, or purely vanity metrics.

core_move: >
  Architect the feedback loops so that the moment the user completes an action, the
  system immediately returns a score or visual response that explicitly explains
  *why* the action mattered to the user's specific progression.

why_it_works: >
  Jane McGonigal defines Direct Feedback as one of the four defining traits of a
  game. Without immediate, meaningful feedback, the user feels like they are throwing
  effort into a void, which destroys intrinsic motivation. By ensuring the feedback
  is 'RIM' (Relevant, Immediate, Meaningful), the user's brain successfully maps
  the effort to the reward, reinforcing the neural pathway necessary for habit
  formation and triggering curiosity about how to score higher next time.

examples:
  - context: "BOOK: Reality Is Broken - The Tetris Drop"
    application: >
      When a player drops a piece in Tetris, the line immediately flashes and disappears.
      The score updates instantly. The feedback is perfectly Relevant, Immediate, and
      Meaningful to the goal of clearing the board.
    effect: >
      Creates a tight neurological loop that makes the game highly addictive.

  - context: "CCP: The Live Conviction Meter"
    application: >
      During a V2WS Automated Webinar, the coach receives real-time, ambient color
      feedback on the edges of their screen based on their vocal intensity (Immediate).
      Green means high conviction, alerting them they are succeeding (Meaningful).
    effect: >
      Allows micro-adjustments in real-time without breaking flow.

  - context: "CCP: The Instant AI Scorecard"
    application: >
      The millisecond a coach submits a Conscious Reactions audio clip, the CPSC
      scoring engine processes it. Within 3 seconds, a Telegram message arrives with
      their exact Delivery Score and a 1-sentence breakdown.
    effect: >
      The extreme immediacy prevents post-recording anxiety and capitalizes on peak curiosity.

  - context: "CCP: The +1 Resonance Power-Up"
    application: >
      When a user receives a 'Based' vote from a peer, they instantly receive a push
      notification saying '+1 Resonance. Your message connected.'
    effect: >
      Transforms a generic 'Like' into a meaningful validation of their speaking identity.

  - context: "CCP: The Post-Debate Haptic Pulse"
    application: >
      Upon finishing a CBCS Law 28 drill, the Mini App vibrates sequentially 3 times
      and displays a visual checkmark before returning to the home screen.
    effect: >
      Provides satisfying, visceral feedback that the heavy cognitive lifting is complete.

anti_examples:
  - description: >
      A user records 10 audio responses over a week. On Sunday, they receive an email
      saying 'You spoke 5,000 words this week! Good job.'
    why_it_fails: >
      The feedback is dangerously delayed. The user cannot connect the score to any
      specific performance, breaking the action-reaction loop and rendering the data meaningless.

