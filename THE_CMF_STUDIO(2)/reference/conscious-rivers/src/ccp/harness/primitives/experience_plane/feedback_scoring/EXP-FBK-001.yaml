activation_conditions:
  - "User completes any loop requiring physical or cognitive effort"
  - "A peer interacts with the user's previously generated content"

suppression_conditions:
  - "User is in the middle of a continuous recording (do not interrupt with loud feedback unless it is ambient)."

misuse_modes:
  - "Notification Spam — confusing 'Immediate' with 'Constant', pinging the user for every tiny background event until they mute the bot."
  - "Vanity Metrics — giving them a score that goes up arbitrarily (e.g., '10 points for logging in') which contains no meaning about their actual skill."

