summary: >
  The Signature Moment dictates that the most important feedback reveal (the final
  Delivery Score, the Epic Win) must not just be text on a screen. It must be
  a distinct, memorable, multi-sensory UI/UX event (animations, sounds, haptics)
  that physically triggers 'Fiero'—the intense emotional high of triumph.

core_move: >
  Isolate the absolute peak moment of the user's journey (e.g., receiving their
  first CPSC evaluation) and engineer a 2-second visual/haptic animation sequence
  that builds anticipation and releases it in a satisfying, high-fidelity crescendo.

why_it_works: >
  Jane McGonigal identifies 'Fiero' as one of the most powerful neurochemical
  experiences humans can have (the feeling of throwing your hands in the air after
  a hard victory). Fiero does not happen from reading plain text. It is triggered
  by clear, undeniable, and *celebratory* feedback. Nir Eyal notes that variable
  rewards are most addictive when they include sensory anticipation (like the spinning
  wheels of a slot machine). By combining anticipation with a high-fidelity visual
  release, the brain is flooded with dopamine, locking in the habit loop.

examples:
  - context: "BOOK: Hooked - The Slot Machine Pull"
    application: >
      A slot machine doesn't just instantly display 'Win' or 'Lose'. It spins the
      wheels, plays a rising audio tone, and then flashes brightly on a win. The
      sensory anticipation is what makes the feedback addictive.
    effect: >
      Maximizes the dopamine spike *before* the reward is even delivered.

  - context: "CCP: The CPSC Score Reveal"
    application: >
      When a coach receives their delivery score, it isn't just text. A clean, premium
      golden circle draws itself on the screen over 1.5 seconds, the phone gives a
      subtle double-vibrate, and the final number 'locks' into place with a crisp sound.
    effect: >
      Transforms a basic data point into a visceral, memorable 'Fiero' event.

  - context: "CCP: The Silent Referral 'Unlock'"
    application: >
      When a user hits the 90+ threshold, the screen darkens, a subtle bass note plays,
      and a glowing 'Challenge a Peer' asset slides into the center of the UI.
    effect: >
      Makes the ability to refer a friend feel like a highly exclusive, earned privilege.

  - context: "CCP: The 'Epic Win' Showdown Result"
    application: >
      At the end of a live debate, the Jury's votes are tallied in real-time on screen
      with a tension-building animation, culminating in a burst of digital confetti
      and a crown icon landing on the winner.
    effect: >
      Provides the undeniable visual proof of victory required to trigger Fiero.

  - context: "CCP: The Streak Saver"
    application: >
      When a user completes a recording at 11:50 PM to save their 28-day streak, the UI
      doesn't just say 'Day 14 complete.' It plays a 'chain linking' animation and a
      metallic clink sound, reinforcing the rescue of their progress.
    effect: >
      Rewards the high-friction effort of late-night compliance with a disproportionately satisfying sensory payoff.

anti_examples:
  - description: >
      The user completes a grueling 7-day challenge. They hit submit. The screen instantly
      flashes to a plain white page with black text that says: 'Challenge complete. 7/7.'
    why_it_fails: >
      Complete anti-climax. The user put in massive effort and received zero sensory reward.
      The lack of a Signature Moment leaves them feeling empty, preventing Fiero and killing
      the desire to start a new loop.

