summary: >
  Collaborative Role Architecture recognizes that not every user wants to or
  is ready to perform the highest-friction core action (e.g., speaking on camera).
  A healthy social economy requires distinct, interdependent roles. In CCP, we
  explicitly design 'Asymmetric Participation' pathways: a user can enter as a
  Jury Member (voting), an Accountability Partner (witnessing), or a Coach
  (speaking). These roles rely on each other, creating a rich ecosystem that
  lowers the barrier to entry while maintaining high engagement.

core_move: >
  Create multiple, distinct participation roles within the ecosystem that
  require lower friction to enter but still directly impact the outcomes
  of the high-friction users.

why_it_works: >
  Brian Burke emphasizes "Shared-Goal Design"—gamification works best when
  different players contribute to a shared outcome using different skills. If
  the only way to use CCP is to record a 3-minute flawless voice note, 90% of
  prospects will bounce due to friction. By allowing users to join as 'Jury
  Members' who judge debates, we offer a low-friction, highly social entry point.
  They participate, feel the energy of the arena, cast Social Treasures (votes),
  and slowly acclimate to the environment until they are ready to step up and
  become a Speaker themselves.

examples:
  - context: "BOOK: Gamify - Crowdsourcing roles"
    application: >
      In Foldit (the protein-folding game), some players are spatial solvers,
      others are team organizers, and others write scripts to automate solutions.
      The game succeeds because it accommodates multiple distinct roles that
      need each other.
    effect: >
      Massive community growth because players aren't forced into a single, rigid behavior profile.

  - context: "CCP: The Audience Jury Mode"
    application: >
      A prospect receives a debate link from a friend. They don't want to speak yet.
      The system assigns them the role of 'Juror.' They listen to both sides and vote.
      Their vote directly alters the debate outcome.
    effect: >
      The prospect is successfully onboarded into the Telegram ecosystem with near-zero friction.

  - context: "CCP: The Accountability Supervisor"
    application: >
      A Law28 participant invites their real-world business partner to be their
      'Supervisor.' The Supervisor doesn't do the speaking drills; their role is
      to receive the participant's daily score and press a 'Validate' button.
    effect: >
      The participant gets accountability, and the Supervisor gets exposed to the CCP system.

  - context: "CCP: Role Escalation (The Staircase)"
    application: >
      After acting as a Juror on 5 different debates, the system triggers a prompt:
      'You have good judgment. A new topic just dropped. Step into the arena and
      record your own take.'
    effect: >
      Converts a low-friction user into a high-value core user by leveraging their existing investment.

  - context: "CCP: Coach OS Operator Role"
    application: >
      At the $99/mo tier, the coach shifts from 'Participant' to 'Operator.' They
      now assign topics to their own community and act as the ultimate judge.
    effect: >
      Provides a clear endgame role transition that justifies premium pricing.

anti_examples:
  - description: >
      Forcing every user who clicks a shared link to immediately grant microphone
      access and record a voice note before they can see the content.
    why_it_fails: >
      A monolithic, zero-flexibility role architecture. The friction is too high for
      a cold referral. The user bounces, killing the viral loop and destroying the
      Silent Referral mechanics.

