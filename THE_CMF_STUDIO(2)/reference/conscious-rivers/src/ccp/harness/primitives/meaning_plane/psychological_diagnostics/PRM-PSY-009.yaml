summary: >
  The Stress Pot Regulator is an enhancement primitive that treats stress as a continuous, measurable metabolic variable. It models the human nervous system as a finite "pot" where all stressors (positive and negative, physical and emotional) accumulate. In CCP, this primitive serves as a foundational diagnostic. By granularly auditing the specific inputs filling a client's pot and explicitly identifying which inputs can be removed, the coach systematically prevents nervous system overflow, transforming abstract anxiety into manageable, structural clarity.

core_move: >
  Audit the cumulative inputs filling the client's stress capacity, and selectively remove inputs to prevent neurobiological overflow.

why_it_works: >
  The human nervous system has a finite capacity for allostatic load. Events, daily pressures, unprocessed emotions, and even positive stressors (like a big launch) all pour into the same biological pot. The brain interprets rushing or over-scheduling as threat signals, adding volume. By granularly monitoring and explicitly naming these inputs, the client activates their prefrontal cortex, reducing amygdala dominance. Removing controllable inputs before the pot overflows prevents the body from breaking down under chronic inflammation.

examples:
  - context: "BOOK: I Haven't Been Entirely Honest With You - Allostatic Load Audit"
    application: >
      Hart models the nervous system as a finite 'pot' where all stressors accumulate. The coach must audit the inputs and strategically remove non-essentials to prevent neurobiological overflow.
    effect: >
      Activates the prefrontal cortex, reducing amygdala dominance and transforming abstract anxiety into manageable, structural clarity.

  - context: "CCP: CBCS - The First-Session Diagnostic"
    application: >
      The coach runs a 'Stress Pot Audit', identifying every input (toxic clients, dehydration, overcommitting). The client must remove three inputs before attempting any new strategies.
    effect: >
      The client experiences immediate physiological relief. Trust is established because the coach addressed their biology before their psychology.

  - context: "CCP: V2WS - The Interactive Opener"
    application: >
      The host asks the audience to mentally add a 'water line' to their pot for every stressor listed on screen, making the invisible load visible.
    effect: >
      Abstract burnout becomes a concrete metric, instantly positioning the host as a profound diagnostician of their lived experience.

  - context: "CCP: Conscious Reactions - The Onboarding Pace"
    application: >
      The UX deliberately staggers tooltips and feature introductions over the first 14 days rather than overwhelming the new user in session one.
    effect: >
      Prevents 'overflowing the pot', dramatically reducing the Day 1 churn rate typical of complex SaaS products.

  - context: "CCP: CCF - The 'Subtraction' Exercise"
    application: >
      A module in the challenge requires the user to delete one recurring meeting or commitment from their calendar before they are allowed to record their final video.
    effect: >
      Forces the user to experience the mechanical leverage of subtraction, reinforcing the platform's anti-hustle philosophy.

