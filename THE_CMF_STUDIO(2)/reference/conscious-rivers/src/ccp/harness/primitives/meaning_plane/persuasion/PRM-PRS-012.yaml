  - "When auditing a script that feels technically sound but fails to inspire action"
  - "During high-stakes 1-on-1 coaching interventions where a client is stuck or resistant"

suppression_conditions:
  - "When delivering pure, objective data reporting where motivational language would obscure the stark reality of the metrics"

misuse_modes:
  - "Generic Meaning-Making — connecting the task to a lofty but impersonal goal (e.g., 'changing the world') rather than a specific goal the client actually cares about"
  - "Inflexible Ratios — using the exact same ratio of the three channels for a novice (who needs high Direction) as for an expert (who needs high Meaning)"

