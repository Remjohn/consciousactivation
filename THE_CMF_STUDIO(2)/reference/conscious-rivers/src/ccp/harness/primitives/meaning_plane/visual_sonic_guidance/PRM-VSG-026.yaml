trigger_conditions:
  - "The CCP system is constructing a multi-asset product (like a Webinar, VSL, or Carousel) rather than a single post"
  - "The brand identity is feeling 'chaotic' or 'inconsistent' to the audience"
  - "The narrative requires a massive emotional pivot that words alone cannot carry"

suppression_conditions:
  - "The asset is a single, isolated, purely transactional interaction (e.g., a forgotten password email) where 'systemic narrative' is irrelevant"

misuse_modes:
  - "The Unearned Rupture — Breaking the visual rules just to be 'edgy' when the narrative hasn't actually shifted, annoying the viewer"
  - "The Rigid Prison — Becoming so obsessed with maintaining the visual system that the creator refuses to adapt when a specific story demands a different look"
  - "Local Optimization — Judging a single frame as 'bad' because it's boring, failing to realize it was intentionally designed to be boring to set up the next frame"

synergizes_with:
