crosswalk_id: "XW-SYSTEMIC-RUPTURE"
crosswalk_note: "Meaning focuses on sequences of images; Experience focuses on design systems (CSS/Tokens) and intentionally breaking the grid for emphasis."

notes: >
  CVE agents cannot just evaluate images independently. They must have a memory of the 'established
  visual baseline' for a specific user or campaign, and use that context to approve or reject new assets.
