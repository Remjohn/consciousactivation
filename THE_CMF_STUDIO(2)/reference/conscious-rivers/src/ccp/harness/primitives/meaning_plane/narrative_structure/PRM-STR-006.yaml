trigger_conditions:
  - "AST analysis detects content sounding derivative, generic, or heavily reliant on industry jargon/cliché"
  - "User admits they are trying to emulate someone else's success or are afraid of offending an audience"
  - "System is initializing the Voice DNA capture sequence for a new user"

suppression_conditions:
  - "Context requires highly sensitive, regulated information (e.g., legal or medical compliance) where precision outweighs voice"
  - "System is generating a purely institutional or transactional notification"

misuse_modes:
  - "Confusing 'unsilenced voice' with being needlessly offensive, abrasive, or unprofessional without a strategic reason."
  - "Mistaking a lack of editing or structure for 'authenticity'."

