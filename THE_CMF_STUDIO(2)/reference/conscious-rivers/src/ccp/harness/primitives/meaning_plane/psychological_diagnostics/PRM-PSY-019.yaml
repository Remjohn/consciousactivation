summary: >
  The Resilience Reframe is the psychological mechanism of treating trauma, failure, or systemic
  disadvantage not as a permanent wound requiring endless healing, but as raw operational data
  that guarantees future survival. It rejects toxic positivity ('everything happens for a reason')
  in favor of tactical agency ('we survived, now we weaponize the experience').
core_move: >
  Reframe a catastrophic failure or trauma by immediately identifying the specific tactical
  advantage, perspective, or immunity the audience gained by surviving it.
why_it_works: >
  When people experience trauma or failure, they often internalize it as a reduction in their
  value or capability. Noah's mother surviving a gunshot to the head and immediately joking
  that Trevor is 'now officially the best-looking person in the family' breaks the cycle of
  pity. This reframe interrupts the neurological loop of victimhood. By finding the immediate,
  tangible (and often humorous) advantage in the survival, the brain categorizes the event not
  as a defeat, but as a grueling, expensive form of training that has made the survivor stronger.

examples:
  - context: "BOOK: Hospital recovery scene"
    application: >
      While Trevor is bawling over his mother being shot in the head, she tells him to 'look on the
      bright side... Now you're officially the best-looking person in the family.'
    effect: >
      The joke instantly shifts the dynamic from tragedy to survival. It re-establishes her agency.
      She refuses to let the violence define her, instead using humor to assert that she is still
      in control of her own narrative. The trauma is processed not through despair, but through connection.

  - context: "CCP: CCF Archetype drafting a 'Failure' narrative"
    application: >
      A founder writes about losing their first company to bankruptcy. Instead of a somber
      'what I learned' post, they write: 'Going bankrupt cost me $500k, but it bought me total
      immunity to the fear of people saying "no" to my pricing. It was an expensive MBA, but it works.'
    effect: >
      The audience respects the founder's invulnerability. The failure is not framed as a tragedy
      that requires sympathy, but as the exact forge that created their current elite competence.

  - context: "CCP: Telegram Coaching Conversation (CBCS) after a client's launch fails"
    application: >
      A client is devastated by a failed launch. The coach refuses to coddle them, instead stating:
      'Congratulations. You just bought the exact data we need to fix the messaging. Most people
      quit before they buy the data. Let's look at the numbers.'
    effect: >
      The client is jolted out of their emotional spiral. The framing of the failure as a 'purchase'
      of necessary data completely removes the shame and replaces it with analytical agency.

  - context: "CCP: V2WS Webinar positioning against competitors"
    application: >
      The coach positions their difficult past (e.g., struggling with chronic illness) not as a
      sympathy play, but as the ultimate credential: 'My competitors learned this in a weekend seminar.
      I learned this because my life depended on it. My methodology is survival-tested.'
    effect: >
      The audience views the coach's trauma as proof of extreme reliability. The resilience reframe
      turns a potential liability (a gap in traditional credentials) into the highest form of authority.

  - context: "CCP: CMF Media Factory - Testimonial editing"
    application: >
      Instead of using a testimonial where a client cries about how hard things used to be, the
      agent selects the clip where the client laughs about their past mistakes, demonstrating
      total mastery over their former identity.
    effect: >
      The testimonial projects high-status transformation rather than just emotional relief,
      attracting higher-tier prospects who want agency, not just comfort.

anti_examples:
  - description: >
      A coach tells a client who just lost a major contract, 'Everything happens for a reason! The
      universe is just making room for something better.'
    why_it_fails: >
      This is toxic positivity, not a Resilience Reframe. It demands no agency and requires blind
      faith, invalidating the client's actual pain. A true Resilience Reframe acknowledges the
      severity of the blow but focuses on the tactical asset gained by surviving it (e.g., 'Now
      you know exactly where your sales pipeline breaks').

