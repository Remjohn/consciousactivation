trigger_conditions:
  - "The client or audience has just experienced a significant failure, loss, or setback"
  - "The coach is sharing a highly vulnerable story of their own past trauma"
  - "The audience is trapped in a loop of self-pity or systemic victimhood"

suppression_conditions:
  - "The trauma is actively occurring and requires immediate physical/psychological safety intervention first"
  - "The coach attempts to reframe someone else's trauma without their permission or lived experience"

misuse_modes:
  - "Toxic Positivity — Denying the pain of the experience entirely"
  - "Trauma Dumping — Sharing the trauma without the reframe, seeking only sympathy"
  - "Premature Reframing — Rushing the client to find the 'lesson' before they have processed the shock"

synergizes_with:
  - "PRM-PSY-014" # Trojan Horse Narrative (often using humor to execute the reframe)
  - "PRM-HUM-002" # Irreducible Truth

conflicts_with:
  - "PRM-PRS-001" # The Flaw Amplification Loop (which leans into the flaw rather than reframing it as data)

crosswalk_id: "XW-AGENCY-RECOVERY"
crosswalk_note: "Meaning focuses on the psychological pivot in content; Experience focuses on gamifying failure recovery (e.g., rewarding 'failed' streaks in the UI)."

notes: >
  This primitive is critical for CBCS (Conscious Voice Coaching System). Agents must be trained
  to never offer mere sympathy when a coach fails. Sympathy creates dependency; the Resilience
  Reframe creates agency.
