trigger_conditions:
  - "When designing any continuous content asset that exceeds 10 minutes in duration"
  - "During the revision phase of a V2WS webinar script"
  - "When reviewing analytics that show a consistent audience drop-off at a specific timestamp"

suppression_conditions:
  - "For short-form content (under 5 minutes) where a hard reset would artificially disrupt natural momentum"
  - "In highly interactive 1-on-1 coaching sessions where the dialogue naturally resets attention"

misuse_modes:
  - "Fake Resets — using a weak transition (e.g., 'Moving on to my next point') that does not biologically reset attention because it lacks tension or surprise"
  - "Over-segmentation — resetting attention every 3 minutes, which fragments the narrative and prevents deep comprehension of complex ideas"

