summary: >
  10-Minute Attention Architecture is a pacing primitive based on the neurobiological reality
  that human attention sharply declines after approximately 10 minutes of continuous input. It
  mandates that long-form content must be broken into discrete blocks separated by deliberate
  re-engagement triggers. In CCP, this primitive acts as the structural grid for webinars,
  beat clusters, and lengthy workflows, ensuring that content aligns with biological constraints.

core_move: >
  Structure attention into reset-sized blocks by inserting a sharp format shift, question, or new tension loop every 8-10 minutes.

why_it_works: >
  Drawing on John Medina's research, Berkun establishes that attention decay is a biochemical
  reality, not a choice sustained by willpower. An audience does not choose to disengage; their
  biology disengages them. The speaker's job is not to prevent drifting—which is impossible—but
  to architect easy re-entry points. By introducing a sharp format change or a new tension loop
  every 10 minutes, the brain receives a new activation signal, effectively resetting the
  attention timer and preventing compound fatigue.

examples:
  - context: "BOOK: Confessions of a Public Speaker - The Science of Not Boring People"
    application: >
      Berkun cites John Medina's rule that attention plummets after 10 minutes. A speaker must build a structural reset—a story, a shift in tone, or a question—every 9 minutes to biologically reset the audience's attention span.
    effect: >
      The audience's cognitive stamina is artificially sustained because their brains are given a tension reset just as fatigue begins.

  - context: "CCP: V2WS - Webinar Rep Mode"
    application: >
      When the coach uses V2WS Rep Mode for a 45-minute flagship webinar, the scoring agent flags module two because it runs 14 minutes without a format shift. The agent enforces the insertion of a direct-to-camera question at the 9-minute mark.
    effect: >
      The coach trains to break up monolithic teaching, preventing the audience from biologically disengaging during the crucial mechanism explanation.

  - context: "CCP: CMF - Media Factory Visual Production"
    application: >
      A CMF beat cluster sequence running 18 minutes is audited. At the 9-minute mark, the script automatically introduces a jarring new problem statement ("But here is the failure mode we completely missed") accompanied by a sharp visual tone shift via Skia rendering.
    effect: >
      The audience is snapped back into active prediction mode by the visual and narrative tension, absorbing the second half of the cluster with fresh cognitive bandwidth.

  - context: "CCP: CCF - Archetype Script Structuring"
    application: >
      The CCF engine refuses to generate a script block longer than 8 minutes without injecting a structural pivot—such as shifting from objective framework data to a high-pathos story.
    effect: >
      The resulting long-form content prevents the 'eating the microphone' failure mode because it is pre-engineered for attention preservation.

  - context: "CCP: Conscious Reactions - Solo Reaction Constraint"
    application: >
      While Solo Reactions are capped at 2-5 minutes, if the topic charge is extremely high and the coach approaches a 10-minute deep-dive threshold, the interface visually prompts them to deliver a "hard reframe" to maintain the biometric pacing score.
    effect: >
      The generated reaction retains its gripping, high-conviction delivery without dissolving into a rambling monologue.

anti_examples:
  - description: >
      A 25-minute coaching audio note delivered as a single, continuous stream of highly
      valuable but unbroken information.
    why_it_fails: >
      Regardless of the content's quality, the biological constraints of the listener mean
      they will almost certainly tune out halfway through. Because there are no signposts
      or resets, a drifting listener has no way to re-enter the narrative thread, rendering
      the final 15 minutes effectively useless.

