trigger_conditions:
  - "The visual assets are being ignored by the audience (low engagement/CTR) because they look like generic advertising"
  - "The CCP system is trying to generate 'hook' visuals designed specifically to stop the scroll"
  - "The narrative involves themes of curiosity, transition, mystery, or the future"

suppression_conditions:
  - "The asset is a highly technical 'How-To' infographic where clarity is paramount and 'ambiguity' would cause frustration"
  - "The visual is serving as a legal disclaimer or compliance check"

misuse_modes:
  - "Total Obfuscation — Making the image so ambiguous or dark that the viewer has no idea what they are looking at, crossing the line from 'intrigue' to 'frustration'"
  - "The Unearned Gap — Creating a mystery (e.g., a blurry photo) that leads to a deeply boring or irrelevant revelation, betraying the viewer's trust"
  - "Inappropriate Ambiguity — Using the Story Gap on the 'Checkout' or 'Guarantee' page, where the prospect requires 100% Safety and Clarity (PRM-PSY-024)"

synergizes_with:
  - "PRM-HUM-009" # The Open Loop (The psychological equivalent of this visual primitive)
  - "PRM-VSG-018" # Sequence Over Single Image (The gap is established in Image 1 and resolved in Image 3)

conflicts_with:
  - "PRM-PRS-012" # Pure Direct Instruction (Which demands absolute clarity and no gaps)

crosswalk_id: "XW-VISUAL-AMBIGUITY"
crosswalk_note: "Meaning focuses on the visual composition; Experience focuses on using UI elements (like progressive disclosure) to create curiosity gaps."

notes: >
  This primitive is dangerous if overused. It scores lower in MCDA (171) because while highly
  differentiating, it can easily degrade clarity. It should be deployed specifically for hooks
  and top-of-funnel hero images, but suppressed during the 'offer' phase.
