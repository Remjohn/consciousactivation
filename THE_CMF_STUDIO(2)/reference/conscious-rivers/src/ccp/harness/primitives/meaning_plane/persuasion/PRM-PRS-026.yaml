summary: >
  The Passion-as-Contagion Engine is a foundational pre-recording primitive that treats the
  speaker's internal emotional state as the primary driver of audience engagement. Based on
  research into "perceived passion" and "mood contagion," it dictates that a speaker must be
  viscerally connected to their topic—able to articulate *why* it makes their "heart sing"—before
  delivering it. In CCP, this acts as a hard quality gate: content delivered with a flat,
  transactional energy is rejected, because audiences biologically catch the emotions (or lack
  thereof) of the speaker.

core_move: >
  Execute a pre-recording diagnostic to ensure the speaker is operating from deep, authentic passion for the topic, leveraging biological 'mood contagion' to infect the audience with that same energy.

why_it_works: >
  Gallo cites empirical research (Cardon et al.) proving that "perceived passion" is a primary
  driver of funding decisions by angel investors, overriding even the business plan itself.
  Furthermore, organizational psychologist Joyce Bono's research demonstrates "mood contagion":
  charismatic leaders literally infect their teams with positive (or negative) emotions. Passion
  is not a stylistic accessory; it is a biological transmission mechanism. If the coach is bored
  by their own material, the audience will be bored. If the coach is genuinely moved by their
  purpose (not just their expertise, but their calling), the audience catches that frequency. The
  "Heart Sing" protocol forces coaches to locate this frequency before the camera turns on.

examples:
  - context: "BOOK: Talk Like TED - Unleash the Master Within"
    application: >
      Gallo cites research on 'mood contagion' demonstrating that audiences biologically catch the emotions of the speaker. A speaker must locate their deep, authentic passion—what makes their "heart sing"—before delivering content. If the speaker is bored, the audience will be bored.
    effect: >
      The speaker's conviction triggers immediate mood contagion, establishing deep Ethos and ensuring the audience feels the weight of the message.

  - context: "CCP: CCF - The Heart Sing Interview"
    application: >
      Before scripting flagship content, the CCF agent asks the coach *why* they teach, not what they teach. When the coach shifts from "productivity metrics" to "saving founders from missing childhoods," the agent flags that frequency as the baseline for all recording.
    effect: >
      The dry corporate veneer is stripped away. The coach speaks with un-fakeable conviction, triggering mood contagion in the listener.

  - context: "CCP: V2WS - Rehearsal State Check"
    application: >
      Ten minutes before a live webinar, the V2WS system forces a state check. The coach must vividly recall a specific client's life-changing breakthrough using the methodology, holding that image while delivering the opening lines.
    effect: >
      The coach enters as an evangelist sharing a cure rather than a salesperson executing a script, immediately shifting the audience's energy.

  - context: "CCP: CMF - Vocal Energy Audit"
    application: >
      During the review of a beat cluster voice-over, the CMF audio agent detects a flat, transactional vocal frequency. It rejects the take, instructing the coach to stand up, listen to a high-BPM track, and re-record the beat as if their life depended on it.
    effect: >
      The re-recorded audio carries a kinetic, visceral energy that physically moves the viewer, overriding any minor imperfections in the script.

  - context: "CCP: Conscious Reactions - Debate Mode Activation"
    application: >
      When a coach triggers 'Debate Mode' to critique an industry trend, the Guardian Agent disables teleprompter features. The coach is forced to speak off-the-cuff from a place of genuine, righteous frustration.
    effect: >
      The unfiltered passion acts as a biological transmission mechanism, instantly bonding the audience to the coach's perspective.

anti_examples:
  - description: >
      A coach meticulously scripts a beat cluster on organizational design based on market
      research showing it's a "hot topic," but they personally find the subject tedious and
      bureaucratic. They record the video with a forced smile.
    why_it_fails: >
      The audience's mirror neurons detect the dissonance between the forced smile and the
      lack of genuine internal energy. The resulting "mood contagion" is one of apathy and
      mild discomfort. Despite perfect lighting and sound structure, the content fails to
      resonate.

