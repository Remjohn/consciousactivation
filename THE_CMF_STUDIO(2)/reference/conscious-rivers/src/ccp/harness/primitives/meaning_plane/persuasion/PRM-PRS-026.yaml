  - "Immediately prior to recording Voice DNA assets or delivering high-stakes live content"
  - "When a coach's delivery feels technically perfect but 'dead behind the eyes'"

suppression_conditions:
  - "When delivering pure, objective data updates where projecting high passion would seem manipulative or unhinged"

misuse_modes:
  - "Performative Passion — equating 'passion' with yelling, frantic gesturing, or forced enthusiasm, which exhausts the audience and destroys credibility"
  - "Passion as an Excuse — believing that having passion excuses poor structure, rambling narratives, or lack of preparation (passion is the fuel, but it still requires the engine)"

