summary: >
  Broccoli vs KFKD is a diagnostic primitive that distinguishes between authentic internal signal
  and destructive internal noise. "Broccoli" represents the quiet, bodily-felt intuition that knows
  the truth of a piece. "Radio Station KFKD" represents the loud, frantic broadcasting of ego,
  comparison, self-aggrandizement, and self-loathing. It serves as a real-time calibration check.
core_move: >
  Explicitly name and separate quiet intuitive truth from the loud, performative noise of the ego.
why_it_works: >
  The ego continuously generates noise (KFKD - Outrage/Anxiety/Pride) to protect the self from vulnerability.
  This noise drowns out the "murmur" of actual insight. Lamott's mechanism works by objectifying the noise—
  treating it as a radio station playing in the background rather than the truth. Once the noise is named
  and externalized, the creator's attention can be consciously redirected to the quiet intuition (broccoli),
  restoring operational clarity and authentic voice.

examples:
  - context: "BOOK: Bird by Bird - Signal vs Noise Calibration"
    application: >
      Lamott distinguishes between authentic internal signal ("Broccoli"—quiet intuitive truth) and destructive internal noise ("Radio Station KFKD"—loud ego, comparison, anxiety).
    effect: >
      Objectifies the KFKD noise, allowing the creator to consciously redirect attention to their quiet intuition, restoring operational clarity and authentic voice.

  - context: "CCP: Conscious Voice - Live Feedback"
    application: >
      The agent detects a sudden shift in delivery—pace quickens, tone turns defensive. The agent interrupts: "Hold on. Is that line coming from your broccoli, or is KFKD broadcasting right now?"
    effect: >
      The coach recognizes the performative shift caused by anxiety, drops the defensive posture, and re-records with grounded authenticity.

  - context: "CCP: CBCS - Anxiety De-escalation"
    application: >
      A client spins out into self-doubt over a competitor's launch. The agent prompts them to identify if this fear is a strategic warning (broccoli) or just comparison noise (KFKD).
    effect: >
      The client detaches from the emotional spiral, labeling the panic as 'KFKD', regaining agency and refocusing on sovereign work.

  - context: "CCP: CCF - The Authenticity Check"
    application: >
      During script review, the system flags a section of highly theoretical, jargon-heavy text and asks the user: "Are you trying to sound smart (KFKD), or is this what you actually believe (Broccoli)?"
    effect: >
      Forces the user to strip away performative intellectualism, ensuring the final content is deeply aligned with their true voice.

  - context: "CCP: V2WS - The 'Inner Critic' Slide"
    application: >
      The presenter explicitly calls out the audience's internal KFKD voice during the pitch (e.g., "Your brain is currently telling you that you aren't ready for this").
    effect: >
      Neutralizes the audience's unvoiced objections by naming them as predictable neurological noise rather than objective truth.

