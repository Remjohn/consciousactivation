trigger_conditions:
  - "AST analysis detects the user's language becoming suddenly inflated, defensive, or overly academic"
  - "User expresses paralyzing self-doubt, intense comparison to others, or impostor syndrome"
  - "System detects the output feeling performative, lacking the grounded 'weight' of genuine truth"

suppression_conditions:
  - "User is in a clear flow state, producing uninhibited, truthful, and grounded material"
  - "Task requires purely logical, structural formatting without emotional valence (e.g., formatting a data table)"

misuse_modes:
  - "Using the concept to dismiss valid critical feedback by labeling the editor as 'KFKD'."
  - "Over-analyzing every thought, ironically generating more anxiety about which voice is which."

