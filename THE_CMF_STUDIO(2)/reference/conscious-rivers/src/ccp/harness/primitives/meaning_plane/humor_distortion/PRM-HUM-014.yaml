trigger_conditions:
  - "System is executing the final output generation pass; must audit text's implicit communicative intent"
  - "AST analysis detects a coach's input sounding fatigued, robotic, or clinically transactional"
  - "Agent is drafting V2WS webinar scripts, specifically the high-leverage opening and closing segments"

suppression_conditions:
  - "Content deals with severe trauma or crisis intervention where excessive enthusiasm reads as inappropriate"
  - "Coach's Voice DNA specifies a 'Reluctant Oracle' archetype where joy must be encoded as focused intensity rather than outward excitement"

misuse_modes:
  - "Toxic Positivity — conflating 'joy in communicating' with 'only communicating happy things,' erasing the coach's necessary edge and Subtext"
  - "Inauthentic Hype — adopting the cadence of a frantic infomercial salesperson rather than the grounded excitement of an expert sharing a breakthrough"
  - "Clinical delivery of joyful words — the LLM writes enthusiastic text, but the coach delivers it with a flat voice, creating massive cognitive dissonance"

synergizes_with:
