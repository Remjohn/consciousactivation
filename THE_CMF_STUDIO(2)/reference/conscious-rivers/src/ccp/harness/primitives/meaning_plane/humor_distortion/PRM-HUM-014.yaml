notes: >
  This is the highest-scoring primitive in the Rosenfield audit (180) and
  the cornerstone of the CBCS parasocial bond. Float note:
  goal_bias.connection is ceiling (0.9) because emotional reciprocity is
  the fastest mechanism for relationship building. surface_fit.voice and
  telegram are highest (0.9) because these are the most intimate, direct-
  communication surfaces where the audience is hyper-sensitive to the
  speaker's emotional state. Algorithmically, this requires training the
  Critic agent to evaluate the 'enthusiasm gradient' of generated text.
