  - "PRM-HUM-019"  # Struggle Principle — delivering a struggle with Joyous Communication ('I'm so excited to finally admit how badly I messed this up') is peak vulnerability
  - "PRM-ACT-005"  # Pre-Roll Affect Alignment — preparing the body/voice to actually broadcast the joy before speaking

conflicts_with:
