summary: >
  Emotional Journey / Peak-End is the principle that an experience is not remembered
  as a flat average of its parts, but is judged heavily by its most intense emotional
  peak and its final moment. It treats every piece of content or workflow as a
  temporal journey with shaped highs, lows, frustration points, and a carefully
  engineered resolution that anchors trust.

core_move: >
  Structure the emotional path of an experience so the peak intensity and the
  remembered ending compound to create lasting trust and memory.

why_it_works: >
  Drawing on behavioral economics and psychology, Lupton shows that the human brain
  does not compute the sum of an experience. Instead, the 'peak-end rule' dictates
  that memory is disproportionately weighted toward the moment of highest emotional
  arousal (the peak) and the final moments (the end). By actively designing the
  ending to resolve tension or confer dignity, the entire preceding journey is
  retroactively perceived as more valuable and satisfying.

examples:
  - context: "BOOK: Design Is Storytelling - The Peak-End Rule"
    application: >
      Lupton applies the peak-end rule from behavioral economics to design: memory is disproportionately weighted toward the moment of highest emotional arousal (the peak) and the final moments (the end).
    effect: >
      By actively designing the ending to resolve tension or confer dignity, the entire preceding journey is retroactively perceived as more valuable and satisfying.

  - context: "CCP: CBCS - Post-Session Accountability"
    application: >
      Instead of ending a heavy Telegram coaching session on a to-do list, the agent concludes with a single, regulating line of profound validation that honors the client's struggle.
    effect: >
      The client's memory of the interaction is anchored by safety and support, increasing willingness to return to the app the next day.

  - context: "CCP: V2WS - The Module Close"
    application: >
      The agent structures a webinar block to build tension during the presentation of the core problem (the peak), and designs the final slide to release that tension into a clear, empowering insight before Q&A.
    effect: >
      The audience leaves the segment feeling capable rather than overwhelmed, anchoring trust in the speaker right before a sales pitch.

  - context: "CCP: CCF - The 'Success State' Animation"
    application: >
      When a user completes their first Voice DNA extraction, the UI doesn't just return to a menu. It triggers a specific, satisfying 'completion' animation and a celebratory audio chime.
    effect: >
      The positive sensory feedback at the end of a difficult task permanently codes the software as a source of dopamine rather than labor.

  - context: "CCP: CMF - Video Outros"
    application: >
      The system rejects a short-form video that abruptly cuts off. It forces the addition of a 2-second 'cool down' frame that reiterates the core insight before displaying the call-to-action.
    effect: >
      Prevents the user's final encoded memory from being an aggressive, jarring sales pitch, preserving brand dignity.

anti_examples:
  - description: >
      A highly engaging, emotionally intense CMF short video that abruptly cuts
      off or ends with a generic, high-pressure 'Link in bio' sales pitch.
    why_it_fails: >
      The generic, high-friction ending overrides the positive emotions generated
      during the peak of the video. Because the ending feels transactional and
      abrupt, the user's final encoded memory of the brand is one of being sold
      to, destroying the prior trust.

