trigger_conditions:
  - "System orchestrates a user journey involving a necessary moment of high friction, emotional difficulty, or cognitive load"
  - "Agent is drafting the conclusion of a webinar, long-form post, or major challenge milestone"
  - "System needs to architect the final screen or 'success state' of a UI flow"

suppression_conditions:
  - "Content is purely informational or referential, and imposing an emotional arc would feel manipulative or inappropriate"
  - "System is engaged in rapid, utilitarian back-and-forth exchanges where forcing a structured 'ending' feels unnatural"

misuse_modes:
  - "False Peaks — Forcing an emotional high point that isn't earned by the preceding material"
  - "Over-Sweetening — Ending on a falsely positive note that invalidates the reality of the struggle"
  - "Neglecting the End — Spending 90% of the effort on the hook and letting the ending fizzle out"

