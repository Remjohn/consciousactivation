trigger_conditions:
  - "System is executing any prompt that includes a 'humor' or 'engagement' objective; it must assign a specific Filter"
  - "Agent detects the user is relying on amateur sarcasm and needs to be upgraded to structural Irony"
  - "AST analysis indicates a draft is 'supposed to be funny' but lacks a clear comedic mechanism"

suppression_conditions:
  - "System is generating purely informational content with no humor objective"
  - "Coach's audience is in a state where comedic distortion would read as inappropriate (acute grief, immediate crisis)"

misuse_modes:
  - "Filter-without-Subtext — applying Filters to content that has no irreducible truth, producing technically correct but emotionally empty humor"
  - "Single-Filter rigidity — always defaulting to the same Filter (usually Reference or Character) across all content, creating pattern fatigue"
  - "Filter-as-label — naming the Filter in the content itself ('This is ironic, right?'), breaking the concealment that makes Filters work"

synergizes_with:
  - "PRM-HUM-002"  # Irreducible Truth — Filters conceal the Subtext; without Subtext, Filters produce empty comedy
  - "PRM-HUM-001"  # Dual-Processor Engine — the Editor uses Filters as the evaluation rubric; the Clown generates through them
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — heightening is the meta-instruction that applies to every Filter
  - "PRM-HUM-005"  # Absolute Verisimilitude — Parody Filter specifically requires verisimilitude to function

conflicts_with:
  - "PRM-HUM-006"  # Temporal Resolution Delay — delay rules sometimes conflict with Filters that require front-loaded reveals (e.g., Parody format recognition)

