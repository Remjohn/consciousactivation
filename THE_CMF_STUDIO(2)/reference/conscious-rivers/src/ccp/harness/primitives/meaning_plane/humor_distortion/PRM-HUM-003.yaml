notes: >
  This is the most system-level primitive in the HUM family — it operates
  as a meta-constraint on the generation pipeline rather than a specific
  creative move. Its MCDA (171) is tied with Absolute Verisimilitude,
  reflecting their equal importance as infrastructure primitives. Float note:
  goal_bias.surprise is high (0.8) because each Filter is specifically
  designed to create a different TYPE of surprise — Irony surprises through
  opposition, Hyperbole through impossibility, Misplaced Focus through
  omission. goal_bias.clarity is moderate (0.6) because Filters create
  structured surprise rather than pure ambiguity — the audience has a
  clear cognitive operation to perform.
