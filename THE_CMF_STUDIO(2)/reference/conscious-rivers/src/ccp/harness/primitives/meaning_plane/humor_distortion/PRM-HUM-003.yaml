summary: >
  Filter Constraints is the system-level primitive that maps Dikkers' 11
  Funny Filters (Irony, Character, Shock, Hyperbole, Wordplay, Reference,
  Madcap, Parody, Analogy, Misplaced Focus, Metahumor) as discrete,
  selectable distortion algorithms within the CCP's Adapter Registry. Each
  Filter is a specific mechanism for concealing the Subtext — creating
  a barrier between the reader and the writer's intended message so the
  reader must "add two and two to discover the hidden message" (line 1711).
  The primitive's power is constraint-based creativity: instead of asking
  the LLM to "be funny," the system explicitly assigns a specific Filter
  (or combination of Filters) based on the active mood state, content
  surface, and coach Voice DNA, forcing the model into a tight deterministic
  corridor that produces reliable, non-generic humor.

core_move: >
  Select and assign a specific Funny Filter (or layered combination) to
  the generation pipeline as a rigid structural constraint, replacing the
  vague instruction 'be funny' with a precise distortion algorithm.

why_it_works: >
  Dikkers states that "if a piece of your writing doesn't employ at least
  one of the 11 Funny Filters, or it's not using the Funny Filters properly,
  very few readers will find it funny" (lines 1740-1742). The mechanism
  is constrained generation: each Filter provides a specific cognitive
  operation (Irony = write the polar opposite; Hyperbole = exaggerate
  beyond the laws of reason; Misplaced Focus = focus on the wrong thing).
  These operations are deterministic enough to be system-prompted but
  creative enough to produce varied output. The Filters also blur at the
  periphery (line 2608), enabling layered combinations — Bob Hope's
  "politicians have their hands in their own pockets" combines Character +
  two layers of Irony + Hyperbole + Metahumor (lines 2225-2238). CCP
  leverages this by assigning primary and garnish Filters to each content
  request.

examples:
  - context: "BOOK: How to Write Funny - Filter Constraints"
    application: >
      Dikkers maps 11 specific 'Funny Filters' (Irony, Hyperbole, Reference, etc.) as discrete distortion algorithms. Instead of vague 'be funny' instructions, assigning a specific filter forces the humor into a tight deterministic corridor that conceals the Subtext.
    effect: >
      Produces reliable, non-generic humor by providing a specific cognitive operation for the reader to decode.

  - context: "CCP: CMF - JIT Skill Compilation"
    application: >
      The JIT compiler selects a primary Filter (e.g., Hyperbole) and a garnish (e.g., Reference) based on the audience mood state. The prompt explicitly constrains the LLM to 'exaggerate beyond reason, anchored in a shared experience'.
    effect: >
      Prevents the LLM from defaulting to generic whimsy or mild snark. The output is tightly structured and surprising.

  - context: "CCP: CBCS - Upgrading Sarcasm to Irony"
    application: >
      When the agent detects a coach relying on amateur Sarcasm (Irony light), it prescribes the full Irony Filter: 'Play it straight. Adopt the opposite position with absolute conviction. Let them discover the joke.'
    effect: >
      The coach's humor upgrades to professional-grade satire. The audience feels respected because they are trusted to decode the message.

  - context: "CCP: V2WS - Pattern Interruption"
    application: >
      At the 40-minute mark of a dense webinar, the system automatically injects a 'Misplaced Focus' filter into the script, deliberately dwelling on an absurd, irrelevant detail of a case study.
    effect: >
      Breaks audience fatigue. The sudden shift in cognitive operation re-engages their attention before the pitch.

  - context: "CCP: CCF - The Filter Sandbox"
    application: >
      The app provides a daily exercise where the coach takes a single boring truth and rewrites it using three different assigned Filters, training their neurological flexibility.
    effect: >
      The coach develops an intuitive mastery of deterministic distortion, making them funnier on live coaching calls.

anti_examples:
  - description: >
      A CMF agent prompt reads 'Make this content funny and engaging'
      without specifying any Funny Filter — relying on the model's
      general humor capability.
    why_it_fails: >
      Dikkers' entire Chapter 6 exists to replace vague humor instructions
      with specific mechanisms. Without a Filter Constraint, the LLM
      defaults to the most common pattern in its training data — usually
      mild Snark or basic Character humor — producing generic output that
      "comes off as little more than a big mess" (line 477). The absence
      of a specific Filter is the absence of a specific mechanism.

  - description: >
      The system assigns all 11 Filters simultaneously to a single content
      piece, instructing the model to 'use as many Filters as possible.'
    why_it_fails: >
      While Dikkers encourages layering Filters, each layer must serve
      the Subtext. Assigning all 11 creates competing distortions that
      cancel each other out — the audience cannot decode which cognitive
      operation to perform and the content reads as chaotic rather than
      funny. Professional humor typically uses 2-4 Filters maximum in
      a single joke (lines 2225-2238 show Bob Hope using ~5 as an
      exceptional case).

