trigger_conditions:
  - "System detects content that is technically proficient but emotionally hollow, neutral, or 'so what?'"
  - "User is struggling to find the ending, the climax, or the central thesis of a long-form piece"
  - "Platform needs to establish the user's authority through polarization rather than consensus"

suppression_conditions:
  - "Context requires pure, objective, step-by-step technical instruction without ideological framing"
  - "User is not yet clear on their own values regarding the topic, risking the adoption of a fake or inherited stance"

misuse_modes:
  - "Preaching or moralizing from a position of unearned superiority rather than lived experience."
  - "Using a moral stance as a cynical marketing tactic without actual conviction."

synergizes_with:
  - "PRM-STR-025" # Theme as Argument - the moral point of view IS the argument
  - "PRM-PRS-001" # The Core Argument / The Idea - provides the emotional fuel for the persuasion

conflicts_with:
  - "PRM-HUM-021" # Irony Inversion - heavy irony can undermine the sincerity required for a moral stance

crosswalk_id: null
crosswalk_note: null

notes: >
  This is the antidote to AI-generated 'slop'. An LLM can mimic structure and tone, but it cannot
  possess a moral point of view. Forcing the coach to articulate this ensures the content remains
  irreplaceably human.
