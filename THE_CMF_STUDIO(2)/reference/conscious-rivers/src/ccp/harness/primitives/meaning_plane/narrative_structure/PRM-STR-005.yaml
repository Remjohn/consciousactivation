summary: >
  Moral Point of View is a foundational structural primitive that provides the ethical spine of a piece.
  It is not a preachy message or a corporate slogan; it is the creator's lived, unshakeable conviction
  about what is fundamentally true or important in the situation being described. It ensures the content
  exists for a reason beyond mere demonstration of competence.
core_move: >
  Ensure the piece stands for something beyond competence by explicitly grounding it in a lived ethical conviction.
why_it_works: >
  Content that lacks an ethical center cannot sustain deep audience attention because it carries no stakes.
  Lamott argues that a moral point of view demonstrates that the creator actually cares about the subject
  and the people involved. When content is anchored in a moral claim (e.g., "it is wrong to treat prisoners
  as waste material"), it shifts from being a transfer of information to an act of conviction. This creates
  instant gravity and demands a higher level of engagement from the audience.

examples:
  - context: "BOOK: Bird by Bird - The Ethical Stance"
    application: >
      Lamott argues that a piece must have an ethical spine—a lived, unshakeable conviction about what is fundamentally true or important. It shifts the content from mere information transfer to an act of conviction.
    effect: >
      Ensures the piece stands for something beyond competence, creating instant gravity and demanding higher audience engagement.

  - context: "CCP: CMF - Hook Editing"
    application: >
      The agent reviews a draft listicle ('5 ways to be productive') and rejects it. It prompts: "What is fundamentally immoral or damaging about the modern obsession with productivity? Base your opening on that."
    effect: >
      Transforms a generic how-to guide into a passionate argument. The hook repels the wrong audience and deeply bonds the right one.

  - context: "CCP: V2WS - The Closing Sequence"
    application: >
      Instead of a standard transactional CTA, the agent structures the close around the coach's core belief about why the status quo is unacceptable and why clients deserve better.
    effect: >
      Reframes the pitch as a moral imperative. The audience feels they are joining a movement, significantly increasing conversion.

  - context: "CCP: CCF - Archetype Development"
    application: >
      During onboarding, the system forces the coach to define their "Enemy"—not a person, but a toxic industry standard or pervasive lie they are committed to destroying.
    effect: >
      Anchors the coach's entire content strategy in a polarizing, highly defensible ethical stance, distinguishing them from neutral competitors.

  - context: "CCP: CBCS - Alignment Check"
    application: >
      When a client proposes a marketing tactic that feels misaligned, the coach asks: "Does this tactic reflect your core moral point of view about how people should be treated?"
    effect: >
      Prevents the client from adopting strategies that will eventually cause internal friction, ensuring long-term brand integrity.

