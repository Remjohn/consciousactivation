notes: >
  This primitive is a mandatory constraint for the Sonic Scribe pipeline.
  Any LLM-generated text passing through the voice rendering chain must
  be filtered through the ear-first rewrite before TTS synthesis. The
  constraint is structural, not stylistic — it changes sentence architecture,
  not vocabulary. Pair with PRM-VOC-004 (Proofread Aloud) as the
  validation step. Note: goal_bias.connection and goal_bias.clarity are
  both elevated because ear-first writing serves both — natural speech
  rhythm creates connection, and simple structure creates clarity.
