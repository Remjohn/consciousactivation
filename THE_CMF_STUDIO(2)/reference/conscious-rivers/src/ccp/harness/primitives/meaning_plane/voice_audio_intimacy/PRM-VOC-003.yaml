summary: >
  Writing for the Ear constrains all CCP spoken content to be composed
  for auditory processing first. Quicke distinguishes discoverer-stage
  writing from print writing: rewriting portions of a script to make it
  "sound more natural as you are reading it" is not optional polish — it
  is the primary composition act. The ear processes rhythm, breathing
  cadence, and tonal contour; the eye processes layout, punctuation, and
  paragraph structure. Content designed for the eye that is then spoken
  aloud creates synthetic rhythm — the hallmark of AI-generated text.
  In CCP, this primitive is the anti-slop filter for every Sonic Scribe
  output.

core_move: >
  Draft content specifically for spoken rhythm, breathing cadence, and
  auditory processing.

why_it_works: >
  Quicke explains that modulating voice from high to low and discovering
  "appropriate modulation will become second nature as will the whole
  process of physically making sound." But this only works when the text
  was composed for the voice in the first place. He recommends "practice
  rewriting portions of a script to make it sound more natural as you are
  reading it — as long as you do not change the meaning, you can always
  make these kinds of adjustments." The mechanism is prosodic alignment:
  written-for-eye text has clause structures optimized for visual scanning
  (long subordinate clauses, parenthetical asides, em-dashes) that create
  unnatural pause patterns when spoken. Written-for-ear text uses short
  declarative sentences, breath-friendly phrase lengths (5-9 words per
  breath group), and natural stress patterns that match English prosody.
  Dobbs reinforces this from the broadcast side: "Don't write the way
  you read; write the way you talk." CCP voice notes that violate this
  rule sound robotic even when the TTS engine is technically excellent.

examples:
  - context: "BOOK: Finding Your Voice - Ear-First Composition"
    application: >
      Quicke insists that rewriting scripts to "sound more natural as you are reading it" is the primary composition act. The ear processes rhythm and breathing cadence; the eye processes punctuation.
    effect: >
      Written-for-ear text matches English prosody, preventing the synthetic rhythm of AI-generated text.

  - context: "CCP: CMF - Sonic Scribe Scripting"
    application: >
      The LLM generates compound sentences averaging 28 words. The ear-first rewrite breaks these into six simple sentences averaging 11 words, replacing commas with periods and "however" with "But".
    effect: >
      The rendered voice note sounds like speech. Breath points align with semantic boundaries.

  - context: "CCP: CBCS - Telegram Follow-Up"
    application: >
      Instead of a complex subordinate clause ("Although it might seem..."), the text is rewritten into punchy, standalone thought units: "This week felt like a setback. I know. But here's what to notice."
    effect: >
      The emotional payload arrives cleanly without the listener holding clauses in working memory.

  - context: "CCP: V2WS - Webinar Script Polish"
    application: >
      Before a webinar, the V2WS system flags all parenthetical asides and em-dashes in the speaker's script, converting them into standalone declarative sentences.
    effect: >
      The speaker doesn't stumble over visual punctuation that has no auditory equivalent.

  - context: "CCP: Conscious Reactions - Live Audio Feedback"
    application: >
      The Guardian agent scrubs Latin abbreviations ("i.e.", "vis-a-vis") from the script before TTS rendering, replacing them with natural spoken transitions.
    effect: >
      The TTS doesn't sound robotic or overly academic.

anti_examples:
  - description: >
      A voice note script contains the sentence: "The framework — which
      we discussed last Tuesday (see attached notes) — should be applied
      iteratively, i.e., each pass refines the previous output vis-à-vis
      the stated benchmarks."
    why_it_fails: >
      Parenthetical references ("see attached notes"), Latin abbreviations
      ("i.e.", "vis-à-vis"), and em-dash asides are eye-processing
      conventions. When spoken aloud, the listener cannot see the dashes
      or parentheses that signal subordination. The auditory stream
      becomes a single unstructured flow. Quicke's ear-writing principle
      requires each thought to stand alone.

