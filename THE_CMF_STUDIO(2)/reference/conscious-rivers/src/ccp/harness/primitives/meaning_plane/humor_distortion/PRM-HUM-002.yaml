notes: >
  Second-highest MCDA in the How to Write Funny batch (182) and arguably
  the most important primitive in the entire HUM family. This is the hard
  gate that separates CCP comedy from generic AI humor. If the Memetic
  Engine cannot trace a piece of content back to a verified, irreducible
  truth from the coach's Context Premise, the generation must fail.
  Float note: goal_bias.connection (0.9) is the ceiling because Subtext IS
  the bonding mechanism — the audience bonds because they feel the writer
  has insight into their hidden reality. goal_bias.clarity is deliberately
  low (0.4) because Subtext is concealed by design — the audience must
  work to discover it, trading immediate clarity for deeper engagement.
