trigger_conditions:
  - "System is generating any comedic content and must gate generation until a valid Subtext payload is selected"
  - "Agent is running the Belief Extraction Diagnostic during CCF onboarding"
  - "AST semantic analysis flags a content draft as structurally sound but lacking any discernible value judgment or conviction"

suppression_conditions:
  - "Content goal is purely informational — tutorials, step-by-step guides, or data presentations that do not benefit from comedic wrapping"
  - "Audience is in acute crisis and the Subtext payload would be perceived as dismissive of their immediate pain"
  - "System detects the Subtext has not been verified through authenticated capture (prevents hallucinating beliefs)"

misuse_modes:
  - "Subtext invention — the agentic swarm generates a plausible-sounding value judgment that the coach does not actually hold, producing inauthentic content"
  - "Subtext leakage — stating or heavily implying the truth so overtly that the audience has nothing to discover"
  - "Tragedy without distance — deploying extremely dark Subtext without the comedic buffer that makes it safe to absorb"

synergizes_with:
  - "PRM-HUM-009"  # Reference Funny Filter — the primary vehicle for wrapping Subtext in recognizable shared experience
  - "PRM-HUM-003"  # Filter Constraints — the 11 Filters are the specific mechanisms for concealing the Subtext
  - "PRM-HUM-001"  # Dual-Processor Engine — the Editor validates Subtext quality; the Clown generates variations
  - "PRM-PRS-002"  # Tension-and-Release — Subtext creates the tension that the comedic structure releases

conflicts_with:
  - "PRM-HUM-007"  # Production Over-Saturation — mass generation without Subtext-first gating produces high-volume low-meaning output

