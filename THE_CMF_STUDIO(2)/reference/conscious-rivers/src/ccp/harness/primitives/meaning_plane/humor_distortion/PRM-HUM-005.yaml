notes: >
  This primitive functions as the quality gate for the CVE Visual Engine
  and the Voice DNA enforcement system. Its MCDA (171) is tied with
  Filter Constraints, reflecting their interdependence — Verisimilitude
  enables the Parody Filter, which is one of the 11 Constraints. Float note:
  phase_fit.revision is the ceiling (0.9) because verisimilitude is primarily
  an editorial concern — checking whether the mimicry is perfect happens
  during revision, not during initial generation. surface_fit.visual is
  highest (0.9) because visual format mimicry is where verisimilitude has
  the most measurable impact (AGSS scoring).
