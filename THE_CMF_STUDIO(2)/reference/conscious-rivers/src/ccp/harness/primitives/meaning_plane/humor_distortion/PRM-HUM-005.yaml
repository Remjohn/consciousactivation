trigger_conditions:
  - "System is generating content that uses the Parody Filter — verisimilitude is mandatory"
  - "AST analysis detects the user adopting a persona or character voice that differs from their baseline Voice DNA"
  - "Agent is commanding the CVE visual engine to mimic an existing external format (e.g., newspaper, textbook, corporate memo)"

suppression_conditions:
  - "Content is in the coach's authentic voice with no persona adoption — verisimilitude applies to mimicry, not natural speech"
  - "Content format is original rather than parodic — there is nothing to mimic"

misuse_modes:
  - "Verisimilitude without payload — perfectly mimicking a format but forgetting to insert the Subtext, producing content that is indistinguishable from the real thing and therefore not comedy at all"
  - "Format fetishism — spending disproportionate effort on visual/tonal accuracy at the expense of the comedic content inside the container"
  - "Audience confusion — mimicry so perfect that the audience genuinely believes the content is real and misses the humor entirely (the Onion satire-as-news problem)"

synergizes_with:
  - "PRM-HUM-003"  # Filter Constraints — Verisimilitude is specifically required by the Parody Filter
  - "PRM-HUM-002"  # Irreducible Truth — the Subtext payload that the verisimilitude container must deliver
  - "PRM-HUM-009"  # Reference Funny Filter — perfect mimicry of a known format IS a Reference the audience recognizes

conflicts_with:
  - "PRM-HUM-010"  # High-Contrast Conflict — extreme contrast can break the micro-coherence that verisimilitude requires
  - "PRM-HUM-024"  # Metahumor and Frame Breaking — breaking the frame explicitly violates the 'never break voice' rule

