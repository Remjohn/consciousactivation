summary: >
  Absolute Verisimilitude is the humor primitive demanding that when the
  CCP mimics, parodies, or adopts any voice, format, or persona, the
  reproduction must be so precise that breaking the illusion is impossible.
  Dikkers insists that "you must make it as similar to the thing you're
  imitating as possible" and "be consistent, and never break voice" (Tip #11).
  In Parody, "the writing or the design must mirror the thing being parodied
  as closely as possible — readers like to see how close you can get it"
  (line 2800). The mechanism is binary: verisimilitude is either perfect or
  broken — there is no "close enough." In CCP, this governs the CVE Visual
  Engine's format mimicry, the Voice DNA enforcement system, and any
  content where the coach adopts a persona, character voice, or satirical
  format.

core_move: >
  When adopting any voice, format, or persona in content, reproduce
  every detail — typography, cadence, syntax, visual style — with such
  precision that the audience cannot distinguish the reproduction from
  the original without examining the content payload.

why_it_works: >
  Dikkers demonstrates that "readers love good verisimilitude — when
  Parody comes eerily close to the original. Verisimilitude is everything
  in Parody" (line 2815). The mechanism is immersive deception: when the
  format mimicry is perfect, the audience enters a state of suspended
  disbelief where the comedic content carries the full authority of the
  parodied source. The Onion works because it looks and reads exactly like
  AP wire copy — the comedy payload is delivered through a credible
  container. Dikkers warns that "if your Parody is half-baked, it won't be
  as funny" (line 2803). The inverse — Sarcasm — fails specifically because
  it "isn't trying very hard to fool anyone" (line 1800). Verisimilitude
  demands commitment.

examples:
  - context: "BOOK: How to Write Funny - Absolute Verisimilitude"
    application: >
      Dikkers demands that when parodying or mimicking any voice, format, or persona, the reproduction must be so precise that breaking the illusion is impossible. Verisimilitude is binary: it's either perfect or broken.
    effect: >
      Produces immersive deception. The audience enters a state of suspended disbelief, allowing the comedic payload to land with the full authority of the parodied source. Sarcasm fails because it 'winks' instead of committing.

  - context: "CCP: CVE Visual Engine - Format Parody"
    application: >
      The CVE agent generates a carousel parodying a 1990s corporate manual. The system enforces strict AGSS consistency: Times New Roman, clip-art, dull green palette, Xerox grain. The payload is the coach's truth about failed leadership.
    effect: >
      Format recognition triggers the Parody Filter immediately. The comedy lands with authority because the visual container is indistinguishable from the real thing.

  - context: "CCP: CMF - Character Persona Commitment"
    application: >
      The coach delivers a short using a 'corporate speak' character. Voice DNA enforcement ensures the jargon cadence never breaks—no winks, no 'just kidding' tone shifts. The coach plays it completely straight.
    effect: >
      The audience decodes the Irony themselves because the commitment is total. The contrast between perfect corporate delivery and deep emotional truth creates sustained comedy.

  - context: "CCP: Telegram - The Automated 'Bureaucracy' Bot"
    application: >
      To highlight a client's procrastination, the agent temporarily adopts the persona of a soulless government bureaucracy, sending a perfectly formatted, cold 'Notice of Inaction' complete with fake reference numbers.
    effect: >
      The absurdity jolts the client out of their rut. The humor works specifically because the agent fully committed to the bureaucratic format without breaking character.

  - context: "CCP: V2WS - The 'Fake Guru' Pitch"
    application: >
      During the webinar, the host presents a slide that perfectly mimics the aesthetic of a scammy internet marketer (neon colors, countdown timers, fake scarcity badges) to mock the industry standard before presenting the authentic offer.
    effect: >
      The audience instantly recognizes the target of the satire. The perfect mimicry disarms their sales resistance through shared laughter.

anti_examples:
  - description: >
      A CVE carousel uses a parody format (newspaper front page) but
      with modern sans-serif fonts, vibrant gradients, and obviously
      design-forward aesthetics that no newspaper has ever used.
    why_it_fails: >
      Dikkers states "go all the way with Parody" and warns that "a lot
      of humor writers think they can succeed with Parody by going
      half-way" (line 2820). Half-baked format mimicry signals laziness
      to the audience and reduces the content from Parody (sophisticated)
      to Snark (superficial). The format stops functioning as a credible
      container and the comedic payload loses its authority.

  - description: >
      The coach delivers a corporate-speak piece but adds 'LOL' after
      the first jargon-heavy sentence, signaling to the audience that
      they know the format is ridiculous.
    why_it_fails: >
      This is the "winking at the reader" that Dikkers prohibits. Sarcasm
      and winking expose the Subtext prematurely, destroying the audience's
      opportunity to discover it themselves. The 'LOL' is the equivalent
      of breaking the fourth wall in a scene that depends on immersion.

