  - "PRM-VOC-001"  # Write for the Distracted Ear — aloud testing catches distracted-ear violations
  - "PRM-VOC-005"  # R.E.A.L. Audio Quality Gate — the aloud test feeds the R.E.A.L. evaluation
  - "PRM-VOC-006"  # Start Strong, End Strong — aloud testing reveals weak opens and closes

