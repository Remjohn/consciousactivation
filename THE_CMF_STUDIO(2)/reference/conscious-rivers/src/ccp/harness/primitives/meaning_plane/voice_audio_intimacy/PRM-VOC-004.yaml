trigger_conditions:
  - "Target pipeline is routing text to TTS engine"
  - "AST parser identifies high syllable density or complex consonant clusters"
  - "Estimated audio duration > 30s"

suppression_conditions:
  - "Target surface is purely text-based (CBCS Web UI)"
  - "Payload is a real-time live improvised response"
  - "Latency budget strictly prohibits preview rendering (< 500ms required)"

misuse_modes:
  - "Reading aloud but not actually listening — going through the motions without critical evaluation"
  - "Over-correcting natural speech patterns into broadcast-smooth sterility"
  - "Using the gate to delay shipping indefinitely — perfectionism disguised as quality control"

