notes: >
  This primitive is positioned as a gate — it does not generate content
  but validates it before release. In the Sonic Scribe pipeline, it sits
  between script generation and final TTS rendering. The gate is
  mechanical, not subjective: it checks for consonant clusters, breath
  violations, unanswered questions, and rhythmic monotony. Pair with
  PRM-VOC-003 (Writing for the Ear) for the generative step and
  PRM-VOC-005 (R.E.A.L. Gate) for the holistic quality assessment.
