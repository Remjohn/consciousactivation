book_reference:
  title: "Better Broadcast Writing, Better Broadcast News"
  author: "Greg Dobbs"
  chapters:
    - "Chapter 10: Proof Positive of Proofreading"
    - "Chapter 3: Being Perfectly Clear"
  key_pages: "143-162, 36-40"
  book_path: "lab/Public Speeaking Coaching/08_Sound_Design/Better Broadcast Writing Better Broadcast News - Greg Dobbs.md"

summary: >
  Proofread Aloud is a quality gate primitive that mandates testing every
  spoken line by voicing it aloud before shipping. Dobbs calls this
  "Being Noisy" — the practice of reading your script aloud to catch
  dead phrasing, synthetic rhythm, tongue-tripping clusters, and
  unanswered questions that survive silent reading. The mechanism is
  simple: the mouth discovers what the eye forgives. In CCP, this
  translates to a mandatory post-generation review step where the Sonic
  Scribe agent renders a preview pass and the vocal output is evaluated
  against naturalness criteria before final delivery.

core_move: >
  Test every spoken line aloud before shipping it so dead phrasing and
  synthetic rhythm are caught early.

why_it_works: >
  Dobbs demonstrates that silent reading misses categories of error that
  only surface when the text is voiced. His example is devastating: a
  sentence that raises a question ("Taylor got this job when the regular
  carrier on the route was drafted during the war") survives silent
  proofreading because the writer's own knowledge fills the gap — but
  the listener stops and wonders "which war?" and loses the rest of the
  story. Reading aloud forces the writer to experience the text as the
  listener will — sequentially, in real time, without the ability to
  re-scan. Additionally, vocal production reveals consonant clusters
  that trip the tongue, breath requirements that exceed natural phrasing,
  and rhythmic monotony that causes attention drift. The mechanism is
  embodied cognition: engaging the vocal apparatus activates auditory
  processing circuits that are dormant during silent reading, surfacing
  mismatches between intent and auditory experience.

examples:
  - context: "BOOK: Better Broadcast Writing - Proof Positive"
    application: >
      Dobbs calls this "Being Noisy"—reading the script aloud to catch dead phrasing, synthetic rhythm, and unanswered questions. Silent reading forgives errors that vocal production exposes.
    effect: >
      Embodied cognition surfaces mismatches between intent and auditory experience before shipping.

  - context: "CCP: CMF - Sonic Scribe Preview Render"
    application: >
      After generation, the system runs a preview TTS pass. It checks if any sentence exceeds 4 seconds of continuous speech or has staccato consonant clusters. Failures are rewritten.
    effect: >
      Dead phrasing is eliminated before the coach hears it.

  - context: "CCP: Conscious Reactions - Feedback Preview"
    application: >
      The agent's TTS preview trips over "strategically systematize your sequencing." The gate rewrites it to "build a clear order for your sequences."
    effect: >
      The coach hears smooth, professional feedback devoid of robotic stutters.

  - context: "CCP: CBCS - Accountability Script Review"
    application: >
      A script reads: "Your content output was consistent with the trajectory." Read aloud, it sounds bureaucratic. The gate rewrites it: "You did what you said you'd do."
    effect: >
      The delivery sounds human and direct, catching corporate-speak.

  - context: "CCP: V2WS - Pre-Webinar Read-Through"
    application: >
      The speaker is forced by the V2WS agent to read the final 5-minute pitch out loud at full volume. A 12-word breathless sentence is identified and split.
    effect: >
      The speaker maintains vocal command during the critical pitch phase without gasping for air.

anti_examples:
  - description: >
      The Sonic Scribe generates a 90-second voice note script and
      ships it directly to TTS rendering without any aloud preview,
      trusting that the LLM's text quality is sufficient for spoken
      delivery.
    why_it_fails: >
      Dobbs's central thesis in the proofreading chapter is that no
      amount of writing skill eliminates the need for vocal testing.
      Even Emmy-winning broadcast writers produce lines that fail the
      ear. Skipping the aloud step guarantees that at least one
      synthetic phrase, one unanswered question, or one tongue-trip
      will reach the listener.

