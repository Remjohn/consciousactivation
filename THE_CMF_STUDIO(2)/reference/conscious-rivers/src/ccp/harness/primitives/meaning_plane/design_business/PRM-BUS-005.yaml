trigger_conditions:
  - "AST analysis detects messaging that is too academic, abstract, or focused purely on the creator's labor/process"
  - "System is generating hooks, landing pages, or sales copy"
  - "Agent is drafting the 'Pitch' or 'Offer' section of a webinar or CCF challenge"

suppression_conditions:
  - "User has already converted and strictly requires logistical facts or execution steps (e.g., a checkout or onboarding page)"
  - "System is providing pure, unbiased research data where emotional/spiritual translation would feel manipulative"

misuse_modes:
  - "Over-Promising — Claiming FEPS benefits that the service cannot realistically deliver"
  - "Ignoring the Client's Primary F — Pitching spiritual benefits to a client who is in acute financial crisis"
  - "Buzzword Salad — Using words like 'empowerment' and 'abundance' instead of concrete, lived consequences"

