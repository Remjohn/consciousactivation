summary: >
  FEPS Benefit Translation asserts that clients do not buy services or features; 
  they buy the deeper consequences of those services. It translates abstract
  coaching claims into concrete Financial, Emotional, Physical, and Spiritual (FEPS)
  benefits, moving the messaging from 'what I do' to 'how your life will change'.

core_move: >
  Translate every feature, service, or intellectual framework into its direct
  Financial, Emotional, Physical, or Spiritual consequence for the client.

why_it_works: >
  Port identifies that the human brain cannot easily value a process (e.g., 'brand design'
  or 'mindset coaching'). The brain values outcomes that relieve pain or secure
  status. By forcing the creator to map their service to the FEPS framework, the
  messaging bypasses logical resistance and hooks into the client's deepest biological
  and psychological drivers. A service is no longer a cost; it is an investment in
  peace of mind (Emotional) or reclaimed time (Physical).

examples:
  - context: "BOOK: Book Yourself Solid - Why People Buy"
    application: >
      Port identifies that the brain cannot value a process. It values outcomes. FEPS Benefit Translation forces the creator to map their service to concrete Financial, Emotional, Physical, or Spiritual consequences.
    effect: >
      Bypasses logical resistance and hooks into deep biological/psychological drivers, reframing the service from a cost to an investment.

  - context: "CCP: CCF - Landing Page Translation"
    application: >
      The agent rewrites 'You will learn my 5-step accountability framework' into: 'You will stop waking up with a racing heart (Physical), stop feeling like a fraud (Emotional), and gain the structure to double output (Financial).'
    effect: >
      The client recognizes their lived pain and the exact relief offered. Perceived value skyrockets because it's measured against the cost of pain, not hours of service.

  - context: "CCP: V2WS - The Pitch Alignment"
    application: >
      During the webinar 'Offer' section, the agent prompts the speaker to explicitly connect the investment to the Spiritual return: 'This is about aligning your daily work with the reason you started your business.'
    effect: >
      The financial cost is contextualized by a deeply meaningful return, lowering sales resistance.

  - context: "CCP: CMF - Hook Generation"
    application: >
      A draft hook about 'improving SEO' is rejected. The agent translates it into FEPS: 'The invisible mistake stealing $5,000 of passive income from your business every month.'
    effect: >
      Immediately commands attention because it translates an abstract technical process into an acute Financial and Emotional threat.

  - context: "CCP: CBCS - Retention Engineering"
    application: >
      When a client is debating whether to renew their coaching contract, the agent generates a custom summary report that explicitly highlights the Physical (better sleep) and Emotional (reduced anxiety) gains they've achieved, not just the tactical milestones.
    effect: >
      The client renews because the value of the coaching is irrefutably tied to their core well-being.

anti_examples:
  - description: >
      A social media post that proudly lists the deliverables of a program:
      '12 weekly calls, a 50-page workbook, and a private Slack channel.'
    why_it_fails: >
      The creator is selling the *labor*, not the *result*. The client looks at
      that list and sees more work for themselves. Because the deliverables are
      not translated into FEPS benefits, the offer feels heavy, exhausting, and
      overpriced.

