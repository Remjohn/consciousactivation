summary: >
  Journey Threshold Design recognizes that users do not seamlessly glide through
  an experience; they step across psychological and physical boundaries. It
  involves deliberately designing the entry points, transitions, and completions
  of an interaction so that crossing into a new state feels ceremonially significant,
  intentional, and clear.

core_move: >
  Shape the user experience around meaningful points of entry, commitment,
  and completion rather than optimizing for pure, frictionless sameness.

why_it_works: >
  Based on Joseph Campbell's hero's journey applied to service design, Lupton
  argues that crossing a threshold requires leaving the known world and entering
  the unknown. This inherently involves risk and requires a decision. By making
  these thresholds explicit—through visual shifts, language changes, or required
  actions—the design honors the user's commitment. Friction at a threshold is not
  always bad; it can signify value, transition, and the adoption of a new role.

examples:
  - context: "BOOK: Design Is Storytelling - Threshold Crossing"
    application: >
      Based on Joseph Campbell's hero's journey, Lupton argues that crossing a threshold requires leaving the known world and entering the unknown. By making these thresholds explicit through visual or physical shifts, the design honors the user's commitment.
    effect: >
      Friction at a threshold signifies value, transition, and the adoption of a new role, shifting the user from passive browsing to active participation.

  - context: "CCP: Telegram - Mini App Onboarding"
    application: >
      Instead of seamless auto-login, the onboarding requires the user to actively tap a button labeled 'I am ready to begin the work' on a visually distinct, dark-themed screen before seeing the first module.
    effect: >
      The intentional friction acts as a psychological threshold. The user feels they have made a commitment to the process.

  - context: "CCP: CCF - The Private Draft Studio"
    application: >
      The moment before recording in the Trigger-First workflow is designed as a 'green room'. The interface quiets, extraneous info fades, and a single prompt appears.
    effect: >
      The coach recognizes the shift in context. The system helps them transition into a focused, performative state, improving capture quality.

  - context: "CCP: V2WS - The 'Doors Closing' Event"
    application: >
      The transition from the 'Free Value' section of the webinar to the 'Offer' section is marked by a deliberate visual and tonal shift. The host announces the transition, and the slide design changes color palettes.
    effect: >
      The audience crosses the threshold into 'buying mode'. They aren't blindsided by the pitch because the threshold was clearly marked.

  - context: "CCP: CMF - The 'Save' State"
    application: >
      When a user completes a major module in a course, they don't just click 'Next'. The system presents a summary screen requiring them to type their biggest takeaway before proceeding.
    effect: >
      The friction solidifies the learning. They must metabolize the information to cross the threshold into the next phase.

anti_examples:
  - description: >
      A premium course that drops the user immediately into a massive, unfiltered
      library of 50 videos the second their credit card is processed, with no
      welcome sequence or orientation.
    why_it_fails: >
      The user crossed a financial threshold but was provided no psychological
      threshold to match. The abrupt shift into a chaotic environment induces
      overwhelm and buyer's remorse, failing to validate their commitment.

