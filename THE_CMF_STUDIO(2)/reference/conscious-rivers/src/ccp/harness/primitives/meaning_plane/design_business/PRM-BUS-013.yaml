trigger_conditions:
  - "System detects the user is moving from a free state to a paid state (conversion event)"
  - "Agent is orchestrating the flow for a difficult or highly vulnerable task (e.g., first Voice DNA recording)"
  - "System is designing the first point of contact (entry) or final point of exit (completion) for a module"

suppression_conditions:
  - "User is engaging in repetitive, utilitarian tasks (like updating account settings) where speed is the only goal"
  - "User is already in a state of flow and introducing a threshold would break their concentration unnecessarily"

misuse_modes:
  - "Artificial Friction — Adding steps that don't signify meaning, just annoyance"
  - "Anti-Climactic Entry — Building up a threshold but offering nothing distinct on the other side"
  - "Too Many Doors — Creating so many thresholds that the user feels interrogated rather than guided"

