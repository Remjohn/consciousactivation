summary: >
  Narrative Structural Backbone applies the dramatic arc to design and user
  experience, treating content not as a static display of information but as
  a sequence with an inciting incident, rising action, climax, and resolution.
  It transforms flat assets into a meaningful progression that sustains attention
  and pulls the user through a defined emotional and cognitive path.

core_move: >
  Organize the user experience or content piece along a deliberate narrative
  arc, giving it a clear beginning, a tension-building middle, and a resolving end.

why_it_works: >
  Lupton adapts Freytag's Pyramid to demonstrate that human attention is
  sustained by the promise of resolution. A flat presentation of facts lacks
  forward momentum. By structuring an interaction so that the user must orient
  themselves, encounter a conflict or question (tension), and then reach a point
  of discovery or closure, the design leverages our biological compulsion to see
  a story through to its conclusion.

examples:
  - context: "BOOK: Design Is Storytelling - The Narrative Arc"
    application: >
      Lupton adapts Freytag's Pyramid for design, showing that human attention is sustained by the promise of resolution. Experiences must have an inciting incident, rising action, climax, and resolution.
    effect: >
      Transforms flat assets into a meaningful progression that leverages our biological compulsion to see a story through to its conclusion.

  - context: "CCP: CMF - Carousel Architecture"
    application: >
      Instead of listing 5 flat facts, the agent designs the carousel as an arc: Slide 1 sets the scene, Slide 2 introduces complication, Slide 3 is the climax (paradigm shift), Slides 4-5 are falling action and resolution.
    effect: >
      The user doesn't just read information; they experience a shift in belief. The swipe-through rate increases because the tension demands resolution.

  - context: "CCP: CCF - Challenge Onboarding"
    application: >
      The agent structures onboarding screens as an inciting incident. Instead of asking for settings, the first screen is the 'Call to Adventure', tasks are gathering tools, and finishing is a threshold-crossing moment.
    effect: >
      The onboarding feels like the beginning of an epic journey rather than administrative friction, emotionally investing the user.

  - context: "CCP: V2WS - The Presentation Arc"
    application: >
      The system reviews a 40-minute webinar outline and forces the speaker to organize the seemingly disparate modules into a single, overarching narrative with escalating stakes leading to the final pitch.
    effect: >
      Audience retention remains high because there is structural momentum carrying them through the dense information.

  - context: "CCP: CBCS - The 90-Day Plan"
    application: >
      The agent maps a client's 90-day coaching program onto a narrative backbone, explicitly defining the 'Rising Action' phase to normalize the inevitable difficulty they will face in weeks 3-6.
    effect: >
      The client anticipates friction as a necessary part of their 'story' rather than a sign of personal failure.

anti_examples:
  - description: >
      A webinar presentation that delivers 40 minutes of equally weighted,
      bullet-pointed facts without any overarching question or rising stakes.
    why_it_fails: >
      The presentation lacks a structural backbone. Because there is no rising
      action or climax, the audience's attention flatlines. There is no narrative
      momentum to carry them through the dense information, leading to disengagement.

