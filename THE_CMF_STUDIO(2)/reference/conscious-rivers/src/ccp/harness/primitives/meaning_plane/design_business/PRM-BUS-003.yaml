trigger_conditions:
  - "AST analysis detects a script or presentation feeling like a flat 'listicle' or data dump lacking forward momentum"
  - "System is structuring a multi-step user flow, challenge, or email sequence"
  - "Agent is evaluating a webinar outline or core presentation deck for structural integrity"

suppression_conditions:
  - "User explicitly requests immediate, unadorned reference information (e.g., a pricing table or API doc)"
  - "System is handling a crisis intervention or high-stress coaching moment where introducing narrative tension is harmful"

misuse_modes:
  - "Over-Dramatization — Forcing a mundane interaction into an epic arc, making it feel bloated"
  - "Missing the Climax — Building tension but failing to provide the cognitive payoff or resolution"
  - "Endless Rising Action — Keeping the user in a state of suspense for too long without relief"

