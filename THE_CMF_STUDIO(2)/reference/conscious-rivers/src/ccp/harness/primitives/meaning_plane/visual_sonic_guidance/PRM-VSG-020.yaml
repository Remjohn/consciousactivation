summary: >
  Perspective and Layering as Meaning treats vantage point, distance, lens choice, and foreground/background
  planes not as technical camera settings, but as mechanisms for constructing psychological meaning.
  It dictates that changing the angle or adding a 'dirty foreground' inherently alters the emotional
  interpretation of the image, shifting status, intimacy, tension, and narrative distance.
core_move: >
  Never generate or capture an image from a generic, flat, eye-level observation point without a specific
  reason. Instead, explicitly define the vantage point (low/high), the focal length (compressed/wide),
  and layer the image with foreground obstructions to enforce a specific psychological relationship
  between the viewer and the subject.
why_it_works: >
  As Freeman identifies, 'linear perspective' and 'enhancing perspective' directly control how the viewer
  interprets scale and distance. A low-angle shot literally forces the viewer to look 'up' at the subject,
  subconsciously granting the subject authority and status. A distant, compressed telephoto shot creates
  an observational, detached, or 'surveillance' feel. Furthermore, Beales' use of the 'dirty foreground'
  (layering an out-of-focus object between the camera and subject) creates a voyeuristic, intimate reality.
  These choices dictate the emotional distance between the audience and the content. Omitting perspective
  from a visual brief leaves the most powerful lever of status and intimacy unused.

examples:
  - context: "BOOK: The 'Dirty Foreground' technique"
    application: >
      Beales advocates for shooting 'through' objects (leaves, a doorway, a crowd) rather than standing in
      front of them. This layers the image. The out-of-focus foreground gives the viewer a physical sense
      of being in the space, spying on a private moment.
    effect: >
      The image feels highly intimate and documentary. The viewer feels they are discovering the subject
      rather than the subject performing for the camera.

  - context: "CCP: CCF Archetype Visual Prompts via CVE"
    application: >
      A 'Sovereign' archetype needs a promotional image. The CVE prompt dictates: 'Shot from a low angle
      with a wide lens to exaggerate height and presence, with the camera positioned slightly below eye level.'
    effect: >
      The low angle physically imposes the coach on the viewer. The perspective itself communicates
      unshakeable authority, matching the Sovereign's brand messaging.

  - context: "CCP: V2WS Webinar 'The Struggle' slide"
    application: >
      When the coach talks about feeling 'crushed by the algorithm,' the visual is a high-angle shot
      looking down at the subject, who is placed low in the frame surrounded by negative space.
    effect: >
      The high angle diminishes the subject's power. The viewer literally looks down on them, which
      perfectly mirrors the psychological state of being 'crushed' or overwhelmed.

  - context: "CCP: CMF Media Factory - Reel B-Roll"
    application: >
      The media agent needs footage for a voiceover about 'the daily grind.' Instead of a flat, eye-level
      shot of typing, it selects footage shot through a slightly cracked office door (dirty foreground).
    effect: >
      The layered perspective adds cinematic quality and makes the viewer feel like a 'fly on the wall,'
      drastically increasing the perceived authenticity of the footage.

  - context: "CCP: Telegram Coaching (CBCS) client assignment"
    application: >
      A fitness coach tells a client struggling with body image to take their progress photos from chest
      level rather than holding the phone high above their head (which distorts the body).
    effect: >
      The perspective shift literally changes how the client views their own body, aligning the visual
      data with reality rather than a distorted, insecurity-driven angle.

anti_examples:
  - description: >
      A coach writes a post about 'coming alongside you as an equal partner.' The accompanying photo is
      shot from a severe low angle, making the coach look like a towering, intimidating monolith.
    why_it_fails: >
      The perspective actively fights the copy. The text promises intimacy and equality, but the visual
      vantage point screams dominance and hierarchy. The viewer will trust the visual (the biological cue)
      over the text, resulting in a failed communication.

