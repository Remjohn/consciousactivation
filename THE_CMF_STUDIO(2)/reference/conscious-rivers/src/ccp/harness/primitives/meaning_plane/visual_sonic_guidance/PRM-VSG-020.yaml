trigger_conditions:
  - "The CCP system is generating AI visual prompts and the outputs look 'flat,' 'staged,' or 'stock-like'"
  - "The brand archetype requires a specific power dynamic (e.g., The Sage vs. The Disruptor)"
  - "The scene is complex and needs depth to separate the primary subject from distracting background elements"

suppression_conditions:
  - "The asset is a direct-to-camera conversational piece (like a FaceTime story) where extreme angles would feel performative and destroy intimacy"
  - "The content is an objective, clinical demonstration of a physical movement (where distortion from lenses would hide the correct form)"

misuse_modes:
  - "The 'Dutch Angle' Abuse — Tilting the camera wildly for no narrative reason, causing nausea rather than tension"
  - "Over-Compression — Using extreme telephoto lenses so often that the subject feels entirely disconnected from their environment"
  - "Accidental Dominance — Filming from a low angle purely because the camera was placed on a low desk, accidentally intimidating the audience"

synergizes_with:
  - "PRM-VSG-017" # Character, Location, Event (Perspective dictates how the viewer relates to the character)
  - "PRM-PSY-011" # The Status Seesaw (Perspective is a visual tool to raise or lower status)

conflicts_with:
  - "PRM-PRS-030" # Connection Before Content (If the perspective is so detached or dominant that it breaks the human connection)

crosswalk_id: "XW-VANTAGE-POINT"
crosswalk_note: "Meaning focuses on camera angle/depth; Experience focuses on 3D layering/Z-index in UI design to signify importance."

notes: >
  CVE agents must have parameters for `camera_angle`, `focal_length`, and `foreground_layering`.
  A prompt without these parameters is an incomplete instruction that guarantees a generic output.
