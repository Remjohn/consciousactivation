summary: >
  Character, Location, Event is a structural scaffold for visual storytelling that prevents images
  from degrading into generic, decorative poses. It mandates that every visual asset must explicitly
  contain all three elements of this narrative triad to function as a story, shifting the asset from
  a static portrait into an active, communicative scene.
core_move: >
  Before capturing or generating an image, define the specific Character, their specific Location
  (which provides context/tone), and the specific Event (the action or change occurring), refusing
  to proceed if any of the three are missing.
why_it_works: >
  As Beales points out, 'a story has structure, as opposed to pure narrative... The magic lies in what
  happens when those three elements collide.' A human brain does not deeply engage with a static subject
  floating in a void (e.g., a standard headshot). When a location is added, context is created. When an
  event is added (even a micro-event, like looking at a watch or dropping a pen), a timeline is created
  (something happened before, something will happen after). This triad forces the brain to actively
  process the image as a story rather than passively acknowledging it as a graphic.

examples:
  - context: "BOOK: Constructing a brand lifestyle shoot"
    application: >
      Instead of just photographing a model wearing a watch (straight product placement), Beales constructs
      the triad: Character (an adventurer), Location (a cold winter sea), Event (setting out in a canoe).
    effect: >
      The image stops being a lazy advertisement and becomes an immersive story. The audience engages
      with the narrative of the adventurer, subconsciously absorbing the brand association without feeling 'sold' to.

  - context: "CCP: CCF Archetype Visual Prompts via CVE"
    application: >
      A 'Guide' archetype coach needs a hero image for their website. Instead of prompting 'friendly coach
      smiling at camera,' the CVE system forces the triad: 'Character (veteran coach), Location (a cluttered
      rehearsal room at dawn), Event (reviewing marked-up notes from a failed session).'
    effect: >
      The resulting image is vastly more compelling than a studio headshot. It proves the coach's
      dedication and expertise implicitly through the scene, establishing immediate, grounded authority.

  - context: "CCP: CMF Media Factory - Carousel design"
    application: >
      For a carousel about 'Navigating Burnout,' the media agent doesn't use generic stock photos of
      sad people. It uses a sequence that relies on the triad: Slide 1 (Character: executive; Location:
      empty office at night; Event: staring at a glowing screen while rubbing eyes).
    effect: >
      The viewer instantly recognizes their own reality in the scene. The specificity of the triad
      cuts through the noise of generic self-help content.

  - context: "CCP: Telegram Coaching (CBCS) assigning content homework"
    application: >
      A client complains they don't know what to post on Instagram. The coach gives them a strict rule:
      'No more selfies in your car. Your next post must have a Character (you), a Location (where you actually
      do the work), and an Event (you actively solving a problem). Shoot that and send it to me.'
    effect: >
      The client is forced out of the 'influencer pose' paradigm and into the 'documentary storyteller'
      paradigm, instantly elevating the perceived value of their brand.

  - context: "CCP: V2WS Webinar 'Origin Story' slides"
    application: >
      When scripting the coach's origin story, the `excalidraw_compiler.py` agent refuses to generate a
      slide with just bullet points. It prompts the coach: 'Give me the location where you hit rock
      bottom, and the exact event that forced you to change.' It then visualizes that specific scene.
    effect: >
      The origin story becomes a cinematic flashback rather than a resume review, pulling the audience
      into a state of deep emotional empathy.

anti_examples:
  - description: >
      A coach posts a highly polished, beautifully lit photo of themselves standing in front of a seamless
      grey paper backdrop, staring blankly into the camera, with a caption about 'overcoming adversity.'
    why_it_fails: >
      The triad is broken. There is a Character, but the Location is a void (grey paper provides zero context),
      and there is no Event (staring is not an event). The image is purely decorative and does not support
      the narrative of the caption, resulting in a disconnected, forgettable post.

