trigger_conditions:
  - "The coach is relying too heavily on generic headshots or lifestyle poses that lack context"
  - "The CCP system is generating prompts for visual AI models and needs a reliable structure to prevent 'empty' images"
  - "A user is writing a personal story and failing to 'set the scene'"

suppression_conditions:
  - "The visual is specifically designed to be an abstract texture or background element where a defined 'Character' would be distracting"
  - "The asset is a pure data visualization (e.g., a pie chart)"

misuse_modes:
  - "The Forced Event — Having the character do something completely unnatural or staged just to satisfy the 'Event' requirement (e.g., pointing excitedly at a blank wall)"
  - "Location Overpower — Putting the character in an epic, beautiful location that has absolutely nothing to do with the story being told, creating narrative confusion"
  - "Ignoring the Micro-Event — Believing the 'Event' must be massive (like an explosion), ignoring that a micro-event (looking at a clock) is often more powerful"

synergizes_with:
  - "PRM-VSG-018" # Sequence Over Single Image (The triad is the building block of the sequence)
  - "PRM-HUM-037" # Hyper-Specificity Anchoring (The triad demands specificity)

conflicts_with:
  - "PRM-VSG-019" # Story Gap as Visual Engine (If the triad explains *everything* so thoroughly that no mystery remains)

crosswalk_id: "XW-NARRATIVE-SCAFFOLD"
crosswalk_note: "Meaning focuses on the components of a visual scene; Experience focuses on structuring user testimonials around this exact triad."

notes: >
  This primitive is the antidote to 'Influencer Aesthetics.' It forces coaches to document reality
  rather than pose for it. The CVE prompt compiler must structurally reject any image request that
  lacks a defined Location and Event.
