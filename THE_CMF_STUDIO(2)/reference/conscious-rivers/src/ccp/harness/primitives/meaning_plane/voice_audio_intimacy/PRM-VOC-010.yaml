trigger_conditions:
  - "LLM source text > 200 words but target audio constraint is < 90s"
  - "AST analysis detects hedging, qualifiers, or repetition"
  - "Revision phase active focusing on signal-to-noise ratio"

suppression_conditions:
  - "Context indicates deep-dive exploratory session requested"
  - "User config explicitly forces comprehensive activity logging"
  - "Target is a detailed written report"

misuse_modes:
  - "Over-compression — cutting so aggressively that nuance and context are lost"
  - "Signal misidentification — keeping the dramatic moment instead of the useful moment"
  - "Compression without restructuring — making the note shorter but not restructuring for flow"

synergizes_with:
  - "PRM-VOC-001"  # Write for the Distracted Ear — compression directly serves distracted-ear survival
  - "PRM-VOC-006"  # Start Strong, End Strong — compression forces strength into bookend positions
  - "PRM-VOC-004"  # Proofread Aloud — the aloud test catches padding that survives text compression
  - "PRM-VOC-008"  # Lead-In and Tag Architecture — structural framing after compression preserves coherence

conflicts_with:
