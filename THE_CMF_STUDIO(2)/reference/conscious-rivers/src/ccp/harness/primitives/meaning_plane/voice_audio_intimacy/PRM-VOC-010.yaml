notes: >
  The Edited Essence is the revision-phase complement to the generation-
  phase primitives. Its natural home is between content generation and
  the Proofread Aloud gate (PRM-VOC-004). The key editorial question
  from Beaman: "Can the reporter say this better than the interviewee?"
  In CCP terms: "Can a text card convey this fact more efficiently than
  voice?" If yes, move the fact to a card and let the voice carry only
  what voice does better — emotion, tone, and behavioral activation.
