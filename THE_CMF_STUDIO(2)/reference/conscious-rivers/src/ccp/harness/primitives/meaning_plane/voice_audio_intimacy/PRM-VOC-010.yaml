summary: >
  The Edited Essence is a compression constraint that mandates aggressive
  trimming of spoken material until only the most signal-rich content
  remains. Beaman describes the professional radio editor's discipline:
  "interview with editing in mind" and always "record with editing in
  mind." The raw interview may run 20 minutes; the broadcast clip runs
  40 seconds. The editor's job is not to abbreviate but to extract —
  finding the one moment where the interviewee said something no one
  else could say, with an emotional quality no narrator could replicate.
  In CCP, this governs how Sonic Scribe compresses coaching material:
  a 500-word LLM output must yield a 90-second voice note where every
  second carries irreplaceable signal.

core_move: >
  Compress aggressively until only the most signal-rich spoken material
  remains.

why_it_works: >
  Beaman shows that the radio professional must decide what to cut by
  asking: can the reporter say this better than the interviewee? If yes,
  cut the interviewee and let the reporter deliver the fact. Sound bites
  should convey "opinion, emotion, analysis, or eyewitness accounts" —
  material that only the source can authentically deliver. Dobbs
  reinforces this from the writer's side: "just cut them cleanly, don't
  let them bore." The mechanism is signal density optimization: listener
  attention is a finite resource measured in seconds, and every second
  of low-signal content (filler, repetition, throat-clearing, hedging)
  actively depletes the attention reservoir. The edited essence
  concentrates value into the smallest possible temporal container.
  In CCP, LLM-generated coaching text is the "raw interview" — it
  contains insight, but also padding, qualifiers, and throat-clearing
  phrases that must be stripped before vocal rendering.

examples:
  - context: "BOOK: Interviewing for Radio - The Edited Essence"
    application: >
      Beaman mandates aggressive trimming until only the most signal-rich material remains. The editor extracts the one moment where the speaker said something no narrator could replicate.
    effect: >
      Listener attention is preserved because every second of low-signal content is stripped.

  - context: "CCP: CMF - Script Compression"
    application: >
      A 400-word LLM output is stripped of history, disclaimers, and hedging. Only the core behavioral insight, the specific action, and the emotional hook remain, resulting in a 55-second script.
    effect: >
      The coach receives a dense, re-listenable coaching moment with zero filler.

  - context: "CCP: CBCS - Weekly Review"
    application: >
      Instead of narrating 9 activities equally, the agent identifies the single client call that produced the most learning, focusing the audio entirely on that one high-signal moment.
    effect: >
      The debrief is centered on the highest-signal insight rather than a buried volume of facts.

  - context: "CCP: Conscious Reactions - Feedback Triage"
    application: >
      The agent analyzes a 10-minute video submission but delivers only a 45-second audio response targeting the single most critical structural flaw.
    effect: >
      The coach knows exactly what matters most without being overwhelmed by minor critiques.

  - context: "CCP: V2WS - Testimonial Editing"
    application: >
      A 3-minute client success story is aggressively cut to 15 seconds, containing only the emotional transformation, while the data points are moved to visual slides.
    effect: >
      The voice carries only what it does best—emotion and tone.

anti_examples:
  - description: >
      A CBCS voice note narrates every single activity from the coach's
      week at equal depth: 45 seconds on Monday's post, 45 seconds on
      Tuesday's client call, 45 seconds on Wednesday's webinar... The
      total runs 5 minutes and 15 seconds.
    why_it_fails: >
      Beaman's editing principle demands ruthless triage. Equal depth
      across all activities means the highest-signal moment gets the
      same weight as the lowest. The 5-minute duration exceeds the
      typical attention span for a coaching voice note, and the
      listener zones out before reaching the most important insight.
      The essence is buried in volume.

