summary: >
  The Setup-Punchline Temporal Architecture dictates the rigorous geometric
  compression of comedic communication. Rosenfield defines the absolute
  constraints of the form: a setup must contain exactly one subject, clearly
  establish the performer's attitude toward that subject, conceal the
  impending surprise, and be as brief as possible. The punchline must
  follow immediately, delivering the revelation at the absolute terminal
  node. Crucially, this primitive introduces 'The Roll' — an exponential
  engagement structure consisting of a single setup followed by multiple,
  consecutive punchlines without intervening setups. In CCP, this architecture
  is enforced by the JIT Compiler's `syntax_audit_pass`, transforming
  wandering AI-generated paragraphs into dense, emotionally explosive
  communication blocks optimized for V2WS webinars and CCF carousels.

core_move: >
  Strip the setup down to a single subject and a clear attitude, place
  the payload at the terminal word, and whenever possible, string multiple
  payloads off a single setup to create an uninterrupted cascade of releases.

why_it_works: >
  Rosenfield's architecture works by managing cognitive load and tension.
  A setup with multiple subjects confuses the audience's expectation;
  without a clear attitude, the audience doesn't know how to orient
  themselves emotionally. Brevity preserves the tension gradient. The
  genius of The Roll is momentum: "laughter creates laughter." By removing
  the need to rebuild tension with a new setup, a performer can string
  together 5-10 insight punches (like Louis C.K.'s Monopoly piece), creating
  a compounding emotional release. For CCP content, compression is survival:
  dense, single-subject setups with rapid, cascading payoffs are the only
  structural formats proven to sustain attention in high-friction digital
  environments.

examples:
  - context: "BOOK: Mastering Stand-Up - The Compression Engine"
    application: >
      Rosenfield mandates rigorous geometric compression: a setup must contain exactly one subject and a clear attitude. The punchline must deliver the revelation at the absolute terminal node.
    effect: >
      Manages cognitive load and tension. Brevity preserves the tension gradient, ensuring the punchline lands with concussive force.

  - context: "CCP: CMF - The `syntax_audit_pass`"
    application: >
      The JIT Compiler revises a drafted hook. It detects multiple subjects and a buried payload. The agent compresses it to a single subject and pushes the payload to the terminal node.
    effect: >
      The thought lands with explosive force instead of bleeding out in a wandering run-on sentence.

  - context: "CCP: CVE Visual Engine - 'The Roll' Carousel"
    application: >
      Slide 1 is a single-subject setup ('Why your morning routine is destroying your creativity'). Slides 2-6 are consecutive, escalating insight punches with no new setups ('The Roll' protocol).
    effect: >
      The carousel functions as a monologue with a single tension wave and cascading releases, driving completion rates through structural momentum.

  - context: "CCP: V2WS - Micro-Pacing"
    application: >
      The webinar script breaks complex industry critiques into strict setup-punchline geometries, forcing the coach to state their attitude explicitly before delivering the data.
    effect: >
      Prevents the coach from slipping into monotonous lecturing. The audience stays engaged because the data is delivered as a tension-release mechanism.

  - context: "CCP: CBCS - Voice Note Compression"
    application: >
      When a coach rambles for 3 minutes, the agent sends a prompt: 'You have exactly 2 sentences. What is the subject, what is your attitude about it, and what is the single takeaway?'
    effect: >
      Trains the coach to unconsciously adopt the compression engine in spontaneous speech.

anti_examples:
  - description: >
      A webinar script uses a setup that introduces the problem of lead
      generation, briefly mentions the cost of ads, and then tries to
      deliver a punchline about organic content strategy.
    why_it_fails: >
      This violates the 'one and only one subject' rule. The audience's
      cognitive processor is divided between tracking the lead gen problem
      and the ad cost problem. By the time the punchline arrives, the
      tension is diluted and the release fails.

  - description: >
      After delivering a successful punchline in a video short, the coach
      immediately starts explaining a new context for the next joke,
      ignoring the opportunity to Roll.
    why_it_fails: >
      This resets the audience's emotional momentum to zero. Rebuilding
      tension requires cognitive effort. Failing to utilize The Roll
      (stacking multiple insights onto the already-established setup)
      leaves engagement capital on the table and makes the content feel
      choppy and laborious.

