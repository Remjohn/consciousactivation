  - "PRM-HUM-017"  # Attitude-Emotion Binding — the setup must contain a clearly declared attitude for the architecture to work
  - "PRM-PRS-002"  # Tension-and-Release Narrative Engine — the Setup-Punchline architecture is the micro-fractal version of this macro narrative engine

conflicts_with:
