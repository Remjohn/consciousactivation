notes: >
  This primitive provides the exact mathematical constraints for CCF hook
  generation and V2WS transitions. Its MCDA (176) reflects high algorithmic
  determinism — NLP models excel at parsing sentence dependency trees to
  verify single subjects and terminal node placement. Float note:
  goal_bias.tension is ceiling (0.9) because the entire architecture exists
  to maximize and release cognitive tension. phase_fit.revision is highest
  (0.9) because, as Rosenfield notes, comedians rarely write this way
  on the first pass; it is achieved through ruthless editing and the
  'Working Backward' methodology.
