trigger_conditions:
  - "System is executing a `syntax_audit_pass` on generated text; must enforce single-subject and terminal-node geometry"
  - "Agent is mapping text to visual slides in the CVE, requiring identification of 'Roll' cascade opportunities"
  - "AST analysis flags a V2WS webinar script for drop-off risks due to multi-subject, rambling setups"

suppression_conditions:
  - "Content format is explicitly long-form narrative or storytelling, where tension is built slowly over paragraphs"
  - "Audience requires highly nuanced, multi-variable technical explanation where over-compression would sacrifice necessary clarity"

misuse_modes:
  - "Over-compression — stripping so much context from the setup that the audience cannot orient themselves, causing the punchline to fail from confusion"
  - "The False Roll — stringing together multiple punchlines that actually require different setups, creating a disjointed, confusing sequence that breaks the logical flow"
  - "Attitude omission — compressing the setup so severely that the performer's emotional stance is lost, leaving the audience without an emotional anchor"

synergizes_with:
