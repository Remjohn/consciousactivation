trigger_conditions:
  - "The CCP system is generating prompts for visual AI models (Midjourney, DALL-E) to ensure non-generic outputs"
  - "A user's visual content is being ignored in fast-scrolling environments (low CTR)"
  - "The coach is building a complex visual asset (infographic, Excalidraw diagram) that must be read in a specific order"

suppression_conditions:
  - "The asset is purely auditory (e.g., a podcast or voice note) where visual composition does not apply"
  - "The image is meant to be a 'Where's Waldo' style exploratory graphic where the goal *is* getting lost in the details"

misuse_modes:
  - "The Rule of Thirds Trap — Blindly applying grid rules without asking *why* the eye needs to go there"
  - "Over-Signaling — Using massive red arrows and circles on every image, treating the audience like idiots instead of using subtle contrast"
  - "Conflicting Hierarchies — Having the text say 'Look here' while the lighting pulls the eye in the opposite direction"

