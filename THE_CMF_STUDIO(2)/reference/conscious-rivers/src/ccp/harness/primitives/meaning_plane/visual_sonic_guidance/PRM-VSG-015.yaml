  book_path: "lab/Public Speeaking Coaching/07_Photography_and_Composition/The photographers Eye - Michael Freeman.md"

summary: >
  Composition as Attention Routing treats visual design not as a matter of aesthetics or ornament,
  but as a strict biological routing system for the viewer's eye. It dictates that every image must
  deliberately sequence attention so the viewer intuitively knows what to notice first, second, and third,
  guaranteeing that meaning is assembled in the correct psychological order.
core_move: >
  Use frame edges, scale relationships, contrast, leading lines, and figure-ground separation to
  construct a precise visual pathway that forces the viewer's eye to land on the primary narrative
  subject before exploring secondary context.
why_it_works: >
  As Freeman identifies, human vision involves paying attention to specific points, and 'the eye may
  feel uncomfortable concentrating on points' that are poorly arranged. The visual system cannot process
  everything with equal intensity simultaneously. Meaning emerges because the eye is guided through
  hierarchy. When composition is treated merely as 'making things look pretty,' the eye bounces
  randomly, leading to cognitive friction. By deliberately designing the eye-path ('encouraging the
  eye to move from the houses towards the upper left'), the creator eliminates confusion, allowing
  the narrative payload to land instantly, which is critical in fast-moving social media feeds.

examples:
  - context: "BOOK: Off-centering the subject for momentum"
    application: >
      Freeman explains that 'off-centering the subject brings some life to the design, and encourages
      the eye to move from the houses towards the upper left corner of the frame.' Instead of a static,
      centered shot where the eye stops immediately, the asymmetrical composition physically pulls the
      viewer's gaze across the image, revealing context in a specific order.
    effect: >
      The viewer experiences the image as a sequence of discoveries rather than a flat piece of data,
      making the visual feel dynamic and intentional.

  - context: "CCP: CCF Archetype Visual Prompt Generation via CVE"
    application: >
      Instead of prompting 'A confident coach in a studio,' the CVE system specifies: 'A low-angle
      portrait where a strong diagonal line from a window shadow routes the eye directly to the coach's
      intense gaze, with the background heavily blurred to enforce figure-ground separation.'
    effect: >
      The AI generator outputs an image with extreme visual hierarchy. When placed in a social feed,
      the viewer's eye is instantly caught by the intended focal point, maximizing stopping power.

  - context: "CCP: V2WS Webinar slide architecture"
    application: >
      The `excalidraw_compiler.py` agent designs a slide comparing the 'Old Way' vs 'New Way.' Instead
      of giving them equal visual weight, it darkens the 'Old Way' box and uses a thick, high-contrast
      arrow to drag the eye immediately to the 'New Way' metric, which is set in a larger, brighter font.
    effect: >
      The audience processes the slide in the exact order the speaker intends, absorbing the solution's
      superiority before the speaker even explains it verbally.

  - context: "CCP: CMF Media Factory - Thumbnail design"
    application: >
      A media agent evaluates a YouTube thumbnail draft. It notices the text and the coach's face are
      competing for attention because they have the same contrast level. The agent applies attention
      routing by adding a subtle vignette around the edges and slightly darkening the coach's face,
      making the white text the absolute brightest point in the frame.
    effect: >
      The click-through rate increases because the brain no longer has to choose what to look at first;
      the text hits the retina immediately.

  - context: "CCP: Telegram Coaching (CBCS) assigning a visual audit"
    application: >
      A client complains their Instagram posts aren't converting. The coach asks them to run the 'Squint Test':
      'Squint at your last 3 posts until they become blurry shapes. What is the brightest, most
      prominent shape? If it's the background and not the product, your composition is broken.'
    effect: >
      The client instantly understands visual hierarchy without needing an art degree, giving them
      agency to fix their own asset design.

anti_examples:
  - description: >
      A coach posts an image of themselves holding their new book. The coach is wearing a bright red
      shirt, standing in front of a busy, high-contrast brick wall, while the book cover is dark blue
      and held near their waist.
    why_it_fails: >
      This is compositional chaos. The bright red shirt and high-contrast bricks scream for the eye's
      attention, while the actual narrative object (the book) is visually suppressed. The viewer's eye
      is routed to the background and the shirt, missing the point of the post entirely before swiping away.

