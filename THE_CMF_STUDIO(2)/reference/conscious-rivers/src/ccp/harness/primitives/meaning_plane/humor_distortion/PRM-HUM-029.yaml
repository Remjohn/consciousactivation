trigger_conditions:
  - "Text generation includes >3 sentences of continuous past-tense narration; system must evaluate insertion of present-tense embodied dialogue"
  - "V2WS teleprompter script requires a pattern interrupt; system inserts stage directions for an active, performed mini-scene"
  - "CBCS is addressing an internalized limiting belief; agent drafts response externalizing the belief as an actable character voice"

suppression_conditions:
  - "Communication medium is purely text-based and highly formal (e.g., legal, technical documentation); stage directions or dialogue shifts will read as unprofessional errors"
  - "Coach's Voice DNA profile registers low in 'Performative Range'; forcing character shifts will read as awkward and inauthentic"

misuse_modes:
  - "Constant Act-Outs — performing every beat as a mini-scene, exhausting the audience and preventing any reflective narration"
  - "Unclear tense shifts — the audience cannot tell when the coach is narrating vs. performing, creating confusion about who is speaking"
  - "Act-Out as avoidance — using performance to dodge genuine emotional delivery, hiding behind characters instead of speaking authentically"

synergizes_with:
  - "PRM-HUM-022"  # Character Mask — the Act-Out IS the performative deployment of the Character Mask; the Mask defines WHAT to embody, the Act-Out defines HOW
  - "PRM-HUM-017"  # Attitude-Emotion Binding — the performed character must carry a maximally intense attitude
  - "PRM-HUM-020"  # Thought Moment Illusion — transitioning into an Act-Out with a manufactured pause ("Wait, let me show you what this sounds like...") enhances spontaneity

conflicts_with:
  - "PRM-HUM-006"  # Temporal Resolution Delay — an Act-Out sometimes requires the reveal to happen mid-performance rather than at the terminal node, creating a tension with strict terminal geometry

