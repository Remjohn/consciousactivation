notes: >
  The audit flags lower AGF (35/50) because "embodied narrative shifts"
  are harder to generate deterministically via text-only LLMs — they
  require the coach's performative ability to execute. Float note:
  surface_fit.voice and visual are ceiling (0.9) because Act-Outs are
  fundamentally performative — they require vocal or visual embodiment.
  surface_fit.telegram is low (0.5) because textual Act-Outs require
  careful calibration.
