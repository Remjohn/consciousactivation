summary: >
  The Act-Out occurs when the content shifts from past-tense recounting
  to present-tense embodiment — the performer stops DESCRIBING a character
  or concept and starts BEING it. Carter demonstrates that this abrupt
  dynamic transition forces the audience to engage active cognitive
  processing, dramatically increasing retention and entertainment value.
  In CCP, the Act-Out maps to the VDP-Native visual prompt pipeline (forcing
  visual shifts from literal to embodied metaphor), the CBCS voice note
  scripts (shifting from narration to character voice), and the V2WS
  webinar scripts (shifting from slides to performed mini-scenes).

core_move: >
  Shift abruptly from describing a concept in past or abstract tense to
  embodying it in present tense — performing a mini-scene rather than
  narrating one.

why_it_works: >
  Carter shows that passive narration engages only the listener's
  comprehension circuits, while embodied performance engages imagination,
  empathy, and mirror neurons simultaneously. The abrupt tense shift —
  from "I was talking to my client and she said..." to "So she looks at
  me and goes: 'BUT WHAT IF THEY JUDGE ME?'" — forces the audience to
  construct a mental scene in real-time. This active construction produces
  deeper encoding than passive listening. The audit scores this highest
  in VTP and ER (50/50 and 48/50) because embodied performance provides
  the most engaging visual and educational content.

examples:
  - context: "BOOK: The NEW Comedy Bible - Embodied Narrative Shift"
    application: >
      Carter demonstrates the power of shifting abruptly from past-tense narration to present-tense embodiment—performing a mini-scene instead of describing it.
    effect: >
      Forces the audience from passive comprehension into active scene construction, dramatically increasing cognitive engagement and retention.

  - context: "CCP: V2WS - The Scripted Mini-Scene"
    application: >
      The webinar script explicitly directs the coach to stop narrating a client story and act out the dialogue in present tense, performing both roles.
    effect: >
      Breaks the hypnotic monotony of a presentation. The audience's mirror neurons fire as they watch a performance rather than listen to a lecture.

  - context: "CCP: CBCS - The Voice Note Character Shift"
    application: >
      The coach's voice note shifts tone: 'Your anxiety sounds like a bureaucratic middle manager: "Excuse me, I need you to panic about this email immediately."'
    effect: >
      The client hears their internal monologue externalized as an absurd character, achieving therapeutic distance through performative humor.

  - context: "CCP: CMF - The Dialogue Hook"
    application: >
      The hook drops the reader instantly into an in-progress conversation without narrative preamble: '"So let me get this straight," the prospect said...'
    effect: >
      Arrests the scroll by demanding immediate contextual processing. The reader must engage actively to figure out what is happening.

  - context: "CCP: CVE - The Literal Metaphor Rendering"
    application: >
      The Visual Engine interprets a metaphorical concept (e.g., 'carrying emotional baggage') as a literal, physical scene to be acted out visually.
    effect: >
      Translates abstract coaching concepts into immediate, visceral visual vocabulary that requires zero linguistic translation.

anti_examples:
  - description: >
      The coach narrates the entire scene without shifting to present
      tense: 'My client told me she was worried about being judged,
      and I explained that her fear was irrational.'
    why_it_fails: >
      Pure narration engages only comprehension. The audience processes
      the information but does not construct a scene. Without the
      tense-shift into embodiment, the content reads as a clinical
      summary rather than a lived moment.

  - description: >
      The Act-Out is marked with excessive stage directions in text:
      '[clears throat] [adjusts glasses] [speaks in funny voice]
      "Here is the thing about coaching..."'
    why_it_fails: >
      Over-directing the Act-Out in text breaks the illusion. The
      audience reads stage directions as instructions rather than
      experiencing the performance. In text, the Act-Out must be
      conveyed through the CONTENT and SYNTAX of the dialogue itself,
      not through described physical actions.

