trigger_conditions:
  - "Before writing a single word of a new script, webinar, or beat cluster"
  - "When a draft feels rambling, bloated, or overly academic"
  - "When the core value proposition of a coaching module feels vague or hard to summarize"

suppression_conditions:
  - "During free-association brainstorming or 'clown-state' ideation where strict formatting rules would prematurely constrain creativity"

misuse_modes:
  - "The Compound Sentence Trap — stringing together four different ideas with semicolons and 'and's to avoid making the hard choice of what the *one* Big Idea actually is"
  - "Fake Stakes — attaching hyperbolic, unbelievable consequences (e.g., 'or your business will instantly die tomorrow') that destroy credibility"

