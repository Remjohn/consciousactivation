summary: >
  The Big Idea Formulation Protocol is a pre-production quality gate that forces creators
  to distill their entire presentation into a single, highly specific sentence. It dictates
  that a Big Idea must contain three non-negotiable elements: a unique point of view, explicit
  stakes, and the word "you." In CCP, this primitive acts as the ultimate filter against
  aimless, topic-based content, ensuring that no production begins without a clear,
  actionable promise made directly to the audience.

core_move: >
  Condense the core message into a single, complete sentence containing a unique point of view, explicit stakes, and the word "you," refusing to proceed with production until this is achieved.

why_it_works: >
  Duarte identifies a massive flaw in corporate communication: speakers present "topics"
  (e.g., "Q3 Financial Update" or "Stress Management") rather than "ideas." A topic has no
  direction and makes no promise; it allows the speaker to ramble without consequence. The
  Big Idea formulation forces discipline. By requiring a complete sentence with a noun and
  a verb, it demands an argument. By requiring the word "you," it forces the idea out of the
  speaker's ego and directly toward the audience's reality. By requiring stakes (what happens
  if the audience accepts or rejects the idea), it generates immediate urgency. If a speaker
  cannot articulate this sentence, they do not yet have a presentation worth giving.

examples:
  - context: "BOOK: Resonate - Meet the Hero"
    application: >
      Nancy Duarte asserts that a presentation must be distilled into a single "Big Idea" sentence before production begins. This sentence must contain a unique point of view, explicit stakes, and the word "you," forcing the idea out of the speaker's ego and directing it to the audience's reality.
    effect: >
      The content transitions from an aimless encyclopedic topic into a high-stakes, unified argument that demands an audience response.

  - context: "CCP: CCF - Archetype Script Writing"
    application: >
      A coach submits a script proposal with the topic: "Burnout and Recovery." The CCF agent rejects it and forces the Big Idea Protocol: "You must stop treating burnout as a time-management problem, or you will lose your career."
    effect: >
      The writer now knows exactly what evidence to include and what to cut, accelerating production and radically improving the impact.

  - context: "CCP: CMF - Beat Cluster Development"
    application: >
      Before storyboarding a cluster, the CMF team prints the Big Idea and places it atop the workspace. Every visual asset, Skia render, and lighting choice is judged against whether it serves this specific sentence.
    effect: >
      Visual incoherence is eliminated. The cluster feels tight, purposeful, and relentless, respecting the viewer's time.

  - context: "CCP: V2WS - Webinar Pitch Distillation"
    application: >
      A coach struggles to close a webinar because they are selling 15 different features. The V2WS system forces them to write a single Big Idea sentence encapsulating the transformation. The 15 features are subordinated to this one master promise.
    effect: >
      The audience stops feeling overwhelmed by data and instead feels the urgent pull of a single, coherent transformation.

  - context: "CCP: Conscious Reactions - Title Generation"
    application: >
      When generating the title for a Solo Reaction, the Guardian Agent refuses to use generic labels ("Thoughts on Coaching"). It applies the Big Idea protocol to generate a title that contains a POV and stakes ("Why Your Pricing Strategy is Insulting Your Audience").
    effect: >
      The voice note commands immediate attention in the feed, ensuring high open rates because the stakes are declared instantly.

anti_examples:
  - description: >
      A webinar billed as "An Exploration of Modern Leadership Paradigms in the Digital Age."
    why_it_fails: >
      This is a topic, not an idea. Because it lacks a unique POV, makes no demand of the
      audience (no "you"), and establishes no stakes, the speaker is free to wander aimlessly
      through academic theories. The audience feels no urgency to listen and no compulsion
      to act, resulting in abysmal retention rates.

