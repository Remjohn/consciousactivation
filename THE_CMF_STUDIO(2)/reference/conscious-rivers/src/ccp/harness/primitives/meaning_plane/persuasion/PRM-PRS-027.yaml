crosswalk_id: "XW-DUAL-CODING"
crosswalk_note: "Experience design uses this principle: pairing a physical haptic buzz (kinesthetic) with a visual checkmark (visual) and a success chime (auditory) on task completion."

notes: >
  This primitive requires the coach to think like a film director or an experience designer,
  not just a writer. It demands that meaning be encoded in multiple formats simultaneously.
