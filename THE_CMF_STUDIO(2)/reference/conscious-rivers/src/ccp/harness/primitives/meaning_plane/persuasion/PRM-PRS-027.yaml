trigger_conditions:
  - "When auditing the storyboard for any CMF beat cluster or visual asset"
  - "When designing interactive exercises for a webinar or live workshop"
  - "When attempting to teach a highly abstract or difficult-to-grasp concept"

suppression_conditions:
  - "When the specific goal is deep, quiet reflection, where multiple sensory inputs would be distracting rather than anchoring"

misuse_modes:
  - "Sensory Conflict — presenting visual information that contradicts or distracts from the auditory message (e.g., a complex slide full of text while the speaker is telling a poignant personal story), causing cognitive dissonance"
  - "Over-Stimulation — bombarding the audience with chaotic visuals, loud sound effects, and frantic movement simultaneously, which triggers anxiety and cognitive shutdown rather than enhanced memory"

