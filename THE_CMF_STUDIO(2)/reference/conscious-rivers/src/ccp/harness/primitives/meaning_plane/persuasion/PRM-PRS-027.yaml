summary: >
  The Multisensory Delivery Architecture is a structural design primitive based on the Cognitive
  Theory of Multimedia Learning. It dictates that content must engage at least two sensory
  channels (Visual, Auditory, Kinesthetic) simultaneously to maximize retention. In CCP, this
  primitive acts as a production quality gate, forbidding single-channel delivery (e.g., a
  talking head with no visual aids, or a slide with no voice-over) and ensuring that the
  audience's brain builds robust, dual-coded mental representations of the core concepts.

core_move: >
  Engineer content to trigger multiple sensory pathways simultaneously—combining auditory narrative with vivid imagery, physical props, or interactive kinesthetic exercises.

why_it_works: >
  Educational psychologist Richard Mayer's research proves that students exposed to multisensory
  environments (text + pictures + audio) *always* have more accurate recall than those exposed
  to a single channel. When the brain builds two parallel mental representations (one verbal,
  one visual) of the same concept, the neural connections are massively stronger. Furthermore,
  Mayer found this advantage is most pronounced for audiences with *low prior knowledge* of the
  material—which describes almost all coaching clients encountering a new framework. By adding
  the Kinesthetic channel (touch, movement, writing), retention is maximized. Single-channel
  communication relies entirely on the listener's imagination to do the heavy lifting, which
  often fails under cognitive load.

examples:
  - context: "BOOK: Talk Like TED - Multisensory Experiences"
    application: >
      Based on Richard Mayer's Cognitive Theory of Multimedia Learning, content must engage multiple sensory channels (Visual, Auditory, Kinesthetic) to maximize retention. Single-channel delivery fails under cognitive load because the brain doesn't build dual-coded representations.
    effect: >
      Building parallel mental representations (verbal and visual) massively strengthens neural connections, especially for audiences with low prior knowledge.

  - context: "CCP: CMF - Framework Introduction"
    application: >
      To explain "friction" in team dynamics, the CMF agent rejects a text slide. The video instead shows two rough wooden blocks grinding (Visual), accompanied by a harsh scraping sound (Auditory), alongside the voice-over.
    effect: >
      The brain instantly dual-codes the abstract concept with a visceral sensory experience, ensuring the concept is retained long after the video ends.

  - context: "CCP: V2WS - Live Coaching Call"
    application: >
      Instead of just telling the audience to "let go of anxiety" (Auditory), the coach instructs them to physically clench and release their fists (Kinesthetic) while showing a stark visual of a loosened knot on screen (Visual).
    effect: >
      The multisensory engagement bypasses intellectual resistance, anchoring the coaching concept deeply in the body.

  - context: "CCP: CCF - Worksheet Generation"
    application: >
      When generating a companion worksheet, the CCF agent ensures it requires the user to physically draw a diagram of their current business structure (Kinesthetic/Visual) rather than just typing text answers.
    effect: >
      The physical act of drawing forces the brain to process the spatial relationship of the problems, increasing the impact of the exercise.

  - context: "CCP: Telegram - The 3D Postcard"
    application: >
      A Sunday Postcard combines a high-contrast photo (Visual), a 15-second ambient audio track representing focus (Auditory), and text instructing the user to immediately touch a cold surface to ground themselves (Kinesthetic).
    effect: >
      The message breaks through the flat digital interface, creating a jarring, three-dimensional anchor in the user's physical reality.

anti_examples:
  - description: >
      A coach reads a 10-minute script verbatim while sitting perfectly still in front of
      a blank wall. There are no slides, no props, no shifts in vocal tone, and no
      instructions for the audience to write anything down.
    why_it_fails: >
      This relies 100% on the auditory channel. The audience's brain is starved for visual
      and kinesthetic input and will inevitably seek it elsewhere (by checking their phone
      or opening another tab), breaking engagement completely.

