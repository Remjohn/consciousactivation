schema: ../../schemas/component-rules.schema.json
schema_id: cmf.component.rules/v1
component_id: VOICE_OF_TRUTH
enabled: true
selection_priority:
  tier: premium
  rank: 11
enforcement:
  mode: allow_with_checks
  default_result: ALLOW
applies_to:
  containers:
    - SETUP
    - TURNING_POINT
  stages:
    - scene_builder
incompatibilities:
  - weak_source_authority
warn_conditions:
  - metric: source_credibility_score
    operator: lt
    value: 0.75
route_hints:
  select:
    - use_when_external_validation_solves_belief_gap
    - use_when_testimonial_assets_exist