schema: ../../schemas/subsystem-rules.schema.json
schema_id: cmf.subsystem.rules/v1
subsystem_id: CS-031
enabled: true
priority:
  tier: quality
  rank: 12
enforcement:
  mode: revise_on_fail
  default_result: REVISE
applies_to:
  containers:
    - HOOK
    - SETUP
    - CHALLENGE
    - TURNING_POINT
    - RESOLUTION
    - VISION
  stages:
    - scene_builder
evaluation_order:
  after:
    - CS-001
    - CS-002
    - CS-013
    - CS-025
warn_conditions:
  - metric: biological_fit_score
    operator: lt
    value: 0.8
route_hints:
  select:
    - closest_valid_scene_vehicle
    - novelty_preserving_alternative