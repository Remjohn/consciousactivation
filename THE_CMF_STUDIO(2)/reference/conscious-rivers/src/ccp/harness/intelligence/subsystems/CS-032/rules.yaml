schema: ../../schemas/subsystem-rules.schema.json
schema_id: cmf.subsystem.rules/v1
subsystem_id: CS-032
enabled: true
priority:
  tier: encoding
  rank: 4
enforcement:
  mode: revise_on_fail
  default_result: REVISE
applies_to:
  containers:
    - TURNING_POINT
    - RESOLUTION
    - VISION
  stages:
    - scene_builder
    - editor_regeneration
coordinates_with:
  - CS-008
block_conditions:
  - metric: preceding_cls
    operator: eq
    value: 4
    when:
      metric: pause_present
      operator: eq
      value: false
warn_conditions:
  - metric: candidate_pause_cls
    operator: gt
    value: 1
  - metric: dialogue_density
    operator: gt
    value: 0
route_hints:
  preferred_component:
    - THE_PAUSE
  corrective_moves:
    - insert_low_cls_container
    - strip_dialogue_from_pause
    - reduce_score_density