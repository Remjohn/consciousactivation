schema: ../../schemas/subsystem-rules.schema.json
schema_id: cmf.subsystem.rules/v1
subsystem_id: CS-022
enabled: true
priority:
  tier: quality
  rank: 3
enforcement:
  mode: revise_on_fail
  default_result: REVISE
applies_to:
  containers:
    - SETUP
    - CHALLENGE
    - TURNING_POINT
    - RESOLUTION
    - VISION
  stages:
    - scene_builder
    - editor_regeneration
    - manifest_assembly
warn_conditions:
  - metric: timing_offset_ms
    operator: outside_range
    value:
      min: -20
      max: 100
route_hints:
  correct:
    - retime_visual_event
    - retime_audio_event
    - refresh_caption_alignment