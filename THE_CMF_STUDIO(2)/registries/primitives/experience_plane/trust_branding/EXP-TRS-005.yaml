activation_conditions:
  - "User receives an AI Delivery Score below the acceptable threshold (e.g., < 70)"
  - "User breaks a streak or fails a challenge constraint"
  - "User aborts a core action (cancels recording, closes app mid-flow)"
  - "System experiences a technical error that disrupts the user's flow"

suppression_conditions:
  - "User just achieved a high score (do not offer 'redemption' for success)"
  - "User has failed the redemption round multiple times in a row (prevent endless frustration loops; pivot to a different task entirely)"

misuse_modes:
  - "Over-forgiveness — making the redemption round so easy that the initial failure loses all meaning, destroying the 'game' mechanics"
  - "Condescending forgiveness — using patronizing language ('Don't worry buddy, everyone makes mistakes!') instead of elite framing"

synergizes_with:
  - "EXP-TRS-002"  # Reflective Scoring (the failure is diagnosed using elite language)
  - "EXP-TRG-001"  # First Major Win-State (the redemption round is how they achieve the win-state)

conflicts_with:
  - "EXP-TRG-002"  # Urgent Optimism Hooks (if applied too aggressively during a failure state, it creates panic)

implementation_targets:
  frontend_components:
    - "ScoreRevealScreen — dynamically swap to 'Redemption Mode' UI if score < threshold"
    - "ErrorModals — rewrite all system error boundaries to use Ego Protection Protocol copy"
  backend_rules:
    - "state_machine: allow 'draft_saved' recovery flow if recording socket drops unexpectedly"
  telemetry_events:
    - "redemption_round_initiated"
    - "redemption_round_success_rate"
    - "churn_rate_after_score_below_70"
  experiments:
    - "A/B test: auto-triggering the redemption round vs requiring a button click to enter"

experience_metrics:
  entry_rate: 0.3
  react_rate: 0.5
  completion_rate: 0.8
  share_rate: 0.4
  comeback_rate: 0.9
  day7_retention: 0.9
  upgrade_signal: 0.6

crosswalk_id: "XW-BEHAV-FORGIVE"
crosswalk_note: >
  Meaning side: coordinates with PSY (Psychological Diagnostic) to correctly
  identify what went wrong in the user's thought process.
  Experience side: wraps that diagnosis in psychological safety so the user
  actually accepts the feedback and tries again.

notes: >
  This primitive is the safety net of the entire Coach OS. Voice recording
  is inherently vulnerable. If the platform feels like a ruthless judge,
  users will flee. The platform must feel like an elite but fiercely loyal
  mentor. When they fall, the system catches them immediately.
