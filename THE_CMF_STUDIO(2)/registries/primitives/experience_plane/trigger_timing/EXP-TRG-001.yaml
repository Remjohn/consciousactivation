summary: >
  External to Internal Trigger Mapping governs the transition from relying
  on system-generated push notifications (external triggers) to relying on
  the user's own emotional states (internal triggers) to prompt app usage.
  In CCP, we must design the product so that after repeated external prompting
  by the Telegram bot, the act of recording a reaction becomes mentally associated
  with the relief of a specific negative valence emotion (like boredom, anxiety
  before a big speech, or the desire for validation).

core_move: >
  Systematically pair external notifications with moments where the user is likely
  experiencing a specific internal emotional pain point, until the external prompt
  is no longer needed.

why_it_works: >
  Nir Eyal's Hook Model reveals that products only become habits when they attach
  to an internal trigger, which is almost always a negative valence emotion
  (uncertainty, boredom, loneliness). External triggers (like push notifications)
  are necessary early on, but if they don't solve an emotional itch, they become
  annoying. By timing external Telegram prompts exactly when the coach is feeling
  isolated or uncertain about their authority, the act of recording a Conscious
  Reaction becomes the neurological salve for that uncertainty. Over time, the
  emotion alone triggers the desire to record.

examples:
  - context: "BOOK: Hooked - Instagram's internal trigger"
    application: >
      Instagram initially used external triggers like email and push notifications
      to bring users back. But they explicitly paired the core action (taking a photo)
      with the internal trigger of 'fear of losing a memory' or 'boredom'. Eventually,
      whenever users felt bored, they instinctively opened the app without needing a notification.
    effect: >
      Achieved true habit-forming daily active usage (DAU) by anchoring to an internal state.

  - context: "CCP: Conscious Reactions Topic Drop"
    application: >
      A high-charge industry debate topic is pushed via Telegram (external trigger)
      at 4:00 PM, a time when coaches typically experience end-of-day boredom or anxiety
      about their pipeline. The prompt offers a chance to assert authority (relieving the anxiety).
    effect: >
      The coach associates the relief of taking a stance with the CCP Mini App.

  - context: "CCP: Law28 Morning Drill Push"
    application: >
      The daily Law28 drill notification explicitly names the internal fear:
      'Are you hedging today? Record a 60-second baseline to prove your conviction.'
      It attaches the external trigger to the internal anxiety of impostor syndrome.
    effect: >
      The coach uses the morning recording as an emotional grounding ritual.

  - context: "CCP: Post-Webinar Recovery Trigger"
    application: >
      Following the conclusion of a V2WS webinar, the system sends an external trigger
      asking for a voice note reflection. The internal trigger here is post-performance
      adrenaline and the need for processing/validation.
    effect: >
      The user relies on the CCP bot as an emotional processing tool after high-stakes events.

  - context: "CCP: Silent Referral Jury Vote"
    application: >
      A peer receives an external trigger (a link to vote on a debate). The internal
      trigger is the fear of missing out on a tribal industry conversation or the desire
      to support a friend.
    effect: >
      The user enters the Free Proof layer naturally to satisfy social curiosity.

anti_examples:
  - description: >
      Sending generic 'Don't forget to practice today!' push notifications at random
      times that have no relationship to the coach's emotional state.
    why_it_fails: >
      It functions purely as a nagging external trigger without addressing an internal itch.
      The user quickly develops notification blindness and never forms the habit loop.

