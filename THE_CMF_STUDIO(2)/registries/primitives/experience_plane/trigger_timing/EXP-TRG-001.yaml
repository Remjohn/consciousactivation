crosswalk_note: >
  Directly impacts the Daily Active Usage (DAU) metrics by converting
  borrowed attention (notifications) into owned attention (habit).

notes: >
  This primitive is the foundation of turning CCP from a 'tool' into a 'habit'.
  We must rigorously track the ratio of externally-prompted sessions vs.
  spontaneous sessions to measure the successful installation of the internal trigger.
