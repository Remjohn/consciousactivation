    - "Chapter 8: Mobility and Connectivity"
  key_pages: "89-102, 205-215"
  book_path: "lab/Public Speeaking Coaching/09_Experience_Engineering/Persuasive Technology - BJ Fogg.md"

summary: >
  Tailoring & Suggestion dictates that interventions are exponentially more
  effective when the system curates its prompts based on the user's specific
  telemetry, rather than generic advice. In CCP, the Guardian Agent and the
  scoring pipelines do not give broad 'public speaking tips.' They intervene
  with precise, tailored suggestions based on the exact biometric or semantic
  failure just recorded, providing relevant scaffolding exactly when needed.

core_move: >
  Use real-time biometric and semantic telemetry to tailor all feedback and
  prompts, completely eliminating generic 'best practice' notifications.

why_it_works: >
  BJ Fogg notes that computing technology is uniquely persuasive because it
  can tailor its message to the individual dynamically (unlike a book or a static
  video). When a system suggests a highly specific correction based on observed
  behavior, it acts as a 'Social Actor' demonstrating empathy and attention.
  Generic advice is ignored; tailored suggestion feels like a high-end coach
  who is actively listening, dramatically increasing compliance and trust.

examples:
  - context: "BOOK: Persuasive Technology - Heart rate monitor feedback"
    application: >
      A fitness device doesn't just say 'run faster.' It monitors heart rate
      telemetry and suggests 'Push your pace for 30 seconds to hit your target zone.'
      The suggestion is tailored to real-time biological data.
    effect: >
      The user obeys the prompt because they know it is based on their immediate state.

  - context: "CCP: Guardian Agent Pause Architecture Feedback"
    application: >
      A coach records a reaction. The NIM stack detects they are using 'um' and 'like'
      to fill space. The Guardian Agent intercepts: 'Your argument is strong, but you
      used 12 filler words. Suggestion: Breathe instead of speaking when transitioning.
      Try the Redemption Round.'
    effect: >
      The feedback is irrefutable and hyper-tailored, creating high trust in the system's intelligence.

  - context: "CCP: Law28 Adaptive Track Routing"
    application: >
      If a user's conviction score drops for three consecutive days, the system doesn't
      push the next aggressive challenge. It tailors the prompt: 'You seem fatigued.
      Today is a Recovery Day. Just record a 30-second low-stakes reflection.'
    effect: >
      The system acts as an empathetic coach, adjusting the load based on performance telemetry.

  - context: "CCP: Topic Tailoring via SCRE"
    application: >
      The Sovereign CRAL Research Engine knows a coach is a B2B SaaS founder. It suppresses
      generic pop-culture debate topics and exclusively pushes high-charge topics regarding
      SaaS market conditions.
    effect: >
      The triggers are highly relevant to the coach's identity, increasing the likelihood of action.

  - context: "CCP: Voice DNA Evolution Prompt"
    application: >
      The Sunday Postcard notes: 'Your pacing variance increased by 18% this week, making
      you sound significantly less robotic. Keep leaning into the pregnant pause.'
    effect: >
      The summary provides tailored proof of change, deeply cementing platform loyalty.

anti_examples:
  - description: >
      Sending an automated 'Tip of the Day: Remember to make eye contact!' to a coach
      who just completed an audio-only reaction via Telegram.
    why_it_fails: >
      The suggestion is generic, untailored, and contextually irrelevant. It breaks the
      illusion of the system as a conscious, observant coach, reducing it to a dumb bot.

