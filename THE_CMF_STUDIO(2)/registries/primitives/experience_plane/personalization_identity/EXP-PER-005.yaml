book_reference:
  title: "Beyond Belief"
  author: "Nir Eyal"
  chapters:
    - "Identity Limits"
    - "The Power of Yet"
  key_pages: "112-130"
  book_path: "lab/Public Speeaking Coaching/09_Experience_Engineering/Beyond Belief.md"

summary: >
  Identity De-Labeling dictates that a system must never assign a static, negative label to a
  user based on their failure state (e.g., 'Beginner,' 'Struggling,' 'Poor Pacing'). When users
  internalize a negative label, it calcifies into a limiting belief, and they abandon the platform
  to escape the negative self-image. Instead, the system must use dynamic, growth-oriented verbs
  (e.g., 'Building Pacing Mastery,' 'Unlocking Audience Resonance') to reframe their current state
  as a temporary phase on a guaranteed upward trajectory.

core_move: >
  Whenever the user's performance metrics are low, aggressively scrub the UI of any static nouns
  or red-colored failure states. Replace them with active verbs that describe the skill they are
  currently 'building' or 'forging', reinforcing a growth identity.

why_it_works: >
  Nir Eyal explores how identity labels act as self-fulfilling prophecies. If a system labels a user
  as 'bad' at something, the user's brain seeks to avoid the cognitive dissonance of trying and
  failing again, leading to immediate churn. By 'De-Labeling' the user and focusing exclusively
  on the *action* of growth, the system prevents the failure from becoming an identity. The user
  is not 'a bad speaker'; they are a coach 'currently forging their delivery skills.' This subtle
  linguistic shift preserves psychological safety and keeps them engaged in the loop.

examples:
  - context: "BOOK: The psychology of limiting beliefs"
    application: >
      Eyal describes experiments where reframing a difficulty from 'I am bad at math' (static identity)
      to 'I am learning math' (dynamic action) drastically increases persistence in students facing
      difficult problems.
    effect: >
      The emotional weight of the failure is lifted from the ego, allowing the user to remain engaged
      with the friction.

  - context: "CCP: AI Delivery Score Breakdown"
    application: >
      A coach records a reaction and receives a terrible score for 'Semantic Resonance.' The UI does
      not label their resonance as 'Weak' or display it in red. Instead, it displays the metric in
      blue with the label: 'Current Focus: Forging Semantic Resonance.'
    effect: >
      The coach does not feel insulted by the machine. The low score is framed not as a permanent
      flaw, but as their immediate quest objective, turning failure into a gameplay directive.

  - context: "CCP: CPSC Gamified Leaderboards"
    application: >
      Users at the bottom of the engagement leaderboard are not placed in a 'Bronze Tier' or 'Novice'
      category (which carries low-status stigma). They are placed in the 'Ascension Phase.'
    effect: >
      Even users at the very bottom of the hierarchy feel a sense of momentum and status because
      their identity is defined by upward movement rather than current static position.

  - context: "CCP: CBCS Weekly Accountability"
    application: >
      A user misses their content quota for the week. The agent does not say, 'You are falling behind.'
      It says, 'You are in a strategic consolidation phase. Let's build momentum for next week.'
    effect: >
      The system de-labels the 'laziness' or 'failure' and reframes it as a necessary rest period,
      preventing the user from feeling a shame spiral that would cause them to ignore the app entirely.

  - context: "CCP: Conscious Reactions (Jury Feedback)"
    application: >
      When the Jury provides feedback, they cannot select tags like 'Boring' or 'Rambling.' The
      system only provides 'Growth Tags' like 'Needs Tighter Core' or 'Ready for Higher Energy.'
    effect: >
      The feedback loop remains entirely constructive. The identity of the creator is protected
      from toxic labeling by the community.

anti_examples:
  - description: >
      A gamified learning app places users who score poorly into a tier literally called 'The Minor
      Leagues' or 'Beginners,' and forces them to wear a grey, unimpressive badge on their profile
      until they 'prove themselves.'
    why_it_fails: >
      This uses identity as a punishment. High-ticket, professional coaches have massive real-world
      status. If a software platform strips them of that status and labels them a 'Beginner,' they
      will instantly uninstall the app to protect their ego.

