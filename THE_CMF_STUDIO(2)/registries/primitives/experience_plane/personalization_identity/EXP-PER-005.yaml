crosswalk_id: "XW-IDENTITY-DELABELING"
crosswalk_note: >
  Meaning side: governs the linguistic tone of the CBCS accountability engine.
  Experience side: governs the visual and textual presentation of failure states in the UI.

notes: >
  This primitive is critical for high-ticket demographics. Elite professionals are hyper-sensitive
  to status threats. If the software insults them, they leave. De-labeling ensures the software
  acts as a supportive mentor rather than a judgmental critic.
