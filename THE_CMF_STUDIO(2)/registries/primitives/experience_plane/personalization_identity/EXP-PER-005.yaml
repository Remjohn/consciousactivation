activation_conditions:
  - "The user has just received a low score or failed a milestone challenge."
  - "The user is in the bottom quartile of a leaderboard or performance metric."
  - "The user has been inactive and is returning to the platform."

suppression_conditions:
  - "The user has achieved an elite score, where 'static' labels (like 'Master' or 'Sovereign') are highly desirable and should be awarded."
  - "The user explicitly requests raw, unfiltered data for self-analysis (though this should be rare in the standard UX)."

misuse_modes:
  - "Toxic Positivity — Reframing failure so aggressively that the user thinks they actually succeeded, destroying the integrity of the feedback loop."
  - "Confusing Vocabulary — Using overly complex 'growth' verbs that mask the actual metric the user needs to improve."
  - "Patronizing Tone — Using childish language (e.g., 'You're a growing little seed!') that insults a professional coach's intelligence."

synergizes_with:
  - "EXP-SAF-001" # White Hat Recovery (De-labeling is the linguistic mechanism of recovery)
  - "EXP-FBK-001" # RIM Feedback Discipline (Feedback must be constructive, not labeling)

conflicts_with:
  - "EXP-TRB-001" # Tribal Status Indicators (If the status indicators rely on shaming the bottom tier)

implementation_targets:
  frontend_components:
    - "ScoreDisplay — map all scores below 60/100 to 'Forging' or 'Building' string templates instead of 'Poor' or 'Weak'"
    - "LeaderboardUI — replace bottom-tier section headers with 'Ascension Phase'"
  backend_rules:
    - "copy_engine: ban lists must include words like [poor, weak, bad, failing, beginner, novice]"
    - "state_manager: trigger `recovery_mode` copy patterns when `score_delta < 0`"
  telemetry_events:
    - "delabeling_reframe_displayed"
    - "user_continued_after_low_score"
    - "user_churned_after_low_score"
  experiments:
    - "A/B test: 'Forging Pacing' vs 'Building Pacing' on the score card for low scores."

