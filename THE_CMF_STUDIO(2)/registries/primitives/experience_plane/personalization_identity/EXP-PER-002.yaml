crosswalk_id: "XW-ALTER-EGO"
crosswalk_note: >
  Meaning side: governs the Archetype extraction in the Content Factory.
  Experience side: governs the onboarding UI and how the user self-selects their protective identity.

notes: >
  This primitive is the antidote to 'Stage Fright.' By asking 'Who are you being right now?'
  instead of 'Why are you nervous?', we give the user a gamified escape hatch from their
  own anxiety.
