summary: >
  Adopt a Secret Identity dictates that when users face an intimidating task (like public speaking
  or confronting industry dogma), asking them to perform as 'themselves' triggers immense psychological
  friction and imposter syndrome. By allowing the user to adopt a heroic or expert persona (an Alter-Ego),
  the system provides psychological distance. This 'Self-Distancing' allows the user to act with
  more confidence, resilience, and creativity than they could summon on their own.

core_move: >
  During high-anxiety onboarding or before the first recording, explicitly prompt the user to
  choose an 'Expert Persona' or 'Heroic Archetype'. Address them by this identity throughout
  the experience to decouple their performance from their personal insecurities.

why_it_works: >
  Jane McGonigal explains that adopting a secret identity utilizes the psychological mechanism of
  'Self-Distancing.' When a user steps into a persona, they temporarily suspend their own limiting
  beliefs. The failure or success of the performance no longer reflects directly on their ego; it
  reflects on the persona. This radically reduces performance anxiety and increases pain tolerance.
  By gamifying the identity, the user borrows the courage associated with the archetype (e.g., 'The
  Sovereign' is not afraid of the jury, even if the user is).

examples:
  - context: "BOOK: Self-distancing in pain management and goal achievement"
    application: >
      McGonigal details how patients recovering from severe injuries adopt heroic identities
      (like a comic book hero). When physical therapy gets painful, they ask, 'What would my hero
      do?' instead of 'What do I want to do?'
    effect: >
      This cognitive shift bypasses the brain's default avoidance mechanisms, allowing the person
      to endure greater friction and achieve higher performance.

  - context: "CCP: Conscious Reactions Onboarding (The First Reaction)"
    application: >
      Before recording their very first topic brief, the user is hesitant. The Telegram bot
      intervenes: 'Before we start, who is stepping into the booth today? Are you the Provocateur,
      the Sage, or the Alchemist?' The user taps 'The Provocateur.'
    effect: >
      The user now has permission to be bold. If their delivery is aggressive or unconventional,
      it's because 'The Provocateur' demands it, shielding their fragile real-world ego from the
      vulnerability of the camera.

  - context: "CCP: CBCS Accountability Engine (Law 28)"
    application: >
      A coach fails their weekly content quota. Instead of sending a guilt-inducing message to
      'John,' the system addresses the persona: 'The Sovereign does not abdicate the throne.
      Reclaim your schedule.'
    effect: >
      The message shifts from a personal reprimand (which causes shame and churn) to an identity
      challenge (which causes motivation and Fiero). The user wants to live up to the label.

  - context: "CCP: CPSC Community Leaderboards (Church Vertical)"
    application: >
      In a community debate environment, users are assigned 'Jury Titles' based on their historical
      voting accuracy (e.g., 'Master Arbiter', 'The Skeptic').
    effect: >
      When users leave comments or vote, they are performing their role. This structured identity
      encourages deeper participation than if they were just 'user_123' leaving a generic reply.

  - context: "CCP: V2WS Webinar Pre-Flight Screen"
    application: >
      Right before the coach goes live for a high-ticket webinar, the UI displays a fullscreen
      'Persona Lock-In' screen. It prompts them to read one sentence out loud: 'I am the Architect.
      I build reality for my clients.'
    effect: >
      This ritualistic adoption of the secret identity instantly alters their posture and vocal
      resonance, spiking their Delivery Score just before the highest-stakes moment.

anti_examples:
  - description: >
      The system forces the user to upload a government ID and use their legal name exactly as
      it appears on their bank account to participate in a low-stakes debate, emphasizing 'total
      transparency.'
    why_it_fails: >
      This completely strips away the protective layer of the game world. It maximizes real-world
      anxiety, triggering the 'cancel culture' fear response, and absolutely crushes participation
      rates. There is no psychological safety.

