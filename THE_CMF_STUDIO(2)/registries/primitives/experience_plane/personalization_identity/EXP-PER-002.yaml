activation_conditions:
  - "User is facing a high-anxiety task for the first time (e.g., first camera recording)."
  - "User has recently failed a task and is in danger of churning due to shame."
  - "The system is initiating the onboarding sequence."

suppression_conditions:
  - "The user is engaged in a highly technical, objective billing or legal configuration where fantasy identities would cause confusion."
  - "The user has already deeply locked into their persona and asking them to 'choose' again would break the immersion."

misuse_modes:
  - "Childish Framing — Framing the secret identity like a cartoon character, violating the premium 'Coach OS' aesthetic and alienating high-ticket professionals."
  - "Identity Overload — Giving the user 50 different micro-titles to manage, causing cognitive fatigue instead of cognitive relief."
  - "Forced Roleplay — Requiring the user to speak in an artificial accent or completely unnatural cadence to 'match' the persona, ruining the authenticity of the output."

synergizes_with:
  - "EXP-SAF-001" # White Hat Recovery (The persona takes the hit for the failure)
  - "EXP-TRG-001" # First Major Win-State (The win validates the chosen identity)

conflicts_with:
  - "EXP-SOC-002" # Real-World Reputation Stakes (If the identity is completely anonymous and disconnected from real stakes)

implementation_targets:
  frontend_components:
    - "ArchetypeSelectorScreen — rich, visual selection UI during onboarding"
    - "UserHeader — permanently display the chosen Archetype title next to the user's name"
  backend_rules:
    - "user_profile_db: require `archetype_id` before unlocking the recording endpoints"
    - "agent_routing: pass `archetype_id` into LLM prompts for Telegram bot responses"
  telemetry_events:
    - "persona_selected"
    - "persona_changed"
    - "first_recording_completed_with_persona"
  experiments:
    - "A/B test: 'Choose your Persona' vs 'Discover your Archetype' copy in onboarding."

