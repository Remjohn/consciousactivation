activation_conditions:
  - "The system is designing or deploying a new badge, progression system, or reward."
  - "The user has just completed an action that directly improves their real-world competence."
  - "The system is prompting the user to share content or invite peers."

suppression_conditions:
  - "The action is purely administrative (e.g., updating a credit card, filling out a form) where 'gamification' feels patronizing."

misuse_modes:
  - "Company-Centric Framing — Telling the user 'Do this to help us grow!' instead of 'Do this to increase your influence.'"
  - "Meaningless Points — Awarding 10 points for clicking a button, diluting the value of the entire reward economy."
  - "Bait and Switch — Promising a reward that helps the user's mastery, but delivering a reward that only benefits the platform (like a mandatory share-to-unlock)."

synergizes_with:
  - "EXP-SOC-001" # Social Treasures (The shared goal relies on social validation)
  - "EXP-FBK-001" # RIM Feedback Discipline (Feedback is the currency of the shared goal)

conflicts_with:
  - "EXP-TRG-002" # Aggressive Urgency Triggers (If they are deployed manipulatively rather than for the user's benefit)

implementation_targets:
  frontend_components:
    - "BadgeGallery — ensure all UI copy for badges references real-world mastery ('Acoustic Sovereign'), not platform usage ('5-Day Streak')"
    - "SharePromptOverlay — frame all CTAs as player-empowerment ('Validate your stance') rather than business growth ('Invite a friend')"
  backend_rules:
    - "progression_engine: tie `xp_granted` strictly to `delivery_score_delta` or `challenge_completion`, never to `app_opens`"
  telemetry_events:
    - "mastery_badge_earned"
    - "mastery_badge_shared"
    - "player_centric_referral_sent"
  experiments:
    - "A/B test: 'Invite a peer to judge you' (Player Centric) vs 'Invite a peer to join CCP' (Business Centric) copy on share buttons."

