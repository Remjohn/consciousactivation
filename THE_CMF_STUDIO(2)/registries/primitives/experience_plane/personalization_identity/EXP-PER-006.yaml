crosswalk_id: "XW-SHARED-GOAL"
crosswalk_note: >
  Meaning side: governs the underlying philosophy of the content being generated (it must serve the coach's authority).
  Experience side: governs the entire reward economy and progression logic of the platform.

notes: >
  This primitive (scoring 196) is the foundational ethical and operational rule for all gamification
  in the Conscious Coaching Platform. If we ever violate it, we lose the 'Premium' positioning
  and descend into the realm of cheap, addictive social media slop.
