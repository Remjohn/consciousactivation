summary: >
  Motivation Triangle UI dictates that every Call-to-Action (CTA) or challenge
  prompt in the system must explicitly satisfy all three sides of the motivation
  triangle: Behavior (what to do), Benefit (why it matters), and Belief (the
  conviction that the user can actually succeed). Standard gamification often
  forgets 'Belief'. In CCP, we do not just say 'Record a 60-second debate take
  to earn 50 points'. We explicitly inject belief: 'Record a 60-second debate
  take. Coaches with your vocal profile typically score in the top 10% on this
  topic. You have what it takes.'

core_move: >
  Rewrite every major task prompt to explicitly include a 'Belief Injector'—a
  sentence or data point that proves to the user that success is not just
  possible, but highly probable for someone with their specific identity.

why_it_works: >
  Nir Eyal posits that motivation collapses instantly if the 'Belief' side of
  the triangle is missing. A coach knows *what* to do (Behavior) and *why* it
  is good for their business (Benefit), but if their inner critic tells them
  'I am a terrible public speaker and I will humiliate myself' (Lack of Belief),
  they will bounce. By structurally forcing the UI to inject Belief—using local
  social proof, their own past data, or empathetic coaching language—we
  neutralize the inner critic right before the moment of highest friction.

examples:
  - context: "BOOK: Beyond Belief - The Voter Turnout Experiment"
    application: >
      Telling people 'Voting is important' (Benefit) doesn't work. Telling them
      'People in your neighborhood with your demographic are voting in record
      numbers' injects the Belief that 'people like me do this successfully.'
      Turnout skyrockets.
    effect: >
      Identity-driven belief overcomes behavioral apathy.

  - context: "CCP: The Day 1 Challenge Prompt"
    application: >
      Instead of: 'Day 1: Record your baseline to start.'
      We use the Triangle: 'Record your baseline (Behavior) to unlock your Voice
      DNA (Benefit). 95% of coaches feel anxious on Day 1, but your raw intuition
      is enough to pass. Just speak (Belief).'
    effect: >
      The user feels seen, safe, and capable.

  - context: "CCP: The Debate Counter-Take"
    application: >
      'Record a rebuttal (Behavior) to win back the Jury (Benefit). I analyzed
      your past Takes; your Conviction Density is 15% higher than your opponent's.
      You can win this (Belief).'
    effect: >
      Transforms intimidation into aggressive, confident participation.

  - context: "CCP: V2WS Webinar Launch"
    application: >
      Before going live: 'Start the broadcast (Behavior) to pitch the cohort
      (Benefit). You have successfully run this exact sequence in the sandbox 4
      times flawlessly. You are ready (Belief).'
    effect: >
      Uses the user's own historical data to manufacture unshakeable self-belief.

  - context: "CCP: Redemption Round Offer"
    application: >
      'Try again without the timer (Behavior) to save your streak (Benefit). You
      already nailed the hardest part: the hook. This takes is going to be easy
      (Belief).'
    effect: >
      Removes the hopelessness of the previous failure.

anti_examples:
  - description: >
      A sterile push notification that simply says: 'Daily Drill Available. Click
      here to complete.'
    why_it_fails: >
      It relies entirely on the user's pre-existing willpower. It provides no
      Benefit and zero Belief. If the user is tired or anxious, they will ignore it.

