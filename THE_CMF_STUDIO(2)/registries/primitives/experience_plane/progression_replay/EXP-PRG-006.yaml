activation_conditions:
  - "User is presented with a high-friction or high-anxiety task (recording audio, entering a debate)"
  - "User is receiving a push notification designed to trigger re-entry"

suppression_conditions:
  - "User is performing a completely mindless, frictionless task (e.g., swiping a menu); don't over-engineer simple clicks."

misuse_modes:
  - "Fake Data — telling them 'your profile shows you will win' when they literally just created the account 5 seconds ago."
  - "Patronizing Tone — making the Belief injection sound like a kindergarten teacher rather than a high-end executive coach."

synergizes_with:
  - "EXP-SOC-003" # Identity-Driven Social Proof (The strongest way to inject Belief is to show that 'people like me' succeed)
  - "EXP-SAF-006" # The Richter Rescue (The rescue is essentially a massive Belief injection)

conflicts_with:
  - "None. All high-friction prompts require this."

implementation_targets:
  frontend_components:
    - "DynamicPromptCard — UI component with three distinct typographic layers mapping to Behavior, Benefit, and Belief"
  backend_rules:
    - "prompt_engine: ensure every generated LLM prompt payload contains a `belief_injection_string` derived from the user's CA-1 history"
  telemetry_events:
    - "belief_injected_prompt_viewed"
    - "conversion_post_belief_injection"
  experiments:
    - "A/B test: Injecting Belief via past data ('You scored 80 last time') vs social proof ('Other SaaS founders score 80 on this')"

