misuse_modes:
  - "Lying to the User — promising the software will auto-tune their voice to sound like Morgan Freeman, which breaks trust when they hear the playback."
  - "Excessive Wait Times — artificially extending a 1-second load time into a 10-second 'theatrical' load time just to show off animations."

