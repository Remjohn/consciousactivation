activation_conditions:
  - "User is about to enter a highly constrained interaction (time, format, rules)"
  - "User has just failed a constraint and is viewing the failure state"

suppression_conditions:
  - "User is performing a completely unconstrained action (don't invent stress to reframe)"

misuse_modes:
  - "Condescending Jargon — using so much 'neuro-babble' that the user realizes they are being manipulated and loses trust."
  - "Reframing a literal bug — if the app crashes, don't say 'The universe is testing your patience.' Apologize and fix it."

