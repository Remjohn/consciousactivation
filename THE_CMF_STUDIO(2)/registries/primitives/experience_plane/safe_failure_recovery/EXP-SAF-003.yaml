summary: >
  Hypnosedation Reframing dictates that the UI and copywriting must actively
  alter the user's perception of painful constraints (like a harsh timer or a
  strict anti-hedging rule). Instead of presenting the constraint as a
  punishment or a hurdle that induces anxiety, the platform explicitly frames
  the constraint as a "Flow State Activator" designed to silence their inner
  critic. In CCP, the 60-second timer isn't there to rush them; it's there
  to force raw intuition, making the failure of the constraint feel like an
  experiment rather than a personal defeat.

core_move: >
  Use explicit UI copy to reframe necessary friction, rules, and constraints
  as psychological tools designed to help the user, completely avoiding
  punitive or bureaucratic language.

why_it_works: >
  Nir Eyal (Beyond Belief) and Jane McGonigal both point to studies where
  perception alters reality. In clinical hypnosedation, patients feel no pain
  during surgery because their attention is entirely redirected. When a coach
  sees a 60-second timer, their default belief is: "I am going to run out of
  time and fail." This spikes cortisol and ruins their pacing. If the UI says:
  "This 60-second constraint is designed to bypass your pre-frontal cortex so
  your true authority can emerge," their belief shifts. The pain of the constraint
  is "hypnosedated." When they inevitably fail the timer, they don't blame
  themselves; they just accept they haven't hit flow state yet.

examples:
  - context: "BOOK: Reality Is Broken - Snow World VR"
    application: >
      Burn victims experience excruciating pain during wound care. By playing
      'Snow World' in VR during the procedure, their attention is so captivated
      by the game that their brains literally process significantly less pain.
    effect: >
      The objective reality (wound care) remains the same, but the subjective
      experience (suffering) drops drastically.

  - context: "CCP: The 60-Second Reaction Timer"
    application: >
      Instead of the UI saying, 'WARNING: You only have 60 seconds.' It says:
      'Wormhole to Flow State: You have exactly 60 seconds to speak before your
      inner critic can intervene. Trust your gut. Go.'
    effect: >
      The constraint becomes an exciting psychological tool rather than a stressful threat.

  - context: "CCP: Anti-Hedging Failure"
    application: >
      If a user fails because they used 5 filler words, the failure screen doesn't
      say: 'Failed: Too many filler words.' It says: 'Your brain is trying to
      protect you by softening your stance. Strip the armor. Try again.'
    effect: >
      Reframes the failure as a natural psychological defense mechanism, rather than
      a lack of speaking skill.

  - context: "CCP: Jury Rejection Reframing"
    application: >
      If a user's take is voted down by the jury, the screen says: 'You found the
      friction point. A unanimous jury means you said something boring. A divided
      jury means you are leading.'
    effect: >
      Reframes social rejection as evidence of thought leadership.

  - context: "CCP: The Daily Streak Constraint"
    application: >
      'You must record daily' is reframed as 'We are building the neuro-pathway
      for spontaneous authority. Every day reinforces the myelin sheath. Miss a
      day, the sheath weakens.'
    effect: >
      The chore becomes a biological imperative.

anti_examples:
  - description: >
      A red popup that says 'Error: You exceeded the maximum allowed time of 60
      seconds. Your recording has been deleted. Obey the time limit.'
    why_it_fails: >
      This is bureaucratic, punitive, and completely breaks the psychological
      safety of the environment. The user feels treated like a child and will
      resent the software.

