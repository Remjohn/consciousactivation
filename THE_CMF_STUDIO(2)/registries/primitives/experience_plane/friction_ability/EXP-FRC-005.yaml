summary: >
  Ritualized Agency takes a counter-intuitive approach to friction: instead of
  making every single action a mindless tap, it transforms the *most important*
  commitments (like locking in a final audio submission) into deliberate, physical
  'Rituals'. This slight increase in physical friction generates psychological
  agency and ownership, transitioning the user from a passive scroller to an active
  creator.

core_move: >
  Transform mundane functional taps (e.g., 'Submit') into deliberate, physical
  'Commitment Swipes' or 'Hold-to-Lock' gestures that generate agency rather
  than passivity.

why_it_works: >
  Nir Eyal points out that rituals create anticipation and belief. If submitting a
  high-stakes debate take is just a mindless 10-millisecond screen tap, it feels
  cheap and disposable. The user doesn't feel committed. By adding a tiny,
  deliberate piece of physical friction (a smooth, haptic 'Swipe to Submit' bar),
  we force the user's brain to consciously register: 'I have made a decision. I own
  this.' This generates agency, which dramatically lowers the *psychological* friction
  (anxiety/doubt) of participating in the community.

examples:
  - context: "BOOK: Beyond Belief - The Coffee Ritual"
    application: >
      People report that coffee tastes better when they grind the beans and pour
      it themselves compared to pushing a button on an automatic machine. The
      physical ritual of preparation generates a placebo of higher quality and ownership.
    effect: >
      The slight friction creates a perception of premium value.

  - context: "CCP: The 'Hold to Record' Lock"
    application: >
      To record a short take, the user doesn't just tap. They press and hold.
      They physically feel the action. To lock it, they must deliberately swipe up.
    effect: >
      The tactile feedback creates a ritual of 'taking the floor', generating confidence.

  - context: "CCP: The Commitment Swipe for Law28"
    application: >
      When opting into the grueling 28-Day Challenge, there is no 'I Agree' checkbox.
      There is a full-width slider that says: 'Swipe right to commit to 28 days
      of zero excuses.'
    effect: >
      Transforms a passive Terms of Service click into an active, identity-shifting vow.

  - context: "CCP: The Final Jury Vote"
    application: >
      When crowning the winner of a 'Debate Showdown', the Jury doesn't tap a tiny radio
      button. They drag the crown icon onto the avatar of the winner.
    effect: >
      Makes the act of voting feel weighty, physical, and socially meaningful.

  - context: "CCP: Erasing a Failed Take"
    application: >
      During a Redemption Round, to delete their bad audio, they must physically 'scrub'
      it off the screen (swiping it away violently).
    effect: >
      A physical ritual of catharsis that clears the psychological slate for the next take.

anti_examples:
  - description: >
      A user finishes a highly emotional, 3-minute thesis defense. The system just
      auto-submits it the millisecond they stop talking, without giving them a chance
      to review or explicitly 'send' it.
    why_it_fails: >
      The user experiences a massive spike in anxiety ('Wait, was that good? Did it
      send?'). The lack of a submission ritual steals their agency, making them feel
      out of control of their own image, increasing future friction.

