activation_conditions:
  - "User is performing a high-stakes action (submitting audio, voting on a winner, buying a subscription)"
  - "User needs to feel a sense of ownership over a decision"

suppression_conditions:
  - "User is performing a completely trivial, repetitive action (e.g., dismissing a tooltip). Do not add rituals to trash tasks."

misuse_modes:
  - "Friction for Friction's Sake — making a user solve a puzzle or swipe 4 times just to navigate the menu, mistaking annoyance for 'ritual'."
  - "Inconsistent Patterns — using a swipe for 'Submit' on one screen, but a tap for 'Submit' on the next, confusing the muscle memory."

synergizes_with:
