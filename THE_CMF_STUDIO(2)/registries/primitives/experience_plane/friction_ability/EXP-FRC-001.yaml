summary: >
  Evolved UI + Glowing Choice dictates that an interface must be brutally simplified
  to remove all cognitive load, highlighting exactly one undeniable action. It
  leverages Krug's 'billboard scanning' and Chou's 'Glowing Choice' to ensure the
  user never has to pause to figure out what to do next.

core_move: >
  Eliminate visual noise, delete all instructional "happy talk," and highlight the
  single most important next action with a massive, unambiguous visual cue (the
  Glowing Choice) to ensure zero-thought progression.

why_it_works: >
  Steve Krug's 'Don't Make Me Think' law establishes that any cognitive effort spent
  deciphering an interface drains the user's goodwill. By minimizing text (omitting
  needless words) and creating a dominant visual hierarchy (the Glowing Choice), we
  cater to the user's natural instinct to 'satisfice'—they will instantly click the
  first reasonable option rather than reading a manual, reducing cognitive friction
  to zero.

examples:
  - context: "BOOK: Don't Make Me Think - The Omit Needless Words Law"
    application: >
      A website had a 3-paragraph welcome message explaining how to use a search bar.
      Krug advised deleting all of it, leaving only the search bar and a massive
      'Search' button.
    effect: >
      Users found the tool instantly because cognitive load was eliminated.

  - context: "CCP: The Conscious Reactions Mini App Entry"
    application: >
      When a coach clicks a Telegram link for a 'Reaction Duel', there are no onboarding
      sliders or instructions. The screen shows the topic image and a massive, glowing
      red 'Hold to Record' button.
    effect: >
      The coach moves from clicking the link to recording audio in under 1 second.

  - context: "CCP: The Satisficing Vote"
    application: >
      Before asking a new user to record a complex audio take, the UI presents a simple,
      binary 'Agree/Disagree' swipe slider. It is the only interactive element on the screen.
    effect: >
      Provides a mindless, low-friction entry point that hooks them into the loop.

  - context: "CCP: V2WS Presenter Dashboard"
    application: >
      During a live automated webinar, the coach's UI does not have 15 different analytics
      toggles. It has one glowing prompt that says 'Deploy Pitch Now' when the AI detects
      peak audience retention.
    effect: >
      Preserves the coach's mental bandwidth for their vocal delivery, not software operation.

  - context: "CCP: Silent Referral Prompt"
    application: >
      After a 95/100 Delivery Score, the success screen features a single pulsing button
      that says 'Challenge a Peer'. No settings, no secondary options.
    effect: >
      Capitalizes on the dopamine hit by providing a frictionless, single-click referral path.

anti_examples:
  - description: >
      A new user opens the Mini App and sees a 'Welcome' paragraph, a tutorial video,
      a settings gear icon, and four equally sized buttons for different debate modes.
    why_it_fails: >
      Complete violation of Krug's law. The user is forced to think, analyze, and
      choose. Their cognitive load spikes, friction overwhelms them, and they bounce.

