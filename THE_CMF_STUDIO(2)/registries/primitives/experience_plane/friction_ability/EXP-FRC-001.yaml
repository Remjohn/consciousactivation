misuse_modes:
  - "The Glowing Trap — making the 'Glowing Choice' a dark pattern that tricks the user into a paid upgrade they didn't intend to click."
  - "Over-Simplification — hiding crucial functionality so deeply that the user literally cannot find how to change their microphone settings."

