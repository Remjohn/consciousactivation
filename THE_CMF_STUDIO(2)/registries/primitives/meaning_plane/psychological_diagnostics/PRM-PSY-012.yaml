trigger_conditions:
  - "AST analysis detects user blaming external factors, algorithms, or other people for their lack of progress (Victim state)"
  - "User excessively praises the platform or coach as their 'savior' or 'only hope' (soliciting a Rescuer)"
  - "User attempts to provoke anger or frustration from the system or coach (soliciting a Persecutor)"

suppression_conditions:
  - "User is an actual victim of an unforeseen tragedy or abuse, requiring genuine human compassion"
  - "System is delivering objective, systemic feedback that must not be softened, even if the user perceives it as persecution"

misuse_modes:
  - "Apathy Disguised as Boundaries — ignoring genuine pleas for strategic help under the guise of 'refusing to rescue.'"
  - "Persecutor Flip — attempting to force a client off the triangle by aggressively attacking their Victim mindset, thereby inadvertently becoming the Persecutor."

