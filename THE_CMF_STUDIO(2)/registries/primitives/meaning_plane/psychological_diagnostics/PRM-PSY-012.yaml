summary: >
  The Drama Triangle Rotation is a safeguard diagnostic primitive that maps toxic human conflict onto three shifting, interdependent roles: Victim, Persecutor, and Rescuer. Drama and conflict escalate strictly through the rapid rotation of these roles. In CCP, this primitive provides a mechanical diagram to predict and neutralize conversational toxicity. It trains CCF Archetypes and live coaches to recognize when a client has adopted the Victim role, and explicitly forbids the coach from adopting the Rescuer role, stepping entirely off the triangle to break the conflict momentum.

core_move: >
  Refuse to adopt the "Rescuer" or "Persecutor" roles when faced with a "Victim," stepping completely out of the transactional triangle.

why_it_works: >
  Darian Smith outlines that attempting to play the "Rescuer" to a committed "Victim" is an inescapable trap. The rapid role-switching sustains toxic momentum. When the Victim inevitably rejects the help or fails to execute, the Rescuer becomes frustrated and turns into a Persecutor, or becomes overwhelmed and turns into a Victim themselves. The only mechanical solution to win the game is to step off the triangle completely by establishing firm Adult-ego boundaries, refusing to persecute, and refusing to rescue, which starves the conflict engine of the energy required to spin.

examples:
  - context: "BOOK: The Psychology Workbook for Writers - The Drama Triangle"
    application: >
      Smith uses Karpman's Drama Triangle to map toxic conflict onto three roles: Victim, Persecutor, and Rescuer. The only solution is to step off the triangle.
    effect: >
      Refusing to adopt the 'Rescuer' or 'Persecutor' role starves the conflict engine of the energy required to spin, forcing the 'Victim' to take sovereign responsibility.

  - context: "CCP: CBCS - Refusing the Rescue"
    application: >
      A client complains the market is unfair (Victim) and demands a shortcut (seeking Rescuer). The agent responds: 'The market is difficult. Here are the mechanics. Execution is your responsibility.'
    effect: >
      The client cannot transfer blame because the agent refused the Rescuer contract, forcing them to take sovereign action.

  - context: "CCP: V2WS - The Anti-Savior Pitch"
    application: >
      The host explicitly states during the webinar: 'I am not here to rescue you. If you view the algorithm as your Persecutor, my framework cannot save you.'
    effect: >
      Creates intense psychological discomfort followed by relief, establishing the host as an Adult authority rather than a desperate salesperson.

  - context: "CCP: Conscious Reactions - Error State Ownership"
    application: >
      When a user breaks a streak, the UI uses purely clinical language ('Streak reset to 0') without offering overly apologetic 'rescuer' language or punitive 'persecutor' warnings.
    effect: >
      Keeps the locus of control entirely with the user, preventing them from blaming the software for their lack of consistency.

  - context: "CCP: CCF - Boundary Enforcement Training"
    application: >
      A simulation trains coaches to identify when they are spending hours doing a client's work (Rescuer), demonstrating how this guarantees the client will eventually turn on them (Persecutor).
    effect: >
      Eliminates coach burnout by hardcoding strict Adult-state boundaries into their operating model.

