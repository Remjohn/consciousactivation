trigger_conditions:
  - "The audience is trapped in a strong victimhood narrative regarding another person or system"
  - "The content addresses a highly polarized or emotionally charged topic where nuanced thinking has collapsed"
  - "The coach needs to demonstrate 'Category King' authority by seeing the whole board, not just one side"

suppression_conditions:
  - "The client is in the immediate aftermath of severe trauma and requires pure validation, not perspective shifting"
  - "The coach does not actually understand the opponent's perspective and would be guessing or stereotyping"

misuse_modes:
  - "Moral Relativism — Using empathy to excuse abusive or destructive behavior"
  - "Devil's Advocate Trolling — Taking the opponent's side merely to be provocative or edgy"
  - "Premature Inversion — Forcing the audience to empathize before their own pain has been validated"

