crosswalk_note: "On the experience side, this dictates the tone of error messages and system notifications to ensure they always sound like an Adult helper, never a Critical Parent."

notes: "The primary de-escalation tool for live coaching. Must be trained into all autonomous agents dealing with user frustration."
