summary: >
  Ego State Switching is a psychological diagnostic primitive derived from Transactional Analysis that models human communication as interactions between distinct ego states (Parent, Adult, Child). Dysfunctional communication occurs through "crossed transactions." In CCP, this primitive is the core operational mechanic for resolving toxic client dynamics. By recognizing when a client has slipped into an Adapted Child state and is seeking a Rescuer, the coach explicitly refuses the Parent role and anchors the conversation in an Adult-to-Adult transmission state, thereby forcing the client's neurology back into mature problem-solving mode and preventing dependency.

core_move: >
  Identify the client's active Ego State and intentionally anchor your response in the Adult state to break crossed transactions.

why_it_works: >
  Darian Smith details that under stress, perfectly intelligent people are neurologically pushed out of their Adult state into an Adapted Child state. When in this state, they cannot process logical data. If a coach responds from a Parent state (whether Critical or Nurturing), it validates the Child state and solidifies a toxic dependency loop. By intentionally anchoring in the Adult state—validating facts without moralizing or rescuing—the coach breaks the crossed transaction. This "Adult-to-Adult" boundary acts as a systemic mirror that organically pulls the client's neurology back up to their own Adult state.

examples:
  - context: "BOOK: The Psychology Workbook for Writers - Transactional Shift"
    application: >
      Smith outlines Transactional Analysis, showing how stress pushes individuals into Adapted Child states seeking a Rescuer. The coach must intentionally anchor in the Adult state.
    effect: >
      Refusing the Parent role breaks the crossed transaction, forcing the client's neurology back into mature problem-solving mode and preventing toxic dependency.

  - context: "CCP: CBCS - Autonomous De-escalation"
    application: >
      When a client panics over a missed deadline (Adapted Child), the agent refuses to coddle (Nurturing Parent) or reprimand (Critical Parent), responding with slow, measured logic: "The sequence is paused. We will resume from step 4 when you are ready."
    effect: >
      Deprived of the expected Parent-Child transaction, the client's nervous system mirrors the Adult state, and they rapidly self-regulate.

  - context: "CCP: Conscious Reactions - Objective Neutrality"
    application: >
      The UI delivers harsh mechanical feedback (e.g., 'Tension score: 2/10') using strictly clinical, Adult-state language without moralizing or apologizing for the low score.
    effect: >
      The user accepts the critique as mechanical truth rather than personal attack, preventing a shame spiral.

  - context: "CCP: V2WS - The Sovereign Host"
    application: >
      During a webinar pitch, the host deliberately avoids using high-pressure, manipulative tactics (Parent) or pleading for a sale (Child), maintaining a clinical, take-it-or-leave-it posture (Adult).
    effect: >
      The prospect respects the boundaries and perceives the offer as higher status, making the purchase decision from their own sovereign Adult state.

  - context: "CCP: CMF - Conflict Deactivation"
    application: >
      In response to a combative comment on a social video, the coach replies with a purely factual, non-defensive clarification rather than matching the commenter's emotional reactivity.
    effect: >
      The conflict is starved of oxygen. The audience views the coach as highly secure and authoritative.

