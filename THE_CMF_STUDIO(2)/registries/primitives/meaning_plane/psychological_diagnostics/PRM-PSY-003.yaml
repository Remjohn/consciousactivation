trigger_conditions:
  - "AST analysis detects user slipping into helpless, overly emotional, or rebellious phrasing (Adapted Child state)"
  - "System identifies user attempting to transfer operational responsibility to the platform or coach"
  - "Formatting error messages or system notifications following a user failure state"

suppression_conditions:
  - "Context intentionally requires a Free Child state for unstructured creative brainstorming or ideation"
  - "User is experiencing an acute, real-world tragedy where temporary Nurturing Parent empathy is appropriate"

misuse_modes:
  - "Cold Logic — using the Adult state so rigidly that it lacks human empathy, which the client perceives as sociopathic or dismissive."
  - "Accidental Parent — believing you are in the Adult state when your tone actually conveys a Critical Parent condescension."

