trigger_conditions:
  - "User complains of writer's block, creative stagnation, or chronic lack of motivation"
  - "AST analysis reveals zero instances of joy, play, or unstructured time in the last 3 check-ins"
  - "Designing UX interactions to prevent fatigue during high-friction administrative tasks"

suppression_conditions:
  - "User is processing acute trauma or grief where a 'play' prescription would be deeply invalidating"
  - "Context requires intense logistical focus where improvisation would actively damage the outcome"

misuse_modes:
  - "Mandatory Fun — forcing a client to 'play' in a way that feels like another high-pressure chore, completely defeating the neurobiological purpose."
  - "Avoiding the Work — using play as an excuse to consistently procrastinate on necessary, difficult tasks."

