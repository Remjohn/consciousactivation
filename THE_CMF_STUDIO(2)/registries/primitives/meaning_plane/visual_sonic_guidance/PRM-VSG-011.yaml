summary: >
  Sound as Attention Architecture treats sonic layers not merely as mood-setters, but as functional routing devices for the listener's focus. In CCP, this means using specific auditory cues—like a sudden drop in music volume, a subtle riser, or a distinct notification chime—to physically drag the user's attention to a critical visual or verbal element, ensuring vital information is never missed.

core_move: >
  Deploy specific sonic events to direct the user's focus exactly when and where it is needed.

why_it_works: >
  Kalinak discusses how cinematic sound evolved to provide dimensional spatialization and direct audience attention. The human auditory system is highly tuned to detect changes in environment (a survival mechanism). When a sudden sonic shift occurs (e.g., a riser peaking or a bass drop), it triggers an involuntary orienting response. By aligning this sonic trigger with a critical piece of information, the creator bypasses voluntary attention and forces the user to focus, vastly increasing comprehension and retention.

examples:
  - context: "BOOK: Sound - Sound as Attention Architecture"
    application: >
      Kalinak notes the human auditory system is tuned to detect environmental changes. A sudden sonic shift (a riser or drop) triggers an involuntary orienting response, directing audience focus.
    effect: >
      By aligning sonic triggers with critical information, the creator bypasses voluntary attention, vastly increasing comprehension and retention.

  - context: "CCP: CMF - Instructional Video Keyframing"
    application: >
      A subtle, low-frequency 'whoosh' and a soft 'ding' are layered into the audio track at the exact millisecond a critical text graphic appears on screen.
    effect: >
      Even if the viewer's eyes drifted, the sonic cue triggers their orienting response, snapping attention back to the visual graphic precisely when needed.

  - context: "CCP: CBCS - Multi-Step Protocol Voice Note"
    application: >
      The ambient background track drops in volume by 50% and changes key right before the coach delivers the most important step of the protocol.
    effect: >
      The structural shift signals that something important is happening, causing the listener to unconsciously lean in and pay closer attention.

  - context: "CCP: Conscious Reactions - UI Interaction"
    application: >
      When the coach successfully completes a difficult diagnostic module, the app plays a complex, ascending major-chord chime sequence.
    effect: >
      The sonic architecture reinforces the psychological reward of task completion.

  - context: "CCP: V2WS - Webinar Offer Reveal"
    application: >
      A low, building sub-bass rumble is introduced under the speaker's voice 10 seconds before the price is revealed, cutting out completely the moment the number appears.
    effect: >
      The sonic tension physically builds anticipation, making the final reveal land with massive impact.

