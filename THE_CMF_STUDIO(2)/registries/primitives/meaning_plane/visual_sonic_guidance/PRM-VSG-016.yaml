trigger_conditions:
  - "The CCP system is constructing Midjourney/DALL-E prompts and needs to establish a specific emotional tone"
  - "The coach is building a high-end visual brand and needs to differentiate from generic 'bright and airy' Instagram aesthetics"
  - "The content deals with heavy emotional shifts (e.g., transitioning from failure to triumph in a webinar)"

suppression_conditions:
  - "The visual asset requires pure utility and clarity above all else (e.g., a software interface screenshot or technical diagram)"
  - "The asset is a raw, urgent piece of 'in-the-moment' documentary footage where applying a heavy grade would destroy its authenticity"

misuse_modes:
  - "The Preset Trap — Slapping a trending 'moody' Lightroom preset on every image regardless of the narrative context"
  - "Incongruent Atmosphere — Using intense, dramatic 'Rembrandt' lighting for a lighthearted, comedic post"
  - "Over-Grading — Pushing the colors so far that skin tones look alien, distracting the viewer from the subject"

synergizes_with:
  - "PRM-VSG-015" # Composition as Attention Routing (Light is used to create the contrast that routes the eye)
  - "PRM-PSY-024" # Universal Webinar Emotion Palette (Light/color are the visual triggers for these exact emotions)

conflicts_with:
  - "PRM-VSG-021" # Punctum, Air, and Felt Truth (If the grading becomes so heavy and artificial that the 'truth' of the image is lost)

crosswalk_id: "XW-ATMOSPHERIC-INSTRUCTION"
crosswalk_note: "Meaning focuses on image lighting/color; Experience focuses on app-level dark mode/light mode and UI color psychology."

notes: >
  CVE agents must be programmed to stop using adjectives like 'beautiful' or 'cinematic' in prompts,
  and start using specific lighting terminology (e.g., 'chiaroscuro,' 'blue-hour,' 'harsh overhead')
  tied directly to the emotional goal of the post.
