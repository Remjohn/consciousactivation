trigger_conditions:
  - "The team is hitting a plateau in output quality despite constantly refining 'prompts'"
  - "Outputs are inconsistent (e.g., one video sounds amazing, the next sounds terrible)"
  - "The CMF architecture is being designed or upgraded"

suppression_conditions:
  - "The user is explicitly requesting a 'raw,' unedited, zero-processing file for forensic or archival purposes"

misuse_modes:
  - "Over-Engineering — Building a 50-step audio processing pipeline for a simple, 5-second Telegram voice note, causing massive latency and system bloat"
  - "Ignoring the Source — Believing that a great workflow can fix garbage source audio (e.g., trying to use stem separation on a highly distorted, wind-blown phone recording)"
  - "Rigid Dogma — Refusing to allow a creator to manually adjust a volume fader because 'the algorithm determines the mix,' prioritizing the system over human intuition"

