crosswalk_id: "XW-ACOUSTIC-HIERARCHY"
crosswalk_note: "Meaning focuses on audio mix/ducking; Experience focuses on visual z-index and modal overlays that dim the background."

notes: >
  This is a highly operational primitive for CMF. The orchestration engine must contain a `ducking_policy`
  for every generation, algorithmically ensuring that `voice_volume > music_volume` during critical beats.
