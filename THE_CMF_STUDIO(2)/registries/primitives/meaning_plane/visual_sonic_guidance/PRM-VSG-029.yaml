trigger_conditions:
  - "The CMF system is assembling a multi-track audio mix (Voice + Music + SFX)"
  - "The output feels 'muddy,' 'overwhelming,' or the core message is being lost"
  - "The speaker is delivering the most critical 'hook' or 'offer' of the script"

suppression_conditions:
  - "The asset is a purely visual graphic (like a PDF or silent carousel) where sound design is irrelevant"
  - "The specific goal is to create a disorienting 'wall of sound' to induce panic or overwhelm (a very rare use case)"

misuse_modes:
  - "The Wallpaper Mix — Putting music under dialogue at a constant, unbroken volume for 10 minutes, training the brain to ignore the music entirely"
  - "Frequency Clashing — Choosing a music track that has a heavy lead melody in the exact same frequency range as the coach's voice, making both illegible"
  - "The False Swell — Increasing the volume of the music to make a mundane statement feel 'epic,' completely breaking the audience's trust"

