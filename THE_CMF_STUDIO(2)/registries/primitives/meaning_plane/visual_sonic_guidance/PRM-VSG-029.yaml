  book_path: "lab/Public Speeaking Coaching/08_Sound_Design/Designing Sound - Jay Beck.md"

summary: >
  Sound as Attention Architecture dictates that sound is not a decorative layer added to 'set a mood.'
  It is a strict system for ranking reality. Dialogue, ambience, music, and effects all compete for the
  listener's cognitive bandwidth. By establishing an explicit acoustic hierarchy (deciding which signal
  is sovereign at any given moment), the creator controls exactly what the audience treats as meaningful.
core_move: >
  Before generating or mixing audio, define the 'Sovereign Signal' for the sequence. If the coach's
  voice is sovereign, aggressively duck (lower the volume of) the music and remove competing frequencies.
  If an emotional swell is sovereign, let the music overpower the environment. Never allow multiple
  layers to compete at equal volume; forced hierarchy is what creates narrative focus.
why_it_works: >
  As Jay Beck outlines, directors use sound's affective properties to hold and direct audience attention.
  When every sonic element (voice, music, sound effects) is mixed at maximum volume, the result is
  not 'epic'; it is acoustic mud. The brain is overwhelmed by undifferentiated density and tunes out
  the message entirely. By enforcing a hierarchy, the creator reduces cognitive load and tells the brain
  exactly where to focus, ensuring the narrative payload (whether it's a spoken truth or a musical
  release) lands with maximum impact.

examples:
  - context: "BOOK: Boorman's affective sound design"
    application: >
      Beck discusses how John Boorman used sound's affective properties to hold audience attention by
      throwing their disbelief back at them, carefully manipulating the balance between dialogue,
      nature sounds, and score to prioritize psychological tension over literal realism.
    effect: >
      The audience's attention is flawlessly routed to the emotional truth of the scene, because the
      sound mix tells them what is important.

  - context: "CCP: CCF Archetype Voice Note via Telegram (CBCS)"
    application: >
      A 'Guide' archetype coach sends a crucial voice note. Instead of placing a generic lo-fi beat
      underneath the whole track at 50% volume, the CCP system enforces Acoustic Hierarchy. The beat
      plays for the first 3 seconds to establish tone, then drops to 5% volume (or disappears) while
      the coach speaks, returning only after the coach stops.
    effect: >
      The coach's voice becomes Sovereign. The listener leans in to hear the words, rather than treating
      the voice note as background music.

  - context: "CCP: V2WS Webinar 'The Pitch' module"
    application: >
      During the educational portion of the webinar, there is zero background music. The Voice is 100%
      Sovereign. As the speaker transitions into the 'Offer,' a low-frequency, stable drone is introduced
      under the voice.
    effect: >
      The sudden introduction of the new acoustic layer signals to the audience that the nature of the
      event has changed, physically routing their attention to the new phase of the presentation.

  - context: "CCP: CMF Media Factory - Reel Assembly"
    application: >
      The CMF orchestration engine generates a reel. The coach says a profound line. The engine executes
      a 'stem duck': it mutes the drum and bass stems of the AI-generated track for exactly 1.5 seconds,
      leaving only a soft atmospheric pad under the spoken line.
    effect: >
      The silence surrounding the line creates a massive spike in attention. The line feels profound
      because the acoustic environment bowed to its sovereignty.

  - context: "CCP: AI Song Generation (ACE-Step/Suno)"
    application: >
      When generating a track, the Sonic Scribe prompts the model: 'Structure: Verse 1 (sparse acoustic,
      vocals dominant), Chorus (dense instrumentation, vocals embedded), Outro (vocals removed, solo
      instrument dominant).'
    effect: >
      The generated track has a built-in attention architecture, rather than being a wall of sound
      from start to finish.

anti_examples:
  - description: >
      A coach records a highly vulnerable video about their struggles. They place an intense,
      fast-paced Hans Zimmer-style orchestral track underneath their voice, mixed so loudly that the
      viewer has to strain to understand the words.
    why_it_fails: >
      A total failure of Acoustic Hierarchy. The music is trying to be sovereign at the exact moment
      the voice needs to be sovereign. The competing signals create cognitive friction, causing the
      viewer to swipe away out of frustration.

