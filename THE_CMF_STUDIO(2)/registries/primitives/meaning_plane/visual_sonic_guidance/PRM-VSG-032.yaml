trigger_conditions:
  - "The CMF orchestration engine is combining multiple stems (Voice, Music, SFX) into a final mix"
  - "The narrative reaches a critical 'Aha!' moment or truth-drop that must be remembered"
  - "The audience is expressing confusion or fatigue during a long-form audio/video asset"

suppression_conditions:
  - "The explicit goal of the asset is to simulate a chaotic, overwhelming environment (e.g., a bustling stock market floor) where clarity is intentionally sacrificed"

misuse_modes:
  - "The Wall of Sound — Believing that 'louder and more complex' equals 'more emotional,' resulting in fatiguing, undifferentiated noise"
  - "Lyric Collision — Leaving the vocal track of a background song active while the coach is speaking, forcing two human voices to compete for the same cognitive processor in the brain"
  - "Fear of Silence — Constantly adding filler pads or drones because the creator is terrified of 'dead air,' robbing the performance of natural breathing room"

synergizes_with:
  - "PRM-VSG-029" # Sound as Attention Architecture (Density control is the mechanism for enforcing hierarchy)
  - "PRM-ACT-004" # The Strategic Pause (The pause provides the silence needed to reset the density budget)

conflicts_with:
  - "PRM-HUM-011" # The Spectacle Engine (If spectacle relies purely on maximum auditory volume/density without control)

crosswalk_id: "XW-DENSITY-BUDGET"
crosswalk_note: "Meaning focuses on audio layers and polyphony; Experience focuses on 'white space' and limiting the number of CTAs on a single screen."

notes: >
  For the CMF Orchestration engine, this primitive is mandatory. The JSON payload for a video render
  MUST contain a `stem_mute_array` or `ducking_envelope` that algorithmically thins the music stems
  during the coach's primary speaking beats.
