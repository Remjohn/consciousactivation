trigger_conditions:
  - "The narrative specifically involves themes of madness, intoxication, extreme pressure, or shifting realities"
  - "The CCP system is generating an 'absurdist' or highly satirical piece of content"
  - "The visual needs to violently break a previously established, highly objective 'Image System' (PRM-VSG-026)"

suppression_conditions:
  - "The asset is designed to build trust, authority, or clinical clarity (e.g., an FAQ page or medical advice)"
  - "The brand archetype is 'The Sage' or 'The Caregiver,' where distortion would feel alienating or aggressive"

misuse_modes:
  - "The GoPro Trap — Shooting everything on an action camera's ultra-wide fisheye setting by default, making every mundane moment look bizarrely distorted"
  - "Distortion as Decoration — Applying digital 'warp' or 'glitch' effects to a video purely to make it look 'cool,' annoying the viewer because the effect has no meaning"
  - "Unintentional Ugli-ness — Using an ultra-wide lens for a professional headshot, accidentally stretching the subject's face and destroying their perceived authority"

synergizes_with:
  - "PRM-VSG-026" # Image Systems, Not Isolated Shots (Distortion works best when it breaks a 'normal' system)
  - "PRM-ACT-009" # The Micro-Expression (Distortion can amplify the grotesque or intense nature of a micro-expression)

conflicts_with:
  - "PRM-PRS-029" # The Frictionless Path (Distortion introduces massive cognitive friction)

crosswalk_id: "XW-SUBJECTIVE-WARPING"
crosswalk_note: "Meaning focuses on optical lens distortion; Experience focuses on using UI 'glitches' or irregular typography to signal a break in the norm."

notes: >
  This primitive scores lowest in the Mercado audit (160) because it is dangerous. CVE agents must
  be programmed with strict guardrails: distortion parameters (like 'fisheye' or 'anamorphic stretch')
  should only be injected if the `emotional_intent` field explicitly calls for disorientation or absurdity.
