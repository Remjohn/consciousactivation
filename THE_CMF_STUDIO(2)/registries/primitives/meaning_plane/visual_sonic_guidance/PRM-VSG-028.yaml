summary: >
  Distortion as Subjectivity reframes optical flaws (like barrel distortion, anamorphic skew, or
  perspective warping) not as technical errors to be corrected, but as deliberate narrative instruments.
  It dictates that distortion should be used specifically to force the viewer to inhabit a destabilized
  reality, signaling intoxication, psychological fracture, intimidation, or surreality.
core_move: >
  Do not use heavy visual distortion simply because it looks 'cool' or 'edgy.' Only deploy severe
  optical warping when the narrative explicitly demands that the audience experiences a subjective,
  altered state of mind (e.g., panic, revelation, madness, or extreme dominance).
why_it_works: >
  As Mercado notes in the 'Distortion' chapter, human vision expects straight lines to be straight and
  proportions to be logical. When a lens violently bends these lines (such as a fisheye lens curving a
  horizon, or an ultra-wide lens bulging a face), the brain immediately registers a violation of reality.
  If this is done without narrative justification, the viewer dismisses the image as a gimmick or a mistake.
  But when the distortion is tied to a character's internal state—like the disorientation of burnout or
  the terrifying intimidation of an opponent—the optical warping allows the audience to directly
  *experience* that altered subjectivity, rather than merely watching it from a safe distance.

examples:
  - context: "BOOK: Disorientation and Intimidation"
    application: >
      Mercado analyzes scenes where extreme wide-angle distortion (like barrel distortion) is used
      close to a subject's face. The nose enlarges, the edges of the room bend inward.
    effect: >
      The subject appears either grotesquely intimidating (if they are the aggressor) or deeply
      disoriented (if they are the victim). The optical physics force the viewer into the subjective
      nightmare of the character.

  - context: "CCP: CCF Archetype Visual Prompts via CVE"
    application: >
      A 'Jester' or 'Disruptor' archetype is creating a post mocking the absurdity of corporate culture.
      The CVE prompt specifies: 'Shot on an 8mm fisheye lens from a low angle in a cubicle farm. The
      lines of the cubicles bend aggressively, creating a surreal, funhouse-mirror effect.'
    effect: >
      The distortion perfectly matches the 'absurdist' tone of the copy. The visual explicitly tells
      the audience: 'We are not looking at reality objectively; we are looking at how ridiculous it is.'

  - context: "CCP: V2WS Webinar 'The Breaking Point' slide"
    application: >
      The coach describes the moment they nearly quit their business due to stress. The accompanying
      visual is intentionally shot with severe anamorphic distortion and chromatic aberration (color
      fringing at the edges).
    effect: >
      The audience feels the 'psychological fracture.' The visual system is breaking down just as the
      coach's mental state was breaking down, cementing the empathy of the moment.

  - context: "CCP: CMF Media Factory - Transition Effect"
    application: >
      In a reel about 'changing your perspective,' the media agent applies a sudden, brief optical warp
      effect at the exact moment the coach delivers the 'reframe' statement.
    effect: >
      The visual distortion acts as a physical 'snap' for the viewer's brain, waking them up and
      underlining the cognitive shift that just occurred in the text.

  - context: "CCP: Telegram Coaching (CBCS) client feedback"
    application: >
      A client sends a video complaining that they feel 'out of control.' They happen to be holding
      their phone very close to their face on the ultra-wide setting, distorting their features.
      The coach points this out: 'Even your camera angle shows you're spinning out. Back up, switch
      to the 1x lens. Let's get grounded.'
    effect: >
      The coach uses the primitive diagnostically, showing the client how their physical relationship
      to the lens reflects their chaotic mental state.

anti_examples:
  - description: >
      A coach launches a highly technical, objective training course on tax compliance. To make the
      sales video look 'cinematic,' they shoot the entire thing on anamorphic lenses with heavy edge
      distortion and lens flares.
    why_it_fails: >
      The distortion is utterly divorced from the subject matter. The audience needs 'Safety' and
      'Clarity' (PRM-PSY-024) to buy tax advice. The optical distortion creates 'Disorientation' and
      'Surreality,' causing the prospect to feel vaguely unsettled and abandon the purchase.

