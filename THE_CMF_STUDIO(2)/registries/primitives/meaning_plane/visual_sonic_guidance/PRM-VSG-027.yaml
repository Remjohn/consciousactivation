trigger_conditions:
  - "The video or storyboard sequence feels 'flat,' 'boring,' or 'slow,' despite containing action"
  - "The narrative involves themes of urgency, being stuck, escaping, or rapid transformation"
  - "The CVE system needs to generate an image that implies kinetic energy rather than a static pose"

suppression_conditions:
  - "The asset requires a deep, meditative calm (e.g., a mindfulness guide) where exaggerated velocity would induce unwanted anxiety"
  - "The subject is explaining a highly complex, technical concept where the camera needs to be completely objective and static"

misuse_modes:
  - "The Nauseating Pan — Using a wide lens to whip-pan the camera so fast that the viewer gets motion sickness rather than feeling 'urgency'"
  - "Incongruent Velocity — Making a relatively mundane action (like drinking coffee) look like a high-speed car chase by abusing wide-angle motion blur, resulting in unintentional comedy"
  - "Overusing the Treadmill — Relying on the telephoto 'running in place' shot so often that it becomes a cliché, losing its psychological impact"

synergizes_with:
  - "PRM-VSG-023" # Lens Choice as Emotional Syntax (Movement perception is a direct subset of lens choice)
  - "PRM-ACT-005" # The Kinetic Anchor (Applying this visual rule to the coach's physical performance)

conflicts_with:
  - "PRM-VSG-024" # Space as Psychological Relationship (If the motion is so extreme it blurs out the psychological meaning of the environment)

crosswalk_id: "XW-KINETIC-GEOMETRY"
crosswalk_note: "Meaning focuses on the optical perception of speed; Experience focuses on the easing curves and velocity of UI animations."

notes: >
  When compiling video generation prompts or selecting stock footage, the CVE agent must evaluate the
  implied velocity of the lens. A prompt for 'running' is insufficient; it must specify 'running
  toward camera on 200mm lens' vs. 'running laterally on 14mm lens.'
