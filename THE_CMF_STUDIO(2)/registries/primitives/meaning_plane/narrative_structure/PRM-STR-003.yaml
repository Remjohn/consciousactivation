trigger_conditions:
  - "AST analysis detects the initial story feels cliché or lacks a surprising emotional punch"
  - "User is generating raw material but explicitly states they aren't sure what the 'point' is yet"
  - "System detects visual or narrative assets feeling disconnected from an emotional core during generation"

suppression_conditions:
  - "Context requires immediate, highly structured execution (e.g., a hard-hitting 15-second direct response ad)"
  - "The core insight or thesis has already been firmly established, validated, and structurally locked"

misuse_modes:
  - "Waiting endlessly for the 'perfect' meaning to emerge, leading to project paralysis."
  - "Focusing on irrelevant details that never coalesce into a coherent narrative."

synergizes_with:
