summary: >
  Shitty First Drafts is a generative primitive that deliberately lowers the standard of
  initial execution to zero. It treats the first pass not as an attempt at communication,
  but as an act of excavation. By strictly sequencing generation before evaluation, it
  prevents the inner critic from strangling the flow of raw, truthful material.
core_move: >
  Separate access from evaluation by demanding a completely unpolished, uninhibited first pass.
why_it_works: >
  The human brain cannot simultaneously inhabit the clown-state (generative, associative, uninhibited)
  and the editor-state (critical, structured, risk-averse) without severe friction. Lamott observes
  that perfectionism is a silencing mechanism. By explicitly permissioning a terrible first draft,
  the ego's defense mechanisms are bypassed. The writer accesses deeper, often messier truths that
  would have been censored by a demand for immediate elegance.

examples:
  - context: "BOOK: Bird by Bird - Permissioned Mess"
    application: >
      Lamott demands a completely unpolished, uninhibited first pass. The goal is to separate generation from evaluation, bypassing the "editor" state that silences the "clown" (generative) state.
    effect: >
      The writer accesses deeper, messier truths that would have been censored by a demand for immediate elegance.

  - context: "CCP: CCF - Sacred Audio Capture"
    application: >
      The CCP agent explicitly instructs the coach: "Do not try to make this sound smart. Ramble, curse, complain. We will clean it up later. Just give me the raw data."
    effect: >
      The coach speaks freely without self-monitoring. The audio contains high-charge emotional signal and unvarnished truths.

  - context: "CCP: V2WS - The Vomit Draft Phase"
    application: >
      The system forces a phase where the coach must continuously dictate thoughts for 3 minutes without stopping to edit or correct themselves, before any structural logic is applied.
    effect: >
      Foundational ideas are extracted safely. The coach avoids getting bogged down in transitional logic.

  - context: "CCP: CMF - Initial Script Processing"
    application: >
      The user inputs a chaotic, disjointed rant. The system validates the raw emotion of the input before applying any structural refactoring.
    effect: >
      The user feels permissioned to bring their true self to the platform, establishing the AI as a safe collaborative partner.

  - context: "CCP: Conscious Reactions - Zero-Friction Input"
    application: >
      The UI for initial journaling or logging is entirely devoid of grammar checkers or "helpful" AI auto-completes that might interrupt flow.
    effect: >
      Maintains the generative flow state, ensuring maximum data capture without premature evaluation.

