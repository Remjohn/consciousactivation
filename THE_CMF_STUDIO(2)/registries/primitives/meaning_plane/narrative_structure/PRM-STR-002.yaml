trigger_conditions:
  - "System initiates the creation of a completely new piece of content, module, or narrative arc"
  - "User expresses fear of getting it wrong or explicitly states a desire for perfection out of the gate"
  - "AST analysis detects the initial input is stiff, academic, overly cautious, or heavily self-edited"

suppression_conditions:
  - "The content has already entered the revision, structural, or final polishing phase"
  - "The required output is a highly constrained, technical specification where accuracy is paramount"

misuse_modes:
  - "Publishing the first draft without the necessary secondary phase of ruthless editing."
  - "Using the 'shitty' permission as an excuse to avoid searching for the actual truth."

synergizes_with:
  - "PRM-STR-001" # Bird-by-Bird Framing - do the shitty first draft of just one small frame
  - "PRM-HUM-001" # Dual-Processor Cognitive Engine - explicitly separates clown and editor

conflicts_with:
  - "PRM-STR-026" # Scene Engineering - which requires meticulous structural polarity, impossible in a first draft

