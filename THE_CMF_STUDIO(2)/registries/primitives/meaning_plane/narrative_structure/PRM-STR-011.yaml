book_reference:
  title: "DataStory: Explain Data and Inspire Action Through Story"
  author: "Nancy Duarte"
  chapters:
    - "Chapter IX: Marveling at the Magnitude"
    - "Chapter X: Humanizing Data"
  key_pages: "Sections on the Hero and Adversary of the Data, and connecting data to relatable time/size"
  book_path: "lab/Public Speeaking Coaching/04_Storytelling_and_Narrative_Design/DataStory Explain Data and Inspire Action Through Story - Nancy Duarte.md"

summary: >
  Humanize Information is a translation primitive that converts abstract data, large numbers,
  and systemic trends into physical scale and character-driven conflict. It bridges the gap
  between statistical reality and human cognition by forcing abstract concepts to wear the
  faces of heroes, adversaries, and tangible, lived consequences.

core_move: >
  Attach specific characters, tangible physical scale, and a clear adversary to abstract
  information so the audience can emotionally process the stakes.

why_it_works: >
  The human brain is not evolutionarily adapted to process large numbers or systemic abstractions;
  it is adapted to track relational dynamics, physical threats, and local scale. In DataStory,
  Duarte outlines how assigning a "Hero" and an "Adversary" to the data, or converting a metric
  like "$1 Billion" into a relatable equivalent (e.g., "stacking dollar bills to the moon"), bypasses
  the analytical filters. This physical and relational anchoring allows the limbic system to generate
  the empathy and urgency necessary for persuasion.

examples:
  - context: "BOOK: DataStory - Relatable Scale"
    application: >
      Duarte outlines how the brain cannot process systemic abstractions. Humanizing data assigns a "Hero" and "Adversary" to the data, or converts metrics into relatable physical scale (e.g., "stacking dollar bills to the moon").
    effect: >
      Bypasses analytical filters, allowing the limbic system to generate empathy and urgency necessary for persuasion.

  - context: "CCP: CCF - LinkedIn Hook Generation"
    application: >
      Instead of "Inflation reduced purchasing power by 8%," the agent forces a rewrite: "The invisible adversary eating your SaaS margins just stole one month of payroll from your 10-person team."
    effect: >
      The abstract percentage is converted into a visceral threat. The audience instantly feels the pain of the statistic in human terms.

  - context: "CCP: CMF - Visual Prompting"
    application: >
      To illustrate "server latency," the system rejects generic data center footage and generates a prompt showing a frustrated user tapping their phone at a checkout line.
    effect: >
      The visual narrative becomes empathetic. The audience stops thinking about servers and starts thinking about customer frustration.

  - context: "CCP: V2WS - The Scale Metaphor"
    application: >
      The presenter explains a complex algorithm update not through code, but by comparing it to a bouncer at a crowded nightclub aggressively filtering the line.
    effect: >
      The audience instantly grasps the mechanism and its implications for their business without needing technical expertise.

  - context: "CCP: CBCS - The Progress Anchor"
    application: >
      When a client hits 10,000 words written, the agent doesn't just celebrate the number. It says: "You just wrote the equivalent of a 40-page book. You are an author."
    effect: >
      Anchors the abstract metric to an identity-shifting human achievement, radically boosting motivation.

anti_examples:
  - description: >
      Using a chart that simply states "2,000,000 users affected by the UI change" to try and generate
      urgency among the product team.
    why_it_fails: >
      Two million is a statistic; it triggers no empathy. As Duarte notes, without zooming in on the
      lived experience of a single hero struggling against the adversary of a broken interface, the
      number remains an abstraction that is easily ignored.

