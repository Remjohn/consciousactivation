trigger_conditions:
  - "AST analysis detects large numbers, percentages, or complex systemic data in the narrative"
  - "System detects the narrative feeling dry, academic, or disconnected from the end user's physical reality"
  - "User explicitly asks for help making an audience 'care' about a technical or abstract framework"

suppression_conditions:
  - "Audience or context requires strict, untranslated clinical, legal, or financial data for compliance reasons"
  - "The proposed humanization relies on inappropriate, insensitive, or hyperbolic comparisons that damage credibility"

misuse_modes:
  - "Hyperbolic Scale — Comparing a minor inconvenience to life-or-death stakes, breaking trust."
  - "Forced Metaphor — Creating characters that are so abstract (e.g., 'Captain Synergy') that they become comical."
  - "Scale Distortion — Using visual scale that mathematically misrepresents the true data proportions."

synergizes_with:
  - "PRM-STR-008"  # Data Point of View
  - "PRM-HUM-037"  # Hyper-Specificity Anchoring

conflicts_with:
  - "PRM-PSY-012"  # Clinical Distance (when emotional detachment is strategically required)

