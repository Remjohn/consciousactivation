trigger_conditions:
  - "AST analysis detects a draft paragraph, response, or video segment that feels repetitive, stagnant, or circles the same emotional note"
  - "System detects the narrative is taking too long to get to the point (failing to 'enter late')"
  - "Content is flagged during a final pass for lacking dynamic energy or forward momentum"

suppression_conditions:
  - "Content is an index, glossary, or strict reference manual where emotional polarity shifts would be confusing"
  - "Output is a legal disclaimer or compliance warning"

misuse_modes:
  - "Whiplash — Forcing unnatural, extreme emotional shifts (e.g., ecstasy to depression) in every single paragraph."
  - "Entering Too Late — Starting a scene so late in the action that the audience lacks the context to understand the stakes."
  - "Fake Polarity — Using transition words ('However', 'Suddenly') to imply a shift without actually changing the underlying meaning or emotion."

