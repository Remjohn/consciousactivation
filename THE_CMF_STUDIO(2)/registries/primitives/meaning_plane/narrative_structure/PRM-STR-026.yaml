book_reference:
  title: "The Screenwriter's Bible / Save the Cat"
  author: "David Trottier, Blake Snyder"
  chapters:
    - "Scene Execution"
  key_pages: "Snyder's +/- emotional change lens and Trottier's rule to start scenes late"
  book_path: "lab/Public Speeaking Coaching/04_Storytelling_and_Narrative_Design/AUDIT Screenwriting Architecture Trottier Snyder Schechter.md"

summary: >
  Scene Engineering is a micro-structural primitive that ensures every local unit of content
  (a paragraph, a slide, a voice note) justifies its existence by creating a shift in polarity.
  It treats content not as a container for information, but as a unit of change where emotional
  or informational pressure must move from positive to negative (or vice versa) by the end of the beat.

core_move: >
  Give every discrete unit of content a specific dramatic purpose, entering late, building pressure,
  and ending on an emotional or informational polarity shift.

why_it_works: >
  In screenwriting, a scene without an emotional shift (+/- or -/+) is considered dead weight and
  cut from the film. The human brain tracks narrative progress through these shifts in state. If a
  paragraph begins with a character feeling confused and ends with them still feeling confused, no
  story has occurred. Scene Engineering forces the writer (or agent) to ensure that every content
  block turns the emotional dial, maintaining the illusion of forward momentum and keeping the
  audience locked in.

examples:
  - context: "BOOK: The Screenwriter's Bible / Save the Cat - Polarity Shift"
    application: >
      Snyder and Trottier dictate that every scene must enter late and create an emotional or informational shift (+/- or -/+). If a scene starts and ends on the same note, it is dead weight.
    effect: >
      Ensures every content block turns the emotional dial, maintaining the illusion of forward momentum and keeping the audience locked in.

  - context: "CCP: CMF - Visual Sequencing"
    application: >
      Instead of three consecutive shots of a coach looking sad, the agent engineers a scene: Neutral (typing), Negative (backspacing entire email), Positive/Shift (shutting laptop and walking out).
    effect: >
      The sequence has propulsion. It moves from obligation to failure to liberation in seconds, satisfying the brain's need for a complete polarity shift.

  - context: "CCP: Telegram - Intervention Structuring"
    application: >
      Instead of static advice, the agent engineers the response as a scene: starts by validating deep frustration (-), introduces a sharp reframe (>< conflict), ends with an empowering choice (+).
    effect: >
      The user experiences an emotional transition just by reading the message. The coaching feels dynamic and interventionist.

  - context: "CCP: CCF - Paragraph Pruning"
    application: >
      During script editing, the AI highlights a 4-minute segment where the coach circles the same point without introducing new risk or emotional change, and forces a cut.
    effect: >
      Eliminates redundant, static content, drastically improving the pacing and retention rate of the final asset.

  - context: "CCP: V2WS - The 'Aha' Slide"
    application: >
      A single webinar slide is designed to visually build from a state of total confusion (complex diagram) to sudden clarity (a single highlighted path) upon a click animation.
    effect: >
      The visual itself executes a polarity shift, delivering a dopamine hit of resolution to the audience.

anti_examples:
  - description: >
      A coach records a 4-minute voice note where they circle the same point about "staying positive"
      five different ways, starting upbeat and ending upbeat, with no new information or emotional risk introduced.
    why_it_fails: >
      There is no polarity shift. Because the scene ends on the exact same emotional and informational
      note it began on, the listener's brain registers the 4 minutes as wasted time. The content is static.

