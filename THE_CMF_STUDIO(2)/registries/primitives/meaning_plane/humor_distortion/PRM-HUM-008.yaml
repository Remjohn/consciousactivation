summary: >
  Character Funny Filter is the foundational humor mechanism by which laughter
  is generated every time a character acts in predictable accordance with
  their established traits. Dikkers calls it "the flour" of comedy — the
  baseline ingredient without which no comedic character can function. The
  primitive operates through a simple loop: establish traits (2-3 maximum),
  then show the character acting on those traits. The audience laughs because
  their prediction was confirmed — the brain gets both the pleasure of being
  right and the release of seeing a human pattern exaggerated. In CCP, this
  primitive governs the consistency of the coach's persona across content:
  when the coach's Voice DNA traits are clear, every new piece of content
  where those traits emerge creates a cumulative comedic bond.

core_move: >
  Establish clear, simple character traits and then generate laughter by
  showing the character acting predictably according to those traits.

why_it_works: >
  Dikkers demonstrates with Homer Simpson (dumb and lazy) and Napoleon
  Dynamite (nerd) that comedy characters need only 2-3 traits for the
  audience to lock in. The mechanism is anticipatory pleasure — the audience
  sees the setup and already knows how this person will react, and the
  confirmation produces both cognitive satisfaction and social bonding
  ("I know this person"). Critically, Dikkers warns that the biggest
  mistake writers make is using funny lines instead of funny characters
  (Mistake #1, Ch 8) — the character's identity IS the comedy engine,
  not the words they say. Jokes are "doilies placed on furnishings long
  after the house has been built."

examples:
  - context: "BOOK: How to Write Funny Characters - Predictive Behavior Comedy"
    application: >
      Dikkers identifies character traits as the 'flour' of comedy. By establishing 2-3 clear traits and showing the character acting predictably according to them, the audience experiences anticipatory pleasure.
    effect: >
      The audience laughs because their prediction is confirmed. The character's identity IS the comedy engine, generating cumulative bonding across multiple exposures.

  - context: "CCP: CMF - The Recurring Trait Series"
    application: >
      The agent structures a 5-part series highlighting the coach's 'tough love' Voice DNA. Each episode presents a new client excuse; the audience anticipates the coach's characteristically blunt response.
    effect: >
      Audience retention increases. The Character Filter creates a predictable reward loop. The coach's persona becomes a brand asset through repetition.

  - context: "CCP: CBCS - The Agent Persona"
    application: >
      The CBCS Telegram agent is assigned a consistent trait: relentless optimism paired with blunt data delivery. It reacts to poor performance with cold analysis followed by absurdly cheerful encouragement.
    effect: >
      The coach anticipates the agent's response. The accountability mechanism transforms from a clinical tool into a parasocial ritual.

  - context: "CCP: V2WS - The 'Flawed Protagonist' Origin Story"
    application: >
      During the webinar's origin story, the script emphasizes a specific, slightly embarrassing character flaw (e.g., being obsessively cheap) and shows how that flaw drove them to discover the framework.
    effect: >
      The flaw makes the coach deeply relatable. When the coach acts 'cheap' later in the presentation, it gets a laugh because the trait was clearly established.

  - context: "CCP: CCF - The 'Oppositional Reaction' Prompt"
    application: >
      The system asks the coach: 'What is a completely normal industry practice that makes you irrationally angry?' The resulting rant becomes a foundational character trait for their content architecture.
    effect: >
      Identifies a repeatable, highly predictive trigger for the coach's character, ensuring they never run out of comedic material.

anti_examples:
  - description: >
      A CMF agent writes standalone jokes or witty one-liners for the
      coach's content without establishing what the coach's consistent
      character traits are first.
    why_it_fails: >
      Dikkers explicitly identifies this as the #1 character mistake:
      "The writer uses funny lines to make a funny character." Without
      established traits, jokes are orphaned — they might get a single
      laugh but cannot build cumulative engagement. The audience has no
      predictive framework, so each joke starts from zero.

  - description: >
      The coach's content shows them as tough in one piece, vulnerable
      in the next, then sarcastic, then earnest — with no consistent
      trait anchor across content.
    why_it_fails: >
      The Character Funny Filter requires trait consistency for the
      prediction mechanism to activate. Dikkers warns that characters
      with "poorly defined traits" or traits that are "too subtle" fail
      because "how can you tell if your character's traits are obvious
      enough?" (Ch 8, Mistake #6). Without a clear anchor, the audience
      cannot predict, and comedy collapses into confusion.

