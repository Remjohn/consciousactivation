notes: >
  This is the lowest-MCDA 'supporting' primitive in the Funny Characters
  batch because it describes a mechanism (trait-based predictive comedy)
  rather than a creative move. It is foundational — Reference Funny Filter,
  High-Contrast Conflict, and Archetype Shorthand all require it as
  substrate — but on its own it produces only baseline engagement. The
  primitive's real power emerges in coalition with other HUM primitives.
  Float note: goal_bias.memorability is the highest value (0.9) because
  trait consistency is what makes characters — and therefore coaches —
  stick in memory. goal_bias.surprise is low (0.3) because the mechanism
  is explicitly about confirmed prediction, not broken expectation.
