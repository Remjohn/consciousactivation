trigger_conditions:
  - "System has successfully locked the coach's 3D Voice DNA profile with at least 2 clear, repeatable behavioral traits"
  - "Agent is generating a multi-part content series where trait consistency can compound over repeated exposures"
  - "System is initializing the CBCS Telegram bot persona for a new user"

suppression_conditions:
  - "Coach's Voice DNA is still being discovered — applying the Character Funny Filter to an undefined persona locks in traits prematurely"
  - "Content is a one-off piece where the audience will never encounter this character again — the filter requires repeated exposure"
  - "Situation calls for genuine vulnerability that would be undermined by the audience expecting a predictable reaction"

misuse_modes:
  - "Trait ossification — making the character SO predictable that the audience loses interest because there is zero variation or escalation"
  - "Line-first writing — writing funny words before establishing who the character is, producing rootless comedy"
  - "Trait blur — assigning too many traits (4+) so the audience cannot form a clear prediction model"

