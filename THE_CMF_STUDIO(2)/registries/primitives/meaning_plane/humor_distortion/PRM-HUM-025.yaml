summary: >
  The Analogy Bridge is the highest-scoring primitive in the Elements of Humor
  audit (188/200) and operates as a cross-domain mapping engine that translates
  complex, painful, or abstract truths into accessible, often ridiculous
  parallel scenarios. Dikkers defines Analogy as comparing two very different
  things, keeping one side hidden, and letting the audience discover the
  connections. Orwell's Animal Farm maps the Russian Revolution onto a
  farmyard; The Onion maps Al Gore onto Superman's origin story. In CCP, this
  is the JIT Compiler's primary tool for converting L3 cognitive frameworks
  (Terror Management Theory, predictive processing) into L1 narrative
  scenarios the audience instantly grasps and laughs at — making the complex
  palatable and the painful absurd.

core_move: >
  Map the coach's complex or painful truth onto a structurally parallel but
  tonally absurd domain, revealing one half overtly while keeping the
  real-world half hidden for the audience to discover.

why_it_works: >
  Dikkers states that Analogy works by comparing "two disparate things
  and finding as many comparisons as possible" while keeping one half
  "behind the curtain" (line 2937). The mechanism is dual-layer discovery:
  every point of comparison between the absurd domain and the hidden
  real-world domain produces a joke beat. The audience laughs at the surface
  absurdity while simultaneously decoding the serious Subtext underneath.
  The audit confirms LLMs excel at finding structural mappings between
  disparate domains (Implementation Feasibility: 48/50), making this the
  most automatable high-value humor primitive in the entire registry.

examples:
  - context: "BOOK: The Elements of Humor - Cross-Domain Mapping"
    application: >
      Dikkers defines Analogy as comparing two very different things (ideally opposites) while keeping one half hidden. The audience must discover the connections between the absurd domain and the real domain.
    effect: >
      Produces dual-layer discovery. The audience laughs at the surface absurdity while simultaneously decoding the serious Subtext, making abstract concepts instantly concrete.

  - context: "CCP: CMF - Translating Cognitive Frameworks"
    application: >
      To explain 'upper-limiting' (fear of success), the JIT Compiler generates: 'Starting a business is like installing a governor switch on a Ferrari because you're terrified it might turn into a spaceship.'
    effect: >
      The audience laughs at the Ferrari/spaceship image, then recognizes their own self-sabotage. The L3 psychological insight lands without triggering defensive barriers against clinical analysis.

  - context: "CCP: CBCS - Catastrophizing Reframe"
    application: >
      A client panics over a failed 3-day launch. The agent prompts: 'That's like planting a garden, harvesting on day 3, finding nothing, and concluding you are biologically incapable of growing food.'
    effect: >
      The catastrophic narrative ('I am a failure') is instantly reframed as a timing error ('I checked too early') through the sheer absurdity of the mapped domain.

  - context: "CCP: V2WS - The 'Current State' Diagnosis"
    application: >
      The webinar explains the flaw in the audience's current strategy by comparing it to trying to put out a house fire by organizing the furniture.
    effect: >
      The audience instantly grasps the futility of their tactical obsession when the core strategy (the fire) is unaddressed. The visual analogy is infinitely stickier than a literal explanation.

  - context: "CCP: CCF - The Boundary Setting Script"
    application: >
      Explaining the cost of lacking boundaries: 'Saying yes to every client request is like trying to keep a sinking boat afloat by drilling more holes to let the water out.'
    effect: >
      The coach communicates the destructive nature of people-pleasing through an undeniable physical logic model that the audience cannot argue with.

anti_examples:
  - description: >
      The JIT Compiler generates an analogy that explicitly names both
      sides: 'Your fear of success is like putting a governor on a
      Ferrari — you're limiting yourself just like someone who limits
      their car.'
    why_it_fails: >
      Dikkers mandates that one half of the Analogy must be kept "behind
      the curtain" (line 2868). When both sides are named, the audience
      has nothing to discover. The humor collapses into a simile —
      informative but not funny. The audience is told what to think
      rather than being invited to decode the connection.

  - description: >
      The system generates an analogy where the two domains are too
      similar: 'Your business failing is like another business failing,
      but with different products.'
    why_it_fails: >
      Dikkers specifies "the two things should be very different —
      opposites are especially good" (lines 2857-2858). When the domains
      are too similar, there is no cognitive leap for the audience.
      The comparison feels obvious rather than surprising.

