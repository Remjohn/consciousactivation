notes: >
  Highest MCDA in the entire Batch 4 (188/200) and the most automatable
  high-value primitive in the HUM registry (IF: 48/50). Float note:
  goal_bias.clarity and memorability are both near-ceiling (0.9) because
  analogies are the most powerful pedagogical tool — they make abstract
  concepts concrete and sticky. goal_bias.surprise is high (0.8) because
  the cross-domain leap itself is inherently surprising.
