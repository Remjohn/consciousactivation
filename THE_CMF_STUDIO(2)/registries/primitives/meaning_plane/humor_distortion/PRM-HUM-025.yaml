trigger_conditions:
  - "JIT Compiler is translating an L3 cognitive or psychological framework into accessible, L1 audience-facing narrative content"
  - "CBCS agent identifies a requirement to reframe a client's catastrophic narrative without deploying direct clinical confrontation"
  - "CMF is drafting an exposition-heavy concept; system must generate the Analogy Bridge BEFORE the literal explanatory text"

suppression_conditions:
  - "Target audience already possesses deep subject-matter expertise in the specific domain being explained; analogy risks appearing patronizing"
  - "Content demands extreme technical or legal precision where even minor cross-domain mapping artifacts would misrepresent the factual truth"

misuse_modes:
  - "Revealing both halves — stating the hidden domain destroys the discovery mechanism and converts the analogy into a flat comparison"
  - "Forced mapping — connecting two domains with too few genuine parallels, creating an analogy that breaks down on examination"
  - "Cliché analogy — using overworked comparisons (life is a journey, business is a marathon) that have zero surprise value"

synergizes_with:
  - "PRM-HUM-002"  # Irreducible Truth — the Subtext IS the hidden half of the analogy; the analogy IS the concealment mechanism
  - "PRM-HUM-003"  # Filter Constraints — Analogy is Filter #9 in Dikkers' taxonomy; it operates alongside other Filters
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — the two domains should be maximally different for the strongest analogy

conflicts_with:
  - "PRM-HUM-026"  # Misplaced Focus — both primitives rely on misdirection, but Analogy draws attention TO the parallel while Misplaced Focus draws attention AWAY from the main point

