trigger_conditions:
  - "System is executing the final output generation pass; `imperfection_injection_pass` must be applied as the ultimate transformation layer"
  - "CBCS agent is generating direct-to-client text (e.g., Telegram); output must pass the AI-detection heuristic via artifact injection"
  - "AST analysis flags a V2WS webinar script or video script for exceeding the 'polish score' threshold, indicating it reads as too manufactured"

suppression_conditions:
  - "Output is a formal document (e.g., contracts, official policy) where cognitive imperfections undermine structural credibility"
  - "Coach's validated Voice DNA is explicitly clinical/academic, where hyper-polished prose is the authentic baseline"

misuse_modes:
  - "Pattern-generic injection — using a universal imperfection template instead of calibrating from the specific coach's LIWC-22 speech markers"
  - "Imperfection density overflow — inserting so many Thought Moments that every paragraph reads as scattered, undermining the content's structural integrity"
  - "Wrong imperfection type — injecting vocal-style markers (uh, um, like) into written text where they read as juvenile rather than spontaneous"

synergizes_with:
