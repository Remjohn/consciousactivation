notes: >
  This is the CCP's primary defense against the 'AI uncanny valley' — the
  moment the audience detects that content was machine-generated. Its MCDA
  (158) reflects high algorithmic determinism (45/50) because imperfection
  injection is trivially automatable via spaCy + LIWC-22, but lower
  semantic resonance (35/50) because it operates at the delivery surface
  rather than the meaning layer. Float note: phase_fit.revision AND
  delivery are both ceiling (0.9) because imperfection injection is both
  an editorial pass (choosing WHERE to inject) and a delivery calibration
  (matching the coach's actual speech rhythm). surface_fit.telegram is
  highest (0.9) because Telegram is the surface where AI-detection
  sensitivity is most acute.
