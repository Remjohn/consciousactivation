trigger_conditions:
  - "JIT Compiler reaches the final revision stage; a mechanical lexical replacement pass must scan for and replace generic nouns"
  - "AST analysis detects >15% density of abstract corporate filler ('various aspects', 'key challenges'); content must be flagged for grounding"
  - "CBCS is diagnosing client behavior; system must translate clinical abstractions into specific, named actions from the client's workflow"

suppression_conditions:
  - "Document is legally binding or formally instructional where brand names or over-specific examples would limit applicability"
  - "Audience demographic is too broad to share specific cultural touchpoints, making hyper-specific references exclusionary and confusing"

misuse_modes:
  - "Specificity overload — cramming so many specific details into a single sentence that it reads as a catalog rather than a conversation"
  - "Wrong audience details — using specific references from the wrong cultural or professional context, producing confusion instead of recognition"
  - "Fabricated specificity — inventing brand names or scenarios that don't exist, breaking verisimilitude and trust"

synergizes_with:
  - "PRM-HUM-023"  # Tribal Reference — Hyper-Specificity provides the MECHANISM; Tribal Reference provides the CONTENT (specific details from the audience's world)
  - "PRM-HUM-005"  # Absolute Verisimilitude — specific details are verisimilar by nature; generic abstractions are inherently anti-verisimilar
  - "PRM-HUM-020"  # Thought Moment Illusion — specific details create the illusion of real-time recall ('what was the name of that tool... ConvertKit, right')

conflicts_with:
  - "PRM-HUM-025"  # Analogy Bridge — analogies sometimes require abstract domain mapping; forcing hyper-specificity into both sides of an analogy can over-ground it and reduce the cognitive leap

