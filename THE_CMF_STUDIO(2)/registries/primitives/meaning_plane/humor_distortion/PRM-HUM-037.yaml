notes: >
  HIGHEST MCDA IN THE ENTIRE HUM REGISTRY (195/200). The audit identifies
  this as the 80/20 primitive alongside Directed Emotional Stance: "If an
  AI agent does absolutely nothing else but (1) takes an extremely hard,
  passionate emotional stance on a topic and (2) uses hyper-specific,
  grounded nouns instead of high-level abstractions, it immediately sheds
  the 'AI-generated' footprint." Float note: goal_bias.clarity and
  memorability are both ceiling (0.9) because specific details produce
  the clearest mental images and the stickiest memories. phase_fit.revision
  is ceiling (0.9) because the specificity swap is fundamentally an
  editorial pass — a mechanical lexical replacement operation.
