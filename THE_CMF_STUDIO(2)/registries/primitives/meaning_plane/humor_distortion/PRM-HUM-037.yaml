summary: >
  Hyper-Specificity Anchoring is the highest-scoring primitive in the entire
  HUM registry (195/200) and the single most impactful anti-slop mechanism
  available. Holloway demonstrates that the difference between "a car" and
  "a 2003 pale yellow Honda Civic with a missing hubcap" is the difference
  between a concept and a reality. Generic nouns produce generic content;
  hyper-specific nouns produce vivid, grounded, memorable content that
  instantly neutralizes the "uncanny AI valley." In CCP, this primitive
  injects directly into prompt constraints as a rigid system-level rule:
  "No generic nouns. Swap 'vehicle' for 'rusting 1998 Ford Taurus.'"

core_move: >
  Replace every generic noun, generic adjective, and generic scenario in
  generated content with a hyper-specific, visceral, culturally grounded
  detail — a proper noun, a precise number, a brand name, a sensory texture.

why_it_works: >
  Holloway proves that the brain processes specific details fundamentally
  differently from abstract concepts. "A car" activates a generic mental
  template; "a 2003 pale yellow Honda Civic with a missing hubcap" activates
  a specific sensory image — color, shape, texture, social class. The
  mechanism is involuntary scene construction: when the audience receives
  specific details, their brain is forced to build a concrete mental image.
  This forced construction produces deeper encoding and higher retention.
  The audit confirms this is "the easiest to automate, highest immediate
  impact" (MCDA 195) because it requires zero creative judgment — it is
  a mechanical swap operation applied at the lexical level.

examples:
  - context: "BOOK: The Serious Guide to Joke Writing - Visceral Detail Injection"
    application: >
      Holloway proves that specific details ('2003 pale yellow Honda Civic') force involuntary scene construction in the brain, whereas generic abstractions ('a car') do not.
    effect: >
      Produces vivid, grounded, memorable content that instantly neutralizes the uncanny AI valley.

  - context: "CCP: JIT Compiler - The Lexical Swap Pass"
    application: >
      The final pass of any generation must explicitly swap generic nouns ('software') for hyper-specific, culturally grounded details ('a $347/month ConvertKit plan').
    effect: >
      The audience experiences the shock of recognition, transforming a generic nod into a screenshot-and-share.

  - context: "CCP: CBCS - The Grounded Diagnostic"
    application: >
      Instead of clinical terms ('avoidance behavior'), the agent names the specific action ('reorganizing your Notion workspace for the third time this week').
    effect: >
      The client cannot dismiss the feedback because it describes their exact granular reality, producing laughter and accountability simultaneously.

  - context: "CCP: CCF - The Tangible Case Study"
    application: >
      Course materials use hyper-specific fictional examples rather than abstract theory to explain coaching frameworks.
    effect: >
      Students encode the lesson visually, increasing completion rates because the material feels tangible.

  - context: "CCP: CMF - The Anti-Slop Filter"
    application: >
      The Critic agent automatically rejects drafts containing high densities of corporate abstractions ('growth mindset,' 'competitive landscape').
    effect: >
      Mechanically guarantees that the coach's feed remains free of generic AI-generated filler.

anti_examples:
  - description: >
      A CMF hook reads: 'Many entrepreneurs struggle with various
      aspects of growing their business in today's competitive landscape.'
      Every noun is generic; every adjective is corporate filler.
    why_it_fails: >
      This is the canonical "AI slop" that Holloway's primitive is
      designed to destroy. No brain constructs a scene from 'various
      aspects' or 'competitive landscape.' These are concept-level
      abstractions that produce zero mental imagery, zero emotional
      charge, and zero memorability.

  - description: >
      The specificity injection produces culturally inaccessible details:
      'You're spending your evening watching Takeshi's Castle reruns
      on a 1987 Panasonic Quintrix.' The references are too obscure
      for the target audience.
    why_it_fails: >
      Hyper-Specificity must be audience-calibrated. Specific details
      must come from the audience's world — their brands, their tools,
      their daily behaviors. Culturally inaccessible details produce
      confusion rather than recognition. The Cultural Memory Map
      (DEP-ENG-023) must inform the specificity selection.

