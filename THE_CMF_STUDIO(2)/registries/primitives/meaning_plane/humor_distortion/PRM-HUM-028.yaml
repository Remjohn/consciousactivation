summary: >
  Authentic Topic Extraction is Carter's raw material mining primitive:
  the insistence that relatability and humor are birthed from pain, anxiety,
  and personal flaws — things that are "Hard, Weird, Scary, or Stupid."
  Conventional content creation seeks a flawless veneer; Carter's methodology
  demands the opposite. For CCP, this is the anti-slop mechanism: instead
  of generating generic motivational advice, the agentic engine must extract
  the coach's core friction points, past failures, and authentic anxieties.
  These become the raw material from which all humor, Subtext, and engagement
  are constructed. Carter's Fundamental Truth #1: "Comedy Equals Truth Plus
  Pain — superficiality cannot sustain engagement."

core_move: >
  Mine the coach's authentic struggles, past failures, industry frustrations,
  and personal anxieties — classifying each as Hard, Weird, Scary, or
  Stupid — and use these as the foundational raw material for all content
  generation.

why_it_works: >
  Carter proves that audiences connect with shared struggle, not with
  polished perfection. The mechanism is recognition-through-vulnerability:
  when the coach names a specific pain point that the audience experiences
  but has never articulated, the audience bonds through the shock of
  being seen. The HWSS classifier (Hard, Weird, Scary, Stupid) provides
  a deterministic categorization for raw material that would otherwise be
  vague. "This is hard" → "THIS SPECIFIC THING is hard" → Setup with
  Attitude → Premise → Payoff. The classifier forces specificity.

examples:
  - context: "BOOK: The NEW Comedy Bible - The HWSS Classifier"
    application: >
      Carter insists that comedy equals Truth + Pain. The creator must mine their authentic experiences and classify them as Hard, Weird, Scary, or Stupid.
    effect: >
      Ensures the raw material contains genuine emotional charge, replacing superficiality with resonant vulnerability.

  - context: "CCP: Guardian Agent - Voice DNA Intake"
    application: >
      During onboarding, the system extracts the coach's core friction points by asking what they find Hard, Weird, Scary, or Stupid about their industry, populating the `active_struggle_register`.
    effect: >
      The LLM is provided with authentic, emotionally charged raw material rather than relying on hallucinated or generic coaching tropes.

  - context: "CCP: CMF - The Topic Selection Matrix"
    application: >
      The content generation engine queries the HWSS register instead of SEO trends, prompting the coach to expand on specific, documented frustrations.
    effect: >
      Content inherently carries the coach's authentic Voice DNA because the premise is rooted in their actual lived experience.

  - context: "CCP: CCF - The 'Anti-Slop' Module Outlining"
    application: >
      When outlining a course module, the system asks the coach: 'What is the stupidest mistake you made when learning this?' and builds the lesson around the answer.
    effect: >
      The course material bypasses generic 'how-to' instruction and bonds the student to the coach through shared fallibility.

  - context: "CCP: V2WS - The Origin Story Authenticator"
    application: >
      The webinar's 'Hero's Journey' segment is constructed explicitly from the 'Scary' and 'Hard' registers, preventing the story from feeling like a polished, manufactured marketing asset.
    effect: >
      The audience trusts the origin story because it contains the unvarnished friction of reality, rather than a sanitized success narrative.

anti_examples:
  - description: >
      The CMF generates content topics from SEO keyword research alone:
      'Top 10 Coaching Tips for Beginners' — no connection to the
      coach's authentic experience.
    why_it_fails: >
      Carter's Fundamental Truth: "Superficiality cannot sustain
      engagement." SEO-driven topics may attract clicks but produce
      no bonding because the content has no authentic emotional charge.
      The coach cannot deliver genuine Attitude on a topic they have
      no personal relationship with.

  - description: >
      The coach provides a polished, positive summary of their expertise
      during intake: 'I help people grow their businesses through
      strategic planning and accountability.' No pain, no struggle,
      no friction.
    why_it_fails: >
      This is the "flawless veneer" Carter explicitly rejects. The
      polished summary contains zero raw material for humor. The
      Guardian Agent must probe beneath the veneer: 'What about
      strategic planning makes you want to scream? What's the stupidest
      thing about accountability culture?'

