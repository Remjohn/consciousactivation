misuse_modes:
  - "Trauma mining — pushing the coach into genuinely painful territory that requires therapeutic processing, not content extraction"
  - "Stale pain — using the same HWSS entries repeatedly until the authentic charge is exhausted and the content feels recycled"
  - "Generic HWSS — accepting vague answers ('marketing is hard') without probing for the SPECIFIC hard thing"

