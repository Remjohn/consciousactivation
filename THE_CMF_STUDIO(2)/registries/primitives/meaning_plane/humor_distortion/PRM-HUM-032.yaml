trigger_conditions:
  - "Text generation schema detects a list structure of 3+ items; system must evaluate conversion to a Rule of Three pattern break"
  - "V2WS script enters a problem-agitation phase; lists of pains must deploy the Turn on the third item"
  - "JIT Compiler identifies flat, informational pacing; Rule of Three must be injected to provide structural comedic energy"

suppression_conditions:
  - "List contains genuinely instructional or safety-critical steps where a pattern break would compromise execution"
  - "Content sequence has already deployed 2+ consecutive Rule of Three structures; further deployment causes pattern-fatigue"

misuse_modes:
  - "Predictable Turns — the audience learns to expect the absurd third item, converting the surprise into a formula"
  - "Forced absurdity — the Turn has no logical connection to the first two items, producing confusion rather than surprise"
  - "Turn-only lists — every list uses the Turn, eliminating the possibility of genuine informational lists when needed"

synergizes_with:
  - "PRM-HUM-006"  # Temporal Resolution Delay — the Turn must land at the terminal position of the list
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — the contrast between congruent items and the Turn must be maximally heightened
  - "PRM-HUM-030"  # Setup-Premise-Payoff — the first two items function as setup; the Turn IS the payoff

conflicts_with:
  - "PRM-HUM-007"  # Production Over-Saturation — the Rule of Three demands precision (exactly 3 items); Over-Saturation demands volume. The conflict is resolved by generating many Rule-of-Three variations and pruning

