notes: >
  Highest AGF in Batch 5 (50/50 tied with Setup-Premise-Payoff) — trivially
  programmable as a schema constraint. Float note: goal_bias.surprise is
  ceiling (0.9) because the Turn IS a prediction error. The Rule of Three
  is the most compact humor structure — it requires the least setup for
  maximum surprise. It is also the most vulnerable to overuse because the
  audience learns the pattern after 3-4 deployments.
