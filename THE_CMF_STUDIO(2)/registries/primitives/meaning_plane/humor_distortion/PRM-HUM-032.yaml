summary: >
  The Rule of Three exploits the brain's pattern-recognition wiring: two
  congruent items establish an expectation, then the third item violently
  subverts it. Carter identifies this as essential for list-building in
  scripts and content — whenever a CCP agent lists benefits, problems, or
  steps, the third item must break the cadence and introduce a conceptual
  left-turn. The mechanism is minimal cognitive investment for maximum
  surprise: two items is the minimum needed to establish a pattern, and
  the third is the most efficient position for the violation. More items
  before the turn dilute the anticipation; fewer make the pattern invisible.

core_move: >
  List two congruent items that establish a clear pattern, then deliver
  a third item that violently subverts the established expectation —
  the Turn.

why_it_works: >
  The human brain is optimized for pattern recognition and prediction.
  Carter demonstrates that the Rule of Three exploits this by providing
  the minimum data for pattern formation (two items), then weaponizing
  the brain's prediction against it. The audience's prediction engine
  extrapolates from items 1 and 2 to predict item 3. When the Turn
  arrives, the prediction error IS the comedy. The audit scores this at
  50/50 for Automated Generation Feasibility — the structure is trivially
  programmable as a schema constraint for any list-based content.

examples:
  - context: "BOOK: The NEW Comedy Bible - Pattern Interruption"
    application: >
      Carter outlines the structural necessity of listing exactly two congruent items to establish a pattern, then deploying a third item (The Turn) to violently subvert that expectation.
    effect: >
      Weaponizes the brain's prediction engine against itself. The prediction error caused by the third item IS the comedy, providing maximum surprise for minimal cognitive investment.

  - context: "CCP: V2WS - The Problem-Agitation List"
    application: >
      During the webinar, the coach lists pains: 'You're spending thousands on ads, posting five times a day, and realizing your true passion is living off-grid in a cave.'
    effect: >
      The built-up tension from the genuine pain points is released by the absurd third item, functioning as a psychological circuit breaker before the pitch.

  - context: "CCP: CMF - The Carousel Structure Engine"
    application: >
      The JIT Compiler formats listicle carousels to ensure the final item breaks the established frame (e.g., 'Sign 3: You just saved this carousel instead of doing the work.').
    effect: >
      Converts passive consumption into self-aware engagement, generating a meta-laugh and increasing the likelihood of conversion.

  - context: "CCP: CBCS - The Escalation Reframe"
    application: >
      The agent addresses client overwhelm by listing two real tasks and one absurd one: 'Okay, we need to fix the landing page, draft the email, and then figure out how to clone you.'
    effect: >
      Lowers the client's emotional arousal state. The structural joke relieves the pressure without invalidating the actual workload.

  - context: "CCP: CCF - The Module Hook"
    application: >
      Course modules are introduced using the Rule of Three to prevent academic monotony, ensuring the student encounters a pattern break before the instructional content begins.
    effect: >
      Signals to the student that the learning environment is dynamic and requires active attention.

anti_examples:
  - description: >
      A CMF hook lists five items with no Turn: 'You need better
      messaging, a clear offer, a funnel, consistent content, and
      patience.' All five items are congruent.
    why_it_fails: >
      Without a Turn, the list is informational rather than comedic.
      The brain's pattern engine is satisfied (predictions confirmed)
      rather than subverted (predictions violated). Five congruent items
      produce diminishing attention rather than escalating engagement.

  - description: >
      A list uses the Turn on item 2 instead of item 3: 'You need
      better messaging, a pet iguana named Gerald, and a clear offer.'
      The pattern is broken too early.
    why_it_fails: >
      With only one item before the Turn, no pattern exists to subvert.
      The iguana feels random rather than surprising because the brain
      had insufficient data to form a prediction. The Rule of Three
      requires exactly two congruent items before the violation.

