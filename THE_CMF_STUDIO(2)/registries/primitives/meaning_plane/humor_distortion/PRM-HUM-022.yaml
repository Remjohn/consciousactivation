notes: >
  The audit scores this lowest on Implementation Feasibility (IF: 30/50)
  because text-only character masks are difficult without sounding forced.
  This primitive works best in performative surfaces (voice, video). Float
  note: surface_fit.voice is ceiling (0.9) because vocal character shifts
  (tone, cadence, volume) are the most natural and effective medium for
  mask deployment. goal_bias.memorability is high (0.8) because characters
  are inherently sticky — audiences remember the Guru Bro long after they
  forget the insight.
