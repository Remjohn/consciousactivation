trigger_conditions:
  - "CMF is generating content attacking a widely held toxic belief where direct audience confrontation would trigger reactance"
  - "Context Premise graph contains a well-defined Enemy Typology or 'Past Self' node with specific, characterizable traits"
  - "Output surface is performative (video short, webinar script, voice note) where character embodiment functions naturally"

suppression_conditions:
  - "Content surface is pure text without narrative framing; text-only character masks risk reading as unhinged or schizophrenic"
  - "Coach's validated Voice DNA relies on absolute, unbroken earnestness, where character assumption would shatter trust"

misuse_modes:
  - "Extended habitation — staying in the character mask for too long, causing the audience to forget which voice is the coach's authentic one"
  - "Mask-as-opinion — using the character to voice the coach's own genuine contempt while maintaining plausible deniability ('I was just doing a character')"
  - "Stereotype embodiment — adopting demographic characteristics rather than universal human flaws"

synergizes_with:
  - "PRM-HUM-008"  # Character Funny Filter — the Character Mask IS a specific deployment of the Character Filter
  - "PRM-HUM-011"  # Archetype Shorthand — the mask should leverage a recognized Archetype for instant cognitive load reduction
  - "PRM-HUM-021"  # Irony Inversion — the character can be used to deliver ironic endorsement of the enemy's position

conflicts_with:
  - "PRM-HUM-015"  # Persona Sculpting — temporary character masks must be clearly delineated from the coach's sculpted authentic persona

