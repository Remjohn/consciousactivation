summary: >
  The Character Mask primitive enables the coach to temporarily step into
  a well-defined character archetype — typically the Enemy Typology or a
  Past Naive Self — to deliver uncomfortable truths from a psychologically
  safe distance. Dikkers defines a comedic character as "a very simply drawn,
  two-dimensional character who has no more than 1-3 traits" (line 1827).
  When the coach assumes this character, they voice the audience's worst
  fears or most foolish assumptions without adopting them as the coach's
  actual brand voice. The audience laughs at the character while recognizing
  their own shadow in the mirror.

core_move: >
  Embody a clearly defined, 1-3 trait character (typically the Enemy or
  Past Self) to voice uncomfortable truths that the coach's authentic voice
  cannot safely deliver — creating a mirror for the audience's self-recognition.

why_it_works: >
  Dikkers shows that Character works because "readers don't see comedic
  characters as real, nor do they want to" — the character "represents a
  fundamental flaw that all human beings share" (lines 1850-1851). The
  mechanism is safe confrontation: the audience can laugh at the character's
  flaws without feeling personally attacked, yet the recognition of their
  own behavior within the character produces the therapeutic insight.
  The distance between coach and character provides permission to voice
  extreme positions that the coach's authentic persona could never sustain.

examples:
  - context: "BOOK: The Elements of Humor - Enemy Embodiment"
    application: >
      Dikkers defines a comedic character as a simply drawn, two-dimensional figure with 1-3 traits. The creator assumes this character to voice uncomfortable truths from a psychologically safe distance.
    effect: >
      Provides a safe mirror. The audience laughs at the absurdity of the character's flaws without feeling personally attacked, enabling therapeutic recognition.

  - context: "CCP: CCF - The 'Guru Bro' Antagonist"
    application: >
      The coach assumes the 'Guru Bro' mask for 30 seconds, delivering toxic hustle-culture advice with total conviction. Then, they drop the mask and deliver the real insight in their authentic voice.
    effect: >
      Allows the coach to violently attack the toxic premise without directly attacking the audience's past behavior.

  - context: "CCP: CBCS - The Inner Critic Ventriloquism"
    application: >
      The agent temporarily adopts the extreme voice of the client's limiting belief: 'Let me channel your inner voice: YOU CANNOT RAISE PRICES BECAUSE EVERYONE WILL REALIZE YOU'RE A FRAUD.'
    effect: >
      Externalizes the internal narrative. The client laughs at the absurdity of the character, creating cognitive distance from the belief and allowing the CBCS to dismantle it.

  - context: "CCP: CMF - The 'Past Self' Dialogue"
    application: >
      The hook features a dialogue between the coach's current self and their naive, 5-years-ago self (the character mask), who holds all the foolish assumptions the target audience currently holds.
    effect: >
      Provides the audience a safe proxy. They learn the lesson by watching the 'past self' get corrected, bypassing reactance.

  - context: "CCP: V2WS - The Objections Typology"
    application: >
      During the pitch, the coach literally acts out the 3 most common buyer objections as distinct, slightly absurd characters (The Procrastinator, The Perfectionist), addressing them directly.
    effect: >
      Disarms sales tension. The objections are acknowledged and neutralized through comedic performance before the audience can weaponize them internally.

anti_examples:
  - description: >
      The coach adopts a character mask but makes it vague — 'some people
      say you should just work harder' — without defining clear traits
      or a recognizable archetype.
    why_it_fails: >
      Dikkers mandates 1-3 clear traits. A vague, unnamed character
      fails to activate the audience's pattern-matching. They don't know
      WHO to laugh at, so they laugh at nothing. The mask must be a
      specific, recognizable archetype with defined traits.

  - description: >
      The coach uses the Character Mask to embody a marginalized group
      for comedic effect — adopting the speech patterns of a specific
      ethnicity or social class.
    why_it_fails: >
      Dikkers explicitly differentiates Archetypes from Stereotypes:
      "Stereotypes are Archetypes gone wrong" (line 1933). The Character
      Mask must target universal human flaws (vanity, cowardice, greed),
      never demographic characteristics.

