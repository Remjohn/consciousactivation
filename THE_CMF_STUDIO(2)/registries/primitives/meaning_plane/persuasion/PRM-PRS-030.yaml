trigger_conditions:
  - "When initiating the 'Design Brief' phase for any new content series or coaching module"
  - "When a script feels dense, overly academic, or plagued by jargon"
  - "When a coach is visibly frustrated that clients 'just aren't getting it'"

suppression_conditions:
  - "During advanced, post-certification training where the audience has a verified, highly mature mental model and step-skipping is required for efficiency"

misuse_modes:
  - "Dumbing Down — confusing 'starting where they are' with 'treating them like children,' which insults the audience's intelligence rather than building a bridge"
  - "The Performance Ego — framing the content as a 'gift' but actually designing it to show off the coach's brilliance, which the audience's bullshit detector catches instantly"

synergizes_with:
  - "PRM-PRS-020"  # The Audience Journey Map (The map defines the starting point for the idea-building process)
  - "PRM-PRS-016"  # The Audience-as-Hero / Presenter-as-Mentor Inversion (Idea-building is the mentor's primary job)

conflicts_with:
  - "PRM-HUM-009"  # High-Fidelity Information Transfer — pure optimized data transfer often assumes a mature starting point, conflicting with the need to slowly build foundational bricks

crosswalk_id: "XW-USER-ONBOARDING"
crosswalk_note: "Experience design uses this for UI onboarding: never introducing advanced features until the foundational UI mental model is established."

notes: >
  This primitive shifts the entire orientation of content creation from 'broadcasting expertise'
  to 'architecting understanding.' It is the antidote to the curse of knowledge.
