trigger_conditions:
  - "When outlining the macro-structure of any webinar, beat cluster, or coaching curriculum"
  - "When auditing a script that relies on 'listicles' (e.g., Top 10 ways to...)"
  - "When a client is overwhelmed and needs complex information synthesized quickly"

suppression_conditions:
  - "During pure brainstorming phases where categorization into three buckets would prematurely limit the generation of ideas"

misuse_modes:
  - "The Sledgehammer Fit — forcing three entirely unrelated concepts together just to satisfy the rule, destroying logical coherence in the process"
  - "False Simplicity — stripping away necessary nuance just to hit the number three, reducing a complex subject to unhelpful platitudes"

