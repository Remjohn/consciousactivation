crosswalk_id: "XW-UI-TRIAD"
crosswalk_note: "Experience design applies this to UI layout: never presenting the user with more than three primary choices/buttons on a single screen to prevent choice paralysis."

notes: >
  This primitive turns the psychological reality of working memory into a structural mandate.
  If you have four points, you have one point too many.
