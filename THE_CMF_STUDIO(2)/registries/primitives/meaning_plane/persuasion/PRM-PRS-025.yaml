summary: >
  The Rule of Three Message Architecture is a structural primitive that enforces the biological
  limits of short-term memory. It dictates that any persuasive argument or presentation must
  be organized into exactly three core pillars. In CCP, this primitive is operationalized as
  the 'Message Map'—a single-page framework requiring one overarching headline supported by
  three (and only three) key messages, eliminating cognitive overwhelm and ensuring the audience
  can actually recall the content after the session ends.

core_move: >
  Structure all content using a strict Message Map: one overarching headline (Big Idea) supported by exactly three core pillars, rejecting any structure that attempts to deliver four or more main points.

why_it_works: >
  Contemporary neuroscience has revised George Miller's famous "Magical Number Seven" down to
  three or four chunks of information. The human working memory simply cannot hold a 10-point
  list. When a speaker presents five, seven, or twelve main points, the audience remembers none
  of them. The Rule of Three is deeply embedded in human culture (life, liberty, pursuit of
  happiness; blood, sweat, tears) because it matches our neural architecture. By forcing content
  into three buckets, the speaker reduces the cognitive load of processing structure, allowing
  the audience to dedicate their mental bandwidth to processing the *meaning* of the content.

examples:
  - context: "BOOK: Talk Like TED - Paint a Mental Picture"
    application: >
      Gallo cites neuroscience revising working memory limits down to 3-4 chunks. A speaker must use the "Rule of Three" (a Message Map with one headline and exactly three supporting pillars). If you have four points, you have one too many, and the audience remembers none.
    effect: >
      By reducing the cognitive load required to process the structure, the audience dedicates their bandwidth to processing the actual meaning.

  - context: "CCP: CCF - Module Consolidation"
    application: >
      A coach outlines "The 7 Habits of High-Performing Teams." The CCF agent rejects it due to working memory constraints, guiding the coach to nest the seven habits under three core pillars: (1) Unfiltered Conflict, (2) Extreme Alignment, (3) Peer Accountability.
    effect: >
      The audience easily holds the entire framework in their head. The simple macro-structure makes them feel competent and capable of execution.

  - context: "CCP: Telegram - Asynchronous Intervention"
    application: >
      A client sends a panicked message about five overlapping crises. The coach replies using the Rule of Three: "We are solving this by focusing on three things: 1. Cash flow today. 2. Your emotional state. 3. Delegating the HR issue."
    effect: >
      The client's anxiety drops immediately. The chaotic reality is conceptually tamed by organizing it into three manageable buckets.

  - context: "CCP: V2WS - Pitch Slide Design"
    application: >
      The V2WS slide generator refuses to build a pricing slide that lists 12 separate deliverables in bullet points. It forces the coach to group the deliverables into three distinct phases of the program.
    effect: >
      The prospect perceives the offer as a structured, understandable journey rather than an overwhelming pile of random tasks.

  - context: "CCP: CMF - Beat Cluster Scoping"
    application: >
      Before generating a visual storyboard, the CMF engine verifies that the cluster does not contain more than three distinct visual metaphors. If a fourth is introduced, it is flagged for deletion to maintain visual coherence.
    effect: >
      The visual language remains tight and iconic, ensuring the viewer can recall the exact imagery associated with each of the three main points.

anti_examples:
  - description: >
      A 60-minute webinar that promises "12 Secrets to Tripling Your Revenue," where the
      speaker spends 5 minutes on each secret.
    why_it_fails: >
      It violates working memory limits. By secret number 5, the audience has forgotten secrets
      1 through 3. The presentation feels like a relentless onslaught of disjointed tactics.
      The audience leaves feeling overwhelmed, remembering only the vague sensation of anxiety
      rather than any actionable advice.

