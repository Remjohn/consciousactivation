crosswalk_id: "XW-ONBOARDING-GREETING"
crosswalk_note: "Experience design uses this principle: greeting a user warmly and addressing their immediate pain point before asking them to configure complex app settings."

notes: >
  This primitive is the non-negotiable gateway to persuasion. It dictates that if you do
  not have connection, nothing else you do matters.
