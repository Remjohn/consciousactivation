trigger_conditions:
  - "When designing the first 60 seconds of any new content asset, presentation, or webinar"
  - "When auditing a coach whose feedback indicates they are perceived as 'arrogant,' 'distant,' or 'too corporate'"
  - "When a client is defensive or resistant at the beginning of a 1-on-1 coaching session"

suppression_conditions:
  - "During emergency crisis communication where the audience demands immediate tactical instruction and connection-building would feel inappropriately slow"

misuse_modes:
  - "Weaponized Vulnerability — sharing a heavily curated, fake 'failure' story strategically designed to manipulate the audience into liking the speaker, which the audience detects as a sociopathic tactic"
  - "The Endless Warm-Up — spending 15 minutes trying to be funny or relatable while the audience becomes increasingly frustrated that the actual content hasn't started"

