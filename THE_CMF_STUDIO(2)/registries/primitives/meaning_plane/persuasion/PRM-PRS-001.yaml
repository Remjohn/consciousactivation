trigger_conditions:
  - "Initiating any new CMF Beat Cluster or CCF script arc"
  - "When a drafted hook reads like an encyclopedia entry rather than a coaching intervention"
  - "During V2WS webinar framing to ensure the event has a clear intellectual center of gravity"

suppression_conditions:
  - "When writing pure transitional or connective tissue between already-established strong beats"
  - "When generating an emergency response to a highly specific, in-progress client crisis where formatting is secondary"

misuse_modes:
  - "Clickbait decoupling — creating a highly provocative title that the subsequent content fails to actually address or resolve"
  - "Over-promising — writing a title that sets an impossible standard (e.g., 'The only secret you need') that damages Ethos when unfulfilled"

