trigger_conditions:
  - "When reviewing video or audio deliveries where the coach sounds like they are reading, even if they aren't"
  - "When the audience feedback notes that the content is good but the speaker is 'boring' or 'disconnected'"
  - "When a coach complains that scripted content feels 'fake' to them"

suppression_conditions:
  - "During initial table-reads or script drafting phases where the focus is entirely on structural integrity, not delivery performance"

misuse_modes:
  - "The 'Be Natural' Trap — giving vague directorial feedback like 'just relax and be yourself,' which provides no actionable mechanism for a coach trapped in the Valley"
  - "Retreating to the Teleprompter — abandoning the effort to internalize the script and permanently settling for reading from a screen, locking the delivery at Stage 1 forever"

synergizes_with:
  - "PRM-PRS-028"  # The Authenticity Imperative (Overcoming the Uncanny Valley is the mechanism for achieving this authenticity)
  - "PRM-PRS-010"  # The Four Intents of Authentic Delivery (The intents cannot be executed if the speaker is stuck in the Valley)

conflicts_with:
  - "PRM-HUM-005"  # Absolute Verisimilitude — if a speaker is in the Uncanny Valley, the audience's belief in the reality of the moment is shattered

