summary: >
  The Uncanny Valley Warning is a delivery diagnostic primitive that identifies when a speaker
  has memorized a script but failed to internalize it. In this 'valley,' the delivery is
  technically correct but emotionally dead, appearing robotic and generating audience distrust.
  In CCP, this acts as a critical safeguard against AI-generated scripts turning coaches into
  teleprompter-reading automatons. The prescribed fix is never 'less preparation'; it is
  pushing *through* the valley via relentless rehearsal until the material becomes 'a tune
  you know by heart.'

core_move: >
  Identify deliveries that feel memorized but mechanical, and intervene with a rehearsal protocol designed to internalize the script so deeply that the speaker's natural prosody and presence return.

why_it_works: >
  Anderson maps preparation on a four-point spectrum: (1) Reading (honest but disconnected),
  (2) Memorized but mechanical (The Uncanny Valley), (3) Internalized (the words flow automatically),
  and (4) Present (the speaker can improvise within the structure). Most speakers stop at
  stage 2. They know the words, but the cognitive load of retrieving them strips their delivery
  of spontaneous micro-expressions, natural pauses, and genuine eye contact. The audience's
  mirror neurons detect this performance as inauthentic. The only way out of the valley is
  to rehearse the material until retrieval requires zero cognitive effort, freeing the brain
  to focus entirely on meaning and connection.

examples:
  - context: "BOOK: TED Talks Guide - Scripting"
    application: >
      Anderson maps preparation on a spectrum. The "Uncanny Valley" occurs when a speaker has memorized a script but not internalized it. The cognitive load of retrieving words strips delivery of natural prosody. The fix is pushing *through* the valley via relentless rehearsal.
    effect: >
      When retrieval requires zero cognitive effort, the brain is free to focus entirely on meaning and connection, restoring authentic presence.

  - context: "CCP: CMF - Delivery Review"
    application: >
      A coach records a beat cluster perfectly matching the AI script, but the CMF agent flags Uncanny Valley markers: fixed gaze, predictable inflection. The agent rejects the take and forces the coach to deliver the message in their own words before returning to the script.
    effect: >
      Reconnecting with the meaning allows the coach to control the script, rather than the script controlling them. The resulting delivery feels spontaneous.

  - context: "CCP: V2WS - Rehearsal Diagnostic"
    application: >
      During a webinar dry-run, the coach sounds stiff. Instead of vaguely telling them to "be natural," the V2WS system forces them to run the script 10 times at high speed, then 5 times while walking around the room.
    effect: >
      Physical and repetitive overload forces the script into muscle memory. By the live session, the coach isn't remembering lines; they are just speaking their truth.

  - context: "CCP: CCF - The Teleprompter Ban"
    application: >
      A coach preparing a high-stakes signature talk relies heavily on a teleprompter, resulting in a robotic cadence. The CCF agent temporarily disables the teleprompter feature during practice sessions to force genuine recall.
    effect: >
      The initial panic subsides into genuine internalization, preventing the coach from permanently settling at Stage 1 (reading) preparation.

  - context: "CCP: Conscious Reactions - Improvisational Recovery"
    application: >
      When a coach stumbles over a word in an audio broadcast, the Guardian agent prevents them from deleting and re-recording it perfectly. It requires them to keep rolling and recover naturally.
    effect: >
      The slight imperfection signals to the audience that the speaker is not an AI automaton, ironically increasing the perceived credibility of the message.

anti_examples:
  - description: >
      A coach feels stiff reading an AI-generated script, so they decide to 'wing it' on camera
      to appear more authentic.
    why_it_fails: >
      They retreat from the Uncanny Valley (Stage 2) back to improvisational chaos. They lose
      the throughline, ramble for 8 minutes, and fail to deliver the core framework clearly.
      The illusion of authenticity does not compensate for the lack of respect for the
      audience's time and cognitive load.

