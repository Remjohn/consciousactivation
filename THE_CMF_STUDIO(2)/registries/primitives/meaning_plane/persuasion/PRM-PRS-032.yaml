crosswalk_id: "XW-TOOLTIP-PROGRESSION"
crosswalk_note: "Experience design uses this: tooltips that build on each other sequentially, explaining a new UI feature using a metaphor of a familiar physical tool."

notes: >
  This primitive is the antidote to the Curse of Knowledge. It proves that the hallmark
  of true expertise is not complexity, but the ability to translate complexity into clarity.
