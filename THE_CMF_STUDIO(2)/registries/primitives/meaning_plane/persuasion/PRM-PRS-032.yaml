trigger_conditions:
  - "When drafting content designed to teach a new conceptual framework or complex methodology"
  - "When audience feedback indicates a previous module was 'too academic,' 'confusing,' or 'too fast'"
  - "When a coach is struggling to explain their proprietary system to a beginner audience"

suppression_conditions:
  - "When delivering pure Narrative (storytelling) where analytical explanation would ruin the emotional flow and pacing"

misuse_modes:
  - "Dumbing Down — reducing the complexity so much that the concept loses its truth or power, rather than doing the hard work of translating the complexity accurately"
  - "The Mixed Metaphor — using three different metaphors in the span of two minutes to explain one concept, creating profound cognitive confusion"

