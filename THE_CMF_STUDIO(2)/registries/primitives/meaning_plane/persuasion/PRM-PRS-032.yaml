summary: >
  The Explanation Engine is an instructional primitive that systematically translates complex,
  specialist knowledge into the audience's native conceptual language without 'dumbing it down.'
  It dictates a strict five-step protocol: establish 'what is' before 'how,' use metaphors
  to reveal structural shape, build in small incremental steps, clarify what the concept is
  *not*, and ground it in concrete audience examples. In CCP, this primitive is the quality
  gate for all educational and framework-teaching content.

core_move: >
  Translate complex concepts using a strict sequence: identify the gap in current understanding, provide a structural metaphor, build the new model incrementally, define negative boundaries, and validate with concrete examples.

why_it_works: >
  Anderson notes that explanation is the most technically demanding of the Five Talk Tools. True
  explanation is the act of walking an audience from their current mental model to an upgraded
  version. If the speaker jumps straight to the new model (skipping the gap) or uses specialist
  jargon (failing to translate), the audience gets lost. The Explanation Engine works because it
  respects cognitive load. Metaphors give an abstract concept immediate spatial 'shape' (e.g.,
  quorum sensing is like voting). Explaining what a concept is *not* quickly eliminates cognitive
  dead ends. Concrete examples pull the abstraction down into the audience's lived reality,
  making the new model feel true.

examples:
  - context: "BOOK: TED Talks Guide - Explanation"
    application: >
      Anderson states that Explanation is the act of walking an audience from their current mental model to an upgraded one. A strict sequence is required: identify the gap, provide a structural metaphor, build incrementally, define what it is *not*, and validate with concrete examples.
    effect: >
      This respects cognitive load. The metaphor provides spatial shape, the negative boundaries eliminate dead ends, and concrete examples pull the abstraction into reality.

  - context: "CCP: CMF - Framework Explanation"
    application: >
      A CMF beat explains "impact bias." The agent structures it: (1) Current model: "You think a promotion brings permanent happiness." (2) Metaphor: "Your brain is a terrible thermometer." (3) Example: "Lottery winners vs. paraplegics report identical happiness a year later."
    effect: >
      The complex concept is instantly accessible. The incorrect prediction serves as a cognitive shock that makes the explanation stick.

  - context: "CCP: CCF - Course Module"
    application: >
      Teaching financial forecasting, the coach uses the 'Explain What It's Not' technique: "This is not accounting. Accounting is where you have been. This is radar. It tells you what is about to hit you."
    effect: >
      Establishing negative boundaries stops the audience from applying incorrect mental models, saving massive amounts of cognitive friction.

  - context: "CCP: V2WS - The Metaphor Bridge"
    application: >
      A V2WS slide explains the difference between Marketing and Sales. Instead of bullet points, the AI generates a visual of planting seeds (Marketing) versus harvesting (Sales).
    effect: >
      The audience instantly grasps the structural relationship between the two distinct but connected operations before any technical details are discussed.

  - context: "CCP: Telegram - The Incremental Upgrade"
    application: >
      When a client is overwhelmed by "funnel metrics," the coach sends a 3-part voice note. Part 1 defines the top of the funnel. Part 2 builds the middle. Part 3 defines the bottom. They do not introduce Part 2 until Part 1 is fully established.
    effect: >
      The step-by-step translation prevents the client from feeling stupid, allowing them to internalize a complex system via a simple sequential path.

anti_examples:
  - description: >
      A technology coach attempts to explain blockchain by immediately diving into cryptographic
      hashing algorithms, distributed ledger consensus protocols, and Merkle trees, assuming the
      audience will synthesize the big picture from the technical details.
    why_it_fails: >
      This is the 'Curse of Knowledge' failure mode. Because the coach did not provide a
      structural metaphor first, and did not build from the audience's existing knowledge,
      the technical details have nowhere to land. The explanation is accurate but incomprehensible.

