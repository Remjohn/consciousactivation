trigger_conditions:
  - "AST visual analysis detects a cluttered user interface, slide, or visual asset leading to high drop-off rates"
  - "System detects a core coaching insight buried within dense, unformatted explanatory text"
  - "User needs to architect a fast, frictionless decision threshold in a Telegram flow"

suppression_conditions:
  - "Coaching moment requires pure auditory intimacy (e.g., a quiet voice note) where visual hierarchies do not apply"
  - "Goal of the interaction is intentional cognitive friction (e.g., deep reflection) where smooth affordance would bypass the necessary work"

misuse_modes:
  - "Dark Patterns — Using strong affordances to trick the user into an unintended action"
  - "Visual Noise — Adding fake depth or contrast that doesn't actually route attention"
  - "Device Mismatch — Designing a visual hierarchy for desktop that breaks completely on a mobile thumb-scroll"

