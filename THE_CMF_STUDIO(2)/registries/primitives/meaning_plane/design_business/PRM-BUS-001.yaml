summary: >
  Perception and Guidance Stack treats visual design not as a decorative layer,
  but as a unified cognitive and behavioral routing system. It integrates the
  gaze, Gestalt grouping, affordances, and multisensory cues into one coherent
  pathway that manages the user's attention and invites immediate action. It
  recognizes that users do not just look at a design; they actively search it
  and act upon it.

core_move: >
  Design visuals, text hierarchy, and action cues as one integrated system
  that controls where the eye goes and what the hand does next.

why_it_works: >
  According to Lupton's synthesis of Gestalt psychology and behavioral economics,
  the human brain actively seeks patterns to reduce cognitive load and feels 
  frustrated when patterns break randomly. By deliberately stacking visual hierarchy,
  clear affordances (cues that suggest how an object should be used), and
  consistent grouping, the design lowers the biological cost of comprehension
  and naturally guides the user toward the intended behavioral threshold.

examples:
  - context: "BOOK: Design Is Storytelling - The Gaze and Gestalt"
    application: >
      Lupton integrates the gaze, Gestalt grouping, affordances, and multisensory cues into one coherent pathway that manages attention. The brain seeks patterns to reduce cognitive load and feels frustrated when they break randomly.
    effect: >
      Lowers the biological cost of comprehension and naturally guides the user toward the intended behavioral threshold.

  - context: "CCP: CMF - Visual Hierarchy Design"
    application: >
      During carousel generation, the agent groups diagnostic symptoms closely together (proximity) and leaves massive negative space before a single, high-contrast CTA button with a drop shadow (affordance).
    effect: >
      The eye naturally falls to the button. Cognitive friction drops because the visual structure does the organizing work, maximizing click-through rates.

  - context: "CCP: Telegram - Mini App Onboarding"
    application: >
      The agent strips all decorative borders and secondary links from the flow, applying the heaviest visual weight to the 'Start First Reflection' button placed exactly where the thumb naturally rests.
    effect: >
      The path to action is unmistakable. The client doesn't need to read instructions; the interface's affordance pulls them directly into the primary workflow.

  - context: "CCP: V2WS - Slide Optimization"
    application: >
      A dense, bulleted webinar slide is flagged. The agent reconstructs it using color blocking to draw the gaze sequentially from a problem statement down to a singular insight.
    effect: >
      The audience isn't overwhelmed by text. The visual path explicitly mirrors the rhetorical argument.

  - context: "CCP: CCF - The 'Slow Down' Friction"
    application: >
      Conversely, when a user needs to confirm a destructive action (like deleting a course), the system intentionally removes smooth affordances, forcing them to manually type a confirmation word.
    effect: >
      Breaks the automated gaze cycle, forcing conscious cognitive engagement before an irreversible error occurs.

anti_examples:
  - description: >
      A webinar slide that fills every corner with text and uses three
      different contrasting colors for emphasis on different bullet points.
    why_it_fails: >
      When everything is emphasized, nothing is. The brain's pattern-recognition
      system (Gestalt) is overwhelmed by competing signals, destroying the
      hierarchy. The user stops reading because the visual environment requires
      too much effort to parse.

