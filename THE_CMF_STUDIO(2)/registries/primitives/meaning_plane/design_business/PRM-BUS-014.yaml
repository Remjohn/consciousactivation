summary: >
  Affordance as Invitation is the principle that a design should physically or
  visually communicate its own use. Just as a physical handle affords grasping
  and a flat plate affords pushing, digital content and UX should present clear,
  intuitive cues that invite the specific behavioral response desired, eliminating
  the need for extensive instructions.

core_move: >
  Design the interface, visual asset, or text prompt so that the desired next
  action feels completely obvious, available, and behaviorally inviting.

why_it_works: >
  Drawing on the concept of 'affordance' (coined by J.J. Gibson and popularized
  by Don Norman), Lupton illustrates that human perception is action-oriented. We
  don't just see objects; we see what we can do with them. When a digital button
  looks tactile, or a text prompt ends with a clear, single-action question, the
  user's cognitive load drops near zero. They do not have to translate 'what
  does this mean' into 'what should I do'; the design answers both simultaneously.

examples:
  - context: "BOOK: Beautiful Users - Behavioral Invitation"
    application: >
      Drawing on 'affordance', Lupton illustrates that perception is action-oriented. We see what we can do with objects. Digital content should present clear, intuitive cues that visually or verbally invite the specific behavioral response desired.
    effect: >
      Cognitive load drops near zero. The user does not have to translate 'what does this mean' into 'what should I do'; the design answers both simultaneously.

  - context: "CCP: CMF - The Visual CTA"
    application: >
      Instead of placing a generic URL at the bottom of a graphic, the agent designs a visual 'tear-away' tab or a pill-shaped button that resembles an interactive UI element, paired with 'Save this for your next launch'.
    effect: >
      The visual affordance triggers the user's learned habit of tapping/saving. The save rate increases because the design suggested the physical behavior.

  - context: "CCP: Telegram - The Micro-Prompt"
    application: >
      The coach finishes a voice note by explicitly stating the affordance: 'Don't overthink it, just hold the mic button right now and give me your gut reaction in 10 seconds.'
    effect: >
      The verbal instruction perfectly maps to the physical interface of Telegram, turning passive listening into an immediate active dialogue.

  - context: "CCP: V2WS - The Single Path"
    application: >
      On the webinar registration page, all navigation links (About, Contact, Blog) are stripped away. The only clickable element on the screen is the brightly colored 'Reserve My Seat' button.
    effect: >
      The affordance is singular and uncompetitive. The user is behaviorally routed to the only available action, maximizing conversion.

  - context: "CCP: CCF - The 'Reply' Cue"
    application: >
      When sending a daily accountability check-in, the system automatically appends an inline keyboard with two buttons: '🟢 Done' and '🔴 Need Help'.
    effect: >
      The user doesn't even need to type. The UI affords a single-tap response, drastically reducing the friction of compliance.

anti_examples:
  - description: >
      An email newsletter with five different links embedded in dense paragraphs
      of text, all leading to different offers, articles, and social profiles,
      with no clear visual hierarchy.
    why_it_fails: >
      The affordances are muddy and competitive. The user cannot discern what
      the primary desired action is. Faced with too many unprioritized invitations,
      they choose none and archive the email.

