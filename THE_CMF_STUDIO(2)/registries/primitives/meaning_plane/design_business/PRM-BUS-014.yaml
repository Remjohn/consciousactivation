trigger_conditions:
  - "System requires the user to transition from passive consumption to taking a concrete action"
  - "Agent is designing Calls to Action (CTAs) for any visual or text surface in the CCP"
  - "Telemetry shows users are viewing content but failing to engage, share, or reply"

suppression_conditions:
  - "Goal is deep, uninterrupted reading or viewing, where a stark CTA would break the immersion"
  - "Agent intends for the user to pause and sit with discomfort, rather than immediately clicking away to escape the feeling"

misuse_modes:
  - "False Affordances — Making something look clickable when it isn't, causing frustration"
  - "Hidden Affordances — Relying on hidden gestures (like a complex swipe) that the user has to guess"
  - "Aggressive Affordances — Making the button so huge and flashing that it feels desperate and cheap"

