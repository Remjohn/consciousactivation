trigger_conditions:
  - "Audio payload is staged for final delivery to endpoint"
  - "Source content is LLM-generated or template-driven"
  - "Context indicates an early-stage lifecycle hook (Discovery, CCF Onboarding)"

suppression_conditions:
  - "Payload is pure diagnostic telemetry or data readout"
  - "Payload is an internal system log"
  - "Latency budget strictly prohibits evaluation (< 500ms required)"

misuse_modes:
  - "Using R.E.A.L. as a subjective veto to block shipping indefinitely"
  - "Scoring only Authentic and ignoring Liberating — creating empathy without action"
  - "Treating the gate as a one-time check rather than applying it at each revision cycle"

