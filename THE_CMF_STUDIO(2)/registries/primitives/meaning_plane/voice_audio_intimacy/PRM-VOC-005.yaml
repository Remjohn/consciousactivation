notes: >
  The R.E.A.L. gate is the holistic quality check that sits downstream of
  the Proofread Aloud gate (PRM-VOC-004). While 004 checks mechanical
  vocal quality, 005 checks experiential quality. Together they form the
  two-stage quality pipeline for all CCP audio outputs. The Liberating
  dimension is the most commonly failed in AI-generated content because
  LLMs default to descriptive rather than prescriptive closings. Agents
  must be specifically instructed to end with behavioral activation.
