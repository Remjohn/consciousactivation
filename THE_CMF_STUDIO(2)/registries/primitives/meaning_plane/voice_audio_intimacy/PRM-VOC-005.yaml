summary: >
  The R.E.A.L. Audio Quality Gate validates every CCP audio output against
  four non-negotiable experiential dimensions before any further polish is
  applied. Quicke's R.E.A.L. framework — Relatable, Engaging, Authentic,
  Liberating — is not a stylistic preference but a production maturity
  test. Content that is technically polished but fails any R.E.A.L.
  dimension should not ship. The primitive inverts the typical quality
  hierarchy: production value (compression, EQ, noise floor) is
  subordinate to experiential value (does this feel like a real human
  speaking to me about something that matters?).

core_move: >
  Validate that audio feels relatable, engaging, authentic, and
  liberating before adding more polish.

why_it_works: >
  Quicke structures his entire book around the R.E.A.L. framework as the
  backbone of voice development from Discoverer to Decoder. Each dimension
  maps to a specific listener-brain response: Relatable activates
  recognition ("this person understands my world"), Engaging sustains
  attention ("I want to keep listening"), Authentic triggers trust
  ("this is not performed"), and Liberating produces agency ("I feel
  empowered to act"). The key insight is that technically poor audio
  that scores high on R.E.A.L. outperforms technically excellent audio
  that scores low. Quicke warns against "prematurely discarding" early
  recordings that have authentic emotional power despite production
  imperfections. The mechanism is authenticity premium — listeners
  discount polished content that feels performed, while granting
  credibility to imperfect content that feels genuine. In CCP,
  AI-generated voice notes are at highest risk of scoring zero on
  Authenticity while scoring high on technical quality.

examples:
  - context: "BOOK: Finding Your Voice - R.E.A.L. Framework"
    application: >
      Quicke's framework tests audio against four experiential dimensions: Relatable, Engaging, Authentic, Liberating. Technical polish is subordinate to these dimensions.
    effect: >
      Content that feels genuine out-performs technically perfect but performed content.

  - context: "CCP: CMF - Pre-Delivery Evaluation"
    application: >
      After TTS rendering, the R.E.A.L. gate scores the output. Does it reference the coach's actual situation (Relatable)? Does it have a strong opening (Engaging)? Does it sound natural (Authentic)? Does it end with action (Liberating)?
    effect: >
      Only audio that passes all four dimensions ships.

  - context: "CCP: CCF - Discovery-Mode Hook Validation"
    application: >
      An audio hook scores high on Engaging but fails Liberating (ends with "hope this helps"). The close is rewritten to: "Try this with your next client and tell me what happens."
    effect: >
      The prospect is activated, transforming passive consumption into behavioral intent.

  - context: "CCP: Conscious Reactions - Post-Recording Audit"
    application: >
      The coach's recorded voice note is analyzed. The agent flags it as failing "Authenticity" because the coach is using a "radio voice" rather than their natural register.
    effect: >
      The coach is prompted to re-record using their normal speaking voice.

  - context: "CCP: CBCS - Routine Check-In Filter"
    application: >
      A perfectly clean audio recording is blocked because it fails the "Relatable" check—it offers generic motivational advice instead of acknowledging the coach's specific struggle that week.
    effect: >
      The coach receives contextual empathy rather than generic noise.

anti_examples:
  - description: >
      A CBCS voice note is technically perfect — studio-quality
      recording, professional compression, zero noise floor — but
      the content is generic motivational advice ("believe in yourself,
      keep pushing") delivered in a flat, even cadence with no
      reference to the coach's actual situation.
    why_it_fails: >
      The note scores zero on Relatable (no personal reference),
      low on Engaging (no hook, predictable content), zero on
      Authentic (the evenness signals scripted performance), and
      zero on Liberating (no actionable next step). Quicke's
      framework predicts this will be experienced as "content noise"
      regardless of production quality.

