book_reference:
  title: "Finding Your Voice in Radio, Audio, and Podcast Production"
  author: "Rob Quicke"
  chapters:
    - "Introduction: The R.E.A.L. Framework"
    - "Outro: The R.E.A.L. Manifesto"
  key_pages: "1-16, 289-302"
