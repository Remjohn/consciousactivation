trigger_conditions:
  - "Payload requires emotional resonance beyond factual delivery"
  - "Source material references a specific episodic memory"
  - "Target surface is audio-only (no visual support)"

suppression_conditions:
  - "Target is a factual data summary"
  - "Context state indicates rapid tactical instruction required"
  - "Target surface has accompanying visual media rendering the scene"

misuse_modes:
  - "Purple prose — over-describing scenes until the listener disengages from excessive detail"
  - "Fictional scenes — constructing imagery that does not match the coach's real situation"
  - "Emotional manipulation — using vivid imagery to exploit vulnerability rather than serve growth"

