notes: >
  This primitive is the CCP version of what the Radio Drama Handbook
  calls "the blind medium's greatest strength." The listener's imagination
  always produces a more personally resonant image than any externally
  provided visual. In the Sonic Scribe pipeline, theatre-of-the-mind
  should be activated for coaching moments that involve behavioral change
  — the coach needs to see themselves in the scene to act on the advice.
  Note the intentional tension with PRM-VOC-001: theatre adds load that
  the distracted ear may not process. The resolution is contextual —
  use theatre when the listener is in focused-listen mode, not during
  commute-mode delivery.
