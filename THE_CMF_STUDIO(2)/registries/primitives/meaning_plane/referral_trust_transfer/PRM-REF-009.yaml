trigger_conditions:
  - "Prospect resists the insight or explicitly attempts to commoditize the offering (e.g., asking for discounts)"
  - "UI state immediately follows the revelation of a significant performance gap or low benchmark score"
  - "Designing the transition point between the 'Cost of Inaction' and the 'Offer Reveal' in a webinar"

suppression_conditions:
  - "AST analysis detects prospect is in a state of high emotional anxiety or overwhelm requiring immediate stabilization"
  - "Interaction is in the first 60 seconds of rapport building before the 'Commercial Reframe' has been earned"

misuse_modes:
