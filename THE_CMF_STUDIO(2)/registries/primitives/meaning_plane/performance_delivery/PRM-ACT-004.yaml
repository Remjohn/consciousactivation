summary: >
  Organize the performance around a meaningful contrastive movement instead of
  flat informational flow. Shift constantly between structural, emotional, and
  delivery registers to prevent the audience's attention from normalizing.

core_move: >
  Organize performance around a meaningful contrastive movement.

why_it_works: >
  Port synthesizes Aristotle's three-act structure with the principle of "triple
  contrast": structural, emotional, and delivery contrast. A performance that
  stays in one register—even a highly energetic or inspiring one—eventually
  causes attention normalization. By deliberately shifting from data to story,
  from loud to quiet, or from humor to gravity, the performer maintains
  perceptual novelty. This is the difference between an audience merely listening
  and an audience being captivated.

examples:
  - context: "BOOK: Steal the Show - Triple Contrast"
    application: >
      Port synthesizes Aristotle's three-act structure with "triple contrast": shifting between structural, emotional, and delivery registers. A performance that stays in one register causes attention normalization. Deliberately shifting from data to story maintains perceptual novelty.
    effect: >
      The audience is continually reset by the contrast. They remain captivated rather than merely listening.

  - context: "CCP: CMF - Beat Cluster Content Map"
    application: >
      A 5-minute video starts with a fast-paced story (Act I: Emotional/Fast), abruptly shifts to a calm data explanation (Act II: Intellectual/Still), and ends with an intimate, whispered call to action (Act III: Urgent/Quiet).
    effect: >
      The audience's attention cannot normalize. The transitions themselves become hooks that retain viewership to the end.

  - context: "CCP: V2WS - Webinar Hero Frame"
    application: >
      The V2WS agent audits a webinar script and flags an "inspirational" tone running for 45 minutes straight. It inserts a "contrast break" where the coach sits still, lowers their voice, and delivers a hard truth.
    effect: >
      The contrast breaks the monotony and anchors the uncomfortable truth deeply in the audience's memory.

  - context: "CCP: CCF - Long-Form Course Structuring"
    application: >
      When a coach is designing a 12-module course, the CCF platform forces a structural change every 3 modules (e.g., switching from screen-share tutorials to direct-to-camera philosophical lectures).
    effect: >
      Completion rates skyrocket because the learner's brain is refreshed by the changing mediums and emotional tones.

  - context: "CCP: Conscious Reactions - The Audio Pivot"
    application: >
      In a 3-minute Telegram audio, the coach starts by matching the client's high-stress energy (loud, fast), but at the 60-second mark, deliberately drops their voice to a slow, methodical whisper.
    effect: >
      The physical shift in the coach's delivery forces the client's nervous system to regulate and mirror the calm, making the advice actually land.

