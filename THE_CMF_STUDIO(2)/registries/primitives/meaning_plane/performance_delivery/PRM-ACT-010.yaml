summary: >
  Use posture, asymmetry, hand placement, and physical framing as the first
  layer of meaning. Before a word is processed, the body delivers the message.
  Ensure physical alignment directly supports the emotional thesis of the content.

core_move: >
  Align physical body language with the emotional thesis.

why_it_works: >
  Humans evolved to read posture, tension, and openness faster than language.
  As Adler, Knight, and Valenzuela outline in their portraiture frameworks, a
  slouched spine signals collapse, while an engaged chin and asymmetrical weight
  shift signal alert authority. Hands that have a clear purpose anchor a scene,
  while purposeless hands create awkwardness. In performance and visual generation
  alike, the body must dictate the narrative before the caption or voiceover does.

examples:
  - context: "BOOK: Picture Perfect Posing - Body Language Calibration"
    application: >
      Valenzuela, Adler, and Knight emphasize that posture, asymmetry, and physical framing are the first layer of meaning. Before a word is processed, the body delivers the message (e.g., a slouched spine signals collapse; an engaged chin signals authority).
    effect: >
      The body dictates the narrative before the voiceover. If physical alignment supports the emotional thesis, the audience instantly trusts the message.

  - context: "CCP: CCF - Visual Prompt Generation (CVE)"
    application: >
      Instead of prompting AI for a "powerful founder," the CCF agent specifies: "Elongated spine, chin projected forward, asymmetrical stance with weight on back foot, one hand anchoring a journal."
    effect: >
      The generated image bypasses abstract slop, creating a visceral, unmistakable pre-verbal signal of grounded authority.

  - context: "CCP: CMF - Video Recording Coaching"
    application: >
      A coach recording a nurturing, empathetic message is instructed by the CMF agent to soften their hands, lean inward slightly, and use a gentler head angle to break symmetrical stiffness.
    effect: >
      The visual framing perfectly harmonizes with the audio message. The coherent emotional thesis causes the audience to drop their defensive shields.

  - context: "CCP: V2WS - Webinar Posture Audit"
    application: >
      During a live webinar, the system detects the coach leaning back in their chair with crossed arms during the pitch phase. It flashes a private prompt: "Uncross arms. Lean forward. Engage."
    effect: >
      The coach immediately corrects their closed-off, defensive posture, preventing the audience from subconsciously rejecting the offer.

  - context: "CCP: Conscious Reactions - The Standing Audio"
    application: >
      When a coach needs to deliver a highly assertive, boundary-setting audio note in Telegram, the Guardian agent requires them to stand up, plant both feet shoulder-width apart, and look straight ahead while recording.
    effect: >
      Even though the client cannot see the coach, the physical alignment opens the diaphragm and injects a commanding, unshakeable resonance into the vocal delivery.

