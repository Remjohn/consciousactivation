summary: >
  Perform across real space, not theatrical space. For the camera (or mic),
  you do not need to project to the back row; you only need to reach the lens.
  Maintain absolute simplicity of external expression while maintaining
  maximum internal passion.

core_move: >
  Maintain absolute external simplicity with maximum internal passion.

why_it_works: >
  Tony Barr argues that the camera magnifies everything. Stage acting requires
  projecting across artificial space to the back row. Film acting requires
  communicating across real space—the lens is just a few feet away. Therefore,
  exaggerated theatricality reads as fake on screen. The actor must pull the
  energy inward: "Simplicity without loss of passion." The audience will
  do the work to empathize if the emotion is truthful and unforced.

examples:
  - context: "BOOK: Acting for the Camera - The Bottom Line"
    application: >
      Tony Barr argues that stage acting requires projecting across artificial space, which looks fake on film. Film acting requires communicating across real space—the lens is just a few feet away. The actor must maintain absolute external simplicity with maximum internal passion.
    effect: >
      By pulling the energy inward, the audience does the work to empathize. The emotion is truthful, unforced, and reads beautifully on camera or mic.

  - context: "CCP: CMF - Sonic Phase Recording"
    application: >
      A coach recording an intimate voice note on grief is told by the CMF agent to imagine the listener is sitting immediately next to them. The coach stops "projecting" their voice and speaks with quiet, intense, grounded passion.
    effect: >
      The listener feels intense parasocial intimacy, as if a friend is whispering a profound truth directly into their ear.

  - context: "CCP: CCF - Video Portrait Generation"
    application: >
      A coach shoots a close-up hero video. Instead of wide arm gestures and large facial expressions, they hold their body perfectly still, letting the internal intensity burn purely through their eyes and micro-expressions.
    effect: >
      The camera captures a magnetic, cinematic presence that feels incredibly premium, avoiding the exhausting "YouTube thumbnail" aesthetic.

  - context: "CCP: V2WS - The direct-to-lens pitch"
    application: >
      During the critical final 5 minutes of a webinar, the V2WS system instructs the coach to stop moving their hands, lean slightly into the lens, and drop their volume by 20%.
    effect: >
      The sudden physical simplicity forces the audience to lean in. The pitch feels like a serious, private conversation rather than a broadcast.

  - context: "CCP: Conscious Reactions - Telegram Audio"
    application: >
      A coach tends to use their loud "stage voice" for audio replies. The Guardian agent flags the clipping and instructs the coach to hold the phone exactly 2 inches from their mouth and speak as if they are in a library.
    effect: >
      The audio quality improves dramatically, and the client perceives the coach as calm, collected, and highly authoritative.

