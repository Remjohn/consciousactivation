summary: >
  The 65/25/10 Pathos Allocation Protocol is a quantified content engineering primitive that
  overturns the business default of data-heavy presentations. It mandates that high-stakes
  persuasive content must allocate approximately 65% of its volume to Pathos (story/emotion),
  25% to Logos (data/evidence), and 10% to Ethos (credibility). In CCP, this acts as a hard
  production constraint, ensuring that content aligns with the neurological reality that story,
  not data, is what synchronizes the brains of the speaker and listener.

core_move: >
  Audit and restructure content to ensure a dominant allocation of narrative and emotional material (65%), supported by data (25%) and framed by credibility (10%).

why_it_works: >
  Gallo's analysis of Bryan Stevenson's TED talk (the longest standing ovation in TED history)
  revealed this exact 65/25/10 breakdown. This ratio is validated by Princeton neuroscientist
  Uri Hasson's "brain-to-brain coupling" research. When a speaker shares a story, the listener's
  brain activity literally mirrors the speaker's across multiple regions. This coupling does not
  occur when delivering abstract data or pure logic. Data informs the language cortex; story
  synchronizes the entire brain. Therefore, opening the emotional channel via Pathos is a biological
  prerequisite before the Logos payload can be successfully delivered and retained.

examples:
  - context: "BOOK: Talk Like TED - Master the Art of Storytelling"
    application: >
      Carmine Gallo analyzes the most successful TED talks (like Bryan Stevenson's) and identifies a strict ratio: 65% Pathos (story), 25% Logos (data), 10% Ethos (credibility). Uri Hasson's neuroscience confirms that only storytelling triggers 'brain-to-brain coupling' between speaker and listener.
    effect: >
      Opening the emotional channel via Pathos biologically prepares the brain to receive and retain the Logos payload.

  - context: "CCP: CCF - Script Writing Audit"
    application: >
      A draft script is flagged for being 60% Logos (teaching a framework) and 10% Ethos. The CCF agent forces a rewrite, mandating a 3-minute personal failure story (Pathos) at the open, reducing pure data delivery to 25% of runtime.
    effect: >
      Audience recall of the framework doubles. They internalize the logic because the preceding stories coupled their neural state with the speaker.

  - context: "CCP: V2WS - Webinar Diagnostics"
    application: >
      A webinar with low conversion is audited, showing 80% Logos (features, stats). The V2WS agent requires the coach to replace 50% of the data slides with specific client transformation narratives and a guided visualization.
    effect: >
      The emotional temperature rises. The audience stops analyzing critically and begins experiencing emotionally, dramatically reducing sales resistance.

  - context: "CCP: CMF - Visual Asset Allocation"
    application: >
      When rendering a beat cluster, the CMF pipeline ensures that 65% of the visual run-time is dedicated to human faces, narrative illustration, or emotional landscapes, restricting heavy data visualizations (Logos) to only 25% of the frames.
    effect: >
      The viewer does not experience cognitive fatigue. The visual emotion carries them through the dense data segments without dropping retention.

  - context: "CCP: Conscious Reactions - The 60-Second Rule"
    application: >
      When recording a 3-minute Solo Reaction, the coach is barred from introducing the core statistic or technical argument until they have spent the first 60 seconds exclusively describing the painful human cost of the problem.
    effect: >
      The listener is neurologically bonded to the coach's perspective, making the subsequent data bomb feel devastatingly relevant.

anti_examples:
  - description: >
      A Telegram marketing sequence that relies exclusively on linking to whitepapers, quoting
      industry statistics, and citing the coach's academic degrees, while actively avoiding
      any personal or emotional narrative because it feels "unprofessional."
    why_it_fails: >
      This is an Ethos/Logos-only failure. Without Pathos, no neural coupling occurs. The
      audience's brain processes the text purely analytically, which requires high cognitive
      load and generates low emotional engagement. The sequence is ignored.

