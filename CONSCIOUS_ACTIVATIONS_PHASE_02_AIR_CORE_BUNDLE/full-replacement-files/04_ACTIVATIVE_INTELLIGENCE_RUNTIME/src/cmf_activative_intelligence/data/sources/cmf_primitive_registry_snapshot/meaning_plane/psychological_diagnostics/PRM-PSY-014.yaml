trigger_conditions:
  - "The truth being delivered is highly confrontational or ego-threatening to the audience"
  - "The subject matter is inherently heavy, dark, or traumatic"
  - "The audience exhibits 'change fatigue' and is cynical toward earnest self-help advice"

suppression_conditions:
  - "The audience is currently in active, acute crisis where humor would be perceived as mocking"
  - "The coach lacks the necessary self-deprecation to make themselves the butt of the joke"
  - "The topic involves someone else's trauma that the coach does not have the right to reframe"

misuse_modes:
  - "Punching Down — Using humor that targets the audience's vulnerabilities rather than the coach's or the system's"
  - "Trivialization — The humor minimizes the importance of the truth rather than acting as a vehicle for it"
  - "The Clown Pivot — Relying so heavily on jokes that the coach loses their diagnostic authority"

