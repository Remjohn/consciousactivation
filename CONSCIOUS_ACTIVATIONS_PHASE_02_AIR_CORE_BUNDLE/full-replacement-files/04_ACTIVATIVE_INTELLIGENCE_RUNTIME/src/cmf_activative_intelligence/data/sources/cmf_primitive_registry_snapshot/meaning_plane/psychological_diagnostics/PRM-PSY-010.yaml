trigger_conditions:
  - "System initiates any high-stakes, difficult, or emotionally charged workflow"
  - "Agent prepares to deliver a critical diagnostic or behavioral correction"
  - "Designing the immediate pre-execution UX sequence for high-anxiety tasks (e.g., hitting 'record' or 'publish')"

suppression_conditions:
  - "User is engaged in spontaneous, low-stakes ideation where rigid structure would stifle flow"
  - "Immediate, instinctual action is required to resolve a critical technical error"

misuse_modes:
  - "Script Locking — preparing so rigidly that the communicator becomes inflexible, unable to adapt when the conversation takes an unexpected but productive turn."
  - "Over-Anticipation of Threat — focusing exclusively on negative outcomes during preparation, inadvertently priming the communicator for conflict rather than connection."

