summary: >
  The Matching Principle is a foundational diagnostic primitive that categorizes every conversation into three simultaneous layers: practical (decision-making), emotional (feelings and values), and social identity (group membership). It asserts that true connection occurs only when participants operate on the same layer at the same time. In CCP, this acts as a real-time detection and alignment algorithm, ensuring coaches and agents do not offer practical solutions to emotional expressions, which would otherwise rupture the coaching bond.

core_move: >
  Detect the active conversation layer (practical, emotional, or social) and match it before attempting to redirect or advise.

why_it_works: >
  Duhigg cites neural entrainment research demonstrating that conversation is not merely information transfer, but biological synchronization. When participants operate on mismatched layers—such as one seeking emotional validation while the other provides logistical fixes—neural alignment fails, and psychological resistance increases. Matching the active layer creates the neurological precondition for trust, known as neural coupling, making the listener's brain physiologically prepared to receive subsequent challenges.

examples:
  - context: "BOOK: Supercommunicators - Neural Entrainment"
    application: >
      Duhigg details how true connection requires participants to operate on the same conversational layer (practical, emotional, or social). Mismatched layers break neural coupling.
    effect: >
      Matching the active layer establishes the physiological precondition for trust, making the listener's brain receptive to subsequent challenge.

  - context: "CCP: CBCS - Pre-Correction Alignment"
    application: >
      When a client expresses anxiety about an upcoming launch (emotional layer), the agent validates the overwhelming feeling before pivoting to the launch checklist (practical layer).
    effect: >
      The client's nervous system down-regulates, transforming resistance into execution readiness.

  - context: "CCP: CMF - Generation-Phase Sequencing"
    application: >
      A script structurally sequences layers: opening with social identity ('As a founder...'), moving to emotion ('...the isolation of leadership...'), and concluding with practical steps.
    effect: >
      Maximizes viewer retention because the audience feels neurologically attuned to the speaker before the technical payload is delivered.

  - context: "CCP: CCF - Archetype Anchoring"
    application: >
      The coach's origin story explicitly names their past social identity and emotional state before revealing their practical methodology.
    effect: >
      The prospect borrows trust from the shared identity and emotion, instantly positioning the coach as a validated peer.

  - context: "CCP: Conscious Reactions - Layer-Specific Markup"
    application: >
      If a user submits a highly vulnerable diagnostic video, the first system markup addresses the emotional courage of the submission, not a mechanical flaw in their lighting.
    effect: >
      Prevents the user from feeling 'judged by a machine', establishing a safe clinical environment for critique.

