trigger_conditions:
  - "AST analysis detects high density of emotional or identity-based vocabulary in user input"
  - "System initiates the opening 60 seconds of a new coaching relationship or diagnostic review"
  - "Designing the hook and intro sequence for high-leverage top-of-funnel V2WS content"

suppression_conditions:
  - "Context requires emergency execution of a predefined technical protocol (e.g., system failure recovery)"
  - "User explicitly requests data-only reporting without commentary or diagnostic framing"

misuse_modes:
  - "Layer Inflexibility — detecting the initial layer and refusing to shift when the client naturally transitions to a different layer."
  - "Performative Matching — using the vocabulary of a layer without genuine alignment or empathy, which clients detect as manipulation."

