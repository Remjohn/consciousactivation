trigger_conditions:
  - "Target surface is purely audio (Sonic Scribe, Telegram Voice)"
  - "Context state indicates mobile, transit, or partial attention"
  - "Script AST contains >2 quantitative metrics or nested conditionals"
  - "Estimated audio duration > 45s"

suppression_conditions:
  - "Output target is text (CBCS interface, PDF)"
  - "Context state indicates focused listen (e.g., V2WS webinar)"
  - "Media output includes visual data card overlay"

misuse_modes:
  - "Over-simplifying to the point of removing the coaching payload entirely"
  - "Treating the primitive as a license to avoid all specificity — the ear still needs concrete anchors"
  - "Applying broadcast brevity rules to written formats where detail density is expected"

synergizes_with:
  - "PRM-VOC-003"  # Writing for the Ear — complementary constraint on rhythm and cadence
  - "PRM-VOC-006"  # Start Strong, End Strong — the distracted ear demands strong bookends
  - "PRM-VOC-004"  # Proofread Aloud — the aloud test catches what violates distracted ear rules
  - "PRM-VSG-004"  # Silence as a Positive Narrative Device — pauses reset the distracted ear

conflicts_with:
  - "PRM-VSG-006"  # Polyphony and Controlled Density — layered complexity opposes single-pass clarity
  - "PRM-HUM-037"  # Hyper-Specificity Anchoring — extreme detail risks overloading the distracted ear

crosswalk_id: null
crosswalk_note: null

notes: >
  This is the highest-MCDA primitive in the VOC family because it is the
  master constraint: every other voice primitive operates downstream of
  the distracted ear rule. If content fails this gate, no amount of
  intimacy, sensory anchoring, or theatre-of-the-mind can rescue it.
  Prioritize for all Sonic Scribe generation, CBCS voice notes, and
  Conscious Reaction audio outputs. Note that goal_bias.clarity is
  intentionally the dominant dimension here — this is the one VOC
  primitive where clarity outranks connection because without clarity,
  connection cannot form.
