book_reference:
  title: "Better Broadcast Writing, Better Broadcast News"
  author: "Greg Dobbs"
  chapters:
    - "Chapter 6: The Story of the Story"
    - "Chapter 3: Being Perfectly Clear"
  key_pages: "72-86, 36-40"
  book_path: "lab/Public Speeaking Coaching/08_Sound_Design/Better Broadcast Writing Better Broadcast News - Greg Dobbs.md"

summary: >
  Write for the Distracted Ear is a voice-first composition primitive that
  governs how spoken content must be architected for imperfect, single-pass
  listening conditions. Dobbs grounds this in the "Is That the Telephone
  Ringing?" test — the listener is never in a bunker; there is always competing
  noise, light, and stimulus. If a message requires rewind, reread, or active
  decoding, it has already failed the ear. In CCP, this is the master
  constraint for every voice note, Conscious Reaction, and CBCS audio
  delivery — the listener gets one pass, on a phone, while walking.

core_move: >
  Write so the message remains clear and memorable even when heard once
  in imperfect attention conditions.

why_it_works: >
  Broadcast cognitive load research shows that spoken language is processed
  sequentially and cannot be "re-scanned" the way print can. Dobbs
  demonstrates that complexity has no home in broadcasting because the
  distracted listener will lose the thread at the first compound clause or
  unanswered question. His "telephone ringing" heuristic — if the audience's
  phone rang mid-sentence, would they still understand the story when they
  returned? — is a concrete broadcast-specific test that forces radical
  simplification. He shows how overloading the opening with dollar figures
  ($90M, $40M, $50M in three consecutive sentences) caused audiences to
  lose the core point entirely. The mechanism is cognitive bottleneck:
  auditory working memory processes approximately 7±2 chunks, and each
  unnecessary detail displaces a necessary one. CCP voice notes must pass
  this same gate because the listener-of-one is multitasking, emotionally
  loaded, and cannot rewind.

examples:
  - context: "BOOK: Better Broadcast Writing - The Distracted Ear"
    application: >
      Dobbs uses the "Is That the Telephone Ringing?" heuristic. The listener is never in a bunker. If the message requires rewinding or re-reading, it fails the ear. Complex statistics and compound clauses cause the listener to lose the core point.
    effect: >
      Radical simplification ensures the core message survives the fragmented attention window.

  - context: "CCP: CMF - Sonic Scribe Generation"
    application: >
      The Sonic Scribe agent drafts a voice note on pricing psychology. Before rendering, the Distracted Ear gate strips three statistics down to one, breaks compound clauses, and front-loads the behavioral takeaway.
    effect: >
      The coach retains the pricing action step even while multitasking, because the message survives the attention window.

  - context: "CCP: CBCS - Accountability Voice Note"
    application: >
      Instead of listing three performance metrics, the agent's voice note names only the one metric that changed most, states the direction of change in plain language, and defers the rest to a visual card.
    effect: >
      The coach absorbs the single headline in one pass.

  - context: "CCP: Conscious Reactions - Content Draft Feedback"
    application: >
      The agent avoids layering three critiques into one sentence. Each critique is an isolated sentence-pair (observation, recommendation) separated by 0.8-second pauses.
    effect: >
      No critique is lost. Each occupies its own auditory slot.

  - context: "CCP: V2WS - Live Webinar Audio"
    application: >
      During the webinar pitch, the speaker's script breaks complex offers into single, standalone sentences with clear pauses, anticipating that the viewer might be looking at another tab.
    effect: >
      The listener hears the exact offer terms without needing to visually process a slide.

anti_examples:
  - description: >
      A CBCS voice note opens with: "Your engagement rate is 4.2%, which
      is up from 3.1% last week but still below the 5.0% benchmark we
      set in your onboarding configuration, although that benchmark was
      based on your initial audience size of 2,400 which has since grown
      to 3,100." All in one sentence.
    why_it_fails: >
      Dobbs explicitly warns that stacking dollar figures (or any
      sequential data) in consecutive sentences causes the listener to
      lose the core point. The compound clause forces the listener to
      hold five numbers simultaneously while parsing two subordinate
      clauses. The distracted ear drops out after the third number and
      retains nothing.

