summary: >
  The Audience Journey Map is a pre-production scoping primitive that defines the exact distance
  a presentation must cover. It requires mapping the audience's required transformation across two
  distinct axes: Inward Change (what they believe) and Outward Change (what they do), moving
  from a defined starting state to a required end state. In CCP, this primitive acts as the
  navigational compass for all content creation, ensuring that no script or module is developed
  without clear start and end coordinates for the client's psychological and behavioral shift.

core_move: >
  Explicitly define the starting and ending states of the audience on two axes—Inward (belief) and Outward (behavior)—before drafting any content.

why_it_works: >
  Duarte notes that Hollywood story analysts evaluate screenplays by comparing the protagonist on
  page 1 to the protagonist on the last page; if the character hasn't changed, the movie fails.
  Similarly, presentations fail when the speaker knows their topic but doesn't know where the
  audience is starting from or where they need to land. By mapping Inward Change (e.g., from
  "feeling overwhelmed" to "feeling in control") and Outward Change (e.g., from "micromanaging"
  to "delegating outcomes"), the speaker establishes the exact transformational gap the content
  must bridge. Without this map, content becomes a data dump rather than a journey.

examples:
  - context: "BOOK: Resonate - Meet the Hero"
    application: >
      Duarte maps audience transformation across two distinct axes: Inward Change (beliefs) and Outward Change (behaviors). A presentation fails if it only addresses what the audience needs to do, without addressing the psychological shift required to do it. The presenter must define the exact Move From and Move To coordinates.
    effect: >
      The content transitions from an aimless data dump into a highly directional journey. Extraneous information that does not serve the specific mapped transformation is easily cut.

  - context: "CCP: V2WS - Webinar Planning"
    application: >
      Before outlining a "Reinventing Your Story" webinar, the V2WS agent forces the coach to complete the map. Move From (Inward): Feeling their past is a liability. Move From (Outward): Apologizing for gaps. Move To (Inward): Seeing the past as an asset. Move To (Outward): Delivering a confident bio.
    effect: >
      Every slide is evaluated against one criterion: "Does this move the audience from that specific starting state to that end state?" The presentation is instantly disciplined.

  - context: "CCP: CCF - Coaching Module Design"
    application: >
      A module teaching time-blocking is failing. The CCF agent discovers it addresses the Outward Change but ignores the Inward Change (Move From: "Worth is tied to availability" → Move To: "Worth is tied to deep work").
    effect: >
      By revising the module to address the psychological belief before the tactic, client adoption rates skyrocket.

  - context: "CCP: CMF - Beat Cluster Scoping"
    application: >
      Before generating visual assets, the CMF pipeline requires the 'Move To' state. If the 'Move To' (Inward) state is "Empowered," the Skia engine selects a visual grammar (colors, camera angles) that evokes strength, avoiding passive imagery.
    effect: >
      The visuals perform subliminal heavy lifting, pushing the audience toward the desired emotional destination before a word is even spoken.

  - context: "CCP: Telegram - Onboarding Sequence"
    application: >
      A 5-day welcome sequence is audited. The Guardian Agent realizes it starts by telling the user what to do (Outward), assuming they already trust the system. It injects a Day 1 message acknowledging the user's specific skepticism (Move From Inward).
    effect: >
      The user feels seen and validated, dismantling their psychological resistance and making them receptive to the behavioral commands on Day 2.

anti_examples:
  - description: >
      A Telegram marketing sequence that spends five days describing the features of a new
      coaching program without ever articulating the specific emotional state or behavioral
      reality the client is currently trapped in.
    why_it_fails: >
      The content lacks a "Move From" coordinate. Because the coach never grounds the journey
      in the audience's painful present reality, the audience cannot locate themselves on the
      map. They read the features but feel no compulsion to embark on the journey.

