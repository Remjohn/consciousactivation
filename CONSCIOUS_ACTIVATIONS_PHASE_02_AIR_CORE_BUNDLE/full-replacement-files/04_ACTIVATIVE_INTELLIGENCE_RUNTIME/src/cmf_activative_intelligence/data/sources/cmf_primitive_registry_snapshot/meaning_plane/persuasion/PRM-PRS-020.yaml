trigger_conditions:
  - "During the initial onboarding or project brief phase of any new content series"
  - "When reviewing a draft that feels like a 'data dump' with no clear narrative trajectory"
  - "When a client is struggling to articulate why their current coaching content isn't converting"

suppression_conditions:
  - "When producing purely operational 'how-to' guides for software where inward psychological transformation is not the goal"

misuse_modes:
  - "Ignoring Inward Change — mapping only the behavioral shift (Outward) while failing to identify the psychological shift required to sustain it, resulting in short-lived compliance"
  - "Vague Coordinates — defining the map with generic platitudes (e.g., Move From 'Bad' to 'Good') which provides zero actionable guidance for content creation"

