trigger_conditions:
  - "The visual output feels 'plastic,' 'corporate,' 'sterile,' or obviously AI-generated"
  - "The narrative requires deep vulnerability, historical weight, or raw documentary authenticity"
  - "The creator is trying to differentiate their brand from the 'highly polished influencer' aesthetic"

suppression_conditions:
  - "The asset is a technical diagram, legal document, or UI interface where 'texture' and 'grain' would render the information illegible"
  - "The brand identity is explicitly built around futurism, digital perfection, or clinical precision"

misuse_modes:
  - "The Retro Trap — Slapping a heavy 'VHS' or 'Super 8' filter on everything just for the aesthetic, rendering the content distracting and gimmicky rather than authentic"
  - "Illegible Grain — Pushing the noise or softness so far that the viewer cannot actually read the text or see the subject's eyes"
  - "Incongruent Flaws — Applying gritty, heavy 16mm film grain to a bright, cheerful, comedic video where it completely contradicts the tone"

synergizes_with:
  - "PRM-VSG-021" # Punctum, Air, and Felt Truth (Intangibles are the technical execution of 'Punctum')
  - "PRM-PSY-017" # Empathy Inversion (Both rely on exposing flaws to build trust)

conflicts_with:
  - "PRM-PRS-012" # Pure Direct Instruction (If the optical personality degrades the clarity of the instruction)

crosswalk_id: "XW-INTENTIONAL-IMPERFECTION"
crosswalk_note: "Meaning focuses on optical/visual flaws; Experience focuses on 'wabi-sabi' UI design or preserving human 'ums' and 'ahs' in audio."

notes: >
  CVE prompt compilers MUST have a 'texture/intangibles' parameter. If left blank, AI models default
  to hyper-real, frictionless perfection. The system must actively fight this default to maintain CCP's
  standard of authenticity.
