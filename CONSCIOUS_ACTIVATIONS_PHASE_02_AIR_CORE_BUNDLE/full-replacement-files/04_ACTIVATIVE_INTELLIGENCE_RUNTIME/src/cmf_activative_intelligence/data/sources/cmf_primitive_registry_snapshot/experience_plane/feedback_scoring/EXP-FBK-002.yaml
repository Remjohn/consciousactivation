activation_conditions:
  - "Whenever the system displays a metric, progress bar, or score to the user"
  - "When a user achieves a new tier of access or authority"

suppression_conditions:
  - "Never suppress. This is a foundational copywriting law for the entire platform."

misuse_modes:
  - "Jargon Overload — using terms so complex or abstract ('Hyper-Quantum Syntonic Resonance') that the user literally has no idea what the score means."
  - "Inconsistent Lexicon — calling it 'Conviction' on the dashboard, but 'Confidence' in the email, confusing the mental model."

synergizes_with:
