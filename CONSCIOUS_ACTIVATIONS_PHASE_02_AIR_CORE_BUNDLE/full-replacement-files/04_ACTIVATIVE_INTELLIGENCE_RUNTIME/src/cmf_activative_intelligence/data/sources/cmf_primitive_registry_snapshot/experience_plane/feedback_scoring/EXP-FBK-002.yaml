summary: >
  Reflective Scoring requires all metrics, points, and scores to mirror the specific
  identity and growth path the user desires. Instead of generic 'XP' or 'Points',
  the feedback vocabulary uses high-status terms (e.g., 'Resonance', 'Conviction',
  'Delivery Score') that validate their identity as a premium coach.

core_move: >
  Audit the entire platform for generic gamification terms ('Points', 'Levels',
  'Coins', 'Badges') and replace them with precise, executive-coaching vocabulary
  that reflects the user's actual psychological development.

why_it_works: >
  Yu-kai Chou warns that 'Pointsification' (slapping points on a boring task)
  fails because the points lack meaning. McGonigal adds that feedback must connect
  to a larger sense of purpose. By using Reflective Scoring, the numbers on the
  screen stop being abstract math and become a direct reflection of the user's
  competence. Earning 50 'Resonance' feels vastly more meaningful to a speaker
  than earning 50 'XP', because Resonance directly maps to their real-world goal
  of moving an audience.

examples:
  - context: "BOOK: Actionable Gamification - The Nike+ FuelBand"
    application: >
      Nike didn't just track 'steps' or 'calories' (which are generic). They
      invented 'NikeFuel', a metric that reflected athletic energy and effort
      regardless of the specific sport, creating a unique athletic identity.
    effect: >
      Users felt like athletes generating 'fuel' rather than dieters burning calories.

  - context: "CCP: The Delivery Score"
    application: >
      The CPSC AI doesn't give a 'Grade' (which triggers school trauma) or 'XP'.
      It provides a 'Delivery Score' broken down by 'Conviction Density' and 'Pacing'.
    effect: >
      The coach feels they are receiving clinical, executive-level feedback, validating their status.

  - context: "CCP: The Social Economy Metrics"
    application: >
      When peers vote on audio, they don't 'Upvote' or 'Like'. They vote on whether
      the take was 'Based' or 'Cringe', and the aggregate builds the speaker's
      'Resonance' metric.
    effect: >
      The feedback reflects actual ideological alignment and emotional impact, not just popularity.

  - context: "CCP: The Silent Referral 'Challenge'"
    application: >
      Instead of earning a generic 'Referral Bonus', a successful user unlocks
      the ability to send a 'Performance Challenge' to a peer. The 'score' is
      their social leverage.
    effect: >
      Reflects their identity as a top performer challenging others to rise to their level.

  - context: "CCP: The Mastery Ladder"
    application: >
      Instead of moving from 'Level 1' to 'Level 2', users move through identity
      phases: 'Observer' -> 'Contributor' -> 'Jury' -> 'Mastermind'.
    effect: >
      The leveling system directly reflects their increasing authority within the community.

anti_examples:
  - description: >
      A high-level executive coach records a deeply personal, 3-minute vulnerability
      story. The AI replies: 'Awesome! You earned 500 Gold Coins and a Shiny Star!'
    why_it_fails: >
      The extreme cognitive dissonance between the emotional depth of the task and
      the infantile nature of the reward destroys the platform's credibility and insults the user.

