activation_conditions:
  - "User successfully completes the current tier of difficulty consistently"
  - "System dynamically tracks user progression through the Capacity Tracks"

suppression_conditions:
  - "User is struggling with the current tier (do not escalate)"
  - "User is in a dormancy recovery state (drop them down one level of difficulty)"

misuse_modes:
  - "Chronological Progression — advancing the difficulty just because it is 'Day 8' regardless of whether the user actually mastered Day 7."
  - "Invisible Escalation — making things harder without telling the user, making them feel like they are getting worse."

