summary: >
  Habit Path Architecture governs the sequencing of triggers and challenges
  over time. It ensures the platform carefully escalates difficulty, moving the
  user from conscious, high-friction effort (learning a new behavior) into
  automatic, habitual loops (unconscious competence). In CCP, this means Law28
  does not ask a Day 1 user to perform a complex storytelling drill. It starts
  with mere willingness to record, then escalates to removing filler words,
  then advances to pressure testing, preventing cognitive overload.

core_move: >
  Sequence challenge triggers from minimum-viable-effort to high-complexity,
  gating advanced triggers until the foundational behaviors have become automatic.

why_it_works: >
  Burke's framework shows that gamified systems must guide players through a
  journey. If the initial challenge is too hard, they quit (frustration). If
  the later challenges are too easy, they quit (boredom). By dynamically managing
  the 'Habit Path,' the system provides just enough scaffolding at the beginning
  to get the user moving, and slowly removes that scaffolding as the user's
  competence increases, eventually requiring them to perform complex communication
  feats with zero preparation.

examples:
  - context: "BOOK: Gamify - The Player Journey"
    application: >
      A good game starts with a 'tutorial level' where failure is almost impossible
      and mechanics are introduced one by one. By level 10, the game demands complex
      combinations of those mechanics simultaneously.
    effect: >
      The player remains in a state of flow, constantly challenged but never overwhelmed.

  - context: "CCP: Law28 Layer Escalation"
    application: >
      Week 1 triggers only focus on the 'Foundation' (recording daily, anti-hedging).
      Week 2 introduces 'Structure' (opening hooks). Week 4 introduces 'Command'
      (pressure tolerance). The triggers evolve with the user's capacity track.
    effect: >
      The user does not experience cognitive overload and churn out on Day 3.

  - context: "CCP: Conscious Reactions Time Compression"
    application: >
      A new user might be given 5 minutes to record a reaction. After their 10th
      successful reaction, the system triggers 'Hard Mode': 'You have proven your
      competence. For this reaction, you only get 90 seconds. Go.'
    effect: >
      The system artificially increases the difficulty to maintain the Fiero high.

  - context: "CCP: The Removal of the Safety Net"
    application: >
      Initially, the system might allow 3 re-records per drill. As the user reaches
      the Platinum tier, the trigger says: 'Platinum standard applied. One take only.
      No redos.'
    effect: >
      Forces the transition from conscious effort to automatic, habitual performance under pressure.

  - context: "CCP: Trigger Fade-Out"
    application: >
      Once telemetry shows a coach is spontaneously initiating reactions 3 times a week,
      the system completely turns off generic push notifications, relying solely on
      Context-Aware SCRE triggers to avoid annoying an advanced user.
    effect: >
      The external trigger scaffolding is removed once the internal habit is established.

anti_examples:
  - description: >
      Onboarding a new user and immediately sending a trigger that demands a 5-minute,
      highly structured pitch with zero filler words, grading them harshly when they fail.
    why_it_fails: >
      The Habit Path is inverted. The cognitive load is too high for a beginner. The user
      feels incompetent, humiliated, and abandons the platform immediately.

