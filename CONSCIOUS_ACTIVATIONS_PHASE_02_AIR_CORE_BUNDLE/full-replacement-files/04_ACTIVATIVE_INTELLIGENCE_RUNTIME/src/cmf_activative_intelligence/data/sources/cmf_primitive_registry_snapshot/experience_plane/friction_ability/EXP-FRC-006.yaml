summary: >
  Hypnosedation Reframing dictates that psychological friction (anxiety, fear
  of judgment) is the ultimate destroyer of Ability. By explicitly reframing
  a stressful constraint—like a ticking 60-second timer—as a 'game', a 'sandbox',
  or a 'flow state activator', the system bypasses the user's inner critic,
  neutralizing performance anxiety and allowing them to record freely.

core_move: >
  Identify elements of the UI that typically cause stress (timers, scores,
  public juries) and use copywriting and visual cues to reframe them as playful,
  low-stakes, exploratory tools.

why_it_works: >
  Nir Eyal cites 'Hypnosedation'—the clinical practice where patients undergo
  surgery using only hypnosis by reframing the pain as 'warmth' or 'pressure'.
  If a user believes a 60-second timer is a 'test of their intelligence', their
  cortisol spikes, their vocal cords tighten, and Ability drops to zero. If the
  Agent explicitly reframes the timer as 'a sandbox to shut off your over-thinking
  brain', the user relaxes. The objective reality (the timer) hasn't changed, but
  the *belief* about it has, entirely removing the psychological friction.

examples:
  - context: "BOOK: Beyond Belief - The Stress Reappraisal"
    application: >
      Students told that 'a racing heart means your body is preparing you to perform
      brilliantly' scored significantly higher on math tests than those told to
      'try to calm down.' Reframing the physical anxiety reduced the friction.
    effect: >
      Transforms a negative physiological state into a performance asset.

  - context: "CCP: Reframing the 60-Second Constraint"
    application: >
      Instead of: 'You only have 60 seconds. Do not go over.'
      The Agent says: 'The 60-second constraint is your best friend. It forces you
      to bypass your inner critic and speak from raw intuition. Just play.'
    effect: >
      The constraint becomes a feature of freedom, not a source of panic.

  - context: "CCP: The 'Sandbox' Onboarding"
    application: >
      During the first 7 days, the UI is heavily branded with 'Sandbox Mode'. The
      copy explicitly states: 'Nothing you say here goes public. This is the gym.
      Drop the weights if you have to.'
    effect: >
      Completely neutralizes the 'Social Deviance' friction factor from B=MAP.

  - context: "CCP: Reframing the AI Score"
    application: >
      Instead of: 'Your score is 45/100. You failed.'
      The UI says: 'Baseline captured. 45/100 is the perfect starting point for
      the Resonance algorithm. The machine now knows exactly how to coach you.'
    effect: >
      Reframes a low score from an insult into a necessary technical calibration.

  - context: "CCP: The 'Messy Middle' Badge"
    application: >
      If a user stutters and pauses heavily, instead of a penalty, they occasionally
      receive a 'Raw Authenticity' badge, praising them for thinking out loud rather
      than sounding like a robot.
    effect: >
      Reframes a 'flaw' as a desired behavior, removing the pressure to be perfect.

anti_examples:
  - description: >
      A huge, ticking red countdown timer that flashes 'TIME RUNNING OUT!' accompanied
      by a stressful alarm sound.
    why_it_fails: >
      This is the opposite of hypnosedation. It artificially induces panic. The user
      freezes, stutters, and experiences maximum cognitive friction, ensuring the
      resulting audio is unusable.

