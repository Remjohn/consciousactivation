trigger_conditions:
  - "The coach is paralyzed by perfectionism or writer's block"
  - "The coach's natural communication style is verbose, tangential, or overly academic"
  - "The CCP system is processing raw, unstructured audio input (YOLO mode) and must extract a structured payload"

suppression_conditions:
  - "The coach is speaking live on stage or on a live sales call, where 'spewing' without an immediate filter would destroy authority"
  - "The content is a legal disclaimer or compliance document where exact wording is required on the first pass"

misuse_modes:
  - "The Unfiltered Spew — Skipping the 'whittle' phase entirely and publishing the raw brain dump, overwhelming the audience"
  - "The Premature Whittle — Editing while drafting, killing the flow state"
  - "The Hesitant Edit — Refusing to cut a 'good' tangent because the coach is too emotionally attached to the information"

synergizes_with:
  - "PRM-PSY-020" # The Paradox of Value (The whittle phase enforces the Singular Path)
  - "PRM-PSY-023" # Audience Ecological Checks (Used during the whittle phase to evaluate content)

conflicts_with:
  - "PRM-HUM-026" # Sunk Cost Fallacy (The coach must be willing to throw away 80% of what they wrote, resisting the sunk cost)

crosswalk_id: "XW-ITERATIVE-DISTILLATION"
crosswalk_note: "Meaning focuses on content editing logic; Experience focuses on separating input UX (raw capture) from output UX (curated display)."

notes: >
  This primitive is the operational foundation of YOLO mode. CCP agents must be explicitly
  prompted to act as the ruthless 'Whittle' engine, taking the cognitive burden of editing
  away from the coach.
