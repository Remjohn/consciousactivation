summary: >
  The Iterative Filter is a content generation protocol that separates creation from editing to bypass
  expert blindness. It mandates a 'spew' phase of uncensored generation, followed by a 'whittle' phase
  where the creator aggressively deletes any content that does not serve the Singular Path or elevate
  the target emotional state, enforcing brevity and high tension.
core_move: >
  Draft content without filtering (the 'spew'), intentionally generating 2-5x more volume than needed,
  then run a second, ruthless editorial pass (the 'whittle') to assassinate any tangent that distracts
  from the primary outcome.
why_it_works: >
  As Fladlien identifies, 'the speed of thought is much different than the speed of being taught.'
  Experts suffer from unconscious competence; when they try to write the 'perfect' script on the
  first pass, they inevitably produce dense, academic, overwhelming content. By separating the phases,
  the 'spew' captures the raw genius and momentum without self-censorship ('getting rid of slides is
  much easier than adding slides later'). The 'whittle' phase then acts as a commercial filter, destroying
  complexity to protect the audience's cognitive bandwidth and preserve the Singular Path.

examples:
  - context: "BOOK: Drafting the webinar content section"
    application: >
      Fladlien intentionally dumps every piece of knowledge, tactic, and story he has on a subject
      into his slide deck without censoring himself, often producing 90 minutes of material for a
      45-minute slot. He then makes a second pass, cutting out the superfluous edge cases and tangents.
    effect: >
      The resulting 45-minute presentation is a highly distilled, concentrated dose of value. It feels
      effortless and punchy because all the 'fat' was trimmed, leaving only the exact beats needed to drive conversion.

  - context: "CCP: V2WS YOLO Mode via Telegram Voice Note"
    application: >
      A coach is instructed by the Telegram bot: 'Talk for 10 minutes. Give me every messy thought,
      every framework, and every rant you have on this topic. Do not edit yourself.' This is the 'Spew.'
      The `Emilio` agent then runs the 'Whittle,' reducing the 10-minute transcript to a tight 2-minute Excalidraw script.
    effect: >
      The coach creates content with zero friction because the pressure to be perfect is removed. The
      final output is mathematically optimized for conversion because the LLM performs the ruthless
      editing the coach is psychologically incapable of doing themselves.

  - context: "CCP: CCF Archetype drafting a daily newsletter"
    application: >
      Instead of staring at a blank screen trying to write a perfect hook, the coach voice-dictates a
      3-page stream of consciousness. They then apply the Iterative Filter, deleting the first 2 pages
      of throat-clearing and publishing only the final, punchy paragraph.
    effect: >
      The content quality skyrockets. The coach overcomes writer's block by embracing the 'spew,' and
      the audience receives a high-density, high-impact insight without the fluff.

  - context: "CCP: Telegram Coaching Conversation (CBCS) async response"
    application: >
      A coach drafts a long, complex text reply explaining the biomechanics of a deadlift failure to a
      client. Before hitting send, the coach applies the 'whittle' filter, deleting the biomechanics
      and sending only: 'Your hips shot up early. Focus only on pushing the floor away with your quads.'
    effect: >
      The client isn't overwhelmed by anatomy terms. The singular focus allows them to fix the lift
      immediately on the next set.

  - context: "CCP: CMF Media Factory - Script distillation"
    application: >
      A media agent processes a 45-minute podcast interview to create a reel. It runs the transcript
      through a 'whittle' parameter, deleting all interviewer questions, conversational filler, and caveats,
      stitching together only the highest-tension statements.
    effect: >
      The reel achieves viral velocity because the pacing is relentless. The Iterative Filter removed
      all the conversational friction that kills engagement on short-form platforms.

anti_examples:
  - description: >
      A coach attempts to write a webinar script slide by slide, agonizing over the perfect wording
      for slide 1 before moving to slide 2.
    why_it_fails: >
      This merges the 'spew' and the 'whittle' into the same cognitive process, leading to writer's block,
      loss of narrative momentum, and a flat, academic tone. The coach is trying to edit a thought before
      it fully exists, violating the protocol.

