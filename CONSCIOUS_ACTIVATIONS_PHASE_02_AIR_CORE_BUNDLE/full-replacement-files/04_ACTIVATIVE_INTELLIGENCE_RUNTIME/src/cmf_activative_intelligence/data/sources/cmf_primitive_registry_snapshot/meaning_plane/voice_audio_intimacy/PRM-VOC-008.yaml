summary: >
  Lead-In and Tag Architecture governs the structural framing of spoken
  content segments in CCP voice notes. Dobbs defines five rules for
  writing into a sound bite: don't give away the content, don't duplicate
  what the bite says, flow seamlessly into it, establish speaker authority,
  and don't state the obvious. The tag line (first line after the bite)
  must connect to what was just heard — either by playing off the
  speaker's words, playing off the idea, introducing new information,
  or providing a contrary viewpoint. In CCP, this maps to how coaching
  voice notes transition between segments: narrator-to-insight, insight-
  to-action, and action-to-close.

core_move: >
  Make the opening orientation and closing handoff structurally deliberate
  rather than improvised.

why_it_works: >
  Dobbs demonstrates the failure mode with devastating self-examples. His
  Wimbledon lead-in — "Martina Navratilova said the pressure to win is
  greater this year than it has ever been before" — killed the sound bite
  because Navratilova then said the same thing. He "gave it away" and
  "wasted precious air time." The mechanism is expectation management:
  the lead-in must create a gap that the following content fills, and
  the tag must bridge from what was said to what comes next. Without
  this architecture, transitions feel arbitrary and the listener must
  expend cognitive effort to find the connection between segments. In
  his Crazy Horse story, the Mrs. Ziolkowski sound bite had "absolutely
  nothing to do" with the lead-in, and the audience could "only scratch
  their heads." Continuity is the key — leadins and tag lines must
  connect to the sound bites around them.

examples:
  - context: "BOOK: Better Broadcast Writing - Lead-In and Tag Architecture"
    application: >
      Dobbs defines five rules for sound bites: don't give away the content, don't duplicate it, flow seamlessly, establish authority, and don't state the obvious. The tag line must connect to what was just heard.
    effect: >
      Transitions feel deliberate and propel the listener forward without repetitive cognitive effort.

  - context: "CCP: CMF - Multi-Segment Scripting"
    application: >
      The Sonic Scribe structures the transition between diagnosis and action: "That's the pattern. Now here's why it keeps winning." It tags out: "So the question isn't whether this is happening. It's what you do Monday morning."
    effect: >
      Each segment feels like a necessary step, eliminating restated variations.

  - context: "CCP: Conscious Reactions - Audio Feedback"
    application: >
      The agent leads into the first critique: "Your opening was strong—but something shifted at the 40-second mark." Tags out: "That shift is fixable. Here's the second thing I noticed."
    effect: >
      The coach absorbs feedback as a narrative flow rather than a disjointed list.

  - context: "CCP: CBCS - Weekly Digest"
    application: >
      The agent avoids "Another thing I wanted to mention is..." Instead, it uses deliberate tags connecting the coach's past win to the upcoming challenge.
    effect: >
      The summary feels like a cohesive story rather than a checklist.

  - context: "CCP: V2WS - Live Q&A Handoff"
    application: >
      The speaker uses a specific lead-in formula before playing a pre-recorded testimonial, ensuring they don't restate what the testimonial is about to say.
    effect: >
      The audience experiences seamless continuity without dead air or repetition.

anti_examples:
  - description: >
      A voice note transitions between segments with: "And another
      thing I wanted to mention is..." repeated three times. No
      structural lead-in, no tag connecting to what was just said.
    why_it_fails: >
      Dobbs's fifth rule — don't just state the obvious — is violated.
      "Another thing" is a non-transition that signals the speaker
      has no structural plan. The listener receives a list rather
      than a story. The lack of tag lines means each segment floats
      disconnected from the others, and continuity is lost.

