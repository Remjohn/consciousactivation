trigger_conditions:
  - "Payload AST contains >1 distinct topical segments"
  - "Narrative structure moves from observation to mechanism to action"
  - "Estimated audio duration > 45s"

suppression_conditions:
  - "Payload is a single-thought micro-note (< 20s)"
  - "Target is an improvised live response"
  - "Target surface is purely text-based"

misuse_modes:
  - "Over-engineering transitions until they sound broadcast-formulaic rather than conversational"
  - "Lead-ins that tease but never deliver — creating expectation gaps that go unfilled"
  - "Mechanically applying the Leadin-SOT-Tag pattern to content that should flow naturally"

