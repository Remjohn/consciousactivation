notes: >
  This primitive provides the structural scaffolding that PRM-VOC-006
  (Start Strong, End Strong) does not. While 006 governs the macro
  bookends, 008 governs the micro-transitions within a multi-segment
  voice note. Dobbs's five rules for lead-in writing should be codified
  as a checklist in the Sonic Scribe agent's generation pipeline. The
  key insight is redundancy avoidance: in broadcast, saying it twice
  wastes the listener's most precious resource — time.
