trigger_conditions:
  - "The CVE system is generating AI prompts and needs to control the psychological 'weight' of the image"
  - "The brand archetype requires a specific spatial dynamic (e.g., Sovereign dominance vs. Guide intimacy)"
  - "The narrative involves themes of pressure, isolation, freedom, or exposure"

suppression_conditions:
  - "The asset requires absolute, objective documentation where any optical distortion would compromise the integrity of the data (e.g., a medical before-and-after)"

misuse_modes:
  - "Defaulting to Wide — Always using the widest possible lens just to 'fit everything in,' resulting in consistently emotionally distant imagery"
  - "The Portrait Distortion — Using a wide-angle lens too close to a human face, unintentionally creating a comedic or grotesque caricature rather than intimacy"
  - "Contextual Wipeout — Overusing extreme telephoto lenses so much that the audience loses all geographic grounding and becomes disoriented"

synergizes_with:
  - "PRM-VSG-020" # Perspective and Layering as Meaning (Focal length multiplies the effect of perspective)
  - "PRM-PSY-024" # Universal Webinar Emotion Palette (Lenses are the visual tools to trigger these emotions)

conflicts_with:
  - "PRM-VSG-021" # Punctum, Air, and Felt Truth (If the lens distortion is so extreme it feels like a 'gimmick' rather than a documentary choice)

crosswalk_id: "XW-OPTICAL-GEOMETRY"
crosswalk_note: "Meaning focuses on focal length physics; Experience focuses on 'white space' or 'padding' in UI to create similar feelings of expansion or compression."

notes: >
  AI image generators default to 'normal' or 'slightly wide' focal lengths unless explicitly instructed
  otherwise. CVE prompts MUST include millimeter equivalents (e.g., 200mm, 14mm, 50mm) to force the
  model to render the correct optical geometry.
