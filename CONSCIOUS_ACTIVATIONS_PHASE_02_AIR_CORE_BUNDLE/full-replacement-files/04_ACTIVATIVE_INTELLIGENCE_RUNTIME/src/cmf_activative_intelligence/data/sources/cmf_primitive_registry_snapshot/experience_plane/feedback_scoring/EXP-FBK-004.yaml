summary: >
  Bring the Data Forward dictates that the platform must silently track massive
  amounts of behavioral data (words spoken, total minutes practiced, total peers
  helped) and periodically push these cumulative metrics forward to the user.
  This reveals a compounding investment they didn't realize they were building.

core_move: >
  Instead of only showing session-specific scores, design the dashboard and push
  notifications to aggregate and celebrate hidden lifetime metrics, transforming
  small daily actions into massive, undeniable proof of effort over time.

why_it_works: >
  Jane McGonigal emphasizes that games provide a 'quantified self' that reality lacks.
  In real life, you don't know exactly how many hours you've spent practicing a skill,
  so it's easy to feel like you aren't making progress. By surfacing cumulative data
  (e.g., 'You have spoken 10,000 words this month'), the platform provides irrefutable
  evidence of work done. This leverages the 'Sunk Cost Fallacy' positively—when users
  see how much they have already invested in their own growth, abandoning the platform
  feels like throwing away a massive asset.

examples:
  - context: "BOOK: Reality Is Broken - The World of Warcraft /played Command"
    application: >
      WoW allows players to type '/played' to see exactly how many days and hours
      they have spent in the game. Seeing '14 days of total playtime' creates a profound
      sense of investment and deters them from quitting.
    effect: >
      Turns invisible time spent into a tangible, measurable asset.

  - context: "CCP: The 10k Words Benchmark"
    application: >
      A user logs in to do a quick 30-second Law28 drill. Afterward, the Agent sends a
      push notification: 'Congratulations. With that audio, you have officially spoken
      over 10,000 words in the Conscious Coaching Platform.'
    effect: >
      Transforms a mundane daily drill into a major milestone event.

  - context: "CCP: The 'Peers Impacted' Metric"
    application: >
      On the CPSC scorecard, there is a lifetime stat: 'Total Peers Impacted'. It
      aggregates every time someone listened to their audio or voted on it.
    effect: >
      Provides concrete feedback that their voice matters and is actually being heard.

  - context: "CCP: The V2WS Annual Review"
    application: >
      At the end of the year, the platform generates a graphic showing 'Total Minutes
      on Stage' and 'Total Revenue Generated by Voice'.
    effect: >
      Creates a highly shareable asset that proves the ROI of the platform.

  - context: "CCP: The Stutter Reduction Graph"
    application: >
      The CPSC AI silently tracks the frequency of filler words (um, ah). After 30 days,
      it reveals a graph showing a 40% reduction in filler words over time.
    effect: >
      Provides undeniable, objective proof of growth that the user could not have tracked themselves.

anti_examples:
  - description: >
      A user completes 100 days of coaching. Their profile screen still only shows
      the score from their very last recording, with no record of the 99 previous days.
    why_it_fails: >
      The platform deletes their investment. The user feels no compounding growth,
      meaning their motivation rests entirely on today's performance rather than their
      lifetime momentum.

