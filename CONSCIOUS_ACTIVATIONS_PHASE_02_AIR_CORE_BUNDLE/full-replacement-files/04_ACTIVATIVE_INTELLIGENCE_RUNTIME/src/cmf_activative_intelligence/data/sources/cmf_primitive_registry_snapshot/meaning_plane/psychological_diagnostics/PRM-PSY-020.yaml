trigger_conditions:
  - "The audience is highly sophisticated but suffers from severe decision fatigue or 'shiny object syndrome'"
  - "The subject matter is highly technical and prone to 'information dumping'"
  - "The coach is structuring a high-ticket conversion event (webinar, VSL) where clarity equals cash"

suppression_conditions:
  - "The coaching interaction is specifically a brainstorming or exploratory session (e.g., career design) where divergent thinking is the goal"
  - "The client has already mastered the 'Singular Path' and explicitly requires advanced, branching nuance (Mastermind level)"

misuse_modes:
  - "Information Hoarding — Confusing the withholding of valuable options with strategic simplification"
  - "The Encyclopedia Trap — Believing that proving how much you know is the same as proving you can help"
  - "False Dilemmas — Creating artificial paths just to burn them down, which wastes time and insults audience intelligence"

