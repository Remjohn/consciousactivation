activation_conditions:
  - "Telemetry detects high frequency of aborted actions (Record > Delete > Record)"
  - "User receives a score in the bottom 10th percentile"
  - "User exhibits sudden, rapid UI navigation away from the core task (attempting to bounce)"

suppression_conditions:
  - "User is navigating smoothly and successfully (do not interrupt flow state)"
  - "The rescue has already been deployed recently (do not become an annoying Clippy)"

misuse_modes:
  - "The Clippy Effect — popping up constantly with generic advice when the user isn't actually frustrated, just thinking."
  - "False Hope — telling the user they are 'doing great' when the telemetry clearly shows they are producing unusable audio."

synergizes_with:
  - "EXP-SAF-004" # Practical Play (The rescue relies on the environment being a safe sandbox)
  - "EXP-SAF-003" # Hypnosedation Reframing (The rescue often uses reframing language)

conflicts_with:
  - "EXP-TRG-002" # Hook Cycle Velocity (The rescue explicitly pauses the velocity to prioritize safety)

implementation_targets:
  frontend_components:
    - "InterceptModal — a visually distinct, calming UI layer that slides over the frustrating task"
  backend_rules:
    - "telemetry_engine: track `abort_count` within a 5-minute session window; trigger rescue webhook if count > 2"
  telemetry_events:
    - "hopelessness_pattern_detected"
    - "richter_rescue_deployed"
    - "session_saved_post_rescue"
  experiments:
    - "A/B test: Text-based rescue from the Agent vs a 5-second audio voice note rescue from the system"

