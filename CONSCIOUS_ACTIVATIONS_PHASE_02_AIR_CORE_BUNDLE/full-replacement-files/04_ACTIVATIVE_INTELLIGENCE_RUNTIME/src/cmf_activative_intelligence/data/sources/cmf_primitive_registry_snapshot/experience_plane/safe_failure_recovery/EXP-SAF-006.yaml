summary: >
  The Richter Rescue dictates that the system must intervene immediately when
  a user exhibits signs of "hopelessness" (e.g., repeatedly starting and aborting
  a recording, then attempting to close the app). Drawing from Curt Richter's
  rat experiments, a user doesn't quit because the task is physically hard;
  they quit because they no longer believe their effort will yield a positive
  result. In CCP, the Telegram Agent acts as the rescuer, firing an asynchronous
  lifeline that proves their effort still matters, immediately restoring their
  Agency and preventing hard churn.

core_move: >
  Program the system to detect behavioral signatures of frustration or giving up,
  and instantly dispatch an async intervention that validates their partial effort
  and removes the immediate pressure.

why_it_works: >
  Nir Eyal highlights Richter's experiment where rats drowned in 15 minutes
  due to "hopelessness," but when temporarily rescued to prove escape was possible,
  they swam for 60 hours. In digital products, when a user records a take, hates
  their voice, deletes it, and tries again 3 times, their inner critic is drowning
  them. If they close the app, they may never return. By having the Agent intercept
  that exact moment—"Hey, I saw you aborted. The hardest part is hitting send. I
  paused the timer."—the system proves that the situation isn't hopeless. It
  grants them the Agency to keep swimming.

examples:
  - context: "BOOK: Beyond Belief - The Rat Rescue"
    application: >
      Pulling the rat out of the water for a few seconds completely rewrote
      its belief about the situation. The physical environment didn't change,
      but the belief in Agency gave it impossible endurance.
    effect: >
      Immediate restoration of motivation and survival instinct.

  - context: "CCP: The Aborted Take Intercept"
    application: >
      A coach hits 'Record' and 'Delete' 3 times in 2 minutes. The system flags
      this as 'Hopelessness.' The UI replaces the record button with a message
      from the Agent: 'Take a breath. Your raw intuition is better than a
      polished script. I've disabled the timer for this take. Just speak.'
    effect: >
      The user is 'pulled out of the water.' The pressure is lifted, and they
      successfully record the take.

  - context: "CCP: The Post-Failure Lifeline"
    application: >
      A user receives a devastating 30/100 Delivery Score. They immediately navigate
      toward the 'Close App' gesture. Before they can, a push arrives: 'Wait.
      Your pacing broke, but your Semantic Density was in the top 10%. Your brain
      was working faster than your mouth. Let's align them.'
    effect: >
      The intervention proves they aren't a failure, just misaligned. Agency is restored.

  - context: "CCP: The Silent Observer Rescue"
    application: >
      A prospect has been listening to debates for 2 weeks but never voting or
      recording. The system identifies 'Learned Helplessness.' It sends a targeted
      prompt: 'You've heard 20 takes on this. What are they all missing? Reply
      with text if you don't want to speak.'
    effect: >
      Lowers the barrier to entry to absolute zero, providing a rescue path into participation.

  - context: "CCP: The Technical Frustration Rescue"
    application: >
      The system detects the user's mic didn't pick up audio on their first take.
      Instead of just saying 'Error,' it says: 'We couldn't hear your brilliance.
      Check your mic permissions. We saved your spot.'
    effect: >
      Prevents technical failure from causing emotional frustration.

anti_examples:
  - description: >
      A user aborts 3 takes, closes the app, and 2 days later receives an automated
      marketing email: 'You haven't completed your daily drill! Don't be a quitter!'
    why_it_fails: >
      The intervention is too late (the user already drowned) and the tone is
      punitive. It reinforces their hopelessness rather than rescuing them from it.

