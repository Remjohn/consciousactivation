trigger_conditions:
  - "When outlining the agenda for any live or recorded session exceeding 15 minutes"
  - "When reviewing audience drop-off metrics for V2WS webinars or long-form video content"
  - "When a coach insists their topic is 'too complex' to be condensed"

suppression_conditions:
  - "In ultra-short formats (e.g., a 3-minute CMF beat or a TikTok reel) where the 18-minute constraint is irrelevant by default"

misuse_modes:
  - "The Fake Break — inserting a 'break' that actually requires high cognitive load (e.g., asking the audience to solve a complex math problem), which accelerates glucose depletion rather than relieving it"
  - "Rushing the Content — speaking 2x faster to cram 40 minutes of information into an 18-minute window, which instantly overwhelms working memory and destroys clarity"

