summary: >
  The 18-Minute Cognitive Load Constraint is a strict biological boundary applied to content
  duration. Backed by neuroscience on glucose depletion and cognitive backlog, it dictates
  that the human brain cannot process unbroken, dense information for longer than 18 minutes
  without actively resisting. In CCP, this primitive acts as a non-negotiable structural
  safeguard, forcing the use of "soft breaks" (stories, exercises, or visual shifts) every
  10-18 minutes to reset the audience's neurochemistry and preserve engagement.

core_move: >
  Enforce a hard stop of 18 minutes for any unbroken informational delivery, utilizing "soft breaks" (stories, videos, or interactivity) to reset cognitive load in longer formats.

why_it_works: >
  Gallo triangulates three independent scientific findings to explain TED's strict 18-minute rule:
  (1) Cognitive Backlog (Paul King, TCU): as a listener accumulates new data, anxiety rises
  until the weight becomes unbearable around 20 minutes. (2) Glucose Depletion (Roy Baumeister):
  intense cognitive processing burns brain fuel rapidly; an exhausted brain stops listening.
  (3) Miller's Law (Revised): working memory maxes out at 3-4 chunks. When a speaker pushes past
  18 minutes without a break, the audience doesn't just lose focus—their biology actively fights
  the incoming information to conserve energy. A "soft break" (a compelling story, a demo, a
  laugh) requires less cognitive fuel, allowing the brain's glucose levels to recover while
  maintaining emotional engagement.

examples:
  - context: "BOOK: Talk Like TED - Stick to the 18-Minute Rule"
    application: >
      Gallo triangulates neuroscience on glucose depletion and cognitive backlog to explain TED's strict 18-minute limit. The brain cannot process unbroken, dense information longer than this without resisting. "Soft breaks" (stories, videos) must be inserted to reset neurochemistry.
    effect: >
      The brain's glucose levels recover during the soft break, preventing cognitive overload and maintaining long-term emotional engagement.

  - context: "CCP: V2WS - Webinar Architecture"
    application: >
      A coach submits a 90-minute script with 60 minutes of unbroken teaching. The V2WS agent rejects it, enforcing the 18-Minute Constraint. The webinar is broken into four 18-minute sprints, separated by 2-minute "soft breaks" (e.g., a Q&A or an emotional client video).
    effect: >
      The audience finishes the 90-minute session energized rather than exhausted. Retention skyrockets because the brain had necessary recovery periods.

  - context: "CCP: CCF - Coaching Session Design"
    application: >
      A 1-on-1 coaching agenda includes a 30-minute block on a complex financial model. The CCF agent breaks it: 12 minutes teaching (Logos), 3-minute client success story (Soft Break/Pathos), 5 minutes client application (Soft Break/Kinesthetic).
    effect: >
      The client masters the model. The cognitive backlog is cleared by the story, and the application exercise locks the knowledge without overwhelm.

  - context: "CCP: CMF - Masterclass Editing"
    application: >
      During post-production of a 2-hour masterclass, the CMF agent automatically inserts a B-roll "breather" sequence with ambient music and no voiceover exactly every 15-18 minutes.
    effect: >
      The viewer is forced into a state of passive reflection, allowing working memory to consolidate the previous chapter's data before the next chapter begins.

  - context: "CCP: Telegram - Audio Course Delivery"
    application: >
      When a coach attempts to upload a 40-minute audio lecture to their Telegram channel, the Guardian Agent intercepts it and slices it into three sub-15-minute tracks, demanding the coach record a 30-second conversational transition between each.
    effect: >
      Completion rates jump from 12% to 85% because the biological intimidation factor of the single massive file is removed.

anti_examples:
  - description: >
      A well-meaning coach delivers a "value-packed" 45-minute uninterrupted monologue on
      the history, theory, and application of their coaching methodology, believing that
      more information equals more value.
    why_it_fails: >
      By minute 22, the audience's glucose is depleted and cognitive backlog is full. The
      remaining 23 minutes of brilliant content are not only forgotten but cause the audience
      to resent the coach for the mental exhaustion. The "value" is weaponized against the
      audience's biology.

