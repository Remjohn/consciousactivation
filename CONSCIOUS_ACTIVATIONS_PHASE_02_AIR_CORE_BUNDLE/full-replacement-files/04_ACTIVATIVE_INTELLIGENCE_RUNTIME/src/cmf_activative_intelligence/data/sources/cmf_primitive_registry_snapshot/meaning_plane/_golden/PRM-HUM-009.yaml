trigger_conditions:
  - "Audience niche is well-defined and shares common lived experiences"
  - "Content goal includes bonding or trust-building before challenge"
  - "The coaching truth being delivered risks feeling generic or preachy"
  - "Social shareability is a priority (clips, quotes, hooks)"

suppression_conditions:
  - "Audience is too diverse for any single reference to land universally"
  - "The content is already at peak emotional intensity — humor would break the moment"
  - "The coaching context requires clinical precision (e.g., crisis intervention)"

misuse_modes:
  - "Reference scope mismatch — using niche references with a broad audience"
  - "Reference overload — too many references flatten the comedic impact"
  - "Reference without payload — humor that carries no coaching truth underneath"

synergizes_with:
  - "PRM-HUM-037"  # Hyper-Specificity Anchoring — specificity amplifies recognition
  - "PRM-HUM-023"  # Tribal Reference — both build belonging through shared knowledge
  - "PRM-PRS-030"  # Connection Before Content — reference humor IS connection
  - "PRM-HUM-002"  # Irreducible Truth — references work best when carrying real truth

conflicts_with:
  - "PRM-HUM-024"  # Metahumor — breaking the frame undermines the reference's reality
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — absurdity conflicts with recognition realism

crosswalk_id: null
crosswalk_note: null

notes: >
  This primitive is one of the highest-value humor moves for CCP because
  coaching content lives or dies on whether the audience feels 'this person
  understands my world.' Reference humor is the fastest path to that feeling.
  Prioritize for CCF hooks, CMF shorts, and CBCS accountability messages.
  Lower priority for pure sonic or visual-only outputs where verbal
  reference is absent.
