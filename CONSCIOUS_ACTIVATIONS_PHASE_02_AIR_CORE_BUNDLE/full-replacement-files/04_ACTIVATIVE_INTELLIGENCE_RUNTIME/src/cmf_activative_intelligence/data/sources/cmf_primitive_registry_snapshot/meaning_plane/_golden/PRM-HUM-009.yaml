    primitive_name_in_audit: "Reference Funny Filter"
    mcda_score: 195
    audit_path: "lab/CCP APRIL Updates/Public_Speaking_Audits/01_Humor_and_Comedy/Audit_How_to_Write_Funny_Characters.md"

book_reference:
  title: "How to Write Funny Characters"
  author: "Scott Dikkers"
  chapters:
    - "Chapter 7: The Funny Filters"
    - "Chapter 8: Reference Humor"
  key_pages: "89-112"
  book_path: "lab/Public Speeaking Coaching/01_Humor_and_Comedy/How to Write Funny Characters.md"

summary: >
  Reference Funny Filter is a humor primitive that creates comedy through shared
  cultural, professional, or lived-experience references that make the audience
  instantly recognize themselves or their world. It works by sweeping the
  audience into complicity — they laugh because they know what you know, and
  they feel seen because you named what they privately experience. In CCP,
  this primitive is foundational because coaching humor must feel insider,
  not generic.

core_move: >
  Sweeten the character or content with shared references that make the
  audience recognize themselves.

why_it_works: >
  Recognition produces a dual neurological reward — the pleasure of pattern
  completion (the brain successfully matched the reference) combined with
  the social warmth of belonging (someone else sees what I see). Dikkers
  shows that reference humor bypasses the need for setup-punchline
  architecture entirely because the audience's own memory supplies the
  comedic payload. The comedian becomes a mirror rather than a performer.
  This is why reference humor has the highest MCDA in the character-comedy
  shelf — it requires the least explanation and produces the strongest
  audience bonding.

examples:
  - context: "CCF Discovery-mode hook for burned-out solopreneur coaches"
    application: >
      Open with a reference to the specific experience of recording a Loom
      video at 11pm with a ring light balanced on a stack of books. Name
      the exact brand of ring light. Name the exact expression you make
      when you realize you forgot to hit record.
    effect: >
      The coach reading the hook immediately feels recognized. Trust
      spikes before any persuasion begins. The hook becomes shareable
      because others in the same niche will say 'that's literally me.'

  - context: "CMF breakthrough short for a fitness coaching niche"
    application: >
      Reference the specific moment when a client says 'I already know what
      to eat' while holding a protein bar they bought because of Instagram.
      Use the exact phrasing coaches hear daily.
    effect: >
      The audience laughs in recognition. The content becomes sticky because
      the humor carries a real coaching truth — knowledge without behavior
      change is the core problem. The reference filter makes the truth
      land as comedy rather than lecture.

  - context: "CBCS Telegram accountability reply after a weak performance score"
    application: >
      The agent references the universal coaching experience of preparing
      a brilliant metaphor and then forgetting it mid-sentence. Name the
      specific facial expression and the filler phrase that follows.
    effect: >
      The coach feels less alone in their failure. The humor transforms
      a potentially demoralizing score into a relatable human moment,
      preserving the reservoir of goodwill.

anti_examples:
  - description: >
      Using pop culture references that only work for a US millennial
      audience (e.g., 'this is giving Ross from Friends energy') when
      the coach audience is international business professionals.
    why_it_fails: >
      Reference humor only works when the reference is SHARED. If the
      audience doesn't have the memory, the pattern completion fails
      and the humor reads as insider exclusion rather than inclusion.
      Dikkers explicitly warns that reference scope must match audience scope.

  - description: >
      Overloading a single piece of content with 5+ references so it
      reads like a Twitter meme thread rather than coaching content.
    why_it_fails: >
      Reference density past 2-3 per piece shifts the tone from
      'I see you' to 'I'm performing internet culture.' The humor
      loses its grounding truth and becomes decoration. The coaching
      payload disappears under the comedy.

