trigger_conditions:
  - "JIT Compiler initiates a new topic generation sequence; CoT association mapping must be executed before text drafting begins"
  - "Critic agent flags current metaphor as 'cliché' or 'predictable'; system must regenerate the association web focusing on periphery nodes"
  - "CVE visual prompt generation requires conceptual collision; system must pull inputs from the extremes of the active association map"

suppression_conditions:
  - "Interaction is a CBCS live response where the token overhead and latency of CoT mapping would break conversational rhythm"
  - "Topic requires strict, literal technical explanation where metaphorical associations would introduce operational risk"

misuse_modes:
  - "Center-selection — building the web but selecting obvious associations, defeating the purpose"
  - "Over-exploration — building such a vast web that the content loses coherence, becoming a collection of loosely related tangents"
  - "Web-as-product — presenting the raw association map to the audience instead of using it as an internal generation tool"

synergizes_with:
  - "PRM-HUM-031"  # The Mix — the Associative Web surfaces the unexpected domain pairings that The Mix requires
  - "PRM-HUM-025"  # Analogy Bridge — the web produces the cross-domain mapping candidates
  - "PRM-HUM-007"  # Production Over-Saturation — the web IS volume-first ideation at the conceptual level

conflicts_with:
  - "PRM-HUM-006"  # Temporal Resolution Delay — the Associative Web operates at the pre-writing phase, far upstream of the syntactic precision that Temporal Delay requires

