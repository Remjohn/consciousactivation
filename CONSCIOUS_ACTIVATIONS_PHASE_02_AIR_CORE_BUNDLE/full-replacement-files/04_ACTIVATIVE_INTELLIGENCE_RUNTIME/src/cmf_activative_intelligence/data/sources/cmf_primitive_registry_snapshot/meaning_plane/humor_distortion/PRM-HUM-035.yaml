notes: >
  This is the most upstream primitive in the entire registry — it operates
  before any content is drafted. Its MCDA (185) reflects strong scores
  across all dimensions but requires Chain-of-Thought pipeline infrastructure
  (token overhead). Float note: phase_fit.pre_trigger is ceiling (0.9)
  because the association web IS the pre-trigger ideation step.
  goal_bias.surprise is ceiling (0.9) because the entire point of the
  web is to surface UNEXPECTED connections.
