activation_conditions:
  - "User opens the Telegram Mini App for the first time in a session"
  - "System transitions between major states (e.g., from prompt to recording)"
  - "System experiences unavoidable technical latency (upload, render)"

suppression_conditions:
  - "User is actively speaking/recording (visuals should not distract from performance)"
  - "User is reading a dense, necessary text explanation (avoid competing contrast)"

misuse_modes:
  - "Aesthetic bloat — animations that are so heavy they actually cause device lag, reversing the effect"
  - "Inconsistent styling — mixing cheap stock assets with cinematic UI, shattering the illusion"
  - "Style over substance — using visceral hooking for a feature that is fundamentally broken behaviorally"

