crosswalk_id: "XW-VIS-HOOK"
crosswalk_note: >
  Meaning side: coordinates with VSG (Visual & Sonic Guidance) to ensure
  that the aesthetic choices align with the archetypal geometry of the content.
  Experience side: uses that aesthetic strictly as a behavioral lubricant and
  trust signal.

notes: >
  Norman's finding that 'attractive things work better' is often misunderstood
  as a defense of decoration. It is actually a biological observation about
  affect and cognition. For CCP, Visceral Hooking is an engineering tool used
  to buy cognitive tolerance and establish instant authority, which is
  mandatory when selling high-ticket coaching environments.
