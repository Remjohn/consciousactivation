trigger_conditions:
  - "When writing the hook or opening 60 seconds for any CCF, CMF, or V2WS content asset"
  - "When auditing webinar metrics that show a massive drop-off in the first 5 minutes"
  - "When a coach relies on 'TED Clichés' (e.g., 'Webster's dictionary defines...')"

suppression_conditions:
  - "During mid-funnel, highly technical SOP training where the user has already explicitly opted-in to learn a specific skill and dramatic hooks would feel manipulative"

misuse_modes:
  - "The Bait and Switch — using a dramatic or shocking hook that has absolutely nothing to do with the actual throughline of the talk, angering the audience when they realize they were tricked"
  - "The Endless Tease — opening an information gap but waiting 45 minutes to close it, exhausting the audience's patience and causing them to abandon the content"

synergizes_with:
  - "PRM-PRS-023"  # Emotionally Competent Stimulus Design (A great opening is often a specifically designed ECS)
  - "PRM-PRS-001"  # Strong Title as Idea Architecture (The title creates the initial gap; the opening widens it)

conflicts_with:
  - "PRM-HUM-009"  # High-Fidelity Information Transfer — pure information transfer prefers immediate, blunt delivery of facts, which conflicts with the deliberate withholding of information required to build a curiosity gap

crosswalk_id: "XW-HOOK-RETENTION"
crosswalk_note: "Experience design applies this to the first screen of an app: showing the user an immediate, high-value result before forcing them to create an account."

notes: >
  This primitive proves that the battle for attention is won or lost in the first 60 seconds.
  If you do not open a gap, the audience will not follow you.
