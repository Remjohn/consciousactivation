summary: >
  Curiosity Ignition as the Opening Architecture is a high-leverage structural primitive that
  governs the first 60 seconds of any communication. It dictates that the opening must immediately
  create an irresistible 'information gap' using one of four mechanisms: Drama, Curiosity, Visual
  shock, or a Provocative Teaser. In CCP, this primitive acts as a strict negative constraint,
  forbidding 'slow starts'—apologies, credential listings, agenda reading, or corporate
  pleasantries—which program the audience to disengage before the core content even begins.

core_move: >
  Design the first 60 seconds to instantly create a curiosity gap (via a dramatic statement, a puzzling question, or a stunning visual) while explicitly banning apologies, credentials, or administrative context-setting.

why_it_works: >
  Anderson notes that the audience forms its definitive opinion of a speaker and their content
  in the first 60 seconds. If a speaker opens with 'slow starts' (thanking the organizers, giving
  their bio, stating the agenda), they signal to the audience that it is safe to check their
  phones. A slow start creates a bias toward disengagement that even brilliant subsequent content
  cannot overcome. By opening with Drama (high stakes), Curiosity (a philosophical puzzle), a
  Visual (showing something astonishing before speaking), or a Teaser ('By the end of this,
  everything you know about X will be wrong'), the speaker forces the audience's brain to open
  an 'information gap.' The human brain hates unresolved gaps; the audience is now neurologically
  compelled to pay attention to get the resolution.

examples:
  - context: "BOOK: TED Talks Guide - Curiosity Ignition"
    application: >
      Anderson warns that opening with "slow starts" (apologies, credentials, agenda reading) trains the audience to check their phones. The first 60 seconds must create an irresistible "information gap" using Drama, Curiosity, Visual shock, or a Provocative Teaser, compelling the brain to pay attention to get the resolution.
    effect: >
      The brain hates unresolved gaps. By instantly opening one, the speaker secures maximum attention during the most valuable real estate of the presentation.

  - context: "CCP: CMF - Video Hook Scripting"
    application: >
      A coach drafts: "Hi, today I'll teach the five dysfunctions of a team." The CMF agent rejects it, applying the 'Curiosity' mechanism: "Think of the smartest team you've ever worked on. Why did they fail? I'll show you the invisible virus that killed them."
    effect: >
      The audience's brain immediately opens a gap: 'Was my team infected?' The scroll stops. Attention is secured before the 3-second drop-off window closes.

  - context: "CCP: V2WS - Webinar Opening"
    application: >
      The webinar begins not with a bio, but with the coach on camera applying 'Drama': "Three years ago, my bank account hit zero. What I learned the next morning is the only reason you are watching this."
    effect: >
      The vulnerability and high stakes immediately bond the audience and create overwhelming desire to know what happened. The retention graph stays flat at 100% through the first critical 10 minutes.

  - context: "CCP: CCF - The Anti-Cliché Gate"
    application: >
      A script attempts to open with "Webster's dictionary defines leadership as..." The CCF agent blocks the generation, flagging it as a "TED Cliché." It forces the coach to replace it with a Provocative Teaser: "Everything you've been taught about leadership is actually management. Here is the difference."
    effect: >
      The audience's pre-existing mental model is challenged, forcing them to lean in to defend or update their worldview.

  - context: "CCP: Telegram - The Subject Line Teaser"
    application: >
      A Sunday Postcard avoids the subject line "Weekly Updates." Instead, the Guardian agent generates the hook: "The one habit costing you 14 hours a week."
    effect: >
      The specific, quantifiable tease opens a severe information gap regarding personal loss aversion, resulting in an 85% open rate compared to the standard 20%.

anti_examples:
  - description: >
      A speaker opens a high-stakes keynote with: "Thank you so much for having me. I'm really
      excited to be here. Before we dive into the data, let me just give you a little background
      on my company and how we came up with this framework..."
    why_it_fails: >
      This is the 'Death by Pleasantries' failure mode. The speaker has squandered the most
      valuable real estate in the presentation (the first 60 seconds of maximum attention)
      on administrative noise. The audience's brain decides the talk is 'routine corporate
      speak' and tunes out.

