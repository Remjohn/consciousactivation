trigger_conditions:
  - "The narrative requires a shift from objective storytelling to subjective, internal emotion"
  - "The audio feels 'generic' or disconnected from the visual environment"
  - "The coach is speaking directly to the 'Listener of One' and requires maximum intimacy"

suppression_conditions:
  - "The content is a purely objective, technical tutorial where acoustic manipulation would distract from the clarity of the instruction"

misuse_modes:
  - "The Reverb Crutch — Adding massive amounts of reverb to everything to make it sound 'epic' or 'professional,' which actually just makes it sound muddy and distant"
  - "Unintentional Subjectivity — Using a terrible, muffled microphone by accident, forcing the audience into a 'surveillance' POV when trying to deliver a premium sales pitch"
  - "Jarring Transitions — Shifting the auditory POV so frequently and violently within a single minute that the audience gets acoustic whiplash and tunes out"

synergizes_with:
  - "PRM-VSG-023" # Lens Choice as Emotional Syntax (Auditory POV is the sonic equivalent of focal length)
  - "PRM-PSY-018" # Layered Narrative Architecture (Using sound to distinguish the 'Macro' story from the 'Micro' memory)

conflicts_with:
  - "PRM-VSG-032" # Polyphony and Controlled Density (Subjective POV often requires extreme sparsity, not polyphony)

crosswalk_id: "XW-SUBJECTIVE-ACOUSTICS"
crosswalk_note: "Meaning focuses on audio reverberation/dryness; Experience focuses on 1st-person vs 3rd-person UX copy (e.g., 'My Dashboard' vs 'User Dashboard')."

notes: >
  For CMF, the audio processing pipeline must include an `acoustic_environment` parameter (e.g.,
  'hyper-dry', 'room_tone', 'cathedral', 'telephone_eq') that the LLM can actively manipulate based
  on the emotional beat of the script.
