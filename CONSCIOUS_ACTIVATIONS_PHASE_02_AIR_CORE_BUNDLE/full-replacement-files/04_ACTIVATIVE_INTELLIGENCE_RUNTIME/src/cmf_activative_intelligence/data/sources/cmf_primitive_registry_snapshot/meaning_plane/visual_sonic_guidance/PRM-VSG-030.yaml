book_reference:
  title: "Designing Sound"
  author: "Jay Beck"
  chapters:
    - "Point of Audition"
  key_pages: "Sections detailing 'internal and external point of view' and 'point of audition'"
  book_path: "lab/Public Speeaking Coaching/08_Sound_Design/Designing Sound - Jay Beck.md"

summary: >
  Auditory Point of View dictates that sound does not merely record an event; it defines *who* is
  experiencing the event. By manipulating reverberation, dryness, muffling, and internal versus
  external sound sources, the creator places the audience either safely outside the scene as an
  objective observer, or traps them inside the subjective psychological state of a specific character.
core_move: >
  Do not default to standard, 'clean' broadcast audio for every asset. Explicitly define the 'Point
  of Audition.' If the narrative requires extreme intimacy or internal confession, use a hyper-dry,
  close-mic sound with zero room reflection. If the narrative requires alienation or disorientation,
  use extreme reverberation, low-pass filtering (muffling), or 'surveillance' tape aesthetics to
  distance the listener.
why_it_works: >
  As Jay Beck outlines, cinema developed the 'point of audition' to complement the visual point of view.
  When audio is perfectly clean and balanced, it feels 'external' and objective; the viewer is watching
  the subject from afar. When audio physics change to mimic human perception (e.g., the ringing in the
  ears after a shock, the muffled sound of being underwater, or the bone-dry closeness of a whisper in
  an empty room), the listener's brain maps that acoustic data onto their own body. The audience stops
  listening *to* the coach and begins listening *as* the coach.

examples:
  - context: "BOOK: Subjective audio in film"
    application: >
      Beck describes scenes where the audience is placed precisely in the 'point of audition' of a
      character. For instance, when a character is in shock, the external ambient noise drops away completely,
      and only their internal breathing or a high-pitched tinnitus ring is audible, shutting out the 'real' world.
    effect: >
      The audience is forced into the character's panic. The subjective audio bypasses rational observation
      and induces an immediate, empathetic physiological response in the viewer.

  - context: "CCP: CCF Archetype Voice Note via Telegram (CBCS)"
    application: >
      A 'Mystic' archetype coach sends a voice note. The CCP audio engine applies a subtle, expanding
      reverb tail to the coach's voice, making it sound as if they are speaking in a large, empty
      cathedral, even though they recorded it in their car.
    effect: >
      The Auditory Point of View shifts from 'a guy in a car' to 'a voice of authority speaking from a
      sacred space,' instantly aligning the acoustic reality with the archetype's brand promise.

  - context: "CCP: V2WS Webinar 'The Failure' module"
    application: >
      The speaker describes the moment they hit rock bottom. To emphasize this, the audio mix subtly
      low-pass filters the speaker's voice (cutting the high frequencies) and adds a slight 'telephone'
      or 'surveillance' EQ for exactly 10 seconds during the darkest part of the story.
    effect: >
      The audience feels a sudden sense of distance and claustrophobia. The auditory shift makes the
      'failure' feel like an isolated, trapped memory, maximizing the emotional contrast when the audio
      returns to full, bright clarity for the 'solution.'

  - context: "CCP: CMF Media Factory - Reel Transition"
    application: >
      The video shows the coach walking through a noisy, crowded street. The audio is full of honking
      and chatter (External POV). The coach stops, looks at the camera, and delivers the hook. At that
      exact second, all street noise is violently muted, leaving only the coach's voice in a hyper-dry,
      intimate studio acoustic (Internal POV).
    effect: >
      The sudden shift from external chaos to internal focus jolts the listener's nervous system,
      creating a massive spike in attention exactly when the core value proposition is delivered.

  - context: "CCP: AI Music Generation (ACE-Step/Suno)"
    application: >
      Instead of just prompting for 'lo-fi hip hop,' the Sonic Scribe prompts the AI: 'The track should
      sound like it is playing from a cheap radio in the next room (muffled, narrow stereo image).'
    effect: >
      The music becomes environmental and nostalgic, creating a specific Point of Audition that feels
      lived-in and authentic, rather than a generic digital beat overlaid on the video.

anti_examples:
  - description: >
      A coach records a deeply personal, heartbreaking story about a family loss, but they record it
      in a massive, echoing, empty tiled room (like a kitchen or bathroom) with the phone 5 feet away.
    why_it_fails: >
      The auditory point of view is 'distant, cold, and public.' The intense reverberation pushes the
      listener away, completely neutralizing the intimacy of the spoken words. The acoustic physics
      actively fight the emotional intent.

