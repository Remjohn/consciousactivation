summary: >
  The B=MAP Friction Audit requires that every feature be systematically evaluated
  against Fogg's 6 elements of simplicity (Time, Money, Physical Effort, Brain Cycles,
  Social Deviance, Non-Routine) to maximize 'Ability'. If Motivation is low, the
  behavior will only occur if Ability is exceptionally high.

core_move: >
  Systematically identify and remove any requirement that demands excessive time,
  physical taps, mental analysis, or social risk from the core 'Record a Reaction' loop.

why_it_works: >
  BJ Fogg's behavior model (B=MAP) dictates that Behavior = Motivation x Ability x Prompt.
  When a coach is tired, their Motivation plummets. Fogg explicitly warns against trying
  to artificially boost motivation; instead, you must increase Ability. By auditing
  and removing Brain Cycles (not making them think of a topic) and Physical Effort
  (reducing a 4-click flow to 1-click), we ensure the action falls above the action
  line even on their worst days.

examples:
  - context: "BOOK: Tiny Habits - The Flossing Reduction"
    application: >
      Instead of flossing all teeth (high time, high effort), the target behavior is
      reduced to 'floss one tooth'. The physical and mental ability required drops to
      near zero, guaranteeing compliance.
    effect: >
      The habit forms because it is literally too easy to fail.

  - context: "CCP: The Auto-Quoted Counter-Take (Brain Cycles)"
    application: >
      When responding to a debate, the user does not have to summarize the opponent.
      The system automatically plays a 3-second snippet of the opponent's audio,
      pre-loading the context. Brain Cycles required = 0.
    effect: >
      Removes the cognitive friction of formulating an opening statement.

  - context: "CCP: The Inline Telegram Web App (Physical Effort)"
    application: >
      The user does not open an App Store, download an app, log in, and navigate to
      a menu. They tap a single inline button in Telegram, and the Web App pops up
      instantly with the microphone primed. Physical Effort = 1 tap.
    effect: >
      Massive reduction in drop-off between prompt and execution.

  - context: "CCP: The 60-Second Cap (Time)"
    application: >
      The system hard-caps all reactions at 60 seconds. This removes the 'Time' friction.
      The user knows this task will not take 10 minutes, making it easy to slip into
      a busy schedule.
    effect: >
      High compliance even during busy workdays.

  - context: "CCP: The Sandbox Mode (Social Deviance)"
    application: >
      For their first 7 days, a new coach's audio is entirely private (Sandbox Mode).
      This removes the 'Social Deviance' fear of looking stupid in public.
    effect: >
      Removes the massive psychological friction of public speaking anxiety.

anti_examples:
  - description: >
      A prompt that says: 'Log into the web portal, navigate to the Law28 curriculum,
      find Day 4, read the PDF, and upload a 5-minute video of your thoughts.'
    why_it_fails: >
      Fails across the board. High physical effort (login/navigate), high time (5 mins),
      high brain cycles (read PDF). Ability is catastrophically low. Behavior fails.

