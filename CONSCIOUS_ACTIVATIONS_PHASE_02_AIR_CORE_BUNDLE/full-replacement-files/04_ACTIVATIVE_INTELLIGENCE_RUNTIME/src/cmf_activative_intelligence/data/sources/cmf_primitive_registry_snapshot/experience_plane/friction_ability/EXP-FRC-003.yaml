misuse_modes:
  - "Eliminating Meaning — making the task so easy (e.g., 'just tap this button for points') that it no longer requires actual speaking practice."
  - "Ignoring Context — reducing 'Time' but ignoring 'Social Risk' (e.g., asking them to do a 10-second scream in a public coffee shop)."

