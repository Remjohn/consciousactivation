summary: >
  Directed Emotional Stance is Holloway's rule that a joke without an
  attitude is just an observation — and an observation without an attitude
  is white noise. Every effective premise requires a defined subject paired
  with a specific, heightened emotion (frustration, incredulity, obsessive
  joy, righteous indignation). This primitive ensures no piece of CCP content
  is delivered from a "neutral" perspective. Where Rosenfield's PRM-HUM-017
  (Attitude-Emotion Binding) governs moment-to-moment emotional tagging,
  Holloway's Directed Emotional Stance operates at the strategic level:
  the JIT Compiler assigns an emotional persona stance BEFORE generating
  text, ensuring dynamic tonal variety and persona engineering.

core_move: >
  Before generating any content, assign a specific, heightened emotional
  stance toward the topic — never allow content to emerge from a neutral
  or balanced perspective.

why_it_works: >
  Holloway's Fundamental Truth #2: "Data transfer without an emotional
  vector is instantly forgotten. A perspective without an attitude is white
  noise." The mechanism is emotional encoding: the brain stores information
  tagged with emotional valence in long-term memory; emotionally neutral
  information is discarded after working memory clears. By pre-assigning
  a stance (righteous indignation, fascinated curiosity, bewildered
  frustration), the JIT Compiler ensures the content's emotional charge
  is defined at the architectural level, not left to the LLM's statistical
  centroid.

examples:
  - context: "BOOK: The Serious Guide to Joke Writing - Topic Plus Attitude"
    application: >
      Holloway argues that data without emotion is white noise. A premise requires a defined subject paired with a specific, heightened emotional valence (frustration, obsessive joy).
    effect: >
      Ensures the audience encodes the information emotionally, increasing retention. The content never emerges from a neutral, forgettable perspective.

  - context: "CCP: JIT Compiler - The Pre-Generation Stance Assignment"
    application: >
      Before drafting, the Compiler assigns a specific emotional stance ('righteous indignation', 'bewildered frustration') to the system prompt, overriding the LLM's default neutrality.
    effect: >
      The resulting output reads as a human who CARES deeply about the topic, providing the gravitational force that pulls the audience in.

  - context: "CCP: CMF - The Emotional Rotation Calendar"
    application: >
      The CMF assigns different emotional stances to different days of the content calendar to prevent tonal monotony and build a 3D persona.
    effect: >
      The audience encounters a full human emotional range, deepening the parasocial bond and avoiding the one-note 'angry coach' caricature.

  - context: "CCP: V2WS - The Pitch Transition Shift"
    application: >
      At the moment of the pitch, the system dictates an abrupt shift in emotional stance (e.g., from 'fascinated curiosity' to 'quiet, unwavering authority').
    effect: >
      The tonal shift signals to the audience that the relationship dynamic has temporarily changed from education to invitation.

  - context: "CCP: CBCS - The Empathic Mirror"
    application: >
      The CBCS analyzes the client's emotional state and adopts a complementary (not always matching) emotional stance to guide the conversation.
    effect: >
      Provides dynamic conversational flow rather than generic "I understand how you feel" AI responses.

anti_examples:
  - description: >
      A CMF hook reads: 'There are several perspectives on accountability
      in coaching, and it's important to consider the various approaches
      that different experts recommend.' No emotional stance whatsoever.
    why_it_fails: >
      Holloway's rule: this IS white noise. The content has no emotional
      vector. The audience's brain has no emotional tag to attach to
      the information, so it is discarded after reading. No one saves,
      shares, or remembers a "balanced perspective on various approaches."

  - description: >
      Every piece of content uses the same emotional stance (frustrated
      anger) regardless of topic, creating a one-note persona.
    why_it_fails: >
      Directed Emotional Stance requires DIRECTED variety — each topic
      gets the stance that serves it best. Using anger for everything
      creates emotional fatigue and collapses the persona into a
      caricature. The rotating stance calendar prevents this.

