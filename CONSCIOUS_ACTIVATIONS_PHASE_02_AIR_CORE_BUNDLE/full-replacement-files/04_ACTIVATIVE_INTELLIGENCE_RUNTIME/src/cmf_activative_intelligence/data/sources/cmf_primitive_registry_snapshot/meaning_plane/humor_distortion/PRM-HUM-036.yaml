trigger_conditions:
  - "JIT Compiler initializes a content draft; a specific emotional valence must be injected into the system prompt constraints"
  - "Critic agent flags generated text as 'neutral', 'balanced', or 'informational'; draft must be returned for stance injection"
  - "CMF generates a weekly calendar; system must apply a rotating matrix of emotional stances to prevent persona flattening"

suppression_conditions:
  - "Content is formal documentation (Terms of Service, API docs) where emotional coloring would introduce legal ambiguity"
  - "CBCS is handling a client in acute psychological distress; clinical neutrality or calm grounding is required over comedic emotional polarization"

misuse_modes:
  - "Stance-without-substance — adopting a passionate emotional position on a topic the coach has no genuine opinion about, producing performative outrage"
  - "Emotional monotony — always assigning the same stance, creating a one-dimensional persona"
  - "Stance mismatch — assigning an emotional valence that contradicts the coach's authentic Voice DNA (e.g., assigning 'giddy excitement' to a coach whose natural register is 'quiet authority')"

synergizes_with:
  - "PRM-HUM-017"  # Attitude-Emotion Binding — Holloway provides the strategic pre-assignment; Rosenfield provides the moment-to-moment enforcement
  - "PRM-HUM-028"  # Authentic Topic Extraction — Carter's HWSS classifier produces topics pre-loaded with emotional stance (Hard, Weird, Scary, Stupid)
  - "PRM-HUM-037"  # Hyper-Specificity Anchoring — the 80/20 combo: Attitude + Specificity = immediate elimination of the AI footprint

conflicts_with:
  - "PRM-HUM-024"  # Metahumor and Frame Breaking — meta-acknowledging the emotional stance ('I know I sound angry but...') can undermine the stance's power

