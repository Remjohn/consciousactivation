notes: >
  Second-highest MCDA in the entire HUM registry (190) and one half of
  Holloway's 80/20 combo with Hyper-Specificity. Float note: This primitive
  is strategically upstream of Rosenfield's PRM-HUM-017 — it operates at
  the system-prompt level (defining WHICH emotion) while HUM-017 operates
  at the output-validation level (checking that the emotion was executed).
  surface_fit.voice and webinar are ceiling (0.9) because vocal delivery
  is the medium most sensitive to emotional stance presence or absence.
