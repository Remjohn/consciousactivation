  - "PRM-VSG-017" # Character, Location, Event (The event often provides the punctum)

conflicts_with:
  - "PRM-PSY-022" # The Iterative Filter (If the 'whittle' phase is too aggressive, it might accidentally cut out the punctum)

crosswalk_id: "XW-FELT-TRUTH"
crosswalk_note: "Meaning focuses on preserving visual/audio artifacts of reality; Experience focuses on avoiding 'corporate' UI copy in favor of human syntax."

notes: >
  This is the hardest primitive to automate, but the most important for Era 3 survival. The CVE
  system must be prompted not just to 'generate an image,' but to 'generate an image and inject
  one specific, un-managed detail that breaks the symmetry.'
