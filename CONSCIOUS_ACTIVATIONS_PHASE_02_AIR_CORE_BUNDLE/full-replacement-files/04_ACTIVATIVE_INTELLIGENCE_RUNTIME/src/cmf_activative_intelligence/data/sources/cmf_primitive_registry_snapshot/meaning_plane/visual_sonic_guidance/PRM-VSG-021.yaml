trigger_conditions:
  - "The content output (especially AI-generated visual or voice) is feeling 'soulless,' 'too corporate,' or 'plastic'"
  - "The goal is deep community connection and loyalty, rather than top-of-funnel virality"
  - "Reviewing raw, documentary-style footage to find the most resonant frame"

suppression_conditions:
  - "The asset is a high-trust, low-friction utilitarian interface (e.g., a checkout page) where 'messiness' or 'friction' would cause panic and cart abandonment"
  - "The brand strategy specifically requires a hyper-real, synthetic, 'pop-art' aesthetic where the absence of humanity is the point"

misuse_modes:
  - "Manufactured Messiness — Staging a 'messy desk' so perfectly that it looks like an Anthropologie catalog, which the viewer immediately clocks as fake"
  - "Distracting Flaws — Allowing a flaw that is so jarring (e.g., terrible audio quality) that it actively prevents the user from receiving the value"
  - "Sacrificing Clarity for Art — Relying so heavily on 'ambiguous air' that the core promise of the coaching product is completely obscured"

synergizes_with:
