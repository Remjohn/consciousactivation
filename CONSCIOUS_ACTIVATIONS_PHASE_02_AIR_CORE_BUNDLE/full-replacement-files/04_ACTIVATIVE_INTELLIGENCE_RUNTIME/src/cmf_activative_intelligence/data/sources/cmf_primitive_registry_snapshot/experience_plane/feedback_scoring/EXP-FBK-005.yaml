summary: >
  Attention Filtering dictates how mixed feedback is presented visually. The UI must
  deliberately hijack the user's 'attentional keyhole' by giving massive visual real
  estate (fonts, colors, placement) to positive progress, ally support, and strengths,
  while structurally nesting or minimizing negative data so it requires a click to view.

core_move: >
  Format all scorecards and dashboards so that what they did right (and the support
  they received) occupies 80% of the screen, hiding the critical/negative feedback
  behind a 'View Details' or 'Areas for Improvement' accordion.

why_it_works: >
  Nir Eyal discusses how humans have a severe negativity bias; if we see 10 compliments
  and 1 insult, our brain fixates entirely on the insult, destroying psychological safety.
  Because the CPSC AI is clinical and objective, it will deliver harsh truths about pacing
  and conviction. If that harsh truth is the first or largest thing the user sees, they
  will bounce. By explicitly filtering their attention toward their progress first, we
  secure their confidence before asking them to engage their System 2 brain to process
  the critique.

examples:
  - context: "BOOK: Beyond Belief - The Positivity Framing"
    application: >
      When patients are told a surgery has a 90% survival rate, they are calm. When
      told it has a 10% mortality rate, they panic. The data is identical, but the
      attentional focus dictates the emotional response and compliance.
    effect: >
      Controls the user's emotional state by directing their visual focus.

  - context: "CCP: The CPSC Scorecard Layout"
    application: >
      A user receives a 65/100 Delivery Score. The top of the card says in large green
      text: 'Top Strength: Emotional Resonance'. The critique about their severe stuttering
      is placed at the bottom in smaller, neutral-colored text under an 'Optimization' tab.
    effect: >
      The user feels validated first, making them open to the critique second.

  - context: "CCP: The Peer Feedback Priority"
    application: >
      When opening a debate response, the UI highlights '2 Peers voted Based' in
      bright colors. The '1 Peer voted Cringe' is visible, but grayed out and smaller.
    effect: >
      Magnifies social support while minimizing social rejection.

  - context: "CCP: The Streak Failure Reframe"
    application: >
      If a user breaks a 14-day streak, the dashboard does not show a massive red '0'.
      It shows '14 Days Mastered' in gold, and underneath says 'Ready to start a new chain?'
    effect: >
      Prevents the despair of a broken streak by focusing on the accumulated success.

  - context: "CCP: V2WS Pitch Critique"
    application: >
      The AI tells the coach: 'You held 80% of the audience through the transition.'
      It does NOT say: 'You lost 20% of the audience.'
    effect: >
      Maintains the speaker's state of high status during a stressful post-mortem.

anti_examples:
  - description: >
      A user opens their dashboard and immediately sees a giant red graph showing that
      their 'Filler Word Frequency' has spiked by 300%, alongside a warning banner.
    why_it_fails: >
      The UI forces the user's attentional keyhole onto their failure. Their cortisol
      spikes, they feel attacked by the machine, and they close the app to avoid the pain.

