implementation_targets:
  frontend_components:
    - "ProgressiveDisclosureCritique — an accordion component that hides constructive criticism until clicked"
    - "HighlightRenderer — CSS classes that enforce primary brand colors for positive stats and neutral grays for negative stats"
  backend_rules:
    - "prompt_engine: instruct the LLM to format the first sentence of any critique as a highlight of a strength"
  telemetry_events:
    - "critique_accordion_open_rate"
    - "bounce_rate_on_low_score"
  experiments:
    - "A/B test: Showing the numeric score first vs Showing the text highlight first"

