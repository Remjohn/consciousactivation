  - "User experiences a failure state (broken streak, low score, lost debate)"

suppression_conditions:
  - "User has specifically requested a 'Ruthless Roast' or 'Hardcore Analysis' mode where they explicitly want the pain."

misuse_modes:
  - "Delusional Positivity — hiding the negative feedback so completely that the user thinks they are perfect and never improves."
  - "Sandwiching Fails — delivering praise, then a brutal insult, then praise. The user sees through the corporate 'compliment sandwich' and distrusts the AI."

