activation_conditions:
  - "User has achieved a significant win, high score, or milestone"
  - "System is generating a shareable asset (image, video, deep link)"
  - "User has successfully defended a thesis or won a debate"

suppression_conditions:
  - "User performed poorly and did not complete a redemption round (do not force a humiliating share)"
  - "User is in a purely private accountability loop"

misuse_modes:
  - "Overt marketing logic — treating the share as a transaction rather than an identity signal"
  - "Generic assets — using stock imagery rather than the user's specific data/face in the share card"
  - "Forced sharing — locking next steps behind a share gate, which builds resentment"

synergizes_with:
