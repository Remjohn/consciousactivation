summary: >
  Reflective Social Proof governs the silent referral loop. Coaches
  will not share a Conscious Reactions debate link simply because the
  app is useful. They will share it because winning a public argument,
  achieving a 95% Delivery Score, and demonstrating thought leadership
  builds their personal brand. The shareable asset must project elite
  identity, transforming the act of sharing from a 'spammy marketing
  favor' into an authoritative status flex.

core_move: >
  Design the output artifact (video, image, or link preview) to function
  primarily as a high-status credential for the sender, completely
  bypassing the social friction of traditional 'refer-a-friend' mechanics.

why_it_works: >
  At the Reflective level, human behavior is driven by ego, self-image,
  and social perception. When the system produces an artifact that makes
  the user look brilliant, authoritative, and victorious, their desire to
  broadcast that artifact becomes overwhelming. The referral to the CCP
  platform happens silently, as a secondary byproduct of the user
  projecting their own professional dominance to their peers.

examples:
  - context: "Debate with Jury Win (1 BOOK)"
    application: >
      Instead of a generic 'Share your reaction' button, the CTA reads:
      'Publish your Victory.' The generated asset is a cinematic preview
      card displaying their face, their winning score, and the text:
      'I just defended my thesis in the Coach OS Arena and ranked in the
      Top 5% for Conviction. Can you beat my take?'
    application: >
      The generated asset is meticulously designed to make the coach
      look like a superstar. The framing positions the share as an ego
      projection and a challenge, rather than a request for others to
      download an app.

  - context: "7-Day Speaking Challenge Completion (CCP)"
    application: >
      The final shareable asset is not a generic 'I finished a course'
      certificate. It is a dynamic 'Acoustic Baseline Blueprint' that
      shows a highly technical visualization of their vocal mastery
      improvements across 7 days.
    effect: >
      The user shares it on LinkedIn because it proves they are technically
      sophisticated and committed to elite communication mastery. Peers
      click the link out of envy and curiosity about their own acoustic
      baseline.

  - context: "Weekly Recognitions on Church Sunday Screens (CCP)"
    application: >
      The system surfaces weekly challenge winners not as raw names, but
      as beautifully branded 'Testimony Vectors' showing their
      participation depth and breakthrough score.
    effect: >
      Public recognition acts as massive internal social proof. The people
      featured feel deep reflective pride, while observers feel compelled
      to join the next cycle to achieve the same public status.

  - context: "Redemption Round Success Share (CCP)"
    application: >
      If a user bombs, then uses a redemption round to score perfectly,
      the share asset specifically highlights the 'Resilience Delta'.
      'Recovered from a 40% pacing break to achieve 96% resonance.'
    effect: >
      The user shares it to project a narrative of grit and improvement.
      It demonstrates vulnerability combined with ultimate competence, a
      highly attractive identity signal for coaches.

anti_examples:
  - description: >
      Using standard, affiliate-marketing style referral links: 'Get 1
      free month if you invite 3 friends to Conscious Reactions!'
    why_it_fails: >
      This is a behavioral/transactional plea. It asks the coach to burn
      their hard-earned social capital (reputation) for a cheap software
      discount. Elite coaches will refuse, as it damages their reflective
      identity.

  - description: >
      Generating a share asset with a massive, intrusive CCP watermark
      that overshadows the coach's own name and score.
    why_it_fails: >
      The user realizes they are being used as a billboard. The asset
      no longer serves *their* ego; it serves the platform's ego. The
      user will refuse to share it.

