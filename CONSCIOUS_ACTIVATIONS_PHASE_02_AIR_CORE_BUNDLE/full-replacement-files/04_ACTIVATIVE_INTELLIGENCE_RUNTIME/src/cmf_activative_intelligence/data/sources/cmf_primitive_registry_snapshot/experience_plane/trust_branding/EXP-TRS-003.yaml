crosswalk_id: "XW-REF-PROOF"
crosswalk_note: >
  Meaning side: governs the generation of the actual content payload via CMF
  (Media Factory).
  Experience side: governs the psychological framing and social UX that
  prompts the user to distribute that payload.

notes: >
  The entire silent referral engine depends on this primitive. If the
  shared artifact does not make the sender look like a highly competent
  authority, they simply will not share it. The branding must be
  subservient to the coach's ego.
