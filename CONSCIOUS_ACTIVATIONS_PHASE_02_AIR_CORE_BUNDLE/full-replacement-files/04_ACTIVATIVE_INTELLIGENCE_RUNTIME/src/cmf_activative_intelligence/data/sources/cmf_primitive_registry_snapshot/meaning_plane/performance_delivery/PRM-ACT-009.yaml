summary: >
  Repeat exactly what you hear or observe from the audience before formulating
  a response. This forces the intellect to disengage and allows genuine,
  instinctive reaction to take over. It establishes profound contact by proving
  to the audience that they have been truly seen and heard.

core_move: >
  Repeat exactly what you observe to force instinctive reaction.

why_it_works: >
  Meisner's foundational exercise strips away the actor's desire to "perform"
  by forcing them into a mechanical loop of repeating the other person's
  statement. The brain disengages; the instinct engages. In coaching content,
  when the first line is not new information but rather a verbatim repetition
  of the audience's internal monologue ("You're exhausted"), it is no longer
  a monologue—it is a mirror. This creates instantaneous, anti-intellectual
  contact.

examples:
  - context: "BOOK: Sanford Meisner on Acting - Repetition Game"
    application: >
      Meisner's foundational exercise requires an actor to repeat exactly what they hear from their partner before formulating a response. This disengages the intellect, preventing "performative" acting, and forces a genuine, instinctive reaction based on true contact.
    effect: >
      It proves to the audience that they have been truly seen and heard, establishing profound, anti-intellectual contact.

  - context: "CCP: CMF - Trigger Engine Hook"
    application: >
      Instead of starting with a framework, the CMF agent prompts the coach to start by repeating a client's verbatim complaint: "You told me yesterday that if you have to write one more SOP, you're going to burn the business down. You're going to burn the business down."
    effect: >
      The audience hears themselves. They feel completely understood before a solution is even offered, priming them for deep trust.

  - context: "CCP: Conscious Reactions - Accountability Mirror"
    application: >
      A client sends a Telegram voice note making excuses. The coach responds by simply repeating the excuse back to them slowly and neutrally, letting the silence hang, before giving the reframe.
    effect: >
      The client hears the absurdity of their own excuse without the coach needing to attack them intellectually. It acts as a highly potent emotional mirror.

  - context: "CCP: V2WS - Live Objection Handling"
    application: >
      In a webinar Q&A, a participant types, "This sounds like it's only for beginners." The coach reads it aloud, looks at the lens, and repeats it slowly: "Only for beginners." Then they deliver the answer.
    effect: >
      The pause and repetition validate the objection's weight, proving the coach isn't deflecting. The subsequent answer is received with full attention.

  - context: "CCP: CCF - The Empathy Audit"
    application: >
      When a coach is struggling to connect, the CCF agent assigns a 24-hour protocol where every response to a client must begin with a verbatim repetition of the client's last sentence before the coach adds their own thoughts.
    effect: >
      The coach's "fix-it" reflex is temporarily disabled, forcing them to actually listen to the emotional subtext of their clients.

