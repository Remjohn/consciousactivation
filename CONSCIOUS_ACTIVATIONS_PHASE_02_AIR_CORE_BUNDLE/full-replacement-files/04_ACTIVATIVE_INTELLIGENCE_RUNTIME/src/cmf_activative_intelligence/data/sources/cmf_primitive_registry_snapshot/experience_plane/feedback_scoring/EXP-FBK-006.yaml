summary: >
  Theory/Practice Feedback Loops dictate that feedback cannot exist in a vacuum.
  Every time a user receives a score or critique (the Theory), the UI must
  immediately present a 1-click path to record again and apply the lesson (the Practice),
  converting the feedback into an instant cycle of improvement.

core_move: >
  Append a highly visible 'Redemption Round' or 'Try Again' button directly to
  the bottom of every single AI scorecard and feedback message, ensuring the
  user never hits a dead end after being told how to improve.

why_it_works: >
  Brian Burke emphasizes that gamification fails when it only provides a score but
  no immediate mechanism to change that score. Feedback creates a state of cognitive
  tension: the user knows they made a mistake and wants to fix it. If they have to
  wait until tomorrow's drill to fix it, that tension turns into frustration. By
  closing the loop instantly—offering them a chance to re-record right now—we channel
  that frustration into immediate practice, driving up the core recording metric.

examples:
  - context: "BOOK: Gamify - The Enterprise Training Module"
    application: >
      Instead of giving employees a quiz score at the end of a 30-minute module,
      the system scores them after every single question and instantly allows them
      to retry the question to apply what they just learned from the error.
    effect: >
      Dramatically increases mastery and retention by tightening the feedback loop.

  - context: "CCP: The Redemption Round"
    application: >
      After receiving a 60/100 Delivery Score and a note that they 'spoke too fast',
      the Telegram message includes an inline button: '🔄 Record Redemption Take'.
    effect: >
      The coach immediately presses it, speaks slower, and gets an 85/100, ending
      the session on a high note.

  - context: "CCP: The V2WS Live Pivot"
    application: >
      During a webinar, the ambient feedback glows red (Theory: Conviction dropping).
      The prompter instantly flashes a suggested high-emotion re-engagement question
      for the coach to read (Practice).
    effect: >
      Allows the coach to immediately correct the metric in real-time.

  - context: "CCP: The Jury Flip"
    application: >
      A user loses a Conscious Reaction debate. The feedback shows the opponent won
      on 'Logic'. The UI prompts: 'Record a 30-second rebuttal targeting their logic
      to win the Jury back.'
    effect: >
      Turns a failure state into the trigger for the next engagement loop.

  - context: "CCP: The Sandbox Retries"
    application: >
      During the Day 1-7 Onboarding, the user is explicitly told: 'You have unlimited
      retries. Look at the score, delete the audio, and try again until you hit 90.'
    effect: >
      Trains the user that feedback is not a final judgment, but a tool for iteration.

anti_examples:
  - description: >
      The user records an audio response. The AI sends a message: 'You failed. Your
      hook was weak and you used too many filler words.' End of message. No button.
    why_it_fails: >
      The loop is left open. The user feels defeated and has no clear path to
      redeem themselves. They close Telegram and go to bed feeling like a failure.

