activation_conditions:
  - "User receives a score lower than 90/100"
  - "User receives explicit constructive feedback from the CPSC AI"

suppression_conditions:
  - "User receives a perfect 100/100 (do not ask them to retry perfection, trigger an Epic Win instead)."

misuse_modes:
  - "Infinite Punishment — forcing them to retry until they get it right, trapping them in a loop when they are exhausted."
  - "Blind Retries — offering a retry button without giving them any specific advice on *what* to change, causing them to fail again."

synergizes_with:
  - "EXP-FRC-004" # Friction-Zero Ability (The retry button must be 1-click zero friction)
  - "EXP-FBK-001" # RIM Feedback (The loop must be immediate)

conflicts_with:
  - "EXP-PRG-003" # Go for an Epic Win (Epic Wins are usually one-shot, high-stakes events where retries are explicitly banned to create tension)

implementation_targets:
  frontend_components:
    - "RedemptionButton — a prominent inline Telegram button appended to all sub-90 scorecards"
    - "DeleteAndRetrySwipe — a Mini App gesture allowing instant wiping of bad audio"
  backend_rules:
    - "routing_engine: intercept 'Retry' clicks to automatically preload the previous context/prompt so the user doesn't have to start over"
  telemetry_events:
    - "redemption_round_activation_rate"
    - "score_delta_post_retry"
  experiments:
    - "A/B test: Button says 'Try Again' vs 'Redeem Your Score' to test emotional framing"

