trigger_conditions:
  - "The CCP system is generating a multi-asset output (Carousel, Sales Page, VSL, Webinar)"
  - "The user's visual content is described as 'flat' or 'boring,' despite having good individual images"
  - "The story being told involves a significant passage of time or a complex emotional shift"

suppression_conditions:
  - "The format strictly limits the creator to a single asset (e.g., a YouTube thumbnail or a single-image Twitter post) where sequencing is impossible"
  - "The content is a rapidly edited, chaotic TikTok meant to overwhelm the senses rather than tell a structured story"

misuse_modes:
  - "Random Sequencing — Throwing different shot types together with no logical progression (e.g., Extreme Close-Up to Extreme Long to Cutaway) causing disorientation"
  - "The Missing Detail — Building a sequence entirely out of Wide and Medium shots, never providing the 'Cutaway' texture that grounds the story in reality"
  - "Pacing Mismatch — Using slow, methodical sequencing for a highly aggressive, fast-paced piece of copy"

synergizes_with:
  - "PRM-VSG-017" # Character, Location, Event (The sequence explores these three elements)
  - "PRM-PSY-018" # Layered Narrative Architecture (Micro/Macro mirroring applied to visuals)

conflicts_with:
  - "PRM-HUM-026" # Sunk Cost Fallacy (If the coach insists on keeping 5 redundant Medium shots just because they paid a photographer for them)

crosswalk_id: "XW-VISUAL-PACING"
crosswalk_note: "Meaning focuses on the sequence of shot types; Experience focuses on the UX flow of a multi-step form or onboarding sequence."

notes: >
  For CMF, this primitive should be built into the Carousel generation logic. The LLM must be
  prompted to select or generate distinct 'Shot Types' for each slide, structurally preventing
  the '10 identical slides' failure mode.
