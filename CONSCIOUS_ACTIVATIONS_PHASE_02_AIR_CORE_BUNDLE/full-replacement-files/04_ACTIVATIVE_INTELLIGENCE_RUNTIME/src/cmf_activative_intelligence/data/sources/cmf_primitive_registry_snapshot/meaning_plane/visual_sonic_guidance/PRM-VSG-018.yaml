book_reference:
  title: "The Photography Storytelling Workshop"
  author: "Finn Beales"
  chapters:
    - "Storytelling 101: The Importance of Shot Type"
  key_pages: "Sections detailing Extreme Long, Long, Medium, Close-Up, and Cutaway shots"
  book_path: "lab/Public Speeaking Coaching/07_Photography_and_Composition/The Photography Storytelling Workshop - Finn Beales.md"

summary: >
  Sequence Over Single Image dictates that visual storytelling achieves true persuasive power not
  through a single perfect 'hero' frame, but through the deliberate orchestration of multiple shot
  types (Extreme Long, Medium, Close-Up, Cutaway). It forces creators to design narrative arcs
  across multiple assets, ensuring depth, pacing, and emotional progression.
core_move: >
  Stop optimizing for one standalone image. Instead, build a sequenced set consisting of an establishing
  shot (context), a medium action shot (relationship), a close-up (emotion), and a cutaway detail
  (texture), moving the viewer through a cinematic progression.
why_it_works: >
  As Beales outlines, different shot types serve different psychological functions. An 'Extreme Long'
  shot establishes geography and scale, but lacks intimacy. A 'Close-Up' provides intense emotion,
  but lacks context. Relying on a single image forces the creator to compromise, often resulting in a
  generic 'Medium' shot that tries to do everything and fails. By sequencing the shots, the brain is
  fed a complete, dimensional reality. Narrative momentum is designed, not improvised, pulling the
  viewer deeper into the ecosystem with each swipe, click, or transition.

examples:
  - context: "BOOK: Constructing a photo essay"
    application: >
      Instead of trying to capture a camping trip in one photo, Beales uses a sequence: An Extreme Long
      shot of the forest (where are we?), a Medium shot of setting up the tent (what is the action?),
      and a Close-Up of hands striking a match (what is the sensory detail?).
    effect: >
      The viewer's brain pieces the images together like a film. The sequence creates a sense of time
      passing and deepens the immersion far beyond what a single wide-angle shot could achieve.

  - context: "CCP: CMF Media Factory - Instagram Carousel architecture"
    application: >
      The `Artisan` agent generates a 5-slide carousel on 'Productivity.' Slide 1 is a bold typographic
      title (Establishing). Slide 2 is a Medium portrait of the coach looking frustrated (Emotion).
      Slide 3 is a macro-shot of a crossed-out to-do list (Cutaway/Texture). Slide 4 is the framework
      diagram (Action). Slide 5 is the coach looking relaxed (Resolution).
    effect: >
      The carousel retention rate spikes because the visual variety (wide to macro, abstract to literal)
      acts as a pacing mechanism, preventing the eye fatigue that occurs when every slide is formatted identically.

  - context: "CCP: CCF Archetype drafting a Sales Page"
    application: >
      Instead of using one massive hero image of the coach at the top of the page, the design uses a
      sequence. The header is a Wide environmental shot. The 'Problem' section features a tight Close-Up.
      The 'Method' section features a Cutaway of the coach's hands drawing on a whiteboard.
    effect: >
      The user experience mimics a documentary film. The visual rhythm matches the rhetorical rhythm
      of the sales copy, creating a highly persuasive, premium feel.

  - context: "CCP: V2WS Webinar Slide Pacing"
    application: >
      A speaker tells a story about a pivotal failure. The `excalidraw_compiler.py` breaks the story
      across four slides, automatically applying sequence logic: Slide 1 is the 'Long Shot' (the boardroom),
      Slide 2 is the 'Close-Up' (the exact phrase the boss said), Slide 3 is the 'Cutaway' (the sweaty palms).
    effect: >
      The audience is visually pulled 'into' the scene as the tension rises, maximizing the impact of the
      story before the teaching point is revealed.

  - context: "CCP: Telegram Coaching (CBCS) onboarding visual"
    application: >
      A new client is sent a 3-part sequence via Telegram to set expectations. Image 1: The messy 'before' state.
      Image 2: The coach's proprietary blueprint (the map). Image 3: The clean 'after' state.
    effect: >
      The client instantly grasps the journey ahead. The sequence establishes the narrative arc of the
      coaching program faster and more viscerally than a 10-page PDF.

anti_examples:
  - description: >
      A coach creates a 10-slide Instagram carousel where every single slide features the exact same
      Medium shot of them pointing at a text box, with only the text changing.
    why_it_fails: >
      There is zero visual sequencing. The repetition of the exact same shot type causes immediate
      habituation; the brain registers the visual as 'already seen' by Slide 2 and stops paying attention,
      leading to high drop-off rates. The sequence lacks depth, scale, and texture.

