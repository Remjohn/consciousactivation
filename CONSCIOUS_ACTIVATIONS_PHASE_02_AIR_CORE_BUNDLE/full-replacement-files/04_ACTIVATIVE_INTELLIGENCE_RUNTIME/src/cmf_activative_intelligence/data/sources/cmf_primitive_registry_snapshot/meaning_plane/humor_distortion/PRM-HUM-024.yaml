trigger_conditions:
  - "CPSC engine is entering a pitch or conversion sequence where audience reactance and pattern recognition are expected to spike"
  - "CMF is generating content utilizing a widely recognized digital format (e.g., carousel CTA, automated email) where audiences anticipate the formula"
  - "Coach possesses sufficient accumulated authority capital to deploy a frame break without reading as insecure or defensive"

suppression_conditions:
  - "Coach is newly onboarded and actively establishing baseline authority; premature frame breaking reads as lack of confidence"
  - "Content format is entirely novel to the audience; there is no established cognitive frame available to break"

misuse_modes:
  - "Over-deployment — using frame breaks in every content piece until the self-awareness becomes its own cliché"
  - "Defensive Metahumor — breaking the frame not as a power move but as an anxious hedge ('I know this is cheesy, but...')"
  - "Downward targeting — using Metahumor to mock clients' genuine emotional expressions or earnest attempts at change"

synergizes_with:
  - "PRM-HUM-021"  # Irony Inversion — the frame break can BE ironic ('This is where I'm supposed to manipulate you' said with complete sincerity)
  - "PRM-HUM-019"  # Struggle Principle — meta-acknowledging the struggle of being a coach who has to sell creates dual-layer vulnerability
  - "PRM-HUM-005"  # Absolute Verisimilitude — paradoxically, the frame break must feel genuinely spontaneous (not scripted), requiring its own verisimilitude

conflicts_with:
  - "PRM-HUM-005"  # Absolute Verisimilitude — breaking the frame explicitly violates the 'never break voice' rule; the conflict is intentional and must be managed through strategic deployment frequency

