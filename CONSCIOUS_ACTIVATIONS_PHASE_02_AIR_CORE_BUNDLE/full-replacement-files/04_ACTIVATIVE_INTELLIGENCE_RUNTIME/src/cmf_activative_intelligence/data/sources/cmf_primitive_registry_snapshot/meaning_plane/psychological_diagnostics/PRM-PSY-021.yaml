trigger_conditions:
  - "The subject matter triggers inherent anxiety, shame, or fear in the target audience (e.g., money, weight loss, relationship failure)"
  - "The coach has a highly academic or technical background and struggles with sounding 'dry' or 'clinical'"
  - "The content requires the audience to take an immediate, high-friction action"

suppression_conditions:
  - "The audience is already in a hyper-emotional state (e.g., panic) and explicitly requires cold, grounding logic to stabilize"
  - "The medium is purely transactional (e.g., an API documentation page or a legal disclaimer)"

misuse_modes:
  - "Emotional Manipulation — Whipping up intense emotion without providing solid 'Knowing' (facts/strategy) to back it up"
  - "The Academic Crutch — Refusing to manage state because the coach believes 'the facts should be enough'"
  - "Mismatched States — Hyping up an audience (Enthusiasm) when the task requires meticulous focus (Clarity)"

synergizes_with:
