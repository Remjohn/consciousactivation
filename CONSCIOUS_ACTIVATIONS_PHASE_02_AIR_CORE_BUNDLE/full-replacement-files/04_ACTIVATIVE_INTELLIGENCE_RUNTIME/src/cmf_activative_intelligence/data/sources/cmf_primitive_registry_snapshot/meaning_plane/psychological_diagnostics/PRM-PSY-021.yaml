  - "PRM-PRS-030" # Connection Before Content

conflicts_with:
  - "PRM-PRS-012" # Pure Direct Instruction (if executed without any tonal modulation)

crosswalk_id: "XW-STATE-MANAGEMENT"
crosswalk_note: "Meaning focuses on scripting emotional context; Experience focuses on using UI friction/flow to alter biological state."

notes: >
  This primitive is the antidote to the 'Expert's Curse.' CCF archetypes must be continually
  reminded that their value is not in what they know, but in their ability to make the client
  feel capable of executing what they know.
