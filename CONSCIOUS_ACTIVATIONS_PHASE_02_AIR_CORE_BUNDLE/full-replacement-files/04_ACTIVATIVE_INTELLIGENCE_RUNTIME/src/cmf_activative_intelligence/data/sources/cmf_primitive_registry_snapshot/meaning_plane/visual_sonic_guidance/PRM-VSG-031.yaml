trigger_conditions:
  - "The content feels 'cheesy,' 'over-the-top,' or emotionally flat"
  - "The narrative involves themes of hypocrisy, hidden truths, irony, or complex psychological states"
  - "The coach is describing a situation where their internal feelings did not match their external reality"

suppression_conditions:
  - "The content is an explicit, direct-response call to action where any emotional ambiguity would hurt conversion rates"
  - "The brand identity is strictly built on total, uncomplicated transparency (e.g., 'The Innocent' archetype)"

misuse_modes:
  - "The Random Clash — Combining completely unrelated audio and video just to be 'weird,' which only confuses the audience because the tension doesn't resolve into a meaningful point"
  - "Distracting Irony — Using counterpoint so heavily during a complex teaching segment that the audience forgets what the lesson was actually about"
  - "Tone-Deafness — Playing upbeat, comedic music over a genuinely tragic client story, which the audience interprets as offensive rather than artistic"

