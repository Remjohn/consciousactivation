trigger_conditions:
  - "System generates critical feedback on a user's submitted content or recorded performance"
  - "Agent addresses repeated failure, self-sabotage, or broken commitments"
  - "AST analysis detects user in a highly emotionally charged or defensive state"

suppression_conditions:
  - "User is successfully executing and requires pure amplification or celebration"
  - "Context is purely informational (e.g., a software update log) and lacks any behavioral stakes"

misuse_modes:
  - "Toxic Positivity — softening the critique so much that the actual problem is never clearly named or addressed"
  - "Passive Aggression — using identity-protecting language as a thin veil for condescension, which clients detect instantly"

