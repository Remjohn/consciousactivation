summary: >
  Attack Problem Not Person is a safeguard diagnostic primitive that surgically targets counterproductive behaviors or misjudgments while actively protecting the client's core identity. It operates on the principle that humans can metabolize high degrees of friction and challenge only if their inherent dignity is maintained. In CCP, this primitive allows agents and coaches to speak forceful, unvarnished truths without inducing shame collapse or damaging the collaborative coaching alliance.

core_move: >
  Separate the human identity from the behavioral issue to preserve the alliance while delivering correction.

why_it_works: >
  Rohn asserts that "The tongue has the power of life and death" and that powerful communication requires restraint. When a communicator attacks a person's identity (e.g., "what's wrong with you?"), the listener's ego defense mechanisms activate, completely blocking the intended message and creating relational rupture. By explicitly separating the individual's inherent value from the specific behavior or pattern being analyzed (e.g., "what's troubling you?"), the problem becomes an external object that both coach and client can collaboratively evaluate.

examples:
  - context: "BOOK: The Jim Rohn Guides - Identity-Behavior Separation"
    application: >
      Rohn teaches that powerful communication requires restraint. Attacking a person's identity triggers ego defense. The communicator must explicitly separate the inherent value of the person from the specific flaw being addressed.
    effect: >
      The problem becomes an external object that both coach and client can collaboratively evaluate, preserving dignity and the coaching alliance.

  - context: "CCP: CMF - Feedback Generation"
    application: >
      Instead of 'You sound insecure,' the system outputs: 'The passive voice in this phrasing is diluting the power of your insight.'
    effect: >
      The user receives the critique as a mechanical flaw in the text, not a personal failure, allowing them to revise with aggression rather than shame.

  - context: "CCP: CBCS - The Accountability Check-In"
    application: >
      When a client breaks a commitment, the agent states: 'You are a highly capable person, which makes this pattern anomalous. Let's look at the mechanism of why this specific commitment failed.'
    effect: >
      The client's identity as 'capable' is reinforced, preventing the shame spiral while still demanding accountability for the failure.

  - context: "CCP: Conscious Reactions - Diagnostic Phrasing"
    application: >
      The UI highlights a section of a video and notes 'Tension drops here due to pacing' rather than 'You are boring here.'
    effect: >
      Maintains clinical objectivity, allowing the user to view their performance as a malleable skill rather than an inherent trait.

  - context: "CCP: CCF - The 'Reframe' Module"
    application: >
      The challenge explicitly teaches coaches to audit their own self-talk, replacing 'I am a bad speaker' with 'My current delivery mechanics are inefficient.'
    effect: >
      Forces the user to adopt the systemic worldview of the CCP platform, increasing their agency.

