trigger_conditions:
  - "Target surface is a 1-to-1 audio channel (Telegram, direct message)"
  - "Payload intent requires vulnerability, trust-building, or strict accountability"
  - "Coach lifecycle stage is 'Early CCF' where parasocial bond is fragile"

suppression_conditions:
  - "Output context is explicitly 1-to-Many (V2WS webinar broadcast)"
  - "Payload is a formal written protocol or compliance document"
  - "Content is designed as a viral CMF shareable requiring broad framing"

misuse_modes:
  - "Faking intimacy — using 'you' language while delivering generic content"
  - "Over-personalizing without data — claiming to 'know' the listener without authentic signals"
  - "Collapsing audience-of-one into audience-of-zero — speaking only to oneself without outward intent"

