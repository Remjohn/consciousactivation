notes: >
  This is the second highest MCDA in the VOC family and the signature
  primitive of the entire CCP audio philosophy. The platform's core
  promise is a "coach of one" experience — every voice note must feel
  like a private conversation, not a podcast episode. This primitive
  directly operationalizes Quicke's Discoverer stage insight and maps
  to the CCF/CBCS intimacy gradient. Prioritize for all Telegram voice
  notes, Conscious Reaction responses, and first-touch audio hooks.
