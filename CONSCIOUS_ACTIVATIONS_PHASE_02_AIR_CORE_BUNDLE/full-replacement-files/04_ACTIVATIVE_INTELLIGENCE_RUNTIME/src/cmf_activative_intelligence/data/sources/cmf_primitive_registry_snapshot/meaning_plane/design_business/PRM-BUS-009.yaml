trigger_conditions:
  - "System detects the user has failed, lapsed, or is struggling to complete a required task"
  - "Agent is designing flows dealing with highly sensitive, stigmatized, or vulnerable subject matter"
  - "System is writing copy or UI flows for 'recovery', 'comeback', or 'zero-state' scenarios"

suppression_conditions:
  - "Coaching contract explicitly requires 'tough love' or radical, unsoftened confrontation as the primary intervention mechanism"
  - "System is addressing systemic bad behavior where softening the blow enables actual harm or violates compliance"

misuse_modes:
  - "Toxic Positivity — Ignoring real problems in the name of 'protecting feelings'"
  - "Codependency — Removing so much friction that the user never has to take responsibility for change"
  - "Pitying Tone — Sounding condescending while trying to sound supportive, which also destroys dignity"

