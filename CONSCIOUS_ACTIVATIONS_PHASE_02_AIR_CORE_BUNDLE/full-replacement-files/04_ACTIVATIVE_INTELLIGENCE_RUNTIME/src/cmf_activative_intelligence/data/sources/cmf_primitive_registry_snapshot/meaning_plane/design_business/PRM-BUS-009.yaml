summary: >
  Dignity Reduces Friction recognizes that the biggest barrier to user action is
  often not technical confusion, but emotional exposure. If a tool, interface, or
  piece of content makes a user feel ashamed, incompetent, or patronized, they
  will abandon it. Designing for dignity means removing stigmatizing language and
  humiliating UX flows, thereby increasing participation without resorting to force.

core_move: >
  Remove shame, judgment, and exposure from the user's path, replacing them
  with interactions that preserve the user's dignity and autonomy.

why_it_works: >
  Lupton's analysis of universal design and products like Sabi (which redesigns
  medical pillboxes and canes to look like high-end lifestyle accessories)
  demonstrates that shame is a primary driver of non-compliance. When a design
  signals to the user that they are defective, their nervous system registers
  a social threat and they disengage. By elevating the aesthetics and language
  of an interaction, the design protects the user's ego, transforming resistance
  into willing participation.

examples:
  - context: "BOOK: Beautiful Users - Shame-Free UX"
    application: >
      Lupton notes that the biggest barrier to user action is emotional exposure. Designing for dignity removes stigmatizing language and humiliating UX flows. By elevating aesthetics and language, the design protects the user's ego.
    effect: >
      Transforms resistance into willing participation without resorting to force, preventing the nervous system from registering a social threat.

  - context: "CCP: CBCS - The Missed Check-In Flow"
    application: >
      Instead of highlighting failure ('You missed your check-in'), the agent normalizes the struggle: 'I noticed the silence. Days get heavy. Just drop a single emoji to let me know you're still here. No explanation needed.'
    effect: >
      The client's shame is neutralized. Dignity is preserved, prompting them to re-engage rather than ghosting entirely.

  - context: "CCP: CCF - The Private Draft Studio"
    application: >
      The trigger-first recording interface is framed not as a 'Performance Test' with harsh red timers, but as a 'Private Draft Studio' with soft lighting cues and language emphasizing iteration ('Take 1 - Let's just capture the raw thought').
    effect: >
      The coach feels safe rather than scrutinized. The friction of hitting record is massively reduced.

  - context: "CCP: V2WS - The Audience Q&A"
    application: >
      When soliciting questions during a webinar, the system automatically anonymizes the submissions on the presenter's screen so the host can read them without revealing the asker's identity.
    effect: >
      Removes the shame of 'asking a stupid question' in front of peers, resulting in significantly higher engagement and better data extraction.

  - context: "CCP: CMF - The 'Zero-Start' State"
    application: >
      When a user opens a blank dashboard, instead of saying 'You have 0 active clients', the system says 'Your roster is ready for its first client.'
    effect: >
      Re-frames a state of lack (which induces shame) into a state of potential (which induces momentum).

anti_examples:
  - description: >
      A landing page for a weight-loss coaching program that uses aggressively
      shaming copy: 'Stop being lazy. If you don't buy this, you'll stay fat forever.'
    why_it_fails: >
      The copy relies entirely on force and humiliation. While it might trigger
      a spike in panic-buying from highly distressed individuals, it destroys
      long-term trust. The user associates the brand with the pain of shame,
      leading to high refund rates and zero referrals.

