activation_conditions:
  - "User fails a task that requires cognitive or physical effort"
  - "The system can definitively identify exactly what went wrong"
  - "The user has not exhausted their retry quota for the session"

suppression_conditions:
  - "User is experiencing technical failure (e.g., mic broken); do not enforce scarcity on hardware issues"
  - "User is explicitly in a 'sandbox/practice' mode where infinite retries are the point"

misuse_modes:
  - "Fake Scarcity — creating a countdown timer that resets every time they refresh the page, destroying trust."
  - "Impossible Win — giving them a 5-second retry for a task that mathematically takes 10 seconds."

synergizes_with:
  - "EXP-SAF-001" # White Hat Emotional Sequencing (The retry is the White Hat transition)
  - "EXP-TRG-002" # Hook Cycle Velocity

conflicts_with:
  - "EXP-SAF-004" # Practical Play (If the scarcity is too punishing, the play is no longer safe)

implementation_targets:
  frontend_components:
    - "RedemptionTimerUI — a clean, stress-inducing but elegant countdown clock"
    - "GuidedRetryOverlay — showing exactly what to fix before they hit record"
  backend_rules:
    - "scarcity_engine: lock the specific drill/topic if the redemption window expires without a submission"
  telemetry_events:
    - "redemption_round_offered"
    - "redemption_round_accepted"
    - "redemption_round_won"
  experiments:
    - "A/B test: 5-minute redemption window vs 15-minute redemption window"

