summary: >
  Possible-Win Scarcity dictates that after a failure, the opportunity to retry
  must be perceived as both finite (scarce) and achievable (possible). If the
  retry is infinite, the user procrastinates and eventually forgets. If the
  retry feels impossible, the user enters denial and abandons the platform.
  In CCP, when a coach fails a drill, they do not get an unlimited "Try Again"
  button. They are granted a single "Redemption Round" that expires in 15
  minutes, creating intense focus and 'Urgent Optimism.'

core_move: >
  Gate retries behind a finite constraint (time, quantity, or specific condition)
  while explicitly adjusting the difficulty or providing a hint to ensure the user
  believes the win is now within reach.

why_it_works: >
  Jane McGonigal defines "Urgent Optimism" as the desire to act immediately to
  tackle an obstacle, combined with the belief that we have a reasonable hope of
  success. Yu-kai Chou warns that Scarcity (Black Hat) only motivates if the
  goal feels attainable; otherwise, the brain protects the ego by entering
  'sour grapes' denial ("I didn't care anyway"). By granting exactly *one* retry
  that expires shortly, we trigger the Scarcity drive. By explicitly pointing
  out exactly what to fix ("Just slow down your pacing by 10%"), we satisfy the
  Possible-Win condition.

examples:
  - context: "BOOK: Actionable Gamification - Waze and the monster"
    application: >
      Waze occasionally spawns a 'monster' on the map. The user knows it will
      disappear soon (scarcity) but also knows they just need to drive a few
      blocks out of their way to get it (possible win).
    effect: >
      The user acts immediately because the constraint is tight but the effort is low.

  - context: "CCP: The 15-Minute Redemption Round"
    application: >
      A coach fails a reaction. The system says: 'I've held the topic open for
      you. You have 15 minutes to record a Redemption Take before your original
      score becomes permanent.'
    effect: >
      The coach cannot put it off until 'tomorrow.' They act while they are
      still in the flow state, utilizing the feedback just received.

  - context: "CCP: The Debate Counter-Strike"
    application: >
      A coach is losing a debate. The system offers a 'Counter-Strike': 'You can
      record one final 30-second rebuttal. It costs your daily wildcard.'
    effect: >
      The scarcity (only one wildcard) makes the coach think deeply before recording,
      increasing the quality of the content and the intensity of the engagement.

  - context: "CCP: V2WS Webinar Sandbox"
    application: >
      During the webinar setup, a coach fails to articulate their CA-1 hook. The
      system allows a maximum of 3 retries. The UI displays 3 'lives.'
    effect: >
      The coach treats each attempt with high seriousness, rather than mindlessly
      recording 20 sloppy takes.

  - context: "CCP: The Guided Retry"
    application: >
      After failing due to excessive hedging, the retry screen highlights the
      exact words they hedged on in the transcript and says: 'Read it again, but
      skip the red words.'
    effect: >
      The win is now explicitly 'possible,' transforming frustration into laser focus.

anti_examples:
  - description: >
      A standard 'Try Again' button that is always available, forever, allowing
      the user to fail 50 times in a row without consequence.
    why_it_fails: >
      There is zero scarcity. The user will mindlessly click it, get frustrated
      by repeated failures, and blame the app for being 'stupid' or 'broken'
      because they haven't stopped to actually absorb the feedback.

