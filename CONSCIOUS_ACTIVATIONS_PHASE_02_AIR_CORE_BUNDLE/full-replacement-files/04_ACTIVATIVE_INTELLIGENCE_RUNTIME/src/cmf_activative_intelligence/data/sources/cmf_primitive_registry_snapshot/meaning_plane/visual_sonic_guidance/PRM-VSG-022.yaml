trigger_conditions:
  - "The CVE system is compiling prompts and needs to establish clear visual hierarchy (what is most important)"
  - "The image feels 'cluttered' or 'distracting,' and the eye doesn't know where to rest"
  - "The narrative requires a shift in attention (e.g., revealing a hidden detail)"

suppression_conditions:
  - "The image is an infographic or data visualization where blurring elements would destroy the utility of the asset"
  - "The content is an objective, sweeping landscape where the scale of the environment is the entire point"

misuse_modes:
  - "The Bokeh Crutch — Using shallow focus to hide terrible lighting or boring composition, rather than to tell a story"
  - "Missed Focus — Accidentally focusing on the tip of the nose or the ears instead of the eyes, which subconsciously alienates the viewer"
  - "Artificial Blur Abuse — Using cheap AI or software blurring that creates harsh, fake cutouts around the subject, breaking the 'Felt Truth' (PRM-VSG-021)"

synergizes_with:
  - "PRM-VSG-015" # Composition as Attention Routing (Focus is the ultimate routing mechanism)
  - "PRM-PSY-002" # The Cognitive Load Throttle (Shallow focus lowers cognitive load)

conflicts_with:
  - "PRM-VSG-017" # Character, Location, Event (If shallow focus completely obliterates the 'Location' and 'Event')

crosswalk_id: "XW-ATTENTION-HIERARCHY"
crosswalk_note: "Meaning focuses on optical sharpness; Experience focuses on using UI dimming/modals to focus user attention on a single task."

notes: >
  This is the highest-scoring primitive (191) from Mercado because it is highly programmable.
  CVE agents must be explicitly trained to output `depth_of_field` parameters (e.g., deep, shallow, macro)
  and justify *why* that plane of focus was chosen based on the narrative intent.
