summary: >
  Selective Focus as Meaning Control treats depth of field not as a decorative 'cinematic' effect,
  but as a strict cognitive hierarchy. By explicitly deciding what is sharp (dominant) and what is
  soft (contextual pressure), the creator dictates exactly how the viewer processes the image's emotional
  and narrative data, preventing the eye from wandering aimlessly across the frame.
core_move: >
  Never accept an image where focus is arbitrary or accidental. Explicitly assign meaning to the focal
  plane: use shallow focus to create intimacy/isolation by rejecting background context, use deep focus
  to force the subject to compete with their environment, and use rack focus to shift the narrative
  power dynamic in real-time.
why_it_works: >
  As Mercado outlines in his 'Focus' chapter, biological vision is drawn to contrast and sharpness.
  When an entire image is sharp (deep focus), the brain must process a massive amount of democratic data,
  which can create anxiety, context density, or narrative complexity. When an image has a shallow depth
  of field (selective focus), the creator is artificially restricting data. This forces the viewer's
  brain to prioritize the sharp subject, simulating the psychological state of 'tunnel vision,' intimacy,
  or heightened emotional concentration. Focus is the mechanism that turns 'looking' into 'attention.'

examples:
  - context: "BOOK: Upstream Color and Isolation"
    application: >
      Mercado analyzes Shane Carruth's 'Upstream Color', where characters are deeply disconnected from
      each other. The cinematography uses an incredibly narrow depth of field (just a few centimeters deep),
      so the background is abstract.
    effect: >
      The selective focus perfectly mirrors the characters' psychological isolation. The viewer feels
      the claustrophobia of not being able to 'see clearly' into the world, aligning the visual mechanics
      with the narrative theme.

  - context: "CCP: CCF Archetype Visual Prompts via CVE"
    application: >
      A 'Guide' archetype needs an image of them coaching a client. Instead of a generic prompt, CVE specifies:
      'Shallow depth of field. Focus locked on the coach's eyes listening intently, while the client in
      the foreground is heavily blurred.'
    effect: >
      The focus strategy tells the story: the coach's undivided attention is the product. If both were
      in sharp focus, it would just be a meeting. The selective focus makes it an act of profound listening.

  - context: "CCP: V2WS Webinar 'The Overwhelm' slide"
    application: >
      The coach is discussing 'information overload.' The visual used is a deep-focus shot where
      dozens of screens, papers, and background details are all agonizingly sharp, forcing the viewer's
      eye to constantly dart around the frame.
    effect: >
      The visual induces the exact cognitive friction (overwhelm) that the speaker is discussing, making
      the spoken concept viscerally real.

  - context: "CCP: CMF Media Factory - Reel Transition (Rack Focus)"
    application: >
      In a B-roll sequence, the camera starts focused on a ticking clock on the wall. The voiceover asks,
      'What are you waiting for?' The focus then racks (shifts) to the coach sitting in the foreground.
    effect: >
      The rack focus literally transfers the pressure of 'time' onto the 'human.' The focus pull is the
      narrative action, rather than relying purely on the edit or the script.

  - context: "CCP: Telegram Coaching (CBCS) environmental review"
    application: >
      A client sends a video check-in from their messy bedroom. The coach advises them: 'If you can't
      clean the room, use your phone's portrait mode/cinematic mode to blur the background. The mess
      is stealing your focus and lowering your perceived status.'
    effect: >
      By applying selective focus, the client instantly upgrades their visual communication, isolating
      their message from environmental noise.

anti_examples:
  - description: >
      A creator buys an expensive f/1.4 lens and shoots every single piece of content with an
      ultra-shallow depth of field, blurring out every background regardless of the location.
    why_it_fails: >
      This is 'focus without purpose.' While it looks 'premium,' it destroys context. If the coach is
      speaking about 'navigating the wilderness,' but the wilderness is blurred into a green smudge,
      the visual mechanism is fighting the narrative payload.

