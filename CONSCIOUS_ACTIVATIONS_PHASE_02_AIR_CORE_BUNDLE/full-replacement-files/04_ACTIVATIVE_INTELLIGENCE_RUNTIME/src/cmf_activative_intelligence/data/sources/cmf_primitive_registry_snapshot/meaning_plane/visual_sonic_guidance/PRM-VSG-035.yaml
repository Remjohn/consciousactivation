book_reference:
  title: "Sound"
  author: "Kathryn Kalinak"
  chapters:
    - "Technology and Workflow"
  key_pages: "Sections detailing how playback environments (theaters vs homes) alter the mix"
  book_path: "lab/Public Speeaking Coaching/08_Sound_Design/Sound - Kathryn Kalinak.md"

summary: >
  Playback Context Is Part of the Composition dictates that a soundtrack is never composed in a vacuum;
  it is composed for the speaker that will play it. Because the vast majority of social content and
  coaching materials are consumed on mobile phones—often in noisy environments through low-end speakers
  or single earbuds—the creator must actively design for these constraints. A mix that sounds 'epic'
  on studio monitors will often collapse into unintelligible mud on a phone.
core_move: >
  Optimize all audio for the lowest common denominator of playback. Center-weight the vocals (do not
  rely on wide stereo panning for the main message). Cut unnecessary low-end frequencies (which phone
  speakers cannot reproduce anyway) to clear up the midrange. Ensure mono compatibility so the track
  survives being played through a single speaker.
why_it_works: >
  As Kalinak notes regarding the history of film distribution, a soundtrack's truth changes depending
  on where it is heard. An immersive Dolby Atmos mix fails if played on a 1990s television. Today,
  the 'theater' is a 6-inch phone screen held on a crowded subway. Phone speakers physically cannot
  reproduce sub-bass, and they struggle with complex, wide-stereo soundscapes. If a creator relies
  on those frequencies to carry the emotional payload, the audience simply will not hear it. By mixing
  specifically for the 'midrange' (where the human voice lives) and ensuring mono strength, the creator
  guarantees that the emotional intent survives the journey to the user's ear.

examples:
  - context: "BOOK: Mixing for the distribution format"
    application: >
      Kalinak explores how mixing engineers had to create 'downmixes' (reducing a complex surround mix
      into stereo or mono) to ensure the film sounded acceptable when broadcast on television. The
      mix had to be fundamentally altered to prioritize dialogue intelligibility over spatial immersion.
    effect: >
      The story survived the degradation of the playback system.

  - context: "CCP: AI Music Generation via Suno/ACE-Step"
    application: >
      The Sonic Scribe evaluates an AI-generated music track for a reel. The track features an incredibly
      deep, rumbling sub-bass line. The Scribe rejects the track or applies a high-pass filter at 100Hz
      before combining it with the coach's voice.
    effect: >
      Because the phone speaker cannot play the sub-bass, keeping it in the mix would only cause distortion.
      By removing it, the coach's voice sounds significantly cleaner and more professional on the end
      user's device.

  - context: "CCP: Telegram Coaching (CBCS) ambient noise"
    application: >
      A coach sends a voice note recorded while walking near traffic. The CCP system automatically applies
      a harsh vocal isolation algorithm. While this makes the coach's voice sound slightly 'robotic' or
      thin compared to a studio mic, it completely eliminates the background roar.
    effect: >
      The client is listening on a noisy train with one AirPod. The 'thin but clean' audio is perfectly
      legible, whereas 'natural but noisy' audio would have been impossible to understand. Intelligibility
      always wins over high-fidelity in mobile contexts.

  - context: "CCP: V2WS Webinar 'The Testimonial' module"
    application: >
      A client-submitted testimonial video has terrible audio (recorded in an echoey room). Instead of
      trying to make it sound 'perfect,' the orchestration engine simply pushes the testimonial's volume
      up, centers it strictly in mono, and adds hard-coded subtitles.
    effect: >
      The system recognizes that the playback context demands clarity. By converting it to mono and adding
      subtitles, it guarantees the proof lands, even if the user's volume is set to 10%.

anti_examples:
  - description: >
      A creator spends hours mixing a promotional video using $2,000 studio headphones. They pan
      different sound effects far to the left and right, and rely on a deep sub-bass drop for the transition.
    why_it_fails: >
      When the user watches the video on their phone (which only has one bottom-firing speaker), the
      panned effects disappear completely, and the sub-bass drop is completely silent. The transition
      feels awkward and amateurish because the creator mixed for their own studio, not the user's reality.

