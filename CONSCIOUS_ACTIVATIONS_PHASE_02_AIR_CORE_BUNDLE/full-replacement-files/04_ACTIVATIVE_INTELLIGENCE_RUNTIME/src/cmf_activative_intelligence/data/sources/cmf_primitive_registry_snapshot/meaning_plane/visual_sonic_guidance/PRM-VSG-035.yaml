crosswalk_id: "XW-PLAYBACK-CONTEXT"
crosswalk_note: "Meaning focuses on phone-first audio mastering; Experience focuses on Mobile-First UI/UX and touch targets."

notes: >
  CMF Render Agents must apply a final 'Phone-First Validation Pass' to all audio: high-pass filter
  at 80Hz, collapse low frequencies to mono, and ensure Voice RMS is securely above Music RMS.
