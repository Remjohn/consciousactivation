trigger_conditions:
  - "The asset is explicitly designed for short-form mobile consumption (TikTok, Reels, Telegram)"
  - "The CMF engine is finalizing the master mix for render"
  - "A user complains that they couldn't understand the coach's voice in a previous video"

suppression_conditions:
  - "The asset is a highly specialized, long-form 'meditation' or 'spatial audio journey' explicitly designed to be consumed with high-end headphones"

misuse_modes:
  - "Over-Compression — Smashing the audio file with so much digital compression to make it 'loud for TikTok' that it distorts and physically hurts the listener's ears"
  - "The Treble Spike — Boosting the high frequencies too much to compensate for phone speakers, resulting in a harsh, piercing 'sibilance' (S-sounds) that irritates the nervous system"
  - "Ignoring Desktop entirely — While mobile is king, making a webinar sound *so* narrow that it sounds terrible for the 30% of high-ticket buyers watching on a desktop setup"

synergizes_with:
  - "PRM-VSG-034" # Workflow Creates Aesthetics (Playback context MUST dictate the workflow)
  - "PRM-PRS-001" # The Binary Scroll (If the audio isn't clear instantly on a phone, they will scroll)

conflicts_with:
