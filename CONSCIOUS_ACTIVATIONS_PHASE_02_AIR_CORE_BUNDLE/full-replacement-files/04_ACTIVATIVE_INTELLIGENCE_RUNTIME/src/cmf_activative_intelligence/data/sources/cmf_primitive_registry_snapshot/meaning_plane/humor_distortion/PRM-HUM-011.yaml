notes: >
  Archetype Shorthand is a supporting primitive because it does not generate
  humor on its own — it accelerates humor by reducing the setup cost for
  other primitives (especially Character Funny Filter and High-Contrast
  Conflict). Float note: goal_bias.surprise is deliberately low (0.3) because
  archetypes are by definition familiar — their power is recognition, not
  novelty. goal_bias.clarity is high (0.8) because instant comprehension is
  the entire purpose of the primitive. Note PRM-STR-005 synergy has not
  been verified in catalog — flagged for post-registry linkage.
