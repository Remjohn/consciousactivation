trigger_conditions:
  - "Agent is generating content featuring a non-coach narrative figure that must be established in under 2 sentences"
  - "System is mapping a V2WS script requiring a foil to contrast with the coach's expertise"
  - "AST analysis detects a draft spending excessive word count on backstory for a secondary character"

suppression_conditions:
  - "Content requires genuine emotional depth from a non-coach character — archetypes are 2D by design and will feel shallow"
  - "Audience is likely to interpret character typing as reductive stereotyping rather than comedic abstraction"

misuse_modes:
  - "Stereotype leakage — choosing an archetype that maps to demographic rather than behavioral patterns, producing offensive rather than recognizable characters"
  - "Archetype rigidity — never allowing the cast character to break from their archetype, which Dikkers warns produces formulaic fatigue"
  - "Overexplanation — spending content time naming or explaining the archetype rather than simply showing the character acting on their traits"

synergizes_with:
  - "PRM-HUM-010"  # High-Contrast Conflict — archetypes are most effective when cast against contrasting environments
  - "PRM-HUM-008"  # Character Funny Filter — the archetype provides the trait template that the filter activates
  - "PRM-HUM-012"  # Two-Dimensional Representation — archetypes function specifically as 2D compressions
  - "PRM-STR-005"  # Story Discovery mechanisms that benefit from rapid character assignment

conflicts_with:
  - "PRM-HUM-013"  # Intuiting Method — intuiting produces unique, observed characters; archetypes produce template-based ones. Using both simultaneously creates identity confusion.

