summary: >
  Archetype Shorthand is the humor primitive that reduces audience cognitive
  load by deploying a culturally familiar character type as instant narrative
  shorthand. Dikkers argues that after 6,000 years of written comedy, 40
  audience-tested character archetypes have survived natural selection — from
  the Everyperson to the Drill Sergeant — because they tap patterns the human
  brain recognizes without instruction. In CCP, archetypes serve as rapid
  role-assignment tools when the coach needs to populate stories, illustrate
  client types, or cast villains and foils without spending precious content
  time on character exposition. The primitive is a compression function: it
  trades nuance for instant comprehension.

core_move: >
  Assign a culturally familiar archetype to any narrative figure — the coach,
  the client, or the antagonist — so the audience intuitively understands
  that figure's rules within seconds.

why_it_works: >
  Dikkers shows that audiences are "virtually incapable of averting their eyes
  when watching someone obsessively trying to achieve a clear objective" —
  but this requires that the character's identity be instantly legible.
  Archetypes compress identity into 2-3 traits the audience already has a
  neural template for. The mechanism is cognitive efficiency: when the brain
  recognizes a Trickster, a Know-It-All, or a Fish Out of Water, it
  immediately generates predictions about behavior, creating the anticipation
  that makes the Character Funny Filter work. Without the archetype,
  the audience spends processing cycles on "who is this?" instead of
  "what will they do next?" — and comedy dies in the gap.

examples:
  - context: "BOOK: How to Write Funny Characters - The 40 Archetypes"
    application: >
      Dikkers maps 40 audience-tested character archetypes (e.g., Everyperson, Drill Sergeant). These serve as a compression function, trading nuance for instant comprehension.
    effect: >
      Reduces audience cognitive load. The brain recognizes the template immediately and anticipates behavior, allowing the humor to function without tedious exposition.

  - context: "CCP: CMF - Client Turnaround Stories"
    application: >
      The agent casts a resistant client as a 'Know-It-All' archetype in one sentence ('already knows what to eat, corrects the coach on supplement research').
    effect: >
      Cognitive load drops to near-zero for character comprehension, freeing bandwidth for the coaching truth. The content becomes highly shareable.

  - context: "CCP: V2WS - The 'Naif' Foil"
    application: >
      The script assigns the 'Naif' archetype to a hypothetical audience member asking innocent questions that expose the absurdity of industry jargon.
    effect: >
      The audience relaxes because the Naif gives them psychological permission to not-know. They feel included rather than exposed.

  - context: "CCP: CBCS - Roleplay Coaching"
    application: >
      The Telegram bot adopts the 'Drill Sergeant' archetype to snap a coach out of a prolonged period of self-doubt, fully committing to the caricature.
    effect: >
      The absurdity of the caricature disarms the coach's defense mechanisms, allowing the underlying accountability message to land.

  - context: "CCP: CCF - Antagonist Mapping"
    application: >
      The platform forces the coach to select 3 archetypal 'Villains' (e.g., The Bureaucrat, The Snake Oil Salesman) that represent the structural problems their method solves.
    effect: >
      Provides a repeatable shorthand for the coach to articulate their Context Premise without having to explain the industry's flaws from scratch every time.

anti_examples:
  - description: >
      A CMF agent assigns the Jerk archetype to represent a real, named
      competitor in the coach's niche, using the archetype to mock a specific
      person rather than a behavioral pattern.
    why_it_fails: >
      Archetypes are meant to represent human failings or aspirations
      abstractly, not target individuals. Dikkers warns about stereotypes
      vs. archetypes (Tip #8, lines 3925-3932) — using an archetype as a
      weapon against a real person collapses the comedic distance and
      transforms humor into attack. The audience's empathy shifts to the
      target, and the coach loses moral authority.

  - description: >
      Using the same Dummy archetype in every client story across a
      6-episode content series, making all clients look foolish.
    why_it_fails: >
      Dikkers shows that archetype selection must create contrast with
      the specific story environment. Repeating the same archetype flattens
      variety and reveals the formula. Worse, it communicates contempt
      for clients — the exact opposite of the CCP trust architecture.

