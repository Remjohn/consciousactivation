summary: >
  Microphonic Intimacy governs how physical proximity to the microphone
  and acoustic environment design create the perceptual experience of
  closeness between speaker and listener. The Radio Drama Handbook
  documents how radio's "invisible medium" uses mic distance as a
  dramatic tool — a speaker close to the mic sounds inside the listener's
  head, while a speaker at distance sounds across a room. The Sound
  Design audit extracts the "Hierarchy of Sound" principle where the
  human voice occupies the highest position in the sonic pecking order.
  In CCP, this means the voice note's acoustic profile must be
  engineered for intimacy: close-mic, warm low-end, minimal room
  reverb, and a noise floor that feels like silence rather than studio.

core_move: >
  Use proximity, mic feel, and acoustic nearness to increase disclosure,
  trust, and warmth.

why_it_works: >
  The Radio Drama Handbook explains that early BBC productions
  demonstrated how microphone distance creates psychological distance.
  A whispered close-mic delivery triggers the listener's perception of
  confidentiality — the speaker is "telling a secret." A distant, reverberant
  delivery signals public address — the speaker is "making an announcement."
  The mechanism is proxemic transference: the brain interprets acoustic
  proximity cues (warmth, low-end presence, breath audibility, lack of
  room reflection) as social proximity cues. When a voice sounds close,
  the listener's social brain treats the speaker as physically near, which
  activates attachment and trust circuitry. Beaman reinforces this from
  the interview side: the advantage of radio is that "the PM would not
  have appeared for a TV or print interview dressed that way" — the
  invisible medium permits a level of informal intimacy impossible in
  visual media. CCP voice notes that sound like a close friend speaking
  quietly in your ear exploit this acoustic intimacy channel.

examples:
  - context: "BOOK: The Radio Drama Handbook - Microphonic Intimacy"
    application: >
      Hand and Traynor detail how mic distance creates psychological distance. A whispered close-mic delivery triggers confidentiality; a distant delivery signals public address.
    effect: >
      Acoustic nearness activates the social brain's attachment and trust circuitry.

  - context: "CCP: CMF - Sensitive Insight Delivery"
    application: >
      The Sonic Scribe configures TTS with a proximity effect boost at 200Hz, zero artificial reverb, and preserves breath sounds. Pacing is slowed by 8%.
    effect: >
      The coach experiences the note as a private conversation across a small table.

  - context: "CCP: CBCS - Accountability Feedback"
    application: >
      When delivering difficult feedback about a missed deadline, the volume drops 2dB and pacing slows, using close-mic intimacy rather than "announcement" distance.
    effect: >
      The coach receives the feedback as concern rather than judgment.

  - context: "CCP: Conscious Reactions - Direct Message"
    application: >
      The TTS engine uses a hyper-close mic profile when the agent is affirming a major breakthrough, simulating a whisper in the ear.
    effect: >
      The intimacy maximizes the emotional resonance of the positive reinforcement.

  - context: "CCP: CCF - Pre-Recorded Hooks"
    application: >
      The audio hook is engineered with a dry, close-mic sound to contrast with the typical heavily-reverbed, hyped YouTube ad style.
    effect: >
      The listener immediately perceives the content as authentic and non-commercial.

anti_examples:
  - description: >
      A CBCS voice note is rendered with heavy room reverb, compressed
      dynamic range that removes all breath variation, and a speaking
      distance that sounds like a public address system in a lecture
      hall. The content says "I'm here for you" but the acoustic
      profile says "I'm speaking to a crowd from a stage."
    why_it_fails: >
      Proxemic transference works against the speaker when the acoustic
      cues contradict the verbal content. The listener's brain resolves
      the conflict in favor of the acoustic signal: the speaker sounds
      far away, so the message feels impersonal. The Radio Drama
      Handbook warns that "stilted and performed witness accounts"
      destroy authenticity — acoustic distance is a form of performance
      that the listener's ear detects unconsciously.

