notes: >
  This is the only VOC primitive where the primary mechanism is acoustic
  engineering rather than linguistic composition. It operates at the
  rendering layer of the Sonic Scribe pipeline — after the script is
  written and validated, the acoustic profile is calibrated for intimacy.
  The key variable is mic distance simulation: CCP voice notes should
  sound like 6-inch mic distance (conversational intimacy), not 24-inch
  (presentation distance). Preserve breath sounds — they are the
  acoustic signature of a real human presence.
