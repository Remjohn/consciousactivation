trigger_conditions:
  - "When a script or beat cluster reads as a flat, encyclopedic list of information"
  - "When pacing analytics show audience drop-off mid-content"
  - "When attempting to communicate a complex or dry framework that needs momentum"

suppression_conditions:
  - "During emergency crisis interventions where the client needs immediate, unambiguous safety and clarity without dramatic manipulation"

misuse_modes:
  - "Unresolved Tension — establishing high stakes or a compelling question but failing to deliver a satisfying or commensurate release"
  - "Micro-Tension Exhaustion — oscillating between tension and release too rapidly, making the content feel frenetic and exhausting"

