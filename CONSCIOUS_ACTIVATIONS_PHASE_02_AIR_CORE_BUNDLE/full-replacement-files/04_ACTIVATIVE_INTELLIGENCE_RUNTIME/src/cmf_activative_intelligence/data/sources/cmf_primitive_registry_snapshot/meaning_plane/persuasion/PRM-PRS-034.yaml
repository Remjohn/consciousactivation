summary: >
  The Five Talk Tools primitive organizes presentation techniques into a modular palette:
  Connection (the prerequisite), Narration (story), Explanation (concept building), Persuasion
  (argument), and Revelation (showing). It explicitly rejects a 'one-size-fits-all' formula,
  dictating that a speaker must intentionally select the primary and secondary tools that best
  serve the specific throughline. In CCP, this maps directly to the JIT Skill Compiler,
  allowing dynamic generation of content modules based on the audience's mood state and
  the coach's natural lane.

core_move: >
  Designate a primary and secondary 'Talk Tool' (Narration, Explanation, Persuasion, or Revelation) for each segment of content, mapping the choice directly to the goal of the throughline.

why_it_works: >
  Most speakers fail because they default to the tool they are most comfortable with, rather
  than the tool the idea requires. A scientist defaults to Explanation when Narration would
  make their discovery memorable. A motivator defaults to Narration when Persuasion is needed
  to change a deep belief. Anderson's framework proves that there is no single 'TED formula.'
  By treating the tools as a palette, the speaker creates intentional variety (e.g., using
  Narration to create empathy, then switching to Explanation to teach the framework). This
  respects the audience's need for dynamic shifts in cognitive processing, preventing the
  fatigue that comes from a monolithic 60-minute 'lecture' (pure Explanation) or 'story time'
  (pure Narration).

examples:
  - context: "BOOK: TED Talks Guide - The Talk Tools"
    application: >
      Anderson organizes presentation techniques into a modular palette: Connection, Narration, Explanation, Persuasion, and Revelation. A speaker must intentionally select the tool that best serves the specific throughline, preventing a monolithic 60-minute "lecture" or "story time."
    effect: >
      By shifting cognitive modes (e.g., from creating empathy with Narration to teaching via Explanation), the speaker respects the audience's attention limits.

  - context: "CCP: V2WS - Webinar Architecture"
    application: >
      A 90-minute V2WS webinar is divided using the palette. Block 1: Narration (pain point). Block 2: Explanation (framework). Block 3: Revelation (live demo). Block 4: Persuasion (handling objections).
    effect: >
      The audience remains highly engaged because the cognitive 'mode' shifts every 20 minutes, validating the throughline emotionally, intellectually, visually, and logically.

  - context: "CCP: CCF - The JIT Skill Compiler"
    application: >
      A coach needs a 3-minute beat on 'Burnout.' The CCF agent detects the target audience is highly skeptical. It bypasses the 'Explanation' module (which triggers defensiveness) and compiles a 'Narration' module, embedding the insight within a story.
    effect: >
      The audience lowers their guard to listen to the story, accidentally absorbing the insight they would have rejected if presented as direct advice.

  - context: "CCP: CMF - Tool Whiplash Prevention"
    application: >
      During storyboard generation, the CMF engine detects a script rapidly switching between Narration, Explanation, and Revelation every 30 seconds. It forces the coach to consolidate the sequence into a single 2-minute Narration block followed by a 1-minute Explanation.
    effect: >
      The presentation is saved from feeling chaotic and disjointed, allowing the audience to settle into a rhythm before shifting cognitive gears.

  - context: "CCP: Telegram - The Contextual Pivot"
    application: >
      A client sends an angry message about a failing ad campaign. The coach begins their audio reply using the 'Connection' tool (validating the frustration) before hard-pivoting to the 'Explanation' tool (diagnosing the technical flaw).
    effect: >
      The intentional use of Connection ensures the client is emotionally regulated enough to actually process the subsequent Explanation.

anti_examples:
  - description: >
      A coach whose natural style is storytelling decides to deliver a highly technical SOP
      (Standard Operating Procedure) training session using only the 'Narration' tool, turning
      every step of the software configuration into an anecdote.
    why_it_fails: >
      The tool selected is fundamentally inappropriate for the throughline. The audience needs
      clarity, sequential logic, and exact boundaries (Explanation), not character development
      and rising tension (Narration). The training fails because the palette choice was
      ego-driven rather than idea-driven.

