trigger_conditions:
  - "When mapping the macro-structure of a webinar, course, or long-form presentation"
  - "When a draft feels monotonous or one-dimensional (e.g., 'it's just 40 minutes of talking heads explaining things')"
  - "When selecting the compilation parameters in the JIT Skill Compiler for an incoming prompt"

suppression_conditions:
  - "During the Connection phase (the first 60 seconds) where selecting any tool other than Connection will result in immediate audience rejection"

misuse_modes:
  - "Tool Whiplash — switching rapidly between Narration, Explanation, and Revelation every 30 seconds, creating a chaotic and disjointed presentation"
  - "The Default Fallback — consistently ignoring the palette and using the exact same tool (usually Explanation) for every single piece of content, regardless of the throughline"

synergizes_with:
