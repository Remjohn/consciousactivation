crosswalk_id: "XW-EPIC-MEANING"
crosswalk_note: >
  Meaning side: governs the STR (Narrative Structure) and PRS (Persuasion)
  primitives used to generate the actual topic prompts and debate seeds.
  Experience side: governs the UX wrapping and notification strategy that
  delivers those prompts to the user.

notes: >
  This primitive is the antidote to SaaS apathy. People cancel software
  subscriptions when they get bored. They rarely cancel memberships to
  movements they believe in. By elevating the framing, we shift CCP
  out of the 'software budget' and into the 'professional identity budget'.
