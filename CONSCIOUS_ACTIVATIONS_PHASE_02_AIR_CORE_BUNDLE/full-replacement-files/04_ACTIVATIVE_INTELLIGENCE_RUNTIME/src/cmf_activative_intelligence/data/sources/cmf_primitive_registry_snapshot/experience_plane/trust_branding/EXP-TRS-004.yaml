activation_conditions:
  - "User is receiving a push notification to initiate a session"
  - "User is onboarding into a new challenge or subscription tier"
  - "User is preparing to share an artifact with their external network"

suppression_conditions:
  - "User is receiving highly technical, micro-level feedback on their acoustic delivery (keep the focus narrow here)"
  - "User is in a Redemption Round (focus should be on personal technical recovery, not the macro mission)"

misuse_modes:
  - "Melodrama — taking the crusade framing so far that it sounds like a fantasy novel rather than a professional standard"
  - "Hollow framing — claiming 'Epic Meaning' but the actual task is just filling out a boring survey"
  - "Alienation — creating an 'enemy' (e.g., 'low-ticket charlatans') that inadvertently insults the user's actual business model"

synergizes_with:
  - "EXP-SOC-001"  # Group Quests / Ambient Sociability (epic meaning requires a tribe)
  - "EXP-TRG-002"  # Urgent Optimism Hooks (the mission needs them *now*)
  - "EXP-TRS-003"  # Reflective Social Proof (the share becomes an act of leadership)

conflicts_with:
  - "EXP-FRC-002"  # Absolute Frictionlessness (Epic Meaning sometimes requires deliberate friction/sacrifice to feel real)

