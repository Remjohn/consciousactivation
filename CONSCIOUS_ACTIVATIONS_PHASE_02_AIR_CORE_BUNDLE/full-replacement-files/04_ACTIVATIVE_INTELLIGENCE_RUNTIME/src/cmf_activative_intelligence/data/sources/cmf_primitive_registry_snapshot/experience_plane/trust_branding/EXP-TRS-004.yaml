summary: >
  Epic Meaning Framing prevents long-term churn by positioning the
  platform not as a functional software utility, but as a massive
  multiplayer crusade. McGonigal shows that humans are hardwired to
  seek connection to causes larger than themselves. If CCP is framed
  simply as an 'app to practice speaking', motivation inevitably caps
  out. To secure years-long retention and drive the $99 Coach OS tier,
  every interaction must be framed as defending the integrity of the
  coaching industry from low-ticket charlatans and establishing elite
  standards.

core_move: >
  Frame the user's micro-actions (recording, voting, debating) as
  vital contributions to a high-stakes, industry-wide mission that
  cannot succeed without their specific expertise.

why_it_works: >
  Psychologically, 'self-improvement' is a weak long-term motivator
  because the only person affected by failure is the self. 'Epic
  Meaning' leverages our biological drive for tribal survival and
  collective purpose. When an action is framed as protecting the tribe
  (the coaching industry), users will endure significantly more friction,
  participate more frequently, and pay higher continuity premiums because
  leaving the platform feels like abandoning their colleagues in a fight.

examples:
  - context: "Daily Solo Reaction Feed Prompt (1 BOOK)"
    application: >
      The feed is not called 'Daily Topics'. It is called 'The Industry
      Baseline'. The push notification does not say, 'Record a reaction
      today.' It says: 'A major publication just claimed Coaching is
      obsolete. We are compiling the definitive 100-voice counter-argument.
      84 elite coaches are currently recording. Add your voice.'
    effect: >
      The coach feels a moral and professional obligation to participate.
      They record their reaction not to get a personal score, but to
      ensure their perspective is included in a monumental, collective
      defense of their identity.

  - context: "Upgrading to the $99 Coach OS Tier (CCP)"
    application: >
      The $99 tier is not sold as 'Advanced Analytics'. It is framed
      as 'Joining the Vanguard.' The copy reads: 'Fund the infrastructure
      that holds the coaching industry accountable. Run your own branded
      challenge rooms and deploy the elite standard to your audience.'
    effect: >
      The user is not buying a SaaS product; they are paying 'dues'
      to an elite professional guild. This creates a psychological moat
      that makes canceling the subscription feel like a betrayal of
      their professional standards.

  - context: "Debate with Jury Notification (CCP)"
    application: >
      The Agent sends an Urgent Optimism hook: 'Warning: The Low-Ticket
      Guild is dominating today's trending debate. Your historical
      conviction score is in the top 5%. We need you to drop a
      counter-take to balance the algorithm and defend the high-ticket
      standard.'
    effect: >
      The coach drops their current low-priority tasks to respond. The
      framing turns a passive debate into an active ideological battle,
      bypassing normal procrastination.

  - context: "7-Day Speaking Challenge Onboarding (CCP)"
    application: >
      The welcome message states: 'This is not a course. This is the
      proving ground. For 7 days, you will strip away the jargon that
      is poisoning our industry and learn to speak with undeniable,
      unscripted authority.'
    effect: >
      The user adopts a serious, committed posture immediately. They
      accept the high friction and difficulty of the constraints because
      they believe the goal is noble and necessary.

anti_examples:
  - description: >
      Framing the CCP purely as a time-saving productivity tool:
      'Use Conscious Reactions to generate 5 social media posts in
      under 10 minutes!'
    why_it_fails: >
      This explicitly destroys Epic Meaning and replaces it with pure
      utility. Utility is easily commoditized. The moment another AI
      tool generates 5 posts in 8 minutes, the user churns. The Coach
      OS brand loses all premium positioning.

  - description: >
      Using generic motivational quotes ('Believe in yourself!') instead
      of mission-driven narrative framing.
    why_it_fails: >
      It feels like cheap Instagram fluff rather than a serious professional
      crusade. Elite coaches have extremely high filters for generic
      motivation; it signals low status and destroys trust.

