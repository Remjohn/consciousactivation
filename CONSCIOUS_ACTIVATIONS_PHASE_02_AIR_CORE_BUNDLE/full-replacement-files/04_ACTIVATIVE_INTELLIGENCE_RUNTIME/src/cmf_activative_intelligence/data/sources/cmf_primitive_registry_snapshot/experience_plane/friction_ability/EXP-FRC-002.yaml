misuse_modes:
  - "The Bait and Switch — asking for a System 1 swipe, and then immediately forcing them into a mandatory 10-page System 2 form, breaking trust."
  - "Dumbed Down Forever — never escalating to System 2, turning the app into a mindless swiping game with zero actual coaching value."

