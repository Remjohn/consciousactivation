summary: >
  System 1 to System 2 Escalation dictates that user workflows must begin entirely
  in 'System 1' (fast, intuitive, emotional, zero-effort thinking) to bypass initial
  friction. Only after the user is hooked and committed should the interface gently
  escalate to 'System 2' (slow, analytical, high-effort thinking) for complex tasks.

core_move: >
  Design the entry point of every interaction as an emotional, intuitive reaction
  (e.g., swiping, reacting to a visual), delaying any analytical tasks (e.g.,
  formulating a complex thesis) until the user has already made micro-commitments.

why_it_works: >
  Drawing from Daniel Kahneman (via Wendel), System 2 thinking requires massive
  caloric energy and creates high cognitive friction. If a user is asked to use
  System 2 immediately ('Write a 300-word thesis on leadership'), their Ability drops
  and they bounce. System 1 is effortless. By asking for a System 1 response first
  ('Swipe right if you hate this Tweet'), we secure engagement with near-zero friction.
  Once engaged, the psychological principle of consistency makes them willing to engage
  System 2 to justify their initial reaction.

examples:
  - context: "BOOK: Designing for Behavior Change - The Savings App"
    application: >
      Instead of asking users to calculate their retirement needs (System 2), an app
      asks them to 'Swipe right on your dream vacation' (System 1). After swiping,
      it asks them to save $5 a week for it.
    effect: >
      Bypasses analytical paralysis by leading with emotion.

  - context: "CCP: The Audience Mirror Quiz"
    application: >
      A user in the Jury is shown a controversial audio clip. The only option is a
      Tinder-style swipe: 'Based' or 'Cringe' (System 1). After swiping, the UI
      prompts: 'Record 30 seconds explaining your vote' (System 2).
    effect: >
      Converts a passive listener into an active creator by escalating cognitive load sequentially.

  - context: "CCP: The V2WS Registration"
    application: >
      Instead of a complex form asking for business metrics (System 2), the webinar
      registration is a 1-click Telegram poll: 'What is your biggest speaking fear?'
      (System 1). The poll click registers them.
    effect: >
      Removes all friction from the top of the funnel.

  - context: "CCP: The Post-Mortem Analytics"
    application: >
      Immediately after a recording, the UI flashes a giant Gold Medal (System 1 emotion).
      Only after the user clicks 'View Details' does it reveal the complex graphical
      breakdown of their Conviction Density (System 2 analysis).
    effect: >
      Prevents data overwhelm right after a high-stress performance.

  - context: "CCP: The Law28 Daily Drill"
    application: >
      The prompt is delivered via a highly emotional audio note from the Agent
      (System 1 processing). The user records their raw, unscripted reaction.
      Only during the 'Redemption Round' are they asked to analytically restructure
      their hook (System 2).
    effect: >
      Ensures the first take is raw and authentic, saving analytical correction for later.

anti_examples:
  - description: >
      Sending a push notification that says: 'Analyze the rhetorical structure of
      Steve Jobs' 2005 commencement speech and record a 3-minute breakdown.'
    why_it_fails: >
      It demands immediate, heavy System 2 processing. The user looks at it,
      experiences a massive spike in cognitive friction, and immediately swipes it away.

