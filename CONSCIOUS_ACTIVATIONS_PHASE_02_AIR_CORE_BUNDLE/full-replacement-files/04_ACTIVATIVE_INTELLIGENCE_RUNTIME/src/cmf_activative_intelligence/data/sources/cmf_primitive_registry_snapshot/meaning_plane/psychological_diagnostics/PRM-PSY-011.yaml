summary: >
  Narrative Script Flipping is a diagnostic enhancement primitive that operationalizes limiting beliefs into specific, predictable narrative mechanics (e.g., Until, After, Never, Always, Almost). It posits that humans do not react to objective reality, but to their internalized script. In CCP, this primitive empowers agents and coaches to algorithmically tag the source code of client stagnation. By identifying a destructive meta-script, the system can dismantle it by forcing the client to confront anomalous historical evidence that contradicts their confirmation bias.

core_move: >
  Identify the client's dominant meta-script (e.g., "Always", "Almost") and force them to engage with empirical evidence that contradicts it.

why_it_works: >
  Drawing from Narrative Therapy, Darian Smith explains that the mind functions as a rendering engine prioritizing the continuity of its Script over objective truth due to confirmation bias. When an individual operates under a "Never" script, they biologically cannot perceive opportunities. Flipping the Script works by aggressively isolating this false meta-narrative and intentionally directing the client to seek out memories and evidence supporting an alternative, empowering story, thus overriding the confirmation bias with empirical counter-data.

examples:
  - context: "BOOK: The Psychology Workbook for Writers - The Narrative Script"
    application: >
      Smith outlines how humans react to internalized scripts (e.g., 'Always', 'Almost') rather than objective reality. The mind prioritizes script continuity over truth.
    effect: >
      Flipping the script requires aggressively isolating the false meta-narrative and forcing the client to confront empirical evidence that contradicts it.

  - context: "CCP: CBCS - The 'Until' Interrupt"
    application: >
      A client texts, 'I can't launch until I have X.' The agent tags the *Until* script and responds by highlighting historical evidence where the client succeeded without prerequisites.
    effect: >
      Interrupts automated script execution, shifting the client from passive waiting to active execution.

  - context: "CCP: V2WS - The Saboteur Reveal"
    application: >
      The webinar explicitly maps the *Almost* script: 'You work perfectly until the last 10%, then burn it down because completion is terrifying.'
    effect: >
      The prospect feels their secret saboteur has been scientifically diagnosed, skyrocketing trust in the coach.

  - context: "CCP: Conscious Reactions - The 'Anomaly' Tracker"
    application: >
      The UI periodically prompts the user to log 'anomalous wins'—small successes that directly contradict their self-identified limiting script.
    effect: >
      Systematically builds an undeniable empirical database that destroys the user's confirmation bias over time.

  - context: "CCP: CCF - The Script Audit"
    application: >
      Coaches are trained to parse client intake forms strictly looking for absolute language ('Never', 'Always') as the primary diagnostic vector for future resistance.
    effect: >
      Allows coaches to predict and preempt 80% of client objections before the first session even begins.

