trigger_conditions:
  - "AST analysis detects absolute language ('always', 'never', 'can't until') in user input"
  - "User exhibits repetitive patterns of failure or self-sabotage right before a finish line"
  - "System generates the initial diagnostic profile during user onboarding"

suppression_conditions:
  - "The limitation reported by the user is a genuine, verifiable physical or logistical barrier"
  - "User is in acute emotional distress where psychological dismantling would cause destabilization"

misuse_modes:
  - "Gaslighting — attempting to flip a script by denying the reality of genuine systemic barriers or trauma."
  - "Over-Pathologizing — turning every passing statement into a deep psychological diagnosis, exhausting the client."

