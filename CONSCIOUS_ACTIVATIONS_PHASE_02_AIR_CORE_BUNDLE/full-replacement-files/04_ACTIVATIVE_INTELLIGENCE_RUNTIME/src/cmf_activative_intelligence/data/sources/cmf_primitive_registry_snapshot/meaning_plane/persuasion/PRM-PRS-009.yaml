crosswalk_id: "XW-DISEQUILIBRIUM"
crosswalk_note: "Experience side uses this as the trigger for a new UX flow: highlighting a system failure or new notification to pull the user out of baseline state."

notes: >
  Along with PRM-PRS-008, this is the most critical 80/20 lever in the persuasion stack.
  It converts "reporting" into "storytelling." If the inciting incident is missing, the
  content is dead on arrival.
