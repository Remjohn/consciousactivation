summary: >
  The McKee Inciting Incident Engine is a narrative primitive that demands every persuasive
  communication begin with a structural disruption. It dictates that content must start
  at the moment the protagonist's (or audience's) world goes out of balance, creating an
  emotional requirement for action. In CCP, this primitive acts as a fundamental diagnostic
  for script writing, ensuring that solutions are never presented before the audience is
  emotionally invested in the problem.

core_move: >
  Begin the narrative at the specific moment the status quo is disrupted, forcing the protagonist into action to restore balance.

why_it_works: >
  Robert McKee argues that the standard business presentation (market size, plans, charts)
  is structurally a story without an inciting incident. It begins at the resolution without
  ever establishing the problem that required solving, leaving the audience with no emotional
  entry point. An inciting incident (e.g., a sudden crisis, an unignorable revelation) throws
  the protagonist's world into disequilibrium. The human brain is hardwired to follow
  narratives of disequilibrium because it desperately wants to know how balance is restored.
  When content opens with this disruption, the audience is biologically compelled to care
  about the subsequent solution.

examples:
  - context: "BOOK: HBR's 10 Must Reads - Storytelling That Moves People"
    application: >
      Robert McKee argues that standard business presentations fail because they begin at the resolution. An effective story must start with an "inciting incident"—a sudden crisis or unignorable revelation that throws the protagonist's world into disequilibrium.
    effect: >
      The human brain is hardwired to follow narratives of disequilibrium; the audience becomes biologically compelled to hear how balance is restored.

  - context: "CCP: CCF - Archetype Script Writing"
    application: >
      Instead of opening a script with an agenda on "how to prepare for board meetings," the CCF agent structures the opening around a specific inciting incident: "There is a specific kind of silence in a boardroom that means you've lost the room..."
    effect: >
      Senior executives instantly recognize the disequilibrium. The content stops being about generic skills and becomes about surviving a deeply feared professional crisis.

  - context: "CCP: CMF - Beat 1 Visual Hook"
    application: >
      Beat 1 of a CMF cluster opens exclusively with the inciting moment: visually emphasizing the chaos of the exact scenario where the client's current coping mechanism catastrophically failed them, completely omitting the coach's framework until Beat 2.
    effect: >
      The viewer immediately self-identifies with the protagonist, making the subsequent framework desperately needed rather than abstractly considered.

  - context: "CCP: V2WS - Webinar Narrative Spine"
    application: >
      The entire V2WS slide generator refuses to generate 'Solution' slides until the 'Status Quo Disruption' module is completed, forcing the coach to tell the story of the inciting incident that led to the creation of the system.
    effect: >
      The audience understands the emotional stakes of the problem before they are asked to invest cognitive energy into understanding the solution.

  - context: "CCP: Conscious Reactions - Voice Note Hook"
    application: >
      When a coach records a 3-minute Solo Reaction, the extraction pipeline validates that the first sentence describes a disruption (e.g., "Yesterday, I watched a CEO completely torch his company culture in five minutes...").
    effect: >
      The voice note secures immediate attention in the feed, bypassing the user's scroll-habit by hijacking their threat/novelty detection circuitry.

anti_examples:
  - description: >
      A webinar that begins with a 10-minute overview of the coach's new 5-step
      time-management methodology, explaining how each step logically follows the next.
    why_it_fails: >
      It begins at the resolution. Because the coach never establishes the inciting incident
      (the moment the client realized their current schedule was destroying their health
      or family), the audience has no emotional reason to care about the 5-step methodology.
      Information flows in but does not adhere.

