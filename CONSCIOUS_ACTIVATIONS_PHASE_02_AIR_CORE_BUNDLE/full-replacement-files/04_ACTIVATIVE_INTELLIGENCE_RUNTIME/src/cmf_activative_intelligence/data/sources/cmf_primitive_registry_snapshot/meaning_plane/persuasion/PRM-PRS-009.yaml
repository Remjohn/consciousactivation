trigger_conditions:
  - "When drafting the first 90 seconds of any CCF archetype script"
  - "When auditing content that feels 'dry' or 'academic'"
  - "During the Story Discovery Protocol interview with a new coach"

suppression_conditions:
  - "In the middle of a dense execution or training sequence where the inciting incident has already been firmly established and the audience requires uninterrupted technical instruction"

misuse_modes:
  - "False Jeopardy — fabricating an inciting incident that feels contrived or hyperbolic, instantly destroying Ethos"
  - "Stranded Disequilibrium — introducing a powerful inciting incident but failing to provide a coherent or satisfying path to restoring balance"

