summary: >
  Balanced Social Status Architecture dictates that a healthy social economy
  must prevent two fatal extremes: 1) New users feeling permanently locked out
  of high status (apathy), and 2) Elite users losing their hard-earned status
  too easily (betrayal). In CCP, this means we do not use a single, permanent,
  global leaderboard. Status is compartmentalized by Capacity Tracks, specific
  topic domains, and weekly reset loops, ensuring new users can always achieve
  local victories while veteran users retain their permanent 'Sovereign' badges.

core_move: >
  Design the status ecosystem with multiple independent lanes, periodic resets,
  and tiered brackets so every user experiences upward mobility while protecting
  the legacy achievements of long-term users.

why_it_works: >
  Yu-kai Chou warns that if a leaderboard simply tracks all-time points, a user
  joining on Day 100 looks at the Day 1 users and realizes they can never catch
  up. This creates 'Possible-Win Scarcity' failure; they enter denial and quit.
  Conversely, if the system resets all points to zero every week to help newbies,
  the veterans feel their investment is meaningless and churn. The solution is
  balancing ephemeral status (e.g., "This Week's Best Reaction") with permanent
  status (e.g., "Certified Platinum Speaker"), satisfying both entry-level hope
  and endgame ego.

examples:
  - context: "BOOK: Actionable Gamification - Waze's status system"
    application: >
      Waze balances status beautifully. Users have a permanent avatar evolution
      (baby to king) based on all-time points, protecting elite investment. But
      they also have weekly local scoreboards so a new driver can still feel
      the thrill of beating their friends this week.
    effect: >
      Maintains motivation across the entire user lifecycle.

  - context: "CCP: Localized Debate Jurisdictions"
    application: >
      A new coach doesn't have to debate the platform's top speaker. The system
      groups debates by tier. A 'Foundation' tier coach wins a debate against
      another 'Foundation' coach and achieves the #1 spot in their local bracket.
    effect: >
      The win feels possible and authentic, generating intense early motivation.

  - context: "CCP: Ephemeral Streaks vs Permanent Badges"
    application: >
      The Law28 daily streak is ephemeral—if you miss a day, it resets, creating
      high Black Hat urgency for everyone. But the 'Nuance Tier' badge earned
      from hitting 85+ Conviction Density is permanent White Hat status.
    effect: >
      Failing a streak doesn't strip the user of their core professional identity.

  - context: "CCP: Topic-Specific Authority"
    application: >
      A coach might be ranked #1 in 'Fitness Coaching Reactions' but unranked in
      'SaaS Reactions.'
    effect: >
      Creates multiple avenues for users to achieve high status without bottlenecking
      the entire platform at a single apex.

  - context: "CCP: The Sunday Postcard Reset"
    application: >
      Every Sunday, the Weekly Activity leaderboard is cleared. The system says:
      'A new week starts. Your Voice DNA is preserved, but the arena is open again.'
    effect: >
      Gives every user, regardless of history, a fresh chance to feel upward mobility.

anti_examples:
  - description: >
      An 'All-Time Total Score' leaderboard prominently displayed on the dashboard,
      where the top 10 users have 1,000,000 points and a new user starts at 0.
    why_it_fails: >
      Complete destruction of motivation for new users. The gap is insurmountable,
      so they don't even try. The social architecture is fatally unbalanced toward
      early adopters.

