misuse_modes:
  - "Data Camouflage — using complex 'infographic' styles (Declarative-Conceptual) to hide weak or insufficient statistics (Declarative-Data)"
  - "Over-Charting — insisting on a data chart (Quadrant 2) when the actual persuasive value lies in the conceptual relationship (Quadrant 1), merely because charts 'look more rigorous'"

