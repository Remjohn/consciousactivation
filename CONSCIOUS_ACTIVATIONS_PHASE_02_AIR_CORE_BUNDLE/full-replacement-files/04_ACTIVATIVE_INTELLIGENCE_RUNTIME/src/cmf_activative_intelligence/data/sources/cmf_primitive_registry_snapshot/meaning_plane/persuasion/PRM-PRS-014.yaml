summary: >
  The Berinato Data-Story Visualization Matrix is a visual design primitive that acts as a
  strict formatting gate. It dictates that the visual format (e.g., bar chart vs. process flow)
  must be determined by its conceptual purpose mapped to a 2x2 matrix: Is the information
  Conceptual or Data-Driven? Is the purpose Declarative or Exploratory? In CCP, this primitive
  is the ultimate safeguard against "visual incoherence"—the common failure of presenting
  conceptual frameworks using data-chart grammar, which confuses the audience and degrades authority.

core_move: >
  Classify the information into one of four quadrants (Declarative-Conceptual, Declarative-Data, Exploratory-Conceptual, Exploratory-Data) before selecting the visual format.

why_it_works: >
  Berinato observes that most business visualizations fail because the creator chooses the
  chart type (e.g., pie chart, line graph) before understanding the cognitive job the visual
  needs to perform. The brain processes a structural diagram differently than a statistical
  chart. When a coach tries to explain a conceptual methodology (Declarative-Conceptual) using
  a visual format designed for statistics (e.g., a clustered bar chart with bullet points),
  the audience experiences cognitive friction. They look for precision where they should be
  looking for relationships. Applying the matrix ensures the visual grammar matches the
  intellectual intent, creating immediate, frictionless comprehension.

examples:
  - context: "BOOK: HBR's 10 Must Reads - Visualizations That Really Work"
    application: >
      Scott Berinato establishes that visuals fail when formats (like pie charts) are chosen before identifying their cognitive job. Visuals must be mapped on a 2x2 matrix: Conceptual vs. Data-Driven, and Declarative vs. Exploratory.
    effect: >
      By matching the visual grammar to the intellectual intent (e.g., using structural diagrams for concepts instead of statistical charts), cognitive friction is eliminated.

  - context: "CCP: CMF - Media Factory Visual Production"
    application: >
      When rendering a beat explaining the 'Witness vs. Actor' perspective, the CMF agent rejects a draft pie chart. It classifies the information as Declarative-Conceptual and mandates a clean spatial Skia diagram showing psychological states instead.
    effect: >
      The audience instantly grasps the spatial relationship without having to decode an inappropriate statistical metaphor, keeping their cognitive load low.

  - context: "CCP: V2WS - Webinar Slide Deck Audit"
    application: >
      A coach attempts to show a 40% retention improvement using a messy process flowchart. The V2WS agent flags this as a Declarative-Data goal. It strips away the flowchart and replaces it with a single, massive "40%" alongside a stark line graph.
    effect: >
      The core statistic lands with maximum impact because the audience is not forced to separate the data from conceptual noise.

  - context: "CCP: CCF - Archetype Diagramming"
    application: >
      During curriculum generation, a coach asks the AI to generate a 'data chart' to show how their 5-step method connects. The CCF system refuses, explaining that a process is Exploratory-Conceptual, not Data-Driven, and generates a node-based progression map instead.
    effect: >
      The audience understands the chronological necessity of the steps rather than being confused by a fake, unquantifiable data graph.

  - context: "CCP: Conscious Reactions - Visual Overlay"
    application: >
      While recording a Solo Reaction critiquing a competitor's revenue claims, the interface overlays a highly aggressive Declarative-Data visual (a stark bar chart exposing the math flaw) rather than a soft conceptual metaphor.
    effect: >
      The visual grammar matches the aggressive, evidence-based tone of the voice note, multiplying the authoritative impact of the critique.

anti_examples:
  - description: >
      A coach uses a line graph to show the "stages of grief," placing time on the X-axis
      and "sadness" on the Y-axis.
    why_it_fails: >
      The coach is forcing a Declarative-Conceptual idea (a psychological process) into a
      Declarative-Data format (a line graph). Because grief is not a linear, quantifiable
      metric, the graph implies a false mathematical precision that the audience intuitively
      rejects, making the profound psychological concept look amateurish and simplistic.

