adapter_rules:
  - Canonical schemas and public lifecycle meanings remain Delegation-owned.
  - Accepted demand content is immutable and cannot be rewritten by VAE.
  - Required semantics are mapped deterministically and losslessly or the message is rejected.
  - Exact demand identity is preserved without invention.
  - Envelope and audit own message metadata, integrity, idempotency, and replay evidence.
  - VAE internal workflow state cannot leak into public lifecycle state.
  - VAE production acceptance cannot become downstream composition authorization.
  - Constraint evidence and amendment proposals remain separate messages.
  - In-flight delegations retain their negotiated contract versions.
  - Unknown required features, authority, or migration paths fail closed.

