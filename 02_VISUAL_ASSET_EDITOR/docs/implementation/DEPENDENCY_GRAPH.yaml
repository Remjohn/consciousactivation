  SPECIFIED: Required behavior and tests are designed but not executable evidence.
  PROVISIONAL: Draft or representative input cannot support production claims.
  MISSING: Required dependency or evidence is absent.
  BLOCKED: Work cannot start until dependencies are satisfied.

