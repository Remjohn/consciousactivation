  - id: H-002
    title: Interview-derived lineage applicability
    question: >-
      What authoritative discriminator makes Reaction Receipt and Expression Moment
      references mandatory, and is the Format 02 VAD-F02-0001 demand interview-derived?
    owner:
      - activative_intelligence_authority
      - content_harness_owner
      - delegation_schema_owner
    why_human_required: >-
      The amendment requires conditional provenance, but the draft schema exposes only
      optional arrays and the current example leaves them empty. VAE may not infer the
      source class from semantic notes.
    blocking:
      - canonical_demand_validation
      - format02_demand_fixture
      - selected_asset_lineage_acceptance_test
    required_evidence:
      - source_kind_or_applicability_contract
      - conditional_schema_rule
      - authoritative_format02_fixture_values_or_not_applicable_receipt
    resolution:
      discriminator: source_kind
      discriminator_type: typed_enum_not_boolean
      interview_value: interview_expression
      interview_requirements:
        - reaction_receipt_ref
        - expression_moment_ref
      other_source_kinds: absence_of_interview_refs_explicitly_valid
      non_inference_rule: VAE_must_not_invent_interview_lineage
      authority: user_supplied_2026_07_14
    rc1_conformance:
      result: FAIL
      evidence:
        - visual_asset_demand_schema_has_no_source_kind
        - empty_reaction_receipt_refs_validate
        - empty_expression_moment_refs_validate
        - closed_schema_rejects_source_kind_interview_expression
        - generated_python_and_typescript_bindings_have_no_source_kind
      disposition: shared_contract_reissue_required_no_VAE_local_field_allowed
    rc2_conformance:
      result: PASS
      evidence:
        - canonical_source_provenance_source_kind_is_mandatory_typed_and_closed
        - interview_expression_requires_non_empty_reaction_receipt_refs
        - interview_expression_requires_non_empty_expression_moment_refs
        - non_interview_omission_is_valid_without_synthesis
        - migrations_require_owner_classification_and_do_not_guess
        - generated_python_and_typescript_structures_include_SourceKind
      integration_test: validation/tests/test_delegation_rc2_integration.py
    status: resolved_and_integrated

  - id: H-003
    title: Wrong-reading-lock inheritance contract
    question: >-
      What canonical RC1 field or union represents deterministic resize or encoding
      routes that inherit non-empty locks from an accepted master, including the exact
      master and lock-set reference?
    owner:
      - activative_intelligence_authority
      - delegation_schema_owner
    why_human_required: >-
      The amendment permits inheritance by reference, while the draft demand schema
      only requires an inline non-empty array. Creating a VAE-local reference field
      would fork the shared contract.
    blocking:
      - deterministic_transform_demand_validation
      - demand_template
      - adapter_losslessness_tests
    required_evidence:
      - canonical_schema_shape
      - provenance_and_hash_rule
      - positive_and_negative_fixtures
    resolution:
      applies_to:
        - deterministic_delivery_variants
        - non_semantic_derivatives
      inheritance_rule: inherit_all_wrong_reading_locks_from_accepted_parent
      strengthening_rule: derivative_may_add_stricter_locks
      prohibition: derivative_may_not_remove_or_weaken_inherited_locks
      relaxation_authority: new_authorized_upstream_demand_version
      authority: user_supplied_2026_07_14
    integration_disposition: implemented_in_VAE_boundary_manifest_fixture_and_tests
    evidence:
      - contracts/integration/BOUNDARY_ADAPTER_MANIFEST.yaml
      - contracts/integration/ASSET_RESULT_MAPPING.yaml
      - validation/fixtures/delegation-rc2/VAE_BOUNDARY_CASES.json
      - validation/tests/test_delegation_rc2_integration.py
    status: resolved_and_integrated

  - id: H-004
