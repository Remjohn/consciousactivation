$schema: https://json-schema.org/draft/2020-12/schema
title: Composition Geometry
description: ''
type: object
additionalProperties: false
required:
- asset_ref
- canvas
- detected_subject_bbox
- negative_space_regions
- safe_crop_variants
- collision_analysis
properties:
  asset_ref:
    type: string
    minLength: 1
  canvas:
    type: object
    required:
    - width
    - height
    properties:
      width:
        type: integer
      height:
        type: integer
  detected_subject_bbox: &id001
    type: array
    minItems: 4
    maxItems: 4
    items:
      type: number
      minimum: 0
      maximum: 1
  face_bbox: *id001
  gesture_bbox: *id001
  object_bboxes:
    type: array
    items: *id001
  gaze_vector:
    type: object
    properties:
      origin:
        type: array
        items:
          type: number
      direction:
        type: array
        items:
          type: number
  negative_space_regions:
    type: array
    items:
      type: object
      required:
      - bbox_norm
      - suitability
      properties:
        bbox_norm: *id001
        suitability: &id002
          type: string
  safe_crop_variants:
    type: array
    items:
      type: object
      required:
      - profile
      - crop
      properties:
        profile: *id002
        crop: *id001
  masks:
    type: array
    items:
      type: object
  depth_layers:
    type: array
    items:
      type: object
  collision_analysis:
    type: object
    additionalProperties:
      enum:
      - pass
      - warning
      - fail
