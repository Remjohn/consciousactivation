registry_id: VAE-VISUAL-EVALUATION-PROFILES
version: 1.1.0-alignment
status: specified_not_certified
authority: vae_evaluation_authority
constitution_version: 1.1.0
certification_rule: >-
  A profile cannot advance beyond specified_not_certified until every applicable
  dimension has an authority-approved threshold, labeled calibration evidence,
  protected release cases, repair mapping, and rollback evidence.
profiles:
  - profile_id: character-scene-composition
    version: 1.1.0-draft
    status: specified_not_certified
    target:
      category: 2d_character_animation
      format_profile: format02_minimal_coach_theatre
      asset_family: human_character_assets
    required_context:
      - activative_semantic_lineage
      - activation_contract
      - visual_semantic_pack
      - semiotic_mcda_receipt
      - visual_narrative_program
      - feature_contracts
      - somatic_route_request
      - composition_intent
      - wrong_reading_locks
    dimensions:
      - id: zero_second_hook
        polarity: higher_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::zero_second_hook
        threshold_status: pending_approval
      - id: pattern_match_strength
        polarity: higher_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::pattern_match_strength
        threshold_status: pending_approval
