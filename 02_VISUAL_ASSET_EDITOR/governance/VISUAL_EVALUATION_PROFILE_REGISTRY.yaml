        repair_authority: upstream_amendment_required
      - id: feature_contract
        repair_authority: upstream_amendment_required
      - id: somatic_route
        repair_authority: upstream_amendment_required
      - id: composition_intent
        repair_authority: upstream_amendment_required
      - id: materialization
        repair_authority: vae_owned_binding
      - id: materialization_pose_conditioning
        repair_authority: vae_owned_binding
      - id: technical
        repair_authority: vae_owned_binding
      - id: identity_continuity
        repair_authority: vae_owned_binding
      - id: temporal
        repair_authority: vae_owned_binding
      - id: evaluation_infrastructure
        repair_authority: infrastructure_retry
