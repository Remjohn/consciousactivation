        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::anticipation_residue
        threshold_status: pending_approval
      - id: anti_cliche_strength
        polarity: higher_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::anti_cliche_strength
        threshold_status: pending_approval
      - id: wrong_reading_risk
        polarity: lower_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::wrong_reading_risk
        threshold_status: pending_approval
      - id: feature_contract_compliance
        polarity: all_applicable_contracts_must_pass
