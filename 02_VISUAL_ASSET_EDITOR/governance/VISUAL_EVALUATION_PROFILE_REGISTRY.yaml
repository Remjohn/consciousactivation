      - id: viewer_role_clarity
        polarity: higher_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::viewer_role_clarity
        threshold_status: pending_approval
      - id: activation_direction_fidelity
        polarity: higher_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::activation_direction_fidelity
        threshold_status: pending_approval
      - id: prediction_gap
        polarity: higher_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::prediction_gap
        threshold_status: pending_approval
      - id: payoff
        polarity: higher_is_better
        applicability: required
        hard_gate: true
        threshold_ref: EVAL-AUTHORITY-PENDING::payoff
        threshold_status: pending_approval
      - id: affinity
        polarity: higher_is_better
        applicability: required
        hard_gate: true
