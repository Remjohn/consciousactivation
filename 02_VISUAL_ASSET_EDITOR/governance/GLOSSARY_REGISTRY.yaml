product: CMF Visual Asset Editor
version: 1.0.0
terms:
- term: Accepted Production Asset
  definition: An immutable asset version that passed production validity, demand fidelity,
    and composition effectiveness and is authorized for declared downstream use.
- term: Activative Function
  definition: The intended contribution of an asset to viewer-state change, recognition,
    participation, destabilization, reinforcement, or payoff.
- term: Asset Commander
  definition: The workflow authority that validates state, routes plans, enforces
    budgets, invokes evaluation and repair, promotes assets, and escalates typed exceptions
    without performing specialist creative analysis.
- term: Asset Family
  definition: A canonical reusable production class governing eligible routes, capabilities,
    evaluators, geometry, continuity, and delivery.
- term: Asset Intelligence Hunter
  definition: A conditional specialist that retrieves approved internal assets and
    reference evidence when a resolution route requires them.
- term: Asset Result Contract
  definition: The final typed service response identifying accepted assets, delivery
    variants, geometry, evaluations, production and budget receipts, limitations,
    and composition authorization.
- term: Budget Program
  definition: A versioned policy controlling candidates, parallelism, repair rounds,
    workflow variation, evaluator depth, cost, latency, and learning scope.
- term: Candidate Portfolio
  definition: A bounded, declared set of exploration, repair, or fallback candidates
    produced under one plan and Budget Program.
- term: Capability Development Plan
  definition: A separate governed plan for developing a reusable LoRA, model adaptation,
    control, workflow, or evaluator capability from evidence-backed recurring gaps.
- term: CMF-OKF Profile
  definition: A CMF extension of Open Knowledge Format used as a portable human/agent-readable
    projection of durable knowledge, never as canonical transactional state.
- term: Composition Effectiveness
  definition: Whether the asset performs its intended visual, syntactic, and Activative
    function when placed inside the actual scene, slide, frame, crop, hierarchy, and
    neighboring elements.
- term: Composition Feasibility Analyst
  definition: A specialist that converts composition intent into measurable feasibility,
    geometry, controls, conflicts, and recommendations.
- term: Composition Geometry
  definition: Image- or video-conditioned BBOXes, masks, safe zones, gaze/motion vectors,
    depth/layer information, crops, and collision analysis returned for downstream
    composition.
- term: Composition Intent
  definition: The requesting harness’s authoritative definition of canvas, intended
    region, tolerance, layer, visual weight, reserved/protected regions, direction,
    crop, and background behavior.
- term: Constraint Conflict
  definition: A typed, evidence-backed statement that an accepted demand cannot be
    fulfilled under its current constraints after authorized routes and repairs.
- term: Demand Amendment Proposal
  definition: A nonbinding option returned to the owning Content Harness when fulfilling
    the demand requires authority beyond internal production changes.
- term: Delivery Variant
  definition: An immutable deterministic derivative of an accepted master for a registered
    canvas, crop, mask, codec, alpha, preview, or downstream profile.
- term: Editor / Materializer
  definition: The deterministic and model execution nodes that implement an approved
    Visual Production Plan without redesigning it.
- term: Human Exception
  definition: A typed decision package issued only after authorized escalation conditions
    such as repair exhaustion, cost, capability, evaluator, conflict, or degradation.
- term: Independent Visual Evaluator
  definition: A VLM/deterministic evaluation authority isolated from production and
    responsible for profile-specific quality contracts.
- term: JIT Execution Capsule
  definition: The smallest complete phase-local prompt/context package compiled from
    canonical skills, adaptations, plan node, bindings, relevant knowledge, and output
    contract.
- term: LoRA Registry
  definition: The versioned catalog of LoRA/adaptation capabilities, compatibility,
    strength envelopes, benchmarks, provenance, failures, and maturity.
- term: Minimum Complete Context
  definition: The smallest authoritative evidence and knowledge set sufficient for
    one node’s responsibility and output contract.
- term: Production Binding
  definition: The pinned workflow, runtime, model, VAE, LoRA, control, parameter,
    input, and evaluator configuration compiled for execution.
- term: Production Validity
  definition: Technical integrity, deliverability, metadata completeness, and reproducibility
    of an asset independent of semantic quality.
- term: Reference Evidence
  definition: Material used to understand, condition, guide, or evaluate production
    that is not automatically authorized for final composition.
- term: Resolution Strategy Composer
  definition: The specialist that selects the least complex viable multi-method route
    and emits a typed Visual Production Plan.
- term: Semantic Sovereignty
  definition: The law that the Visual Asset Editor may resolve production but cannot
    rewrite the requesting Content Harness’s authorized meaning.
- term: Steering Recipe
  definition: A versioned, evidence-backed production intervention with applicability,
    preservation, bindings, control comparison, regressions, and lifecycle.
- term: Syntax Context Fingerprint
  definition: A comparable representation of an asset’s rendered Visual Syntax role,
    geometry, relationships, recurrence intent, and appearance.
- term: Visual Asset Demand
  definition: The immutable typed contract defining the requested asset’s family,
    role, meaning, Activative function, composition, continuity, wrong-reading locks,
    delivery, evaluation, and execution policy.
- term: Visual Asset Memory
  definition: The governed store of immutable assets, geometry, lineage, evaluations,
    usage contexts, recurrence verdicts, supersession, and retrieval indexes.
- term: Visual Capability Registry
  definition: The governed versioned catalog of workflows, models, VAEs, LoRAs, controls,
    custom nodes, evaluator profiles, and runtime profiles.
- term: Visual Compute Fabric
  definition: The hybrid pool and scheduler for isolated local, self-hosted, cloud,
    autoscaled, and approved external visual compute workers.
- term: Visual Evaluation Profile
  definition: The versioned family/route/context-specific combination of deterministic
    validators, VLM programs, thresholds, hard gates, failure codes, and repair mappings.
- term: Visual Production Plan IR
  definition: The provider-neutral canonical execution plan compiled from an accepted
    Visual Asset Demand.
- term: Visual Production Plan
  definition: A versioned instance of the Visual Production Plan IR containing objective,
    route, stages, capabilities, bindings, budgets, evaluators, fallbacks, and delivery.
- term: Visual Steering Intelligence
  definition: Governed cross-run knowledge that turns controlled production and repair
    evidence into validated Steering Recipes and routing insights.
- term: Visual Syntax Context
  definition: The scene/slide/frame role, composition function, BBOX, neighboring
    elements, sequence position, recurrence intent, and Activative purpose in which
    an asset is rendered.
- term: Visual Usage Receipt
  definition: The immutable record of one asset version’s actual rendered use and
    syntax/Activative context.
- term: Wrong-Reading Lock
  definition: A demand-level prohibited interpretation or visual pattern that must
    remain below its configured risk threshold.
- term: 2D Character Animation
  definition: The canonical category whose production substrate is a registry-driven
    character performance system using identities, poses, expressions, gestures, gaze,
    props, animation primitives, scene states, and continuity.
- term: Format 02 Minimal Coach Theatre
  definition: The Release 1 reference format profile for 2D Character Animation and
    the first production-certified Visual Asset Editor integration.
- term: Provider Artifact
  definition: A compiled execution artifact such as ComfyUI workflow JSON or an external
    API payload derived from the canonical Visual Production Plan.
- term: Quality Repair Round
  definition: One VLM-directed causal correction cycle; no run may exceed three autonomous
    quality rounds.
- term: Recurrence Verdict
  definition: A VLM classification of beneficial recurrence, neutral reuse, productive
    variation, redundant repetition, fatiguing pattern, or contradictory recurrence.
- term: Runtime Profile
  definition: A digest-pinned execution environment declaring container, ComfyUI,
    custom nodes, hardware, API, mounts, concurrency, health, and certification.
- term: Visual Asset Service
  definition: The asynchronous contract-driven public boundary through which registered
    systems submit demands and receive events, exceptions, and results.
- term: Architecture Preservation Contract
  definition: The machine-readable declaration that the Visual Asset Editor adds an
    independent product without redesigning validated Atomic Harness Builder architecture.
