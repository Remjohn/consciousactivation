product: CMF Visual Asset Editor
constitution_version: 1.0.0
prd_version: 0.1.0-draft
status: draft_for_review
canonical_promise: Transform validated Visual Asset Demand Contracts into production-ready,
  provenance-complete assets without altering the requesting Content Harness's authorized
  meaning, sequence role, Activative purpose, or composition intent.
authority_model:
  routine_operation: autonomous
  operator_role: supervisory_policy_and_exception_authority
  content_harness_owns:
  - semantic_intent
  - activative_function
  - sequence_role
  - composition_intent
  - identity_requirements
  - continuity_requirements
  - wrong_reading_locks
  visual_editor_owns:
  - production_route
  - visual_production_plan
  - workflow_binding
  - model_lora_control_binding
  - compute_routing
  - candidate_portfolio
  - evaluation_invocation
  - targeted_repair
  - asset_promotion
  - delivery
  human_exception_triggers:
  - quality_failure_after_3_rounds
  - unauthorized_cost
  - unresolved_capability_gap
  - blocking_constraint_conflict
  - unresolved_evaluator_contradiction
  - degraded_acceptance
acceptance_gates:
- production_validity
- demand_fidelity
- composition_effectiveness
max_quality_repair_rounds: 3
release_1_reference:
  category: 2d_character_animation
  format_profile: format02_minimal_coach_theatre
  primary_asset_family: human_character_assets
  certification_mode: limited_production_then_production
knowledge_rule: CMF-OKF is a readable knowledge projection; canonical operational
  truth remains in typed contracts, registries, immutable evidence, event stores,
  and asset records.
