summary: >
  Practical Play / Safe Failure ensures that the user is completely insulated
  from real-world consequences when they fail inside the CCP environment.
  In the real world, a coach who fumbles a webinar pitch loses $10,000 in sales.
  In CCP, when a coach fumbles a V2WS pitch drill, they lose nothing except
  a few digital points, and they immediately gain insight on how to fix it.
  The platform must be explicitly architected so that failure is private,
  reversible, and inherently educational, turning the anxiety of public speaking
  into the low-stakes joy of 'Fun Failure.'

core_move: >
  Guarantee that the user controls the visibility of their failures, ensuring
  that bad takes are never automatically published, and that the cost of failing
  a drill is strictly contained within the game loop.

why_it_works: >
  Jane McGonigal identifies that in well-designed games, players actually spend
  80% of their time failing, yet they remain highly engaged. This 'Fun Failure'
  exists because the failure is safe; it provides immediate feedback without
  ruining the player's real life. When coaches speak on LinkedIn, failure is
  permanent and damaging (loss of reputation). If CCP feels like LinkedIn, they
  will be too paralyzed to practice. By explicitly guaranteeing that CCP is a
  sandbox—where their worst takes are quarantined and only their best takes
  are clipped for CMF distribution—we remove the paralysis.

examples:
  - context: "BOOK: Reality Is Broken - Super Mario Bros"
    application: >
      When Mario falls in a pit, the player doesn't lose money from their bank
      account or face public humiliation. They lose a 'life', reset instantly to
      the beginning of the level, and use the knowledge of where the pit is to
      jump it next time.
    effect: >
      The player tries risky, aggressive moves they would never try in real life.

  - context: "CCP: The Quarantine Default"
    application: >
      A coach records a reaction and the AI scores it a 35/100 (high hedging,
      low conviction). The system explicitly states: 'This take has been
      quarantined to your private vault. It will not be sent to the Jury. Tap
      to try again.'
    effect: >
      The coach feels immense relief and immediately tries again, knowing their
      reputation is protected.

  - context: "CCP: V2WS Sandbox Mode"
    application: >
      Before deploying an automated webinar, the coach records the 'Close' section
      in the CCP Sandbox. The system flags that they sound desperate.
    effect: >
      They failed safely in the app, saving them from failing dangerously in front
      of 100 live prospects.

  - context: "CCP: The Draft Bin"
    application: >
      Users can freely abort a recording mid-sentence. The aborted take doesn't
      count against their score or trigger a penalty. It just goes into the Draft Bin.
    effect: >
      Encourages users to hit the record button more frequently, knowing they can
      always bail out if they stumble.

  - context: "CCP: Ghost Mode Practice"
    application: >
      A coach turns on 'Ghost Mode' for Law28. Their scores are tracked for their
      own analytics, but hidden from their Accountability Partner for 24 hours while
      they work on a new skill.
    effect: >
      Removes peer-pressure friction during the messy phase of skill acquisition.

anti_examples:
  - description: >
      Automatically posting a user's first raw audio take to the public Jury
      pool without giving them a chance to review the score or delete it.
    why_it_fails: >
      This is the exact opposite of Safe Failure. It replicates the high-stakes
      anxiety of live social media. The user will be terrified to use the app
      because a mistake could damage their professional brand.

