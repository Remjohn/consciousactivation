implementation_targets:
  frontend_components:
    - "QuarantineUI — explicit visual language indicating the recording is 'locked' or 'private'"
    - "TrashTakeGesture — an incredibly satisfying, fast way to delete a bad take and instantly start over"
  backend_rules:
    - "privacy_engine: default all takes scoring < 60 to private/quarantine unless explicitly overridden by the user"
  telemetry_events:
    - "take_quarantined"
    - "aborted_mid_recording"
    - "safe_failure_retry_initiated"
  experiments:
    - "A/B test: Asking 'Publish to Jury?' vs Auto-publishing takes that score > 85"

