activation_conditions:
  - "User receives a score below the required threshold for advancement"
  - "User loses a competitive interaction (e.g., debate, jury vote)"
  - "User breaks a streak or misses a commitment window"

suppression_conditions:
  - "User successfully completes the task (no Black Hat transition needed, stay in White Hat)"

misuse_modes:
  - "Toxic Positivity — ignoring the failure entirely and just saying 'Great job!' when the user knows they failed."
  - "Over-punishing before the recovery, making the White Hat transition feel like a cheap band-aid."

synergizes_with:
  - "EXP-SAF-004" # Practical Play / Safe Failure
  - "EXP-FBK-001" # RIM Feedback Discipline (Feedback must be White Hat)

conflicts_with:
  - "EXP-TRG-002" # High velocity can sometimes bypass the White Hat recovery phase if not careful

implementation_targets:
  frontend_components:
    - "FailureRecoveryCard — the UI component that replaces the standard score card upon failure"
    - "RedemptionButton — a prominent CTA offering immediate White Hat action"
  backend_rules:
    - "emotional_sequence_engine: if (score < threshold) { suppress_global_ranking(); inject_white_hat_reframe(); }"
  telemetry_events:
    - "black_hat_state_entered"
    - "white_hat_recovery_accepted"
    - "churn_averted_via_reframe"
  experiments:
    - "A/B test: Highlighting the single best metric before showing the failure vs showing the failure and then offering the recovery"

