implementation_targets:
  frontend_components:
    - "DynamicProofCarousel — rendering testimonials filtered by the viewing user's CA-1 profile"
    - "LocalLeaderboard — a UI strictly constrained to the user's specific skill tier or niche"
  backend_rules:
    - "relatedness_engine: prioritize social data points where Jaccard similarity of user_tags > 0.6"
  telemetry_events:
    - "localized_proof_viewed"
    - "peer_comparison_triggered"
    - "conversion_after_identity_proof"
  experiments:
    - "A/B test: Show proof from someone exactly in their tier vs someone just one tier above them"

