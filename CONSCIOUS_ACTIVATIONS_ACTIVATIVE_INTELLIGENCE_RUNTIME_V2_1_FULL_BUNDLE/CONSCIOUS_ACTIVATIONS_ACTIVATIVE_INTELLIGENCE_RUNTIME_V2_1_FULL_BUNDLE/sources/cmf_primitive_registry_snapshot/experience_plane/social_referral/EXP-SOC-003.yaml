activation_conditions:
  - "User is at a decision point (upgrade, record, debate) and needs validation"
  - "System has enough telemetry to accurately match the user's niche or skill tier"
  - "A peer with a similar identity has recently completed a successful action"

suppression_conditions:
  - "User is in a Tier 1 'cold start' and has not provided enough identity data for accurate matching"

misuse_modes:
  - "Faking social proof with simulated bot users (destroys trust instantly if discovered)."
  - "Matching based on irrelevant metrics (e.g., matching two people just because they live in the same state, when their coaching niches are vastly different)."

