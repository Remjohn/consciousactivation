activation_conditions:
  - "User views their primary profile or analytics dashboard"
  - "User is experiencing a short-term failure and needs macro-perspective (Recovery)"
  - "User is approaching a major subscription renewal date (Proof of ROI)"

suppression_conditions:
  - "User is in Day 1-3 of the journey (there is no long loop data to show yet; showing an empty graph is demotivating)"

misuse_modes:
  - "Data Dumping — showing a chaotic spreadsheet of 100 raw data points instead of a clear, narrated 'Arc of Progress'."
  - "Punitive Tracking — using the long-term graph to highlight a permanent downward trend without offering a Richter Rescue."

synergizes_with:
  - "EXP-SAF-001" # White Hat Emotional Sequencing (The Long Loop is the ultimate White Hat reframe for a daily failure)
  - "EXP-TRG-008" # Motivation Leverage (Frames the progression as intrinsic mastery)

conflicts_with:
  - "EXP-PRG-001" # Hook Cycle Velocity (Velocity is micro; Long Loops are macro. The UI must balance them so neither overwhelms the other).

implementation_targets:
  frontend_components:
    - "MacroProgressChart — a sleek, Skia-rendered line graph focusing strictly on the moving average of their core biometric (e.g., Conviction Density)"
    - "PathVisualizer — a Candy Crush-style winding path mapping the 28-day journey"
  backend_rules:
    - "analytics_engine: calculate rolling 7-day and 30-day averages to smooth out daily variance for UI display"
  telemetry_events:
    - "long_loop_viewed"
    - "macro_trend_positive_alert_sent"
    - "renewal_saved_by_progress_view"
  experiments:
