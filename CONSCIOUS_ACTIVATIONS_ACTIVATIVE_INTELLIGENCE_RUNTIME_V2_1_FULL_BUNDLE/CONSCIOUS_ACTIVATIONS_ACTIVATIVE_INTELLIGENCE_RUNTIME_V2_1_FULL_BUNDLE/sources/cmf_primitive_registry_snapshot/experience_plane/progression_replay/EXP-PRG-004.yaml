summary: >
  Long Loops for Habit Formation ensure that the platform supports behaviors
  that take weeks or months to stabilize, looking beyond the dopamine hit of
  a single daily reaction. In CCP, the 28-day Law28 cycle requires the user
  to visualize their progress over a month. If the UI only ever focuses on
  "Today's Score," the macro-progression is invisible, and the user churns
  when they have a bad day. By tracking and celebrating the 'Compound Arc'
  (e.g., 'You have reduced your hedging by 40% over the last 14 days'), we
  anchor their motivation in long-term identity shift rather than short-term spikes.

core_move: >
  Design analytics and progress visualization to explicitly highlight cumulative
  gains over weeks or months, demonstrating that even a 'failed' daily drill
  contributes to a successful long-term trend.

why_it_works: >
  Stephen Wendel emphasizes that maintaining a habit is fundamentally different
  from starting one. Short loops (Hook Cycle Velocity) start the habit. Long loops
  maintain it. When a user has a bad day and their short-loop score drops, they
  experience friction. If the system only shows them the bad daily score, they quit.
  But if the system shows them a Long Loop graph—proving that despite today's
  dip, their 30-day trajectory is massively positive—it shifts their perspective
  from 'I failed today' to 'I am growing this month.' It anchors their commitment
  in delayed gratification.

examples:
  - context: "BOOK: Designing for Behavior Change - The Weight Loss Graph"
    application: >
      A dieter steps on the scale and sees they gained 1 pound since yesterday
      (short loop failure). A good app instantly zooms out to show the 6-month
      graph, proving they are still down 20 pounds overall (long loop success).
    effect: >
      Prevents momentary discouragement from destroying the long-term habit.

  - context: "CCP: The 30-Day Resonance Delta"
    application: >
      A coach checks their analytics dashboard. Instead of just seeing recent
      scores, the primary UI element is the 'Resonance Delta'—a visualization
      showing how their vocal baseline has measurably deepened since Day 1.
    effect: >
      Provides undeniable proof of ROI for the $29/mo subscription.

  - context: "CCP: The Law28 Calendar Map"
    application: >
      The Law28 UI isn't a list; it's a visual 28-day continuous path. As they
      complete days, the path lights up, visually shrinking the distance to the
      Day 28 Capstone.
    effect: >
      Leverages the 'Endowed Progress Effect'; as they get closer to the end,
      their motivation to finish increases exponentially.

  - context: "CCP: Topic Mastery Over Time"
    application: >
      The system tracks their performance in the 'B2B Sales' lane over 3 months.
      The Agent sends a milestone alert: 'You have evolved from a 60% average to
      an 85% average in B2B topics. You now outrank 80% of your cohort.'
    effect: >
      Validates long-term effort and encourages them to start a new Long Loop
      in a different topic lane.

  - context: "CCP: Supervisor View"
    application: >
      An accountability partner (Supervisor) doesn't just see the daily score;
      they see the coach's Long Loop trendline, allowing them to say: 'You had a
      rough week, but look how much better you are than last month.'
    effect: >
      Arms the social support system with the data needed to prevent churn.

anti_examples:
  - description: >
      A dashboard that completely resets every Monday, erasing all historical
      progress visualization and forcing the user to 'start from scratch' visually
      every single week.
    why_it_fails: >
      While weekly resets are good for local leaderboards (Balanced Status),
      erasing personal progression data destroys the Long Loop. The user feels
      like they are on a treadmill, running forever but never arriving.

