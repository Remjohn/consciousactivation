crosswalk_id: "XW-CUMULATIVE-INVESTMENT"
crosswalk_note: >
  Meaning side: governs the continuous refinement of the Voice DNA model.
  Experience side: governs the timing of the UI prompts asking the user to contribute to that model.

notes: >
  Without Cumulative Investment, the CCP is just a tool. With it, it becomes an indispensable
  extension of the coach's identity. Measure the success of this primitive by tracking how much
  data/reputation a user has stored prior to their billing renewal date.
