    primitive_name_in_audit: "Cumulative Investment"
    mcda_score: 165
    audit_path: "lab/CCP APRIL Updates/Public_Speaking_Audits/09_Experience_Engineering/AUDIT_Hooked_Ryan_Hoover.md"

book_reference:
  title: "Hooked"
  author: "Nir Eyal / Ryan Hoover"
  chapters:
    - "Chapter 4: Variable Reward"
    - "Chapter 5: Investment"
  key_pages: "135-155"
  book_path: "lab/Public Speeaking Coaching/09_Experience_Engineering/Hooked - Ryan Hoover.md"

summary: >
  Cumulative Investment dictates that a user's loyalty is directly proportional to the amount of
  work, data, and social capital they have deposited into the system. If the platform requires zero
  investment, it has zero switching costs. By systematically prompting the user to 'Store Value'
  (uploading their voice models, archiving their best debate takes, customizing their Coach OS
  profile), the product transforms from a disposable utility into a permanent archive of their
  professional identity.

core_move: >
  Immediately after delivering a variable reward (like a high Delivery Score), prompt the user
  to make a small, permanent investment in the platform (e.g., 'Save this vocal take to your
  Master Archive' or 'Pin this stance to your public profile').

why_it_works: >
  Nir Eyal's 'Hook Model' identifies the 'Investment Phase' as the critical final step that loads
  the next trigger. The psychological mechanism is the 'IKEA Effect'—we overvalue things we build
  ourselves. When a user stores value (data, followers, reputation) in the CCP, they are building
  their own digital real estate. Leaving the platform means abandoning the house they built. Crucially,
  this investment must be requested *after* the reward, when the user is swimming in dopamine and
  wants to reciprocate, not before, which feels like extractive friction.

examples:
  - context: "BOOK: Storing Value in digital networks"
    application: >
      Eyal describes how users 'store value' in platforms like Twitter or LinkedIn by building
      follower counts, endorsing skills, or curating playlists. The more they use the product,
      the better it gets, and the harder it becomes to leave because the stored value is non-transferable.
    effect: >
      The product's retention curve flattens out favorably over time, because the switching cost
      increases linearly with every interaction.

  - context: "CCP: Conscious Reactions (Tier List Mode)"
    application: >
      After the user successfully completes a Tier List reaction and receives a high AI score
      (the reward), the system asks: 'Would you like to pin this controversial ranking to your
      Public Jury Profile?'
    effect: >
      The user stores value (their public stance). Their profile becomes richer. The next time
      they consider churning, they realize they would lose their carefully curated public debate history.

  - context: "CCP: Coach OS (Voice DNA Cultivation)"
    application: >
      The system doesn't just evaluate the coach's voice; it builds a 'Voice Vault.' After
      a particularly resonant recording, the agent prompts: 'Your resonance in the final 30
      seconds was elite. Tap to add this clip to your foundational Voice DNA training set.'
    effect: >
      The user is literally training the platform's understanding of their own voice. Churning
      would mean losing the highly trained 'Voice DNA' model they spent months building.

  - context: "CCP: AFFiNE Content Factory Archive"
    application: >
      Instead of exporting all generated video scripts to Google Docs, the CCP encourages
      the coach to organize them in the native AFFiNE workspace by tagging them with
      'Archetype Pillars' and 'Performance Tags.'
    effect: >
      The AFFiNE workspace transforms from a blank canvas into an irreplaceable, highly
      structured archive of their entire intellectual property.

  - context: "CCP: CPSC Silent Referral Network"
    application: >
      When a coach invites peers to jury their debates, those peers are added to the coach's
      'Inner Circle' network within the app.
    effect: >
      The user stores 'Social Capital.' They won't delete the app because it contains the
      direct lines of communication to their trusted debate partners.

anti_examples:
  - description: >
      During the very first minute of onboarding, before the user has recorded a single piece
      of content or seen any value, the app demands they fill out a 15-minute profile detailing
      their entire coaching history and upload 5 gigabytes of past video content to 'train the AI.'
    why_it_fails: >
      The user is asked to make a massive investment before receiving any reward or proof of
      competence. This violates the Hook cycle. The user feels exploited by the friction and
      abandons the onboarding sequence entirely. Investment must be earned.

