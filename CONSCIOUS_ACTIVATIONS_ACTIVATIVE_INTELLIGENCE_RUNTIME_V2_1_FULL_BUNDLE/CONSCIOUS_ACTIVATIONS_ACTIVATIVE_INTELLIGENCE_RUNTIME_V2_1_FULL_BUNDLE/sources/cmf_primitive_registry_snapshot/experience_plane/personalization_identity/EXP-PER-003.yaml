activation_conditions:
  - "The user has just experienced a positive variable reward (e.g., Fiero from a high score)."
  - "The user has generated an artifact (audio clip, script, thesis) that has long-term value."
  - "The user's cognitive load is relatively low (post-performance)."

suppression_conditions:
  - "The user is in the middle of a high-friction task (e.g., actively recording)."
  - "The user just received a terrible score and is in a state of frustration or shame."

misuse_modes:
  - "The Extractive Ask — Forcing investment before delivering the reward, causing instant churn."
  - "Invisible Storage — Allowing the user to store value, but never showing them the accrued value (e.g., a hidden database instead of a beautiful 'Archive' UI), neutralizing the retention effect."
  - "Worthless Labor — Asking the user to invest effort in something they don't actually care about (e.g., 'Customize the color of this button!')."

synergizes_with:
  - "EXP-TRG-001" # First Major Win-State (The reward that precedes the investment)
  - "EXP-SOC-001" # Social Treasures (The social capital they store)

conflicts_with:
  - "EXP-FRC-001" # The Frictionless Path (If the investment prompt is too complex and breaks flow)

implementation_targets:
  frontend_components:
    - "ScoreCardUI — append a low-friction 'Store to Vault' toggle after the score animation"
    - "ProfileArchive — a highly visible, visually premium gallery of the user's past wins and stored value"
  backend_rules:
    - "hook_cycle_engine: ensure `investment_prompt` only fires if `reward_delivered == true`"
    - "asset_manager: track `cumulative_assets_stored` to dynamically alter the user's status level"
  telemetry_events:
    - "investment_prompt_displayed"
    - "investment_completed"
    - "investment_skipped"
  experiments:
    - "A/B test: Asking for data investment (save this clip) vs social investment (invite a peer) after the first reward."

