experience_primitive_id: "EXP-PER-003"
canonical_name: "Cumulative Investment"
aliases:
  - "The IKEA Effect"
  - "Stored Value Lock-In"
experience_family: "personalization_identity"
mechanic_role: "retention"
moment_role: "post_reward_action"
