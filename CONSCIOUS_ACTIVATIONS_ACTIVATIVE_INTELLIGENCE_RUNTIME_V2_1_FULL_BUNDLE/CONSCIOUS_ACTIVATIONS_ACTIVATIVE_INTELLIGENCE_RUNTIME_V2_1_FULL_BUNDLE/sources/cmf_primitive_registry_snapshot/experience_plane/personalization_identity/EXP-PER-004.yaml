summary: >
  Tailoring & Suggestion dictates that persuasive systems do not ask users to manually configure their
  experience; they use telemetry to silently infer needs and present a highly curated, tailored path.
  By limiting choices and suggesting the single most relevant action based on the user's identity
  and current state, the system bypasses decision fatigue and makes the 'target behavior' feel like
  the user's own natural inclination.

core_move: >
  Do not present a massive menu of options (e.g., 'Choose from 50 debate topics'). Instead, use the
  user's historical data and archetype to present ONE highly tailored suggestion (e.g., 'This topic
  matches your Voice DNA. Record now.').

why_it_works: >
  BJ Fogg demonstrates that 'Tailoring'—providing information relevant to the individual—is a core
  dimension of persuasive computing. When a system provides a tailored suggestion at the exact
  moment of decision, it drastically lowers the 'Ability' threshold in the Fogg Behavior Model
  (B=MAT). The user doesn't have to search, filter, or decide; they only have to say 'yes.'
  Furthermore, because the suggestion is tailored to their specific identity or past performance,
  it carries the weight of a trusted advisor, increasing the 'Motivation' to act.

examples:
  - context: "BOOK: Tailoring in persuasive computing"
    application: >
      Fogg explains how tailored health interventions are vastly more effective than generic ones.
      A system that says, 'Based on your heart rate yesterday, you should walk 10 minutes today'
      is persuasive. A system that just says 'Exercise is good' is ignored.
    effect: >
      Tailoring transforms generic advice into an actionable, personal mandate.

  - context: "CCP: Conscious Reactions (Topic Selection)"
    application: >
      Instead of sending a Telegram message saying 'New topics are available,' the CCP Agent
      analyzes the coach's past high-scoring reactions (which were mostly about 'Leadership').
      It sends a tailored message: 'A new thesis on Leadership just dropped. Based on your
      last score, you are uniquely qualified to dismantle this. Tap to react.'
    effect: >
      The coach feels individually selected. The friction of choosing a topic is eliminated.
      Activation rates spike because the suggestion aligns perfectly with their perceived identity.

  - context: "CCP: CBCS Accountability Engine"
    application: >
      The coach is 3 days late on their content quota. The system doesn't send a generic reminder.
      It tailors the intervention based on their 'Archetype.' If they are 'The Sovereign,' it says,
      'Your audience is waiting for a ruling.' If they are 'The Guide,' it says, 'Someone in your
      network is stuck and needs your framework.'
    effect: >
      The reminder hits the exact emotional trigger that motivates that specific coach, making
      the action feel aligned with their values rather than forced by an algorithm.

  - context: "CCP: V2WS Webinar Module Builder"
    application: >
      When the coach opens the slide builder, the system doesn't show a blank page. It has already
      pre-loaded the 'Story Arc' template that the coach used most successfully in their last
      three videos, leaving only the specific bullet points blank for them to fill in.
    effect: >
      The system is actively tailoring the UX to their proven habits. The coach experiences
      massive relief (friction bypass) and immediately enters a flow state.

  - context: "CCP: AI Song Generation (Sonic Scribe)"
    application: >
      The coach asks for background music for a reel. The Sonic Sommelier doesn't ask them to
      pick from 20 genres. It uses their historical aesthetic preference to auto-generate a
      track with their signature 'minor key piano drone.'
    effect: >
      The coach feels like the system is an extension of their own creative brain, perfectly
      guessing their desires and saving them 10 minutes of scrolling through stock music libraries.

anti_examples:
  - description: >
      A coach logs into the app and is presented with a dashboard containing 50 different metrics,
      100 possible debate topics, and a massive 'Settings' menu to customize their experience.
    why_it_fails: >
      This is 'Customization,' not 'Tailoring.' It offloads all the cognitive work onto the user.
      Faced with choice paralysis and decision fatigue, the coach closes the app. Persuasive
      technology must make the path *easier*, not just more customizable.

