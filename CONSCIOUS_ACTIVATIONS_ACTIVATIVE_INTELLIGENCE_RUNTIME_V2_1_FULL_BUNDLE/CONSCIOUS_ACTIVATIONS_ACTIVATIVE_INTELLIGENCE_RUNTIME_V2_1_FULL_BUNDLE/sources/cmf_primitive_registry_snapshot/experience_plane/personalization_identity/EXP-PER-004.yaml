activation_conditions:
  - "The user is at a decision point (e.g., picking a topic, choosing a template)."
  - "The system has sufficient historical data to make an accurate, high-confidence inference."
  - "The user has been inactive and requires a highly relevant hook to re-engage."

suppression_conditions:
  - "The user explicitly requested to browse the full library or catalog."
  - "The system's confidence in the tailored suggestion is low (it is better to offer a generic choice than a wildly inaccurate 'tailored' one)."

misuse_modes:
  - "The Uncanny Valley of Persuasion — Tailoring that is so hyper-specific based on data the user didn't explicitly provide that it feels like spyware, destroying trust."
  - "The Echo Chamber — Tailoring so aggressively that the user never sees any new challenges or topics, stunting their growth and causing long-term boredom."
  - "False Personalization — Using the user's first name in an otherwise completely generic, mass-blasted email and calling it 'tailoring.'"

synergizes_with:
  - "EXP-TRG-002" # Urgent Optimism Hooks (Tailoring makes the hook relevant)
  - "EXP-PER-001" # Monitor Attachment (Tailoring is how the 'Alfred' persona proves its worth)

conflicts_with:
  - "EXP-FRC-003" # Optional Complexity (If tailoring is forced and prevents power users from accessing complex options)

implementation_targets:
  frontend_components:
    - "TelegramBot — push tailored topic suggestions instead of generic alerts"
    - "ReactionDashboard — highlight the 'Recommended for You' topic as the primary CTA"
  backend_rules:
    - "recommendation_engine: score available topics against the user's `archetype_id` and `historical_performance`"
    - "push_scheduler: only trigger notification if a topic matches user profile > 80%"
  telemetry_events:
    - "tailored_suggestion_delivered"
    - "tailored_suggestion_accepted"
    - "tailored_suggestion_ignored"
  experiments:
    - "A/B test: Sending 1 highly tailored topic vs sending a list of 3 topics."

