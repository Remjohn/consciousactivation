crosswalk_id: "XW-TAILORED-PATH"
crosswalk_note: >
  Meaning side: governs how topics are semantically matched to the coach's DNA.
  Experience side: governs the UX of how that match is presented to bypass decision fatigue.

notes: >
  Tailoring is the mechanism that translates the massive data processing of the backend into
  a frictionless, magical experience on the frontend. If the user ever has to 'search' for
  what to do next, we have failed to tailor the experience.
