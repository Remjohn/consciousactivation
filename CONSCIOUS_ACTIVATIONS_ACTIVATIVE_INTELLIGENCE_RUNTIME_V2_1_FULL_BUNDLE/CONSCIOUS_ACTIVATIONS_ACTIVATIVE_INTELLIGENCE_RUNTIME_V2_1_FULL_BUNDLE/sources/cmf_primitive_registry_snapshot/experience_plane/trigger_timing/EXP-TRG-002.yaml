summary: >
  Hook Cycle Velocity mandates that the time it takes a user to pass through
  all four stages of the Hook Model (Trigger, Action, Reward, Investment)
  must be incredibly short—ideally within a single session or a 24-hour window.
  Habits cannot form if the loop takes a week to complete. In CCP, the action
  of recording, receiving a biometric score, and banking that intelligence
  must occur rapidly to cement the routine.

core_move: >
  Force rapid, near-daily engagement by compressing the time between action
  and variable reward, ensuring the user completes the entire loop before leaving.

why_it_works: >
  Nir Eyal's Habit Zone matrix shows that frequency is the dominant factor in
  habit formation. A behavior that occurs rarely cannot become a habit, even
  if the reward is massive. By ensuring the Law28 challenge and Conscious
  Reactions are built on daily, 2-minute voice constraints with instantaneous
  NIM scoring, the user experiences the full cycle (Action -> Variable Reward
  of the score -> Investment in their Voice DNA) within minutes, cementing the
  neurological pathway rapidly.

examples:
  - context: "BOOK: Hooked - Google Search's rapid cycle"
    application: >
      Google search provides instantaneous variable reward. The user types a query
      (Action) and immediately receives a page of variable results (Reward). The
      extreme velocity of this loop makes it a deeply ingrained habit, impossible
      to displace with a slower product.
    effect: >
      Unbreakable habit formation due to sheer frequency and speed of loop completion.

  - context: "CCP: Conscious Reactions Scoring"
    application: >
      A coach records a 2-minute voice note. Instead of waiting hours for a human
      review, the Sovereign NIM stack returns the biometric score, conviction density,
      and feedback within 15 seconds.
    effect: >
      The reward is delivered while the action is still fresh, tightening the cycle.

  - context: "CCP: Law28 Daily Cadence"
    application: >
      The Law28 challenge strictly enforces a 24-hour cadence for foundation drills.
      The user cannot batch 7 drills into one day. They must return daily, forcing
      high-frequency repetition.
    effect: >
      Ensures the habit zone is penetrated by maximizing frequency.

  - context: "CCP: Mini App Share-to-Vote Loop"
    application: >
      When a coach shares a Debate artifact to Telegram, peers can vote with a single
      tap inside the chat. The score updates instantly for the coach.
    effect: >
      The coach experiences a rapid variable reward (watching votes come in)
      minutes after their investment (recording).

  - context: "CCP: CMF Content Extraction"
    application: >
      The CMF pipeline delivers the extracted Content Trinity (shorts, memes) back
      to the coach within 20 minutes of recording.
    effect: >
      The coach receives a massive, tangible reward (content) almost immediately,
      compelling them to invest (record) again tomorrow.

anti_examples:
  - description: >
      Requiring a user to record a 15-minute video and wait 48 hours for a coach
      to manually review and score it.
    why_it_fails: >
      The Hook Cycle is broken. By the time the reward (feedback) arrives, the user
      has lost the emotional context of the action. The behavior is too slow to ever
      become a daily habit.

