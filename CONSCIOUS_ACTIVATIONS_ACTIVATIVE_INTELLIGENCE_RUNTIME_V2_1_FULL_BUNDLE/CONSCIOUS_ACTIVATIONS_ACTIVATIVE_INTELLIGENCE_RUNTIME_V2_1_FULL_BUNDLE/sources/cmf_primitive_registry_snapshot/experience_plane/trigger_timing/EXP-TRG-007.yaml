activation_conditions:
  - "The user's local timezone is known and accurate"
  - "The requested action matches the cognitive load suitable for the time of day"

suppression_conditions:
  - "User is detected to be outside normal routine (e.g., vacation mode enabled)"
  - "Contextual timing conflicts with an acute crisis or failure state"

misuse_modes:
  - "Assuming all users have the exact same schedule (failing to allow timezone/preference offsets)"
  - "Forcing heavy cognitive tasks into low-attention time pockets (like the middle of the workday)"

