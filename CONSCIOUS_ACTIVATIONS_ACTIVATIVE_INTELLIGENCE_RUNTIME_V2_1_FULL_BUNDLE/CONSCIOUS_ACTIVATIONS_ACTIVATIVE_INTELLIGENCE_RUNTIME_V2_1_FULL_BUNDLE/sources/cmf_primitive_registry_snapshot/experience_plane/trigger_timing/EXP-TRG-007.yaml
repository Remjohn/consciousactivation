summary: >
  Contextual Timing Triggers align the platform's requests with the user's
  natural, real-world rhythms rather than an arbitrary software clock.
  While Context-Aware System Triggers (TRG-006) respond to erratic external
  events (like news), Contextual Timing Triggers respond to predictable human
  rhythms (morning coffee, Sunday reflection, post-workout). In CCP, this
  manifests as the Sunday Postcard arriving exactly when executives naturally
  reflect on their week, or morning drills arriving right before the day's first call.

core_move: >
  Map routine prompts explicitly to the user's biological and professional
  calendar rhythms, ensuring the system integrates into existing habits rather
  than demanding new ones.

why_it_works: >
  McGonigal points out that successful alternate reality games and gamified
  systems don't force players to abandon their lives; they fit into the "time
  pockets" of reality. If you ask a CEO to reflect deeply at 2:00 PM on a Tuesday,
  they will fail because their context is pure execution. If you ask them to
  reflect at 8:00 AM on Sunday, they will succeed. Stacking a digital habit onto
  an existing physical habit (like morning coffee) dramatically reduces the
  friction of adoption.

examples:
  - context: "BOOK: Reality Is Broken - Nike+ running alignment"
    application: >
      Nike+ didn't invent running; it layered a digital tracking system over an
      existing physical habit. The app's triggers (audio feedback) happened
      concurrently with the physical rhythm of the run.
    effect: >
      The digital tool became inseparable from the physical routine.

  - context: "CCP: The Sunday Postcard"
    application: >
      The comprehensive weekly readout (benchmark deltas, voice DNA updates, and
      identity commentary) is NEVER sent on a Wednesday. It is sent exclusively
      on Sunday morning, accompanied by a prompt for a long-form reflective voice note.
    effect: >
      The system leverages the natural "Sunday planning/reflection" mindset of a coach,
      ensuring high completion rates for deep-work tasks.

  - context: "CCP: Law28 Morning Commute Drill"
    application: >
      The daily constraint drill is pushed at 7:30 AM local time, explicitly framed
      for the commute or morning coffee: 'You have 2 minutes before the world starts
      demanding things. Nail this baseline.'
    effect: >
      The action piggybacks onto an existing morning routine.

  - context: "CCP: Friday Afternoon Victory Lap"
    application: >
      At 4:00 PM on Friday, the system prompts the coach to select their best reaction
      from the week to compile into a CMF highlight reel.
    effect: >
      Aligns with the natural end-of-week wind-down and desire for accomplishment validation.

  - context: "CCP: Pre-Webinar State Pump"
    application: >
      The system knows the coach has a V2WS webinar at 2:00 PM. At 1:45 PM, it sends
      a rapid-fire articulation drill: 'Warm up the vocal cords. 60 seconds. Go.'
    effect: >
      The trigger serves as highly useful functional prep exactly when needed.

anti_examples:
  - description: >
      Sending the deep, reflective weekly review on a Monday morning at 9:00 AM.
    why_it_fails: >
      Monday morning is peak execution context. The user will swipe away the notification
      and never return to it because the context clashes violently with the requested action.

