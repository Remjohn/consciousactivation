summary: >
  Hidden Asset Mining is the systematic extraction of acquisition value from operational 
  byproducts. It treats events like interviews, roleplay sessions, and challenge wins 
  not as ephemeral activities, but as permanent, reusable raw material that can be 
  transformed into multi-format proof and referral leverage.

core_move: >
  Convert operational byproducts (e.g., interview footage, benchmark data, coaching 
  transcripts) into primary acquisition and trust-transfer tools.

why_it_works: >
  Abraham teaches that most businesses leave massive leverage on the table because they 
  only see assets in their final, intended form. By identifying the 'hidden' value in 
  the byproducts of normal operations, a system can generate trust-building proof 
  without requiring additional dedicated production effort. In CCP, this means an 
  interview is not just a conversation; it is the raw ore for reels, carousels, and 
  case studies that drive the referral engine.

examples:
  - context: "BOOK: 21 Power Principles - Asset Utilization and Leverage"
    application: >
      Abraham teaches that businesses leave massive leverage on the table by only seeing assets in their final, intended form. Hidden Asset Mining extracts value from operational byproducts.
    effect: >
      Generates trust-building proof (e.g., case studies from roleplays) without requiring dedicated production effort, vastly increasing operational leverage.

  - context: "CCP: CMF - Interview Repurposing Pipeline"
    application: >
      A partner conducts a 45-minute interview with a guest. The CMF engine automatically extracts three short clips, a text carousel, and a quote card.
    effect: >
      A single interaction yields multiple trust-transfer artifacts, multiplying the surface area for referrals.

  - context: "CCP: CBCS - The Anonymized Case Study"
    application: >
      When a coach achieves a significant improvement in their speaking benchmark, the system packages the progression data into an anonymized case study.
    effect: >
      The byproduct of coaching becomes a high-trust proof object used in the 7-day challenge to demonstrate empirical results.

  - context: "CCP: Conscious Reactions - B-Roll Extraction"
    application: >
      Footage of a coach actively using the Reactions tool to diagnose a client's video is captured and turned into a dynamic B-roll asset for a V2WS webinar.
    effect: >
      The operational act of coaching becomes the marketing material, proving the platform's utility visually.

  - context: "CCP: CCF - The 'Failed' Take"
    application: >
      A guest struggles during a roleplay and has a massive breakthrough. The system specifically flags the 'failure and recovery' sequence as the highest-value asset.
    effect: >
      Authentic vulnerability builds far more trust than polished perfection when shared with the partner's audience.

