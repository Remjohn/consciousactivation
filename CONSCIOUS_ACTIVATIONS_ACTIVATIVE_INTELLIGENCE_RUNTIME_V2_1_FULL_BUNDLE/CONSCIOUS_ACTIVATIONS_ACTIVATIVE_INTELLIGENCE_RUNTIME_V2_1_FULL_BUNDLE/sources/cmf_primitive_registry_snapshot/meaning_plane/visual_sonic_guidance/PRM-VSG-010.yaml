summary: >
  Invisible Medium / Imagination leverages the inherent blindness of audio to force the listener to co-create the experience. Because the listener cannot see the subject, their brain automatically constructs the visual imagery. In CCP, this primitive validates the power of voice-note broadcasting and audio-only interventions, proving that the lack of video is not a deficit, but a powerful mechanism for generating intense, internalized imagery.

core_move: >
  Use purely sonic cues to trigger the listener's internal visual imagination, making them an active participant in the narrative.

why_it_works: >
  The authors of The Radio Drama Handbook explain that radio is an 'invisible medium' that operates as the 'theatre of the mind'. When visual information is withheld, the brain must actively synthesize the scene based on auditory cues (anamnesis). This active synthesis means the imagery generated by the listener is often more vivid, personal, and emotionally resonant than any video could provide. The listener is not passively watching; they are actively hallucinating the reality, creating a deeper psychological bond with the material.

examples:
  - context: "BOOK: The Radio Drama Handbook - Invisible Medium"
    application: >
      Hand and Traynor explain that radio operates as the 'theatre of the mind'. Withheld visual information forces the brain to actively synthesize the scene based on auditory cues (anamnesis).
    effect: >
      The imagery generated by the listener is often more vivid, personal, and emotionally resonant than any provided video, deepening psychological bonding.

  - context: "CCP: CBCS - High-Value Audio Feedback"
    application: >
      Instead of a Loom video of a spreadsheet, the coach receives a produced voice note describing their bottleneck with evocative metaphors ('spinning wheels in mud') and subtle sound design.
    effect: >
      Bypassing the analytical brain, the audio forces the client to visualize the 'mud' themselves, making the realization feel profound and self-generated.

  - context: "CCP: CMF - Daily Check-In Sonic Scribe"
    application: >
      The audio track begins with the sound of a heavy door closing and a deep breath before the voice starts, with no accompanying visual.
    effect: >
      The listener instantly constructs a mental image of a private, intimate space, primed to receive confidential information simply through two sound effects.

  - context: "CCP: Conscious Reactions - Guided Visualization"
    application: >
      The agent instructs the coach to close their eyes and listen to a spatialized audio track that simulates walking onto a large stage before delivering a keynote.
    effect: >
      The coach experiences somatic rehearsal without the distraction of staring at a screen.

  - context: "CCP: CCF - Discovery Hook Audio"
    application: >
      The first interaction is a pure audio player on a stark black page. The audio contains the sound of a coffee cup being set down before a conversational voice begins.
    effect: >
      The prospect's imagination paints the coach sitting across from them at a cafe, establishing intense parasocial intimacy immediately.

