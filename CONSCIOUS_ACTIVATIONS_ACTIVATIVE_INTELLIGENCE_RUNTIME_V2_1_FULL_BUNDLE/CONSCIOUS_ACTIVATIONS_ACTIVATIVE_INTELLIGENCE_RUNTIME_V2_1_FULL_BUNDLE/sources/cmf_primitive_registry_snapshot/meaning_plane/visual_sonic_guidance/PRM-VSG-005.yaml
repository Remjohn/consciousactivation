trigger_conditions:
  - "UI rendering engine detects >3 competing visual elements on screen"
  - "Message payload contains a single critical failure metric requiring immediate attention"
  - "Thumbnail generation requires focal dominance on the primary subject"

suppression_conditions:
  - "Asset is an ambient background texture"
  - "Target surface is purely audio"

misuse_modes:
