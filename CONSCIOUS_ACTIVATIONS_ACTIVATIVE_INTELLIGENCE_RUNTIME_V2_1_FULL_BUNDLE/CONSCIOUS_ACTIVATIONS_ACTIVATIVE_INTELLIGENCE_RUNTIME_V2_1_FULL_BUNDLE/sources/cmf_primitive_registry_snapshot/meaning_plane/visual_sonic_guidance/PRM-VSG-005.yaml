book_reference:
  title: "The Photographer's Guide to Posing"
  author: "Lindsay Adler"
  chapters:
    - "Introduction: Posing with Confidence"
    - "Posing and How Your Camera Sees"
  key_pages: "15-20"
  book_path: "lab/Public Speeaking Coaching/07_Photography_and_Composition/The photographers guide to posing - Lindsay Adler.md"

summary: >
  Visual Emphasis Must Be Intentional dictates that the creator must force a dominant target within the frame so the viewer knows exactly what to notice. Drawing from posing mechanics, where uncontrolled limbs or poor perspective distract from the face, this primitive requires actively suppressing secondary elements to elevate the primary message. In CCP, this prevents visual confusion in UI layouts and media artifacts.

core_move: >
  Artificially emphasize the primary subject or message while deliberately suppressing competing visual elements.

why_it_works: >
  Adler highlights the dangers of foreshortening and poor limb placement, where hands or arms unintentionally dominate the frame because they are closer to the lens. Human visual processing naturally gravitates to the largest, brightest, or highest-contrast element. If this element is not the intended subject, the image fails. By intentionally engineering focal dominance (using narrowing points or perspective control), the creator guarantees the viewer's attention lands on the thesis of the artifact.

examples:
  - context: "BOOK: The Photographer's Guide to Posing - Intentional Emphasis"
    application: >
      Adler demonstrates how poor perspective or foreshortening allows secondary elements (like a hand closer to the lens) to accidentally dominate the frame. The creator must artificially force focal dominance.
    effect: >
      Guarantees the viewer's attention lands on the thesis of the artifact by suppressing visual competition.

  - context: "CCP: CMF - Video Focus Engineering"
    application: >
      The video uses a shallow depth of field (f/1.8) to blur a complex background entirely, leaving only the coach's eyes in sharp focus.
    effect: >
      Visual competition is eliminated. The viewer is forced to lock onto the coach's expression, intensifying the emotional hit.

  - context: "CCP: CBCS - Topic-Brief Scorecard"
    application: >
      Secondary metrics are rendered in 10pt muted gray, while the single failing metric is oversized at 32pt bold red.
    effect: >
      The coach cannot accidentally focus on the wrong data point; the design dictates the hierarchy.

  - context: "CCP: Conscious Reactions - Video Markup"
    application: >
      When the agent highlights a gesture, the rest of the video frame dims by 60%, leaving a bright spotlight only on the coach's hands.
    effect: >
      The visual emphasis isolates the exact behavior being critiqued without confusing the user.

  - context: "CCP: CCF - App Navigation"
    application: >
      During onboarding, all UI elements except the primary 'Record First Voice Note' button are disabled and de-saturated.
    effect: >
      The user path is engineered through absolute visual suppression of alternatives.

