summary: >
  Sensory Scene Anchoring is the execution layer of the Theatre of the
  Mind primitive. While PRM-VOC-007 establishes the principle that
  listeners should visualize rather than just receive, this primitive
  provides the technique: inject specific, vivid sensory cues — sounds,
  textures, spatial positions, body sensations — into spoken content to
  trigger the listener's constructive imagery. Quicke emphasizes that
  audio production is not limited to voice; the discoverer must learn
  to "use sound" as a compositional element. In CCP, this means every
  voice note should contain at least one sensory anchor that grounds
  the coaching insight in the coach's physical reality.

core_move: >
  Use vivid sensory cues to build the theater of the mind for the
  listener.

why_it_works: >
  Quicke's discoverer-stage pedagogy teaches audio producers to record
  and use environmental sound — not as background noise, but as narrative
  material. The mechanism is sensory grounding: abstract concepts
  ("confidence," "consistency," "authenticity") have no sensory
  representation. They exist as labels in working memory but do not
  activate the embodied simulation networks that produce felt experience.
  When a voice note replaces "build confidence" with "notice the
  steadiness in your voice when you say the price out loud — no upward
  inflection, no apologetic softening," the listener's auditory cortex
  simulates the described sound, and the motor cortex activates the
  described vocal gesture. The coaching insight moves from concept to
  felt experience. Beaman reinforces this from the interviewing side:
  location interviews use "background or ambient noise to add atmosphere
  and a sense of place to the interview — you are bringing the sounds
  of the outdoors to the listener."

examples:
  - context: "BOOK: Finding Your Voice - Sensory Scene Anchoring"
    application: >
      Quicke teaches producers to use environmental sound and sensory detail as narrative material, not just background noise. Abstract concepts do not activate embodied simulation networks.
    effect: >
      Specific sensory cues trigger constructive imagery, moving content from concept to felt experience.

  - context: "CCP: CMF - Discovery Call Prep"
    application: >
      Instead of saying "practice your opening," the script says: "Stand up. Feel your feet on the floor. Hear how your voice sounds in the empty room. That's the voice your client will hear."
    effect: >
      The coach rehearses through proprioceptive and auditory anchors, simulating the event.

  - context: "CCP: CBCS - Post-Recording Debrief"
    application: >
      The agent references visual and temporal anchors: "Remember the moment you hit the red button? The light came on, and for a second everything was quiet."
    effect: >
      The coaching reframe lands in a re-experienced, sensory-rich context.

  - context: "CCP: Conscious Reactions - Tonal Feedback"
    application: >
      The agent describes physical changes: "At the 12-second mark, you leaned forward—I could hear the mic proximity change. Your voice dropped half an octave."
    effect: >
      The feedback is grounded in audible, specific phenomena rather than vague assessments.

  - context: "CCP: CCF - Hook Generation"
    application: >
      The generated text includes a specific tactile reference (e.g., the friction of typing on a phone screen) to anchor an abstract concept about content creation.
    effect: >
      The audience feels the pain point physically.

anti_examples:
  - description: >
      A voice note delivers coaching as pure abstraction: "Authenticity
      is important in your content. Be more authentic. Show your real
      self. People connect with authenticity."
    why_it_fails: >
      "Authenticity" is repeated four times with zero sensory
      grounding. The listener cannot see, hear, or feel what
      authenticity looks, sounds, or feels like. Without sensory
      anchors, the word remains a label that produces no constructive
      imagery and no embodied simulation. The coaching is
      intellectually received but not experientially processed.

