notes: >
  Sensory Scene Anchoring is the tactical complement to PRM-VOC-007
  (Theatre of the Mind). Where 007 establishes the principle, 009
  provides the specific technique: at least one sensory cue per coaching
  beat. The rule of thumb for CCP voice notes: if the coaching insight
  could be delivered as a bullet point in a text message and nothing
  would be lost, it needs sensory anchoring. If the listener cannot
  see, hear, or feel the insight, the voice channel is being wasted.
