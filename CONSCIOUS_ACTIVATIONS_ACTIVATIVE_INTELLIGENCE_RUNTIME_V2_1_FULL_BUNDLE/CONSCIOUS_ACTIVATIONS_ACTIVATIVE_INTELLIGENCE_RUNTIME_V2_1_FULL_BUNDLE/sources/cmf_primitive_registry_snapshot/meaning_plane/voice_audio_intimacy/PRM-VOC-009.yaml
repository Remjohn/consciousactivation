trigger_conditions:
  - "Payload AST contains abstract or conceptual terminology"
  - "Instructional intent targets somatic or behavioral change"
  - "Source material contains specific episodic memories"

suppression_conditions:
  - "Target is a pure data readout"
  - "Context state indicates high-urgency tactical mode"
  - "Payload AST already contains >2 sensory anchors per minute"

misuse_modes:
  - "Sensory overload — so many anchors that the listener cannot form a coherent image"
  - "Generic sensory cues — 'imagine a beach at sunset' when the coach lives in a winter city"
  - "Manipulative anchoring — using sensory vividness to amplify fear rather than serve growth"

synergizes_with:
  - "PRM-VOC-007"  # The Theatre of the Mind — sensory anchoring IS the execution of theatre-of-the-mind
  - "PRM-VOC-002"  # Audience-of-One Intimacy — personal sensory cues amplify singular address
  - "PRM-HUM-037"  # Hyper-Specificity Anchoring — specific details create stronger sensory images
  - "PRM-VOC-011"  # Microphonic Intimacy — close-mic warmth is itself a sensory anchor

conflicts_with:
  - "PRM-VOC-001"  # Write for the Distracted Ear — rich sensory detail adds load the distracted ear may reject
  - "PRM-VOC-010"  # The Edited Essence — compression removes the descriptive material anchoring needs

