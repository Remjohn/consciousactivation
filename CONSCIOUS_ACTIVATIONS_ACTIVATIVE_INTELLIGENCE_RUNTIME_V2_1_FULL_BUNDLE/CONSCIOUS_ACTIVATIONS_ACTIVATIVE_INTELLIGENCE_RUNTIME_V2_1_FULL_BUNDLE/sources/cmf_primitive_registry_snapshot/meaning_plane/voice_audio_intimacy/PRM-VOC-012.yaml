notes: >
  The Silent Facilitator is the most counter-intuitive primitive in the
  VOC family. Every other primitive instructs the agent to produce better
  output. This one instructs the agent to produce less. The CCP agentic
  coach's highest-value move is often a single, precise question followed
  by silence. Beaman's four-category framework should guide which type
  of silence to deploy: in information-gathering contexts, silence
  prompts elaboration; in emotional contexts, silence permits disclosure;
  in accountability contexts, silence forces self-assessment. The
  primitive has the highest authenticated_capture workflow fit (0.9)
  because listening IS capture.
