trigger_conditions:
  - "Coach input audio detects high emotional valence or frustration"
  - "Transcript analysis identifies narrative gap or aborted disclosure"
  - "Coach lifecycle state = Early Trust Formation"

suppression_conditions:
  - "Coach input explicitly requested direct tactical advice"
  - "Context state indicates time-critical emergency"
  - "Coach metrics indicate high self-awareness state requiring validation instead"

misuse_modes:
  - "Passive silence — refusing to intervene even when the coach is lost and needs direction"
  - "Therapeutic mimicry — using reflective questions to avoid the work of actual coaching"
  - "Question as judgment — asking 'Why did you do that?' when the tone implies disapproval"

