summary: >
  Misplaced Focus is the humor primitive in which the writer deliberately
  focuses on something trivial or tangential while a massive, obvious truth
  (the Elephant in the Room) goes conspicuously unaddressed. Dikkers describes
  it as "a pretend lack of awareness of an obvious fact, brought to light
  by focusing on the wrong thing" (line 3015). The audience, infuriated by
  the writer's seeming obliviousness, is compelled to notice the real issue
  themselves. In CCP, this is the CVE's most powerful visual production
  primitive — generating compositions where the visual focal point is
  deliberately absurd or irrelevant while the text addresses a profound
  emotional truth, forcing the audience's pattern-matching faculties into
  overdrive.

core_move: >
  Focus all attention, enthusiasm, and analytical energy on something
  trivially related to the Subtext — while conspicuously ignoring the
  massive, obvious truth that the audience cannot help but notice.

why_it_works: >
  Dikkers states that Misplaced Focus works by inflaming "righteous
  indignation" — the audience fumes because "something horrible is wrong
  with the world and you are not only not doing anything about it, not
  only ignoring it, you don't even notice it!" (lines 2964-2965). The
  mechanism is cognitive auto-correction: when the writer focuses on the
  wrong thing, the audience's brain automatically redirects attention to
  the RIGHT thing. This forced redirection IS the Subtext discovery,
  producing both the laugh and the insight.

examples:
  - context: "BOOK: The Elements of Humor - The Elephant in the Room"
    application: >
      Dikkers defines Misplaced Focus as a pretend lack of awareness of an obvious fact, brought to light by focusing intensely on the wrong thing.
    effect: >
      The audience's brain auto-corrects the misdirection. This forced cognitive redirection IS the Subtext discovery, producing both the laugh and the insight.

  - context: "CCP: CVE - The Surreal Visual Prompt"
    application: >
      The CVE generates a visual where the focal point is absurdly trivial, while a massive truth is visually unaddressed. (e.g., A man in medieval armor trying to use an ATM).
    effect: >
      The cognitive dissonance arrests scrolling. The audience's brain works to resolve the visual anomaly, discovering the coaching insight through the resolution.

  - context: "CCP: CMF - The Oblivious Hook"
    application: >
      The hook explicitly focuses on a mundane detail while ignoring the obvious catastrophic reality. (e.g., Organizing crayons by color while ignoring the child's emotional needs).
    effect: >
      The audience recognizes the absurdity of the prioritization and immediately maps it to their own avoidance behaviors.

  - context: "CCP: CBCS - The Trivial Distraction Reframe"
    application: >
      When a client obsesses over a minor detail to avoid a major fear, the agent joins them in over-analyzing the detail until the client themselves points out the elephant in the room.
    effect: >
      The client discovers their own avoidance strategy without the coach having to point it out clinically.

  - context: "CCP: V2WS - The 'Wrong Problem' Diagnosis"
    application: >
      The webinar presenter spends 3 minutes passionately solving a trivial problem, only to stop and reveal that this is exactly what the audience is doing with their business strategy.
    effect: >
      The audience experiences the frustration of misplaced focus firsthand, making the subsequent diagnosis undeniable.

anti_examples:
  - description: >
      A CMF hook reads: 'I was so focused on organizing my crayons
      that I completely missed spending time with my daughter — and
      that's what perfectionism does to us.'
    why_it_fails: >
      This states the Subtext. The writer is no longer oblivious — they
      are explicitly pointing out the moral. Dikkers mandates that
      Misplaced Focus works through the writer's PRETEND lack of
      awareness (line 2949). Once awareness is declared, the humor and
      the discovery mechanism collapse.

