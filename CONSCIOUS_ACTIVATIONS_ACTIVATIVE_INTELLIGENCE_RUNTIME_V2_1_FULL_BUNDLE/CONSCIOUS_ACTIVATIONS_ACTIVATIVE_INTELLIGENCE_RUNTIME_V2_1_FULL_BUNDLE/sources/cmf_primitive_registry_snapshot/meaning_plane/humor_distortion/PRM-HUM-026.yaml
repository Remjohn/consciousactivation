notes: >
  The audit scores this primitive highest in Architectural Versatility
  (AV: 45/50) specifically because of its alignment with the CVE visual
  engine. Float note: surface_fit.visual is ceiling (0.9) because visual
  Misplaced Focus is the most powerful application — the audience's eye
  is forced to the wrong focal point, triggering pattern-matching. 
  goal_bias.clarity is deliberately low (0.3) because the primitive 
  works by obscuring the obvious, not by clarifying it.
