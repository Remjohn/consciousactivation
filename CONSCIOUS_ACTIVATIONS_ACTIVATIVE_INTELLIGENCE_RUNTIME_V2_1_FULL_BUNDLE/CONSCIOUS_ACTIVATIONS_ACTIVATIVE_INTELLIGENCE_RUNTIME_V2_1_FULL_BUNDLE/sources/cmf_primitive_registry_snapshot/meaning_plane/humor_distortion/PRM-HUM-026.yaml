trigger_conditions:
  - "CVE visual prompt generation detects 'Conceptual Friction' requirement; must deploy absurd focal point to force visual pattern-matching"
  - "Context Premise involves an 'Elephant in the Room' audience behavior; hook generation must utilize pretend obliviousness"
  - "AST analysis indicates client is engaging in avoidance loops; CBCS must deploy trivial distraction to force self-correction"

suppression_conditions:
  - "Content demands explicit, unambiguous technical clarity where visual or narrative misdirection introduces genuine operational risk"
  - "Client is in an acute emotional distress state where performative obliviousness will register as sociopathic rather than comedic"

misuse_modes:
  - "Genuine confusion — the writer actually focuses on the wrong thing by accident rather than design, producing incoherent content"
  - "Subtext leakage — the writer breaks character mid-misdirection and points out what they're really saying"
  - "Over-application — every piece of content uses Misplaced Focus, making the pattern predictable and exhausting"

synergizes_with:
  - "PRM-HUM-002"  # Irreducible Truth — the Elephant in the Room IS the Subtext; the misplaced focus is the concealment
  - "PRM-HUM-021"  # Irony Inversion — Misplaced Focus can operate alongside Irony when the writer is ironically enthusiastic about the wrong thing
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — the gap between what's focused on and what's ignored must be as extreme as possible

conflicts_with:
  - "PRM-HUM-025"  # Analogy Bridge — Analogy draws attention TO the parallel; Misplaced Focus draws attention AWAY from the main point

