notes: >
  This is arguably the most commercially critical primitive in the HUM
  family — it directly governs whether the CCP produces 'expert content'
  (commoditized) or 'human content' (irreplaceable). Its MCDA (161)
  reflects the lowest Execution Safety in the Rosenfield batch (35/50) —
  the Semantic Affinity Guard must learn the precise vulnerability threshold
  for each coach-client pairing. Float note: goal_bias.connection and
  persuasion are both near-ceiling (0.9, 0.8) because vulnerability IS
  the mechanism for both bonding and conversion. surface_fit.voice and
  telegram are highest (0.9) because these intimate, direct-communication
  surfaces are where vulnerability has the deepest impact.
