trigger_conditions:
  - "AST analysis detects >70% of coach's output is positioned as authority/mastery without active vulnerability; system must rebalance the ratio"
  - "Guardian Agent detects missing `active_struggle_register` in `coach_soul.json`; extraction interview required"
  - "CPSC is assembling a commercial invitation; system must enforce the Struggle Principle as a structural alternative to authority positioning"

suppression_conditions:
  - "Coach is experiencing genuine, acute personal crisis; system must not instrumentalize active trauma for content"
  - "Target audience is in a high trust-deficit state where vulnerability would be weaponized against the coach"

misuse_modes:
  - "Performative vulnerability — the coach adopts the aesthetic of struggle without any genuine struggle behind it, producing content that reads as manipulative"
  - "Vulnerability dumping — sharing unprocessed, unstructured emotional material without comedic or performative framing, making the audience into an unpaid therapist"
  - "Struggle inflation — exaggerating minor inconveniences into dramatic struggles, breaking the verisimilitude of the vulnerability"

synergizes_with:
  - "PRM-HUM-014"  # Joyous Communication — "I'm so excited to tell you how badly I'm failing at this" is peak vulnerability + joy
  - "PRM-HUM-002"  # Irreducible Truth — the coach's struggle IS a form of Subtext: the unfunny truth wrapped in comedic delivery
  - "PRM-HUM-017"  # Attitude-Emotion Binding — the struggle must be delivered with a named, intense emotion, not neutral confession

conflicts_with:
  - "PRM-HUM-005"  # Absolute Verisimilitude — the struggle must be genuinely real, which can conflict with the precision of format mimicry if the vulnerability breaks the parodic frame

