summary: >
  The Struggle Principle is the deepest structural law of comedic bonding:
  "You in a personal struggle is the golden land of comedy. Nothing is
  funnier." Rosenfield demonstrates that every great comedian is positioned
  not as a winner dispensing wisdom, but as a human wrestling with something
  in this moment. Dangerfield struggled with respect. Louis C.K. struggled
  with parenthood. The audience identifies with struggle because everyone
  is struggling — and when a performer speaks about their struggle, the
  audience realizes they are not alone, and laughs with relief. The critical
  rule: "You causing a struggle for someone else makes you an unlikable
  bully. You in a struggle makes you a likable hero." In CCP, this mandates
  a structural override of the default 'guru on the mountaintop' coaching
  posture, requiring a minimum ratio of vulnerability-positioned content.

core_move: >
  Position the coach as someone actively wrestling with a real, current,
  genuine struggle — never as an invulnerable authority dispensing wisdom
  from a completed journey.

why_it_works: >
  Rosenfield reveals a fundamental law of human bonding: audiences root
  for the vulnerable hero, not the invincible authority. The mechanism is
  identification — the audience sees their own struggle reflected in the
  performer's, creating instant solidarity. This is exponentially more
  powerful than authority-based credibility because it bypasses the
  audience's defenses ("this person doesn't understand my life") and
  activates the deepest bonding circuit ("this person IS living my life").
  The audit warns this is "the most dangerous primitive to ignore inside
  the CCP" because the platform's default posture — expert dispensing
  perfect solutions — is the exact posture that kills comedic connection.

examples:
  - context: "BOOK: Mastering Stand-Up - Solidarity-Based Invitation"
    application: >
      Rosenfield argues that "you in a personal struggle is the golden land of comedy." The performer must position themselves as a human wrestling with something right now, not a winner dispensing wisdom.
    effect: >
      Bypasses audience defenses. The audience identifies with the struggle, creating instant solidarity and neurological relief.

  - context: "CCP: CCF - The Anti-Guru Opening"
    application: >
      Instead of opening with 'Here is how I built my business,' the coach opens with: 'I spent Tuesday staring at a spreadsheet proving I'm losing money on my best offer. Here's what I'm doing about it.'
    effect: >
      Audience defenses collapse. They stop comparing themselves to an unreachable authority and bond with a fellow human fighting the same fight.

  - context: "CCP: CPSC - The Solidarity Pitch"
    application: >
      The commercial invitation is stripped of authority positioning and reframed: 'I built this program for the exact battle I am currently waging, and I want to hand you the weapon I made.'
    effect: >
      Conversion increases because the prospect feels they are joining a comrade rather than hiring an expert.

  - context: "CCP: CBCS - The 'Me Too' Reframe"
    application: >
      When a client expresses deep shame over a failure, the CBCS prompts the coach to share a recent, equivalent failure of their own before offering any strategic advice.
    effect: >
      The client's shame is neutralized through shared vulnerability, making them receptive to the subsequent coaching.

  - context: "CCP: V2WS - The Mid-Webinar Confession"
    application: >
      The script requires the coach to break the 'expert' frame mid-presentation and confess a current operational struggle they haven't solved yet.
    effect: >
      Resets audience attention by introducing genuine stakes. It proves the coach is actively in the arena, enhancing the credibility of the solutions they *have* figured out.

anti_examples:
  - description: >
      A coach's content consistently presents them as having solved
      every problem in their niche: 'I used to struggle with X, but
      then I figured it out. Here's how.'
    why_it_fails: >
      The 'past-tense struggle' is the minimum viable vulnerability —
      it technically acknowledges difficulty but positions the coach
      as having transcended it. The audience hears 'I'm done struggling;
      you haven't figured it out yet.' Rosenfield demands CURRENT,
      ACTIVE struggle — the coach must be IN IT, not above it.

  - description: >
      A coach reveals a deeply personal mental health crisis in a
      carousel, describing active suicidal ideation as a way to
      'connect with their audience.'
    why_it_fails: >
      The Struggle Principle requires the performer to maintain the
      FORM of control — the audience must feel safe. Revealing active
      crisis without the comedic or performative buffer that signals
      mastery converts vulnerability from a bonding mechanism into an
      alarm. The audit flags this as the lowest Execution Safety score
      in the Rosenfield batch (35/50), requiring a Semantic Affinity
      Guard to prevent over-exposure.

