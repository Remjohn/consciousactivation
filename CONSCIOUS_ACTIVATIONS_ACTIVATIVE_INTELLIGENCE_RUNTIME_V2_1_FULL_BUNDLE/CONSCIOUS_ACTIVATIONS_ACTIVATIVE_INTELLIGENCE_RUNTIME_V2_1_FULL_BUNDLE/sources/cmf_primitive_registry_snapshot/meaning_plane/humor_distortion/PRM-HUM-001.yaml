trigger_conditions:
  - "System is initializing a multi-agent generation swarm for any humor or content creation task"
  - "AST analysis detects the user repeatedly deleting and rewriting text during a single session (Editor-interference)"
  - "Telemetry indicates pipeline output quality has plateaued, yielding high-volume but generic, 'safe' results"

suppression_conditions:
  - "System is executing a purely editorial task — the Clown phase has already been completed"
  - "Content is being adapted from pre-existing authenticated capture where raw material already exists"

misuse_modes:
  - "Clown-only pipeline — generating massive volume without ever applying the Editor pass, flooding the coach with unfiltered low-quality options"
  - "Editor-as-Clown — asking the evaluation agent to also generate alternatives, collapsing the separation"
  - "Phase leakage — inserting quality criteria ('make it good') into the generation prompt, producing self-censored output"

synergizes_with:
  - "PRM-HUM-007"  # Production Over-Saturation — the Clown phase IS the Over-Saturation mechanism
  - "PRM-HUM-002"  # Irreducible Truth — the Editor validates Subtext quality during the pruning phase
  - "PRM-HUM-003"  # Filter Constraints — the Editor uses Filters as evaluation rubric during the pruning phase

conflicts_with:
  - "PRM-HUM-005"  # Absolute Verisimilitude — verisimilitude requires precision that the Clown phase deliberately ignores; the conflict is temporal (Clown first, then Verisimilitude during Editor phase)

