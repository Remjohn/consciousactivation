notes: >
  This primitive is architectural rather than creative — it governs HOW
  humor is produced, not WHAT humor is produced. Its MCDA (178) reflects
  the audit's recognition that it maps perfectly to the LLM Generator/Critic
  architecture. Float note: goal_bias values are deliberately low across
  most dimensions because this primitive does not directly produce audience-
  facing effects — it structures the production process. goal_bias.surprise
  is the highest (0.7) because phase-separation is specifically designed to
  surface unexpected material the self-censoring model would suppress.
  ccp_workflow_fit.content_generation is ceiling (0.9) because the primitive
  IS the generation methodology.
