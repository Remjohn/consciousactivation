trigger_conditions:
  - "System is generating short-form content requiring the rapid establishment of non-coach characters"
  - "Agent commands the CVE to generate slide graphics where visual complexity must be minimized"
  - "AST analysis flags a draft for introducing unnecessary emotional nuance to a comedic foil"

suppression_conditions:
  - "Content goal is deep emotional impact that requires the audience to see a character as a real, 3D person"
  - "Coach is telling their own vulnerability story — self-compression into 2D strips authenticity from their identity"

misuse_modes:
  - "Self-flattening — the coach compresses their OWN persona into 2D, losing the rich Voice DNA that differentiates them"
  - "Audience contempt — 2D client representations that make real clients feel mocked rather than seen through comedic shorthand"
  - "Genre confusion — mixing 2D comic characters with 3D dramatic characters in the same piece, breaking Dikkers' genre-contract rule"

