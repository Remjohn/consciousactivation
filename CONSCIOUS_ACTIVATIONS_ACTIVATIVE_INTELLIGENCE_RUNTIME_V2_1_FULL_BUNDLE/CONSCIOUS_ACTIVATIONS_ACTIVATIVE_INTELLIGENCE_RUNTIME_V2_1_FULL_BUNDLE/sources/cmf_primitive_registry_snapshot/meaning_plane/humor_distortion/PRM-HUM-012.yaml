notes: >
  This primitive is classified as 'accent' rather than 'supporting' because
  it describes a compression strategy rather than a generative one. It
  removes complexity rather than adding value. Its MCDA (135) reflects
  limited standalone utility — it mostly amplifies the efficiency of
  other HUM primitives. Float note: goal_bias.tension is the floor (0.1)
  because 2D characters cannot sustain tension — they resolve instantly.
  goal_bias.clarity is the ceiling (0.9) because instant readability IS the
  mechanism. PRM-PSY-001 conflict flagged — ID exists in registry.
