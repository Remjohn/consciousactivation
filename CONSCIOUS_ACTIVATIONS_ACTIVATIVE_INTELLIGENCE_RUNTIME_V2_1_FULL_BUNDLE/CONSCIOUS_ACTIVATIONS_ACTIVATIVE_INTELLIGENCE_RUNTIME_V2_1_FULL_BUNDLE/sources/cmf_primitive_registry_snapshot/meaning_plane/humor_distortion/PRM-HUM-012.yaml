summary: >
  Two-Dimensional Representation Strategy is the deliberate compression of a
  comedic persona into a narrow representational function — a symbol of a
  human failing, aspiration, or behavior — rather than a realistic, fully
  fleshed-out person. Dikkers draws a hard line between comedic and dramatic
  characters: dramatic characters are complex, nuanced, three-dimensional
  beings the audience accepts as real; comedic characters are "life through a
  funhouse mirror" — two-dimensional representations that need only 2-3
  traits to function. In CCP, this primitive governs how non-coach characters
  (clients, antagonists, industry figures) are rendered in content — they
  should be compressed into representational functions, not described with
  backstory and psychological depth that bogs down the comedy.

core_move: >
  Compress any comic persona into a narrow representational function —
  2-3 traits maximum — instead of building full three-dimensional
  character profiles.

why_it_works: >
  Dikkers explains that "comedy characters are two-dimensional — they're not
  meant to be realistic or believable people. They're meant to merely
  represent a human failing, or an aspiration, or a behavior." The audience
  does not need to "get to know" a comedy character the way they would a
  real person. The brain processes 2D characters faster, freeing cognitive
  bandwidth for the comedic payload. Critically, Dikkers warns in Chapter 9
  that putting a dramatic character into a comedy world breaks both genres:
  "If you take Meryl Streep from Sophie's Choice and try to place her in any
  kind of comedy movie, the worlds would collide and they would both fall
  apart." The mechanism is genre-contract clarity — 2D characters signal
  to the audience that they are in a comedy world.

examples:
  - context: "BOOK: How to Write Funny Characters - Funhouse Mirror Compression"
    application: >
      Dikkers insists comedic characters are two-dimensional—they represent a human failing or aspiration. They need only 2-3 traits. Dramatic, 3D characters placed in comedy break the genre.
    effect: >
      The audience processes 2D characters faster, freeing cognitive bandwidth for the comedic payload.

  - context: "CCP: CVE Visual Engine - Client Personas"
    application: >
      The agent renders client personas as simple 2D visual representations—the Overachiever (spreadsheet, raised hand), the Procrastinator (pajamas, Netflix)—using 2-3 visual trait markers maximum.
    effect: >
      Visual comprehension is instant (under 2 seconds). The coach's verbal delivery carries the truth without competing with complex character explanation.

  - context: "CCP: CMF - 'Before State' Compression"
    application: >
      Instead of detailing a client's emotional history, the agent compresses the before-state into a single representational sentence: 'She bought 14 courses and completed zero.'
    effect: >
      The audience instantly recognizes the type. The 2D compression creates shareability because people tag friends who fit the description.

  - context: "CCP: V2WS - The Strawman Argument"
    application: >
      The webinar presents the 'Industry Standard' as a 2D caricature (e.g., a stick figure throwing money into a furnace) rather than offering a nuanced critique of competitors.
    effect: >
      The abstraction keeps the tone light and prevents the coach from sounding bitter or defensive.

  - context: "CCP: CBCS - De-escalation Filtering"
    application: >
      When a coach is venting about a difficult client, the agent asks them to compress the client into a 2D comedy character ('If they were a cartoon villain, what is their one ridiculous flaw?').
    effect: >
      Forces the coach to step out of emotional reactivity (3D reality) into objective, abstract assessment (2D representation).

anti_examples:
  - description: >
      A CMF agent writes a 3-paragraph backstory for a hypothetical
      client character in a coaching short — describing their childhood,
      their career trajectory, and their emotional state — before getting
      to the coaching point.
    why_it_fails: >
      Dikkers states that "too much character description" is mistake #7
      (Ch 8) — "seasoned readers are skipping over all that description.
      They know that it's action that makes a character, not description."
      In comedy, backstory is wasted bandwidth. The audience needs to
      identify the character's traits in a single moment, not absorb
      their life story.

