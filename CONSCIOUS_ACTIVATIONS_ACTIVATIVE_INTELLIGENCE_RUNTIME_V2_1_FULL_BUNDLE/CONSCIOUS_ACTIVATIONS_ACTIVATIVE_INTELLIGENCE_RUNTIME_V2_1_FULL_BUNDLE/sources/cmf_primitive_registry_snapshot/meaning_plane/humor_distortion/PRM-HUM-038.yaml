summary: >
  Expectation Reversal is Holloway's structural rule that the setup must
  create a rigid assumption in the listener's mind, and the punchline must
  shatter that assumption with a surprising but entirely logical alternative.
  Holloway's Fundamental Truth #1 states: "You cannot subvert an expectation
  unless you have clearly, definitively established one first." This means
  the CCP must spend adequate tokens articulating the INCORRECT assumption
  before delivering the reversal. In coaching contexts, this is the ultimate
  cognitive reframing tool: establish the industry's standard belief (the
  assumption), then pivot to the CCP First-Principle truth (the disruption).

core_move: >
  Clearly and definitively establish a rigid assumption in the audience's
  mind, then shatter it with a surprising alternative that is logically
  sound but emotionally unexpected.

why_it_works: >
  Holloway demonstrates that surprise is impossible without a clear prior
  expectation. The mechanism is prediction-error comedy: the brain builds
  a prediction model from the setup, invests cognitive resources in that
  model, and when the reversal invalidates the model, the wasted prediction
  energy is released as laughter. The deeper the audience's investment in
  the assumption (the more clearly it was established), the greater the
  prediction error, and the bigger the laugh. For coaching, this same
  mechanism produces paradigm shifts — the client's old belief (clearly
  articulated) is revealed as insufficient by the new truth (the reversal).

examples:
  - context: "BOOK: The Serious Guide to Joke Writing - The Pivot"
    application: >
      Holloway mandates that you cannot subvert an expectation unless you clearly establish one first. The setup must articulate a rigid, incorrect assumption before shattering it.
    effect: >
      The brain builds a prediction model, invests energy in it, and releases that energy as laughter/insight when the reversal invalidates the model.

  - context: "CCP: V2WS - The Paradigm Shift Transition"
    application: >
      The webinar spends 5 minutes validating a common industry belief before delivering the reversal that shatters it.
    effect: >
      The reversal lands with maximum force because the audience's assumption was carefully built. The resulting prediction error creates a lasting paradigm shift.

  - context: "CCP: CMF - The Assumption Hook"
    application: >
      The hook explicitly states a widely held belief and lets it sit for a beat before delivering the pivot.
    effect: >
      Reframes the problem from the audience's default view to the coach's First-Principle view, demonstrating immediate authority.

  - context: "CCP: CBCS - The Objection Reversal"
    application: >
      When a client raises an objection, the agent validates the logic of the objection completely before pivoting to show why that logic applies to the wrong problem.
    effect: >
      Bypasses defensiveness because the client feels heard before their logic is dismantled.

  - context: "CCP: CCF - The Myth-Busting Module"
    application: >
      Course modules are structured as 'What you think is true' vs 'What is actually true', using the pivot as the primary pedagogical tool.
    effect: >
      Accelerates unlearning of bad habits before installing new frameworks.

anti_examples:
  - description: >
      The reversal arrives without adequate setup: 'Stop building
      funnels. Just talk to people.' The assumption was never
      established — the audience doesn't know what belief is being
      shattered.
    why_it_fails: >
      Holloway's Truth #1: "You cannot subvert an expectation unless
      you have clearly established one first." Without the setup phase,
      the reversal reads as an opinion rather than a paradigm shift.
      The prediction error is zero because no prediction was built.

  - description: >
      The reversal is logically inconsistent: 'The number one reason
      your business isn't growing is lack of leads. The truth is,
      you need more leads but from different sources.'
    why_it_fails: >
      This is not a reversal — it is a modification of the original
      assumption. The audience's prediction model is adjusted, not
      shattered. True Expectation Reversal requires the alternative
      to be QUALITATIVELY different, not quantitatively adjusted.

