trigger_conditions:
  - "V2WS script enters the primary paradigm-shift phase; system must allocate sufficient tokens to build the false assumption before the reversal"
  - "CPSC engine encounters a common client objection; CBCS must validate the objection fully before executing the pivot"
  - "CMF is generating educational content; structure must be formatted as 'Common Belief -> Pivot -> First Principle Truth'"

suppression_conditions:
  - "The audience's existing assumption is actually correct; reversing a true statement for comedic effect destroys trust"
  - "Format constraints (e.g., short-form platforms) prevent adequate setup time; the assumption cannot be established properly"

misuse_modes:
  - "Setup-less reversal — delivering the pivot without establishing the assumption, producing an unsupported opinion"
  - "Weak reversal — modifying the assumption rather than shattering it, producing adjustment instead of paradigm shift"
  - "Contrarian for contrarianism's sake — reversing every common belief regardless of whether the reversal is true, eroding credibility"

synergizes_with:
  - "PRM-HUM-021"  # Irony Inversion — Irony can BE the setup: enthusiastically endorsing the wrong assumption before the reversal
  - "PRM-HUM-030"  # Setup-Premise-Payoff — the assumption IS the setup; the reversal IS the payoff; the premise IS why the assumption is wrong
  - "PRM-PRS-001"  # Belief Shifting — Expectation Reversal is the humor-native mechanism for executing a belief shift

conflicts_with:
  - "PRM-HUM-014"  # Joyous Communication — the assumption-building phase sometimes requires serious, even sympathetic tone that may temporarily suppress communicative joy

