notes: >
  The audit flags "slightly higher complexity for an LLM to master without
  sounding like an obvious joke format" (MCDA 160). The risk is that
  the reversal feels formulaic ('you think X... but ACTUALLY Y!'). Float
  note: goal_bias.surprise and persuasion are both near-ceiling (0.9)
  because the reversal IS surprise, and the paradigm shift IS persuasion.
  surface_fit.webinar is ceiling (0.9) because the webinar format provides
  the time needed to build the assumption properly.
