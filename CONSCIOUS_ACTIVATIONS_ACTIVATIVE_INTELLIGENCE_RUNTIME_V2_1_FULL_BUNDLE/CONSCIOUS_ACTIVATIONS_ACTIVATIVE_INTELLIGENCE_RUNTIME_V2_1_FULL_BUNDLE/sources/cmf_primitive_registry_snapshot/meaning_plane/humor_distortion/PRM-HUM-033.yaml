trigger_conditions:
  - "CBCS encounters a client objection or rationalization; agent must deploy Dialogue Joke to reframe rather than using logical rebuttal"
  - "Context Premise graph activates an 'Enemy Interaction' node; CMF must reconstruct the interaction using the fantasy comeback framework"
  - "Content addresses universal frustrations (bureaucracy, unsolicited advice); Dialogue Joke must be used to provide vicarious satisfaction"

suppression_conditions:
  - "Interaction being reconstructed involves genuine trauma, abuse, or legal threat; comedic reconstruction is strictly prohibited"
  - "Audience profile indicates low media literacy; fantasy dialogue may be misinterpreted as a literal recommendation for behavior"

misuse_modes:
  - "Cruelty-as-comedy — the fantasy comeback is genuinely hurtful rather than absurdly witty"
  - "Passive aggression — using the Dialogue Joke to express genuine resentment toward a specific, identifiable person under comedic cover"
  - "Overuse — every piece of content becomes a 'what I SHOULD have said' reconstruction, creating a pattern of performative victimhood"

synergizes_with:
  - "PRM-HUM-029"  # Act-Out — the Dialogue Joke IS a specific type of Act-Out; the performed dialogue shifts from narration to embodiment
  - "PRM-HUM-022"  # Character Mask — the other person in the dialogue IS a Character Mask that the coach temporarily embodies
  - "PRM-HUM-019"  # Struggle Principle — the Dialogue Joke reveals a moment of powerlessness (struggle), then converts it to comedic mastery

conflicts_with:
  - "PRM-HUM-014"  # Joyous Communication — the Dialogue Joke sometimes requires adopting a frustrated or resentful tone that can conflict with the overarching joy mandate

