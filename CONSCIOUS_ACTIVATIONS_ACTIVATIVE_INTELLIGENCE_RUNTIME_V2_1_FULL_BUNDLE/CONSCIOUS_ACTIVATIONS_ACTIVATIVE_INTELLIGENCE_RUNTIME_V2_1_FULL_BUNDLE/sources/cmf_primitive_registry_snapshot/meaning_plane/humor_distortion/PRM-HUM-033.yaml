notes: >
  Lowest MCDA in Batch 5 (158) reflecting the narrowest application scope.
  The audit scores it highest on AT (45/50) because the objection-handling
  framework is a natural fit for agentic mental models. Float note:
  surface_fit.voice is ceiling (0.9) because performed dialogue is
  fundamentally vocal — the two voices in the conversation require tonal
  differentiation that text alone struggles to convey.
