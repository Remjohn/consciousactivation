trigger_conditions:
  - "System detects a single-pass generation architecture for a highly creative task; must upgrade to multi-pass swarm"
  - "Telemetry indicates content quality has plateaued despite correct Subtext and Filter assignment, indicating a need for broader combinatorial sampling"
  - "AST analysis reveals the coach is repeatedly editing a single short text block instead of generating raw volume"

suppression_conditions:
  - "Inference budget is severely constrained and volume generation would exceed cost thresholds"
  - "Content is being adapted from pre-existing authenticated capture — the raw material already exists and does not need generation"

misuse_modes:
  - "Volume-without-Editor — generating 100 variations but presenting all 100 to the coach without pruning, causing decision paralysis"
  - "Centroid clustering — generating high volume without combinatorial diversity (varying Filters, tones, angles), producing 100 versions of the same mediocre output"
  - "Coach overwhelm — prescribing volume exercises to coaches who are already producing but need quality coaching, not quantity mandates"

synergizes_with:
  - "PRM-HUM-001"  # Dual-Processor Engine — Over-Saturation IS the Clown phase at maximum intensity
  - "PRM-HUM-003"  # Filter Constraints — varying Filters across the volume batch ensures combinatorial diversity
  - "PRM-HUM-002"  # Irreducible Truth — the Editor phase uses Subtext quality as the primary pruning criterion

conflicts_with:
  - "PRM-HUM-002"  # Irreducible Truth — in a paradoxical relationship: Over-Saturation without Subtext gating produces high-volume slop, but Over-Saturation WITH Subtext gating produces high-volume quality

