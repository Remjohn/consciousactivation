summary: >
  Production Over-Saturation is the volume-first primitive that mandates
  generating an overwhelming quantity of material — accepting that 90% is
  junk — in order to harvest the 10% gold. Dikkers states that "the best
  comedy writers write dozens and dozens — sometimes hundreds — of jokes,
  and then carefully select only the best ones" (Tip #2). The primitive
  directly exploits the CCP's cheap SLM inference overhead: instead of
  prompting a frontier model to write one perfect hook, the system instructs
  lightweight models to generate 50-100 constrained variations. The
  Epistemic Friction Swarm then acts as Editor, discarding the bottom 90-95%
  and surfacing only the highest-potential outputs for coach review.

core_move: >
  Generate 10-100x more material than needed, then ruthlessly prune
  to the top 5-10% using objective evaluation criteria.

why_it_works: >
  Dikkers explains that "by writing more, you produce a larger pool of
  raw material to draw quality ideas from" and explicitly debunks the myth
  of the genius who "cranks out a perfect piece of writing in one draft"
  (lines 438-445). The mechanism is combinatorial discovery: humor relies
  on unexpected combinations of Subtext, Filter, and phrasing. A single
  generation pass samples one point in the combinatorial space. 100
  generations sample 100 points, dramatically increasing the probability
  of finding a surprising, non-centroid combination. Dikkers warns "don't
  fall in love" with any single output (Tip #12, line 2470) — the volume
  approach prevents ego-attachment to mediocre first drafts.

examples:
  - context: "BOOK: How to Write Funny - Quantity Yields Quality"
    application: >
      Dikkers mandates generating an overwhelming quantity of material, accepting that 90% is junk, to harvest the 10% gold. Comedy relies on unexpected combinations; writing dozens of variations increases the probability of finding the perfect, non-obvious angle.
    effect: >
      Prevents ego-attachment to mediocre first drafts. Combinatorial discovery surfaces edge-case humor that a single-pass generation would miss.

  - context: "CCP: CMF - The Flood-Then-Prune Pipeline"
    application: >
      The CMF deploys an SLM to generate 100 hook variations for a topic, constrained by different Funny Filters. The Critic agent scores all 100 against the MCDA rubric, discarding the bottom 95% and presenting only 5 finalists to the coach.
    effect: >
      The coach chooses from 5 distinct, high-quality options rather than accepting a safe, centrist first draft. Creative confidence increases.

  - context: "CCP: CBCS - The Volume Exercise"
    application: >
      A coach submits one overly-crafted story. The agent prescribes volume: 'Record 10 one-minute voice notes telling this story from different emotional angles. Don't evaluate them.'
    effect: >
      The 7th take—tired and unguarded—contains the most authentic energy. The volume constraint bypasses the coach's internal Editor, producing raw material the careful draft couldn't match.

  - context: "CCP: V2WS - The 'Bad Idea' Brainstorm"
    application: >
      When struggling to find the core webinar premise, the system forces the coach to generate 20 intentionally terrible, offensive, or absurd webinar titles in 5 minutes.
    effect: >
      By deliberately generating 'junk', the pressure of perfection is removed. Often, a 'terrible' idea contains the seed of a brilliant, highly-differentiated Subtext.

  - context: "CCP: CCF - Naming Conventions"
    application: >
      When a coach needs a name for their new framework, the agent refuses to accept the first 5 inputs. It locks the UI until the coach inputs 30 distinct name variations.
    effect: >
      Forces the coach past the obvious, cliché industry standard names (e.g., 'The Profit Accelerator') into weird, memorable, proprietary territory.

anti_examples:
  - description: >
      The CMF generates 100 hook variations using the same SLM but without
      any Filter Constraints — all 100 are unconstrained 'be funny' prompts.
    why_it_fails: >
      Volume without constraint produces 100 variations of the same
      statistical centroid. Over-Saturation requires combinatorial diversity,
      not repetitive sampling. Without varying the Filter assignment across
      batches, the 100 outputs cluster around the model's default humor
      mode, producing quantity without variety.

