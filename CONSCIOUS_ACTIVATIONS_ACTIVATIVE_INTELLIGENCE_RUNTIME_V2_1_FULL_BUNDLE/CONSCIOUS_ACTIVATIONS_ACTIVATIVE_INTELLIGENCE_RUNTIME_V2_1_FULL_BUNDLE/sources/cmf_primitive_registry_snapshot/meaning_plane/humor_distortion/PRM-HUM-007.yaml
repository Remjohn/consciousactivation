notes: >
  This primitive has the highest Algorithmic Determinism score in the audit
  (50/50) — it is trivially automatable via batch-compute. Its MCDA (170)
  reflects ceiling execution safety because the volume-then-prune model
  eliminates risk at the output layer rather than the input layer. Float note:
  goal_bias.surprise is ceiling (0.8) because combinatorial sampling is
  specifically designed to discover surprising combinations. All other
  goal_bias values are low because the primitive operates at the pipeline
  level, not the audience-facing level — it produces surprise indirectly
  by increasing the probability of discovering a surprising output.
