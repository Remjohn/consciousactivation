summary: >
  The Mix is the highest-scoring primitive across the entire Carter audit
  (191/200) and operates as the cognitive leap of forcing two fiercely
  unconnected domains to intersect logically. Carter frames it as the
  signature move beginning with "That's like..." or "Can you imagine if..."
  Unlike PRM-HUM-025 (Analogy Bridge), which maps a hidden message from
  a familiar domain onto a complex one, The Mix is specifically designed
  for maximum visual shock and absurdity — the two domains must be as
  violently unrelated as possible while maintaining a hidden logical thread.
  In CCP, the Analogy-Mapper toolchain deploys The Mix to explain dense
  psychological or business concepts by instantly mapping them to absurd,
  highly visual daily occurrences.

core_move: >
  Collide two fiercely unconnected domains with a single logical thread,
  producing a visual, absurd, and intellectually stimulating juxtaposition
  that makes the abstract concrete and the familiar strange.

why_it_works: >
  Carter demonstrates that The Mix is the most intellectually stimulating
  humor primitive because it requires rapid analogical reasoning from the
  audience. The mechanism is forced cognitive synthesis: the brain encounters
  two domains it has never associated, is momentarily confused, then
  discovers the hidden logical bridge — and the discovery IS the laugh.
  The audit scores this at a perfect 50/50 for Visual Translation Potential
  because "juxtaposing two unrelated concepts provides unparalleled,
  arresting visual imagery for our rendering engines." The fundamental
  truth underlying it: "Logic is the Bedrock of Absurdity" — a crazy
  analogy only lands if the brain can immediately process the hidden,
  unshakeable logic connecting the two concepts.

examples:
  - context: "BOOK: The NEW Comedy Bible - Analogical Juxtaposition"
    application: >
      Carter's signature "That's like..." or "Can you imagine if..." forces two fiercely unconnected domains to intersect via a single hidden logical thread.
    effect: >
      Produces maximum visual shock and absurdity. The brain is momentarily confused by the collision, then resolves the hidden logic, producing laughter and deep encoding.

  - context: "CCP: CVE - The VDP-Native Visual Prompt"
    application: >
      The Visual Prompt Generation pipeline uses The Mix to generate surreal, arresting imagery by colliding the coaching concept with an absurd domain (e.g., 'A knight in armor using an ATM').
    effect: >
      Produces visuals that arrest scrolling because the brain cannot resist resolving the conceptual puzzle, dramatically outperforming literal stock photography.

  - context: "CCP: JIT Compiler - The Abstract-to-Concrete Translator"
    application: >
      When the CMF must explain a dense abstract concept (e.g., 'market saturation'), the compiler maps it instantly to an absurd daily occurrence ('trying to sell sand at the beach while screaming').
    effect: >
      The conceptual insight lands immediately through discovery rather than lecture, making the abstract familiar and the familiar strange.

  - context: "CCP: V2WS - The 'Pattern Interrupt' Slide"
    application: >
      At the moment of lowest projected audience attention, the presentation transitions to a Mix that visually and conceptually jolts the audience back into active processing.
    effect: >
      Forces cognitive synthesis. The audience must actively bridge the two domains, resetting their attention span.

  - context: "CCP: CBCS - The Ridiculous Mirror"
    application: >
      When a client stubbornly justifies a bad decision, the agent mixes their logic with an absurd domain: 'That's like setting your house on fire to keep your hands warm.'
    effect: >
      The client cannot argue with the logic when it is isolated and applied to the absurd domain, forcing them to abandon the justification.

anti_examples:
  - description: >
      The system generates a Mix where the two domains are too close:
      'Building a funnel is like building a pipeline — you need the
      right flow.' Both domains are marketing/engineering.
    why_it_fails: >
      Carter mandates that the domains must be "fiercely unconnected."
      When both domains live in the same conceptual neighborhood, the
      cognitive leap is too short to generate surprise. The Mix requires
      domains that have ZERO surface-level connection — the only thread
      is the hidden logical one.

  - description: >
      The system generates a Mix with no logical thread: 'Your morning
      routine is like a hamster operating a nuclear submarine.' The
      image is absurd but the connection is random.
    why_it_fails: >
      Carter's Fundamental Truth #2: "Logic is the Bedrock of Absurdity."
      A Mix without an internally consistent logical bridge is not a
      joke — it is Madcap nonsense. The audience's brain cannot resolve
      the puzzle, producing confusion instead of laughter.

