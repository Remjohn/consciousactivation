notes: >
  Highest MCDA in the entire Carter audit (191) and the highest VTP (50/50)
  across all batches. This primitive is the primary visual production
  instruction for the CVE pipeline. Float note: goal_bias.surprise and
  memorability are both near-ceiling (0.9) because the domain collision
  IS the surprise, and absurd visual imagery IS the stickiest memory format.
  goal_bias.clarity is high (0.8) because, paradoxically, the absurd
  image makes the abstract concept MORE concrete and graspable.
