trigger_conditions:
  - "CVE visual prompt generation pipeline is active; The Mix must be utilized to prevent literal/stock imagery generation"
  - "JIT Compiler is tasked with explaining a dense L3 abstract concept; The Mix must translate it into an L1 visual collision"
  - "Telemetry projects a drop in audience attention (e.g., minute 15 of V2WS); system must deploy a Mix to force cognitive synthesis"

suppression_conditions:
  - "Content requires precise, unambiguous technical instruction where metaphorical domain collision introduces operational confusion"
  - "Client is in acute distress; deploying absurd visual juxtapositions registers as dismissive or mocking"

misuse_modes:
  - "Random collision — forcing two domains together without a logical thread, producing Madcap nonsense"
  - "Cliché Mixes — defaulting to overused comparisons ('it's like a rollercoaster') that have zero surprise value"
  - "Mix overload — deploying 3+ Mixes in a single content piece, each with different domain collisions, overwhelming the audience's cognitive bandwidth"

synergizes_with:
  - "PRM-HUM-025"  # Analogy Bridge — The Mix is the more aggressive, visually-oriented sibling; they share the mapping mechanism but differ in intensity
  - "PRM-HUM-030"  # Setup-Premise-Payoff — The Mix IS the Payoff in Carter's architecture; it requires the Setup-Premise to establish context
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — the two domains in the Mix should be maximally distant for maximum cognitive leap

conflicts_with:
  - "PRM-HUM-026"  # Misplaced Focus — both create misdirection but via opposite mechanisms: The Mix draws attention TO the collision; Misplaced Focus draws attention AWAY from the main point

