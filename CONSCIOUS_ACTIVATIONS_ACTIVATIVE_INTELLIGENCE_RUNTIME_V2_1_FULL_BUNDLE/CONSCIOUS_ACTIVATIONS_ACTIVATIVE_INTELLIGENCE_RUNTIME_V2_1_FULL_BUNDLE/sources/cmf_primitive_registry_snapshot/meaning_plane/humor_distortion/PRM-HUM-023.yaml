notes: >
  The audit flags safety risk (SR: 35/50): "missing the subtle tone of the
  tribe can cause the 'How do you do, fellow kids' effect." This primitive
  is ENTIRELY dependent on the quality of the Cultural Memory Map. Float note:
  goal_bias.connection is ceiling (0.9) because tribal recognition is the
  fastest possible bonding mechanism. surface_fit.telegram is highest (0.9)
  because the intimate, direct-communication surface is where tribal
  specificity has the most visceral impact.
