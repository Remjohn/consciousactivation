trigger_conditions:
  - "Cultural Memory Map (DEP-ENG-023) has been populated with verified, high-resolution tribal details for the coach's specific niche"
  - "Content goal dictates immediate parasocial bonding or audience retention; Tribal Reference is the fastest deployment mechanism"
  - "CBCS agent must de-escalate a client's emotional arousal state via humor without utilizing clinical/therapeutic framing"

suppression_conditions:
  - "Target audience is a cold, broad, undifferentiated market where tribal specificity will exclude rather than attract"
  - "Cultural Memory Map data is shallow or unverified; deploying unresearched references triggers the 'How do you do, fellow kids' backfire effect"

misuse_modes:
  - "Stale references — deploying cultural details from 6+ months ago that the tribe has already moved past, making the content feel dated"
  - "Over-specificity — referencing details so niche that even most in-group members don't recognize them, converting tribal bonding into confusion"
  - "Weaponized tribalism — using in-group references to mock out-group members rather than bond in-group members, converting comedy into bullying"

synergizes_with:
  - "PRM-HUM-009"  # Reference Funny Filter — Tribal Reference is the grade-A application of the broader Reference Filter
  - "PRM-HUM-002"  # Irreducible Truth — the tribal detail IS the Subtext: 'we all know this ridiculous thing exists in our world'
  - "PRM-HUM-013"  # Intuiting Method — observation of real tribal details is the raw material extraction step

conflicts_with:
  - "PRM-HUM-025"  # Analogy Bridge — Analogy maps between domains while Tribal Reference stays WITHIN the audience's domain; combining them requires careful management to avoid mixed signals

