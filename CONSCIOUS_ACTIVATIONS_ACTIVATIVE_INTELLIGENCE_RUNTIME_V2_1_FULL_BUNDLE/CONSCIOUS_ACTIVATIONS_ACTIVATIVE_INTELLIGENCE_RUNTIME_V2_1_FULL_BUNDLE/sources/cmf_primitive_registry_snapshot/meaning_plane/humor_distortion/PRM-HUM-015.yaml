notes: >
  This primitive is the longest-cycle in the HUM family — persona sculpting
  is measured in weeks/months, not in single generation passes. Its MCDA
  (165) reflects lower algorithmic determinism (30/50) because it demands
  iterative feedback loops and live engagement infrastructure. Float note:
  goal_bias.connection is ceiling (0.9) because an audience-sculpted persona
  is by definition maximally bonding — the audience shaped it to connect
  with them. ccp_workflow_fit.research_signal_discovery is highest (0.9)
  because the sculpting process IS signal discovery about who the coach
  really is to their audience.
