summary: >
  The Persona Sculpting Protocol destroys the myth that a persona can be
  designed in a brainstorming session. Rosenfield demonstrates that authentic
  persona is an emergent property sculpted through hundreds of performances
  by systematically tracking what gets the strongest audience response.
  After every big reaction, the performer asks: "What was I talking about?"
  and "What attitudes did I play?" — then writes MORE material on those
  subjects with those attitudes, eliminating everything else. A persona
  locked in prematurely becomes a cartoonish shell the audience rejects.
  Rosenfield codifies 7 characteristics of successful personas: Originality,
  Genuineness, Vividness, Likability, Stage Presence, Being Funny, and
  the Characterological Narrative. In CCP, this maps directly to the
  Guardian Agent's iterative Voice DNA extraction — the coach_soul.json
  is a living hypothesis, sculpted by engagement data across 4-6 weeks,
  not a static intake document.

core_move: >
  Treat the coach's persona as a testable hypothesis. Deploy content
  across multiple emotional registers and topics, measure audience
  response, then iteratively amplify the registers and topics that
  produce the deepest engagement — allowing the audience to carve the
  persona over time.

why_it_works: >
  Rosenfield proves that identity cannot be designed in isolation — it
  is an emergent property of iterative interaction. Woody Allen took 2
  years to find his persona; Steve Martin took 10. The mechanism is
  audience-as-mirror: audiences unconsciously reward the performer's
  most authentic, most resonant dimensions through engagement signals
  (deeper replies, saves, shares, extended listening). What the performer
  THINKS is their strongest dimension is frequently not what the audience
  validates. The 7 characteristics serve as an evaluation rubric for
  persona maturity, not a design checklist. Premature lock-in produces
  what Rosenfield calls a 'cartoon' — a rigid caricature that lacks the
  organic texture of an audience-validated identity.

examples:
  - context: "BOOK: Mastering Stand-Up - Audience-Carved Identity"
    application: >
      Rosenfield argues persona is an emergent property sculpted through hundreds of performances by tracking what gets the strongest audience response. Premature lock-in creates a cartoonish shell.
    effect: >
      The persona becomes organically authentic because the audience validates the strongest dimensions of the performer's identity.

  - context: "CCP: CCF - The Guardian Agent Hypothesis"
    application: >
      During onboarding, the Guardian Agent treats coach_soul.json as a living hypothesis. It deploys content across 4 emotional registers and tracks Telegram Intimacy Index per register over 6 weeks.
    effect: >
      The persona is sharpened by dropping underperforming registers and elevating validated modes, resulting in a distinctive voice sculpted by actual audience response data.

  - context: "CCP: CBCS - The Authentic Pivot"
    application: >
      When a coach insists they are 'motivational', but their highest-engagement posts are frustrated industry critiques, the agent diagnoses the mismatch: 'Your persona is the Frustrated Reformer.'
    effect: >
      The coach pivots, engagement metrics validate the hypothesis, and the persona becomes distinctive because it is grounded in response data, not self-narrative.

  - context: "CCP: CMF - The A/B Tone Test"
    application: >
      The agent generates the same underlying Subtext wrapped in two different personas (e.g., The Professor vs. The Rebel) to measure which produces higher share rates.
    effect: >
      Provides empirical data to the Guardian Agent for iterative persona tuning without requiring the coach to consciously 'act' different ways.

  - context: "CCP: V2WS - The 'Signature Story' Refinement"
    application: >
      The system tracks which specific moments of the coach's origin story trigger the highest live webinar retention, stripping away the rest.
    effect: >
      The resulting signature story feels perfectly calibrated to the audience because they literally voted on its composition with their attention.

anti_examples:
  - description: >
      During intake, the Guardian Agent asks the coach 20 detailed
      questions about their personality, values, and communication style,
      then generates a comprehensive, 'final' coach_soul.json that is
      used unchanged for all future content.
    why_it_fails: >
      This is premature lock-in — the exact failure Rosenfield warns
      against. The coach's self-description is a hypothesis, not a fact.
      What the coach believes about their own communication style is
      frequently contradicted by audience response data. A static
      coach_soul.json degrades over time as the coach evolves and the
      audience's preferences shift.

  - description: >
      The system detects that the coach's content about cryptocurrency
      gets high engagement and pivots the entire persona toward crypto
      commentary, abandoning the coach's core coaching niche.
    why_it_fails: >
      Persona sculpting amplifies the coach's authentic dimensions —
      it does not chase trending topics. The high engagement on crypto
      may be a topical spike (one-time signal), not a persona signal
      (consistent pattern). The sculpting must isolate the EMOTIONAL
      REGISTER and ATTITUDE that drove engagement, not the topic itself.

