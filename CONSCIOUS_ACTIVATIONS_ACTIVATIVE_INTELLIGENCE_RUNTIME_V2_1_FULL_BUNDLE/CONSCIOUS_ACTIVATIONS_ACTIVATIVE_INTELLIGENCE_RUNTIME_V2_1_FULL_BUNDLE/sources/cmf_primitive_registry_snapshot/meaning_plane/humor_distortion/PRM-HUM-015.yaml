trigger_conditions:
  - "System is initializing or updating the Guardian Agent's coach_soul.json file as an iterative hypothesis"
  - "Telemetry indicates 4+ weeks of engagement data available; initializing the register-level comparison loop"
  - "AST and engagement analytics detect a sustained plateau in content performance requiring persona recalibration"

suppression_conditions:
  - "Coach has fewer than 2 weeks of deployed content — insufficient data for meaningful sculpting"
  - "Coach has explicitly defined and validated their persona through years of independent audience building — the system should respect rather than re-sculpt"

misuse_modes:
  - "Audience pandering — sculpting the persona toward whatever gets the most likes rather than what produces the deepest engagement (saves, extended threads, repeat visits)"
  - "Identity erasure — sculpting so aggressively that the coach loses all connection to their authentic self, producing a persona that performs well but feels hollow"
  - "Premature lock-in — declaring the persona 'complete' after 2 weeks of data when Rosenfield's timeline is measured in years"

synergizes_with:
  - "PRM-HUM-018"  # Working Backward — the audience's response data sculpts both content AND persona simultaneously
  - "PRM-HUM-017"  # Attitude-Emotion Binding — the sculpting identifies WHICH attitudes resonate; Binding enforces them in output
  - "PRM-HUM-014"  # Joyous Communication — the sculpted persona must still radiate communicative joy; sculpting without joy produces a technically optimized but emotionally dead voice

conflicts_with:
  - "PRM-HUM-008"  # Character Funny Filter — the 2D comedic character is deliberately simple; the Persona is deliberately complex and audience-evolved, requiring careful boundary management

