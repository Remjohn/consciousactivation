summary: >
  The What-If Sandbox takes a standard premise and pushes it to its
  absolute logical extreme through a series of "What if..." extrapolations
  until the underlying truth or absurdity becomes visible. Unlike
  PRM-HUM-027 (Hyperbolic Scaling), which inflates a FEAR to absurdity,
  the What-If Sandbox inflates a PREMISE or a SYSTEM to absurdity —
  demonstrating the flaws of a methodology, belief system, or industry
  practice by showing what happens when its internal logic is followed to
  its natural conclusion. In CCP, this is the primary tool for building
  "negative case studies" — comedically demonstrating why traditional
  coaching methods fail.

core_move: >
  Take a standard premise, practice, or belief system and ask "What if
  we followed this logic completely?" — extrapolating through 3-5 steps
  until the conclusion reveals the premise's inherent absurdity.

why_it_works: >
  Holloway shows that the What-If Sandbox works by exploiting the
  audience's own logical processing. By extending a premise that the
  audience currently holds, the writer doesn't need to ARGUE against
  the belief — they simply show where it LEADS. The audience follows
  the logic themselves and arrives at the absurd conclusion independently.
  This is more persuasive than direct criticism because the audience
  does the cognitive work — they convince themselves.

examples:
  - context: "BOOK: The Serious Guide to Joke Writing - Absurd Extrapolation"
    application: >
      Holloway's tool for inflating a PREMISE or SYSTEM to absurdity by asking "What if we followed this logic completely?" and extrapolating through 3-5 steps.
    effect: >
      The audience follows the logic themselves and arrives at the absurd conclusion independently, making the critique highly persuasive.

  - context: "CCP: CMF - The Negative Case Study"
    application: >
      The generator dismantles a competitor's framework (e.g., '10x revenue') by walking through what happens at year 5 when the logic leads to geopolitical collapse.
    effect: >
      Reveals the flaw in the industry advice without the coach having to attack it directly. The audience arrives at the conclusion through their own processing.

  - context: "CCP: V2WS - The 'Current Path' Projection"
    application: >
      The webinar demonstrates the inevitable burnout of the audience's current strategy by extrapolating their daily actions 120 days into the future.
    effect: >
      Creates intense, undeniable urgency to change methods because the logical endpoint of the current path is shown to be absurd or unsustainable.

  - context: "CCP: CCF - The Boundary Stress Test"
    application: >
      Course materials test a concept by projecting it into extreme scenarios, ensuring the framework holds up under pressure.
    effect: >
      Proves the robustness of the coach's methodology.

  - context: "CCP: CBCS - The Logic Mirror"
    application: >
      When a client stubbornly clings to a bad system, the agent calmly extrapolates the system's output for the next year.
    effect: >
      The client realizes the absurdity of their own process and requests a new system voluntarily.

anti_examples:
  - description: >
      The system uses the What-If Sandbox to extrapolate a premise
      without maintaining internal logical consistency: 'What if you
      posted every day? Eventually a meteor would hit your house.'
      The extrapolation is random, not logical.
    why_it_fails: >
      Holloway's Fundamental Truth #1: the extrapolation must be
      LOGICALLY consistent, following the premise's own internal
      rules to their natural endpoint. Random absurdity (meteor)
      breaks the logical chain and the audience cannot follow the
      argument. The endpoint must be absurd but logically INEVITABLE.

  - description: >
      The system uses the What-If Sandbox to extrapolate a client's
      personal fears: 'What if you never get over your anxiety?
      Eventually you'll be afraid to leave your house, then afraid
      of rooms, then afraid of existing.'
    why_it_fails: >
      This is Hyperbolic Scaling (PRM-HUM-027) of a FEAR, not
      What-If Sandbox extrapolation of a PREMISE. The What-If Sandbox
      targets SYSTEMS, BELIEFS, and PRACTICES — not personal emotions.
      Applying it to fears produces cruelty rather than insight.

