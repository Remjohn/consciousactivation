notes: >
  Lowest MCDA in Batch 6 (145) reflecting the highest safety risk — the
  audit warns that "pushing the What-If Sandbox without rigid guardrails
  might result in the JIT Compiler recommending absurd or actively harmful
  coaching frameworks." The system must ensure the absurdity is COMEDIC,
  not PRESCRIPTIVE. Float note: goal_bias.persuasion is high (0.8)
  because the What-If Sandbox is primarily a persuasion tool — it
  demolishes competing beliefs by showing their logical endpoints.
