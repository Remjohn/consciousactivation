trigger_conditions:
  - "CMF is tasked with critiquing a widely-held industry practice; system must deploy extrapolation logic to demolish the premise without direct attack"
  - "V2WS script enters the 'Current Path Projection' phase; system must extrapolate the audience's current behavior to its logical, absurd endpoint"
  - "CBCS detects a client defending a broken operational system; agent must mirror the logic back through a multi-step extrapolation"

suppression_conditions:
  - "The premise being extrapolated is structurally sound and true; pushing it to absurdity undermines the coach's credibility"
  - "The extrapolation strays into Hyperbolic Scaling of personal trauma or deep fears rather than analyzing operational systems"

misuse_modes:
  - "Straw-manning — constructing a weakened version of a premise specifically to demolish it via What-If, rather than engaging with the strongest version"
  - "Logical breaks — inserting random absurdity into the chain instead of maintaining strict internal consistency"
  - "Target confusion — applying What-If to personal fears (Hyperbolic Scaling territory) instead of systems and beliefs"

synergizes_with:
  - "PRM-HUM-027"  # Hyperbolic Scaling — sibling primitives; What-If targets SYSTEMS, Hyperbolic targets FEARS
  - "PRM-HUM-038"  # Expectation Reversal — the What-If Sandbox can serve AS the setup, establishing an assumption through extrapolation before the reversal shatters it
  - "PRM-HUM-004"  # Contrastive Extreme Polarization — the extrapolation IS a form of extreme polarization applied to a logical chain

conflicts_with:
  - "PRM-HUM-005"  # Absolute Verisimilitude — the absurd endpoints of What-If extrapolation deliberately violate verisimilitude for comedic effect

