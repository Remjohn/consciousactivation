trigger_conditions:
  - "The coach is designing a long-form conversion event (webinar, stage presentation, VSL)"
  - "The content requires the audience to break a deeply entrenched habit or belief"
  - "The coach's existing content is described as 'informative but boring'"

suppression_conditions:
  - "The client is in a state of clinical anxiety or crisis where inducing further 'Fear' or 'Anger' would be harmful"
  - "The medium requires pure utility (e.g., a software tutorial video)"

misuse_modes:
  - "The Guilt Trip — Using Fear of Inaction to shame the audience rather than awaken them"
  - "Unresolved Tension — Triggering Fear or Anger but failing to provide the Safety of a solution, leaving the audience traumatized"
  - "Monotone Delivery — Scripting the emotions perfectly but delivering them with a flat voice, killing the biological impact"

synergizes_with:
