crosswalk_id: "XW-EMOTION-ORCHESTRATION"
crosswalk_note: "Meaning focuses on scripting the emotional arc; Experience focuses on supporting that arc with UI tension and release."

notes: >
  This primitive is the engine of V2WS. If the LLMs are not explicitly tagging and writing to
  these specific emotional targets, the generated webinars will fail. The Emotion Palette must
  be hardcoded into the Emilio system prompts.
