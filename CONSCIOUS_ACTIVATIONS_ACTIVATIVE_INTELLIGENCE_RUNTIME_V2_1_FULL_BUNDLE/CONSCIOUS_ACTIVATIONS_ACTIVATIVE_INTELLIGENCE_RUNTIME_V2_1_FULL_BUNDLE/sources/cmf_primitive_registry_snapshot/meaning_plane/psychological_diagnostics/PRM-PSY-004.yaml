trigger_conditions:
  - "AST analysis detects high density of burnout, exhaustion, or chronic stress indicators in user input"
  - "User exhibits frantic attempts to control external variables (e.g., algorithms, other people's opinions)"
  - "System detects consecutive streak failures accompanied by apologetic or shame-based language"

suppression_conditions:
  - "User explicitly uses 'surrender' as an excuse for apathy regarding controllable, necessary work"
  - "Context is a high-intensity execution phase where the user is well-rested and requires provocation"

misuse_modes:
  - "Enabling Apathy — conflating Sacred Surrender with giving up on one's goals entirely."
  - "Toxic Positivity — telling a client to 'just accept it and smile' without acknowledging the genuine pain of the circumstance."

