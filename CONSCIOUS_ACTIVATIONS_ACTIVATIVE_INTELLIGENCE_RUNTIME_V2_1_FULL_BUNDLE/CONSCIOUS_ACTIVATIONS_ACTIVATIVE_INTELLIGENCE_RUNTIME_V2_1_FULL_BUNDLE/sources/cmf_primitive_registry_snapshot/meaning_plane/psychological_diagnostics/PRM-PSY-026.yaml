trigger_conditions:
  - "The core coaching transformation requires a long timeline (3+ months) to see major results"
  - "The audience is highly skeptical, burnt out, or has failed at previous attempts in this domain"
  - "The coach needs to manufacture immediate momentum at the start of a client engagement (onboarding)"

suppression_conditions:
  - "The 'micro-win' requires purchasing external tools or taking high-risk actions (violating the safety principle)"
  - "The content is meant to be purely philosophical or visionary, where tactical tasks would cheapen the message"

misuse_modes:
  - "The Fake Win — Promising a result that is actually just a 'setup' step (e.g., 'Download this PDF' is not a win; reading it and fixing a problem is)"
  - "The Overwhelming Hook — Providing a 'micro-win' that actually takes 3 hours to complete, triggering decision fatigue"
  - "Disconnect from the Core — Offering an instant gratification hook that has nothing to do with the high-ticket upsell"

synergizes_with:
  - "PRM-PSY-021" # Knowing vs. Feeling (The hook must make them *feel* capable)
  - "PRM-PSY-025" # Clearly Defined Outcome Formula (The hook is a micro-version of the macro-outcome)

conflicts_with:
  - "PRM-PSY-020" # The Paradox of Value (If the coach offers 5 different instant gratification hooks to choose from)

crosswalk_id: "XW-DOPAMINE-BRIDGING"
crosswalk_note: "Meaning focuses on scripting the tactical win; Experience focuses on tracking the execution of that win in Neo4j (micro-conversion)."

notes: >
  In Telegram (CBCS) coaching, this is the most critical retention tool. Coaches must be trained
  to NEVER give long-term homework without pairing it with an Instant Gratification Hook to keep
  the client's dopamine system engaged.
