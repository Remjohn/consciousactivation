trigger_conditions:
  - "The core concept or methodology being taught is abstract, dry, or highly technical"
  - "The audience needs to understand the 'why' behind a system, not just the 'what'"
  - "The coach has a wealth of personal anecdotes that currently feel disconnected from their business teaching"

suppression_conditions:
  - "The audience requires immediate, tactical steps (e.g., an emergency troubleshooting guide) where stories are friction"
  - "The micro-story is so traumatizing or distracting that the audience cannot focus on the macro lesson"

misuse_modes:
  - "The Decorative Anecdote — Telling a story just to fill time, with a generic lesson tacked on the end"
  - "Asymmetrical Mapping — The mechanics of the story contradict the mechanics of the lesson"
  - "The Ego Trip — The story serves only to make the coach look impressive, abandoning the diagnostic payload"

synergizes_with:
  - "PRM-PSY-014" # Trojan Horse Narrative (often the micro-story is comedic)
  - "PRM-HUM-037" # Hyper-Specificity Anchoring

conflicts_with:
  - "PRM-PRS-012" # Pure Direct Instruction (which eschews narrative entirely for speed)

crosswalk_id: "XW-FRACTAL-STORYTELLING"
crosswalk_note: "Meaning focuses on story structure; Experience focuses on macro/micro pacing in user journeys."

notes: >
  This primitive is the difference between an 'influencer' and a 'thought leader'. Influencers tell
  stories about themselves. Thought leaders tell stories about themselves that perfectly explain the
  systems governing the audience's lives. Enforce this in all CCF narrative architectures.
