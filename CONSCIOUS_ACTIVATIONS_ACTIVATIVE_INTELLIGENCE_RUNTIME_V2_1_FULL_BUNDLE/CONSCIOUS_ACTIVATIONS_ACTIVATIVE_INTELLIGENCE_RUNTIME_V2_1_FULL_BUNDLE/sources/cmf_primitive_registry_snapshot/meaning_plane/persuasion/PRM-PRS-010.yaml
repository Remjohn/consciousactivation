summary: >
  The Four Intents of Authentic Delivery is a performance preparation primitive that shifts
  the locus of rehearsal from physical mechanics to internal emotional states. It dictates
  that coaches must cultivate four specific intents (Be Open, Connect, Be Passionate, Listen)
  rather than choreographing gestures or vocal inflections. In CCP, this primitive serves as
  the philosophical backbone of the Conscious Voice Speaking Coach Engine, replacing
  "outside-in" mechanical direction with "inside-out" emotional calibration.

core_move: >
  Rehearse the internal emotional intent behind the communication rather than choreographing the physical or vocal mechanics of the delivery.

why_it_works: >
  Morgan's neuroscientific insight reveals that in natural communication, body language
  emerges fractions of a second *before* the associated conscious thought and spoken word.
  When a speaker rehearses a mechanical gesture (e.g., "I will point on this word"), the
  gesture occurs simultaneously with or slightly after the word, which the audience's
  unconscious threat-detection circuitry immediately flags as inauthentic. By rehearsing
  intent—Be Open (surrender defenses), Connect (seek the audience's attention), Be Passionate
  (focus on the stakes), and Listen (monitor audience response)—the body language takes care
  of itself, emerging with the correct neurological timing.

examples:
  - context: "BOOK: HBR's 10 Must Reads - How to Become an Authentic Speaker"
    application: >
      Nick Morgan details that body language emerges fractions of a second before conscious thought. Rehearsing physical gestures causes them to appear slightly delayed and inauthentic. Instead, speakers must rehearse four internal intents: Be Open, Connect, Be Passionate, Listen.
    effect: >
      Because the emotion precedes the speech naturally, the resulting body language and vocal tone are perceived by the audience's threat-detection circuitry as entirely authentic.

  - context: "CCP: Conscious Reactions - Pre-Recording Preparation"
    application: >
      Before allowing the coach to record a Solo Reaction, the Sovereign NIM stack enforces a 30-second 'Intent Check'. The interface prompts the coach to vividly imagine speaking to one specific client they deeply care about (Intent: Connect) and articulate the consequences of failing to act (Intent: Be Passionate).
    effect: >
      The coach enters the recording state carrying this emotional residue, resulting in naturally dynamic pacing without mechanical direction.

  - context: "CCP: V2WS - Webinar Rehearsal"
    application: >
      During the final V2WS run-through, the coach is instructed to place a photograph of their target audience avatar next to the camera lens. They practice the 'Connect' intent by speaking directly to that single face, actively trying to win their attention.
    effect: >
      The "broadcast" tone of the presentation disappears, replaced by an intimate, conversational intensity that translates perfectly through the camera.

  - context: "CCP: CCF - Voice DNA Calibration"
    application: >
      When capturing baseline Voice DNA for a new coach, the system does not give notes on pacing. It simply changes the emotional prompt: "Explain this as if you are trying to calm down a panicked friend" (Intent: Listen/Open).
    effect: >
      The synthetic voice model captures genuine vocal warmth because the underlying performance was driven by authentic internal intent, not calculated acting.

  - context: "CCP: CMF - Video Delivery Coaching"
    application: >
      If a coach's video takes feel stiff or robotic, the CMF pipeline halts production. The director provides an intent-based reframe ("You are defending your core belief against a skeptic") rather than a mechanical one ("Move your hands more").
    effect: >
      The coach stops over-thinking their physical mechanics, and their body naturally aligns with the passion of the argument.

anti_examples:
  - description: >
      A coach meticulously plans their body language, deciding to step forward and open
      their palms precisely when delivering their core thesis statement.
    why_it_fails: >
      The execution feels robotic and slightly delayed. The audience unconsciously detects
      the dissonance between the calculated movement and the spoken words, registering the
      coach as a "slick presenter" rather than a trustworthy guide, thereby destroying Ethos.

