trigger_conditions:
  - "When a coach is preparing to record foundational Voice DNA assets"
  - "When audience feedback indicates a presenter feels 'scripted,' 'slick,' or 'distant'"
  - "Immediately before stepping onto a stage or initiating a high-stakes live broadcast"

suppression_conditions:
  - "During the early drafting phases of script creation where structural clarity is the priority and emotional delivery is premature"

misuse_modes:
  - "Emotional Overload — interpreting 'Be Passionate' as requiring constant high-energy yelling, which exhausts the audience and breaks the 'Listen' intent"
  - "Abstract Rehearsal — attempting to feel 'open' generally, rather than grounding the intent in a highly specific imagined interaction with a real person"

