trigger_conditions:
  - "When auditing a completed script or beat cluster prior to publication or recording"
  - "When coaching a speaker on vocal delivery and sentence-level emphasis"
  - "When post-event feedback indicates high 'information' scores but low 'inspiration' or 'conversion' scores"

suppression_conditions:
  - "When delivering pure, objective telemetry or technical documentation where Pathos and Ethos would obscure clarity"

misuse_modes:
  - "Over-indexing on Pathos — relying so heavily on emotional resonance that the core logical methodology is obscured or absent"
  - "Ethos as Arrogance — establishing credibility through aggressive credential-listing rather than demonstrated empathy and shared experience"

