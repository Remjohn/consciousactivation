trigger_conditions:
  - "When designing the opening 60 seconds of any new content asset or coaching engagement"
  - "When a highly competent, data-heavy script feels 'cold' or disconnected"
  - "When a coach is about to deliver difficult feedback and needs to secure the relationship first"

suppression_conditions:
  - "When the audience is already in a high-trust, fast-moving execution state where excessive warmth signals would feel performative and slow them down"

misuse_modes:
  - "Manufactured Vulnerability — telling a heavily curated 'sad story' that feels engineered for sympathy rather than authentic warmth"
  - "Competence Neglect — leaning so heavily into warmth and likability that the coach fails to demonstrate the required expertise to actually solve the client's problem"

