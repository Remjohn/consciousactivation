summary: >
  Warmth-Before-Competence Sequencing is a foundational order-of-operations primitive
  governing how an audience processes a speaker. It dictates that signals of shared
  identity, positive intent, and emotional warmth must explicitly precede any
  demonstration of technical expertise. In CCP, this primitive controls the first 60 seconds
  of any content format, ensuring that the audience's biological trust filters are
  lowered before data or frameworks are introduced.

core_move: >
  Sequence communication to establish trust, shared worldview, and positive intent before delivering any evidence of competence or intellectual authority.

why_it_works: >
  Decades of social psychology research confirm that human beings evaluate warmth (intent)
  before competence (capability) as an evolutionary survival mechanism. If a speaker defaults
  to demonstrating expertise without first establishing warmth, the audience may admire the
  competence intellectually, but they will not internalize the message because the trust
  circuitry has not been activated. Cuddy et al. identify the "happy warrior" state—a
  neuroendocrine profile of high testosterone (confidence) and low cortisol (low anxiety)—
  which allows a speaker to face challenges warmly without projecting defensive contraction.

examples:
  - context: "BOOK: HBR's 10 Must Reads - Connect, Then Lead"
    application: >
      Cuddy, Kohut, and Neffinger detail that human beings evaluate warmth (intent) before competence (capability) as an evolutionary survival mechanism. The speaker must project the "happy warrior" state—a mix of confidence and low anxiety—allowing them to face challenges warmly before delivering data.
    effect: >
      The audience's biological trust filters are lowered, making them receptive to the subsequent technical expertise instead of rejecting it as a threat.

  - context: "CCP: CMF - Media Factory Visual Production"
    application: >
      Instead of opening Beat 1 with a complex framework or the coach's credentials, the Skia-rendered visual mandates a "Warmth Signal": a 30-second personal disclosure acknowledging the audience's private struggle, delivered with soft, ambient colors.
    effect: >
      The viewer perceives the coach as an ally rather than a distant expert, allowing the dense frameworks in Beats 2 and 3 to be received without resistance.

  - context: "CCP: Telegram - High-Stakes Asynchronous Coaching"
    application: >
      When a client repeatedly fails an action, the Guardian Agent intercepts a draft reprimand. It forces the coach to begin the message with a personalized check-in validating the difficulty of the client's context (warmth) before delivering accountability metrics (competence).
    effect: >
      The client reads the accountability challenge as an act of care rather than a reprimand, dropping the probability of defensive disengagement.

  - context: "CCP: V2WS - Webinar Introduction"
    application: >
      During the first five minutes of the webinar, the coach is restricted from mentioning their methodology or past corporate clients. The interface forces them into 'Story Mode' to share a vulnerable moment where they experienced the exact pain the audience feels.
    effect: >
      Trust is biologically established. When the coach later switches to 'Rep Mode' to teach the mechanism, the audience does not cynically question the data.

  - context: "CCP: Conscious Reactions - Solo Reaction Constraint"
    application: >
      Before entering Debate Mode to fiercely attack a centroid belief, the Sovereign NIM stack prompts the coach to spend the first 15 seconds acknowledging the valid fears of the opposing side.
    effect: >
      This preemptive warmth prevents the aggressive debate stance from triggering an immediate rejection reflex in uninitiated listeners.

anti_examples:
  - description: >
      A V2WS webinar where the speaker spends the first five minutes detailing their
      academic background, consulting history, and proprietary methodologies before ever
      speaking directly to the audience's experience.
    why_it_fails: >
      This violates the biological sequencing requirement. By front-loading competence, the
      speaker triggers the audience to evaluate them as a potential threat or a competitor,
      rather than an ally. The audience becomes highly critical of the data because trust
      was never established.

