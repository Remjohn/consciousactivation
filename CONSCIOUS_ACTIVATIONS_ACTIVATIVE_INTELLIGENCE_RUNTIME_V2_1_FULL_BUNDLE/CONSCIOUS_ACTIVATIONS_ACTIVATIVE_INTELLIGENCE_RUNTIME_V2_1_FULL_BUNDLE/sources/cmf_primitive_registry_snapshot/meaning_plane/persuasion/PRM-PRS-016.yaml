summary: >
  The Audience-as-Hero Inversion is a foundational relational primitive that explicitly
  assigns the role of the protagonist to the audience, casting the speaker strictly as
  the mentor (e.g., Yoda, not Luke Skywalker). In CCP, this primitive forces a radical
  restructuring of all content, stripping away self-centered credentialing and demanding
  that all narratives begin in the client's 'ordinary world.' It ensures the coach serves
  the audience's journey rather than asking the audience to validate the coach's expertise.

core_move: >
  Strip the speaker of the protagonist role; explicitly position the audience as the hero who must cross the threshold, and the speaker as the mentor who provides the magical tool.

why_it_works: >
  Drawing from Joseph Campbell's Hero's Journey, Duarte identifies a fatal flaw in corporate
  communication: the presenter almost always positions themselves or their product as the hero
  riding in to save the day. This triggers unconscious resistance, as audiences naturally view
  themselves as the protagonists of their own lives. When a speaker usurps the hero role, the
  audience disconnects. By accepting the role of the mentor, the speaker aligns with the
  audience's psychological reality. The mentor's job is not to win the battle, but to provide
  the insight, tool, or confidence that enables the hero to win. This stance generates massive
  resonance and trust.

examples:
  - context: "BOOK: Resonate - Lessons from Myths and Movies"
    application: >
      Duarte maps the Hero's Journey to presentations, identifying that speakers fatally err by casting themselves as the hero. Audiences view themselves as protagonists. The speaker must explicitly adopt the role of the Mentor (e.g., Yoda), whose only job is to provide the tool the Hero needs to win.
    effect: >
      The audience's unconscious resistance vanishes. They stop feeling inadequate compared to the 'hero' speaker and instead eagerly accept the mentor's guidance.

  - context: "CCP: CCF - Webinar Opener Scripting"
    application: >
      Instead of starting with a traditional "About Me" slide detailing the coach's past successes, the CCF agent mandates an opening about the audience's struggles. The coach's qualifications are framed purely as: "I walked this path, and brought back a tool for you."
    effect: >
      The audience feels seen rather than lectured. They accept the coach's framework as a necessary tool for their own victory.

  - context: "CCP: CMF - Beat Cluster Ideation"
    application: >
      A cluster titled "My 5-Step System for Productivity" is flagged by the CMF agent. It is rewritten as "The 5 Decisions You Must Make to Take Back Your Calendar," shifting the focus from the coach's proprietary genius to the audience's required agency.
    effect: >
      The content becomes actionable. The audience stops passively admiring the coach and begins actively projecting themselves into the execution.

  - context: "CCP: V2WS - The Witness Arc Positioning"
    application: >
      During the final pitch phase of a V2WS webinar, the coach is restricted from saying "I can save your business." They are prompted to say, "You have everything it takes to scale, you are just missing this one specific piece of telemetry."
    effect: >
      The audience retains their autonomy and agency. They buy the coaching program not out of helpless desperation, but out of empowered readiness.

  - context: "CCP: Telegram - High-Stakes Interventions"
    application: >
      When a client fails, the coach avoids saying "Why didn't you follow my perfect plan?" Instead, the Guardian Agent prompts a mentor-stance message: "The path gets narrow here. Use the protocol we practiced, you have the capacity."
    effect: >
      The client is not shamed into compliance; they are called up into their own heroic identity, drastically increasing the likelihood of behavioral correction.

anti_examples:
  - description: >
      A pitch deck for a coaching mastermind that spends the first 20 minutes showing pictures
      of the coach's luxury lifestyle, framing the coach as the ultimate success story the
      audience should blindly emulate.
    why_it_fails: >
      The coach has cast themselves as the hero, reducing the audience to mere spectators
      (or victims needing rescue). The audience may feel envy, but they do not feel empowered.
      This produces a transactional, low-trust dynamic rather than a transformational one.

