trigger_conditions:
  - "When auditing a script that uses the words 'I' and 'My' significantly more than 'You' and 'Your'"
  - "During the creation of any sales, pitch, or onboarding sequence"
  - "When coaching a highly credentialed expert who struggles to connect with beginners"

suppression_conditions:
  - "When specifically asked to provide a raw, autobiographical account of personal trauma or failure, where centering the audience would feel avoidant"

misuse_modes:
  - "False Humility — pretending the audience has all the answers while secretly maneuvering them toward a predetermined upsell, which feels manipulative"
  - "Abdication of Authority — playing the 'mentor' role so softly that the coach fails to challenge the audience's delusions or enforce necessary boundaries"

