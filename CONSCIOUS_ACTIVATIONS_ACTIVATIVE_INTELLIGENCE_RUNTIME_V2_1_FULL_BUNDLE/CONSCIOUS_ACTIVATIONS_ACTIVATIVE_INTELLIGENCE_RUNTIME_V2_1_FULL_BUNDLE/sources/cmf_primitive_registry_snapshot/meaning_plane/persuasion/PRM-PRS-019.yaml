trigger_conditions:
  - "When auditing the final storyboard of a CMF visual beat cluster"
  - "When a V2WS webinar rehearsal feels 'flat' or 'monotonous'"
  - "When reviewing audience analytics that show a steady, continuous drop-off in attention"

suppression_conditions:
  - "During highly specific technical training modules where format consistency is required to minimize cognitive load on the learner"

misuse_modes:
  - "Frenetic Shifting — changing channels so rapidly and randomly (e.g., jumping between stories, data, props, and videos every 30 seconds) that the audience becomes exhausted and confused"
  - "Superficial Contrast — changing the visual style of the slides without actually changing the emotional register or delivery mode, creating the illusion of contrast without the neurological reset"

