trigger_conditions:
  - "When structuring any content that asks the audience to change a deeply held belief or behavior"
  - "When auditing a webinar script or sales pitch prior to recording"
  - "When a previously successful coach enters a new market where they lack established credibility"

suppression_conditions:
  - "During routine, administrative, or purely informational updates where persuasion is not required and efficiency is paramount"

misuse_modes:
  - "Value System Projection — believing you have established common ground, but actually just stating what you think the audience *should* care about"
  - "Skipping the Sequence — rushing through Credibility and Common Ground to get to the 'good stuff' (the Evidence), rendering the Evidence impotent"

