summary: >
  The Conger Four-Step Persuasion Architecture is an operational workflow primitive that
  structures persuasive communication as a strict, sequential dependency chain: Establish
  Credibility, Frame for Common Ground, Provide Vivid Evidence, and Connect Emotionally.
  In CCP, this primitive acts as the structural quality gate for all high-stakes pitching
  and V2WS webinar scripts, ensuring that evidence is never delivered before credibility
  is established, and emotion is never invoked without a common-ground anchor.

core_move: >
  Execute the four sequential dependencies of persuasion in order, critically ensuring that arguments are framed around the audience's values, not the speaker's.

why_it_works: >
  Conger's research proves that persuasion is not a rhetorical flourish, but a psychological
  sequence. The steps are inextricably dependent. If vivid evidence is presented before
  credibility is established, the audience simply dismisses the evidence as biased. If
  emotional connection is attempted before common ground is framed, the emotion feels
  manipulative. The most profound failure mode Conger identifies is "framing from the wrong
  value system": arguing for a change using the speaker's logic (e.g., corporate efficiency)
  instead of translating it into the audience's logic (e.g., local franchise profit). This
  sequence guarantees that the audience is prepared to receive the evidence.

examples:
  - context: "BOOK: HBR's 10 Must Reads - The Necessary Art of Persuasion"
    application: >
      Jay Conger's research dictates persuasion is a strict sequence: Establish Credibility, Frame for Common Ground, Provide Vivid Evidence, Connect Emotionally. Attempting to deliver vivid evidence before credibility and common ground are established causes the audience to dismiss the data as biased or irrelevant.
    effect: >
      The audience's psychological defense mechanisms are systematically lowered, allowing them to evaluate the evidence through the lens of their own goals.

  - context: "CCP: V2WS - Webinar Script Architecture"
    application: >
      The V2WS agent halts production on a webinar script that jumps straight from the coach's bio (Credibility) to the framework's data (Evidence). It forces the insertion of Step 2: explicitly mapping how the framework solves the audience's stated priority (Common Ground).
    effect: >
      The audience stops evaluating the framework objectively and begins evaluating it subjectively as a solution to their own most painful problem.

  - context: "CCP: CCF - Archetype Pitch Script"
    application: >
      A coach pitches a high-ticket mastermind. The CCF system replaces abstract statistics with Step 3 (Vivid Evidence)—a highly specific, concrete story of one client's turnaround—and concludes with Step 4 (Emotional Connection) calibrated to the audience's frustration level.
    effect: >
      The pitch avoids triggering sales resistance, feeling instead like a logical, emotionally resonant continuation of a shared journey.

  - context: "CCP: Telegram - Cold Outreach Sequence"
    application: >
      The Guardian Agent intercepts a Telegram broadcast that blasts case studies of massive revenue growth (Evidence) before acknowledging the audience's daily grind (Common Ground) or the coach's specific competence in their niche (Credibility).
    effect: >
      By re-sequencing the message, the evidence is no longer perceived as self-serving boasting, and response rates increase drastically.

  - context: "CCP: CMF - Beat Cluster Sequencing"
    application: >
      When auditing a visual beat cluster, the system ensures that Skia-rendered data visualizations (Vivid Evidence) are never displayed in Beat 1. They are locked behind Beat 2, which visually establishes the shared struggle (Common Ground).
    effect: >
      The audience does not glaze over the data because they have already accepted the premise that the data matters to their survival.

anti_examples:
  - description: >
      A Telegram marketing sequence that opens by broadcasting case studies of massive
      revenue growth (Vivid Evidence) before establishing why the coach is uniquely qualified
      to speak on the topic (Credibility) or acknowledging the audience's actual daily
      grind (Common Ground).
    why_it_fails: >
      The sequence violates the dependency chain. Because credibility and common ground were
      skipped, the audience reads the case studies not as evidence of a repeatable system,
      but as self-serving boasting. The evidence is wasted on an audience that hasn't
      decided to trust the source.

