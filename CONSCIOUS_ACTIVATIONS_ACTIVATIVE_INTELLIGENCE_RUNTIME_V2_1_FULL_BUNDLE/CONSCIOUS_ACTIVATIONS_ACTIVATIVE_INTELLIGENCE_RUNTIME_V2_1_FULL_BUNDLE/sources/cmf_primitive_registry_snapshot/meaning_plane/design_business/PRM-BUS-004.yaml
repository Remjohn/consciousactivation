summary: >
  Design for Lived Use asserts that a product or communication is not defined by its 
  creator's abstract intent, but by how it functions in the user's actual hands, 
  environment, and emotional state. It forces the design to optimize for real-world 
  friction—fatigue, distraction, physical constraints, and emotional distress—rather 
  than idealized consumption.

core_move: >
  Optimize the content and interface for the user's real emotional state, device, 
  and physical moment of use, rather than for aesthetic purity or the creator's intent.

why_it_works: >
  Tracing the evolution of industrial design from Henry Dreyfuss's telephone handsets
  (which adapted to the physical reality of how people hold phones) to modern UX,
  Lupton demonstrates that ignoring human bodily and psychological reality creates
  use-failure. The brain and body will reject a system that demands they conform
  to it. By designing for the 'lived use' moment, we eliminate the invisible
  resistance that blocks adoption and comprehension.

examples:
  - context: "BOOK: Beautiful Users - Designing for People"
    application: >
      Lupton asserts that a product is defined by how it functions in the user's actual hands and emotional state. It optimizes for real-world friction—fatigue, distraction, physical constraints—rather than idealized consumption.
    effect: >
      Eliminates the invisible resistance that blocks adoption by respecting human bodily and psychological reality.

  - context: "CCP: CCF - The Exhaustion Heuristic"
    application: >
      When generating content for a burned-out target audience, the agent rejects a dense 15-slide carousel and outputs a 4-slide, high-contrast, low-word-count intervention designed to be read on a dim phone screen in bed.
    effect: >
      The content meets the user where their capacity allows, preventing cognitive rejection.

  - context: "CCP: Conscious Voice - The Transition Prompt"
    application: >
      The agent recognizes a client is replying via Telegram audio while commuting. It shortens its own voice note to 45 seconds and asks a single, contained reflection question instead of a multi-part philosophical inquiry.
    effect: >
      The client can respond immediately. By designing for 'rushed transition time', the agent preserves the relationship cadence.

  - context: "CCP: CMF - The 'No Audio' Assumption"
    application: >
      The system automatically assumes all short-form video will be watched with the sound off while the user is in public, enforcing aggressive, highly readable burned-in captions that carry the entire narrative weight.
    effect: >
      Maximizes retention in the exact environmental reality where the content is consumed.

  - context: "CCP: V2WS - The 'Second Screen' Reality"
    application: >
      Knowing attendees are often checking emails during webinars, the agent designs slides with massive, singular focal points that can be comprehended in a half-second glance back to the main monitor.
    effect: >
      Prevents the audience from getting permanently lost if their attention momentarily drifts.

anti_examples:
  - description: >
      A beautifully structured, text-heavy infographic about sleep hygiene 
      that requires the user to pinch and zoom on their phone to read the 
      small, low-contrast grey text.
    why_it_fails: >
      The designer optimized for the aesthetic look of the layout on a 27-inch 
      monitor, completely ignoring the lived use of a person staring at a 5-inch 
      screen with tired eyes at 11 PM. The cognitive and physical friction prevents 
      engagement.

