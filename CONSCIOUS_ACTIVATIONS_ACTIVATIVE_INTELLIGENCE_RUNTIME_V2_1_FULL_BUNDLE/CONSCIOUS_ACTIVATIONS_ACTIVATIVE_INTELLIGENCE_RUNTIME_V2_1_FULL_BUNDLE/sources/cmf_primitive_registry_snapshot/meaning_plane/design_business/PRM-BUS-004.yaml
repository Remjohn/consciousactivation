trigger_conditions:
  - "System telemetry indicates the user audience is currently in a state of high stress, fatigue, or low cognitive bandwidth"
  - "Agent is designing content or UI explicitly for mobile, on-the-go consumption"
  - "A technically perfect piece of content or workflow is repeatedly failing to get engagement due to environmental friction"

suppression_conditions:
  - "User is engaging in a deep-dive, long-form masterclass where they have explicitly blocked out dedicated time and attention"
  - "The therapeutic goal of the interaction explicitly requires pushing the user out of their comfort zone"

misuse_modes:
  - "Dumbing Down — Over-simplifying the intellectual core of the message instead of just streamlining the delivery"
  - "Assuming the Worst — Treating all users as incapable, leading to patronizing design"
  - "Context Blindness — Applying a 'lived use' assumption from one platform (TikTok) to a completely different one (a paid webinar)"

