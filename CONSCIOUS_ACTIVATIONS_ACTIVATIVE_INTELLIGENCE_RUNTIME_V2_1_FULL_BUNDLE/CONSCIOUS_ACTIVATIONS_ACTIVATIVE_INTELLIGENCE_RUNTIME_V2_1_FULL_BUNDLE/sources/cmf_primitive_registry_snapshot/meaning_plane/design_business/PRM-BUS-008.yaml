summary: >
  Invitation-Based Sales rejects the high-pressure, manipulative tactics of
  traditional selling. It replaces the 'pitch' with a proportionate, perfectly
  timed invitation that the client is already anticipating. It respects the
  client's autonomy and readiness, recognizing that people hate being sold
  to, but they love being invited to something relevant and valuable.

core_move: >
  Design the sales sequence as a series of low-friction, escalating invitations
  based on demonstrated trust, rather than a single, high-pressure conversion attempt.

why_it_works: >
  According to Port's Sales Cycle Process, pushing a cold lead into a high-ticket
  sale triggers the brain's defense mechanisms. Trust is biological; it requires
  time and verified safety. By offering a 'no-barrier entry offer' first, and
  then only inviting the client to the next step when trust has accumulated, the
  system eliminates the friction of rejection. The sale becomes the natural,
  inevitable conclusion of a relationship rather than a combative negotiation.

examples:
  - context: "BOOK: Book Yourself Solid - Permission-Based Conversion"
    application: >
      Port rejects high-pressure tactics, replacing the 'pitch' with a proportionate, perfectly timed invitation that the client is anticipating. It relies on a sequence of low-friction, escalating invitations based on demonstrated trust.
    effect: >
      Eliminates the friction of rejection. The sale becomes the natural, inevitable conclusion of a relationship rather than a combative negotiation.

  - context: "CCP: CMF - Carousel CTA Generation"
    application: >
      A social media carousel ends not with 'Buy my $5k package,' but with: 'I'm hosting a private breakdown of this framework Thursday. If this helped, I invite you to join us.'
    effect: >
      The invitation is proportionate to the trust established by one post. Conversion rate is high because friction is low.

  - context: "CCP: Telegram - The Pivot to Close"
    application: >
      After weeks of free micro-coaching via voice notes, the agent prompts the coach: 'You've been doing great. I have a 6-week intensive for this exact bottleneck. Would you like me to send details to see if it's a fit?'
    effect: >
      The client feels respected, not targeted. The permission-based approach eliminates pressure, pulling the client toward the offer.

  - context: "CCP: V2WS - The 'Soft' Open"
    application: >
      Before the official pitch section of the webinar, the host explicitly asks for permission: 'We've covered the framework. I have a program that implements this. Is it okay if I spend 5 minutes showing you how it works?'
    effect: >
      Disarms the audience's natural defense mechanisms because they actively consented to being pitched.

  - context: "CCP: CCF - The 'No-Pitch' Consultation"
    application: >
      The system architectures the initial consultation call flow to completely exclude a pitch. The coach only diagnosis the problem, and then asks: 'Do you want to fix this on your own, or do you want my help?'
    effect: >
      Places the burden of the sale entirely on the client's agency, preventing the coach from feeling 'sleazy'.

anti_examples:
  - description: >
      A creator sends a cold DM to a new follower: 'Hey! Saw you followed me.
      I help people scale their business to 10k months. Want to hop on a 15-min
      discovery call tomorrow?'
    why_it_fails: >
      The invitation is wildly disproportionate to the trust level (which is zero).
      It violates social norms and triggers immediate defense mechanisms. The
      follower feels treated like a lead rather than a person, and blocks the creator.

