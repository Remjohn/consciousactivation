trigger_conditions:
  - "System is writing the final Call-To-Action (CTA) for a piece of content, email, or webinar"
  - "Agent is structuring a product ladder or multi-step sales funnel"
  - "User explicitly expresses feeling 'sleazy' or anxious about selling their services"

suppression_conditions:
  - "System is managing an e-commerce environment for low-ticket, impulse-buy items where a direct 'Buy Now' is expected"
  - "Client explicitly asks for the price and checkout link immediately; system must not force them through unnecessary permission steps"

misuse_modes:
  - "Passive Waiting — Never actually making the invitation out of fear, hoping the client will just figure it out"
  - "The Bait and Switch — Inviting them to a 'free training' that is actually a 90-minute high-pressure sales pitch"
  - "Endless Freebies — Providing so many low-barrier offers that the client never feels the need to invest"

