trigger_conditions:
  - "System is generating landing pages, application forms, or high-ticket sales copy"
  - "AST analysis detects a coach expressing burnout or resentment toward their current audience in the Voice DNA logs"
  - "Agent is drafting the hook or introduction for a highly targeted webinar or masterclass"

suppression_conditions:
  - "Content is explicitly top-of-funnel, broad awareness material meant strictly for general brand introduction where exclusion is counterproductive"
  - "User explicitly instructs the system to cast the widest net possible for a free community event"

misuse_modes:
  - "Arrogant Exclusion — Using the policy to sound elitist, mean, or discriminatory rather than just protecting boundaries"
  - "Fake Scarcity — Pretending to have a velvet rope but accepting anyone with a credit card"
  - "Over-Filtering — Making the criteria so impossibly narrow that literally no one qualifies"

