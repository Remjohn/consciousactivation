summary: >
  Red Velvet Rope Policy is a business and content design principle that demands
  explicit exclusion. It insists that you must fiercely protect your energy, your
  brand, and your best work by turning away 'dud' clients and only working with
  those who inspire and energize you. In content, this means writing copy that
  intentionally repels the wrong audience so that the ideal audience feels
  exclusive and safe.

core_move: >
  Explicitly name who the offer or content is NOT for, using polarizing clarity
  to disqualify bad fits and compound trust with the ideal audience.

why_it_works: >
  Port explains that working with non-ideal clients drains creativity, causes burnout,
  and degrades the quality of work. Furthermore, trying to appeal to everyone
  makes messaging bland and generic ('He who trims himself to suit everyone will
  soon whittle himself away'). By installing a metaphorical 'red velvet rope',
  the creator signals high status, clear boundaries, and deep expertise. The ideal
  client feels a surge of trust because the environment is curated specifically for them.

examples:
  - context: "BOOK: Book Yourself Solid - The Red Velvet Rope Policy"
    application: >
      Port insists on explicitly naming who the offer or content is NOT for. Working with non-ideal clients drains creativity. By installing a metaphorical 'red velvet rope', the creator signals high status and deep expertise.
    effect: >
      Disqualifies bad fits, saving operational drag, while the ideal audience feels exclusive and safe, dramatically increasing their desire to buy.

  - context: "CCP: CCF - The 'Anti-Persona' Application"
    application: >
      A sales page for a high-level mastermind explicitly lists 'Who This is NOT For': 'If you are looking for a magic bullet, or blame the algorithm for your lack of sales, do not apply. We will not accept you.'
    effect: >
      'Dud' clients self-select out. Ideal clients read the list and feel relief, increasing their trust and desire to buy.

  - context: "CCP: V2WS - The Qualifier Intro"
    application: >
      The webinar host opens by stating: 'This training is exclusively for established coaches doing at least $5k a month. If you are starting out, this will overwhelm you.'
    effect: >
      Establishes immediate authority. The host isn't desperate for approval. Established coaches lean in, knowing the material is curated for them.

  - context: "CCP: CMF - The Repellent Hook"
    application: >
      A social media hook is generated to intentionally agitate a specific worldview: 'If you still think charging by the hour is scaling, scroll past. This is for equity-thinkers only.'
    effect: >
      Filters the algorithmic distribution. Engagement from the wrong audience is killed early, training the platform to only serve the content to the correct psychographic.

  - context: "CCP: CBCS - Firing the Client"
    application: >
      When a Telegram client repeatedly violates boundaries or refuses to do the work, the agent generates a script for the coach to gracefully terminate the contract, refunding the remainder.
    effect: >
      Protects the coach's energy pipeline, allowing them to redirect focus to clients who actually generate positive case studies.

anti_examples:
  - description: >
      A graphic designer takes on a client who haggles over the price, demands
      endless revisions outside the scope, and is rude on calls, just because
      the designer needs the money.
    why_it_fails: >
      The 'dud' client monopolizes the designer's time and emotional energy. The
      designer begins to resent their own business, their creativity tanks, and
      they have no energy left to attract or serve the ideal clients they actually want.

