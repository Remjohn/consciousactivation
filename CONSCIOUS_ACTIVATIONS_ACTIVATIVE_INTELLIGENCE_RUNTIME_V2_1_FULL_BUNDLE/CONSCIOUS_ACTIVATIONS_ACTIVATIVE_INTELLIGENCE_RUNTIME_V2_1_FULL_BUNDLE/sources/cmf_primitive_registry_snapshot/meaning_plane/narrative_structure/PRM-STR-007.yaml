trigger_conditions:
  - "AST analysis detects content reading as too academic, cold, self-centered, or focused on status display"
  - "User expresses 'imposter syndrome' or feeling unworthy of an audience"
  - "Goal of the system touchpoint is deep trust-building or intimate connection (e.g., Telegram onboarding)"

suppression_conditions:
  - "Situation requires a firm, unyielding boundary or a hard truth that must not be softened by warmth"
  - "Context is purely technical, where an emotional offering would be confusing or inappropriate"

misuse_modes:
  - "Being overly saccharine, patronizing, or assuming a 'savior' complex rather than offering peer-level help."
  - "Giving a 'gift' with strings attached, where the underlying tone demands gratitude or immediate conversion."

synergizes_with:
  - "PRM-PRS-030" # Connection Before Content - the gift orientation is the ultimate connection builder
  - "PRM-STR-005" # Moral Point of View - the gift is often the moral point of view delivered with care

conflicts_with:
  - "PRM-HUM-010" # High-Contrast Conflict - humor born of harsh clashing can undermine the warmth of the gift

