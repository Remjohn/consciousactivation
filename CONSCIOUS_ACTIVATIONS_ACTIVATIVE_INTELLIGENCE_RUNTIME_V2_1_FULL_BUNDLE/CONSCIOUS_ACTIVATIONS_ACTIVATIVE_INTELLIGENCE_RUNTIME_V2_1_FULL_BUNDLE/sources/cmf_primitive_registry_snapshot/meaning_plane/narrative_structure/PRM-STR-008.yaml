trigger_conditions:
  - "System detects content relying heavily on statistics, trends, or empirical evidence"
  - "User is generating an executive summary, hook, or core thesis for a new module"
  - "AST analysis detects the current draft reading like a neutral Wikipedia summary rather than a coaching intervention"

suppression_conditions:
  - "Goal of the interaction is purely empathetic listening or holding space for the user's emotion"
  - "The data is not yet fully verified, or the sample size is too small to support a hard, irreversible stance"

misuse_modes:
  - "Weak Verbing — Using passive or process verbs (e.g., 'consider', 'explore') instead of performance verbs."
  - "Orphaned Data — Making a strong claim but failing to show the 'messy middle' data that justifies it."
  - "Multiple POVs — Crowding a single asset with multiple conflicting DataPOVs, destroying clarity."

synergizes_with:
  - "PRM-STR-011"  # Humanize Information
  - "PRM-PSY-001"  # Status Quo Disruption

conflicts_with:
  - "PRM-STR-001"  # Bird-by-Bird Framing (which favors emergent discovery over forced top-down claims)

