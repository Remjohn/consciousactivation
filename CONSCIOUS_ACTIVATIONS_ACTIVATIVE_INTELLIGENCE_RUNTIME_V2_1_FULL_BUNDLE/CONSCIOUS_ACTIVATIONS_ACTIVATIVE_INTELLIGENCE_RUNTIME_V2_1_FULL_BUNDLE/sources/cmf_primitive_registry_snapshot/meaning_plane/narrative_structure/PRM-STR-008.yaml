book_reference:
  title: "DataStory: Explain Data and Inspire Action Through Story"
  author: "Nancy Duarte"
  chapters:
    - "Chapter III: Crafting a Data Point of View"
    - "Chapter IV: Structuring an Executive Summary as a DataStory"
  key_pages: "The three verb modalities (Change, Continue, Finish) and the DataStory Arc"
  book_path: "lab/Public Speeaking Coaching/04_Storytelling_and_Narrative_Design/DataStory Explain Data and Inspire Action Through Story - Nancy Duarte.md"

summary: >
  Data Point of View (DataPOV) is a structural primitive that forces raw data to carry a stance,
  a consequence, and a required action. It prevents analytical output from being merely descriptive
  by wrapping the data into the third act of a story arc, turning numerical insight into a
  conviction-laden mandate for movement.

core_move: >
  Distill the analysis into a single, undeniable sentence driven by a high-stakes performance verb
  (Change, Continue, or Finish) that demands a specific future reality.

why_it_works: >
  Data inherently records the past, but leadership requires shaping the future. Duarte proves that
  presenting a "messy middle" (a problematic statistic) without a DataPOV leaves the brain in a
  state of unresolved tension or analytical paralysis. By supplying a DataPOV constructed around a
  strong performance verb, it provides the narrative resolution (the "third act") that the human
  brain naturally craves, converting passive observation into urgent action.

examples:
  - context: "BOOK: DataStory - The Narrative Spine"
    application: >
      Duarte argues that presenting a "messy middle" (a problematic statistic) without a DataPOV leaves the brain in analytical paralysis. A DataPOV wraps the data into a single undeniable sentence driven by a high-stakes performance verb (Change, Continue, Finish).
    effect: >
      Converts passive observation of numerical insight into an urgent, conviction-laden mandate for movement.

  - context: "CCP: CCF - Script Ideation"
    application: >
      Instead of generating a script about "housing market trends," the agent forces a DataPOV: "Because inventory is freezing, agents must centralize their spend on off-market acquisition."
    effect: >
      The hook immediately creates friction and relevance. It filters for high-affinity viewers ready to change behavior.

  - context: "CCP: CMF - Visual Sequencing"
    application: >
      The agent flags a slide titled "Q3 Client Retention" and forces a DataPOV rewrite: "Retention dropped 14%; we must rebuild the Day-7 onboarding sequence to stop the bleed."
    effect: >
      Cognitive load drops. The audience doesn't have to guess the chart's meaning; the visual hierarchy explicitly dictates the required action.

  - context: "CCP: V2WS - The Data Reveal"
    application: >
      When presenting a shocking statistic during the webinar, the host immediately follows it with a stark DataPOV, removing any ambiguity about what the audience must do next.
    effect: >
      Transforms a moment of realization into an immediate commitment to action, driving conversion.

  - context: "CCP: CBCS - Metric Review"
    application: >
      When presenting weekly analytics to a coach, the agent never simply lists numbers. It provides the data paired with a specific 'Change', 'Continue', or 'Finish' imperative.
    effect: >
      Prevents analysis paralysis and ensures the coach is always executing on the highest-leverage insight.

anti_examples:
  - description: >
      Presenting an overwhelming dashboard of metrics to a coaching client with the phrase,
      "Here is the data, let's look for interesting trends together."
    why_it_fails: >
      Without a DataPOV, the burden of interpretation is dumped on the audience. Duarte explicitly notes
      that executives (and users) are busy; presenting the "messy middle" without the "third act" resolution
      causes fatigue, not persuasion. The data becomes noise.

