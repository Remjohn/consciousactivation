requirements:
- fr_id: AIR-FR-001
  feature_id: F01
  feature_title: Constitutional Authority, Activation Domains, and Epistemic State
  title: Declare exactly one activation domain
  owning_product: Program Control
  primary_story_id: AIR-ST-01.01
  primary_tech_spec_id: TS-AIR-001
  requirement: Every activative program and semantic object shall declare exactly one primary activation domain—source,
    relationship, audience, campaign, or derivative—and may reference other domains only through typed handoffs.
  trigger_preconditions: A source, relationship, audience, or campaign request introduces a semantic claim or a
    change to an existing claim.
  required_output_transition: A versioned semantic object exists with one domain, field-level epistemic states,
    lineage, lifecycle status, and a non-compensable evaluation receipt.
  invariants: Source, relationship, and audience activation remain distinct programs. | Planned intent never becomes
    observed truth by implication. | Rejected and superseded claims remain available as negative and historical
    evidence. | Activative Contract Compiler is not represented as the Activative Intelligence Runtime.
  positive_given: A source, relationship, audience, or campaign request introduces a semantic claim or a change
    to an existing claim.
  positive_when: the Runtime performs **declare exactly one activation domain** under the active feature contract
  positive_then: 'Every activative program and semantic object shall declare exactly one primary activation domain—source,
    relationship, audience, campaign, or derivative—and may reference other domains only through typed handoffs,
    and the resulting state is eligible for the feature terminal condition: A versioned semantic object exists with
    one domain, field-level epistemic states, lineage, lifecycle status, and a non-compensable evaluation receipt.'
  adversarial_given: the input is stale, contradictory, unresolved, or cannot support the claimed state transition
  adversarial_then: typed blocker before downstream eligibility; no synthesized source truth or authority
  required_evidence: exact input object IDs, versions, hashes, and source references | the active contract, product
    owner, actor identity, and lifecycle transition | positive and adversarial validation results with immutable
    receipt identity
  downstream_consumer: F02
  downstream_failure: a planned assertion is presented downstream as observed human truth, corrupting every later
    activation and evaluation claim
  decision_ref: AIR-D006
  source_refs: SRC-AI2-001 | SRC-AHP-001 | SRC-DOCTRINE-001
  lifecycle: NEW_V2_1_OR_DEEPENED
