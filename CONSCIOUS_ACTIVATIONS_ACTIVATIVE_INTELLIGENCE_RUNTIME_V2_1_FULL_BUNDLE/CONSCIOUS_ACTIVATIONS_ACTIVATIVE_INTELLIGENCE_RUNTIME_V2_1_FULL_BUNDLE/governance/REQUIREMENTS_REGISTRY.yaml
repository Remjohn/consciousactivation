- fr_id: AIR-FR-013
  feature_id: F03
  feature_title: Activation Hypothesis Portfolio and Comparative Search
  title: Generate a strategically diverse hypothesis portfolio
  owning_product: Activative Intelligence Runtime
  primary_story_id: AIR-ST-03.01
  primary_tech_spec_id: TS-AIR-003
  requirement: The Runtime shall generate multiple eligible activation hypotheses that differ in psychological role,
    tension, direction, pressure path, primitive coalition, or relationship move rather than merely surface wording.
  trigger_preconditions: A broad signal, objective, and eligible source context are available.
  required_output_transition: A selected activation hypothesis is promoted into a planned program, while rejected
    and repaired candidates remain evidence.
  invariants: Candidate diversity must be strategic, not only random-seed variation. | Hard gates precede weighted
    comparison. | A decisive winner is not forced when the evidence remains ambiguous. | Rejected candidates remain
    retrievable as hard negatives.
  positive_given: A broad signal, objective, and eligible source context are available.
  positive_when: the Runtime performs **generate a strategically diverse hypothesis portfolio** under the active
    feature contract
