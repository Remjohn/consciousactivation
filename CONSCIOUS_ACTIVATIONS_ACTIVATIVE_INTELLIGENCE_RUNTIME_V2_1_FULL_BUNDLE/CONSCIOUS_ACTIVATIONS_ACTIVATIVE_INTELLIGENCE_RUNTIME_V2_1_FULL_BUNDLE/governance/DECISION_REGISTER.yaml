schema_version: ca-air-decision-register/v1
product: Conscious Activations Activative Intelligence Runtime
version: 2.1.0-draft
status: DRAFT_FOR_HUMAN_RATIFICATION
decisions:
- decision_id: AIR-D001
  title: Independent semantic runtime boundary
  decision: Activative Intelligence Runtime is a distinct product authority candidate and is not collapsed into
    the Builder, Pipeline, Interview Expression, Studio, VAE, or Delegation.
  status: PROPOSED_FOR_RATIFICATION
  scope: cross_feature
- decision_id: AIR-D002
  title: Psychological role inside tension
  decision: Audience-facing content is activative only when the viewer receives an explicit psychological role inside
    a source-backed tension.
  status: PROPOSED_FOR_RATIFICATION
  scope: cross_feature
- decision_id: AIR-D003
  title: Primitive-First production law
  decision: Exact Primitive Families, Bindings, coalition contracts, signatures, Edge Products, and evaluation receipts
    precede archetype and composition approval.
  status: PROPOSED_FOR_RATIFICATION
  scope: cross_feature
- decision_id: AIR-D004
  title: Final Script gate
  decision: An operator-approved Guest Voice DNA Final Script precedes composition for every content-bearing derivative.
  status: PROPOSED_FOR_RATIFICATION
  scope: cross_feature
- decision_id: AIR-D005
  title: Mandatory animation scene package
  decision: Every eligible Final Script compiles a reusable 2D Animation Scene Package; full rendering is demand-driven
    and does not activate Format 02.
  status: PROPOSED_FOR_RATIFICATION
  scope: cross_feature
- decision_id: AIR-D006
  title: Constitutional Authority, Activation Domains, and Epistemic State
  decision: The Runtime cannot activate, transform, or learn from a semantic object until it knows what kind of
    activation the object belongs to and what the available evidence permits the system to believe.
  status: PROPOSED_FOR_RATIFICATION
  scope: F01
  source_refs:
  - SRC-AI2-001
  - SRC-AHP-001
  - SRC-DOCTRINE-001
- decision_id: AIR-D007
  title: Identity, Context Premise, Resonance, and Matrix of Edging
  decision: Identity DNA and Context Premise do not become useful merely by coexisting. The Runtime must expose
    the broad signal, pressure field, resonance, contradiction, and role possibilities that can produce genuine
    expression.
  status: PROPOSED_FOR_RATIFICATION
  scope: F02
  source_refs:
  - SRC-INT-001
  - SRC-INT-002
  - SRC-MOE-001
  - SRC-BRAND-001
  - SRC-RSCS-001
  - SRC-CCV-001
- decision_id: AIR-D008
  title: Activation Hypothesis Portfolio and Comparative Search
  decision: A single first answer is a convergence accident. Activative Intelligence needs portfolios that vary
    role, tension, pressure, direction, primitive coalition, and relationship move while preserving hard source
    and authority constraints.
  status: PROPOSED_FOR_RATIFICATION
  scope: F03
  source_refs:
  - SRC-AI2-002
  - SRC-AHP-PORTFOLIO-001
  - SRC-CBAR-001
  - SRC-MOE-001
- decision_id: AIR-D009
  title: Primitive Family Registry and Primitive Binding
  decision: Primitives are the smallest reusable activation and experience behaviors. They are not visual decorations
    or prompt tips. A Primitive Binding states how one exact primitive applies to the current source, role, tension,
    archetype, and stage.
  status: PROPOSED_FOR_RATIFICATION
  scope: F04
  source_refs:
  - SRC-PRIM-001
  - SRC-PRIM-002
  - SRC-PRIM-003
  - SRC-MOE-001
- decision_id: AIR-D010
  title: Primitive Coalition Contract, Coalition Signature, Edge Product, and Steering Recipes
  decision: No single primitive constitutes the creative recipe. The coalition defines primary force, supporting
    behaviors, suppression, conflict, signature, Edge Product, and misuse risks. Steering Recipes are evidence-backed
    operationalizations of proven coalitions.
  status: PROPOSED_FOR_RATIFICATION
  scope: F05
  source_refs:
  - SRC-PRIM-001
  - SRC-PRIM-002
  - SRC-PRIM-003
  - SRC-MOE-001
  - SRC-AHP-F29-001
- decision_id: AIR-D011
  title: Archetype Coalition and Psychological Role Inside a Tension
  decision: Content activates when it gives the viewer a psychological role inside a tension. Archetypes are not
    content templates; they are interaction geometries that organize a Primitive coalition, role, tension, evidence,
    and sequence.
  status: PROPOSED_FOR_RATIFICATION
  scope: F06
  source_refs:
  - SRC-ARCH-001
  - SRC-ARCH-002
  - SRC-SDA-001
  - SRC-SFL-001
  - SRC-AHP-F28-001
- decision_id: AIR-D012
  title: Brand Genesis, Voice DNA, Visual DNA, and Distillation Layers
  decision: Brand Context, Voice DNA, and Visual DNA are versioned source systems, not aesthetic moodboards. RSCS
    distillation removes noise while retaining identity-bearing signal; CCV creates controlled diversity without
    random drift.
  status: PROPOSED_FOR_RATIFICATION
  scope: F07
  source_refs:
  - SRC-BRAND-001
  - SRC-RSCS-001
  - SRC-CCV-001
  - SRC-AHP-F30-001
- decision_id: AIR-D013
  title: Planned Activative Intelligence and Interview Asset Contracts
  decision: The Interview Asset Contract is the atomic source-activation program. It binds target state, pressure,
    anchors, branches, dose, landing, asset hypotheses, and evidence expectations before a question is delivered.
  status: PROPOSED_FOR_RATIFICATION
  scope: F08
  source_refs:
  - SRC-INT-001
  - SRC-INT-002
  - SRC-MOE-001
  - SRC-AI2-CONTRACT-001
- decision_id: AIR-D014
  title: Live Narrative State Induction and Interviewer Resonance
  decision: Narrative State Induction is a closed-loop policy. It observes the current expression state, compares
    it with the target, proposes the smallest useful Activative Call, calibrates pressure, and knows when to deepen,
    reset, land, or stop.
  status: PROPOSED_FOR_RATIFICATION
  scope: F09
  source_refs:
  - SRC-INT-001
  - SRC-INT-002
  - SRC-MOE-001
  - SRC-AI2-LIVE-001
- decision_id: AIR-D015
  title: Reaction Observation and Reaction Receipts
  decision: A response is not only its transcript. Latency, silence, breath, laughter, gaze, posture, correction,
    contradiction, voice change, and reaction tail can be decisive evidence. Null activation is also evidence.
  status: PROPOSED_FOR_RATIFICATION
  scope: F10
  source_refs:
  - SRC-AI2-REACTION-001
  - SRC-INT-001
  - SRC-SOURCE-FIRST-001
- decision_id: AIR-D016
  title: Expression Moments and Observed Activative Intelligence
  decision: An Expression Moment is not a catchy sentence. It is a bounded unit of real expression whose premise,
    reaction, context, identity role, and route potential survive extraction.
  status: PROPOSED_FOR_RATIFICATION
  scope: F11
  source_refs:
  - SRC-AI2-EXPRESSION-001
  - SRC-SOURCE-FIRST-001
  - SRC-INT-002
- decision_id: AIR-D017
  title: Canonical Interview Source Package and Dual Admission
  decision: The canonical source package is the trusted root of interview-derived production. It binds media, transcript,
    speakers, timestamps, tags, reactions, moments, keyframes, provenance, operator source authority, and route
    scope.
  status: PROPOSED_FOR_RATIFICATION
  scope: F12
  source_refs:
  - SRC-SOURCE-FIRST-001
  - SRC-AI2-SOURCE-001
  - SRC-INT-001
- decision_id: AIR-D018
  title: Campaign Activation, Freshness, and Audience Reaction
  decision: An asset can be activative in isolation and stale inside a campaign. Campaign intelligence manages sequence,
    recurrence, relief, escalation, role diversity, and exposure while audience reaction remains a separate evidence
    domain.
  status: PROPOSED_FOR_RATIFICATION
  scope: F13
  source_refs:
  - SRC-AI2-CAMPAIGN-001
  - SRC-AHP-F23-001
  - SRC-CCV-001
- decision_id: AIR-D019
  title: Relationship Activation and ReelCast Progression
  decision: Relationship activation asks what smallest useful move makes the next relationship state possible. It
    uses recognition, resonance, participation, evidence, and delivery rather than a universal funnel script.
  status: PROPOSED_FOR_RATIFICATION
  scope: F14
  source_refs:
  - SRC-AI2-REL-001
  - SRC-INT-001
  - SRC-MOE-001
- decision_id: AIR-D020
  title: Derivative Activation Programs, Guest Voice DNA Final Scripts, and Mandatory Animation Scene Packages
  decision: Quotes and Expression Moments are ingredients, not final scripts. JIT Skill writers and Composers transform
    approved source material through Voice DNA, Primitive coalitions, archetype geometry, and operator approval
    before composition.
  status: PROPOSED_FOR_RATIFICATION
  scope: F15
  source_refs:
  - SRC-AHP-F25-001
  - SRC-AHP-F28-001
  - SRC-BRAND-001
  - SRC-ARCH-001
- decision_id: AIR-D021
  title: Activation Transfer Fidelity and Source Fidelity
  decision: Activation can decay at every handoff. An Activation Transfer Contract states what produced the original
    charge, what must survive, what may change, which role must remain available, and what would destroy the intended
    activation.
  status: PROPOSED_FOR_RATIFICATION
  scope: F16
  source_refs:
  - SRC-AI2-TRANSFER-001
  - SRC-AHP-F16-001
  - SRC-SOURCE-FIRST-001
- decision_id: AIR-D022
  title: Visual Activation, Composition-Before-Editing, and Production Handoff
  decision: Visual generation is downstream of Visual Research, Real-Life Reference, Visual DNA, and Composition.
    Editing should realize an approved composition program, not discover the meaning by moving assets until something
    looks polished.
  status: PROPOSED_FOR_RATIFICATION
  scope: F17
  source_refs:
  - SRC-AI2-VISUAL-001
  - SRC-AHP-F09-001
  - SRC-AHP-F15-001
  - SRC-VISUAL-DOCTRINE-001
- decision_id: AIR-D023
  title: Human Resolution Episodes and Scoped Learning
  decision: Human corrections are not chat residue. They are high-value evidence about wrong readings, taste boundaries,
    responsible layers, exact changes, and applicability. Capture is automatic; promotion is governed and scoped.
  status: PROPOSED_FOR_RATIFICATION
  scope: F18
  source_refs:
  - SRC-AI2-HRE-001
  - SRC-STUDIO-AMENDMENT-001
  - SRC-AHP-F26-001
- decision_id: AIR-D024
  title: Failure Attribution, Selective Repair, and JIT Role Capsules
  decision: “Rewrite the prompt” is not a repair architecture. The Runtime must locate the authoritative defect,
    protect valid upstream objects, compile a bounded repair, and preserve explicit Hunter, Analyst, Composer, and
    Commander responsibilities.
  status: PROPOSED_FOR_RATIFICATION
  scope: F19
  source_refs:
  - SRC-AI2-REPAIR-001
  - SRC-AHP-F16-001
  - SRC-AHP-F03-001
- decision_id: AIR-D025
  title: Programmed Models, Independent Evaluation, Product Integration, and Evidence Promotion
  decision: A Programmed Model is a versioned learned capability claim inside a governed harness. It is not Activative
    authority. Better harnesses, retrieval, Skills, Primitive coalitions, and execution bindings should carry stable
    task difficulty before larger models or new training are used.
  status: PROPOSED_FOR_RATIFICATION
  scope: F20
  source_refs:
  - SRC-AI2-MODEL-001
  - SRC-AHP-MODEL-001
  - SRC-HARNESS-RESEARCH-001
  - SRC-RECENT-001
