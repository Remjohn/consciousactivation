schema_version: ai-v2-counteractivation/v1
version: 2.0.0
types:
  denial:
    signal: rejects relevance
    recovery:
    - counterexample
    - lower_dose
  reactance:
    signal: resists being directed
    recovery:
    - restore_choice
    - question_back
  projection:
    signal: maps only to others
    recovery:
    - gentle_self_location
  shame_shutdown:
    signal: withdrawal_or_minimal_reply
    recovery:
    - affinity_reset
    - stop
  tribal_defense:
    signal: protects_group_identity
    recovery:
    - broaden_frame
    - shared_value
  target_fixation:
    signal: accusation_without_reflection
    recovery:
    - reintroduce_mirror_or_cost
  performative_agreement:
    signal: fast_agreement_no_specificity
    recovery:
    - scene_or_example
  misrecognition:
    signal: dominant_wrong_reading
    recovery:
    - repair_carrier_or_frame
