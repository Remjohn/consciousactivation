register_id: DELEGATION-CONTRACT-OWNERSHIP-001
version: 1.1.0-rc.2
status: constitutionally_aligned_local_candidate
created: 2026-07-14
schema_owner: delegation_protocol
authority_model:
  schema_ownership: The Delegation Protocol owns public schema shape, identifiers, versions and compatibility classification.
  value_authority: Each payload field is authored only by the principal named for that field or field group.
  validation: The Delegation Protocol validates authority but does not acquire the field's product authority.
  references: Referenced immutable facts retain the authority of their source owner.
  derived_data: A derived fact must name its derivation owner and may not overwrite its authoritative input.
  open_objects: Wildcard ownership below is provisional; open public object shapes must be closed or governed before contract freeze.
