scenario_id: SCN-02
title: Atomic multi-asset Delegation Set
purpose: Proves character, environment and prop coordination with set-level completion.
contracts:
- type: delegation-set
  example_ref: ../../../contracts/examples/delegation-set.example.yaml
- type: visual-asset-demand
  example_ref: ../../../contracts/examples/visual-asset-demand.example.yaml
- type: visual-asset-submission
  example_ref: ../../../contracts/examples/visual-asset-submission.example.yaml
- type: submission-receipt
  example_ref: ../../../contracts/examples/submission-receipt.example.yaml
- type: asset-result-contract
  example_ref: ../../../contracts/examples/asset-result-contract.example.yaml
- type: result-acknowledgement
  example_ref: ../../../contracts/examples/result-acknowledgement.example.yaml
