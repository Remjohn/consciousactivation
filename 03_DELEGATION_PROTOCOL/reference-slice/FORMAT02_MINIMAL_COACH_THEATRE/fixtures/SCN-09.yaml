- reaction_receipt_refs_preserved
- expression_moment_refs_preserved
- wrong_reading_locks_preserved_and_non_empty
- legacy_aliases_absent_from_target
- migration_receipt_pins_source_and_target_hashes
- parse_only_or_missing_evaluator_support_is_incompatible
