version: 1.0.0-draft
assumptions:
- id: A-01
  statement: The validated Builder and Visual Asset Editor PRDs remain authoritative upstream architecture sources.
  status: accepted
  owner: product governance
- id: A-02
  statement: The first production cross-product reference slice is Format 02 Minimal Coach Theatre.
  status: accepted
  owner: Release 1
- id: A-03
  statement: The Content Harness and VAE will have independently authenticated product identities.
  status: architecture_required
  owner: security architecture
- id: A-04
  statement: Large assets and canonical contracts will reside in governed storage reachable through stable references
    and hashes.
  status: architecture_required
  owner: data architecture
- id: A-05
  statement: The shared protocol may use HTTP, queues, event streams, or local fixtures without changing semantics.
  status: accepted
  owner: protocol architecture
- id: A-06
  statement: Final public schemas from the VAE PRD remain provisional until this protocol package validates them.
  status: accepted
  owner: delegation product
- id: A-07
  statement: Exact SLO thresholds will be tuned in Architecture and benchmark phases.
  status: open_non_blocking
  owner: operations
- id: A-08
  statement: Cryptographic algorithms and key-management implementation remain Architecture decisions, while identity/integrity
    behavior is a product requirement.
  status: accepted
  owner: security architecture
- id: A-09
  statement: Published media cannot be silently rewritten by protocol invalidation or replacement.
  status: accepted
  owner: Content Harness
- id: A-10
  statement: A complete shared conformance suite will be executable by both reference product implementations before
    authorization.
  status: implementation_gate
  owner: cross-product engineering
