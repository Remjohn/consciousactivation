- id: FR-119
  feature_id: F15
  title: Resilience and fault-injection tests
  requirement: The suite shall inject duplicate/out-of-order messages, bus interruption, service restart, audit-store interruption,
    timeouts, and delayed acknowledgement.
  consequences:
  - No duplicate production or illegal state results.
  - Recovery receipts identify actions.
  failure_examples:
  - Boundary restart loses correlations.
  decision_id: D015
  journeys: *id015
  nfr_refs:
  - NFR-OBS-001
  - NFR-PERF-002
  - NFR-RES-003
  - NFR-GOV-006
- id: FR-120
  feature_id: F15
  title: Format 02 end-to-end conformance
  requirement: Release 1 shall include single-asset, Delegation Set, supersession, escalation, amendment, cancellation, acknowledgement,
    invalidation/replacement, authority, and migration scenarios for Minimal Coach Theatre.
  consequences:
  - All scenarios are automated and traceable to requirements.
  - Downstream Remotion consumption is represented.
  failure_examples:
  - Format 02 certification covers only one successful asset.
  decision_id: D015
  journeys: *id015
  nfr_refs:
  - NFR-OBS-001
  - NFR-PERF-002
  - NFR-RES-003
  - NFR-GOV-006
- id: FR-121
  feature_id: F16
  title: Architecture-preservation gate
  requirement: Implementation authorization shall require a passing machine-readable preservation check against the validated
    Builder, Content Harness, and VAE authority boundaries.
  consequences:
  - Conflicts block authorization.
  - Amendment routes are documented.
  failure_examples:
  - A protocol service acquires creative ranking authority.
  decision_id: D016
  journeys: *id016
  nfr_refs:
  - NFR-GOV-001
  - NFR-GOV-006
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-122
  feature_id: F16
  title: Decision and requirements completeness
  requirement: All 16 decisions, FRs, NFRs, non-goals, traceability, glossary, assumptions, and success metrics shall be complete
    and mechanically validated.
  consequences:
  - No orphan requirement remains.
  - Open blockers are explicit.
  failure_examples:
  - Implementation starts from conversation notes only.
  decision_id: D016
  journeys: *id016
  nfr_refs:
  - NFR-GOV-001
  - NFR-GOV-006
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-123
  feature_id: F16
  title: Shared contract-family gate
  requirement: All required message schemas, examples, owners, versions, and registry entries shall validate before authorization.
  consequences:
  - Representative positive and negative fixtures exist.
  - Provisional contracts are marked accurately.
  failure_examples:
  - The result-acknowledgement contract is designed during coding.
  decision_id: D016
  journeys: *id016
  nfr_refs:
  - NFR-GOV-001
  - NFR-GOV-006
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-124
  feature_id: F16
  title: Authority and lifecycle executable proof
  requirement: The Authority Matrix and Lifecycle Machine shall be executable and pass prohibited-action and illegal-transition
    tests.
  consequences:
  - Field-level authority is covered.
  - Every exceptional path has a terminal or recovery route.
  failure_examples:
  - Authority exists only as prose.
  decision_id: D016
  journeys: *id016
  nfr_refs:
  - NFR-GOV-001
  - NFR-GOV-006
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-125
  feature_id: F16
  title: Compatibility and integrity proof
  requirement: At least one reference Content Harness and VAE compatibility manifest, negotiation, adapter, migration, signature,
    replay, and audit-chain path shall pass.
  consequences:
  - Pinned versions are demonstrated.
  - Failure cases are included.
  failure_examples:
