  feature_id: F16
  title: Staged certification states
  requirement: The protocol shall progress through PRD approval, Architecture, contract validation, cross-product fixtures,
    passing conformance, implementation authorization, Format 02 certification, and production certification.
  consequences:
  - No state is skipped silently.
  - Certification scope and limitations are explicit.
  failure_examples:
