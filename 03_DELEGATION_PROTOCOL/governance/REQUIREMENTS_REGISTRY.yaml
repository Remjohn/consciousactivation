functional_requirements:
- id: FR-001
  feature_id: F01
  title: Canonical delegation boundary
  requirement: The system shall expose a versioned Delegation Protocol as the sole supported production boundary between registered
    Content Harnesses and registered Visual Asset Editors.
  consequences:
  - A conformant submission enters through a registered protocol endpoint or transport adapter.
  - Direct unvalidated production invocation is rejected and receipted.
  failure_examples:
  - A harness calls a ComfyUI worker directly and bypasses authority validation.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-002
  feature_id: F01
  title: Deterministic boundary responsibilities
  requirement: The protocol shall deterministically perform schema validation, authority validation, compatibility negotiation,
    idempotency resolution, lifecycle validation, routing, and audit persistence.
  consequences:
  - Each responsibility emits a machine-readable result.
  - No model judgment is required for a valid/invalid boundary decision.
  failure_examples:
  - An LLM decides whether an unsupported contract version is acceptable.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-003
  feature_id: F01
  title: No third creative authority
  requirement: The protocol shall not originate, reinterpret, rank, or amend semantic intent, Activative purpose, sequence
    role, composition intent, or visual-production strategy.
  consequences:
  - Protocol outputs contain only validations, projections, receipts, and routed product messages.
  - A creative change is rejected unless authored by the owning product.
  failure_examples:
  - The boundary service rewrites a character action to improve feasibility.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-004
  feature_id: F01
  title: Independent product preservation
  requirement: The protocol shall preserve independent versioning, deployment, state machines, and internal implementation
    authority for the Content Harness and Visual Asset Editor.
  consequences:
  - Internal VAE node names are not required in the public lifecycle.
  - A VAE patch can deploy without a Builder release when contracts remain compatible.
  failure_examples:
  - The shared protocol requires identical product version numbers.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-005
  feature_id: F01
  title: Canonical shared ABI
  requirement: The protocol shall publish a machine-readable registry of every supported message type, version, producer,
    consumer, and authority scope.
  consequences:
  - Unregistered message types are rejected.
  - The registry identifies the canonical schema URI and hash.
  failure_examples:
  - A product invents a new status payload without registration.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-006
  feature_id: F01
  title: Boundary receipts
  requirement: Every accepted or rejected boundary action shall emit an immutable validation or audit receipt linked to the
    triggering message.
  consequences:
  - The receipt records every performed validation.
  - Rejected messages do not mutate lifecycle state.
  failure_examples:
  - A malformed submission is only written to an application log.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-007
  feature_id: F01
  title: Transport independence
  requirement: The protocol shall preserve identical semantics across supported HTTP, queue, event-stream, local-process,
    and fixture transports.
  consequences:
  - Transport adapters pass the same conformance suite.
  - No transport may weaken integrity or authority checks.
  failure_examples:
  - Local file fixtures bypass signature and lifecycle validation in production mode.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-008
  feature_id: F01
  title: Architecture-preservation enforcement
  requirement: The protocol shall evaluate proposed schemas and services against the frozen Builder and Visual Asset Editor
    Architecture Preservation Contracts.
  consequences:
  - A conflicting change produces an upstream amendment requirement.
  - The preservation check is a release hard gate.
  failure_examples:
  - A delegation release locally changes Content Harness semantic authority.
  decision_id: D001
  journeys: *id001
  nfr_refs:
  - NFR-GOV-001
  - NFR-REL-001
  - NFR-TRACE-001
  - NFR-SEC-001
- id: FR-009
  feature_id: F02
  title: Exclusive demand ownership
  requirement: Only the registered owning Content Harness shall create or supersede authoritative Visual Asset Demand versions.
  consequences:
  - The demand owner is recorded in the envelope and payload.
  - Submissions from non-owners are rejected as authority failures.
  failure_examples:
  - The VAE publishes a modified demand as authoritative.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-010
  feature_id: F02
  title: Immutable accepted demand
  requirement: An accepted demand version shall be immutable and addressed by request ID, version, payload hash, and canonical
    reference.
  consequences:
  - In-place updates are rejected.
  - Every execution pins the exact accepted demand identity.
  failure_examples:
  - A database row is overwritten while production is in progress.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-011
  feature_id: F02
  title: Field-level authority map
  requirement: Every authoritative demand field shall map to an owner and authority class covering Activative semantic lineage,
    Activation Contract, Expression Moment lineage, Visual Semantics, Visual Narrative, Feature Contracts, somatic route,
    sequence, composition, identity, continuity, wrong-reading locks, delivery, and budget domains.
  consequences:
  - The boundary can reject an unauthorized field change deterministically.
  - Unknown authoritative fields block acceptance until registered.
  failure_examples:
  - An adapter drops a wrong-reading lock, Expression Moment reference, recognition carrier, viewer role, or Visual Narrative
    field because it does not recognize the field.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-012
  feature_id: F02
  title: Optional notes separation
  requirement: Free-form notes shall be treated as non-authoritative enrichment and shall never override typed demand fields.
  consequences:
  - Conflicts are resolved in favor of typed fields.
  - Notes are preserved with provenance for specialist context.
  failure_examples:
  - A note saying 'ignore the BBOX' changes the composition contract.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-013
  feature_id: F02
  title: Permitted derived artifacts
  requirement: The VAE may derive Visual Production Plans, geometry recommendations, feasibility reports, evaluations, and
    amendment proposals without acquiring demand ownership.
  consequences:
  - Derived artifacts cite the exact demand version.
  - They declare their own producer and authority.
  failure_examples:
  - A production plan is presented as a new demand version.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-014
  feature_id: F02
  title: Amendment-only feedback
  requirement: Any VAE-requested change to a demand-owned field shall be expressed through a typed non-binding Amendment Proposal.
  consequences:
  - No accepted demand is changed by the proposal.
  - The Content Harness may accept, reject, or supersede.
  failure_examples:
  - The VAE relaxes continuity because generation is difficult.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-015
  feature_id: F02
  title: Demand identity propagation
  requirement: Every submission, event, result, failure, amendment, and receipt shall carry or resolve to the exact demand
    ID, version, and hash.
  consequences:
  - Stale events can be detected.
  - Audit reconstruction identifies the governing demand.
  failure_examples:
  - A result identifies only the request ID, not the demand version.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-016
  feature_id: F02
  title: No implicit authority transfer
  requirement: Submission, acceptance, execution, or budget escalation shall not transfer semantic or composition authority
    to the VAE or protocol.
  consequences:
  - Authority remains stable through the lifecycle.
  - Any proposed ownership change requires upstream governance.
  failure_examples:
  - The service assumes that production acceptance makes it owner of the composition role.
  decision_id: D002
  journeys: *id002
  nfr_refs:
  - NFR-AUTH-001
  - NFR-CONTRACT-001
  - NFR-TRACE-002
  - NFR-GOV-002
- id: FR-017
  feature_id: F03
  title: Common delegation envelope
  requirement: Every protocol message shall use a common envelope containing protocol version, message type/version, IDs,
    sender, recipient, authority scope, timestamps, idempotency, hashes, and payload reference.
  consequences:
  - Envelope validation precedes payload routing.
  - All message types share stable correlation semantics.
  failure_examples:
  - One message omits sender authority because it travels on an internal queue.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-018
  feature_id: F03
  title: Single-purpose immutable payloads
  requirement: Each lifecycle action shall use an immutable payload dedicated to one purpose rather than a shared mutable
    delegation record.
  consequences:
  - Submission and cancellation are separate messages.
  - History is reconstructed from messages, not overwritten state.
  failure_examples:
  - A single JSON object is edited by both products.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-019
  feature_id: F03
  title: Correlation and causation
  requirement: Messages shall identify correlation ID and, when caused by another message, causation ID.
  consequences:
  - A complete delegation chain can be traversed.
  - Retries remain distinguishable from new actions.
  failure_examples:
  - An amendment response cannot be tied to its proposal.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-020
  feature_id: F03
  title: Authority-scoped envelope
  requirement: The envelope shall declare the authority exercised by the sender, and the boundary shall validate it against
    the principal registry.
  consequences:
  - Unauthorized action is rejected before payload effects.
  - Authority evidence is retained in audit receipts.
  failure_examples:
  - A Content Harness emits a production-acceptance message.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-021
  feature_id: F03
  title: Reference-and-hash payload transport
  requirement: Large or canonical payloads shall be exchanged through stable references plus content hashes rather than duplicated
    mutable bodies.
  consequences:
  - Recipients verify payload integrity.
  - Object storage and contract storage remain decoupled from messaging.
  failure_examples:
  - A video binary is embedded in an event message.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-022
  feature_id: F03
  title: Independent message versioning
  requirement: Protocol, envelope, and payload message types shall be independently versioned under governed compatibility
    rules.
  consequences:
  - An optional event extension does not force a major protocol version.
  - Pinned delegations retain their negotiated versions.
  failure_examples:
  - All contracts inherit the product version number.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-023
  feature_id: F03
  title: Mandatory semantic-field protection
  requirement: Unknown or unsupported mandatory fields shall block compatibility rather than be silently ignored.
  consequences:
  - Required-feature support is negotiated.
  - Loss of authority-bearing fields produces INCOMPATIBLE.
  failure_examples:
  - A consumer ignores a required continuity constraint.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-024
  feature_id: F03
  title: Message Type Registry
  requirement: The protocol shall maintain a canonical registry for message names, schemas, owners, lifecycle effects, idempotency
    behavior, and compatibility status.
  consequences:
  - Every schema in the package has a registry entry.
  - Deprecated types list replacements and timelines.
  failure_examples:
  - A new cancellation variant is deployed without registry metadata.
  decision_id: D003
  journeys: *id003
  nfr_refs:
  - NFR-CONTRACT-001
  - NFR-SEC-002
  - NFR-TRACE-003
  - NFR-COMPAT-001
- id: FR-025
  feature_id: F04
  title: Canonical external states
  requirement: The protocol shall define stable states including DRAFT, SUBMITTED, ACCEPTED, IN_PROGRESS, RESULT_READY, COMPLETED,
    and governed exceptional states.
  consequences:
  - States have explicit definitions and owners.
  - Arbitrary product status strings cannot become protocol state.
  failure_examples:
  - The public lifecycle exposes 'model_loading_flux'.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-026
  feature_id: F04
  title: Authoritative state projection
  requirement: A shared-state change shall be derived only from an accepted authoritative product message mapped through a
    registered projection rule.
  consequences:
  - The protocol never invents progress.
  - Projection records the source message.
  failure_examples:
  - The boundary marks RESULT_READY because a timeout estimate elapsed.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-027
  feature_id: F04
  title: Transition validation
  requirement: Every state transition shall be checked against a deterministic lifecycle machine before persistence.
  consequences:
  - Illegal forward and backward transitions are rejected.
  - Transition receipts record from-state, to-state, and rule.
  failure_examples:
  - COMPLETED transitions directly back to IN_PROGRESS.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-028
  feature_id: F04
  title: Terminal-state enforcement
  requirement: Terminal states shall reject ordinary progress messages and require explicit post-completion notice types for
    invalidation, revocation, or replacement.
  consequences:
  - Late events do not reopen completed delegations.
  - Post-completion governance remains auditable.
  failure_examples:
  - A late candidate event changes a completed result.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-029
  feature_id: F04
  title: Exceptional lifecycle paths
  requirement: The lifecycle shall govern rejection, amendment, supersession, budget approval, capability gap, human review,
    cancellation, partial result, invalidation, revocation, and replacement.
  consequences:
  - Each exception has allowed entry and exit transitions.
  - Decision authority is explicit.
  failure_examples:
  - CAPABILITY_GAP is emitted as an arbitrary string with no next action.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-030
  feature_id: F04
  title: Timeout semantics
  requirement: The protocol shall distinguish target miss, heartbeat loss, production estimate overrun, approval timeout,
    hard cutoff, and expiry.
  consequences:
  - Timeouts emit typed events.
  - Timeout does not silently lower quality or cancel unless policy says so.
  failure_examples:
  - A soft deadline automatically accepts a degraded candidate.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-031
  feature_id: F04
  title: Lifecycle reconstruction
  requirement: The current projection shall be reproducible from the accepted append-only message and audit sequence.
  consequences:
  - Projection rebuild matches stored state.
  - Corrupt projections can be repaired without product mutation.
  failure_examples:
  - The lifecycle exists only as a mutable row with no event history.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-032
  feature_id: F04
  title: Lifecycle receipts and observability
  requirement: Each accepted transition shall emit a lifecycle receipt and update the Control Tower projection within the
    defined freshness SLO.
  consequences:
  - Operators can identify the latest authoritative cause.
  - Stalled states are detectable.
  failure_examples:
  - A transition occurs without an observable event or receipt.
  decision_id: D004
  journeys: *id004
  nfr_refs:
  - NFR-LIFE-001
  - NFR-REL-002
  - NFR-OBS-001
  - NFR-TRACE-004
- id: FR-033
  feature_id: F05
  title: Explicit supersession link
  requirement: A new demand version shall explicitly identify the prior version it supersedes and shall be authored by the
    owning Content Harness.
  consequences:
  - The old version enters SUPERSEDED through a valid message.
  - Unlinked replacement submissions are treated as separate demands.
  failure_examples:
  - The same request ID is reused with a new body and no version link.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-034
  feature_id: F05
  title: Typed changed-field declaration
  requirement: The supersession message shall enumerate changed field paths, change classes, and unchanged authority domains.
  consequences:
  - Impact analysis can distinguish meaning, composition, delivery, and execution-policy changes.
  - False unchanged declarations are detected against payload diffs.
  failure_examples:
  - A semantic action changes but the message claims 'delivery only'.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-035
  feature_id: F05
  title: Supersession authority validation
  requirement: The boundary shall validate that every changed field is owned by the sender and allowed in a superseding demand.
  consequences:
  - Unauthorized changes are rejected.
  - Constitutional changes route upstream.
  failure_examples:
  - A composition runtime changes a wrong-reading lock.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-036
  feature_id: F05
  title: Selective invalidation request
  requirement: The protocol shall request a VAE impact analysis that identifies reusable outputs, invalidated outputs, affected
    nodes, and safe resume point.
  consequences:
  - The result is typed and linked to the new demand.
  - Uncertainty blocks unsafe reuse.
  failure_examples:
  - The protocol itself guesses which ComfyUI nodes can be reused.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-037
  feature_id: F05
  title: Stale-promotion prevention
  requirement: Once supersession is accepted, no asset result produced solely against the old demand may be promoted as satisfying
    the new version without revalidation.
  consequences:
  - Old results remain historical.
  - The lifecycle projection blocks stale acknowledgement.
  failure_examples:
  - An old result arrives late and is automatically consumed.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-038
  feature_id: F05
  title: Reusable-work preservation
  requirement: The protocol shall preserve immutable evidence and VAE-certified reusable outputs that remain valid under the
    declared change set.
  consequences:
  - Identity references may survive a composition change.
  - Preserved artifacts retain original lineage.
  failure_examples:
  - Every new version forces complete asset regeneration.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-039
  feature_id: F05
  title: Resumable execution correlation
  requirement: A resumed execution shall link the prior execution, new demand, invalidation receipt, and new Visual Production
    Plan version.
  consequences:
  - Audit can explain exactly what was reused.
  - Budget accounting distinguishes prior and resumed work.
  failure_examples:
  - A new run silently copies files from the old run.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-040
  feature_id: F05
  title: Completed-result revalidation
  requirement: A completed result affected by supersession shall enter revalidation or replacement handling rather than being
    deleted or silently retained as current.
  consequences:
  - Downstream consumers receive an invalidation notice.
  - Published historical uses remain reproducible.
  failure_examples:
  - A previously consumed asset reference is overwritten.
  decision_id: D005
  journeys: *id005
  nfr_refs:
  - NFR-LIFE-002
  - NFR-REL-003
  - NFR-TRACE-005
  - NFR-CONTRACT-002
- id: FR-041
  feature_id: F06
  title: VAE production acceptance authority
  requirement: Only the VAE shall assert production acceptance for assets that passed its certified evaluation and delivery
    gates.
  consequences:
  - Result contracts reference evaluation and production receipts.
  - The protocol validates VAE authority.
  failure_examples:
  - The Content Harness marks a raw candidate as production accepted.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-042
  feature_id: F06
  title: Consumption acknowledgement authority
  requirement: Only the owning Content Harness or authorized composition runtime shall acknowledge downstream consumption
    compatibility.
  consequences:
  - Acknowledgement identifies current demand, sequence, and composition versions.
  - The result is not consumable before acknowledgement.
  failure_examples:
  - The VAE unilaterally inserts an asset into Remotion.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-043
  feature_id: F06
  title: Automatic acknowledgement
  requirement: The Content Harness shall automatically acknowledge results when demand identity, dependencies, role, geometry,
    receipts, references, and non-supersession checks pass.
  consequences:
  - Routine completion requires no human.
  - Each check is machine-readable.
  failure_examples:
  - An operator must click approve for every accepted character pose.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-044
  feature_id: F06
  title: Stable rejection taxonomy
  requirement: A result rejection shall use protocol codes such as stale version, missing receipt, incompatible geometry,
    unavailable asset, or invalidated dependency.
  consequences:
  - Rejection identifies the next action.
  - Unstructured aesthetic preference is not a valid rejection.
  failure_examples:
  - The harness returns 'I don't like it'.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-045
  feature_id: F06
  title: No duplicate visual evaluation
  requirement: The Content Harness shall not re-run the VAE's full semantic, Activative, or visual-quality evaluation as part
    of acknowledgement.
  consequences:
  - Only downstream compatibility is checked.
  - Quality disputes route through demand amendment or evaluator-dispute flows.
  failure_examples:
  - The harness launches a second general VLM and overrides the certified evaluator.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-046
  feature_id: F06
  title: Current dependency verification
  requirement: Acknowledgement shall validate the result against current demand, sequence, composition, category profile,
    and required upstream dependencies.
  consequences:
  - Stale composition geometry is detected.
  - Pinned versions appear in the receipt.
  failure_examples:
  - A result is consumed after the scene layout changed.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-047
  feature_id: F06
  title: Immutable acknowledgement record
  requirement: Acknowledgement or rejection shall be an immutable message linked to the exact result and downstream state.
  consequences:
  - Repeated identical acknowledgement is idempotent.
  - Later invalidation creates a new notice.
  failure_examples:
  - An acknowledgement field is toggled in place.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-048
  feature_id: F06
  title: Completion after acknowledgement
  requirement: The shared lifecycle shall reach COMPLETED only after a valid production-accepted result is acknowledged or
    a declared terminal partial-completion policy is satisfied.
  consequences:
  - RESULT_READY remains non-terminal.
  - Completion receipts identify consumed assets.
  failure_examples:
  - The protocol marks complete as soon as the VAE finishes packaging.
  decision_id: D006
  journeys: *id006
  nfr_refs:
  - NFR-AUTH-002
  - NFR-LIFE-003
  - NFR-COMPAT-002
  - NFR-REL-004
- id: FR-049
  feature_id: F07
  title: Budget-envelope ownership
  requirement: The Content Harness shall authorize the Budget Program, policy priority, cost/time/GPU ceilings, experimental
    policy, and escalation rules.
  consequences:
  - Authorization is signed and versioned.
  - Unauthorized Premium or Capability Learning requests are rejected.
  failure_examples:
  - The VAE chooses an unlimited budget based on asset importance.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-050
  feature_id: F07
  title: VAE allocation autonomy
  requirement: The VAE may allocate candidate count, parallelism, workflows, providers, models, evaluators, and repairs inside
    the authorized envelope.
  consequences:
  - Internal choices need not be specified by the harness.
  - Actual usage remains observable.
  failure_examples:
  - The harness dictates exact GPU model and seed count in the shared contract.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-051
  feature_id: F07
  title: Budget Program validation
  requirement: The protocol shall validate selected programs against the canonical registry, caller authority, category certification,
    and supported VAE capabilities.
  consequences:
  - Unknown or incompatible programs block acceptance.
  - Custom programs require complete bounds.
  failure_examples:
  - A free-form 'ultra' budget string is accepted.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-052
  feature_id: F07
  title: Typed escalation request and response
  requirement: Predicted budget insufficiency shall produce a typed escalation with evidence, requested extension, expected
    outcome, and alternatives.
  consequences:
  - Approval creates a new immutable authorization version.
  - Denial preserves checkpointed work.
  failure_examples:
  - The editor silently spends above the ceiling then reports it.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-053
  feature_id: F07
  title: No silent overrun
  requirement: The boundary shall prevent starting work that would exceed a hard authorized ceiling without an accepted extension.
  consequences:
  - The execution enters COST_APPROVAL_REQUIRED.
  - No new expensive nodes begin while awaiting approval.
  failure_examples:
  - A third-party provider invoice exceeds the ceiling because actual use was not checked.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-054
  feature_id: F07
  title: Capability Learning authorization
  requirement: Transition into a Capability Learning purpose shall require explicit Content Harness policy or operator authority.
  consequences:
  - Ordinary production cannot silently become experimentation.
  - Learning receipts state controlled variables.
  failure_examples:
  - A failed image triggers a 30-candidate experiment automatically.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-055
  feature_id: F07
  title: Quality-gate preservation
  requirement: Budget exhaustion or deadline pressure shall not permit the protocol or VAE to lower constitutional quality
    gates without a new authorized demand or degradation decision.
  consequences:
  - Stopping without an asset is permitted.
  - A passing existing candidate may be returned.
  failure_examples:
  - The system accepts a wrong action to remain under budget.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-056
  feature_id: F07
  title: Final budget receipt
  requirement: Every terminal delegation shall include authorization versions, actual spend, GPU/time usage, candidate counts,
    repairs, compliance, and avoided cost where measurable.
  consequences:
  - Receipt reconciles to VAE execution data.
  - Control Tower exposes budget state.
  failure_examples:
  - Only estimated cost is retained after completion.
  decision_id: D007
  journeys: *id007
  nfr_refs:
  - NFR-AUTH-003
  - NFR-PERF-001
  - NFR-TRACE-005
  - NFR-GOV-003
- id: FR-057
  feature_id: F08
  title: Cancellation authority
  requirement: The owning Content Harness or authorized operator policy shall be able to request cancellation of a delegation
    or permitted Delegation Set scope.
  consequences:
  - Authority is validated before state change.
  - Unauthorized cancellation is rejected.
  failure_examples:
  - An unrelated harness cancels a GPU job.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-058
  feature_id: F08
  title: Block new work on acceptance
  requirement: Once a valid cancellation is accepted, the VAE shall stop scheduling new production and candidate-expansion
    nodes for the affected scope.
  consequences:
  - Queued jobs are cancelled where safe.
  - The shared state becomes CANCELLATION_REQUESTED.
  failure_examples:
  - The system continues Exploration candidates after cancellation.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-059
  feature_id: F08
  title: Nearest safe checkpoint
  requirement: In-flight work shall stop at the nearest safe atomic boundary according to the declared stop policy.
  consequences:
  - Partial files are not promoted.
  - Atomic completion under a small remaining-time threshold may be allowed.
  failure_examples:
  - A container is killed mid-write and corrupts shared storage.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-060
  feature_id: F08
  title: Artifact disposition classification
  requirement: The cancellation receipt shall classify accepted assets, candidates, references, masks, geometry, learning
    evidence, caches, and incomplete artifacts.
  consequences:
  - Reusable evidence can enter governed memory.
  - Cancelled outputs are not consumption-authorized.
  failure_examples:
  - All files are deleted, including a validated identity mask.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-061
  feature_id: F08
  title: Deadline policy semantics
  requirement: The protocol shall distinguish target completion, hard cutoff, and expiry, with explicit behavior for each.
  consequences:
  - Soft misses notify but do not mutate quality gates.
  - Expiry can trigger cancellation.
  failure_examples:
  - Every deadline miss destroys the run.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-062
  feature_id: F08
  title: Deterministic race ordering
  requirement: Cancellation, supersession, result readiness, and acknowledgement races shall resolve from accepted message
    order, causation, and precedence rules.
  consequences:
  - A valid supersession outranks ordinary cancellation when specified.
  - A result emitted after cancellation cannot be promoted.
  failure_examples:
  - Whichever network response arrives first wins.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-063
  feature_id: F08
  title: Stale-promotion prevention
  requirement: A cancelled delegation shall prohibit downstream consumption authorization for subsequently produced outputs
    under that correlation.
  consequences:
  - Historical candidates remain traceable.
  - A new demand may reuse them only through explicit validation.
  failure_examples:
  - A late VAE result is acknowledged because it passed quality.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-064
  feature_id: F08
  title: Cancellation and compute receipt
  requirement: Terminal cancellation shall report stopped execution, last checkpoint, retained artifacts, consumed/avoided
    cost, and downstream authorization state.
  consequences:
  - The Control Tower projection closes cleanly.
  - Receipts support operational review.
  failure_examples:
  - Cancellation is represented only as an HTTP 204.
  decision_id: D008
  journeys: *id008
  nfr_refs:
  - NFR-LIFE-004
  - NFR-REL-005
  - NFR-RES-001
  - NFR-TRACE-005
- id: FR-065
  feature_id: F09
  title: Canonical failure families
  requirement: The protocol shall define stable families for contract, authority, compatibility, staleness, feasibility, infrastructure,
    quality, budget/timing, human exception, and security/integrity failures.
  consequences:
  - Every registered code belongs to one family.
  - Unknown product diagnostics map to a stable fallback family.
  failure_examples:
  - All failures are returned as FAILED with prose.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-066
  feature_id: F09
  title: Stable failure codes
  requirement: Each protocol code shall have an immutable semantic definition, severity range, terminality rule, and recovery
    class.
  consequences:
  - Clients can branch deterministically.
  - Deprecated codes publish replacements.
  failure_examples:
  - The same code means retryable in one product and terminal in another.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-067
  feature_id: F09
  title: Responsibility and decision ownership
  requirement: Every failure message shall identify detector, responsible system, next-decision owner, and enforcement owner.
  consequences:
  - Cross-product responsibility is explicit.
  - The Control Tower displays the next owner.
  failure_examples:
  - A VAE feasibility failure has no indication that the Content Harness must decide.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-068
  feature_id: F09
  title: Retry classification
  requirement: Failures shall state whether retry is permitted, whether payload changes are required, and which retry class
    applies.
  consequences:
  - Contract failures require corrected immutable messages.
  - Infrastructure failures may use operational retries.
  failure_examples:
  - An unchanged authority violation is retried three times.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-069
  feature_id: F09
  title: Quality-round accounting
  requirement: The protocol shall distinguish infrastructure recovery from VLM-directed quality-repair rounds and shall enforce
    the declared remaining quality rounds.
  consequences:
  - GPU restart does not consume a quality round.
  - A semantic-fidelity repair does.
  failure_examples:
  - Every error decrements the same retry counter.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-070
  feature_id: F09
  title: Invalidation and preservation semantics
  requirement: Failure contracts shall identify affected artifacts or nodes, preserved valid outputs, and downstream state
    impact.
  consequences:
  - Targeted repair can reuse unaffected work.
  - Terminal failures block inappropriate promotion.
  failure_examples:
  - A pose failure invalidates the background plate without explanation.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-071
  feature_id: F09
  title: Partial-result protocol
  requirement: The protocol shall support typed partial results with accepted roles, unresolved roles, failures, and an original
    completion policy.
  consequences:
  - Partial consumption is allowed only when predeclared.
  - Unresolved members retain independent lifecycle.
  failure_examples:
  - The VAE returns two of three assets and the harness guesses whether they are usable.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-072
  feature_id: F09
  title: Product diagnostic extensions
  requirement: Products may attach detailed diagnostics through stable references while preserving the protocol-level classification
    and privacy boundary.
  consequences:
  - Deep VLM evidence remains in VAE storage.
  - The shared message stays bounded and parseable.
  failure_examples:
  - A product invents a new top-level failure meaning in a diagnostics blob.
  decision_id: D009
  journeys: *id009
  nfr_refs:
  - NFR-CONTRACT-003
  - NFR-REL-005
  - NFR-RES-002
  - NFR-OBS-002
- id: FR-073
  feature_id: F10
  title: Typed Delegation Set
  requirement: The Content Harness shall be able to create an immutable versioned Delegation Set referencing independently
    versioned member demands.
  consequences:
  - Every member retains its own correlation and asset lineage.
  - The set has a stable owner and context.
  failure_examples:
  - One giant demand embeds all assets as mutable children.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-074
  feature_id: F10
  title: Member lifecycle independence
  requirement: Each member shall retain independent submission, execution, evaluation, repair, result, and acknowledgement
    state.
  consequences:
  - One failed prop does not erase an accepted background.
  - Set status is derived from member states and policy.
  failure_examples:
  - All members share one undifferentiated status.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-075
  feature_id: F10
  title: Shared constraint authority
  requirement: The set may define identity, environment, palette, lighting, camera axis, scale, world state, and Visual Syntax
    constraints that members may refine but not contradict.
  consequences:
  - Contradictions produce a typed set conflict.
  - Shared constraints cite their authority source.
  failure_examples:
  - Two characters use incompatible lighting without a conflict.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-076
  feature_id: F10
  title: Typed dependency edges
  requirement: The set shall express directional relationships such as lighting reference, interaction geometry, identity
    continuity, or ordered production.
  consequences:
  - Dependency changes drive selective invalidation.
  - Cycles are detected or explicitly supported.
  failure_examples:
  - A character relies on a prop geometry that is not declared.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-077
  feature_id: F10
  title: Completion policies
  requirement: The set shall support independent, partial_allowed, atomic_required, and ordered_release policies with required-role
    definitions.
  consequences:
  - Consumption behavior is deterministic.
  - The policy is fixed by the Content Harness.
  failure_examples:
  - The VAE decides to return a partial set because one asset is hard.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-078
  feature_id: F10
  title: Set-level composition evaluation
  requirement: Required members shall be assembled in a composition simulation and evaluated for cross-asset consistency and
    Activative effectiveness where policy requires.
  consequences:
  - Individual passes cannot hide group interaction failure.
  - The set evaluation emits a typed receipt.
  failure_examples:
  - A hand and prop each pass separately but never align in composition.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-079
  feature_id: F10
  title: Set-level selective invalidation
  requirement: A changed or failed member shall invalidate only dependent members and set evaluations supported by the dependency
    graph.
  consequences:
  - Unrelated accepted members remain valid.
  - A shared palette change can invalidate all affected members.
  failure_examples:
  - Any member update restarts the entire set.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-080
  feature_id: F10
  title: Set cancellation and supersession
  requirement: The protocol shall support cancelling or superseding one member, optional members, or the complete set according
    to completion policy.
  consequences:
  - Remaining members' consumability is recomputed.
  - Every action is authority-validated.
  failure_examples:
  - Cancelling an optional overlay cancels a completed character asset.
  decision_id: D010
  journeys: *id010
  nfr_refs:
  - NFR-CONTRACT-004
  - NFR-LIFE-005
  - NFR-REL-005
  - NFR-DATA-001
- id: FR-081
  feature_id: F11
  title: Product compatibility manifests
  requirement: Each participating release shall publish accepted/emitted protocol and message versions, supported features,
    certified profiles, and unsupported required capabilities.
  consequences:
  - Manifests are machine-readable and signed.
  - The boundary resolves them before acceptance.
  failure_examples:
  - Compatibility is inferred from product names.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-082
  feature_id: F11
  title: Semantic capability negotiation
  requirement: The protocol shall negotiate schema, authority, lifecycle, failure, asset-family, category-profile, geometry,
    Budget Program, and receipt support.
  consequences:
  - Parsing without enforcement yields INCOMPATIBLE.
  - Required features are pinned.
  failure_examples:
  - The VAE accepts wrong-reading locks but has no evaluator support.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-083
  feature_id: F11
  title: Pinned delegation profile
  requirement: Every accepted delegation shall record negotiated protocol/message versions, features, category profile, and
    adapters for its entire lifecycle.
  consequences:
  - Running work does not silently upgrade.
  - Receipts reproduce the negotiated profile.
  failure_examples:
  - A service deploy changes contract behavior mid-run.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-084
  feature_id: F11
  title: Canonical compatibility verdicts
  requirement: The protocol shall return COMPATIBLE, COMPATIBLE_WITH_ADAPTER, COMPATIBLE_WITH_DECLARED_DEGRADATION, MIGRATION_REQUIRED,
    or INCOMPATIBLE with reasons.
  consequences:
  - Clients know the safe next action.
  - Declared degradation requires owner authority.
  failure_examples:
  - An unknown field is ignored and treated as compatible.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-085
  feature_id: F11
  title: Lossless deterministic adapters
  requirement: Adapters may perform approved representational transformations but shall not drop or weaken semantic, Activative,
    authority, continuity, composition, or quality requirements.
  consequences:
  - Adapters are versioned and testable.
  - The original payload remains immutable.
  failure_examples:
  - An adapter removes an unsupported wrong-reading constraint.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-086
  feature_id: F11
  title: Immutable contract migration
  requirement: Migration shall create a new linked artifact with explicit transformations, authority-effect analysis, source/target
    validation, and semantic-equivalence result.
  consequences:
  - The original contract is preserved.
  - Unsafe migration returns incompatible.
  failure_examples:
  - A migration script overwrites the v1 demand.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-087
  feature_id: F11
  title: Version and deprecation policy
  requirement: Protocol and contracts shall use governed patch/minor/major semantics and active→discouraged→deprecated→read_only→retired
    states.
  consequences:
  - Deprecation declares replacement and dates.
  - Accepted active delegations remain valid.
  failure_examples:
  - A version is removed while an in-flight delegation uses it.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-088
  feature_id: F11
  title: Shared compatibility fixture suite
  requirement: Every claimed compatibility path shall pass producer, consumer, adapter, migration, unsupported-feature, and
    deprecated-version fixtures.
  consequences:
  - Format 02 is a mandatory release suite.
  - Results are attached to release certification.
  failure_examples:
  - A manifest claims compatibility without executing fixtures.
  decision_id: D011
  journeys: *id011
  nfr_refs:
  - NFR-COMPAT-001
  - NFR-CONTRACT-005
  - NFR-REL-005
  - NFR-GOV-004
- id: FR-089
  feature_id: F12
  title: Typed Amendment Proposal
  requirement: The VAE shall express requested demand changes as immutable options containing exact paths, current/proposed
    values, trigger evidence, and rationale.
  consequences:
  - Options are independently identifiable.
  - Free-form prose cannot change authority.
  failure_examples:
  - The editor returns 'make the box bigger' with no field path.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-090
  feature_id: F12
  title: Authority-class classification
  requirement: Each proposed change shall be classified as internal production, execution policy, composition authority, semantic/Activative
    authority, or constitutional.
  consequences:
  - The protocol routes to the correct owner.
  - Misclassified fields are rejected by the authority matrix.
  failure_examples:
  - A subject change is labeled internal workflow adjustment.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-091
  feature_id: F12
  title: Predicted consequence model
  requirement: Each option shall declare expected semantic, Activative, composition, cost, timing, reuse, and invalidation
    effects with uncertainty.
  consequences:
  - The Content Harness can compare trade-offs.
  - Predictions cite evidence and model version.
  failure_examples:
  - An option promises success with no basis.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-092
  feature_id: F12
  title: Non-binding behavior
  requirement: An Amendment Proposal shall not mutate demand, budget, lifecycle authority, or production plan until a valid
    response is accepted.
  consequences:
  - The original execution checkpoints safely.
  - Unaccepted options expire without effect.
  failure_examples:
  - The VAE applies its preferred option while waiting.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-093
  feature_id: F12
  title: Bounded policy-based approval
  requirement: The Content Harness may register narrow deterministic policies for specified fields/ranges that do not affect
    semantic or constitutional authority.
  consequences:
  - Automatic approval cites the exact policy.
  - Out-of-range changes require explicit authority.
  failure_examples:
  - A generic 'minor changes allowed' policy approves a role change.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-094
  feature_id: F12
  title: Immutable Amendment Response
  requirement: Acceptance, rejection, or request-for-alternative shall be an immutable response linked to proposal and selected
    option.
  consequences:
  - The decision owner is authenticated.
  - Duplicate responses are idempotent.
  failure_examples:
  - An option selection is toggled in a mutable UI record.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-095
  feature_id: F12
  title: Accepted amendment creates new demand
  requirement: Any accepted demand-owned change shall produce a new Visual Asset Demand version with supersession, source
    proposal, and impact analysis.
  consequences:
  - The original remains unchanged.
  - Selective invalidation begins from the new version.
  failure_examples:
  - The existing demand is patched in place.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-096
  feature_id: F12
  title: Constitutional routing
  requirement: Proposals affecting category grammar, hard gates, authority boundaries, canonical ontology, or Builder doctrine
    shall be blocked from ordinary delegation and routed upstream.
  consequences:
  - The protocol emits a constitutional-amendment requirement.
  - No local approval can bypass it.
  failure_examples:
  - A VAE amendment alters the Minimal Coach Theatre category law.
  decision_id: D012
  journeys: *id012
  nfr_refs:
  - NFR-AUTH-004
  - NFR-CONTRACT-005
  - NFR-TRACE-005
  - NFR-GOV-005
- id: FR-097
  feature_id: F13
  title: Typed invalidation notice
  requirement: An owning product shall be able to mark a result as requiring revalidation when dependencies or authority context
    change without asserting that the asset is defective.
  consequences:
  - New and active consumption can be blocked pending review.
  - Historical use remains intact.
  failure_examples:
  - The asset file is deleted when a composition version changes.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-098
  feature_id: F13
  title: Typed revocation notice
  requirement: The VAE or authorized integrity owner shall be able to revoke an asset for critical defect, integrity, security,
    evaluator-regression, or withdrawn-capability reasons.
  consequences:
  - New consumption is blocked immediately.
  - Severity and effective time are explicit.
  failure_examples:
  - A critical identity mismatch is only logged as a warning.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-099
  feature_id: F13
  title: Supersession and replacement notices
  requirement: The protocol shall distinguish a newer preferred result from a mandatory replacement and link old/new assets
    and results.
  consequences:
  - Older versions remain historical.
  - Future retrieval uses current authorization state.
  failure_examples:
  - A new binary overwrites the old asset URI.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-100
  feature_id: F13
  title: Downstream impact analysis
  requirement: The protocol shall traverse consumption links from result to variants, compositions, scenes/slides, sequences,
    outputs, and publications.
  consequences:
  - Affected active and published scopes are reported separately.
  - Required actions are typed.
  failure_examples:
  - An invalidation cannot identify where the asset was used.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-101
  feature_id: F13
  title: Replacement compatibility validation
  requirement: A replacement shall be checked against current demand, geometry, masks, timing, Visual Syntax context, and
    composition before substitution.
  consequences:
  - Replacement is not assumed drop-in.
  - Selective composition reevaluation is triggered.
  failure_examples:
  - A character replacement with different BBOX is swapped without testing.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-102
  feature_id: F13
  title: Historical reproducibility
  requirement: Invalidated or revoked artifacts, hashes, receipts, and actual historical consumption links shall remain retained
    under policy.
  consequences:
  - Past outputs can be rebuilt exactly.
  - Restricted access may apply for integrity/security.
  failure_examples:
  - Revocation removes evidence of what shipped.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-103
  feature_id: F13
  title: Negative-evidence retention
  requirement: Revoked, rejected, or superseded assets may remain available to evaluators and learning systems as negative
    or historical evidence but shall be excluded from ordinary reuse.
  consequences:
  - Memory query respects authorization state.
  - Failure lessons retain provenance.
  failure_examples:
  - A revoked pose is retrieved as a normal reuse candidate.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-104
  feature_id: F13
  title: Recall-review support
  requirement: For already-published outputs, the protocol shall issue review recommendations and track acknowledgement without
    silently editing publication records.
  consequences:
  - Human or policy owner decides recall action.
  - Audit shows unresolved published impacts.
  failure_examples:
  - The protocol automatically republishes edited content.
  decision_id: D013
  journeys: *id013
  nfr_refs:
  - NFR-LIFE-005
  - NFR-DATA-002
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-105
  feature_id: F14
  title: Registered delegation principals
  requirement: Every state-changing sender and recipient shall be a registered principal with product type, version, permitted
    actions, prohibited actions, credential reference, and status.
  consequences:
  - Inactive principals are rejected.
  - Scope can be evaluated deterministically.
  failure_examples:
  - Any internal service account can submit demands.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-106
  feature_id: F14
  title: Message signing and hashing
  requirement: State-changing messages shall include verifiable envelope/payload hashes and an authenticated signature or
    equivalent architecture-approved integrity proof.
  consequences:
  - Tampering is detected before state mutation.
  - Signing identity is in the audit receipt.
  failure_examples:
  - Payload hash is optional on the internal queue.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-107
  feature_id: F14
  title: Replay protection
  requirement: The protocol shall use message ID, nonce, expiry, idempotency key, payload hash, correlation, and lifecycle
    context to distinguish benign retries from replay.
  consequences:
  - A retry returns the existing receipt.
  - A replay produces a security failure.
  failure_examples:
  - The same signed cancellation is accepted twice in different states.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-108
  feature_id: F14
  title: Deterministic validation order
  requirement: Boundary services shall verify identity, integrity, replay/expiry, protocol compatibility, schema, authority,
    and lifecycle before persistence or routing.
  consequences:
  - Failure stage is receipted.
  - No later validation can compensate for an earlier failure.
  failure_examples:
  - Schema-valid forged messages change state before signature verification.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-109
  feature_id: F14
  title: Append-only audit chain
  requirement: Every accepted or rejected state-changing message shall create an append-only audit receipt with sequence,
    previous hash, validations, and resulting transition.
  consequences:
  - A chain can detect gaps or reordering.
  - Projection can be reconstructed.
  failure_examples:
  - Audit is a mutable table with deleted rejection rows.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-110
  feature_id: F14
  title: Data minimization
  requirement: Messages shall carry only required contractual data and stable references/hashes, excluding secrets, large
    media, unnecessary prompts, weights, and private traces.
  consequences:
  - Recipients retrieve authorized resources separately.
  - Payload policies are testable.
  failure_examples:
  - A ComfyUI prompt history and model credential are embedded in an event.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-111
  feature_id: F14
  title: Credential lifecycle
  requirement: Architecture shall support principal credential issuance, rotation, revocation, and overlap without invalidating
    historical signature verification.
  consequences:
  - Rotation events are audited.
  - Compromised principals can be disabled.
  failure_examples:
  - Rotating a key makes old audit receipts unverifiable.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-112
  feature_id: F14
  title: Security-incident behavior
  requirement: Identity, integrity, replay, or isolation violations shall block state change, preserve forensic metadata,
    and emit a typed incident outside ordinary repair flows.
  consequences:
  - No automatic production retry occurs.
  - Control Tower escalates severity.
  failure_examples:
  - A signature failure is treated as a transient provider timeout.
  decision_id: D014
  journeys: *id014
  nfr_refs:
  - NFR-SEC-001
  - NFR-SEC-003
  - NFR-TRACE-005
  - NFR-DATA-003
- id: FR-113
  feature_id: F15
  title: Control Tower delegation projection
  requirement: The protocol shall project correlation lifecycle, products, negotiated versions, authority, budget, timing,
    latest event, exceptions, acknowledgements, and invalidation impact into the existing Control Tower.
  consequences:
  - Projection references canonical messages and receipts.
  - No separate operational source of truth is created.
  failure_examples:
  - A standalone dashboard maintains its own delegation status.
  decision_id: D015
  journeys: *id015
  nfr_refs:
  - NFR-OBS-001
  - NFR-PERF-002
  - NFR-RES-003
  - NFR-GOV-006
- id: FR-114
  feature_id: F15
  title: Reliability and health metrics
  requirement: The system shall measure acceptance, delivery, duplicate suppression, transition validity, acknowledgement,
    event delivery, audit completeness, and stalled/orphaned work.
  consequences:
  - Metrics are dimensioned by product and version.
  - Release gates can consume them.
  failure_examples:
  - Only HTTP request count is measured.
  decision_id: D015
  journeys: *id015
  nfr_refs:
  - NFR-OBS-001
  - NFR-PERF-002
  - NFR-RES-003
  - NFR-GOV-006
- id: FR-115
  feature_id: F15
  title: Latency and freshness SLOs
  requirement: The protocol shall define and report SLOs for submission receipt, event delivery, projection freshness, acknowledgement,
    cancellation, amendment, and critical invalidation propagation.
  consequences:
  - Breaches create operational events.
  - Quality thresholds are not weakened to meet SLOs.
  failure_examples:
  - Latency is measured only for completed happy paths.
  decision_id: D015
  journeys: *id015
  nfr_refs:
  - NFR-OBS-001
  - NFR-PERF-002
  - NFR-RES-003
  - NFR-GOV-006
- id: FR-116
  feature_id: F15
  title: Producer and consumer contract tests
  requirement: Every product shall pass executable fixtures for all message versions it claims to emit or consume.
  consequences:
  - Fixtures include valid and invalid cases.
  - Contract release is blocked on failure.
  failure_examples:
  - Schemas are reviewed manually without runtime tests.
  decision_id: D015
  journeys: *id015
  nfr_refs:
  - NFR-OBS-001
  - NFR-PERF-002
  - NFR-RES-003
  - NFR-GOV-006
- id: FR-117
  feature_id: F15
  title: Authority and lifecycle tests
  requirement: The conformance suite shall exercise prohibited actors, illegal transitions, stale messages, idempotency, replay,
    and terminal-state behavior.
  consequences:
  - Every prohibited action is rejected deterministically.
  - Expected audit receipts are asserted.
  failure_examples:
  - Only valid happy-path submissions are tested.
  decision_id: D015
  journeys: *id015
  nfr_refs:
  - NFR-OBS-001
  - NFR-PERF-002
  - NFR-RES-003
  - NFR-GOV-006
- id: FR-118
  feature_id: F15
  title: Compatibility and migration tests
  requirement: The suite shall cover same-version, minor compatibility, lossless adapter, migration-required, unsupported
    feature, and deprecated-version behavior.
  consequences:
  - Manifest claims are evidence-backed.
  - Semantic preservation is asserted.
  failure_examples:
  - A migration is tested only for JSON validity.
  decision_id: D015
  journeys: *id015
