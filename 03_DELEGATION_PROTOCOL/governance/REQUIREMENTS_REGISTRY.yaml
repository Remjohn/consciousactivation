  - NFR-GOV-006
  - NFR-TRACE-005
  - NFR-REL-005
- id: FR-126
  feature_id: F16
  title: Format 02 cross-product fixture readiness
  requirement: The Minimal Coach Theatre reference slice shall provide the complete scenario portfolio and valid contracts
    needed by both products.
  consequences:
  - Fixtures use real Visual Syntax and character/scene roles.
  - Set-level and replacement flows are included.
  failure_examples:
