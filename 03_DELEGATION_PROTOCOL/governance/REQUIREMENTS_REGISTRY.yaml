non_functional_requirements:
- id: NFR-AUTH-001
  group: AUTH
  group_title: Authority and sovereignty
  requirement: Every authority-bearing field and action shall map to exactly one owning product or protocol service.
- id: NFR-AUTH-002
  group: AUTH
  group_title: Authority and sovereignty
  requirement: Authority validation shall be deterministic and complete before any lifecycle mutation.
- id: NFR-AUTH-003
  group: AUTH
  group_title: Authority and sovereignty
  requirement: Budget, cancellation, amendment, result, and revocation actions shall require an authenticated permitted principal.
- id: NFR-AUTH-004
  group: AUTH
  group_title: Authority and sovereignty
  requirement: Automatic policy decisions shall be bounded by explicit fields, ranges, versions, and owning authority.
- id: NFR-AUTH-005
  group: AUTH
  group_title: Authority and sovereignty
  requirement: No adapter, migration, projection, or transport shall transfer creative or production authority implicitly.
- id: NFR-CONTRACT-001
  group: CONTRACT
  group_title: Contract quality and schema discipline
  requirement: All state-changing payloads shall be immutable, versioned, schema-validatable, and hash-addressable.
- id: NFR-CONTRACT-002
  group: CONTRACT
  group_title: Contract quality and schema discipline
  requirement: Every authoritative reference shall identify its exact version and content hash.
- id: NFR-CONTRACT-003
  group: CONTRACT
  group_title: Contract quality and schema discipline
  requirement: Failure and exception contracts shall contain stable classification, ownership, recovery, and invalidation
    semantics.
- id: NFR-CONTRACT-004
  group: CONTRACT
  group_title: Contract quality and schema discipline
  requirement: Delegation Set schemas shall preserve member-level identity and lifecycle while expressing shared constraints.
- id: NFR-CONTRACT-005
  group: CONTRACT
  group_title: Contract quality and schema discipline
  requirement: Compatibility and migration shall preserve all mandatory semantics, not merely syntactic parseability.
- id: NFR-LIFE-001
  group: LIFE
  group_title: Lifecycle correctness
  requirement: The shared lifecycle shall be represented by an executable deterministic transition machine.
- id: NFR-LIFE-002
  group: LIFE
  group_title: Lifecycle correctness
  requirement: Supersession shall prevent stale result promotion and preserve valid reusable work.
- id: NFR-LIFE-003
  group: LIFE
  group_title: Lifecycle correctness
  requirement: COMPLETED shall require valid production acceptance and downstream consumption acknowledgement.
- id: NFR-LIFE-004
  group: LIFE
  group_title: Lifecycle correctness
  requirement: Cancellation shall stop new work promptly, checkpoint safely, and prevent later stale promotion.
- id: NFR-LIFE-005
  group: LIFE
  group_title: Lifecycle correctness
  requirement: Delegation Set status shall be derived from member state and declared completion policy.
- id: NFR-REL-001
  group: REL
  group_title: Reliability, idempotency, and consistency
  requirement: Every accepted state change shall be idempotent under legitimate duplicate delivery.
- id: NFR-REL-002
  group: REL
  group_title: Reliability, idempotency, and consistency
  requirement: Shared lifecycle projection shall be reconstructible from accepted immutable messages and receipts.
- id: NFR-REL-003
  group: REL
  group_title: Reliability, idempotency, and consistency
  requirement: Selective invalidation shall preserve unaffected evidence and outputs with explicit lineage.
- id: NFR-REL-004
  group: REL
  group_title: Reliability, idempotency, and consistency
  requirement: Automatic result acknowledgement shall be deterministic for identical current dependencies.
- id: NFR-REL-005
  group: REL
  group_title: Reliability, idempotency, and consistency
  requirement: Message races shall resolve through accepted order, causation, precedence, and lifecycle state rather than
    network timing.
- id: NFR-COMPAT-001
  group: COMPAT
  group_title: Compatibility and evolution
  requirement: Products shall publish signed machine-readable compatibility manifests for every release.
- id: NFR-COMPAT-002
  group: COMPAT
  group_title: Compatibility and evolution
  requirement: Negotiation shall verify required behaviors, authority, profiles, and receipts in addition to schema versions.
- id: NFR-COMPAT-003
  group: COMPAT
  group_title: Compatibility and evolution
  requirement: Running delegations shall pin negotiated versions and shall not silently upgrade.
- id: NFR-COMPAT-004
  group: COMPAT
  group_title: Compatibility and evolution
  requirement: Adapters and migrations shall be deterministic, versioned, fixture-tested, and semantically lossless for required
    fields.
- id: NFR-COMPAT-005
  group: COMPAT
  group_title: Compatibility and evolution
  requirement: Deprecation shall preserve accepted in-flight delegations and publish replacement and retirement timelines.
- id: NFR-SEC-001
  group: SEC
  group_title: Security and integrity
  requirement: Every state-changing principal shall be authenticated and authorized for the exact requested action.
- id: NFR-SEC-002
  group: SEC
  group_title: Security and integrity
  requirement: Message and payload integrity shall be verifiable before persistence or routing.
- id: NFR-SEC-003
  group: SEC
  group_title: Security and integrity
  requirement: Replay protection shall distinguish benign idempotent retry from unauthorized message replay.
- id: NFR-SEC-004
  group: SEC
  group_title: Security and integrity
  requirement: Credentials shall support issuance, rotation, revocation, and historical verification.
- id: NFR-SEC-005
  group: SEC
  group_title: Security and integrity
  requirement: Integrity and authority failures shall block state change and emit a security incident without ordinary retry.
- id: NFR-TRACE-001
  group: TRACE
  group_title: Traceability and auditability
  requirement: Every protocol action shall trace to source decision, requirement, message, principal, and resulting lifecycle
    effect.
- id: NFR-TRACE-002
  group: TRACE
  group_title: Traceability and auditability
  requirement: Demand-owned values shall retain evidence of owner, version, hash, and supersession lineage.
- id: NFR-TRACE-003
  group: TRACE
  group_title: Traceability and auditability
  requirement: Correlation and causation shall connect every message and receipt in a delegation.
- id: NFR-TRACE-004
  group: TRACE
  group_title: Traceability and auditability
  requirement: Lifecycle projections shall identify the authoritative message and transition rule.
- id: NFR-TRACE-005
  group: TRACE
  group_title: Traceability and auditability
  requirement: Selective invalidation shall explain field changes, preserved artifacts, invalidated artifacts, and resume
    point.
- id: NFR-OBS-001
  group: OBS
  group_title: Observability and operations
  requirement: Delegation state shall be visible through the validated Harness Control Tower, not a second source of truth.
- id: NFR-OBS-002
  group: OBS
  group_title: Observability and operations
  requirement: Every non-terminal failure shall expose responsible owner, next action, retry class, and remaining quality
    rounds.
- id: NFR-OBS-003
  group: OBS
  group_title: Observability and operations
  requirement: Control Tower projections shall expose compatibility, authority, budget, timing, latest event, exceptions,
    and acknowledgements.
- id: NFR-OBS-004
  group: OBS
  group_title: Observability and operations
  requirement: Stalled, orphaned, superseded-but-producing, and unacknowledged delegations shall be detectable.
- id: NFR-OBS-005
  group: OBS
  group_title: Observability and operations
  requirement: Critical invalidation, revocation, integrity, and audit-chain incidents shall trigger operational escalation.
- id: NFR-PERF-001
  group: PERF
  group_title: Performance and service levels
  requirement: Budget validation and escalation shall prevent unapproved work from exceeding hard ceilings.
- id: NFR-PERF-002
  group: PERF
  group_title: Performance and service levels
  requirement: The protocol shall define measurable SLOs for acceptance, event delivery, projection freshness, acknowledgement,
    and critical notice propagation.
- id: NFR-PERF-003
  group: PERF
  group_title: Performance and service levels
  requirement: Boundary validation shall add bounded overhead independent of asset-generation duration.
- id: NFR-PERF-004
  group: PERF
  group_title: Performance and service levels
  requirement: Large media shall be referenced rather than copied through protocol messages.
- id: NFR-RES-001
  group: RES
  group_title: Resilience and recovery
  requirement: Cancellation, restart, and transport interruption shall preserve safe checkpoints and immutable receipts.
- id: NFR-RES-002
  group: RES
  group_title: Resilience and recovery
  requirement: Infrastructure failures shall be recoverable without consuming visual quality-repair rounds.
- id: NFR-RES-003
  group: RES
  group_title: Resilience and recovery
  requirement: Duplicate, delayed, out-of-order, and temporarily undeliverable messages shall not create duplicate production
    or illegal transitions.
- id: NFR-RES-004
  group: RES
  group_title: Resilience and recovery
  requirement: Boundary-service restart shall restore projections and idempotency state from durable records.
- id: NFR-RES-005
  group: RES
  group_title: Resilience and recovery
  requirement: Audit-store interruption shall fail safely and prevent unaudited state-changing acceptance.
- id: NFR-DATA-001
  group: DATA
  group_title: Data retention, privacy, and historical truth
  requirement: Delegation Sets and member contracts shall retain independent lineage and exact consumed versions.
- id: NFR-DATA-002
  group: DATA
  group_title: Data retention, privacy, and historical truth
  requirement: Invalidated, revoked, superseded, and replaced artifacts shall remain historically reproducible under retention
    policy.
- id: NFR-DATA-003
  group: DATA
  group_title: Data retention, privacy, and historical truth
  requirement: Protocol messages shall minimize data and exclude secrets, large media, and unnecessary private reasoning traces.
- id: NFR-DATA-004
  group: DATA
  group_title: Data retention, privacy, and historical truth
  requirement: Large resources shall use access-controlled stable references and hashes with retention and availability policies.
- id: NFR-DATA-005
  group: DATA
  group_title: Data retention, privacy, and historical truth
  requirement: Negative and revoked evidence may support diagnosis and evaluation but shall be excluded from ordinary production
    reuse.
- id: NFR-GOV-001
  group: GOV
  group_title: Governance, quality, and certification
  requirement: The protocol shall preserve the validated Builder, Content Harness, and Visual Asset Editor architectures.
- id: NFR-GOV-002
  group: GOV
  group_title: Governance, quality, and certification
  requirement: Semantic, Activative, sequence, composition, identity, and continuity authority shall not be silently weakened.
- id: NFR-GOV-003
  group: GOV
  group_title: Governance, quality, and certification
  requirement: Cost, latency, or convenience shall never override constitutional quality or authority gates.
- id: NFR-GOV-004
  group: GOV
  group_title: Governance, quality, and certification
  requirement: Compatibility claims shall require executable evidence against declared fixtures.
- id: NFR-GOV-005
  group: GOV
  group_title: Governance, quality, and certification
  requirement: Constitutional amendments shall route upstream and cannot be approved through ordinary delegation.
- id: NFR-GOV-006
  group: GOV
  group_title: Governance, quality, and certification
  requirement: Production certification shall declare exact product versions, contract versions, profile scope, limitations,
    rollback, and conformance evidence.
journeys:
- journey_id: UJ-01
  title: A Content Harness submits an authoritative demand
  description: A registered Content Harness submits one immutable Visual Asset Demand through a compatible envelope and receives
    an idempotent submission receipt.
- journey_id: UJ-02
  title: The boundary negotiates a safe protocol profile
  description: The Delegation Layer checks versions, required features, category certification and authority before accepting
    the delegation.
- journey_id: UJ-03
  title: The Visual Asset Editor reports progress without exposing internals
  description: The editor emits product events that project into a stable external lifecycle while internal production nodes
    remain private.
- journey_id: UJ-04
  title: The Content Harness acknowledges a current result
  description: The editor returns a production-accepted result; the Content Harness validates current demand, sequence, composition
    and dependencies before automatic consumption acknowledgement.
- journey_id: UJ-05
  title: A demand changes while production is in flight
  description: The Content Harness submits a superseding version with typed changes; valid work is reused and only affected
    work is invalidated.
- journey_id: UJ-06
  title: The editor proposes a feasible amendment
  description: The editor returns structured amendment options with evidence and predicted effects; the owning authority accepts
    one through a new demand version or declines.
- journey_id: UJ-07
  title: The editor requests more budget
  description: The editor checkpoints and requests an immutable budget extension when the authorized envelope is insufficient;
    production resumes only after valid approval.
- journey_id: UJ-08
  title: A no-longer-needed delegation is cancelled
  description: The Content Harness requests cancellation; queued work stops, atomic work reaches a safe checkpoint, useful
    evidence is retained and stale promotion is prevented.
- journey_id: UJ-09
  title: A scene coordinates several related assets
  description: A Delegation Set coordinates independent character, background and prop demands with shared identity, palette,
    geometry and atomic completion policy.
- journey_id: UJ-10
  title: A failure routes to the correct authority
  description: A typed failure identifies the responsible system, retry class, decision owner, remaining valid artifacts and
    required next action.
- journey_id: UJ-11
  title: Products interoperate across versions
  description: A compatibility manifest and negotiation select a safe pinned profile, use a lossless adapter or produce an
    immutable migration.
- journey_id: UJ-12
  title: A completed asset is invalidated and replaced
  description: A later regression or constitution update triggers an impact notice, blocks unsafe use, preserves history and
    revalidates a replacement.
- journey_id: UJ-13
  title: The protocol rejects a forged or replayed action
  description: Identity, signature, authority and replay checks reject the message before lifecycle state changes and record
    a security incident receipt.
- journey_id: UJ-14
  title: An operator observes and certifies the shared boundary
  description: The Control Tower shows lifecycle, authority, compatibility, budget, events, exceptions, acknowledgements and
    audit-chain state while conformance suites prove behavior.
