  - NFR-REL-005
- id: FR-127
  feature_id: F16
  title: Development Capsule completeness
  requirement: The package shall define the required approved PRD, Architecture/ADRs, schemas, matrices, lifecycle, taxonomy,
    fixtures, conformance suite, deployment, observability, migration, rollback, epics, stories, specs, and authorization
    receipt.
  consequences:
  - Each artifact traces to requirements.
  - Implementation teams do not invent shared semantics.
  failure_examples:
