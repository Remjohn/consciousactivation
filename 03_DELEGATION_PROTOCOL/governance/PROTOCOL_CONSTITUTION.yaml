constitution_id: CMF-DELEGATION-PROTOCOL-CONSTITUTION-001
version: 1.1.0-draft
status: binding_for_prd
product: CMF Content Harness ↔ Visual Asset Editor Delegation Protocol
promise: A governed contract protocol with deterministic boundary services connecting independent Content Harness and Visual
  Asset Editor products without becoming a third creative or production authority.
authority_laws:
- Content Harness exclusively owns Visual Asset Demand meaning and versions.
- Visual Asset Editor exclusively owns visual production planning, execution, evaluation, repair, and production acceptance.
- Delegation Protocol exclusively owns shared validation, compatibility negotiation, lifecycle enforcement, idempotency, integrity,
  routing, and audit.
- Production acceptance and downstream consumption acknowledgement are separate authorities.
- Accepted messages, demands, results, amendments, and receipts are immutable.
operating_laws:
- Every state-changing message is authenticated, integrity-verified, schema-valid, authority-valid, lifecycle-valid, and receipted
  before effect.
- Compatibility must preserve semantics, authority, lifecycle, required evaluation, and failure behavior.
- Supersession and amendment create new immutable versions and selective invalidation.
- Failures route by stable taxonomy and never use blind unchanged retry.
- Historical truth survives invalidation, revocation, supersession, and replacement.
reference_category: 2d_character_animation
reference_format_profile: minimal_coach_theatre
reference_scope: Format 02 Release 1 cross-product conformance
anti_goals:
- id: AP-001
  rule: The protocol must not become a third creative, Activative, composition, or production authority.
- id: AP-002
  rule: The protocol must not mutate an accepted Visual Asset Demand or completed result in place.
- id: AP-003
  rule: The Visual Asset Editor must not redefine Content Harness semantic, Activative, sequence, composition, identity, continuity,
    or wrong-reading authority.
- id: AP-004
  rule: The Content Harness must not dictate internal ComfyUI, model, LoRA, candidate, or repair execution through the shared
    protocol.
- id: AP-005
  rule: The protocol must not duplicate visual-quality evaluation or rank creative amendments.
- id: AP-006
  rule: Unsupported mandatory fields or features must not be silently ignored.
- id: AP-007
  rule: Arbitrary product status strings must not alter shared lifecycle state.
- id: AP-008
  rule: Historical contracts, messages, results, assets, and receipts must not be overwritten.
- id: AP-009
  rule: Idempotent retry and replay must not be treated as the same condition.
- id: AP-010
  rule: Unsigned, corrupted, expired, replayed, or unauthorized messages must not affect protocol state.
- id: AP-011
  rule: Stale, cancelled, superseded, invalidated, or revoked results must not enter current composition without governed
    revalidation.
- id: AP-012
  rule: Budget Programs, ceilings, quality gates, or required evaluations must not be silently reduced.
- id: AP-013
  rule: Adapters and migrations must not be lossy for semantic, Activative, authority, continuity, composition, or hard-gate
    fields.
- id: AP-014
  rule: Revoked or invalidated artifacts must not be deleted from historical evidence solely to simplify current state.
- id: AP-015
  rule: Internal VAE production nodes must not become public lifecycle states.
- id: AP-016
  rule: Compatibility must not be claimed solely because JSON parses.
- id: AP-017
  rule: Cancellation must not destructively erase reusable evidence or permit late stale promotion.
- id: AP-018
  rule: A Delegation Set must not erase independent member demand, asset, evaluation, or repair lineage.
- id: AP-019
  rule: The protocol must not authorize constitutional changes that belong to Builder governance.
- id: AP-020
  rule: Implementation must not be authorized without cross-product fixtures and a passing conformance suite.
constitutional_authority:
  contract_ref: governance/CONSTITUTIONAL_PRECEDENCE_CONTRACT.yaml
  constitution_version: 1.1.0
semantic_preservation_domains:
- activative_semantic_lineage
- activation_contract
- visual_semantic_pack
- visual_narrative_program
- feature_contracts
- somatic_route_request
- expression_moment_lineage
- wrong_reading_locks
