$schema: https://json-schema.org/draft/2020-12/schema
$id: https://contracts.cmf.dev/delegation/contract-migration/1.0/schema.json
title: Contract Migration Record
description: CMF delegation protocol contract-migration message.
x-cmf-message-type: contract-migration
x-cmf-message-version: '1.0'
type: object
additionalProperties: false
properties:
  migration_id: &id003
    type: string
    pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$
    x-cmf-value-owner: DELEGATION_PROTOCOL
  source_message_type:
    type: string
    pattern: ^[a-z][a-z0-9-]{2,63}$
    x-cmf-value-owner: DELEGATION_PROTOCOL
  source_version: &id001
    type: string
    pattern: ^[0-9]+\.[0-9]+$
    x-cmf-value-owner: DELEGATION_PROTOCOL
  target_version: *id001
  source_payload_hash: &id002
    type: string
    pattern: ^sha256:[0-9a-f]{64}$
    x-cmf-value-owner: DELEGATION_PROTOCOL
  target_artifacts:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        message_type:
          type: string
          pattern: ^[a-z][a-z0-9-]{2,63}$
          x-cmf-value-owner: DELEGATION_PROTOCOL
        payload_hash: *id002
        canonical_ref:
          type: string
          format: uri
          x-cmf-value-owner: DELEGATION_PROTOCOL
      required:
      - message_type
      - payload_hash
      - canonical_ref
      x-cmf-value-owner: DELEGATION_PROTOCOL
    minItems: 1
    x-cmf-value-owner: DELEGATION_PROTOCOL
  ordered_transformations:
    type: array
    items: *id003
    minItems: 1
    x-cmf-value-owner: DELEGATION_PROTOCOL
  authority_effect_analysis:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        target_path: &id004
          type: string
          pattern: ^(?:/(?:[^~/]|~0|~1)*)*$
          x-cmf-value-owner: DELEGATION_PROTOCOL
        value_owner:
          type: string
          enum:
          - CONTENT_HARNESS
          - DELEGATION_PROTOCOL
          - VISUAL_ASSET_EDITOR
          - CONTROL_TOWER
          x-cmf-value-owner: DELEGATION_PROTOCOL
        effect:
          type: string
          enum:
          - PRESERVED
          - SPLIT_WITH_EVIDENCE
          - OWNER_CLASSIFIED
          x-cmf-value-owner: DELEGATION_PROTOCOL
      required:
      - target_path
      - value_owner
      - effect
      x-cmf-value-owner: DELEGATION_PROTOCOL
    minItems: 1
    x-cmf-value-owner: DELEGATION_PROTOCOL
  preserved_semantic_paths:
    type: array
    items: *id004
    minItems: 1
    uniqueItems: true
    x-cmf-value-owner: DELEGATION_PROTOCOL
  behavioral_enforcement:
    type: string
    enum:
    - PASS
    - FAIL
    x-cmf-value-owner: DELEGATION_PROTOCOL
  source_validation:
    type: string
    enum:
    - PASS
    - FAIL
    x-cmf-value-owner: DELEGATION_PROTOCOL
  target_validation:
    type: string
    enum:
    - PASS
    - FAIL
    x-cmf-value-owner: DELEGATION_PROTOCOL
  equivalence:
    type: string
    enum:
    - PASS
    - FAIL
    x-cmf-value-owner: DELEGATION_PROTOCOL
  output_ref:
    $ref: '#/$defs/ResourceIdentityRef'
    x-cmf-value-owner: DELEGATION_PROTOCOL
  evidence_refs:
    type: array
    items:
      $ref: '#/$defs/ResourceIdentityRef'
      x-cmf-value-owner: DELEGATION_PROTOCOL
    minItems: 1
    x-cmf-value-owner: DELEGATION_PROTOCOL
  lossless:
    type: boolean
    x-cmf-value-owner: DELEGATION_PROTOCOL
  migrated_at:
    type: string
    format: date-time
    x-cmf-value-owner: DELEGATION_PROTOCOL
required:
- migration_id
- source_message_type
- source_version
- target_version
- source_payload_hash
- target_artifacts
- ordered_transformations
- authority_effect_analysis
- preserved_semantic_paths
- behavioral_enforcement
- source_validation
- target_validation
- equivalence
- output_ref
- evidence_refs
- lossless
- migrated_at
$defs:
  PrincipalRef:
    type: object
    additionalProperties: false
    properties:
      principal_id: &id005
        type: string
        pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$
        x-cmf-value-owner: DELEGATION_PROTOCOL
      principal_type:
        type: string
        enum:
        - CONTENT_HARNESS
        - DELEGATION_PROTOCOL
        - VISUAL_ASSET_EDITOR
        - CONTROL_TOWER
      product_version:
        type: string
        pattern: ^[0-9]+\.[0-9]+$
    required:
    - principal_id
    - principal_type
    - product_version
  DemandIdentityRef:
    type: object
    additionalProperties: false
    properties:
      request_id: *id005
      version:
        type: integer
        minimum: 1
      payload_hash: &id006
        type: string
        pattern: ^sha256:[0-9a-f]{64}$
        x-cmf-value-owner: DELEGATION_PROTOCOL
      canonical_ref: &id007
        type: string
        format: uri
        x-cmf-value-owner: DELEGATION_PROTOCOL
    required:
    - request_id
    - version
    - payload_hash
    - canonical_ref
  ResourceIdentityRef:
    type: object
    additionalProperties: false
    properties:
      resource_id: *id005
      version:
        type: string
        minLength: 1
        maxLength: 64
        x-cmf-value-owner: DELEGATION_PROTOCOL
      payload_hash: *id006
      canonical_ref: *id007
    required:
    - resource_id
    - version
    - payload_hash
    - canonical_ref
    x-cmf-value-owner: DELEGATION_PROTOCOL
  ResultIdentityRef:
    type: object
    additionalProperties: false
    properties:
      result_id: *id005
      version:
        type: integer
        minimum: 1
      payload_hash: *id006
      canonical_ref: *id007
    required:
    - result_id
    - version
    - payload_hash
    - canonical_ref
  ExecutionIdentityRef:
    type: object
    additionalProperties: false
    properties:
      execution_id: *id005
      demand:
        $ref: '#/$defs/DemandIdentityRef'
      plan_ref:
        $ref: '#/$defs/ResourceIdentityRef'
    required:
    - execution_id
    - demand
    - plan_ref
  AuthorityClaim:
    type: object
    additionalProperties: false
    properties:
      action:
        type: string
        minLength: 1
        maxLength: 96
      principal:
        $ref: '#/$defs/PrincipalRef'
      field_scopes:
        type: array
        items: &id009
          type: string
          pattern: ^(?:/(?:[^~/]|~0|~1)*)*$
        minItems: 1
        uniqueItems: true
    required:
    - action
    - principal
    - field_scopes
  IntegrityProof:
    type: object
    additionalProperties: false
    properties:
      algorithm:
        type: string
        const: Ed25519
      key_id: *id007
      signer:
        $ref: '#/$defs/PrincipalRef'
      signature:
        type: string
        pattern: ^[A-Za-z0-9_-]{86}$
      issued_at: &id008
        type: string
        format: date-time
      expires_at:
        anyOf:
        - *id008
        - type: 'null'
      nonce: *id005
    required:
    - algorithm
    - key_id
    - signer
    - signature
    - issued_at
    - expires_at
    - nonce
  FailureSummary:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
        pattern: ^[A-Z][A-Z0-9_]{2,63}$
      category:
        type: string
        enum:
        - VALIDATION
        - AUTHORITY
        - COMPATIBILITY
        - BUDGET
        - EXECUTION
        - INTEGRITY
        - LIFECYCLE
        - CAPABILITY
        - HUMAN_REVIEW
        - SECURITY
      message:
        type: string
        minLength: 1
        maxLength: 1024
      retryable:
        type: boolean
      field_paths:
        type: array
        items: *id009
        uniqueItems: true
    required:
    - code
    - category
    - message
    - retryable
    - field_paths
  MoneyAmount:
    type: object
    additionalProperties: false
    properties:
      currency:
        type: string
        pattern: ^[A-Z]{3}$
      minor_units:
        type: integer
        minimum: 0
    required:
    - currency
    - minor_units
  BoundingBoxBasisPoints:
    type: object
    additionalProperties: false
    properties:
      x:
        type: integer
        minimum: 0
        maximum: 10000
      y:
        type: integer
        minimum: 0
        maximum: 10000
      width:
        type: integer
        minimum: 1
        maximum: 10000
      height:
        type: integer
        minimum: 1
        maximum: 10000
    required:
    - x
    - y
    - width
    - height
  EvidenceFinding:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
        pattern: ^[A-Z][A-Z0-9_]{2,63}$
      verdict:
        type: string
        enum:
        - PASS
        - CONCERNS
        - FAIL
      evidence_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
        minItems: 1
      note:
        anyOf:
        - type: string
          maxLength: 1024
        - type: 'null'
    required:
    - code
    - verdict
    - evidence_refs
    - note
  ChangeItem:
    type: object
    additionalProperties: false
    properties:
      path: *id009
      operation:
        type: string
        enum:
        - ADD
        - REMOVE
        - REPLACE
      value_ref:
        anyOf:
        - $ref: '#/$defs/ResourceIdentityRef'
        - type: 'null'
      reason:
        type: string
        minLength: 1
        maxLength: 1024
    required:
    - path
    - operation
    - value_ref
    - reason
  State:
    type: string
    enum:
    - DRAFT
    - SUBMITTED
    - REJECTED
    - ACCEPTED
    - IN_PROGRESS
    - RESULT_READY
    - RESULT_REJECTED
    - COMPLETED
    - AMENDMENT_REQUIRED
    - SUPERSEDED
    - COST_APPROVAL_REQUIRED
    - CAPABILITY_GAP
    - HUMAN_REVIEW_REQUIRED
    - CANCELLATION_REQUESTED
    - CANCELLED
    - PARTIAL_RESULT_READY
    - INVALIDATED
    - REVOKED
    - REPLACED
x-cmf-authority:
  allowed_producers:
  - DELEGATION_PROTOCOL
  path_kind: JSON_POINTER_TEMPLATE
  value_owner_by_path:
    /authority_effect_analysis: DELEGATION_PROTOCOL
    /authority_effect_analysis/{index}: DELEGATION_PROTOCOL
    /authority_effect_analysis/{index}/effect: DELEGATION_PROTOCOL
    /authority_effect_analysis/{index}/target_path: DELEGATION_PROTOCOL
    /authority_effect_analysis/{index}/value_owner: DELEGATION_PROTOCOL
    /behavioral_enforcement: DELEGATION_PROTOCOL
    /equivalence: DELEGATION_PROTOCOL
    /evidence_refs: DELEGATION_PROTOCOL
    /evidence_refs/{index}: DELEGATION_PROTOCOL
    /evidence_refs/{index}/canonical_ref: DELEGATION_PROTOCOL
    /evidence_refs/{index}/payload_hash: DELEGATION_PROTOCOL
    /evidence_refs/{index}/resource_id: DELEGATION_PROTOCOL
    /evidence_refs/{index}/version: DELEGATION_PROTOCOL
    /lossless: DELEGATION_PROTOCOL
    /migrated_at: DELEGATION_PROTOCOL
    /migration_id: DELEGATION_PROTOCOL
    /ordered_transformations: DELEGATION_PROTOCOL
    /ordered_transformations/{index}: DELEGATION_PROTOCOL
    /output_ref: DELEGATION_PROTOCOL
    /output_ref/canonical_ref: DELEGATION_PROTOCOL
    /output_ref/payload_hash: DELEGATION_PROTOCOL
    /output_ref/resource_id: DELEGATION_PROTOCOL
    /output_ref/version: DELEGATION_PROTOCOL
    /preserved_semantic_paths: DELEGATION_PROTOCOL
    /preserved_semantic_paths/{index}: DELEGATION_PROTOCOL
    /source_message_type: DELEGATION_PROTOCOL
    /source_payload_hash: DELEGATION_PROTOCOL
    /source_validation: DELEGATION_PROTOCOL
    /source_version: DELEGATION_PROTOCOL
    /target_artifacts: DELEGATION_PROTOCOL
    /target_artifacts/{index}: DELEGATION_PROTOCOL
    /target_artifacts/{index}/canonical_ref: DELEGATION_PROTOCOL
    /target_artifacts/{index}/message_type: DELEGATION_PROTOCOL
    /target_artifacts/{index}/payload_hash: DELEGATION_PROTOCOL
    /target_validation: DELEGATION_PROTOCOL
    /target_version: DELEGATION_PROTOCOL
x-cmf-consumers:
- CONTENT_HARNESS
- DELEGATION_PROTOCOL
- VISUAL_ASSET_EDITOR
- CONTROL_TOWER
x-cmf-idempotency: REQUIRED
x-cmf-lifecycle-effects:
- contract_migration_recorded
