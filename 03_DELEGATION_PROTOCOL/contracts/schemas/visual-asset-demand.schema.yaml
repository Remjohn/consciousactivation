$schema: https://json-schema.org/draft/2020-12/schema
$id: https://contracts.cmf.dev/delegation/visual-asset-demand/1.1/schema.json
title: Visual Asset Demand
description: CMF delegation protocol visual-asset-demand message.
x-cmf-message-type: visual-asset-demand
x-cmf-message-version: '1.1'
type: object
additionalProperties: false
properties:
  request_id:
    type: string
    pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$
    x-cmf-value-owner: CONTENT_HARNESS
  version:
    type: integer
    minimum: 1
    x-cmf-value-owner: CONTENT_HARNESS
  supersedes:
    anyOf:
    - $ref: '#/$defs/DemandIdentityRef'
      x-cmf-value-owner: CONTENT_HARNESS
    - type: 'null'
    x-cmf-value-owner: CONTENT_HARNESS
  content_harness_ref:
    $ref: '#/$defs/ResourceIdentityRef'
    x-cmf-value-owner: CONTENT_HARNESS
  category_profile:
    $ref: '#/$defs/ResourceIdentityRef'
    x-cmf-value-owner: CONTENT_HARNESS
  format_profile:
    $ref: '#/$defs/ResourceIdentityRef'
    x-cmf-value-owner: CONTENT_HARNESS
  asset_classification:
    type: object
    additionalProperties: false
    properties:
      family:
        type: string
        minLength: 1
        maxLength: 64
        x-cmf-value-owner: CONTENT_HARNESS
      subtype:
        type: string
        minLength: 1
        maxLength: 64
        x-cmf-value-owner: CONTENT_HARNESS
      harness_role:
        type: string
        minLength: 1
        maxLength: 96
        x-cmf-value-owner: CONTENT_HARNESS
      visual_syntax_role:
        type: string
        minLength: 1
        maxLength: 96
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - family
    - subtype
    - harness_role
    - visual_syntax_role
    x-cmf-value-owner: CONTENT_HARNESS
  source_provenance:
    type: object
    additionalProperties: false
    properties:
      source_kind:
        type: string
        enum:
        - interview_expression
        - public_comment
        - direct_message_reply
        - authored_source
        - live_premise
        - research_synthesis
        - operator_supplied
        - legacy_migrated
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - source_kind
    x-cmf-value-owner: CONTENT_HARNESS
  activative_semantic_lineage:
    type: object
    additionalProperties: false
    properties:
      activative_intelligence_pack_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
      identity_dna_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
      context_premise_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
      resonance_map_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
      matrix_edge_product_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
      activative_call_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        x-cmf-value-owner: CONTENT_HARNESS
      reaction_receipt_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
      expression_moment_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
      source_evidence_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - activative_intelligence_pack_ref
    - identity_dna_ref
    - context_premise_ref
    - resonance_map_ref
    - matrix_edge_product_ref
    - activative_call_refs
    - source_evidence_refs
    x-cmf-value-owner: CONTENT_HARNESS
  activation_contract:
    type: object
    additionalProperties: false
    properties:
      edge_pressure:
        type: string
        minLength: 1
        maxLength: 512
        x-cmf-value-owner: CONTENT_HARNESS
      activation_directions:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
      viewer_roles:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
      stance:
        type: string
        minLength: 1
        maxLength: 512
        x-cmf-value-owner: CONTENT_HARNESS
      identity_urges:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
      intended_reaction:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      participation_design:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      micro_commitment:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - edge_pressure
    - activation_directions
    - viewer_roles
    - stance
    - identity_urges
    - intended_reaction
    - participation_design
    - micro_commitment
    x-cmf-value-owner: CONTENT_HARNESS
  semantic_intent:
    type: object
    additionalProperties: false
    properties:
      subject:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      recognition_target:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      viewer_start_state:
        type: string
        minLength: 1
        maxLength: 512
        x-cmf-value-owner: CONTENT_HARNESS
      viewer_end_state:
        type: string
        minLength: 1
        maxLength: 512
        x-cmf-value-owner: CONTENT_HARNESS
      evidence_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - subject
    - recognition_target
    - viewer_start_state
    - viewer_end_state
    - evidence_refs
    x-cmf-value-owner: CONTENT_HARNESS
  visual_semantic_pack:
    type: object
    additionalProperties: false
    properties:
      recognition_intent:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      recognition_carrier:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      audience_visual_world_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        x-cmf-value-owner: CONTENT_HARNESS
      visual_dog_whistles:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 256
          x-cmf-value-owner: CONTENT_HARNESS
        x-cmf-value-owner: CONTENT_HARNESS
      real_life_reference_classes:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 256
          x-cmf-value-owner: CONTENT_HARNESS
        x-cmf-value-owner: CONTENT_HARNESS
      emotional_load_carrier:
        type: string
        minLength: 1
        maxLength: 512
        x-cmf-value-owner: CONTENT_HARNESS
      semiotic_mcda_receipt_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - recognition_intent
    - recognition_carrier
    - audience_visual_world_refs
    - visual_dog_whistles
    - real_life_reference_classes
    - emotional_load_carrier
    - semiotic_mcda_receipt_ref
    x-cmf-value-owner: CONTENT_HARNESS
  visual_narrative_program:
    type: object
    additionalProperties: false
    properties:
      pattern_match:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      pattern_interrupt:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      attention_state_sequence:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        x-cmf-value-owner: CONTENT_HARNESS
      viewer_role_progression:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        x-cmf-value-owner: CONTENT_HARNESS
      prediction_gap:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      payoff:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      affinity_field:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
      anticipation_residue:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - pattern_match
    - pattern_interrupt
    - attention_state_sequence
    - viewer_role_progression
    - prediction_gap
    - payoff
    - affinity_field
    - anticipation_residue
    x-cmf-value-owner: CONTENT_HARNESS
  feature_contracts:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        feature:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        contract_ref:
          $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        required_for_meaning:
          type: boolean
          x-cmf-value-owner: CONTENT_HARNESS
      required:
      - feature
      - contract_ref
      - required_for_meaning
      x-cmf-value-owner: CONTENT_HARNESS
    minItems: 1
    x-cmf-value-owner: CONTENT_HARNESS
  somatic_route_request:
    type: object
    additionalProperties: false
    properties:
      t_codes:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
      v_codes:
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 128
          x-cmf-value-owner: CONTENT_HARNESS
        minItems: 1
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
      intended_body_effect:
        type: string
        minLength: 1
        maxLength: 1024
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - t_codes
    - v_codes
    - intended_body_effect
    x-cmf-value-owner: CONTENT_HARNESS
  activative_function:
    type: object
    additionalProperties: false
    properties:
      function:
        type: string
        minLength: 1
        maxLength: 256
        x-cmf-value-owner: CONTENT_HARNESS
      intended_viewer_effect:
        type: string
        minLength: 1
        maxLength: 512
        x-cmf-value-owner: CONTENT_HARNESS
      sequence_position:
        type: integer
        minimum: 0
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - function
    - intended_viewer_effect
    - sequence_position
    x-cmf-value-owner: CONTENT_HARNESS
  wrong_reading_locks:
    type: array
    items:
      type: string
      minLength: 1
      maxLength: 512
      x-cmf-value-owner: CONTENT_HARNESS
    minItems: 1
    uniqueItems: true
    x-cmf-value-owner: CONTENT_HARNESS
  composition_intent:
    type: object
    additionalProperties: false
    properties:
      canvas_width_px:
        type: integer
        minimum: 1
        maximum: 32768
        x-cmf-value-owner: CONTENT_HARNESS
      canvas_height_px:
        type: integer
        minimum: 1
        maximum: 32768
        x-cmf-value-owner: CONTENT_HARNESS
      intended_region:
        $ref: '#/$defs/BoundingBoxBasisPoints'
        x-cmf-value-owner: CONTENT_HARNESS
      tolerance_basis_points:
        type: integer
        minimum: 0
        maximum: 2500
        x-cmf-value-owner: CONTENT_HARNESS
      layer_role:
        type: string
        minLength: 1
        maxLength: 96
        x-cmf-value-owner: CONTENT_HARNESS
      visual_weight:
        type: string
        enum:
        - PRIMARY
        - SECONDARY
        - SUPPORTING
        x-cmf-value-owner: CONTENT_HARNESS
      reserved_regions:
        type: array
        items:
          $ref: '#/$defs/BoundingBoxBasisPoints'
          x-cmf-value-owner: CONTENT_HARNESS
        x-cmf-value-owner: CONTENT_HARNESS
      gaze_direction:
        type: string
        enum:
        - LEFT
        - RIGHT
        - CENTER
        - NONE
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - canvas_width_px
    - canvas_height_px
    - intended_region
    - tolerance_basis_points
    - layer_role
    - visual_weight
    - reserved_regions
    - gaze_direction
    x-cmf-value-owner: CONTENT_HARNESS
  identity_continuity:
    type: object
    additionalProperties: false
    properties:
      character_ref:
        anyOf:
        - $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        - type: 'null'
        x-cmf-value-owner: CONTENT_HARNESS
      environment_ref:
        anyOf:
        - $ref: '#/$defs/ResourceIdentityRef'
          x-cmf-value-owner: CONTENT_HARNESS
        - type: 'null'
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - character_ref
    - environment_ref
    x-cmf-value-owner: CONTENT_HARNESS
  reference_evidence:
    type: array
    items:
      $ref: '#/$defs/ResourceIdentityRef'
      x-cmf-value-owner: CONTENT_HARNESS
    minItems: 1
    x-cmf-value-owner: CONTENT_HARNESS
  delivery:
    type: object
    additionalProperties: false
    properties:
      width_px:
        type: integer
        minimum: 1
        maximum: 32768
        x-cmf-value-owner: CONTENT_HARNESS
      height_px:
        type: integer
        minimum: 1
        maximum: 32768
        x-cmf-value-owner: CONTENT_HARNESS
      media_type:
        type: string
        enum:
        - image/png
        - image/jpeg
        - image/webp
        x-cmf-value-owner: CONTENT_HARNESS
      candidate_count:
        type: integer
        minimum: 1
        maximum: 16
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - width_px
    - height_px
    - media_type
    - candidate_count
    x-cmf-value-owner: CONTENT_HARNESS
  evaluation_policy:
    type: object
    additionalProperties: false
    properties:
      profile_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
      maximum_rounds:
        type: integer
        minimum: 1
        maximum: 20
        x-cmf-value-owner: CONTENT_HARNESS
      hard_gate_codes:
        type: array
        items:
          type: string
          pattern: ^[A-Z][A-Z0-9_]{2,63}$
          x-cmf-value-owner: CONTENT_HARNESS
        uniqueItems: true
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - profile_ref
    - maximum_rounds
    - hard_gate_codes
    x-cmf-value-owner: CONTENT_HARNESS
  execution_policy:
    type: object
    additionalProperties: false
    properties:
      budget_authorization_ref:
        $ref: '#/$defs/ResourceIdentityRef'
        x-cmf-value-owner: CONTENT_HARNESS
      priority:
        type: string
        enum:
        - LOW
        - NORMAL
        - HIGH
        - CRITICAL
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - budget_authorization_ref
    - priority
    x-cmf-value-owner: CONTENT_HARNESS
  notes:
    anyOf:
    - type: string
      maxLength: 2048
      x-cmf-value-owner: CONTENT_HARNESS
    - type: 'null'
    x-cmf-value-owner: CONTENT_HARNESS
required:
- request_id
- version
- supersedes
- content_harness_ref
- category_profile
- format_profile
- asset_classification
- source_provenance
- activative_semantic_lineage
- activation_contract
- semantic_intent
- visual_semantic_pack
- visual_narrative_program
- feature_contracts
- somatic_route_request
- activative_function
- wrong_reading_locks
- composition_intent
- identity_continuity
- reference_evidence
- delivery
- evaluation_policy
- execution_policy
- notes
$defs:
  PrincipalRef:
    type: object
    additionalProperties: false
    properties:
      principal_id: &id001
        type: string
        pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$
        x-cmf-value-owner: CONTENT_HARNESS
      principal_type:
        type: string
        enum:
        - CONTENT_HARNESS
        - DELEGATION_PROTOCOL
        - VISUAL_ASSET_EDITOR
        - CONTROL_TOWER
      product_version:
        type: string
        pattern: ^[0-9]+\.[0-9]+$
    required:
    - principal_id
    - principal_type
    - product_version
  DemandIdentityRef:
    type: object
    additionalProperties: false
    properties:
      request_id: *id001
      version:
        type: integer
        minimum: 1
        x-cmf-value-owner: CONTENT_HARNESS
      payload_hash: &id002
        type: string
        pattern: ^sha256:[0-9a-f]{64}$
        x-cmf-value-owner: CONTENT_HARNESS
      canonical_ref: &id003
        type: string
        format: uri
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - request_id
    - version
    - payload_hash
    - canonical_ref
    x-cmf-value-owner: CONTENT_HARNESS
  ResourceIdentityRef:
    type: object
    additionalProperties: false
    properties:
      resource_id: *id001
      version:
        type: string
        minLength: 1
        maxLength: 64
        x-cmf-value-owner: CONTENT_HARNESS
      payload_hash: *id002
      canonical_ref: *id003
    required:
    - resource_id
    - version
    - payload_hash
    - canonical_ref
    x-cmf-value-owner: CONTENT_HARNESS
  ResultIdentityRef:
    type: object
    additionalProperties: false
    properties:
      result_id: *id001
      version:
        type: integer
        minimum: 1
      payload_hash: *id002
      canonical_ref: *id003
    required:
    - result_id
    - version
    - payload_hash
    - canonical_ref
  ExecutionIdentityRef:
    type: object
    additionalProperties: false
    properties:
      execution_id: *id001
      demand:
        $ref: '#/$defs/DemandIdentityRef'
      plan_ref:
        $ref: '#/$defs/ResourceIdentityRef'
    required:
    - execution_id
    - demand
    - plan_ref
  AuthorityClaim:
    type: object
    additionalProperties: false
    properties:
      action:
        type: string
        minLength: 1
        maxLength: 96
      principal:
        $ref: '#/$defs/PrincipalRef'
      field_scopes:
        type: array
        items: &id005
          type: string
          pattern: ^(?:/(?:[^~/]|~0|~1)*)*$
        minItems: 1
        uniqueItems: true
    required:
    - action
    - principal
    - field_scopes
  IntegrityProof:
    type: object
    additionalProperties: false
    properties:
      algorithm:
        type: string
        const: Ed25519
      key_id: *id003
      signer:
        $ref: '#/$defs/PrincipalRef'
      signature:
        type: string
        pattern: ^[A-Za-z0-9_-]{86}$
      issued_at: &id004
        type: string
        format: date-time
      expires_at:
        anyOf:
        - *id004
        - type: 'null'
      nonce: *id001
    required:
    - algorithm
    - key_id
    - signer
    - signature
    - issued_at
    - expires_at
    - nonce
  FailureSummary:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
        pattern: ^[A-Z][A-Z0-9_]{2,63}$
      category:
        type: string
        enum:
        - VALIDATION
        - AUTHORITY
        - COMPATIBILITY
        - BUDGET
        - EXECUTION
        - INTEGRITY
        - LIFECYCLE
        - CAPABILITY
        - HUMAN_REVIEW
        - SECURITY
      message:
        type: string
        minLength: 1
        maxLength: 1024
      retryable:
        type: boolean
      field_paths:
        type: array
        items: *id005
        uniqueItems: true
    required:
    - code
    - category
    - message
    - retryable
    - field_paths
  MoneyAmount:
    type: object
    additionalProperties: false
    properties:
      currency:
        type: string
        pattern: ^[A-Z]{3}$
      minor_units:
        type: integer
        minimum: 0
    required:
    - currency
    - minor_units
  BoundingBoxBasisPoints:
    type: object
    additionalProperties: false
    properties:
      x:
        type: integer
        minimum: 0
        maximum: 10000
        x-cmf-value-owner: CONTENT_HARNESS
      y:
        type: integer
        minimum: 0
        maximum: 10000
        x-cmf-value-owner: CONTENT_HARNESS
      width:
        type: integer
        minimum: 1
        maximum: 10000
        x-cmf-value-owner: CONTENT_HARNESS
      height:
        type: integer
        minimum: 1
        maximum: 10000
        x-cmf-value-owner: CONTENT_HARNESS
    required:
    - x
    - y
    - width
    - height
    x-cmf-value-owner: CONTENT_HARNESS
  EvidenceFinding:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
        pattern: ^[A-Z][A-Z0-9_]{2,63}$
      verdict:
        type: string
        enum:
        - PASS
        - CONCERNS
        - FAIL
      evidence_refs:
        type: array
        items:
          $ref: '#/$defs/ResourceIdentityRef'
        minItems: 1
      note:
        anyOf:
        - type: string
          maxLength: 1024
        - type: 'null'
    required:
    - code
    - verdict
    - evidence_refs
    - note
  ChangeItem:
    type: object
    additionalProperties: false
    properties:
      path: *id005
      operation:
        type: string
        enum:
        - ADD
        - REMOVE
        - REPLACE
      value_ref:
        anyOf:
        - $ref: '#/$defs/ResourceIdentityRef'
        - type: 'null'
      reason:
        type: string
        minLength: 1
        maxLength: 1024
    required:
    - path
    - operation
    - value_ref
    - reason
  State:
    type: string
    enum:
    - DRAFT
    - SUBMITTED
    - REJECTED
