  required: 1
  verdict: PASS
  missing: []
authority_sources:
  - Activative Intelligence Constitution V1.1
  - Builder PRD V1.2
  - docs/planning/STORY_INVENTORY.yaml#ST-08.05
  - docs/tech-specs/specs/TS-13-IMPLEMENTATION-AUTHORIZATION-AND-DEVELOPMENT-CAPSULE.md
