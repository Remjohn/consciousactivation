contract_references:
  planned_handles:
    - EvaluationCase
    - ConstitutionalEvaluationReceipt
    - ConstitutionalReadinessReceipt
    - RepairReceipt
  schemas:
    - docs/contracts/schemas/constitutional-evaluation.schema.json
    - docs/contracts/schemas/conversational-expression.schema.json
  ownership_rule: existing contracts and schemas are referenced without local fork or authority expansion
implementation_scope_after_dependency_pass:
  - accept only an active hash-valid ST-08.04 root-cause diagnosis and Repair and Invalidation Graph declaration
  - derive one bounded Builder-owned repair unit from the diagnosed responsible phase or capability and permitted repair fields
  - compute affected descendants and targeted regression requirements from immutable dependency and invalidation graphs
  - preserve source locks, observations, ratified decisions, contracts and artifacts still supported by evidence
  - create a new immutable repaired-version candidate without mutating or deleting prior history
  - compile a bounded rerun plan and ingest governed local rerun results without invoking an external runtime
  - deterministically commit, reject, invalidate or roll back the candidate and emit exact receipts
accepted_diagnosis_gate:
  required_status: ACCEPTED_ROOT_CAUSE
  required_inputs:
    - diagnosis_identity_version_and_hash
    - failure_identity_and_stable_code
    - reproduction_and_evidence_refs
    - selected_root_cause_and_confidence_basis
    - smallest_responsible_layer
    - responsible_owner_and_authority_ref
    - permitted_repair_fields
    - frozen_state
    - affected_descendant_set
    - targeted_regression_requirements
    - rollback_and_escalation_conditions
  reject_when:
    - diagnosis is unresolved, ambiguous, stale, superseded, altered or invalidated
    - diagnosis lacks exact lineage or authority
    - proposed repair changes a field outside the diagnosed permitted scope
    - proposed repair is aimed only at the observed symptom
selective_repair_contract:
  repair_unit:
    exactly_one_primary_responsible_unit: true
    permitted_owners: [Builder_owned_phase, Builder_owned_capability, Builder_owned_contract_projection]
    external_product_unit: prohibited
  candidate_version:
    new_immutable_identity_required: true
    parent_version_reference_required: true
    prior_bytes_mutation: prohibited
    historical_deletion_or_rewrite: prohibited
  preserved_state:
    required_classes:
      - source_locks
      - measured_observations
      - ratified_decisions
      - authority_and_constitution_refs
      - supported_contracts
      - unaffected_artifacts
      - unaffected_receipts
    preservation_proof_required: true
  broad_rewrite:
    whole_run_regeneration: prohibited
    unrelated_module_or_phase_mutation: prohibited
    upstream_truth_rewrite: prohibited
affected_unit_and_descendant_selection:
  source: accepted_ST-08.04_repair_and_invalidation_graph
  rules:
    - affected units include the responsible unit and only demonstrated dependent descendants
    - unaffected siblings, ancestors and independent branches remain frozen and reusable
    - every selected descendant records the exact dependency edge that caused selection
    - every excluded adjacent unit records why it remains valid
    - changed graph identity requires a new repair command and receipt
  overbroad_or_manual_guess: reject
bounded_rerun_plan:
  required_fields:
    - repair_candidate_identity
    - responsible_unit
    - affected_descendants
    - directly_required_tests
    - descendant_regression_suites
    - applicable_benchmark_refs
    - protected_case_policy_status
    - execution_order
    - stop_conditions
    - result_receipt_requirements
  rules:
    - scope is derived from dependency impact rather than operator guesswork
    - required regressions may not be omitted
    - protected cases are included only where separately authorized policy permits
    - blocked or unavailable suites remain visibly blocked and prevent completion where required
    - this Story compiles and validates local rerun state but does not invoke external runtimes or providers
  completion_rule: repair is incomplete until every required local result passes or remains explicitly blocked
escalation_policy:
  human_review_required_when:
    - ratified_constitutional_decision_would_change
    - harness_boundary_would_broaden
    - stable_canonical_skill_would_change
    - contradictory_doctrine_is_present
    - configured_repeat_failure_limit_is_reached
    - responsible_layer_or_authority_is_ambiguous
  effect:
    - freeze further automated repair for the affected scope
    - preserve evidence and prior attempts
    - emit options, affected authority, required decision and escalation receipt
  repeat_failure_limit_source: versioned_policy_reference_required_no_threshold_invented_here
rollback_and_invalidation:
  atomic_candidate_commit: required
  failure_before_commit: zero candidate, event, command or receipt state
  rollback:
    - restore the prior active immutable version reference
    - preserve failed candidate and evidence as non-active history where committed
    - remove no historical receipt or observation
  invalidation:
    - mark only the repaired unit's affected descendants stale or invalidated
    - keep ancestors and unaffected branches active
    - create a new invalidation receipt rather than mutating old receipts
  historical_reproduction: required
lineage_and_determinism:
  pinned_inputs:
    - run_and_command_identity
    - accepted_ST-08.04_diagnosis_and_graph_hashes
    - repair_subject_and_parent_version
    - permitted_field_set
    - preserved_state_hashes
    - dependency_and_descendant_graph_versions
    - rerun_policy_and_suite_versions
    - authority_and_escalation_policy_refs
    - local_rerun_result_hashes
  canonical_identity_rule: repair candidate, selection, rerun plan, decision, invalidation and rollback receipts derive only from canonical governed content
  repeat_command: identical payload returns original outcome and receipt without duplicate mutation
  conflicting_command: reject atomically with zero new state
  nondeterministic_identity_inputs_prohibited:
    - wall_clock_time
    - random_identifier
    - absolute_machine_path
    - environment_specific_value
failure_and_authority_boundary:
  reject:
    - repair_without_accepted_diagnosis
    - skipped_required_regression
    - protected_or_unaffected_upstream_state_change
    - invalidation_broader_than_affected_descendants
    - retry_beyond_governed_limit
    - suppressed_required_escalation
    - unauthorized repair, activation, invalidation or rollback
    - external runtime, provider or product-internal execution request
  partial_state_on_failure: prohibited
  external_runtime_or_transport: prohibited
  production_deployment_or_publication: prohibited
blocker_and_evidence_gates_remaining:
  BD-004: EVIDENCE_PENDING
  BD-008: EVIDENCE_PENDING
  HD-006: HUMAN_POLICY_PENDING_REAL_HUMAN_REACTION_DATA_PROHIBITED
  HD-007: HUMAN_POLICY_PENDING_CONVERSATIONAL_THRESHOLDS_AND_CERTIFICATION
  cross_repository_dependencies:
    ids: [XDEP-001, XDEP-002, XDEP-003, XDEP-004, XDEP-006]
    status: AUTHORITY_OR_EXTERNAL_VALIDATION_REMAINS_EXTERNAL
