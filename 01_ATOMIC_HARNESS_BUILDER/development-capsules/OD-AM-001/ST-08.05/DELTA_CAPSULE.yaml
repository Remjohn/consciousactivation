    - development-capsules/OD-AM-001/ST-08.05/TEST_RESULTS.json
    - development-capsules/OD-AM-001/ST-08.05/FILE_CHANGE_MANIFEST.yaml
    - development-capsules/OD-AM-001/ST-08.05/IMPLEMENTATION_COMPLETION_RECEIPT.yaml
  mechanical_integrator_files:
    - docs/implementation/offline-development/SOURCE_BOUNDARY_REGISTRY.yaml
prohibited_changes:
  - every path not explicitly listed in future_path_allowlist
  - shared run aggregates, ports, authority services, atomicity commands and repository adapters
  - package exports and all __init__.py files
  - exact-source architecture tests
  - confirmed Stories, Epics, obligations, specifications, ADRs, schemas or historical receipts
  - ST-08.04 implementation or completion evidence
  - external runtime, transport, provider, model, credential or network behavior
  - broad rewrite, whole-run restart, external-product repair or external-product internal behavior
  - real protected labels, real human reactions, production thresholds, production promotion or certification
acceptance_after_dependency_pass:
  - only an accepted hash-valid diagnosis can authorize one bounded Builder-owned repair unit
  - repaired candidates are new immutable versions and prior history remains byte-reproducible
  - affected descendants and regressions are selected from exact graph edges rather than manual guesses
  - supported upstream state, ancestors, siblings and independent branches remain unchanged
  - required local regressions pass or remain visibly blocking; unavailable protected cases are never fabricated
  - constitutional, boundary, stable-skill, contradictory-doctrine and repeated failures trigger human escalation
  - identical governed inputs produce byte-identical repair, rerun, invalidation and rollback receipts
  - unauthorized, overbroad or conflicting operations fail atomically with zero partial state
completion_semantics:
