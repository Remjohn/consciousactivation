implementation_scope_after_dependency_pass:
  - immutable versioned WorkflowIR, node, edge, condition, profile and typed-handoff contracts
  - explicit primary actor classification as deterministic code, bounded agent program, human gate or governed hybrid
  - actor rationale, authority boundary, prerequisites, entry conditions, success and failure exits, routes and terminal states
  - explicit budgets, isolation declarations, event declarations, retries, human gates, test references and promotion status
  - compilation from hash-pinned approved lifecycle, target, capability, phase, context, contract, dependency, repair and authorization graphs
  - versioned structural workflow-profile registry without production promotion
  - deterministic local adapter for compilation, registration, routing and read-only query conformance only
  - stable routing from request classification, target profile, risk state and registry version
  - explicit typed nondeterminism receipt when deterministic routing cannot be established
  - deterministic canonical bytes, immutable identities, replay-safe duplicate compilation and typed conflict rejection
