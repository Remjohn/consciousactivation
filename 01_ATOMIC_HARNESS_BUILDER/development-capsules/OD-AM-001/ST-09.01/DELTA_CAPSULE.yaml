  - certified
acceptance_after_dependency_pass:
  - identical approved graph inputs produce byte-identical WorkflowIR, routing decisions and receipts
  - every node has exactly one explicit actor kind, actor rationale, authority boundary and typed input-output contract
  - the IR represents prerequisites, conditions, success and failure exits, bounded feedback declarations, terminal states and invalidation
  - missing actors, ambiguous ownership, cycles, undeclared handoffs and unapproved graph sources fail closed
  - routing is deterministic from exact request classification, target profile, risk state and registry version or emits a typed nondeterminism receipt
  - workflow profiles and adapters are versioned and cannot be promoted without migration and rollback evidence
  - the local adapter performs no phase, workflow, agent or external-product execution
  - Temporal conformance remains explicitly EXTERNAL_VALIDATION_PENDING and no production or certification claim is emitted
