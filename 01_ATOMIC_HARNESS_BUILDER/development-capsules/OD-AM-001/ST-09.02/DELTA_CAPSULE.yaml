two_gate_boundary:
  implementation_gate:
    scope: deterministic local routing, manual-shadow capture and parity-validation mechanism over repository-owned development fixtures
    closes_evidence_gate: false
  evidence_gate:
    status: MANUAL_SHADOW_AND_EXTERNAL_VALIDATION_PENDING
    required_real_evidence: observed end-to-end expert behavior for the selected reference path
    may_be_closed_by_synthetic_fixture: false
    production_automation_authority: false
implementation_scope_after_dependency_pass:
  - select one eligible versioned Workflow Profile before execution from request type, target, run state, risk, incident class and registry policy
  - capture immutable ordered shadow observations for human actions, bounded agent judgments, deterministic operations, handoffs, conditions, failures, cost and artifacts
  - map each observed shadow step to one exact Workflow IR node or an explicit governed exclusion reason
  - compare a hash-pinned development shadow trace to the selected Workflow IR and emit a deterministic parity or gap receipt
  - enforce code-owned deterministic operations outside all agent capsules and free-form outputs
  - validate every agent-owned node against an evaluated versioned phase-local capsule, input contract, model policy and tool permission declaration without executing the agent
  - preserve provider-neutral ports, exact lineage, replay, invalidation and rollback
workflow_router_contract:
  required_inputs:
    - request_type
    - compilation_target
    - run_state
    - risk_class
    - incident_class
    - workflow_profile_registry_version_and_hash
  required_result:
    - selected_profile_id_and_version
    - deterministic_rule_or_bounded_classifier_identity
    - confidence_or_exact_rule_result
    - eligible_alternatives
    - selection_reason
    - authority_and_policy_refs
  rules:
    - route before any shadow or automated execution begins
    - unmatched profile fails closed
    - ambiguous high-risk route blocks for human selection
    - ineligible, stale, superseded or uncertified-for-request profile cannot be silently selected
manual_shadow_trace_contract:
  required_step_kinds:
    - human_action
    - agent_judgment
    - deterministic_operation
    - handoff
    - condition
    - failure
    - cost_observation
    - artifact_observation
  required_step_fields:
    - shadow_step_id
    - sequence_index
    - actor_kind_and_identity
    - action_or_decision
    - input_and_output_refs
    - authority_boundary
    - observed_condition
    - failure_context
    - cost_record_or_NOT_APPLICABLE_basis
    - artifact_refs
    - mapped_Workflow_IR_node_or_exclusion_reason
    - provenance
  rules:
    - order and identity are immutable
    - no observed step is silently omitted
    - excluded steps require a versioned rationale and authority
    - shadow observations do not mutate source artifacts or Workflow IR
    - incomplete traces cannot pass parity
development_fixture_boundary:
  permitted_fixture:
    classification: repository_owned_synthetic_manual_shadow
    purpose: structural capture, mapping, parity and failure-path validation only
    actual_expert_behavior: false
    real_manual_shadow_evidence: false
  prohibited_claims:
    - real_expert_shadow_completed
    - manual_shadow_parity_proven_for_release
    - production_automation_ready
code_agent_separation:
  code_owned_node_kinds:
    - deterministic_transform
    - validator
    - linter
    - schema_check
    - graph_check
    - parser
    - state_mutation
  rules:
    - agent output cannot assert a code-owned check passed without an exact code-result receipt
    - code failure is returned as a typed contract and never hidden in free-form agent output
    - deterministic work delegated to an agent fails closed
    - local structural tests may use deterministic fixtures but no agent runtime
phase_local_agent_capsule_validation:
  required_refs:
    - node_identity_and_version
    - evaluated_model_program_or_agent_adapter
    - approved_JIT_Execution_Capsule_identity_and_hash
    - input_and_output_contract_versions
    - model_policy
    - tool_permissions
    - skill_recipe_adapter_input_and_output_identities
    - evaluation_and_maturity_receipts
  rules:
    - unpinned, unevaluated, stale, invalidated or scope-mismatched capsule fails closed
    - unrestricted session history and future-stage instructions are prohibited
    - tool permissions default deny and no external tool is invoked here
    - validation creates no agent, model or provider execution
shadow_parity_and_gap_receipt:
  required_fields:
    - selected_profile_and_Workflow_IR_hashes
    - shadow_trace_identity_and_hash
    - exact_step_to_node_mapping
    - excluded_step_rationales
    - missing_unobserved_or_unmapped_steps
    - actor_and_authority_conformance
    - code_agent_separation_results
    - phase_local_capsule_validation_results
    - cost_failure_handoff_and_artifact_coverage
    - limitations_and_open_evidence_gates
  permitted_decisions:
    - PASS_SYNTHETIC_STRUCTURAL_PARITY_ONLY
    - FAIL_INCOMPLETE_SHADOW
    - FAIL_ACTOR_OR_CAPSULE_BOUNDARY
    - BLOCKED_AMBIGUOUS_ROUTE
    - BLOCKED_REAL_MANUAL_SHADOW_EVIDENCE
  production_promotion_decision: prohibited
lineage_invalidation_and_determinism:
  pinned_inputs:
    - request_classification_and_router_policy
    - Workflow_Profile_registry_and_Workflow_IR
    - shadow_trace_and_step_artifacts
    - actor_assignment_and_authority_refs
    - deterministic_code_result_refs
    - JIT_capsule_contract_model_policy_tool_and_maturity_refs
    - parity_policy_and_adapter_versions
  invalidate_when_any_pinned_input_changes: true
  historical_trace_and_receipt_reproduction: required
  canonical_identity_rule: routing, trace, mapping, parity, gap and invalidation receipts derive only from canonical governed content
  repeat_command: identical payload returns original result without duplicate state
  conflicting_command: reject atomically with zero trace, receipt, event or command record
failure_and_authority_boundary:
  reject:
    - unmatched_or_high_risk_ambiguous_profile
    - missing_or_incomplete_manual_shadow_trace
    - synthetic_trace_represented_as_real_expert_evidence
    - deterministic_work_delegated_to_agent
    - agent_claim_of_unrecorded_code_check
    - agent_node_outside_evaluated_phase_local_capsule
    - unauthorized route, trace, mapping, parity or invalidation mutation
    - production workflow, agent, provider or external-product execution request
  partial_state_on_failure: prohibited
  workflow_or_agent_execution: prohibited
  external_runtime_or_transport: prohibited
