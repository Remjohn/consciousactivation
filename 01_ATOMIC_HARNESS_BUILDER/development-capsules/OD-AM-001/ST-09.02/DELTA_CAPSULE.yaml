  - external workflow engine, agent, model, provider, credential, network, transport or external-product behavior
  - behavior owned by ST-09.03 through ST-09.06
  - production automation, promotion, deployment, readiness or certification
acceptance_after_dependency_pass:
  - routing selects one exact eligible Workflow Profile before execution or blocks an ambiguous high-risk request
  - every required shadow step kind and field remains ordered, immutable and mapped or explicitly excluded
  - code-owned deterministic work remains outside agent capsules and requires exact code-result receipts
  - every agent-owned node validates an evaluated phase-local capsule and least-privilege contract without executing an agent
  - identical governed inputs produce byte-identical routing, shadow, mapping, gap and parity receipts
  - changed inputs invalidate affected active receipts while preserving historical reproduction
  - synthetic fixture evidence remains explicitly non-real and cannot close the manual-shadow or external validation gates
  - production automation, readiness and certification remain false
