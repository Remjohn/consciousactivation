    scope: deterministic local queue projection, telemetry, public-seam reconstruction and injected-fault recovery mechanisms
    closes_external_conformance: false
  evidence_gate:
    status: MANUAL_SHADOW_TEMPORAL_PROVIDER_ISOLATION_AND_EXTERNAL_VALIDATION_PENDING
    actual_durable_runtime_or_provider_fault_evidence: false
    actual_manual_shadow_parity_evidence: false
