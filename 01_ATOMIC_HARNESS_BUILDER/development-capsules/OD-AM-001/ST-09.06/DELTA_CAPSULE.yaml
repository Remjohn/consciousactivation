acceptance_after_dependency_pass:
  - local queue projections expose one authoritative state, transition reason and eligibility explanation per node
  - mandatory node, route, cost, latency, quality, intervention and artifact observations reconstruct the local event stream
  - hard budget overflow cannot continue silently and no provider observation is fabricated
  - public-seam tests cover routing, contracts, validation, feedback, resume, human gates, authority, observability and identity without private-state coupling
  - every injected fault reaches its governed contained state and repair, escalation, resume or rollback route with no partial state
  - identical governed inputs produce byte-identical projections, observations, outcomes and receipts
  - local structural and injected-fixture evidence cannot close manual-shadow, Temporal, provider, isolation-platform, external-product or production gates
