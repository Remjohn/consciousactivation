implementation_scope_after_dependency_pass:
  - project immutable queue and node status from canonical local workflow events with one non-conflicting authoritative state per node
  - expose why a node is queued, ineligible, waiting-human, blocked, retrying, cancelled, passed, failed or superseded
  - emit deterministic node and route observations for actor, versions, latency inputs, compute, token and cost inputs, tools, retries, cache, sandbox refs, artifacts, validation and final state
  - reconstruct local execution, cost, latency, quality, intervention, retry, cancellation and recovery history from the public event seam
  - enforce expected and hard context, token, latency, cost and deterministic-compute budgets without silent overflow
  - run deterministic injected-fault fixtures through local public seams and prove contained state, repair or escalation route, resume eligibility and rollback
  - preserve exact workflow, profile, route, candidate, checkpoint, authority, budget, artifact, provenance and invalidation lineage
queue_projection_contract:
  authoritative_states:
    - queued
    - eligible
    - running
    - waiting_human
    - blocked
    - retrying
    - cancelled
    - passed
    - failed
    - superseded
  required_fields:
    - workflow_profile_node_and_attempt_identity
    - current_state_and_transition_sequence
    - transition_reason_and_causal_event_refs
    - unmet_dependency_gate_or_budget_refs
    - actor_and_authority
    - checkpoint_and_artifact_refs
    - version_provenance_and_invalidation
  rules:
    - a node cannot be authoritative in conflicting states
    - transition order and eligibility are derived only from canonical governed events
    - missing, duplicated, out-of-order or conflicting events fail reconstruction closed
    - identical event streams produce byte-identical queue projections
  actual_engine_queue_or_scheduler: prohibited
telemetry_and_budget_contract:
  mandatory_node_fields:
    - actor_kind_and_identity
    - workflow_profile_node_and_contract_versions
    - governed_start_and_end_observations
    - queue_wait_and_execution_latency
    - deterministic_compute
    - model_token_and_cost_observations_when_applicable
    - tool_calls_and_capability_grants
    - attempts_retries_and_circuit_state
    - cache_behavior
    - sandbox_policy_and_receipt_refs
    - input_output_artifact_and_validation_refs
    - human_interventions
    - final_status_and_failure_context
  budget_fields: [expected_tokens, hard_token_limit, expected_latency, hard_latency_limit, expected_cost, hard_cost_limit, deterministic_compute_limit]
  rules:
    - NOT_APPLICABLE usage fields remain explicit and justified
    - missing mandatory telemetry blocks local completion evidence
    - hard budget overflow blocks, follows an already-approved degradation policy or opens an authorized human gate
    - no provider cost, token, latency or sandbox observation may be invented
    - quality and hard gates cannot be replaced by cost ranking
  empirical_budget_thresholds: EVIDENCE_PENDING_NOT_ESTABLISHED
local_public_seam_contract:
  inputs:
    - immutable workflow_profile_and_route
    - typed commands_and_signals
    - canonical workflow_node_checkpoint_and_budget_events
    - injected_fault_fixture_identity
  outputs:
    - queue_projection
    - node_and_route_observations
    - contained_failure_or_completion_state
    - repair_escalation_resume_or_rollback_eligibility
    - local_public_seam_receipt
  assertions:
    - routing, contracts, validation, feedback, resume, human gates, authorization, observability and artifact identity remain externally observable at the local module seam
    - tests consume the public contract and never private implementation state
    - a focused module pass cannot substitute for a failed public-seam integration result
  Temporal_or_external_product_seam_conformance: EXTERNAL_VALIDATION_PENDING
injected_fault_and_recovery_matrix:
  local_fixture_classes:
    - agent_error
    - malformed_contract
    - deterministic_code_failure
    - timeout
    - lost_or_out_of_order_event
    - sandbox_termination
    - stale_checkpoint
    - provider_unavailable
    - partial_parallel_failure
  fixture_rule: each class is a deterministic typed injected observation and does not launch an agent, provider, engine, sandbox, process, container or external product
  required_outcomes:
    - expected contained terminal_or_waiting state
    - responsible repair_or_escalation route
    - unaffected branches and protected state preserved
    - resume eligibility or safe rollback is explicit
    - immutable failure and recovery receipt
  actual_Temporal_provider_sandbox_or_product_fault: prohibited
authority_invalidation_rollback_and_history:
  reject:
    - hidden_budget_overflow
    - missing_mandatory_telemetry
    - conflicting_authoritative_queue_states
    - private_internal_state_as_public_seam_evidence
    - untested_or_unreceipted_recovery_claim
    - fabricated_provider_cost_latency_token_or_outage_observation
    - unauthorized queue, telemetry, recovery, invalidation or rollback mutation
    - external engine, provider, model, network, credential, sandbox or product execution request
  invalidation:
    - changed event, workflow, profile, route, checkpoint, budget, authority or upstream artifact invalidates only affected projections, tests and descendants
  rollback:
    - restore prior active local projection and checkpoint reference without rewriting immutable history
  partial_state_on_failure: prohibited
  historical_reproduction: required
lineage_determinism_and_observability:
  canonical_inputs:
    - Workflow_IR_profile_node_route_and_contract_hashes
    - ST-09.05_race_route_evaluator_and_human_gate_receipts
    - checkpoint_resume_sandbox_and_parallel_plan_receipts
    - event_stream_budget_fault_fixture_and_public_seam_versions
    - authority_provenance_and_invalidation_refs
  identity_rule: queue, observation, public-seam, fault, recovery, invalidation and rollback identities derive only from canonical governed content
  repeat_command: identical payload returns the original projection, outcome and receipt without duplicate state
  conflicting_command: reject atomically with zero projection, recovery state, receipt, event or command record
  required_observation_fields: [run_id, story_id, artifact_identity, authority_identity, version, provenance, outcome, failure_context]
