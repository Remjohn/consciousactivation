contract_references:
  planned_handles:
    - WorkflowIR
    - WorkflowNodeContract
    - CheckpointReceipt
    - PromotionReceipt
  schema_refs: []
  ownership_rule: Builder workflow contracts remain provider-neutral and local; no external engine or product contract is forked
implementation_scope_after_dependency_pass:
  - quarantine every local node output until all declared deterministic validators, semantic-evaluator receipt references, authority checks and completion criteria pass
  - issue immutable node-validation or typed blocker receipts bound to exact node, input, output, validator and policy identities
  - derive the minimal complete failure-feedback package and exact recipient from the active Repair and Invalidation Graph
  - prevent unrelated nodes, ancestors and unaffected branches from receiving feedback or rerunning
  - require reproduced localized root-cause evidence before any repair route can be marked eligible
  - validate bounded retry, timeout, feedback-edge, circuit-breaker, terminal-state and escalation declarations without invoking an external scheduler
  - preserve locked evidence, ratified decisions, unaffected artifacts, lineage, replay, invalidation and rollback
node_output_quarantine:
  initial_status: QUARANTINED_PENDING_VALIDATION
  required_checks:
    - deterministic_validator_results
    - semantic_evaluator_receipt_refs_or_authoritative_NOT_APPLICABLE_basis
    - actor_and_authority_checks
    - input_output_contract_validation
    - completion_criteria
    - applicable_hard_gates
  release_requirements:
    - every declared check is present, active, hash-valid and PASS
    - node, input, output, validator, evaluator-policy and Workflow IR identities agree
    - no stale, superseded, invalidated or conflicting evidence exists
  failure_behavior:
    - output remains quarantined
    - downstream scheduling eligibility remains false
    - typed blocker and minimal failure-feedback receipt are emitted atomically
  HG-013: any output release without declared validation forces FAIL
node_validation_receipt:
  required_fields:
    - node_identity_version_and_hash
    - Workflow_IR_and_profile_refs
    - exact_input_and_output_hashes
    - validator_set_version_and_result_refs
    - semantic_evaluator_policy_and_receipt_refs
    - authority_and_completion_results
    - hard_gate_results
    - release_or_block_decision
    - failure_context_and_lineage
  mutable_after_issue: false
minimal_failure_feedback:
  required_fields:
    - failed_node_and_criterion
    - exact_reproduction_or_evidence_refs
    - responsible_root_cause_owner
    - Repair_and_Invalidation_Graph_ref
    - allowed_diagnosis_or_repair_scope
    - frozen_state
    - affected_descendant_refs
    - targeted_regression_requirements
    - escalation_conditions
  routing_rules:
    - route only to the graph-declared responsible node or owner
    - do not broadcast feedback through conversational history
    - unrelated nodes do not receive or rerun unless their contracts are explicitly invalidated
    - missing or ambiguous owner blocks routing for human or architecture escalation
    - failure package cannot mutate the failed output or preserved upstream state
root_cause_before_repair:
  required_evidence:
    - reproduced_or_independently_evidenced_failure
    - localized_affected_boundary
    - working_and_failing_path_comparison
    - testable_root_cause_hypothesis
    - hypothesis_test_results
    - selected_cause_and_confidence_basis
  rules:
    - repair proposal remains blocked until every required item is present
    - observed symptom alone is insufficient
    - repeated failed repair attempts trigger architecture escalation
    - this Story validates repair eligibility but does not execute repair behavior owned by the repair subsystem
bounded_control_flow_contract:
  every_retryable_node_or_feedback_edge_declares:
    - maximum_attempts
    - backoff_or_scheduling_policy
    - timeout
    - retryable_failure_classes
    - non_retryable_failure_classes
    - circuit_breaker_condition
    - terminal_states
    - escalation_destination
  additional_bounded_constructs:
    - loop_limit
    - fan_out_limit
    - arbitration_limit
    - fallback_limit
  rules:
    - missing or non-finite bound fails validation
    - exhausted attempts produce typed blocked or failed terminal state
    - open circuit breaker prohibits output release and further attempts
    - no autonomous self-correction or feedback loop may be unbounded
    - local tests simulate state transitions without sleeping, scheduling, network or external-engine execution
  HG-012: any unbounded retry or feedback loop forces FAIL
failure_isolation_and_history:
  immutable_protected_state:
    - source_locks
    - locked_evidence
    - ratified_decisions
    - constitutional_and_authority_refs
    - unaffected_artifacts
    - prior_validation_and_failure_receipts
  atomic_failure: zero partial downstream output, scheduling eligibility, feedback delivery, event or command record
  invalidation_scope: only demonstrated dependent descendants from the active graph
  historical_reproduction: required after invalidation or replacement
lineage_and_determinism:
  pinned_inputs:
    - Workflow_IR_profile_node_and_actor_versions
    - node_input_output_and_contract_hashes
    - validator_set_and_semantic_evaluator_policy_versions
    - authority_completion_and_hard_gate_refs
    - Repair_and_Invalidation_Graph_and_root_cause_policy
    - retry_timeout_circuit_breaker_and_escalation_policy
    - ST-09.02_router_shadow_mapping_and_gap_receipts
  canonical_identity_rule: validation, blocker, feedback, control-flow, invalidation and rollback receipts derive only from canonical governed content
  repeat_command: identical payload returns the original result without duplicate state
  conflicting_command: reject atomically with zero output release, feedback, receipt, event or command record
failure_and_authority_boundary:
  reject:
    - unvalidated_node_output_release
    - downstream_consumption_of_quarantined_output
    - unbounded_retry_loop_feedback_fan_out_arbitration_or_fallback
    - broad_or_conversational_failure_feedback
    - repair_route_without_reproduced_root_cause_evidence
    - output_or_attempt_after_circuit_breaker_opens
    - corruption_of_locked_or_unaffected_state
    - unauthorized validation, release, feedback, retry, invalidation or rollback
    - external runtime, agent, scheduler, provider or product execution request
  partial_state_on_failure: prohibited
  external_runtime_or_transport: prohibited
external_and_evidence_gates_remaining:
