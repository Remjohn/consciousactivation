  - production_workflow_ready
  - production_ready
  - certified
acceptance_after_dependency_pass:
  - every node output remains quarantined until all exact declared checks pass
  - failed validation prevents downstream scheduling and emits one immutable typed blocker
  - minimal complete failure evidence routes only to the graph-declared responsible owner
  - repair eligibility remains blocked without reproduced, localized and tested root-cause evidence
  - retry, timeout, circuit-breaker, feedback and terminal conditions are finite and explicit
  - locked evidence, ratified decisions and unaffected artifacts remain unchanged on every failure path
  - identical governed inputs produce byte-identical validation, blocker, feedback and control-flow receipts
  - synthetic local evidence cannot close manual-shadow, Temporal, external evaluator, production fault or promotion gates
