implementation_scope_after_dependency_pass:
  - validate at least one explicit dominant wrong-reading lock on every applicable synthetic structural evaluation subject
  - evaluate constitutional conversational dimensions independently without composite compensation
  - validate structural Activative Call, profile applicability, authority, semantic lineage and wrong-reading rejection declarations
  - emit deterministic structural evaluation and rejection receipts containing no human reaction evidence
  - preserve human-owned artifact applicability as explicit external or NOT_APPLICABLE state with justification
dominant_wrong_reading_lock_rules:
  minimum_count: 1
  non_empty_identity_required: true
  dominant_lock_required: true
  each_lock_fields:
    - lock_id
    - prohibited_reading
    - protected_meaning_ref
    - source_and_authority_refs
    - applicability
    - rejection_rule
  failure_behavior:
    - missing, empty, stale, altered or authorityless lock fails structural readiness
    - an output matching a prohibited reading is rejected regardless of other dimension results
    - inherited locks cannot be removed or weakened
    - additional stricter locks may not contradict the authoritative source
  repair_or_relaxation: requires a new authoritative upstream version and is outside this Story
independent_conversational_dimensions:
  dimension_ids:
    - role_clarity
    - pattern_match
    - pattern_interruption
    - prediction
    - payoff
    - affinity
    - anticipation
    - residue
    - anti_cliche
    - no_text_survival
    - wrong_reading_rejection
  rules:
    - each applicable dimension has its own result, evidence refs, limitation and failure context
    - no score, mean, trend or passing dimension may compensate for a failed dimension or wrong-reading lock
    - NOT_APPLICABLE is explicit, profile-specific and justified by authoritative structure
    - synthetic expected structure is not represented as actual human behavior
    - no-text survival evaluates meaning structure without inventing visual or human evidence
structural_expression_contract:
  permitted_inputs:
    - synthetic Activative Call declaration
    - synthetic intended-reaction constraint clearly marked desired_not_observed
    - synthetic smallest-useful-commitment declaration
    - structural conversational-turn declaration
    - mandatory wrong-reading locks
    - immutable Activative Intelligence Pack and semantic-lineage references
    - explicit Reaction Receipt and Expression Moment applicability markers
  required_applicability_states:
    - STRUCTURALLY_APPLICABLE_HUMAN_EVIDENCE_NOT_PROVIDED
    - NOT_APPLICABLE_WITH_JUSTIFICATION
  prohibited_substitution:
    - desired_reaction_as_observed_reaction
    - intended_expression_as_ExpressionMoment
    - synthetic_fixture_as_human_evidence
    - empty_reference_as_NOT_APPLICABLE
human_truth_and_artifact_ownership:
  human_owned:
    - original_human_truth
    - actual_reaction
    - ReactionReceipt
    - ExpressionMoment
    - IdentityDNA_amendment_approval
  Builder_may_do:
    - validate structural requirements and applicability
    - preserve immutable external evidence references when separately supplied and authorized
    - reject missing human evidence when a real-profile path requires it
  Builder_must_never_do:
    - manufacture or infer a human reaction
    - issue, simulate or backfill a ReactionReceipt
    - issue, simulate or backfill an ExpressionMoment
    - create or approve an IdentityDNA amendment from evaluation output
    - convert synthetic fixture assertions into human truth
structural_receipt_contract:
  required_fields:
    - subject_identity_version_and_hash
    - synthetic_fixture_identity_and_hash
    - category_and_profile
    - constitutional_authority_refs
    - Activative_Intelligence_and_semantic_lineage_refs
    - wrong_reading_lock_results
    - independent_dimension_results
    - human_owned_artifact_applicability
    - limitations_and_open_policy_gates
    - decision_and_failure_context
  permitted_decisions:
    - PASS_STRUCTURAL_DEVELOPMENT_ONLY
    - FAIL_WRONG_READING_LOCK
    - FAIL_STRUCTURAL_DIMENSION
    - BLOCKED_HUMAN_EVIDENCE_REQUIRED
    - BLOCKED_AUTHORITY
  production_or_certification_decision: prohibited
lineage_invalidation_and_determinism:
  pinned_inputs:
    - category_constitution_and_profile_versions
    - subject_and_fixture_identity_hashes
    - Activative_Intelligence_Pack_and_rich_semantic_refs
    - Activative_Call_and_wrong_reading_lock_versions
    - dimension_rubric_and_structural_evaluator_versions
    - human_owned_artifact_applicability_states
    - authority_policy_and_ST-08.06_receipt_refs
  invalidate_when_any_pinned_input_changes: true
  historical_receipt_reproduction: required
  canonical_identity_rule: results and receipts derive only from canonical governed content
  repeat_command: identical payload returns the original receipt without duplicate state
  conflicting_command: reject atomically with zero result, receipt, event or command record
  nondeterministic_identity_inputs_prohibited:
    - wall_clock_time
    - random_identifier
    - absolute_machine_path
    - environment_specific_value
failure_and_authority_boundary:
  reject:
    - absent_dominant_wrong_reading_lock
    - hard_failure_hidden_by_another_dimension
    - conversational_certification_request_while_HD-006_or_HD-007_open
    - human_truth_or_reaction_invention
    - false_ReactionReceipt_or_ExpressionMoment
    - automatic_IdentityDNA_mutation_or_approval
    - lost_or_flattened_semantic_lineage
    - unauthorized result, applicability, lock or receipt mutation
  partial_state_on_failure: prohibited
  external_evaluator_runtime_transport_or_provider_calls: prohibited
