implementation_scope_after_dependency_pass:
  - deterministic evidence-backed development readiness evaluation over exact immutable Builder artifacts and receipts
  - typed bounded-development, prototype-only and blocking authorization outcomes
  - immutable readiness and authorization receipts exposing passed, failed, unresolved and not-applicable gates
  - exact scope, limitations, restrictions, authority, signatories, evidence return and invalidation conditions
  - payload-safe idempotent issuance, revocation, invalidation and historical reproduction
readiness_dimensions:
  required:
    - evidence_saturation
    - atomicity
    - constitutional_authority
    - Harness_IR_consistency
    - phases
    - contexts
    - contracts
    - modules
    - skill_maturity
    - benchmark_results
    - repair_coverage
    - observability
    - budgets
    - target_specific_requirements
  rules:
    - every dimension has an exact evidence identity, status, limitation and failure context
    - document, file, schema or test presence alone cannot pass a dimension
    - NOT_APPLICABLE requires an authoritative target-profile basis
    - unresolved or missing evidence remains visibly blocking
    - one failed mandatory hard gate forces a blocking outcome
hard_gate_rules:
  HG-009:
    name: false_readiness_pass
    failure_result: BLOCKED_FALSE_READINESS
  HG-010:
    name: binding_anti_goal_violation
    failure_result: BLOCKED_ARCHITECTURE
  non_waivable_by_agent: true
  no_aggregate_or_document_count_compensation: true
development_authorization_outcomes:
  permitted:
