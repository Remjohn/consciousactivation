  - shared run aggregates, ports, authority services, atomicity commands and repository adapters
  - package exports and all __init__.py files
  - exact-source architecture tests
  - confirmed Stories, Epics, obligations, specifications, ADRs, schemas or historical receipts
  - ST-08.05 implementation or completion evidence
  - external runtime, transport, provider, model, credential, network or external-product behavior
  - production authorization, release authorization, certification, publication or status-file mutation
acceptance_after_dependency_pass:
  - every readiness dimension and hard gate exposes exact evidence, status, limitation and failure context
  - authorization cannot arise from document completeness, missing thresholds, unresolved blockers or anti-goal violations
  - prototype-only receipts contain every required scope, evidence-return, disposal, budget and promotion condition
  - exact Harness IR, source, category, profile, skill, benchmark, repair, compiler, status, scope and signatory identities are hash-bound
  - any governed dependency change invalidates the active receipt while preserving historical bytes
  - identical inputs produce byte-identical readiness and authorization receipts
  - conflicting, unauthorized or production-authorizing requests fail atomically with zero partial state
  - production readiness and certification remain false
