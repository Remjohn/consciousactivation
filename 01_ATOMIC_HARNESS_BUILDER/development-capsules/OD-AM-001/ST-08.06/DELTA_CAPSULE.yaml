    - NEEDS_RATIFICATION
    - BLOCKED_EVIDENCE
    - BLOCKED_SKILL_MATURITY
    - BLOCKED_BENCHMARK
    - BLOCKED_ARCHITECTURE
    - BLOCKED_AUTHORITY
    - BLOCKED_HARD_GATE
  reserved_full_story_statuses_not_emittable:
