    - source_lock_identity_version_and_hash
    - category_constitution_and_profile_versions
    - phases_contexts_contracts_and_modules
    - skill_registry_package_maturity_and_necessity_receipts
    - benchmark_corpus_rubric_evaluator_and_threshold_policy_receipts
    - ST-08.03_scorecard_mutation_stability_and_hard_gate_receipts
    - ST-08.04_diagnosis_and_repair_graph_receipts
    - ST-08.05_repair_regression_invalidation_and_rollback_receipts
    - waiver_ids_authority_scope_and_expiry
    - compiler_and_Builder_versions
    - observability_budget_and_target_requirement_receipts
    - status_scope_restrictions_and_signatories
  missing_or_hash_mismatched_ref: block issuance
limitations_and_authority:
  required_receipt_fields:
    - evidence_limitations
    - unresolved_blockers
    - assumptions_and_NOT_APPLICABLE_bases
    - allowed_and_prohibited_scope
    - external_product_boundaries
    - human_gates_preserved
    - issuing_authority_identity_and_scope
    - required_signatory_refs
    - expiry_revocation_and_invalidation_conditions
  human_gate_removal_without_governed_evidence: prohibited
  external_authority_inference: prohibited
invalidation_and_deterministic_issuance:
  invalidate_when_any_changes:
    - source_lock_or_Harness_IR
    - category_or_profile
    - phase_context_contract_or_module
    - skill_or_maturity_evidence
    - benchmark_rubric_evaluator_or_threshold_policy
    - repair_or_regression_evidence
    - waiver_authority_signatory_scope_or_expiry
    - compiler_Builder_or_target_version
    - hard_gate_status
  invalidation_effect:
    - prior receipt remains immutable historical evidence
    - authorization becomes inactive for new work
    - exact affected scope and rollback guidance are emitted
    - re-evaluation requires a new immutable receipt
  canonical_identity_rule: readiness and authorization receipts derive only from canonical governed content
  repeat_command: identical payload returns original receipt without duplicate issuance
  conflicting_command: reject atomically with zero receipt, event or command record
  nondeterministic_identity_inputs_prohibited:
    - wall_clock_time_unless_governed_input
    - random_identifier
    - absolute_machine_path
    - environment_specific_value
failure_and_authority_boundary:
  reject:
    - readiness_from_document_or_schema_completeness
    - missing_threshold_represented_as_pass
    - unresolved_blocker_hidden_or_waived_without_authority
    - false_readiness_or_binding_anti_goal_failure
    - authorization_without_exact_evidence_identity
    - authorization_without qualified signatory authority
    - removal_of_human_gate_for_automation_convenience
    - production, release or certification authorization request
  partial_state_on_failure: prohibited
  external_runtime_transport_or_product_behavior: prohibited
