outcome: >-
  Compile deterministic Builder-owned category operating rules for declarative
  runtime plans, validation, evaluation contracts, diagnostics, repair selection,
  selective rerun, migration, compatibility, invalidation, rollback, and external
  handoff boundaries without executing any runtime or absorbing an external product.
required_behavior:
  - preserve all five category identities and exact profile ownership
  - preserve Activation First and Visual Syntax First at their separate scopes
  - bind every ruleset to the exact immutable ST-06.03 syntax and sequence hashes
  - assign explicit evaluator repair migration and compatibility ownership
  - reject cross-category repair atomic ownership transfer and incompatible migration
  - require new immutable versions for migration and forbid certification inheritance
  - define selective rerun only for declared category-owned units
  - define invalidation and non-destructive rollback without mutating predecessors
  - keep external handoff as a Builder contract boundary with validation pending
  - preserve explicit generic NOT_APPLICABLE behavior
