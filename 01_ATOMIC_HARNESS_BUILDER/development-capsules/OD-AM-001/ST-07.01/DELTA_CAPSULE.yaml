  - existing target_profile.py and completed ST-07.02 implementation or receipts
  - shared run aggregate, ports, authority services, atomicity commands and repository adapters
  - package exports and all __init__.py files
  - exact-source architecture tests
  - confirmed Stories, Epics, obligations, specifications, ADRs, contract pins or historical receipts
  - external product behavior, runtime, transport, credentials, network, providers or production persistence
  - VAE or Delegation shared contracts and generated shared types
prohibited_claims:
