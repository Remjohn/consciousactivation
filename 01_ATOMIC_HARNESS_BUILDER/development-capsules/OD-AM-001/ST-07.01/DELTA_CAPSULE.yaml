  - authority_ref
  - provenance
implementation_scope_after_dependency_pass:
  - immutable versioned CompilationTargetProfile and CompilationTargetRegistry contracts
  - exact one-of-three target selection with deterministic selection and rejection receipts
  - distinct target-specific source, IR, Genesis, compiler, artifact, evaluation, compatibility and certification declarations
  - local Builder-owned structural contracts for Visual Asset Editor and Delegation targets
  - read-only hash-pinned interface references without external runtime or shared-schema ownership
  - deterministic target profile, registry, selection, migration, invalidation and rollback identities
  - lossless additive profile versioning without universal-profile flattening
  - preservation of existing synthetic Atomic Content Harness behavior without retroactive receipt mutation
selection_rules:
  exact_one_target_required: true
  unknown_target: reject
  zero_targets: reject
  multiple_targets: reject
  alias_or_cosmetic_target: reject
  universal_profile_fallback: reject
  missing_required_extension_or_prohibition: reject
  owner_or_compatibility_substitution: reject
  identical_input_identity: byte_identical_registry_selection_and_receipt
  changed_profile: new_immutable_profile_and_registry_version
