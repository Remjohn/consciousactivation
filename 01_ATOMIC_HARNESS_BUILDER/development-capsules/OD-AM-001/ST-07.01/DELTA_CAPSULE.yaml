  - Delegation_runtime_compatible
  - external_adoption_complete
  - external_target_certified
  - universal_target_supported
  - production_ready
  - certified
acceptance_after_dependency_pass:
  - the registry contains exactly the three governed target IDs and no aliases or fourth target
  - each profile preserves its distinct product owner, execution owner, evidence needs, extensions, prohibitions and compatibility state
  - exact one-target selection is deterministic and unknown, missing, multiple or flattened target selection fails closed
  - changed governed inputs produce new immutable profile and registry identities without mutating history
  - Visual Asset Editor and Delegation profiles remain local structural declarations with EXTERNAL_VALIDATION_PENDING
  - no external behavior, runtime, transport, schema ownership, production or certification is introduced or claimed
  - existing ST-07.02 synthetic Atomic Content Harness evidence and receipt remain unchanged
