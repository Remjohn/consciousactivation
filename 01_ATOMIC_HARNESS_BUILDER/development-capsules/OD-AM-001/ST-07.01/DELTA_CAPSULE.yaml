three_target_invariant:
  exact_target_count: 3
  exact_target_ids:
    - atomic_content_harness
    - visual_asset_editor
    - content_asset_delegation_contract
  fourth_target_creation: prohibited
  category_as_target: prohibited
  universal_or_merged_target: prohibited
  conversational_activation_relationship: fifth_category_inside_atomic_content_harness_not_a_compilation_target
target_profiles:
  atomic_content_harness:
    target_id: atomic_content_harness
    display_name: Atomic Content Harness
    owner: Atomic Harness Builder
    execution_owner: compiled_harness_owner_not_ST_07_01
    external_product: false
    source_profile_scope: governed evidence, atomicity, Activative semantics, category and format profiles
    IR_projection_scope: AtomicHarnessDefinition and target-specific Builder artifacts
    compatibility_state: BUILDER_LOCAL_STRUCTURAL
    production_ready: false
    certified: false
    prohibitions:
      - borrow Visual Asset Editor authority
      - borrow Delegation shared-contract ownership
      - collapse a Canonical Format Category into target identity
  visual_asset_editor:
    target_id: visual_asset_editor
    display_name: Visual Asset Editor
    owner: Visual Asset Editor product authority
    execution_owner: external_visual_asset_editor
    external_product: true
    Builder_scope: versioned target contract, read-only interface reference, mapping and local validation only
    compatibility_state: EXTERNAL_VALIDATION_PENDING
    production_ready: false
    certified: false
    prohibitions:
      - image or asset generation
      - editing or realization behavior
      - external provider, credentials, network, persistence or runtime
      - mutate content-owned semantics
  content_asset_delegation_contract:
    target_id: content_asset_delegation_contract
    display_name: Content Asset Delegation Contract
    owner: Delegation Protocol product authority
    execution_owner: external_delegation_protocol
    external_product: true
    Builder_scope: versioned target contract, exact RC4 pin, mapping and local validation only
    compatibility_state: EXTERNAL_VALIDATION_PENDING
    Delegation_pin: 1.1.0-rc.4
    Delegation_trust: local_unsigned_release_candidate
    production_ready: false
    certified: false
    prohibitions:
      - shared-schema ownership or local schema fork
      - protocol runtime, transport, retry execution or reconciliation execution
      - external acceptance or release authorization
required_profile_fields:
  - target_id
  - target_version
  - product_owner
  - execution_owner
  - source_profile_ref
  - IR_projection_ref
  - Genesis_graph_ref
  - compiler_ref
  - artifact_set_ref
  - evaluation_gate_ref
