implementation_scope_after_dependency_pass:
  - immutable development rubric identity and version with canonical hash-bound dimension and hard-gate declarations
  - independent dimension scorecards that retain every dimension even when a non-authoritative trend summary is calculated
  - one-variable controlled mutation plans and receipts with exact base-case, mutated-field, invariant and expected-decision lineage
  - non-compensable gate evaluation that cannot be overridden by a composite, average, best run or unrelated dimension
  - deterministic repeated-run stability summaries containing distributions and dominant failure patterns without inventing release thresholds
  - typed downstream result ingestion bound to the Builder version, evaluated artifact and originating receipt identity
  - deterministic rejection, invalidation and rollback receipts with zero partial scorecard state
immutable_development_rubric:
  rubric_id: OD-AM-001-ST-08.03-INDEPENDENT-DIMENSIONS-v1
  rubric_version: 1.0.0-development
  status: STRUCTURAL_DEVELOPMENT_ONLY_NOT_HUMAN_RATIFIED_FOR_RELEASE
  immutable_before_evaluation: true
  mutable_after_result_observation: false
  base_dimensions:
    - evidence_understanding
    - visual_and_temporal_understanding
    - atomicity
    - product_architecture
    - skill_system
    - evaluation_and_repair_quality
    - implementation_readiness
    - downstream_performance
  extension_rule: category-specific dimensions require an explicit versioned category or profile declaration and remain independently visible
  substitution_rule: metrics from one category, format profile or production substrate cannot substitute for another without an explicit equivalence receipt
  thresholds:
    development_fixture_expectations: permitted_when_explicit_and_non_promotional
    production_or_certification_thresholds: HUMAN_GOVERNED_NOT_DEFINED
independent_scoring_rules:
  - every applicable dimension has its own identity, observation, evidence references, status and failure context
  - NOT_APPLICABLE is explicit, justified and cannot substitute for missing required evidence
  - a composite trend may be reported only as non-authoritative supplementary data
  - no composite or average may hide a missing, rejected, failed or non-compensable dimension
  - category and profile applicability are validated before scoring
  - identical canonical inputs yield byte-identical scorecards, decisions and receipts
controlled_mutation_rules:
  exactly_one_declared_variable_changed: true
  immutable_base_case_required: true
  mutation_identity_required: true
  preserved_invariants_required: true
  supported_development_mutations:
    - preserve_topic_change_grammar
    - preserve_grammar_change_topic
    - remove_one_sequence_invariant
    - swap_semantic_polarity
    - inject_irrelevant_style_evidence
  failure_conditions:
    - more than one uncontrolled variable changes
    - base-case or mutated-input identity is missing
    - the expected decision does not explain the changed invariant
    - mutation corrupts evidence beyond the declared causal test
    - source, category, profile, rubric or artifact lineage is lost
non_compensable_gates:
  gate_ids:
    - critical_unsupported_decision
    - evidence_failure
    - wrong_atomicity
    - contract_contradiction
    - silent_rewrite
    - untested_required_skill
    - benchmark_leakage
    - false_readiness
    - anti_goal_violation
  enforcement: any applicable failed gate rejects the bounded decision regardless of scores or stability summaries
lineage_and_identity_requirements:
  pinned_inputs:
    - evaluated_artifact_identity_and_hash
    - Builder_version
    - target_category_and_profile
    - source_IR_and_semantic_lineage
    - benchmark_portfolio_and_case_identity
    - controlled_mutation_identity
    - rubric_version_and_hash
    - scoring_policy_version_and_hash
    - evaluator_contract_version
    - threshold_policy_reference
    - predecessor_maturity_receipt
    - downstream_result_origin_and_receipt
  canonical_identity_rule: identities derive only from canonical content and governed versioned references
  nondeterministic_identity_inputs_prohibited:
    - wall_clock_time
    - random_identifier
    - absolute_machine_path
    - environment_specific_value
    - unordered_map_iteration
stability_and_ingestion_boundary:
  repeated_run_summary:
    required: true
    records: [per_dimension_distribution, dominant_failure_patterns, repetition_identity, missing_or_rejected_runs]
    production_variance_threshold: NOT_DEFINED
  downstream_results:
    accepted_structural_types:
      - implementation_question
      - specification_delta
      - test_failure
      - latency_and_cost
      - repair_round
      - first_pass_acceptance
      - human_preference_reference
      - wrong_reading_outcome
      - certification_result_reference
    rule: ingest without mutating historical scorecards and reject any result lacking exact artifact, Builder-version and authority lineage
failure_and_authority_boundary:
  reject:
    - leaked protected case or label
    - category-inappropriate rubric or metric substitution
    - hidden dimension or hidden minimum failure
    - unstable or incomplete repetitions represented as conclusive
    - downstream evidence without exact identity and authority
    - stale, altered, superseded or invalidated predecessor evidence
    - unauthorized rubric, score, gate, result, invalidation or rollback mutation
    - conflicting repeat command payload
  external_evaluator_or_provider_calls: prohibited
  protected_label_access: prohibited
  human_reaction_data: prohibited
  partial_state_on_failure: prohibited
