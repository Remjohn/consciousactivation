prohibited_changes:
  - every path not explicitly listed in future_path_allowlist
  - shared run aggregates, ports, authority services, atomicity commands and repository adapters
  - package exports and all __init__.py files
  - exact-source architecture tests
  - confirmed Stories, Epics, obligations, specifications, ADRs, schemas or historical receipts
  - ST-08.02 implementation or completion evidence
  - external evaluator, provider, runtime, transport, model, credential or network behavior
  - real protected labels, real human reactions or external product behavior
  - production thresholds, production promotion, certification or publication
acceptance_after_dependency_pass:
  - all eight base dimensions remain independently visible and category-appropriate
  - each controlled mutation changes exactly one declared variable while retaining complete base-case and invariant lineage
  - every applicable non-compensable gate is explicit and no score, mean or best run can override failure
  - rubric, scoring policy, evaluated artifact, mutation, repetition and downstream evidence versions are immutable and hash-bound
  - repeated-run summaries preserve distributions and dominant failure patterns without creating production thresholds
  - identical governed inputs produce byte-identical scorecards, decisions, invalidations and rollback receipts
  - changed governed inputs create new immutable identities and invalidate only affected descendants
  - leakage, missing identity, unauthorized mutation and conflicting commands fail atomically with zero partial state
