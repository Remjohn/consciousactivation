acceptance_after_dependency_pass:
  - identical governed inputs produce byte-identical cases, trials, results and receipts
  - each of the five required skill-system layers has a separate suite and cannot inherit another layer's pass result
  - every comparison uses a fresh evaluator context and an explicit no-guidance control
  - both arms use identical governed case inputs, output contracts, budgets and evaluation dimensions
  - control-arm target-failure absence is surfaced against the skill-necessity claim and improvements are represented only as computed deltas
  - mean, minimum, variance, failure frequency and confidence estimates are deterministically derived from declared repetitions
  - all seven required case classes are present and rule-pressure cases test governed action rather than doctrine recitation alone
  - a generator or reasoning phase cannot be the sole approval authority for its own output
  - missing controls, reused context, insufficient repetitions and missing governed expected behavior fail closed
  - authority, provenance, evaluator version, benchmark version and artifact identities are observable
  - offline synthetic results remain explicitly non-empirical and cannot promote maturity or close evidence gates
