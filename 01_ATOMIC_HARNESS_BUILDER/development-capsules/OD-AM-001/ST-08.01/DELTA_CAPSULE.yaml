implementation_scope_after_dependency_pass:
  - immutable offline evaluation-case, control-arm, trial-plan, trial-result, layer-suite and evaluation-receipt contracts
  - distinct layer suites for Canonical Skills, harness adaptations, composition recipes, JIT capsules and end-to-end phase behavior
  - deterministic no-guidance control and candidate-arm comparison over the same governed synthetic structural inputs
  - fresh evaluator context for every trial with no shared prompt, generator history, mutable cache or hidden state
  - fixed canonical case order, repeat identities, evaluator version and exact input hashes
  - deterministic mean, minimum, variance, failure-frequency and confidence-estimate calculation from governed supplied trial results
  - positive, near-miss, counterexample, missing-evidence, contradiction, tempting-irrelevant-context and rule-violation-pressure cases
  - deterministic rejection of missing controls, reused context, insufficient repetitions and missing governed expected-behavior references
  - independent-evaluator authority separation so a generator cannot solely approve its own output
  - deny-by-default AuthorityService authorization for the exact evaluation action, plan resource and evaluation time
  - immutable structural-isolation evidence binding each case, arm, repeat and evaluator input while proving no runtime-isolation claim
  - exact semantic receipt revalidation and deterministic rejection evidence derived from governed boundary inputs
  - exact-resource authorization rejects wildcard-only grants at the evaluation commit boundary
  - fresh-context construction receipts derive from all declared isolation fields and reject arbitrary digest substitution
  - receipt and rejection observations are self-validating against exact plan, result, suite and authority identities
  - complete TrialPlan, LayerSuite, EvaluationCase, TrialResult, FreshContextEvidence and DimensionScore graphs are reconstructed and revalidated before authority or compilation
  - sealed construction identities reject object-level mutation and stale nested values at the commit boundary
  - deterministic rejection snapshots remain available for corrupted input without committing partial evaluation state
  - explicit authority, provenance, artifact, benchmark-version and evaluator-version references
  - typed success and rejection observations without asserting empirical superiority
offline_deterministic_fresh_context_controls:
  input_boundary: repository_owned_synthetic_or_structural_fixtures_only
  control_arm: no_guidance_control
  comparison_arm: governed_candidate_behavior
  same_case_inputs_for_both_arms: required
  same_output_contract_for_both_arms: required
  same_evaluation_dimensions_for_both_arms: required
  fresh_context_per_trial: required
  mutable_cross_trial_state: prohibited
  generator_context_reuse: prohibited
  hidden_prompt_history: prohibited
  external_model_or_provider_execution: prohibited
  canonical_case_order: required
  canonical_repeat_order: required
  minimum_repeat_count_is_contract_validated: true
  repetition_count_and_randomization_policy_declared: required
  required_statistics: [mean, minimum, variance, failure_frequency, confidence_estimate]
  evaluation_layers:
    - canonical_skill
    - harness_adaptation
    - composition_recipe
    - jit_capsule
    - end_to_end_phase
  required_case_classes:
    - positive_application
    - near_miss
    - counterexample
    - missing_evidence
    - contradiction
    - tempting_irrelevant_context
    - rule_violation_pressure
  generator_may_be_sole_approver: false
  governed_expected_behavior_reference: required
  byte_identical_reproduction_for_identical_inputs: required
  synthetic_result_may_close_evidence_gate: false
