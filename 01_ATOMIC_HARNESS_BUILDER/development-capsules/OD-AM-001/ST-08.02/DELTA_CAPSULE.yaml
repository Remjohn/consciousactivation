two_gate_boundary:
  implementation_gate:
    maximum_status: development_validated
    meaning: deterministic protected-evidence and maturity-receipt mechanism implemented for bounded development fixtures
    closes_evidence_gate: false
  evidence_gate:
    status: EVIDENCE_PENDING
    requires_real_protected_evidence: true
    may_be_closed_by_synthetic_fixture: false
    production_or_certification_authority: false
implementation_scope_after_dependency_pass:
  - immutable ProtectedEvidenceReceipt, EvaluationIdentity, PortfolioManifest and DevelopmentMaturityReceipt contracts
  - deterministic promotion decision bound to exact evaluated subject, source IR, skill, adaptation, recipe, capsule, compiler, model policy, dataset, rubric, scoring and evaluator versions
  - layered public, development and protected-case metadata with protected labels represented only through separately authorized custody references
  - staged portfolio declarations for primary reference, contrasting transfer harnesses, VAE target and Delegation target with unevaluated branches explicit
  - stable case identities, expected-behavior authority references, scoring-rule references and source provenance
  - deterministic invalidation when any bound subject, dependency, corpus, rubric, threshold, evaluator or receipt identity changes
  - non-destructive deprecation and supersession preserving historical reproducibility
  - typed promotion rejection and rollback receipts with complete authority and failure context
development_maturity_policy:
  recognized_full_story_states:
    - draft
    - evaluation_pending
    - experimental
    - tested
    - stable
    - deprecated
    - superseded
  OD_AM_001_permitted_progression:
    - draft
    - evaluation_pending
    - experimental
    - tested
    - development_validated
    - deprecated
    - superseded
  maximum_emittable_status: development_validated
  prohibited_emittable_statuses:
    - stable
    - shadow_ready
    - production_ready
    - certified
  rule: >-
    A bounded repository-owned fixture may demonstrate the promotion mechanism up to
    development_validated only. It does not become protected benchmark evidence and
    cannot establish release, production, transfer or certification eligibility.
protected_evidence_rules:
  protected_labels_in_generator_or_prompt_context: prohibited
  protected_label_bytes_in_portable_receipts: prohibited
  synthetic_protected_case_contract_fixture_is_real_protected_evidence: false
  custody_reference_required: true
  custody_authority_hash_required: true
  case_assignment_receipt_required: true
  evaluator_isolation_receipt_required: true
  fresh_context_receipt_required: true
  repetition_statistics_receipt_required: true
  hard_gate_receipt_required: true
  artifact_identity_receipt_required: true
  leakage_attempt:
    action: reject_revoke_and_invalidate
    partial_promotion_state_allowed: false
promotion_requirements:
  - exact evaluated artifact identity and all dependency hashes match the candidate
  - target-specific evaluation and regression policy is version-pinned
  - primary reference and applicable transfer branches have explicit evaluated or NOT_EVALUATED status
  - every corpus case has identity, evidence role, expected-behavior authority, scoring rule, provenance and custody class
  - public, development and protected cases remain distinct
  - all required fresh-context and control receipts are complete
  - all applicable hard gates pass without compensation by aggregate score
  - only evaluation-governance authority may approve a promotion decision
  - changed dependencies stale the receipt and require a new immutable evaluation version
negative_and_rejection_cases:
  - benchmark or protected-label leakage
  - generator access to protected expected behavior
  - artifact, dependency, corpus, rubric, evaluator, threshold or receipt hash mismatch
  - missing source, usage, label-custody or promotion authority
  - unprotected case represented as protected release evidence
  - missing real specimen, expert golden, known failure, adversarial near-miss, incomplete or contradictory evidence, controlled mutation, transfer case or protected release-case declaration
  - incomplete repetitions, statistical uncertainty or missing no-guidance controls
  - hard-gate failure hidden by an aggregate score
  - certification inherited from Format 02, another category, another artifact version or a local fixture
  - stable, shadow-ready, production-ready or certified request in OD-AM-001 mode
  - unauthorized mutation, promotion, deprecation, supersession or rollback
  - repeat command with conflicting payload
