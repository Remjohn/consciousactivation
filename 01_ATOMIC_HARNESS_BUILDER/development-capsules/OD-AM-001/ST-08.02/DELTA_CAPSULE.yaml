prohibited_changes:
  - every path not explicitly listed in future_evaluation_path_allowlist
  - shared run aggregates, ports, authority services, atomicity commands and repository adapters
  - package exports and all __init__.py files
  - exact-source architecture tests
  - confirmed Stories, Epics, obligations, specifications, ADRs or historical receipts
  - real protected labels, credentials, human data, external provider calls or external product behavior
  - production persistence, production promotion, certification or publication
prohibited_claims:
  - real_protected_benchmark_passed
  - empirical_superiority
  - transfer_generality_proven
  - stable
  - shadow_ready
  - production_ready
  - certified
  - external_target_compatible
acceptance_after_dependency_pass:
  - only the exact hash-bound evaluated version can receive a deterministic development maturity receipt
  - all exact identity dimensions required by FR-108 and NFR-TRACE-003 are present and independently validated
  - layered corpus and staged portfolio branches remain explicit without converting synthetic fixtures into real evidence
  - protected-label isolation, custody references and evaluator separation fail closed on leakage or missing authority
  - identical governed inputs produce byte-identical promotion, rejection, invalidation and rollback receipts
  - changed inputs create new immutable identities and invalidate only affected descendants
  - unauthorized or conflicting commands leave zero partial promotion state
  - maximum emitted maturity is development_validated and production and certification remain false
