implementation_scope:
  - immutable typed source, provenance, uncertainty, applicability, governed-status, observation-status and knowledge-status contracts
  - deterministic pixel-to-normalized geometry
  - deterministic normalization and exact-duplicate suppression
  - deterministic near-duplicate structural detection without support-count inflation
  - canonical category-adapted ontology validation
  - fail-closed rejection of unsupported, provider-only or semantically contaminated parser fields
  - deterministic offline receipt and artifact identities
