prohibited_changes:
  - shared core files
  - package exports and __init__.py files
  - run aggregates, ports and repository adapters
  - exact-source architecture tests
  - planning baselines, Stories, Epics or primary obligation ownership
  - provider adapters, calls, credentials or network behavior
  - external product behavior
  - StoryCompletionReceipt
  - EvidenceClosureReceipt
acceptance:
  - identical governed inputs produce byte-identical observations, result identity and receipt identity
  - every accepted component has distinct typed status, source, provenance, uncertainty and applicability fields
  - coordinates are normalized exactly while source dimensions remain explicit
  - exact duplicates do not inflate accepted specimen or observation counts
  - near duplicates are detected deterministically and do not inflate grammar support
  - unsupported ontology/category fields fail closed
  - provider-only and semantic-hypothesis contamination fail closed
  - no production-readiness, certification or empirical-superiority claim is emitted
