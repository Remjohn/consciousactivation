prohibited_changes:
  - existing source, predecessor artifacts, shared core, package exports, ports, repositories, or __init__.py files
  - architecture tests, source-boundary registry, queues, blocker registers, or status files
  - human ratification, atomic-boundary freeze, Draft Harness Model compilation, Genesis authorization, or descendant invalidation
  - semantic invention, hidden alternatives, generic notes flattening, protected-label access, or unsupported certainty
  - provider, network, database, external-product, runtime, production, certification, or publication behavior
acceptance:
  - all four alternatives and all ten comparison dimensions are explicit and immutable
  - every alternative has exactly one allowed typed atomicity status and an explicit recommendation disposition
  - every non-missing claim is linked to the exact grammar motif or provisional hypothesis and source graph evidence that supports it
  - merge and split alternatives identify affected specimens, shared or differing dimensions, configuration sufficiency, consequences, and breaking dimensions
  - wrong-boundary risks cover all five required consequence domains and distinguish over-merge from over-split
  - missing or provisional evidence remains visible and cannot authorize ratification, Genesis, production, or certification
  - identical governed inputs produce byte-identical packets and receipts; changed evidence creates a new immutable identity
  - only declared authority commits; atomic failure leaves no state; replay and rollback preserve history
