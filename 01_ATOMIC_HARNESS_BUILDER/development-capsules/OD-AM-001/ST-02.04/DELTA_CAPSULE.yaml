implementation_scope:
  - consume an exact hash-valid provisional grammar and induction receipt from ST-02.03
  - compare exactly four visible alternatives: merge, split, variant, and family
  - cover production promise, visual instrument, composition grammar, state machine, semantic workcell, input contract, asset program, runtime ownership, evaluation failures, and repair behavior
  - assign each alternative exactly one typed atomicity status without ratifying it
  - expose shared and materially different dimensions, configuration sufficiency, affected specimens, evidence gaps, and merge or split consequences
  - distinguish over-merging from over-splitting across implementation, creative, evaluation, migration, and maintenance risk
  - preserve grammar motifs, hypotheses, source graphs, provenance, uncertainty, and provisional knowledge status without inventing meaning
  - compile deterministic immutable comparison packets and exactly bound receipts with atomic commit, replay, history, and rollback behavior
failure_behavior:
  - reject missing or hidden alternatives, missing comparison dimensions, duplicate candidates, and untyped status
  - reject unknown, cross-wired, stale, mutated, or untraceable grammar evidence
  - reject recommendations that lack evidence, conceal gaps, or present hypotheses as certainty
  - reject uncalibrated protected-boundary certainty and all ratification, production, certification, or Genesis-authorization claims
  - reject unauthorized commit, same-identity different-payload replay, stale expectation, and partial atomic commit
