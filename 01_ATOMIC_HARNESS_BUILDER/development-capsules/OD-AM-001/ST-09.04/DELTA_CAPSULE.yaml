acceptance_after_dependency_pass:
  - checkpoints atomically bind committed node state, side-effect records, profile and next eligibility
  - resume reuses only exact valid committed work without repeating side effects or ratified human actions
  - sandbox policies are deny-by-default and contain no credential or provider-secret values
  - parallel eligibility requires dependency independence, governed writes, concurrency, budget, cancellation, merge and conflict policies
  - failures preserve locked sources, ratified decisions, protected benchmarks, unaffected branches and historical receipts
  - identical governed inputs produce byte-identical checkpoint, resume, policy, parallel-plan and rollback receipts
  - local structural evidence cannot close manual-shadow, Temporal, provider, isolation-platform, external-product or production gates
