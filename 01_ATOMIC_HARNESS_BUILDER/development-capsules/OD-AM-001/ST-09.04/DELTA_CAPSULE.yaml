    actual_durable_engine_resume_evidence: false
    actual_provider_or_container_isolation_evidence: false
    production_authority: false
implementation_scope_after_dependency_pass:
  - compile immutable local checkpoints for committed node inputs, outputs, validation receipts, declared side effects, selected profile and next eligible nodes
  - validate idempotent resume against exact workflow, profile, dependency, node, attempt-policy and input identities
  - reuse only still-valid committed deterministic results and invalidate only affected checkpoints after dependency changes
  - compile deny-by-default sandbox policy declarations for the three ADR-012 classes without launching a process, container, worktree or provider call
  - validate least-privilege source, tool, secret-reference, filesystem, network, storage, compute, lifetime, output, logging and disposal declarations
  - prove dependency-independent parallel eligibility and deterministic cancellation, merge and conflict plans without executing concurrent external work
  - preserve locked sources, ratified decisions, protected benchmarks, unaffected branches, history, rollback and failure evidence
checkpoint_contract:
  required_fields:
    - checkpoint_id_and_version
    - run_id
    - Workflow_IR_and_profile_hashes
    - completed_node_identities
    - committed_input_and_output_hashes
    - node_validation_receipt_refs
    - declared_side_effect_idempotency_records
    - event_stream_positions
    - next_eligible_nodes
    - checkpoint_parent_and_invalidation_refs
    - authority_and_provenance
  atomic_commit: required
  mutable_after_commit: false
  partial_checkpoint_on_failure: prohibited
resume_contract:
  idempotency_key_fields:
    - run_id
    - workflow_hash
    - node_id
    - attempt_policy_hash
    - input_hash
  rules:
    - selected profile cannot change silently
    - committed successful side effects are not repeated
    - ratified human actions are not replayed
    - only incomplete or invalidated nodes become eligible
    - reused outputs require exact active dependencies and versions
    - stale, altered, superseded, invalidated or conflicting checkpoint fails closed
    - identical resume returns the original externally visible local result and receipt
  external_engine_reconstruction: NOT_IMPLEMENTED_EXTERNAL_VALIDATION_PENDING
sandbox_policy_contract:
  policy_classes:
    - deterministic_process_sandbox
    - provider_call_sandbox
    - isolated_implementation_task_sandbox
  deny_by_default: true
  required_declarations:
    - immutable_environment_or_image_ref
    - read_only_evidence_mounts
    - writable_staging_paths
    - allowed_tools
    - network_allowlist
    - ephemeral_secret_reference_names_without_values
    - CPU_memory_and_time_limits
    - output_contract
    - logging_and_redaction_policy
    - disposal_policy
    - isolation_mechanism_class
  rules:
    - any undeclared capability is denied
    - credentials and provider-secret values are never accepted, serialized, logged, hashed or persisted
    - unrelated sources, archives, repositories and protected labels remain inaccessible
    - provider_call_sandbox is declaration-only and performs no provider or network call
    - isolated task policy performs no actual process, worktree or container creation in this Story
  platform_conformance: EXTERNAL_VALIDATION_PENDING
dependency_safe_parallel_plan:
  permitted_work_classes:
    - deterministic_scan
    - candidate_generation_declaration
    - evaluator_repetition_declaration
    - implementation_task_declaration
  required_proof:
    - no dependency path between concurrent units
    - disjoint or explicitly governed write sets
    - explicit concurrency_limit
    - budget_limit
    - cancellation_policy
    - merge_policy
    - conflict_policy
    - terminal_states
  rules:
    - parallelism is opt-in and never default
    - dependency, shared-write or authority conflict blocks parallel eligibility
    - cancellation of one planned branch cannot invalidate a completed independent sibling
    - candidate or evaluator declarations do not invoke providers or external runtimes
  actual_parallel_execution: prohibited
failure_containment_rollback_and_history:
  protected_state:
    - locked_sources_and_evidence
    - ratified_decisions
    - protected_benchmark_refs
    - unaffected_workflow_branches
    - prior_checkpoints_events_and_receipts
  failure_rules:
    - failed node, tool, sandbox, profile or resume leaves protected state unchanged
    - failed resume leaves no duplicate side effect or new active checkpoint
    - failed parallel-plan validation leaves no scheduled or merged work
    - rollback restores the prior active checkpoint reference without rewriting history
  historical_reproduction: required
lineage_and_determinism:
  pinned_inputs:
    - Workflow_IR_profile_node_and_dependency_versions
    - ST-09.03_validation_failure_and_control_flow_receipts
    - checkpoint_parent_inputs_outputs_and_side_effect_records
    - sandbox_policy_and_node_contract_versions
    - parallel_dependency_write_budget_merge_and_conflict_policies
    - authority_and_invalidation_refs
  canonical_identity_rule: checkpoint, resume, sandbox-policy, parallel-plan, invalidation and rollback receipts derive only from canonical governed content
  repeat_command: identical payload returns original result without duplicate state
  conflicting_command: reject atomically with zero checkpoint, eligibility, receipt, event or command record
failure_and_authority_boundary:
  reject:
    - duplicate_side_effect_or_ratified_human_action_replay
    - silent_profile_change
    - unsafe_or_undeclared_sandbox_capability
    - credential_or_provider_secret_value_input
    - network_tool_source_path_or_write_access_outside_node_contract
    - dependency_unsafe_or_shared_write_parallelism
    - corrupted_locked_or_unaffected_state
    - unauthorized checkpoint, resume, capability, parallel-plan, invalidation or rollback mutation
    - external engine, provider, container, worktree, network or product execution request
  partial_state_on_failure: prohibited
