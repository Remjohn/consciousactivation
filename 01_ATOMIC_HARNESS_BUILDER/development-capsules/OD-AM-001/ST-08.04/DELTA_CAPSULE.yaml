prohibited_changes:
  - every path not explicitly listed in future_path_allowlist
  - shared run aggregates, ports, authority services, atomicity commands and repository adapters
  - package exports and all __init__.py files
  - exact-source architecture tests
  - confirmed Stories, Epics, obligations, specifications, ADRs, schemas or historical receipts
  - ST-08.03 implementation or completion evidence
  - repair execution, workflow execution, artifact mutation or actual rerun behavior
  - external product behavior, runtime, transport, model, provider, credential or network behavior
  - real protected labels, real human reactions, production thresholds, production promotion or certification
acceptance_after_dependency_pass:
  - every failure maps to one stable primary taxonomy code and one smallest supported responsible layer or explicit unresolved escalation
  - each diagnosis records symptom, reproduction evidence, boundary, hypotheses, tests, selected cause and confidence basis
  - graph declarations preserve unaffected upstream truth and prohibit repair fields outside the responsible layer
  - invalidation scopes contain exactly the demonstrated dependent descendants and targeted regression requirements
  - exact lineage and authority references remain immutable and independently verifiable
  - identical governed inputs produce byte-identical diagnoses, graph declarations and receipts
  - stale inputs, missing evidence, broad invalidation, unauthorized mutation and conflicting commands fail atomically
  - no repair is executed and no production, certification or external-compatibility claim is made
