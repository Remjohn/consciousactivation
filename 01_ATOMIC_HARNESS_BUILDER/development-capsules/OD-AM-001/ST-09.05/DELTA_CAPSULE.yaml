contract_references:
  planned_handles: [WorkflowIR, WorkflowNodeContract, CheckpointReceipt, PromotionReceipt]
  schema_refs: []
  ownership_rule: Builder owns deterministic provider-neutral policy and decisions; providers, engines, external products and human truth retain their authority
two_gate_boundary:
  implementation_gate:
    scope: deterministic local candidate-race, risk-aware compute-routing, evaluator-isolation and human-gate policy mechanisms
    closes_external_conformance: false
  evidence_gate:
    status: MANUAL_SHADOW_TEMPORAL_PROVIDER_AND_EXTERNAL_VALIDATION_PENDING
    actual_candidate_or_provider_execution_evidence: false
    actual_manual_shadow_parity_evidence: false
    production_authority: false
implementation_scope_after_dependency_pass:
  - compile candidate-race plans only when candidates share one governed input and output contract and declare independent sandbox-policy references
  - validate deterministic selection after every required independent evaluation against declared quality, contract, cost and latency gates
  - compile risk-aware route decisions from node responsibility, ambiguity, risk, expected value, prior evidence references and explicit budget limits
  - select only registered abstract model tiers, candidate counts, evaluator strengths and tool grants without invoking a provider or claiming empirical fitness
  - compile evaluator views containing only the candidate, rubric, minimum evidence, contracts and provenance, excluding generator reasoning, preferred answers and protected labels
  - compile immutable human-gate placements for constitutional, policy, risk, waiver, incident, release and final-review authority
  - preserve exact workflow, profile, checkpoint, authority, budget, provenance and invalidation lineage in all local policy decisions and receipts
candidate_race_contract:
  required_fields:
    - race_id_and_version
    - workflow_profile_and_node_identity
    - common_input_and_output_contract_hashes
    - candidate_declarations_and_independent_sandbox_policy_refs
    - evaluator_policy_and_minimum_view_contract
    - quality_contract_cost_and_latency_gates
    - budget_and_candidate_fan_out_limits
    - deterministic_selection_and_tie_policy
    - authority_and_provenance
  rules:
    - first completion is never sufficient for winner selection
    - all required evaluations must be present and artifact-identity bound
    - candidates with mismatched contracts, inputs, lineage or sandbox independence fail closed
    - gate failure produces no winner or promoted candidate
    - identical governed inputs produce the same race-plan identity and selection decision
  actual_candidate_generation_or_evaluation: prohibited
risk_aware_compute_routing:
  governed_inputs:
    - node_responsibility_and_actor_kind
    - task_complexity_and_ambiguity
    - operational_and_authority_risk
    - expected_value
    - prior_benchmark_or_development_evidence_refs
    - latency_cost_and_compute_budget
    - registered_profile_and_route_policy
  governed_outputs:
    - abstract_model_tier
    - candidate_count
    - evaluator_strength
    - tool_grants
    - compute_budget
    - required_human_gate_refs
    - decision_identity_and_justification
  rules:
    - routing is deterministic from the exact policy and evidence inputs
    - missing, stale, unverifiable or contradictory evidence blocks the affected route
    - no route may silently select a provider, model, tool, credential or network grant
    - lower initial price cannot override total-cost, reliability, quality or risk evidence
    - budget overflow pauses or routes to an already-declared human approval gate
  actual_provider_model_or_compute_dispatch: prohibited
independent_evaluator_boundary:
  allowed_view:
    - candidate_identity_and_canonical_output
    - minimum_required_input_contract_and_evidence
    - immutable_rubric_and_gate_versions
    - source_lineage_and_provenance_required_for_judgment
    - declared cost_and_latency_observations
  forbidden_view:
    - generator_hidden_reasoning
    - generator_preferred_answer_or_rank
    - protected_benchmark_labels
    - unrelated_candidates_or_workspace_context
    - credential_values_or_provider_secrets
  evaluation_result_must_bind: [candidate_hash, evaluator_policy_hash, rubric_hash, evidence_hashes, authority, outcome]
  actual_independent_provider_or_human_evaluation: prohibited
human_gate_authority:
  required_gate_classes:
    - constitutional_decision
    - product_or_policy_decision
    - risk_or_budget_escalation
    - waiver
    - incident_authorization
    - release_or_promotion
    - final_review_where_profile_requires_it
  rules:
    - model, agent, evaluator or deterministic policy cannot resolve a human-owned gate
    - required gates may be removed only by a separately approved evidence-backed policy version
    - incident routing grants no emergency authority over evidence, labels or constitutional decisions
    - absent, stale, unauthorized or conflicting human authority blocks the affected transition
failure_invalidation_rollback_and_history:
  reject:
    - winner_selection_before_all_required_evaluations
    - first_finished_candidate_auto_selection
    - generator_context_or_protected_label_leakage_to_evaluator
    - risk_blind_or_budget_unbounded_compute_route
    - unregistered_model_tier_provider_tool_or_profile
    - automation_that_removes_or_resolves_required_human_gate
    - unauthorized route, selection, gate, invalidation or rollback mutation
    - provider, model, engine, network, credential or external-product execution request
  invalidation:
    - changed candidate, rubric, evidence, route policy, budget, authority, profile or upstream checkpoint invalidates only affected decisions and descendants
  rollback:
    - restore the prior active policy-decision reference without mutating immutable history
  partial_state_on_failure: prohibited
  historical_reproduction: required
lineage_determinism_and_observability:
  canonical_inputs:
    - Workflow_IR_profile_node_and_checkpoint_hashes
    - ST-09.04_checkpoint_resume_sandbox_and_parallel_plan_receipts
    - candidate_contracts_evaluator_policy_rubric_and_gate_versions
    - route_policy_risk_budget_and_evidence_versions
    - human_gate_authority_and_invalidation_refs
  identity_rule: race-plan, route, evaluator-view, selection, gate, invalidation and rollback identities derive only from canonical governed content
  repeat_command: identical payload returns the original local decision and receipt without duplicate state
  conflicting_command: reject atomically with zero decision, winner, route, gate resolution, receipt, event or command record
  required_observation_fields: [run_id, story_id, artifact_identity, authority_identity, version, provenance, outcome, failure_context]
