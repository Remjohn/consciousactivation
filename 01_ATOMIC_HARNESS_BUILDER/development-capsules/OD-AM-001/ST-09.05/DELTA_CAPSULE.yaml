  - ST-09.04 implementation or completion evidence
  - external engine, scheduler, agent, evaluator, model, provider, credential, network, process, container, worktree, transport or external-product behavior
  - behavior owned by ST-09.06 or any later Story
  - production execution, promotion, readiness or certification
prohibited_claims:
