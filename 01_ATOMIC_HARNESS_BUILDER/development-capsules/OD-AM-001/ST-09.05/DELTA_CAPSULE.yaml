  - actual_candidate_race_or_model_compute_execution
  - empirical_model_tier_provider_or_routing_superiority
  - provider_evaluator_isolation_or_outage_validated
  - durable_Temporal_routing_signal_replay_or_fault_conformance
  - OS_process_container_or_worktree_isolation_conformant
  - human_gate_policy_or_production_threshold_ratified
  - external_product_compatible
  - production_workflow_ready
  - production_ready
  - certified
acceptance_after_dependency_pass:
  - selection cannot occur before every required quality, contract, cost and latency evaluation passes
  - compute routes are deterministic, risk-aware, budget-bounded and provider-neutral
  - evaluator views exclude generator reasoning, preferences, protected labels and unrelated context
  - human-owned gates remain explicit, immutable and unresolvable by model, agent, evaluator or local policy
  - failures and changes invalidate only affected local decisions and preserve immutable history and rollback
  - identical governed inputs produce byte-identical plans, decisions and receipts
  - local structural evidence cannot close manual-shadow, Temporal, provider, isolation-platform, external-product or production gates
