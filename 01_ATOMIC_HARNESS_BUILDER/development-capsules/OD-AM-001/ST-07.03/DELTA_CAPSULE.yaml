prohibited_changes:
  - every path not explicitly listed in future_path_allowlist
  - shared run aggregate, ports, authority services, atomicity commands and repository adapters
  - package exports and all __init__.py files
  - exact-source architecture tests
  - confirmed Stories, Epics, obligations, specifications, ADRs, contract mappings or historical receipts
  - local fork, copy or redefinition of Delegation-owned schemas
  - VAE, Delegation, Interview Expression or ReelCast runtime or transport behavior
  - network APIs, queues, brokers, credentials, cloud resources, external providers or production persistence
  - actual external acknowledgement, adoption, publication or certification
prohibited_claims:
  - external_target_compatible
  - VAE_validated
  - Delegation_runtime_validated
  - external_adoption_complete
  - external_acknowledgement_received
  - production_ready
  - certified
  - provider_validated
  - conversational_runtime_ready
acceptance_after_implementation:
  - exact governed inputs produce byte-identical requests, mappings, local acknowledgements, compatibility receipts and failure receipts
  - VAE and Delegation targets remain distinct and all mapped semantic fields preserve exact structured lineage
  - local ports and test doubles perform no external runtime, transport, provider or publication behavior
  - source-kind, interview provenance and wrong-reading-lock inheritance rules fail closed
  - local acknowledgements are attributable only to the exact test double and never represent external acceptance
  - compatibility receipts remain LOCAL_CONTRACT_VALIDATION_ONLY with EXTERNAL_VALIDATION_PENDING
  - semantic mutation, missing provenance, incompatible versions, authority violations and conflicting commands leave no partial state
  - BD-014, XRI-016 and XRI-019 external scopes remain open and production and certification remain false
