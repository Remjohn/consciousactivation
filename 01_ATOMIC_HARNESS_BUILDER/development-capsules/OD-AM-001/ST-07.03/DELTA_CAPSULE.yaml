implementation_scope:
  Builder_owned_ports:
    - VisualAssetDemandPort contract with local fixture-backed test double only
    - DelegationHandoffPort contract with local fixture-backed test double only
  Builder_owned_contracts:
    - immutable VisualAssetDemand request and AssetResponse validation boundary
    - immutable Delegation request, response, partial-result, error and reconciliation boundary
    - typed request identity, target identity, version, compatibility, idempotency, timeout and retry policy declarations
    - typed authority, provenance, source-kind, semantic-lineage and wrong-reading-lock references
    - local HandoffAcknowledgementReceipt that proves only deterministic test-double acknowledgement
    - local CompatibilityValidationReceipt that proves only validation against pinned local contract fixtures
  Builder_owned_mappings:
    - lossless Builder-to-VAE demand mapping without semantic mutation
    - lossless Builder-to-Delegation RC4 field mapping without shared-schema ownership
    - explicit three-target profile separation without a flattened universal target
    - all required Activative and visual-semantic lineage retained as structured fields rather than notes
    - deterministic source-kind mapping with ambiguous evidence rejected
    - monotonic inherited wrong-reading locks with only stricter derivative additions
  local_fixture_and_test_double_behavior:
    - hash-pinned non-executable request, response, acknowledgement, partial-result and failure fixtures
    - no credentials, network, subprocess, queue, SDK, provider, VAE or Delegation runtime
    - deterministic acknowledgement and compatibility identities
    - repeated identical commands return the original local receipt
    - conflicting command payloads fail closed
acknowledgement_and_compatibility_receipts:
  HandoffAcknowledgementReceipt:
    authority: LOCAL_TEST_DOUBLE_ONLY
    external_acceptance: NOT_CLAIMED
    required_fields:
      - request_identity
      - target_identity
      - acknowledged_contract_version
      - acknowledged_payload_hash
      - test_double_identity
      - authority_identity
      - outcome
      - failure_context
  CompatibilityValidationReceipt:
    authority: BUILDER_LOCAL_CONTRACT_VALIDATION_ONLY
    external_compatibility: EXTERNAL_VALIDATION_PENDING
    required_fields:
      - request_identity
      - target_profile_identity
      - local_contract_pin
      - mapping_identity
      - input_hash
      - output_hash
      - validation_outcome
      - limitations
rejection_cases:
  - semantic mutation of content-owned intent, sequence role or composition purpose
  - missing, flattened or notes-only required lineage
  - empty wrong-reading locks on a semantically generative or transformative demand
  - removal or weakening of inherited wrong-reading locks
  - ambiguous or guessed source kind
  - interview_expression without non-empty Reaction Receipt and Expression Moment references
  - missing source or rights provenance
  - incompatible, unpinned, stale, superseded or production-ineligible contract version
  - mismatched request, target, run, payload hash, acknowledgement or lineage identity
  - multiple target owners or universal-profile flattening
  - unauthorized actor, acknowledgement, replacement or compatibility approval
  - unstubbed external dependency, credential, network, runtime, transport or publication attempt
  - duplicate command with conflicting payload
  - local fixture response that invents external acceptance, certification or human truth
