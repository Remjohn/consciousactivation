    owns:
      - image or asset generation
      - editing and realization behavior
      - runtime, credentials, providers, queues and production persistence
      - external acknowledgement and adoption decisions
  Delegation:
    owns:
      - shared schemas and generated shared types
      - protocol runtime, transport, retry execution and reconciliation execution
      - compatibility release and external acknowledgement decisions
  future_conversational_products:
    own:
      - Interview Expression and ReelCast live behavior
      - real Reaction Receipt capture and Expression Moment extraction
  Builder:
    owns_only:
      - local port contracts
      - deterministic request and result mapping
      - local validation and fixtures
      - failure handling and non-authoritative compatibility declarations
