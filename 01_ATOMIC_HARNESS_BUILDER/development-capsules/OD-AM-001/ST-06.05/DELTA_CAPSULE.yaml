outcome: >-
  Compile immutable structural contracts and a deterministic state machine for
  Activative Calls, attributable human-response requests, external Reaction Receipt
  and Expression Moment applicability/references, consent, withdrawal, invalidation,
  replay, and resume across four conversational profiles without receiving or
  manufacturing human response evidence.
required_behavior:
  - preserve the fifth canonical category and all four conversational profile identities
  - compile Activative Call constraints desired human role desired reaction and micro commitment without claiming an actual reaction
  - make every human response request attributable to external human and consent authorities
  - represent Reaction Receipts and Expression Moments only as external immutable references or pending applicability states
  - require non-empty wrong-reading locks and complete governed lineage
  - fail closed on missing consent authority provenance scripted human landing premature Identity DNA approval or external runtime behavior
  - preserve withdrawal restriction invalidation replay resume and historical reproduction
  - preserve Activation First as runtime law and Visual Syntax First as development law
