schema_version: cmf-builder-rc1-license-inventory/v1
verdict: BEST_EFFORT_WITH_PACKAGING_GAP
runtime_license_basis:
  python_standard_library: Python Software Foundation License
  project_package_license: UNDECLARED_IN_PACKAGE_METADATA
third_party_runtime_dependencies:
  - none_declared_in_governed_package_metadata
development_dependencies:
  - name: pytest
    license: NOT_PINNED_BY_LOCKFILE
findings:
  - id: RC1-P2-PROJECT-LICENSE-METADATA-UNDECLARED
    severity: P2
    class: SUPPORT
    finding: No package metadata declares the project license for release consumers.

