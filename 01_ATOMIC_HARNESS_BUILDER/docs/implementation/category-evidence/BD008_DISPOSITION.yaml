scope_dispositions:
  ST-06.01_STRUCTURAL_UNCERTIFIED_CATEGORY_BINDING:
    disposition: SCOPED_NOT_APPLICABLE_TO_STRUCTURAL_UNCERTIFIED_BRANCH
    rationale: >-
      The authoritative blocker scope activates for protected-label custody,
      maturity promotion, calibrated thresholds and production certification.
      ST-06.01 binds one canonical category identity and preserves constitutional
      semantics while production_ready and certified remain false.
    does_not_authorize:
      - real_profile_quality_claim
      - benchmark_claim
      - conversational_certification
      - production_threshold
      - production_authorization
  REAL_PROFILE_DEVELOPMENT_EVIDENCE:
    disposition: REMAINS_BLOCKED_OPERATOR_INPUT
    rationale: >-
      No repository candidate has a complete immutable non-synthetic profile,
      original source bytes, explicit usage authority and field-level lineage.
      Constitutional examples, public development fixtures and placeholder PZ
      fixtures cannot be relabeled as real evidence.
  PROTECTED_BENCHMARK_LABEL_GOVERNANCE:
    disposition: REMAINS_BLOCKED_OPERATOR_INPUT
    rationale: Evaluation governance has not ratified label custody or change control.
  PRODUCTION_THRESHOLD_CALIBRATION:
    disposition: REMAINS_BLOCKED_EXTERNAL_EVIDENCE
    rationale: Repeated fresh-context real-profile trials and calibrated thresholds do not exist.
  CONVERSATIONAL_PRODUCTION_CERTIFICATION:
    disposition: REMAINS_BLOCKED_OPERATOR_INPUT
    rationale: HD-007 remains independently open for conversational evaluation governance.
st_06_01_effect:
  bd008_applicable_cut_member: false
  may_be_removed_from_structural_uncertified_cut: true
  condition: >-
