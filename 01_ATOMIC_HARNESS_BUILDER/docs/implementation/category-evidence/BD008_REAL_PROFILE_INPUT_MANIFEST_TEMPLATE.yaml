schema_version: cmf-builder-bd008-real-profile-input-manifest/v1
template_status: TEMPLATE_NOT_EVIDENCE
submission_status: OPERATOR_SUPPLIED_PENDING_VALIDATION
submission_id: REPLACE_WITH_IMMUTABLE_SUBMISSION_ID
profile:
