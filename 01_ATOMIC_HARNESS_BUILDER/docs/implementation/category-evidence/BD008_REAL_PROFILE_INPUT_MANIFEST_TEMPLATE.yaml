  profile_owner_or_steward: REPLACE_WITH_AUTHORITY_IDENTITY
  profile_identity_sha256: REPLACE_WITH_64_LOWERCASE_HEX
usage_authority:
  grant_id: REPLACE_WITH_GRANT_ID
  grantor_identity: REPLACE_WITH_GRANTOR
  grantor_authority_role: REPLACE_WITH_ROLE
  grantee_scope: Atomic_Harness_Builder_development_validation
  permitted_use:
    - compile_development_activative_intelligence_pack
    - run_development_behavioral_validation
  prohibited_use:
    - production_publication
    - certification_claim
    - manufacture_human_truth_or_reaction
  effective_on: REPLACE_WITH_YYYY-MM-DD
  expires_on: REPLACE_WITH_YYYY-MM-DD_OR_NONE
  withdrawal_or_revocation_procedure: REPLACE_WITH_PROCEDURE
  protected_benchmark_use_allowed: false
authority_decisions:
  identity_dna_version_ratified_by: REPLACE_WITH_HUMAN_AUTHORITY
