schema_version: cmf-builder-constitutional-alignment-human-decisions/v1
status: REQUIRED
decisions:
  - id: HD-001
    title: Resolve V1.2 authority package coherence
    owner: program_product_authority
    issue: The binding amendment and registry establish five categories and richer requirements while several V1.2 shards registries and validation outputs still encode four categories or partial wording.
    recommendation: Reissue or explicitly authorize a corrected V1.2 package overlay; preserve D031 as historical evidence and add machine-readable current-effect metadata.
    required_before: Batch B completion
    blocks: [Batch_B, Batch_D]
    status: RESOLVED_BY_EXPLICIT_USER_AUTHORIZATION
    resolution: Corrected local V1.2 overlay authorized and validated.

  - id: HD-002
    title: Ratify fifth-category Release 1 certification scope
    owner: product_lead_and_category_steward
    issue: Interview Expression must compile as a supported profile but Format 02 remains the only Release 1 production reference.
    recommendation: Treat all four conversational profiles as structurally supported and UNCERTIFIED in Release 1 while requiring contract-level acceptance tests; do not move interview execution into Builder.
    required_before: Batch B contract finalization
    blocks: [Batch_B, Batch_E]
    status: RESOLVED_BY_EXPLICIT_USER_AUTHORIZATION
    resolution: Four conversational profiles are structurally supported and UNCERTIFIED; execution remains outside Builder.

  - id: HD-003
    title: Decide FR-169 transfer portfolio meaning
    owner: product_lead_and_evaluation_governance
    issue: FR-169 still says all four category constitutions after V1.2 creates a fifth category.
    recommendation: Require all five for a single general Builder certification claim or define separate visual and conversational portfolio claims with explicit non-inheritance.
    required_before: Batch B requirement registry finalization
    blocks: [Batch_B, Batch_D, Batch_E]
    status: RESOLVED_BY_EXPLICIT_USER_AUTHORIZATION
    resolution: General Builder certification requires evidence across all five category constitutions and the declared target gates.

  - id: HD-004
    title: Ratify planning inventory representation and revised count
    owner: product_lead_and_planning_governance
    issue: The 401-row V1.1 inventory has no authority type for eight standalone constitutional amendment corrections and lacks HG-015.
    recommendation: Preserve the 401 rows; append eight CONSTITUTIONAL_AMENDMENT rows and HG-015 for a proposed 410-row V1.2 inventory; update affected existing rows without double-counting them.
    required_before: Batch D generation
    blocks: [Batch_D, Batch_E]
    status: RESOLVED_AND_INVENTORY_CONFIRMED
    resolution: The 401 rows were preserved; CONST-001 through CONST-008 and HG-015 were added for 410 rows. Human product authority confirmed the revised inventory on 2026-07-14; see docs/planning/V1_2_INVENTORY_CONFIRMATION_RECEIPT.yaml.

  - id: HD-005
    title: Ratify cross-product contract ownership
    owner: cross_product_architecture
    issue: Reaction Receipt Expression Moment Identity DNA amendment proposal and T/V somatic-route request cross Builder Activation Compiler Content Harness and Visual Asset Editor boundaries.
    recommendation: Builder owns compilation validation lineage and capsule handoff only; the originating product owns capture and truth; a human identity authority owns Identity DNA merge; downstream products own execution.
    required_before: Batch B schema-contract freeze
    blocks: [Batch_B, Batch_C, Batch_E]
    status: RESOLVED_BY_EXPLICIT_USER_AUTHORIZATION
    resolution: Builder owns compile, validate, lineage, and handoff; source, human identity, and downstream product owners retain capture, merge, and execution authority.

  - id: HD-006
    title: Ratify human-reaction data governance
    owner: product_lead_evidence_steward_privacy_authority
    issue: Public comments DMs ReelCast and interview reactions may contain personal sensitive consent-bound or revocable material.
    recommendation: Define consent authority purpose limits retention redaction access transcript and timecode provenance withdrawal behavior and whether Identity DNA proposals may be stored before approval.
    required_before: Conversational source profile or benchmark authorization
    blocks: [Batch_B, Batch_C, Batch_F]
    status: OPEN_BLOCKING_PRODUCTION_USE

  - id: HD-007
    title: Extend empirical governance to conversational evaluation
    owner: evaluation_governance_and_category_steward
    issue: BD-008 covers protected labels and thresholds for Format 02 but V1.2 adds conversational role reaction expression and wrong-reading evaluation dimensions.
    recommendation: Keep BD-008 open and extend its scope or create a separately ratified conversational evaluation decision with protected human-reaction cases and non-compensable gates.
    required_before: Conversational profile certification
    blocks: [Batch_C, Batch_E, Batch_F]
    status: OPEN_BLOCKING_CONVERSATIONAL_CERTIFICATION

preserved_open_blockers:
  - id: BD-004
    impact: Extend source authority consent privacy and benchmark eligibility analysis to conversational reaction evidence without weakening the existing Format 02 corpus blocker.
  - id: BD-007
    impact: Unchanged for development-time visual parsing; does not authorize runtime semantic invention.
  - id: BD-008
    impact: Extend rubric and threshold governance to the complete constitutional evaluation dimensions.
  - id: BD-010
    impact: Include conversational parsing recompilation and receipt capabilities in seed-skill or capability-gap decisions.
  - id: BD-014
    impact: External interface snapshots must preserve Visual Semantic Visual Narrative feature-contract Composition Asset Pack T/V route and semantic non-mutation lineage.
