product: CMF Atomic Harness Builder Next
version: 1.2.0-aligned
status: locked_product_constitution_prd_v1_2_aligned
constitutional_precedence_contract: governance/CONSTITUTIONAL_PRECEDENCE_CONTRACT.yaml
product_promise: A human-governed harness-development compiler that transforms an evidence-saturated atomic candidate
  into an implementation-authorized Development Capsule without implementing the final production harness.
authority_model:
  deterministic_tooling:
  - evidence processing
  - schema validation
  - graph transitions
  - dependency resolution
  - context assembly
  - compilation
  - receipts
  agents_and_typed_model_programs:
  - bounded investigation
  - semantic inference
  - multimodal parsing
  - recommendations
  - creative transformations
  humans:
  - constitutional decisions
  - creative policy
  - risk acceptance
  - waivers
  - irreversible architecture
success_gates:
- structural_validity
- implementation_readiness
- downstream_harness_effectiveness
workflow_model:
  canonical_ir: builder_workflow_ir
  actors:
  - human
  - bounded_agent
  - deterministic_code
  - governed_hybrid
  principle: explicit end-to-end workflows with bounded feedback loops and typed node handoffs
compilation_targets:
- atomic_content_harness
- visual_asset_editor
- content_asset_delegation_contract
canonical_format_categories:
- short_form_edited_video
- 2d_character_animation
- carousels
- supervisuals
- conversational_activation_expression
semantic_laws:
  runtime_order: activation_first
  harness_development_order: visual_syntax_first
  non_confusion_rule: Visual Syntax First discovers harness grammar; Activation First governs runtime meaning. Neither downstream composition nor execution may invent upstream semantics.
constitutional_semantic_chain:
  - coach_or_guest_identity_dna_ref
  - audience_context_premise_ref
  - resonance_ref
  - matrix_of_edging_ref
  - activative_intelligence_pack_ref
  - surface_semantic_program_ref
  - human_reaction_or_viewer_role_activation_ref
  - expression_moment_or_composition_asset_pack_ref
  - format_harness_ref
  - final_asset_and_evaluation_receipts
visual_handoff_chain:
  - activative_intelligence_pack_ref
  - visual_semantic_pack_ref
  - visual_narrative_program_ref
  - feature_contract_refs
  - composition_asset_pack_ref
  - visual_syntax_handoff_ref
  - tv_route_request_ref
downstream_execution_boundaries:
  visual_asset_editor: external_not_implemented_here
  delegation_protocol: external_contract_only_not_implemented_here
release_1: Complete architectural spine proven through one fully implemented and certified Atomic Content Harness
