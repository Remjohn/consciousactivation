  feature_id: F03
  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Induce cross-specimen visual grammar
  requirement: After all relevant specimens are parsed, the Builder must compare them to propose persistent instruments,
    component grammar, variants, optional branches, anomalies, and forbidden mutations.
  testable_consequences:
  - Every candidate invariant cites multiple supporting specimens or an explicit canonical authority.
  - Competing grammar hypotheses and unresolved evidence are retained for atomicity and Genesis.
