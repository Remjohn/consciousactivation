- id: FR-035
  feature_id: F04
  feature_title: Atomicity Classification and Draft Harness Model
  title: Assess wrong-boundary risk
  requirement: The Builder must describe the likely implementation, creative, evaluation, migration, and maintenance
    consequences if the proposed atomicity decision is wrong.
  testable_consequences:
  - The risk record distinguishes over-splitting from over-merging.
  - High-risk uncertainty requires more evidence or a prototype-only path.
  decisions:
