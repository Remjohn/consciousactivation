  status: draft_for_review
- id: FR-016
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Evaluate a measurable saturation contract
  requirement: Each target profile must define the required source coverage, specimen coverage, evidence categories,
    prior-art inspection, contradiction detection, and traceability conditions needed for saturation.
  testable_consequences:
  - Saturation cannot pass solely because files exist.
  - The saturation matrix shows each required obligation and its evidence.
  decisions:
  - D003
  - D007
  user_journeys:
  - UJ-01
  - UJ-02
  cross_cutting_nfrs: *id002
  source_file: prd/05-features/F02-configured-evidence-workspace.md
