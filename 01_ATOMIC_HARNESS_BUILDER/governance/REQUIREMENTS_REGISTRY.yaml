  user_journeys:
  - UJ-11
  - UJ-13
  cross_cutting_nfrs: *id018
  source_file: prd/05-features/F18-builder-workflow-runtime.md
  status: draft_for_review
non_functional_requirements:
- id: NFR-REL-001
  title: Deterministic replay
  requirement: Given identical locked sources, ratified decisions, compiler versions, and configuration, deterministic
    Builder stages must reproduce byte-identical authoritative artifacts or record an explicit nondeterminism exception.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-REL-002
  title: Resumability
  requirement: Every run must resume after interruption from the last committed authoritative event without replaying
    completed human decisions.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-REL-003
  title: Idempotent compilation
  requirement: Recompiling an unchanged Harness IR must not create semantically different artifacts or duplicate
    ledger events.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-REL-004
  title: Failure isolation
  requirement: A phase failure must not corrupt locked evidence, ratified decisions, or unaffected artifacts.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-PERF-001
  title: Interactive Control Tower
  requirement: Common Control Tower status and detail queries should render within 2 seconds at the reference-corpus
    scale, excluding intentional long-running model operations.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-PERF-002
  title: Compilation budget visibility
  requirement: Every stochastic phase and JIT capsule must declare expected token, latency, and cost budgets and
    emit actual usage.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-PERF-003
  title: No hidden budget overflow
  requirement: A phase that exceeds its hard context or cost budget must block, degrade through an approved policy,
    or request authorization; it may not continue silently.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-PERF-004
  title: Parallel-safe work
  requirement: Independent deterministic scans, benchmark repetitions, and evaluator tasks should support bounded
    parallel execution without shared-state conflicts.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-TRACE-001
  title: End-to-end provenance
  requirement: Every material requirement, IR value, generated artifact, decision, benchmark result, and authorization
    state must be traceable to its source evidence or governing decision.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-TRACE-002
  title: Append-only operational history
  requirement: Run and human-action history must be append-only or cryptographically superseded; destructive history
    editing is prohibited.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-TRACE-003
  title: Evaluated artifact identity
  requirement: Production eligibility must bind exact source-IR, skill, recipe, capsule, compiler, and evaluation-receipt
    hashes.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-TRACE-004
  title: Knowledge-status integrity
  requirement: No system component may promote generated or hypothesized content into observed or ratified status
    without the required authority transition.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-OBS-001
  title: Event completeness
  requirement: Every lifecycle transition, blocker, decision, waiver, invalidation, repair, benchmark verdict, and
    authorization change must emit a typed event.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-OBS-002
  title: Evidence-backed status
  requirement: Every displayed status must link to the criteria, events, artifacts, or receipts that justify it.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-OBS-003
  title: No second source of truth
  requirement: The Control Tower may mutate state only through governed commands that update the Harness IR or run
    ledger and emit receipts.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-OBS-004
  title: Exportability
  requirement: Operators must be able to export machine-readable run state, scorecards, decision history, artifacts,
    and receipts without scraping the UI.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-SEC-001
  title: Source immutability
  requirement: Configured source repositories, archives, and specimens are read-only evidence unless an explicit
    import or migration action creates a new governed copy.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-SEC-002
  title: Path and archive safety
  requirement: The Builder must prevent archive traversal, unsafe extraction, executable surprise, and unbounded
    recursive ingestion.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-SEC-003
  title: Authority enforcement
  requirement: Only authorized actors may ratify constitutional decisions, approve waivers, freeze category constitutions,
    or issue implementation authorization.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-SEC-004
  title: Secret isolation
  requirement: Credentials and provider secrets must never be written into Harness IR, generated skills, execution
    capsules, logs, or exported Development Capsules.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-COMPAT-001
  title: V2.1 compatibility
  requirement: Existing V2.1 runs and compiled packages must remain readable or receive an explicit migration path
    with loss and incompatibility receipts.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-COMPAT-002
  title: Schema evolution
  requirement: IR, contract, event, category, and skill schemas must be versioned and support documented compatibility
    and migration rules.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-COMPAT-003
  title: Artifact deprecation
  requirement: Deprecated outputs must include replacement guidance, affected consumers, removal gates, and regression
    evidence.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-PORT-001
  title: Portable source profiles
  requirement: Source profiles must use resolvable URIs or paths and support local directories and archives without
    requiring one machine-specific layout.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-PORT-002
  title: Runtime adapter boundary
  requirement: Core IR and compilation logic must not be coupled irreversibly to one model provider or one agent
    harness.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-UX-001
  title: Accessible Control Tower
  requirement: The Pi UI must support keyboard navigation, readable status semantics, non-color-only indicators,
    and accessible evidence inspection.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-UX-002
  title: Progressive disclosure
  requirement: The UI and generated documents must lead with decisions, blockers, and evidence and disclose lower-level
    technical detail on demand.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-EVAL-001
  title: Protected benchmark integrity
  requirement: Protected release cases and expected labels must be access-controlled and excluded from training
    or prompt construction paths.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-EVAL-002
  title: Repeated-run measurement
  requirement: Critical stochastic benchmark cases must run in fresh contexts with recorded repetition count, variance,
    minimum, mean, and failure frequency.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-EVAL-003
  title: Independent evaluation
  requirement: A generator or reasoning phase may not be the sole authority approving its own output.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-MAINT-001
  title: Single-source generation
  requirement: Readable documents and executable artifacts must be compiled from canonical IR or registries rather
    than independently maintained duplicates.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-MAINT-002
  title: Skill ecology maintainability
  requirement: Canonical skill duplication, relation cycles, unsupported dependencies, and maturity violations must
    be detectable automatically.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-MAINT-003
  title: Category migration safety
  requirement: A category-constitution change must identify dependent harnesses, run the required benchmark portfolio,
    and issue a migration receipt before release.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-SCALE-001
  title: Corpus-scale evidence processing
  requirement: The Builder must inventory and index the reference-corpus scale without losing source coverage, stable
    identities, or bounded parallelism; exact thresholds are calibrated in Architecture and benchmarks.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-ARCH-001
  title: Explicit ownership integrity
  requirement: Every capability, phase, module, contract, skill, evaluator, repair, and human gate must have the
    ownership cardinality permitted by its schema; undocumented general-agent ownership is prohibited.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-ARCH-002
  title: Executable graph integrity
  requirement: Phase, context, contract, dependency, loading, and repair graphs must be acyclic where execution
    requires a DAG, explicitly model approved loops, and fail validation on unresolved cycles or orphan nodes.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-TEST-001
  title: Public-seam testability
  requirement: Every implementation module and behaviorally significant skill must expose stable public seams and
    fixtures sufficient for contract, behavioral, integration, benchmark, and adversarial testing without coupling
    tests to hidden internals.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-CAT-001
  title: Category isolation
  requirement: Category and format-profile ontologies, registries, parsing fields, runtime rules, and evaluators
    must not leak into unrelated categories unless a shared abstraction is explicitly proven and versioned.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-CAT-002
  title: Atomic creative ownership
  requirement: Creative production promise, semantic workcell, visual or temporal grammar, legal variables, and
    format-native evaluation remain atomic-harness-owned unless implemented transfer evidence authorizes extraction.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-CAT-003
  title: Sequence fidelity
  requirement: For sequence-bearing products, the compiled architecture must preserve required viewer-state progression,
    scene or slide roles, timing or swipe logic, continuity, payoff, and intended reaction through typed contracts
    and category-appropriate evaluation.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-EVAL-004
  title: Category-appropriate evaluation
  requirement: Evaluation dimensions, thresholds, fixtures, and repair routes must reflect the selected category
    and format profile; metrics from one production substrate may not substitute for another without an explicit
    equivalence test.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-001
  title: Reproducible workflow routing
  requirement: Given the same request classification, target profile, risk state, and workflow registry version,
    the router must select the same workflow profile or emit an explicit nondeterminism receipt.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-002
  title: Explicit actor ownership
  requirement: Every workflow node must identify whether its primary actor is deterministic code, a bounded agent
    program, a human gate, or a governed hybrid; undocumented general-agent ownership is prohibited.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-003
  title: Typed node handoffs
  requirement: Every node-to-node handoff must use a versioned contract with validated producer, consumer, authority,
    error, and completion semantics.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-004
  title: Bounded control flow
  requirement: Retries, loops, timeouts, fan-out, arbitration, and fallback routes must have declared limits and
    terminal conditions; unbounded autonomous looping is prohibited.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-005
  title: Idempotent workflow resume
  requirement: A workflow must resume from committed node state without duplicating successful side effects, replaying
    ratified human actions, or silently changing the selected profile.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-006
  title: Failure containment
  requirement: A failed node, agent, tool, sandbox, or workflow profile must not corrupt locked sources, ratified
    decisions, protected benchmarks, or unaffected workflow branches.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-007
  title: Sandbox least privilege
  requirement: Node sandboxes must receive only approved tools, sources, secrets, network access, storage, compute,
    and lifetime required by the node contract.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-008
  title: Bounded parallelism
  requirement: Parallel execution is allowed only for dependency-independent work with explicit concurrency, budget,
    merge, cancellation, and conflict policies.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-009
  title: Risk-aware model and compute routing
  requirement: Model tier, repetition count, candidate fan-out, evaluator strength, and compute budget must be selected
    by explicit task-complexity, risk, and expected-value policy and recorded in the run.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-010
  title: Workflow observability
  requirement: Every workflow node and route must emit start, completion, validation, failure, retry, cancellation,
    cost, latency, and artifact events sufficient to reconstruct execution.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-011
  title: Workflow-level testability
  requirement: Every production workflow profile must support contract tests, end-to-end integration tests, fault
    injection, resume tests, route tests, and rollback tests at stable public seams.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
- id: NFR-WORKFLOW-012
  title: Versioned promotion and rollback
  requirement: Workflow definitions, routers, node contracts, and execution policies must be versioned, maturity-gated,
    promotable through CI, and rollback-safe with migration receipts.
  source_file: prd/06-cross-cutting-nfrs.md
  status: draft_for_review
