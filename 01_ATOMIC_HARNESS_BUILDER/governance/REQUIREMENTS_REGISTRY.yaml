  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Emit a complete JIT capsule package
  requirement: Each compilation must produce a typed Execution Capsule, compiled instructions or program input,
    context manifest, resolved binding manifest, output-contract binding, and compilation receipt.
  testable_consequences:
  - The package can be executed without consulting hidden conversation history.
  - A reviewer can inspect every included and excluded component.
  decisions:
  - D018
  - D020
  user_journeys:
  - UJ-07
