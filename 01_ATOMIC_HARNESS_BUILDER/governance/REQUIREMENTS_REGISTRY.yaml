- id: FR-077
  feature_id: F08
  feature_title: Reference, SPR, and Minimum Complete Context
  title: Compile a Context Budget Policy per phase
  requirement: Every model-driven phase must declare hard and soft token, latency, and cost budgets, required versus
    optional context classes, compression permissions, retrieval policies, and budget-failure behavior.
  testable_consequences:
  - A phase's budget is visible before execution.
  - Budget rules are target, category, and model-policy aware.
