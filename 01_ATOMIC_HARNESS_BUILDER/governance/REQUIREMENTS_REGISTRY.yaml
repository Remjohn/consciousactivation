  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Report repeated-run stability
  requirement: Release reports must include distribution and dominant failure patterns for stochastic dimensions
    rather than a single run score.
  testable_consequences:
  - Thresholds may include minimum and variance limits in addition to mean score.
  - A highly variable candidate can fail despite a strong best run.
