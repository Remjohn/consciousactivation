  title: Provide executable test and benchmark fixtures
  requirement: The capsule must include contract, unit-seam, behavioral, integration, golden, adversarial, and benchmark
    fixtures required by the authorized implementation scope.
  testable_consequences:
  - The first vertical slice can run meaningful tests without inventing datasets.
