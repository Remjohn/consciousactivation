  title: Detect duplicate and near-duplicate visual evidence
  requirement: The Builder must calculate exact duplicate relationships and may propose near-duplicate clusters
    without discarding provenance.
  testable_consequences:
  - Exact duplicates are not counted as independent support for an invariant.
