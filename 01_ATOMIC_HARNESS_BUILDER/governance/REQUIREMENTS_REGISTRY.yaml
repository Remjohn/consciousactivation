  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Compile portable progressively disclosed skill packages
  requirement: The Builder must compile the typed skill definition into a compact SKILL.md plus only justified references,
    schemas, scripts, examples, templates, evaluation cases, and a manifest.
  testable_consequences:
  - The main SKILL.md contains the active procedure and checkable completion criteria.
  - Heavy or branch-specific reference is loaded through governed context pointers.
