  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Enforce hard release gates
  requirement: Critical unsupported decisions, evidence failures, wrong atomicity, contract contradictions, silent
    rewrites, untested required skills, benchmark leakage, false readiness, and anti-goal violations must fail release
    regardless of average score.
  testable_consequences:
  - Each hard gate maps to a test or review receipt.
  - A high composite score cannot override a failed hard gate.
