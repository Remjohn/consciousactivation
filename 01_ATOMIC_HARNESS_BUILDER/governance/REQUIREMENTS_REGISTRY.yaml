  feature_title: Traceable Development Capsule and Implementation Handoff
  title: Generate dependency-ordered vertical stories
  requirement: The implementation plan must decompose authorized scope into stories that deliver complete testable
    behavior, fit one development-agent context, use only previous-story dependencies, and map to FRs, NFRs, contracts,
