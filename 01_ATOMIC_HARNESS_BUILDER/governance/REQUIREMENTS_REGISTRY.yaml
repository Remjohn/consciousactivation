  feature_id: F11
  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Maintain a staged benchmark portfolio
  requirement: The Builder must use one mandatory primary reference harness, contrasting transfer harnesses, and
    later Visual Asset Editor and Delegation targets before general certification.
  testable_consequences:
  - Release 1 cannot claim generality beyond its passed reference slice.
  - Transfer targets are selected for materially different visual, sequencing, runtime, or asset grammars.
