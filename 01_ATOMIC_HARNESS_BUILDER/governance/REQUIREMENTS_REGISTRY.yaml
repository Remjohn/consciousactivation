  feature_id: F08
  feature_title: Reference, SPR, and Minimum Complete Context
  title: Emit a complete context manifest
  requirement: Every JIT Execution Capsule must list included, excluded, summarized, retrieved, and compressed resources;
    their hashes; their token contribution; and the rationale for each decision.
  testable_consequences:
  - A reviewer can reproduce the capsule's context selection.
  - Excluded future-phase or evaluator resources are visible rather than silently ignored.
  decisions:
  - D018
  - D020
  - D025
