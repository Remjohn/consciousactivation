- id: FR-108
  feature_id: F11
  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Verify evaluated artifact identity
  requirement: The evaluation system must bind exact source IR, skill package, adaptation, recipe, capsule, compiler,
    model policy, dataset, and scoring versions.
  testable_consequences:
  - The shipped artifact hash matches the evaluated artifact hash.
  - A changed dependency invalidates the applicable receipt.
  decisions:
  - D021
  user_journeys:
