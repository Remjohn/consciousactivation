  feature_id: F13
  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Evaluate an evidence-backed readiness gate
  requirement: Readiness must validate evidence saturation, atomicity, constitutional authority, Harness IR consistency,
    phases, contexts, contracts, modules, skill maturity, benchmark results, repair coverage, observability, budgets,
    and target-specific requirements.
  testable_consequences:
  - Document completeness alone cannot satisfy readiness.
  - Each readiness result lists every passed and failed hard gate.
  decisions:
