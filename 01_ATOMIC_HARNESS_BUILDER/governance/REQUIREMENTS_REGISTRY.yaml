  feature_title: Traceable Development Capsule and Implementation Handoff
  title: Define a first working vertical-slice plan
  requirement: The capsule must identify the narrowest end-to-end reference path that proves evidence, one core
    transformation, one format projection, evaluation, observability, and targeted repair for the selected reference
    harness.
  testable_consequences:
  - The path produces a demonstrable output and receipts.
