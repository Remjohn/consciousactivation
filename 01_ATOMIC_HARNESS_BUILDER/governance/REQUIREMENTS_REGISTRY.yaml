- id: FR-032
  feature_id: F04
  feature_title: Atomicity Classification and Draft Harness Model
  title: Compare candidate product boundaries
  requirement: The Builder must compare specimens or candidate groups across production promise, persistent visual
    instrument, composition grammar, state machine, semantic workcell, input contract, asset program, runtime ownership,
    evaluation failures, and repair behavior.
  testable_consequences:
  - The comparison exposes shared and materially different dimensions.
  - Topic, labels, aspect ratio, or folder names alone cannot decide the boundary.
