  title: Build a spatial relationship graph
  requirement: The Builder must record relationships such as alignment, containment, pairing, overlap, anchoring,
    ordering, gaze, and category-specific scene relations between valid component IDs.
  testable_consequences:
  - Relationship targets must exist and pass schema validation.
  - The graph distinguishes observed spatial relations from inferred functional relations.
