  feature_id: F13
  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Rerun targeted regression suites
  requirement: After repair, the Builder must rerun all tests and benchmarks required by the repaired capability
    and every affected descendant, including protected cases where policy permits.
  testable_consequences:
  - A repair is not complete until required regressions pass or remain visibly blocked.
  - Regression scope is derived from dependency impact rather than manually guessed.
  decisions:
  - D021
  - D026
  user_journeys:
  - UJ-10
