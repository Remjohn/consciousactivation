  feature_id: F03
  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Classify composition variables
  requirement: The Builder must classify material visual properties as invariant, controlled variable, content slot,
    optional component, specimen anomaly, or unknown with confidence and supporting specimens.
  testable_consequences:
  - A topic, niche, or replacement copy cannot become a layout invariant without cross-specimen evidence.
  - Single-instance features default to anomaly or unknown unless another authority justifies promotion.
