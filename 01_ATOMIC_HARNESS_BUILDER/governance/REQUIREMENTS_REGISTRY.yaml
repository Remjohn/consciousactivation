  feature_id: F08
  feature_title: Reference, SPR, and Minimum Complete Context
  title: Govern SPR as phase-local creative priming
  requirement: The Builder must treat Sparse Priming Representation as a conditional creative-presence resource
    loaded only after evidence, meaning, authority, and wrong-reading locks required by the phase are resolved.
  testable_consequences:
  - SPR may influence authorized creative search but not rewrite evidence or constitutional decisions.
  - SPR is excluded from independent evaluation unless the evaluation design explicitly measures its effect.
