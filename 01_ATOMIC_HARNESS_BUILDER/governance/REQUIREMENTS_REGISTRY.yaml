  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Generate immutable readiness and authorization receipts
  requirement: Every readiness and authorization decision must bind the exact Harness IR, source lock, category
    and profile versions, skill and benchmark receipts, waivers, compiler version, status, scope, and signatories.
  testable_consequences:
  - Implementation can verify the capsule and receipt identity before starting.
  - A changed dependency invalidates the prior authorization.
