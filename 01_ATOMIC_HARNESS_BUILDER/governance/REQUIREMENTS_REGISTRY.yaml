  title: Draft category-native sequence grammar
  requirement: The Builder must propose slide-role, scene-role, state-transition, pacing, and operator grammar appropriate
    to the selected category and format profile.
  testable_consequences:
  - The sequence draft references observed temporal or cross-frame evidence.
  - Sequencing hypotheses remain provisional until Genesis.
