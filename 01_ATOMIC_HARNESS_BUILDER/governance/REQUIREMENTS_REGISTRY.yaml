  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Compile runtime binding schemas
  requirement: Every recipe must declare required, optional, conditional, derived, and forbidden runtime variables;
    their types; sources; authority; dependencies; defaults; and missing-value behavior.
  testable_consequences:
  - A missing required binding is detected before prompt assembly.
  - Hardcoded instance values cannot replace declared dynamic inputs.
  decisions:
  - D019
