- id: FR-107
  feature_id: F11
  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Promote maturity only through stored receipts
  requirement: Draft, evaluation_pending, experimental, tested, stable, deprecated, and superseded maturity transitions
    must require target-specific evaluation evidence and regression policies.
  testable_consequences:
  - A required skill below the target's maturity threshold blocks full authorization.
  - A stable skill change triggers all required dependent regressions.
  decisions:
  - D021
  - D027
  user_journeys:
  - UJ-08
