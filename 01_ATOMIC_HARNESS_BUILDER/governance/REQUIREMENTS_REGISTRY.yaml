  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Govern prototype-only authorization
  requirement: A prototype authorization must define the empirical question, allowed implementation scope, permitted
    artifacts, provisional decisions, required evidence return, disposal or migration policy, budget, and promotion
    conditions.
  testable_consequences:
  - Prototype code cannot be mistaken for authorized production logic.
  - Prototype results flow back to the relevant decision, benchmark, or architecture node.
