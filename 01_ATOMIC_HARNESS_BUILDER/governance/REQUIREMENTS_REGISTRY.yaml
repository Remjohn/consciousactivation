  feature_id: F03
  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Parse temporal syntax for time-based evidence
  requirement: For video and animation categories, the Builder must identify appearance, persistence, motion, pose
    or state change, transition, timing, cut, sonic relation, and disappearance across frames or shots.
  testable_consequences:
  - Temporal relationships use stable state or beat identifiers.
  - Static-only categories do not receive artificial motion requirements.
