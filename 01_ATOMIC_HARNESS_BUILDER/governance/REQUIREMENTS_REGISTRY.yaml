- id: FR-036
  feature_id: F04
  feature_title: Atomicity Classification and Draft Harness Model
  title: Require human atomicity ratification
  requirement: A human Harness Architect must approve, revise, or reject the proposed product boundary before the
    Builder compiles a Genesis-ready model.
  testable_consequences:
  - Ratification records the chosen boundary, rejected alternatives, evidence, and rationale.
  - The agent cannot self-ratify an atomicity recommendation.
  decisions:
  - D002
  - D008
  user_journeys:
