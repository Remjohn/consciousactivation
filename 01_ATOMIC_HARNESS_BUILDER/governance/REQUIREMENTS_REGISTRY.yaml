- id: FR-145
  feature_id: F14
  feature_title: Canonical Format Categories, Format Profiles, and Activative Sequencing
  title: Use category-specific syntax parsing
  requirement: The syntax-parsing capability must load category and format ontologies appropriate to the production substrate,
    including conversational turn and Expression Moment parsing where applicable.
  testable_consequences:
  - Carousels parse slide roles; Supervisuals parse one-frame hierarchy; video parses time states; 2D animation parses character
    performance; conversational harnesses parse Activative Calls, reactions, turn relationships, timecodes, expression functions,
    landings, and micro-commitments.
  - The canonical parser procedure remains reusable while category output fields remain distinct.
  decisions:
  - D007
  - D030
  - D031
  user_journeys:
  - UJ-02
  - UJ-06
  cross_cutting_nfrs: *id014
  source_file: prd/05-features/F14-format-categories-sequencing.md
  status: draft_for_review
- id: FR-146
  feature_id: F14
  feature_title: Canonical Format Categories, Format Profiles, and Activative Sequencing
  title: Use category-specific temporal, conversational, and sequence parsing
  requirement: Sequence-bearing categories must derive observed and hypothesized structure using category-native state, beat,
    turn, transition, continuity, pacing, silence, and sonic relationships.
  testable_consequences:
  - Carousels represent swipe sequence without pretending to have frame-time motion.
  - Supervisuals declare one-frame attention order, while conversational profiles represent question → reaction → follow-up
    → elevation/close without scripting the guest landing.
  decisions:
  - D030
  - D031
  user_journeys:
  - UJ-02
  - UJ-06
  cross_cutting_nfrs: *id014
  source_file: prd/05-features/F14-format-categories-sequencing.md
  status: draft_for_review
- id: FR-147
  feature_id: F14
  feature_title: Canonical Format Categories, Format Profiles, and Activative Sequencing
  title: Compile category-adapted Activative Sequencing Intelligence
  requirement: Every sequence-bearing harness must receive a format-adapted capability that translates ratified Activative
    meaning and parsed syntax into viewer or participant roles, state beats, prediction gaps, scene, slide, or conversational-turn
    roles, transitions, asset or expression states, pacing, silence or sonic cues, payoff, intended reaction, and smallest
    useful commitment.
  testable_consequences:
  - Sequence decisions cite Activative contracts and category-native syntax.
  - Sequencing is independently evaluated and repairable rather than hidden inside final composition or generic question generation.
  decisions:
  - D030
  user_journeys:
  - UJ-06
  cross_cutting_nfrs: *id014
  source_file: prd/05-features/F14-format-categories-sequencing.md
  status: draft_for_review
- id: FR-148
  feature_id: F14
  feature_title: Canonical Format Categories, Format Profiles, and Activative Sequencing
  title: Compile category-owned runtime, evaluation, and repair rules
  requirement: Each category and profile must contribute its own runtime constraints, invariant tests, quality dimensions,
    wrong-reading classes, continuity checks, repair ownership, and required telemetry.
  testable_consequences:
  - A Supervisual is not evaluated by video pacing metrics.
  - A 2D character continuity failure routes to character-state or scene composition rather than generic visual
    style repair.
  decisions:
  - D031
  user_journeys:
  - UJ-06
  - UJ-10
  cross_cutting_nfrs: *id014
  source_file: prd/05-features/F14-format-categories-sequencing.md
  status: draft_for_review
- id: FR-149
  feature_id: F14
  feature_title: Canonical Format Categories, Format Profiles, and Activative Sequencing
  title: Preserve atomic creative ownership
  requirement: The atomic harness overlay must own its exact production promise, semantic workcell, visual or temporal
    grammar, legal variables, composition templates, evaluation thresholds, and repair behavior that are not proven
    category mechanisms.
  testable_consequences:
  - Category abstractions cannot absorb atomic creative policy merely because two harnesses look related.
  - Proposed reuse requires implemented evidence and regression coverage.
  decisions:
  - D008
  - D030
  - D033
  user_journeys:
