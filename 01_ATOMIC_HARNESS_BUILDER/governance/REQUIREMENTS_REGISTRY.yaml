- id: FR-097
  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Enforce approved degradation policies
  requirement: When a value or reference is unavailable, the compiler may continue only through a target- and field-specific
    degradation policy that defines substitutes, quality impact, provisional status, and authorization ceiling.
  testable_consequences:
  - The model cannot invent a required missing value.
  - Degraded capsules are visibly marked and cannot exceed their allowed readiness state.
  decisions:
  - D019
  - D027
  user_journeys:
  - UJ-07
