- id: FR-081
  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Maintain a Canonical Skill Capability Registry
  requirement: The Builder must maintain a versioned registry of reusable procedural capabilities with stable IDs,
    names, responsibilities, input and output contracts, authority lane, failure modes, reasoning modules, maturity,
    artifact availability, and evaluation receipts.
  testable_consequences:
  - The registry distinguishes packaged, reference-illustrated, capability-illustrated, experimental, tested, stable,
    deprecated, and superseded entries.
  - A runtime cannot treat a merely illustrated skill as production-ready.
  decisions:
  - D017
  - D021
