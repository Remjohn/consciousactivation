- id: FR-078
  feature_id: F08
  feature_title: Reference, SPR, and Minimum Complete Context
  title: Rank context by functional necessity
  requirement: The JIT compiler must prioritize phase responsibility, output contract, ratified decisions, bindings,
    canonical procedure, harness adaptation, direct evidence, constraints, conditional references, examples, and
    enrichment in that order unless the profile specifies a justified override.
  testable_consequences:
  - Optional examples cannot displace required evidence or contracts.
  - The context manifest records priority decisions.
  decisions:
  - D020
