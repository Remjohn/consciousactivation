  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Apply typed authority and precedence rules
  requirement: The compiler must resolve conflicts using field-specific authority and precedence rules rather than
    a generic prompt-time judgment.
  testable_consequences:
  - A ratified constitutional value cannot be overridden by an unratified runtime suggestion.
  - Every conflict resolution or block is receipted.
  decisions:
  - D019
  user_journeys:
  - UJ-07
  - UJ-09
