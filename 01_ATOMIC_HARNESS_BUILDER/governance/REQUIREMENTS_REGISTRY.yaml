  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Bind skill packages to evaluation assets
  requirement: Every skill package must identify its baseline controls, positive cases, adversarial cases, counterexamples,
    scoring rubric, maturity requirements, and latest evaluation receipt.
  testable_consequences:
  - A required production skill without an eligible receipt blocks authorization.
  - The evaluated package hash matches the package available to capsule compilation.
