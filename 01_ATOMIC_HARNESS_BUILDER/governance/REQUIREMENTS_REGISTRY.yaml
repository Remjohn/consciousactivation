  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Score independent quality dimensions
  requirement: Builder evaluation must report evidence understanding, visual and temporal understanding, atomicity,
    product architecture, skill system, evaluation and repair quality, implementation readiness, and downstream
    performance as separate dimensions.
  testable_consequences:
  - The full scorecard remains visible even when a composite trend score is calculated.
