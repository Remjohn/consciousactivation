  feature_id: F03
  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Separate BBOX observation from WHY hypotheses
  requirement: The Builder must store measured geometry separately from visual-function hypotheses and require evidence,
    confidence, alternatives, and knowledge status for every proposed WHY.
  testable_consequences:
  - A function hypothesis cannot overwrite a measured or observed field.
  - Human ratification can promote an interpretation without rewriting its original provenance.
