  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Measure normalized component geometry
  requirement: Every major spatial component must include validated normalized bounding boxes or an explicit geometry-unavailable
    status.
  testable_consequences:
  - BBOX coordinates remain inside the canvas and use one declared coordinate system.
  - Geometry validation is deterministic and independent of semantic interpretation.
