  feature_id: F08
  feature_title: Reference, SPR, and Minimum Complete Context
  title: Compile progressive disclosure pointers
  requirement: Canonical skills and phase instructions must inline only universally required procedure and use typed
    context pointers for branch-specific or heavy reference material.
  testable_consequences:
  - Inactive branches do not consume capsule context.
  - A missing required pointer target blocks compilation rather than being improvised.
