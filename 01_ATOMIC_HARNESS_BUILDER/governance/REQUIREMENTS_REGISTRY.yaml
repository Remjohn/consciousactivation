  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Detect skill no-ops, sediment, and redundancy
  requirement: The Builder must analyze whether skill content changes behavior over control, duplicates canonical
    meaning, contains stale or unreachable branches, or repeats guidance already enforced by code or contracts.
  testable_consequences:
  - No-op guidance is removed or converted into a stronger tested mechanism.
  - The registry preserves one source of truth for each canonical procedural capability.
