  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Issue typed authorization outcomes
  requirement: The Builder must issue AUTHORIZED_FOR_IMPLEMENTATION, AUTHORIZED_FOR_PROTOTYPE_ONLY, NEEDS_RATIFICATION,
    BLOCKED_EVIDENCE, BLOCKED_SKILL_MATURITY, BLOCKED_BENCHMARK, BLOCKED_ARCHITECTURE, or another target-profiled
    blocking status.
  testable_consequences:
  - Only the full authorized state permits production implementation.
  - The status is recomputed after invalidation or new evidence.
