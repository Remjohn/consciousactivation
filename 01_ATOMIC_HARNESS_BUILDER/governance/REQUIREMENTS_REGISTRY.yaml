- id: FR-084
  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Run a formal skill necessity and capability-gap test
  requirement: Before creating a JIT Skill, the Builder must determine whether deterministic code, a schema, validator,
    tool, inline instruction, external reference, human decision, existing canonical skill, or adapter can reliably
    satisfy the capability.
  testable_consequences:
  - A rejected skill candidate records the chosen alternative owner.
  - A new canonical skill requires evidence that no approved capability covers the need.
  decisions:
