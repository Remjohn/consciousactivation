  feature_id: F13
  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Require root-cause investigation before repair
  requirement: A repair may not be proposed until the Builder records the observed symptom, reproduction or evidence,
    affected boundary, competing hypotheses, and selected root cause with confidence.
  testable_consequences:
  - The repair receipt links to the root-cause record.
  - Repeated guess-and-patch attempts trigger escalation.
