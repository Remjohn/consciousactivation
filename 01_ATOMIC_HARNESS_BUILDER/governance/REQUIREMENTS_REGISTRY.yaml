- id: FR-085
  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Prefer reuse, adaptation, or adapter composition
  requirement: The Builder must attempt exact canonical reuse, harness-local ecological adaptation, or a bounded
    adapter before authorizing a new canonical capability.
  testable_consequences:
  - Adaptations preserve the canonical skill's procedural DNA and declare local mutations.
  - Overlapping canonical skills trigger redundancy review rather than silent duplication.
  decisions:
  - D017
  user_journeys:
