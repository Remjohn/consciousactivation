  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Define Skill Composition Recipes
  requirement: The Builder must compile reusable recipes declaring the canonical skills, adaptations, reasoning
    modules, reference branches, runtime bindings, output contracts, and evaluation hooks required for a phase or
    execution path.
  testable_consequences:
  - Recipes are parameterized and contain no instance-specific resolved values.
  - The recipe compiler validates compatibility among all selected components.
