functional_requirements:
- id: FR-001
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Select one explicit compilation target
  requirement: 'The Builder must require each run to select exactly one target profile: Atomic Content Harness,
    Visual Asset Editor, or Content↔Asset Delegation Contract.'
  testable_consequences:
  - Initialization fails when no target or multiple targets are supplied.
  - The selected profile governs required sources, phases, decisions, artifacts, evaluations, and authorization
    gates.
  decisions:
  - D004
  - D006
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: &id001
  - NFR-REL-001
  - NFR-REL-002
  - NFR-REL-003
  - NFR-TRACE-002
  - NFR-OBS-001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-002
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Create a stable run identity
  requirement: The Builder must create a stable run identifier, target identifier, compiler version binding, operator
    identity, timestamps, and status before any evidence work begins.
  testable_consequences:
  - All events and artifacts reference the same run identifier.
  - A resumed run preserves identity rather than creating a hidden replacement run.
  decisions:
  - D005
  - D025
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: *id001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-003
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Enforce a typed lifecycle state machine
  requirement: The Builder must represent the approved lifecycle as typed states and transitions whose prerequisites,
    actors, outputs, and terminal conditions are machine-validated.
  testable_consequences:
  - A transition cannot occur when its declared prerequisites are incomplete.
  - Illegal transitions produce a blocking event and do not mutate authoritative state.
  decisions:
  - D006
  - D027
  user_journeys:
  - UJ-01
  - UJ-09
  cross_cutting_nfrs: *id001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-004
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Apply target-specific lifecycle profiles
  requirement: The shared top-level lifecycle must delegate internal phases, decision nodes, artifacts, and gates
    to the selected target profile without flattening target-specific behavior.
  testable_consequences:
  - The three targets can share lifecycle names while producing different required work.
  - A target profile cannot omit a shared constitutional stage without an approved waiver.
  decisions:
  - D004
  - D006
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: *id001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-005
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Govern lifecycle waivers
  requirement: The Builder must support explicit human-authorized lifecycle waivers that state the skipped obligation,
    rationale, risk, affected decisions, downstream provisional states, and expiration condition.
  testable_consequences:
  - A waiver generates a receipt and appears in the Control Tower.
  - A waiver cannot convert a blocked production gate into full authorization unless the target profile permits
    that exact waiver class.
  decisions:
  - D002
  - D006
  - D027
  user_journeys:
  - UJ-09
  cross_cutting_nfrs: *id001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-006
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Emit an event for every authoritative transition
  requirement: Every state transition, blocker, waiver, decision, invalidation, repair, authorization, and certification
    update must append a typed event to the Run Ledger.
  testable_consequences:
  - The current run state can be reconstructed from the IR snapshot plus ledger events.
  - No UI-only state change is accepted as authoritative.
  decisions:
  - D025
  user_journeys:
  - UJ-09
  cross_cutting_nfrs: *id001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-007
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Resume without replaying human decisions
  requirement: The Builder must resume an interrupted run from its latest valid checkpoint while preserving ratified
    decisions, evidence locks, event history, and outstanding actions.
  testable_consequences:
  - A resumed run does not ask already resolved Genesis questions unless their dependencies were invalidated.
  - Corrupted or incompatible checkpoints block with a diagnostic rather than silently resetting.
  decisions:
  - D010
  - D025
  user_journeys:
  - UJ-04
  cross_cutting_nfrs: *id001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-008
  feature_id: F01
  feature_title: Governed Product Lifecycle and Run Constitution
  title: Enforce the Builder product boundary
  requirement: The lifecycle must prevent the Builder from silently crossing from harness-development compilation
    into final production-harness implementation.
  testable_consequences:
  - Generated production logic is rejected unless it is explicitly authorized prototype scaffolding or a deterministic
    compiler-owned mechanism.
  - The Development Capsule records implementation scope and exclusions.
  decisions:
  - D001
  - D029
  - D033
  user_journeys:
  - UJ-11
  cross_cutting_nfrs: *id001
  source_file: prd/05-features/F01-governed-product-lifecycle.md
  status: draft_for_review
- id: FR-009
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Define target-specific source profiles
  requirement: The Builder must define required, recommended, optional, and prohibited source roles independently
    for each compilation target and category profile.
  testable_consequences:
  - A Content Harness, Visual Asset Editor, and Delegation run may require different source sets.
  - The resolved profile is stored and versioned with the run.
  decisions:
  - D005
  - D006
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: &id002
  - NFR-REL-004
  - NFR-TRACE-001
  - NFR-TRACE-004
  - NFR-SEC-003
  - NFR-SCALE-001
  source_file: prd/05-features/F02-configured-evidence-workspace.md
  status: draft_for_review
- id: FR-010
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Run source-readiness diagnostics before initialization
  requirement: The Builder must inspect configured paths, archive readability, source type, expected role, and version
    hints before committing the run to analysis.
  testable_consequences:
  - Missing required sources block with actionable diagnostics.
  - Recommended or optional omissions are recorded without pretending they were inspected.
  decisions:
  - D005
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: *id002
  source_file: prd/05-features/F02-configured-evidence-workspace.md
  status: draft_for_review
- id: FR-011
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Read directories and archives without mutating sources
  requirement: The Builder must index approved directory and ZIP sources in place while preserving source immutability
    and recorded hashes.
  testable_consequences:
  - No source file is modified, renamed, or unpacked into its origin by the Builder.
  - Derived artifacts are written only to approved run or workspace output locations.
  decisions:
  - D005
  - D028
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: *id002
  source_file: prd/05-features/F02-configured-evidence-workspace.md
  status: draft_for_review
- id: FR-012
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Require a real target candidate boundary
  requirement: The exact target candidate must resolve to a real accessible directory or another target type explicitly
    supported by its profile; internal archive paths may not be treated as traversable directories without deterministic
    extraction.
  testable_consequences:
  - Invalid target boundaries block before specimen indexing.
  - The resolved target replaces any placeholder target binding in the run configuration.
  decisions:
  - D005
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: *id002
  source_file: prd/05-features/F02-configured-evidence-workspace.md
  status: draft_for_review
- id: FR-013
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Create an immutable source lock
  requirement: The Builder must record source identifiers, canonical paths, cryptographic hashes, sizes, timestamps
    where available, roles, precedence, and authority status in a Source Lock.
  testable_consequences:
  - Every evidence reference resolves to one locked source version.
  - Changing a locked source creates a new source version and invalidates affected evidence rather than mutating
    history.
  decisions:
  - D005
  - D025
  user_journeys:
  - UJ-01
  cross_cutting_nfrs: *id002
  source_file: prd/05-features/F02-configured-evidence-workspace.md
  status: draft_for_review
- id: FR-014
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Build a queryable evidence index
  requirement: The Builder must index relevant files, archive entries, documents, schemas, registries, code, media,
    and prior implementations with provenance and semantic role metadata.
  testable_consequences:
  - Material Builder recommendations can cite stable evidence references.
  - The index distinguishes found content from merely configured sources.
  decisions:
  - D003
  - D005
  user_journeys:
