- id: FR-104
  feature_id: F11
  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Require a no-guidance control
  requirement: Behavior-shaping skills and prompt guidance must be compared with a realistic control that omits
    the candidate guidance.
  testable_consequences:
  - If the control does not exhibit the target failure, the Builder flags the skill's necessity claim.
  - Improvements are reported as deltas, not only absolute scores.
