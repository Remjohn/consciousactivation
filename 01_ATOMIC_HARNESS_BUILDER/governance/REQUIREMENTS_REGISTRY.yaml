- id: FR-037
  feature_id: F04
  feature_title: Atomicity Classification and Draft Harness Model
  title: Compile a Draft Harness Model
  requirement: After atomicity ratification, the Builder must compile a provisional model containing identity, production
    promise, syntax, composition variables, sequence grammar, draft Activative intelligence, inputs and outputs,
    capabilities, runtime hypotheses, evaluations, repairs, evidence gaps, and category ownership.
  testable_consequences:
  - All fields derive from locked evidence or explicit hypotheses in the Harness IR.
  - The model is complete enough to generate dependency-ready Genesis questions.
