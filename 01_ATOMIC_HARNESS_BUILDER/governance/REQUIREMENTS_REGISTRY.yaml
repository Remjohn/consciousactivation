  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Assemble capsules through deterministic code
  requirement: The generated harness must use a deterministic JIT compiler—not a free-form model decision—to select
    authorized skills, versions, branches, references, bindings, contracts, and context for a ready phase.
  testable_consequences:
  - Identical compiler inputs produce the same capsule bytes or an explicit nondeterminism receipt.
  - The execution model cannot choose to omit a required skill or load an unauthorized branch.
  decisions:
  - D018
