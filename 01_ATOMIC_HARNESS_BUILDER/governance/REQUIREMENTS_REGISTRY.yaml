  title: Ingest downstream implementation and harness results
  requirement: The Builder benchmark system must accept implementation questions, spec deltas, test failures, latency
    and cost, repair rounds, first-pass acceptance, human preference, wrong-reading outcomes, and certification
    results linked to the Builder version that produced the capsule.
  testable_consequences:
  - Builder quality can be compared causally across releases.
  - Downstream evidence updates benchmarks through governed online refinement rather than unreviewed batch rewrites.
