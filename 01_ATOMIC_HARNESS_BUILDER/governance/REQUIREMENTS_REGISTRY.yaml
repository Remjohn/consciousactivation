  title: Define a typed failure taxonomy
  requirement: The Builder must classify evidence, visual parse, atomicity, authority, contract, module, skill,
    capsule, benchmark, budget, provider, observability, migration, and downstream implementation failures with
    stable codes.
  testable_consequences:
  - Every blocking failure maps to one primary taxonomy entry.
  - Unknown failures remain explicit and require triage rather than being forced into an unrelated repair route.
