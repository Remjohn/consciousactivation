- id: FR-130
  feature_id: F13
  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Preserve unaffected upstream state
  requirement: Targeted repairs must retain source locks, measured observations, ratified decisions, contracts,
    and artifacts that remain supported by evidence.
  testable_consequences:
  - The repair plan lists preserved and invalidated state before mutation.
  - A local rendering defect cannot rewrite Activative policy.
  decisions:
