  feature_id: F03
  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Produce a typed specimen-level visual syntactic parse
  requirement: For every visual specimen, the Builder must identify major components, regions, containers, overlays,
    sequence markers, images, text roles, and category-relevant state elements using a typed schema.
  testable_consequences:
  - Every salient component has a stable component ID and knowledge status.
  - Omitted or uncertain components are represented explicitly rather than invented or hidden.
