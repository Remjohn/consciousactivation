  feature_id: F11
  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Generate positive, adversarial, missing-evidence, and pressure cases
  requirement: Skill and phase suites must include correct applications, near-misses, counterexamples, insufficient
    inputs, contradictions, tempting irrelevant context, and pressure to violate a rule.
  testable_consequences:
  - The suite tests whether the capability knows when not to apply.
  - Pressure scenarios require the agent to act rather than merely recite doctrine.
  decisions:
  - D021
  - D023
  user_journeys:
