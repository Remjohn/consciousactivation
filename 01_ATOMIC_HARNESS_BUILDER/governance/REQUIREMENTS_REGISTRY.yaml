  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Escalate repeated or constitutional failures
  requirement: The Builder must require human review when a repair changes a ratified constitutional decision, broadens
    the harness boundary, modifies a stable canonical skill, encounters contradictory doctrine, or fails repeatedly
    beyond the configured threshold.
  testable_consequences:
  - Escalation freezes further automated repair of the affected scope.
  - The Control Tower displays options, evidence, and affected authority.
  decisions:
