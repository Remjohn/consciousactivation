  feature_id: F15
  feature_title: Traceable Development Capsule and Implementation Handoff
  title: Govern implementation-discovered deltas
  requirement: When implementation reveals a genuine contradiction or missing decision, the team must create a typed
    delta linked to the affected IR nodes rather than silently altering constitutional or creative policy in code.
  testable_consequences:
  - The delta identifies whether PRD, Architecture, Harness IR, skill, contract, or benchmark must change.
  - Affected authorization is suspended or scoped until the delta is resolved.
