  feature_title: Repair, Invalidation, Readiness, and Implementation Authorization
  title: Compile a Repair and Invalidation Graph
  requirement: For each known failure class, the Builder must define the responsible phase or capability, permitted
    repair fields, frozen state, invalidated descendants, regression suite, escalation conditions, and authority
    needed.
  testable_consequences:
  - A repair cannot edit fields outside its permitted scope.
  - All declared descendants become stale or invalidated after the repair.
  decisions:
  - D026
