  requirement: The selected Release 1 reference path must first be executed and observed end to end with every human
    action, agent judgment, deterministic operation, handoff, condition, failure, cost, and artifact recorded before
    the workflow is promoted for automation.
  testable_consequences:
  - The shadow trace maps each observed step to a proposed Workflow IR node or documents why it is intentionally
    excluded.
