  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Resolve binding dependencies before compilation
  requirement: The JIT compiler must topologically resolve upstream contracts, human decisions, deterministic derived
    values, and conditional variables before assembling instructions.
  testable_consequences:
  - Circular dependencies block with a traceable diagnostic.
  - A downstream binding is recomputed when an upstream value changes.
  decisions:
  - D019
  user_journeys:
  - UJ-07
