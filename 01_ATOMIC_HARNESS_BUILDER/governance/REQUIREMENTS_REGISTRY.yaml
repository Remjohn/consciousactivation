  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Bind exact versions and hashes
  requirement: The capsule must record canonical skill versions, adaptation versions, recipe version, reference
    hashes, evidence lock, model policy, compiler version, output contract, and compiled prompt or program hash.
  testable_consequences:
  - Evaluation and production can prove they used the same capsule identity.
  - Changing any bound input yields a distinct capsule identity.
  decisions:
  - D018
  - D021
  user_journeys:
  - UJ-08
