  feature_id: F11
  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Evaluate every skill-system layer
  requirement: The Builder must define distinct evaluation suites for Canonical Skills, harness adaptations, composition
    recipes, JIT capsules, and end-to-end phase behavior.
  testable_consequences:
  - A passing canonical skill does not automatically certify a faulty harness adaptation.
  - Evaluation failures route to the responsible layer.
  decisions:
  - D021
  - D026
