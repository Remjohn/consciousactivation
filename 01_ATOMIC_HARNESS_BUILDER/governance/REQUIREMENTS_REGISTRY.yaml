  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Generate controlled mutation tests
  requirement: The benchmark system must support one-variable mutations such as preserving topic while changing
    grammar, preserving grammar while changing topic, removing a sequence invariant, swapping semantic polarity,
    or injecting irrelevant style evidence.
  testable_consequences:
  - The expected decision explains which invariant changed.
  - Mutation cases test causal understanding rather than visual similarity.
