  title: Return structured failure context only to the responsible node
  requirement: When a validator or evaluator fails, the runtime must package the minimal complete failure evidence
    and route it to the root-cause owner defined by the Repair and Invalidation Graph rather than replay the entire
    run.
  testable_consequences:
  - Unrelated nodes do not receive or rerun from the failure unless their contracts are invalidated.
  - The feedback package identifies failed criteria, evidence, allowed repair scope, frozen state, and regression
    requirements.
