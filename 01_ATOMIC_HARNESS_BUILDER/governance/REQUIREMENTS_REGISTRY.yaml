  feature_title: Behavioral Evaluation, Benchmark Portfolio, Maturity, and Scorecards
  title: Protect release-gate benchmark integrity
  requirement: Protected benchmark access, label changes, scoring changes, and case retirement must be governed,
    versioned, and audited.
  testable_consequences:
  - A release report discloses any benchmark change since the baseline.
  - Known answer leakage is a hard release failure.
