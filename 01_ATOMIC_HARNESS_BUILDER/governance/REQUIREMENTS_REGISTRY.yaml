- id: FR-101
  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Treat capsules as ephemeral phase-local artifacts
  requirement: A JIT Execution Capsule must declare its owning phase, lifetime, unload policy, downstream exposure,
    and prohibition against automatic canonical promotion.
  testable_consequences:
  - Downstream phases receive the typed output contract rather than inherited capsule context by default.
  - Expired capsules remain auditable but are not reused under changed bindings.
  decisions:
  - D017
  - D020
  user_journeys:
  - UJ-07
