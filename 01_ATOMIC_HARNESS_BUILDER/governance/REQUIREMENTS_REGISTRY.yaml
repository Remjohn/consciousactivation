- id: FR-034
  feature_id: F04
  feature_title: Atomicity Classification and Draft Harness Model
  title: Explain merge and split recommendations
  requirement: For every proposed merge or split, the Builder must state what is shared, what differs, whether configuration
    is sufficient, which evidence supports the conclusion, and which capability or state would break under the alternative.
  testable_consequences:
  - A merge explains why one runtime and evaluator can safely generate all members.
  - A split explains the material grammar, sequencing, runtime, or failure difference.
