- id: FR-098
  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Compile Minimum Complete Context
  requirement: The compiler must assemble the smallest complete authorized context for the active phase using the
    Context Budget Policy and Reference and Loading Graph.
  testable_consequences:
  - Inactive archetype, format, or evaluator branches are excluded.
  - All completion criteria and required evidence remain present.
  decisions:
  - D020
  user_journeys:
  - UJ-07
