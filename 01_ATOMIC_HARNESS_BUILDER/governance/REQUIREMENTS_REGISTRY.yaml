  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Organize canonical skills by authority lane
  requirement: Every canonical skill must declare its Hunter, Analyst, Composer, or Commander lane without turning
    the lane into a monolithic agent or nested skill hierarchy.
  testable_consequences:
  - The lane describes authority and responsibility, not autonomous identity.
  - Flat skills remain orchestrator-invoked and independently testable.
