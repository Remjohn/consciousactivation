  feature_title: Traceable Development Capsule and Implementation Handoff
  title: Ingest implementation and certification feedback
  requirement: The Builder must accept structured implementation questions, delta outcomes, tests, defects, runtime
    metrics, repair history, and certification evidence and link them to the Builder and capsule versions that caused
