  feature_id: F03
  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Parse hierarchy and reading order
  requirement: The Builder must draft attention hierarchy, reading order, typography roles, color roles, negative-space
    behavior, and density using evidence-linked fields.
  testable_consequences:
  - The parse can explain which component dominates first attention and why that conclusion is provisional or measured.
  - Typography and color roles are not promoted into invariants from a single unexplained instance.
