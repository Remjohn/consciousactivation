  title: Maintain a layered versioned benchmark corpus
  requirement: Each benchmark target must contain real specimens, expert goldens, known failures, adversarial near-misses,
    incomplete or contradictory evidence, controlled mutations, transfer cases, and protected release cases.
  testable_consequences:
  - Every case has stable IDs, expected behavior, scoring rules, and source provenance.
  - Protected labels are not exposed to the Builder during ordinary development runs.
