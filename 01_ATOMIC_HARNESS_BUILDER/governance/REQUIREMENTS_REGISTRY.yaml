  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Track skill maturity and plasticity
  requirement: Canonical skills and adaptations must use governed maturity states with promotion, change, regression,
    deprecation, and migration rules.
  testable_consequences:
  - Stable skills cannot be behaviorally changed without required regression coverage.
  - New skills begin in draft or evaluation-pending state.
  decisions:
  - D021
