  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Represent harness-local skill adaptations
  requirement: The Harness IR must define how a canonical skill's ontology, procedure, completion criteria, references,
    failure modes, and evaluation mutate for one atomic harness without creating a new canonical skill identity.
  testable_consequences:
  - The adaptation records its canonical base version and local delta.
  - Changes outside the allowed adaptation surface require canonical skill review.
