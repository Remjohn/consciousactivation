- id: FR-087
  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Use leading words as tested behavioral anchors
  requirement: A skill may declare one or more compact leading words or phrases only when they encode a clear behavioral
    prior, reduce instruction duplication, and are evaluated against the target failure mode.
  testable_consequences:
  - The test measures behavioral adoption rather than phrase repetition.
  - Weak or colliding leading words are removed through no-op and variance testing.
