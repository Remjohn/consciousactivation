  feature_id: F03
  feature_title: Visual Syntax First and Draft Activative Understanding
  title: Use a canonical parsing ontology with category adaptations
  requirement: Visual Syntactic Parsing must use a canonical capability ontology extended by the selected category
    and format profile rather than one universal vision prompt.
  testable_consequences:
  - Carousel parsing can represent slide roles while 2D Character Animation can represent character states.
  - Category vocabulary does not leak into unrelated categories.
