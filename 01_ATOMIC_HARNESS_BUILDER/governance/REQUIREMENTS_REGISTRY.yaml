- id: FR-102
  feature_id: F10
  feature_title: Skill Composition Recipes and Deterministic JIT Execution Capsules
  title: Preserve deterministic assembly and bounded stochastic execution
  requirement: The runtime architecture must keep context selection, dependency resolution, validation, and routing
    deterministic while assigning only the bounded semantic or creative transformation to the model program.
  testable_consequences:
  - The capability ownership map can identify which part of an execution was stochastic.
  - Critical orchestration cannot migrate into prompt prose without an approved architecture delta.
  decisions:
  - D012
  - D018
  - D033
