  title: Require root-cause investigation before workflow repair
  requirement: The repair workflow must reproduce and localize a workflow failure, compare working and failing paths,
    state a testable root-cause hypothesis, and gather evidence before modifying the responsible node, route, skill,
    or contract.
  testable_consequences:
  - A repair proposal without a reproduced or evidenced failure remains blocked.
  - Repeated failed repairs trigger architecture escalation rather than indefinite patch accumulation.
