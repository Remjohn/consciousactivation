  source_file: prd/05-features/F02-configured-evidence-workspace.md
  status: draft_for_review
- id: FR-015
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Inventory every target specimen
  requirement: The Builder must assign stable IDs, hashes, media types, dimensions or duration, source paths, duplicate
    relationships, and analysis status to every target specimen.
  testable_consequences:
  - All target media is accounted for or explicitly unreadable.
  - Duplicates remain traceable but are not silently treated as independent evidence.
  decisions:
  - D007
  - D023
  user_journeys:
  - UJ-02
