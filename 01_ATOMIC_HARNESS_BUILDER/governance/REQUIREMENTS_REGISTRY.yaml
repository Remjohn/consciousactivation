  feature_id: F09
  feature_title: Canonical Skill Ecology and Skill Design Compiler
  title: Compile a typed Skill Design Brief
  requirement: Every new or materially adapted skill must begin from a reviewable structured brief covering intent,
    target, context, trigger or program invocation, inputs, action, method, modules, constraints, output artifact,
    success criteria, failure evidence, and runtime budgets.
  testable_consequences:
  - The brief remains legible to a product owner before SKILL.md generation.
  - Dynamic values are parameterized and no instance-specific content is promoted into the reusable capability.
  decisions:
  - D017
  - D019
