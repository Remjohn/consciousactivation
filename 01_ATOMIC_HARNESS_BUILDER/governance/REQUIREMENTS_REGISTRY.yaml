- id: FR-079
  feature_id: F08
  feature_title: Reference, SPR, and Minimum Complete Context
  title: Block rather than silently truncate required context
  requirement: If required context exceeds the approved budget, the Builder must block and recommend phase splitting,
    typed compression, retrieval, deduplication, reference redesign, model-policy change, or an authorized budget
    increase.
  testable_consequences:
  - Required text is never cut mid-procedure without an approved compiler rule.
  - The blocker identifies which resources caused the overflow.
