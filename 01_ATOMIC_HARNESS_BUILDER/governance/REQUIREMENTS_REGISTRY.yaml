  status: draft_for_review
- id: FR-150
  feature_id: F14
  feature_title: Canonical Format Categories, Format Profiles, and Activative Sequencing
  title: Govern category and profile migration
  requirement: Category and format-profile changes must generate compatibility analysis, dependent-harness regression
    plans, migration artifacts, deprecation policy, and receipts.
  testable_consequences:
  - Stable dependent harnesses remain pinned until explicitly migrated.
  - A category change cannot silently alter an authorized Development Capsule.
