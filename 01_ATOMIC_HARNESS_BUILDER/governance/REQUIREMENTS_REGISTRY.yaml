- id: FR-017
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Classify evidence gaps and authority conflicts
  requirement: The Builder must distinguish missing evidence, unreadable evidence, sparse target evidence, contradictory
    sources, contradictory authority, and unresolved provenance.
  testable_consequences:
  - Each gap class has a defined blocker or waiver policy.
  - Higher-precedence canonical sources are not silently overridden by lower-precedence references.
  decisions:
  - D005
  - D007
  user_journeys:
  - UJ-01
  - UJ-09
  cross_cutting_nfrs: *id002
  source_file: prd/05-features/F02-configured-evidence-workspace.md
  status: draft_for_review
- id: FR-018
  feature_id: F02
  feature_title: Configured Evidence Workspace, Source Lock, and Saturation
  title: Issue typed saturation outcomes
  requirement: The Builder must issue PASS, PASS_WITH_LIMITATIONS, BLOCKED_MISSING_EVIDENCE, BLOCKED_CONTRADICTORY_AUTHORITY,
    or INSUFFICIENT_TARGET_EVIDENCE with evidence and downstream consequences.
  testable_consequences:
  - PASS_WITH_LIMITATIONS requires a human waiver and marks affected decisions provisional.
  - A blocked saturation outcome prevents atomicity and Genesis.
  decisions:
  - D007
  - D027
  user_journeys:
  - UJ-01
  - UJ-09
  cross_cutting_nfrs: *id002
