  feature_id: F04
  feature_title: Atomicity Classification and Draft Harness Model
  title: Assign one typed atomicity status
  requirement: 'Each candidate must receive exactly one status: atomic_harness_candidate, variant_of_existing, dish_family_candidate,
    format_family_only, needs_clustering, needs_partition, or insufficient_evidence.'
  testable_consequences:
  - The status is schema-validated and evidence-linked.
  - A non-atomic status blocks Harness Genesis for that candidate boundary.
